<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة إدارة بصمة غير | تحكم كامل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #f5f3f0; padding: 20px; color: #2d2a2a; }
        .container { max-width: 1200px; margin: 0 auto; }
        .login-box, .admin-panel { background: white; border-radius: 32px; padding: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-top: 30px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .admin-header h1 { color: #b88b4a; font-size: 1.6rem; }
        button, .btn { background: #d4af7a; color: white; padding: 10px 18px; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { transform: translateY(-2px); opacity: 0.95; }
        .btn-red { background: #dc3545; }
        .btn-green { background: #28a745; }
        .btn-gold { background: #b88b4a; }
        .logout-btn { background: #dc3545; width: auto; padding: 8px 22px; }
        .collapse-section { background: white; border-radius: 24px; margin-bottom: 20px; border: 1px solid #e9e2d8; overflow: hidden; }
        .collapse-btn { background: #fefaf5; display: flex; justify-content: space-between; padding: 16px 22px; font-weight: 700; font-size: 1rem; color: #b88b4a; border-bottom: 1px solid #e9e2d8; cursor: pointer; }
        .collapse-content { display: none; padding: 22px; background: white; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #5a5a5a; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #e0d6cc; border-radius: 20px; font-family: inherit; font-size: 0.9rem; margin-bottom: 8px; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #b88b4a; box-shadow: 0 0 0 2px rgba(184,139,74,0.2); }
        .list-item-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; background: #fefaf5; padding: 12px; border-radius: 20px; border: 1px solid #e9e2d8; flex-wrap: wrap; }
        .list-item-row input { flex: 1; margin: 0; }
        .image-delete-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; margin-top: 15px; }
        .image-delete-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 16px; border: 1px solid #ddd; }
        .urls-textarea { font-family: monospace; height: 100px; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e2a3a; color: white; padding: 10px 24px; border-radius: 50px; z-index: 9999; display: none; font-size: 0.85rem; white-space: nowrap; }
        @media (max-width: 700px) { .toast { white-space: normal; width: 80%; text-align: center; } .list-item-row { flex-direction: column; align-items: stretch; } .list-item-row input { margin-bottom: 8px; } }
        hr { margin: 15px 0; border-color: #e9e2d8; }
        .checkbox-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        .help-text { font-size: 0.75rem; color: #888; margin-top: -5px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-box" id="loginBox">
        <h2 style="text-align:center;">🔐 لوحة التحكم</h2>
        <input type="password" id="adminPassword" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
    </div>
    <div id="adminPanel" style="display:none;">
        <div class="admin-header">
            <h1>⚙️ تحكم كامل بالموقع</h1>
            <button onclick="logout()" class="logout-btn">خروج</button>
        </div>
        <div id="adminSections"></div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let loggedIn = false;
    let openSections = {};

    function showToast(msg) { const t=document.getElementById('toast'); t.innerText=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
    function login() { const pwd=document.getElementById('adminPassword').value; db.ref(DB_PATH+'/in').once('value').then(snap=>{ if(snap.val() && snap.val().toString()===pwd){ loggedIn=true; document.getElementById('loginBox').style.display='none'; document.getElementById('adminPanel').style.display='block'; loadData(); } else showToast('كلمة المرور غير صحيحة'); }); }
    function logout() { loggedIn=false; document.getElementById('loginBox').style.display='block'; document.getElementById('adminPanel').style.display='none'; currentData={}; }
    function loadData() { db.ref(DB_PATH).on('value', snap=>{ currentData=snap.val()||{}; buildAdmin(); restoreOpen(); }); }
    function toggleCollapse(btn,id) { const content=btn.nextElementSibling; const isOpen=content.style.display==='block'; content.style.display=isOpen?'none':'block'; openSections[id]=!isOpen; btn.querySelector('span').innerHTML=isOpen?'▾':'▴'; }
    function restoreOpen() { document.querySelectorAll('.collapse-section').forEach(s=>{ const id=s.dataset.sectionId; if(openSections[id]){ s.querySelector('.collapse-content').style.display='block'; s.querySelector('.collapse-btn span').innerHTML='▴'; } }); }

    // ========== إدارة الصور (بدون تكرار) ==========
    async function addImagesToTarget(target, urlsArray, clearTextareaId, reloadCallback) {
        if(!target || urlsArray.length===0) return showToast('اختر الوجهة وأدخل روابط صالحة');
        // إزالة التكرار داخل نفس الدفعة
        const unique = [...new Set(urlsArray)];
        if(unique.length !== urlsArray.length) showToast('تمت إزالة الروابط المكررة تلقائياً');
        const promises = unique.map(url => db.ref(DB_PATH+'/'+target+'/imgs').push({ url }));
        await Promise.all(promises);
        showToast(`تمت إضافة ${unique.length} صورة بنجاح`);
        if(clearTextareaId) document.getElementById(clearTextareaId).value = '';
        if(reloadCallback) reloadCallback();
        loadData(); // تحديث كامل للواجهة
    }

    function deleteImage(path, imgId) { 
        db.ref(`${DB_PATH}/${path}/imgs/${imgId}`).remove().then(()=>{ 
            showToast('تم الحذف'); 
            loadData(); 
        }); 
    }
    function loadImagesForDelete(path, containerId) {
        const grid = document.getElementById(containerId);
        if(!grid) return;
        const [type, id] = path.split('/');
        const folder = currentData[type]?.[id];
        if(!folder || !folder.imgs) { grid.innerHTML='<p>لا توجد صور</p>'; return; }
        grid.innerHTML = Object.keys(folder.imgs).map(imgId=>`<div><img src="${folder.imgs[imgId].url}"><button class="btn-red" onclick="deleteImage('${path}','${imgId}')" style="margin-top:4px;">حذف</button></div>`).join('');
    }

    // ========== بناء لوحة التحكم ==========
    function buildAdmin() {
        const d = currentData;
        const getTargetOptions = (type) => {
            let o = '<option value="">-- اختر --</option>';
            if(type==='album' && d.albums) Object.keys(d.albums).forEach(id=>o+=`<option value="albums/${id}">📁 ${d.albums[id].name}</option>`);
            if(type==='store' && d.store_categories) Object.keys(d.store_categories).forEach(id=>o+=`<option value="store_categories/${id}">🛒 ${d.store_categories[id].name}</option>`);
            return o;
        };
        const scheduleHTML = () => {
            const days = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
            let html='';
            for(let i=0;i<=6;i++){
                const s=d.work_schedule?.[i]||{active:false,s1_s:'09:00',s1_e:'17:00',s2_a:false};
                html+=`<div style="border:1px solid #e9e2d8;border-radius:16px;padding:12px;margin-bottom:12px;">
                        <label><input type="checkbox" id="dayActive_${i}" ${s.active?'checked':''}> ${days[i]}</label>
                        <div class="input-group"><input type="time" id="s1s_${i}" value="${s.s1_s}"> — <input type="time" id="s1e_${i}" value="${s.s1_e}"></div>
                        <label><input type="checkbox" id="s2a_${i}" ${s.s2_a?'checked':''}> فترة مسائية</label>
                        <div id="evening_${i}" style="${s.s2_a?'':'display:none'};margin-top:8px;"><input type="time" id="s2s_${i}" value="${s.s2_s||''}"> — <input type="time" id="s2e_${i}" value="${s.s2_e||''}"></div>
                    </div>`;
            }
            setTimeout(()=>{ for(let i=0;i<=6;i++){ const cb=document.getElementById(`s2a_${i}`); if(cb) cb.onchange=()=>document.getElementById(`evening_${i}`).style.display=cb.checked?'block':'none'; } },100);
            return html;
        };
        // دوال مساعدة لإدارة القوائم (ألبومات، أقسام متجر، كتالوجات، شركاء)
        const addItemLocal = (containerId, inputId, newIdPrefix, nameKey='name') => {
            const name = document.getElementById(inputId).value.trim();
            if(!name) return showToast('أدخل الاسم');
            const container = document.getElementById(containerId);
            const newId = `${newIdPrefix}_${Date.now()}`;
            const div = document.createElement('div'); div.className='list-item-row'; div.setAttribute('data-id',newId);
            div.innerHTML = `<input type="text" value="${name.replace(/"/g,'&quot;')}" class="item-name-input"><button class="btn-red" onclick="this.closest('.list-item-row').remove()">حذف</button>`;
            container.appendChild(div);
            document.getElementById(inputId).value='';
            showToast('تمت الإضافة محلياً');
        };
        const saveGenericList = (containerId, dbPath, nameKey) => {
            const rows = document.querySelectorAll(`#${containerId} .list-item-row`);
            const updates = {}, toRemove = [];
            rows.forEach(row => {
                const id = row.dataset.id;
                const name = row.querySelector('.item-name-input').value.trim();
                if(name){
                    if(!id.startsWith('temp_')) updates[`${dbPath}/${id}/${nameKey}`]=name;
                    else updates[`${dbPath}/${id}`]={ [nameKey]: name };
                } else { if(!id.startsWith('temp_')) toRemove.push(id); }
            });
            const removePromises = toRemove.map(id=>db.ref(DB_PATH+'/'+dbPath+'/'+id).remove());
            const updatePromises = Object.keys(updates).map(p=>db.ref(DB_PATH).child(p).set(updates[p]));
            return Promise.all([...removePromises, ...updatePromises]);
        };

        const html = `
            <div class="collapse-section" data-section-id="general">
                <button class="collapse-btn" onclick="toggleCollapse(this,'general')">⚙️ الإعدادات العامة والنصوص <span>▾</span></button>
                <div class="collapse-content">
                    <div class="input-group"><label>اسم الموقع</label><input id="siteName" value="${(d.site_name||'').replace(/"/g,'&quot;')}"></div>
                    <div class="input-group"><label>رقم واتساب (بدون +)</label><input id="whatsappNum" value="${d.whatsapp_num||''}"></div>
                    <div class="input-group"><label>نص من نحن</label><textarea id="aboutText" rows="4">${(d.about_text||'').replace(/"/g,'&quot;')}</textarea></div>
                    <div class="input-group"><label>نص الفوتر (حقوق الملكية)</label><input id="footerText" value="${(d.footer_text||'').replace(/"/g,'&quot;')}"></div>
                    <div class="input-group"><label>رابط موقع الخريطة</label><input id="locationUrl" value="${(d.location_url||'').replace(/"/g,'&quot;')}"></div>
                    <div class="input-group"><label>انستقرام</label><input id="instaUrl" value="${(d.insta_url||'').replace(/"/g,'&quot;')}"></div>
                    <div class="input-group"><label>تيك توك</label><input id="tiktokUrl" value="${(d.tiktok_url||'').replace(/"/g,'&quot;')}"></div>
                    <div class="input-group"><label>سناب شات</label><input id="snapUrl" value="${(d.snap_url||'').replace(/"/g,'&quot;')}"></div>
                    <button class="btn-gold" onclick="saveGeneral()">حفظ جميع الإعدادات</button>
                </div>
            </div>
            <div class="collapse-section" data-section-id="albums">
                <button class="collapse-btn" onclick="toggleCollapse(this,'albums')">📁 ألبومات أعمالنا <span>▾</span></button>
                <div class="collapse-content">
                    <div id="albumsList"></div>
                    <div style="display:flex; gap:8px; margin:10px 0;"><input id="newAlbumName" placeholder="اسم الألبوم الجديد"><button class="btn-green" onclick="addAlbumLocal()">إضافة ألبوم</button></div>
                    <button class="btn-gold" onclick="saveAllAlbums()">حفظ جميع الألبومات</button>
                    <hr><h4>📸 إدارة صور الألبوم</h4>
                    <select id="albumSelect" onchange="loadAlbumImagesForDelete()">${getTargetOptions('album')}</select>
                    <div id="albumImagesGrid" class="image-delete-grid" style="margin-top:10px;"></div>
                    <hr><h4>➕ إضافة صور إلى الألبوم (روابط)</h4>
                    <select id="addToAlbumSelect">${getTargetOptions('album')}</select>
                    <textarea id="albumUrls" class="urls-textarea" placeholder="أدخل روابط الصور (كل رابط في سطر)"></textarea>
                    <button class="btn-gold" onclick="addImagesToAlbum()">إضافة صور للألبوم</button>
                </div>
            </div>
            <div class="collapse-section" data-section-id="store">
                <button class="collapse-btn" onclick="toggleCollapse(this,'store')">🛍️ أقسام المتجر <span>▾</span></button>
                <div class="collapse-content">
                    <div id="storeCatsList"></div>
                    <div style="display:flex; gap:8px;"><input id="newStoreCatName" placeholder="اسم القسم الجديد"><button class="btn-green" onclick="addStoreCatLocal()">إضافة قسم</button></div>
                    <button class="btn-gold" onclick="saveAllStoreCats()">حفظ الأقسام</button>
                    <hr><h4>📸 إدارة منتجات القسم</h4>
                    <select id="storeCatSelect" onchange="loadStoreImagesForDelete()">${getTargetOptions('store')}</select>
                    <div id="storeImagesGrid" class="image-delete-grid" style="margin-top:10px;"></div>
                    <hr><h4>➕ إضافة منتجات (روابط)</h4>
                    <select id="addToStoreSelect">${getTargetOptions('store')}</select>
                    <textarea id="storeUrls" class="urls-textarea" placeholder="روابط المنتجات (كل رابط في سطر)"></textarea>
                    <button class="btn-gold" onclick="addImagesToStore()">إضافة منتجات</button>
                </div>
            </div>
            <div class="collapse-section" data-section-id="catalogs">
                <button class="collapse-btn" onclick="toggleCollapse(this,'catalogs')">📚 الكتالوجات <span>▾</span></button>
                <div class="collapse-content">
                    <div id="catalogsList"></div>
                    <div style="margin-top:10px;"><input id="newCatalogName" placeholder="اسم الكتالوج"><textarea id="newCatalogCode" rows="3" placeholder="كود iFrame"></textarea><button class="btn-green" onclick="addCatalogLocal()">إضافة كتالوج</button></div>
                    <button class="btn-gold" onclick="saveAllCatalogs()">حفظ الكتالوجات</button>
                </div>
            </div>
            <div class="collapse-section" data-section-id="partners">
                <button class="collapse-btn" onclick="toggleCollapse(this,'partners')">🤝 شركاء النجاح <span>▾</span></button>
                <div class="collapse-content">
                    <div id="partnersList"></div>
                    <div style="display:flex; gap:8px;"><input id="newPartnerUrl" placeholder="رابط الصورة"><input id="newPartnerLink" placeholder="الرابط (اختياري)"><button class="btn-green" onclick="addPartnerLocal()">إضافة شريك</button></div>
                    <button class="btn-gold" onclick="saveAllPartners()">حفظ الشركاء</button>
                </div>
            </div>
            <div class="collapse-section" data-section-id="schedule">
                <button class="collapse-btn" onclick="toggleCollapse(this,'schedule')">🕒 أوقات العمل <span>▾</span></button>
                <div class="collapse-content">
                    ${scheduleHTML()}
                    <button class="btn-gold" onclick="saveSchedule()">حفظ المواعيد</button>
                </div>
            </div>
            <div class="collapse-section" data-section-id="reviews">
                <button class="collapse-btn" onclick="toggleCollapse(this,'reviews')">⭐ التقييمات <span>▾</span></button>
                <div class="collapse-content"><div id="reviewsList"></div></div>
            </div>
            <div class="collapse-section" data-section-id="splash">
                <button class="collapse-btn" onclick="toggleCollapse(this,'splash')">🎬 شاشة البداية (Splash) <span>▾</span></button>
                <div class="collapse-content">
                    <div class="checkbox-row"><input type="checkbox" id="splashEnabled" ${d.splash_enabled!==false?'checked':''}> <label>تفعيل شاشة البداية</label></div>
                    <div class="checkbox-row"><input type="checkbox" id="splashShowSkip" ${d.splash_show_skip===true?'checked':''}> <label>إظهار زر "تخطي"</label></div>
                    <div class="input-group"><label>نوع الوسائط</label><select id="splashType"><option value="image" ${d.splash_type==='image'?'selected':''}>صورة ثابتة</option><option value="gif" ${d.splash_type==='gif'?'selected':''}>صورة متحركة GIF</option><option value="video" ${d.splash_type==='video'?'selected':''}>فيديو</option></select></div>
                    <div class="input-group"><label>رابط الصورة/الفيديو</label><input id="splashMediaUrl" value="${(d.splash_media_url||'').replace(/"/g,'&quot;')}"></div>
                    <div class="input-group"><label>رابط فيديو إضافي (YouTube/Direct)</label><input id="splashVideoUrl" value="${(d.splash_video_url||'').replace(/"/g,'&quot;')}"></div>
                    <div class="input-group"><label>مدة العرض (ثانية)</label><input id="splashDuration" type="number" value="${d.splash_duration||5}"></div>
                    <button class="btn-gold" onclick="saveSplashSettings()">حفظ إعدادات الشاشة</button>
                </div>
            </div>
            <div class="collapse-section" data-section-id="popup">
                <button class="collapse-btn" onclick="toggleCollapse(this,'popup')">💬 فقاعة الترحيب <span>▾</span></button>
                <div class="collapse-content">
                    <div class="checkbox-row"><input type="checkbox" id="popupEnabled" ${d.popup_enabled?'checked':''}> <label>تفعيل الفقاعة</label></div>
                    <input id="popupMessage" placeholder="نص الرسالة" value="${(d.popup_message||'').replace(/"/g,'&quot;')}">
                    <input id="popupDuration" type="number" placeholder="مدة الظهور (ثواني)" value="${d.popup_duration||8}">
                    <button class="btn-gold" onclick="savePopupSettings()">حفظ</button>
                </div>
            </div>
            <div class="collapse-section" data-section-id="maintenance">
                <button class="collapse-btn" onclick="toggleCollapse(this,'maintenance')">🛡️ وضع الصيانة <span>▾</span></button>
                <div class="collapse-content">
                    <div class="checkbox-row"><input type="checkbox" id="maintenanceMode" ${d.maintenance_mode?'checked':''}> <label>تفعيل وضع الصيانة</label></div>
                    <input id="maintenanceTitle" placeholder="عنوان الصيانة" value="${(d.maintenance_title||'').replace(/"/g,'&quot;')}">
                    <textarea id="maintenanceMsg" rows="2" placeholder="رسالة الصيانة">${(d.maintenance_message||'').replace(/"/g,'&quot;')}</textarea>
                    <div class="time-picker-group" style="display:flex; gap:10px;">
                        <input type="number" id="hoursInput" placeholder="ساعات" value="0"><input type="number" id="minutesInput" placeholder="دقائق" value="0"><input type="number" id="secondsInput" placeholder="ثواني" value="0">
                    </div>
                    <button class="btn-gold" onclick="saveMaintenance()">حفظ إعدادات الصيانة</button>
                </div>
            </div>
        `;
        document.getElementById('adminSections').innerHTML = html;

        // تعبئة القوائم الأساسية
        const renderList = (containerId, dataObj, nameKey) => {
            const c = document.getElementById(containerId);
            if(!c) return;
            if(!dataObj || Object.keys(dataObj).length===0){ c.innerHTML='<div class="empty-state">لا توجد عناصر</div>'; return; }
            c.innerHTML = Object.keys(dataObj).map(id=>`<div class="list-item-row" data-id="${id}"><input type="text" value="${(dataObj[id][nameKey]||'').replace(/"/g,'&quot;')}" class="item-name-input"><button class="btn-red" onclick="this.closest('.list-item-row').remove()">حذف</button></div>`).join('');
        };
        renderList('albumsList', d.albums, 'name');
        renderList('storeCatsList', d.store_categories, 'name');
        // الكتالوجات (اسم + كود)
        const catsContainer = document.getElementById('catalogsList');
        if(catsContainer && d.catalogs){
            catsContainer.innerHTML = Object.keys(d.catalogs).map(id=>`
                <div class="list-item-row" data-id="${id}"><input type="text" value="${(d.catalogs[id].name||'').replace(/"/g,'&quot;')}" class="item-name-input"><button class="btn-red" onclick="this.closest('.list-item-row').nextElementSibling?.remove(); this.closest('.list-item-row').remove()">حذف</button></div>
                <div class="list-item-row" style="margin-top:-8px;"><textarea class="catalog-code-input" rows="2" style="flex:2;">${(d.catalogs[id].code||'').replace(/"/g,'&quot;')}</textarea></div>
            `).join('');
        }
        // الشركاء (صورة + رابط)
        const partnersContainer = document.getElementById('partnersList');
        if(partnersContainer && d.partners){
            partnersContainer.innerHTML = Object.keys(d.partners).map(id=>`
                <div class="list-item-row" data-id="${id}">
                    <input type="text" value="${(d.partners[id].url||'').replace(/"/g,'&quot;')}" class="partner-url-input" placeholder="رابط الصورة">
                    <input type="text" value="${(d.partners[id].link||'').replace(/"/g,'&quot;')}" class="partner-link-input" placeholder="الرابط (اختياري)">
                    <button class="btn-red" onclick="this.closest('.list-item-row').remove()">حذف</button>
                </div>
            `).join('');
        }
        // التقييمات
        const revContainer = document.getElementById('reviewsList');
        if(revContainer && d.reviews){
            revContainer.innerHTML = Object.keys(d.reviews).map(id=>`<div style="border-bottom:1px solid #eee; padding:8px;"><b>${d.reviews[id].name}</b> ${'★'.repeat(d.reviews[id].rating)}<p>${d.reviews[id].message}</p><button class="btn-red" onclick="deleteReview('${id}')">حذف</button></div>`).join('');
        }

        // دوال الإضافة والحفظ المحسنة
        window.addAlbumLocal = () => addItemLocal('albumsList', 'newAlbumName', 'temp_album');
        window.saveAllAlbums = () => saveGenericList('albumsList', 'albums', 'name').then(()=>showToast('تم حفظ الألبومات'));
        window.addStoreCatLocal = () => addItemLocal('storeCatsList', 'newStoreCatName', 'temp_storecat');
        window.saveAllStoreCats = () => saveGenericList('storeCatsList', 'store_categories', 'name').then(()=>showToast('تم حفظ أقسام المتجر'));
        window.addCatalogLocal = () => {
            const name=document.getElementById('newCatalogName').value.trim();
            const code=document.getElementById('newCatalogCode').value.trim();
            if(!name||!code) return showToast('أدخل الاسم والكود');
            const container=document.getElementById('catalogsList');
            const newId='temp_cat_'+Date.now();
            const divName=document.createElement('div'); divName.className='list-item-row'; divName.setAttribute('data-id',newId);
            divName.innerHTML=`<input type="text" value="${name.replace(/"/g,'&quot;')}" class="item-name-input"><button class="btn-red" onclick="this.closest('.list-item-row').nextElementSibling?.remove(); this.closest('.list-item-row').remove()">حذف</button>`;
            const divCode=document.createElement('div'); divCode.className='list-item-row'; divCode.style.marginTop='-8px';
            divCode.innerHTML=`<textarea class="catalog-code-input" rows="2" style="flex:2;">${code.replace(/"/g,'&quot;')}</textarea>`;
            container.appendChild(divName); container.appendChild(divCode);
            document.getElementById('newCatalogName').value=''; document.getElementById('newCatalogCode').value='';
            showToast('أضيف محلياً');
        };
        window.saveAllCatalogs = () => {
            const nameRows = document.querySelectorAll('#catalogsList .list-item-row:has(.item-name-input)');
            const updates={}, toRemove=[];
            nameRows.forEach(nameRow=>{
                const id=nameRow.dataset.id;
                const name=nameRow.querySelector('.item-name-input').value.trim();
                const codeRow=nameRow.nextElementSibling;
                const code=codeRow?codeRow.querySelector('.catalog-code-input').value.trim():'';
                if(name && code){
                    if(!id.startsWith('temp_cat')){
                        updates[`catalogs/${id}/name`]=name;
                        updates[`catalogs/${id}/code`]=code;
                    } else updates[`catalogs/${id}`]={name,code};
                } else if(!id.startsWith('temp_cat')) toRemove.push(id);
            });
            Promise.all([...toRemove.map(id=>db.ref(DB_PATH+'/catalogs/'+id).remove()), ...Object.keys(updates).map(p=>db.ref(DB_PATH).child(p).set(updates[p]))]).then(()=>showToast('تم حفظ الكتالوجات'));
        };
        window.addPartnerLocal = () => {
            const url=document.getElementById('newPartnerUrl').value.trim();
            const link=document.getElementById('newPartnerLink').value.trim();
            if(!url) return showToast('أدخل رابط الصورة');
            const container=document.getElementById('partnersList');
            const newId='temp_part_'+Date.now();
            const div=document.createElement('div'); div.className='list-item-row'; div.setAttribute('data-id',newId);
            div.innerHTML=`<input type="text" value="${url.replace(/"/g,'&quot;')}" class="partner-url-input"><input type="text" value="${link.replace(/"/g,'&quot;')}" class="partner-link-input"><button class="btn-red" onclick="this.closest('.list-item-row').remove()">حذف</button>`;
            container.appendChild(div);
            document.getElementById('newPartnerUrl').value=''; document.getElementById('newPartnerLink').value='';
            showToast('أضيف محلياً');
        };
        window.saveAllPartners = () => {
            const rows = document.querySelectorAll('#partnersList .list-item-row');
            const updates={}, toRemove=[];
            rows.forEach(row=>{
                const id=row.dataset.id;
                const url=row.querySelector('.partner-url-input').value.trim();
                const link=row.querySelector('.partner-link-input')?.value.trim();
                if(url){
                    if(!id.startsWith('temp_part')){
                        updates[`partners/${id}/url`]=url;
                        if(link) updates[`partners/${id}/link`]=link;
                    } else updates[`partners/${id}`]={url, link:link||null};
                } else if(!id.startsWith('temp_part')) toRemove.push(id);
            });
            Promise.all([...toRemove.map(id=>db.ref(DB_PATH+'/partners/'+id).remove()), ...Object.keys(updates).map(p=>db.ref(DB_PATH).child(p).set(updates[p]))]).then(()=>showToast('تم حفظ الشركاء'));
        };
        window.deleteReview = (id) => db.ref(DB_PATH+'/reviews/'+id).remove().then(()=>loadData());

        // إدارة الصور
        window.loadAlbumImagesForDelete = () => { const val=document.getElementById('albumSelect').value; if(val) loadImagesForDelete(val, 'albumImagesGrid'); };
        window.loadStoreImagesForDelete = () => { const val=document.getElementById('storeCatSelect').value; if(val) loadImagesForDelete(val, 'storeImagesGrid'); };
        window.addImagesToAlbum = async () => {
            const target = document.getElementById('addToAlbumSelect').value;
            const urlsText = document.getElementById('albumUrls').value;
            const urls = urlsText.split('\n').filter(u=>u.trim());
            if(!target) return showToast('اختر ألبوم');
            if(urls.length===0) return showToast('أدخل روابط الصور');
            await addImagesToTarget(target, urls, 'albumUrls', ()=>loadImagesForDelete(target, 'albumImagesGrid'));
        };
        window.addImagesToStore = async () => {
            const target = document.getElementById('addToStoreSelect').value;
            const urlsText = document.getElementById('storeUrls').value;
            const urls = urlsText.split('\n').filter(u=>u.trim());
            if(!target) return showToast('اختر قسم المتجر');
            if(urls.length===0) return showToast('أدخل روابط المنتجات');
            await addImagesToTarget(target, urls, 'storeUrls', ()=>loadImagesForDelete(target, 'storeImagesGrid'));
        };
    }

    // دوال الحفظ العامة
    function saveGeneral() {
        db.ref(DB_PATH).update({
            site_name: document.getElementById('siteName').value,
            whatsapp_num: document.getElementById('whatsappNum').value,
            about_text: document.getElementById('aboutText').value,
            footer_text: document.getElementById('footerText').value,
            location_url: document.getElementById('locationUrl').value,
            insta_url: document.getElementById('instaUrl').value,
            tiktok_url: document.getElementById('tiktokUrl').value,
            snap_url: document.getElementById('snapUrl').value
        }).then(()=>showToast('تم حفظ الإعدادات العامة'));
    }
    function saveSchedule() {
        let sched={};
        for(let i=0;i<=6;i++){
            sched[i]={ active:document.getElementById(`dayActive_${i}`).checked, s1_s:document.getElementById(`s1s_${i}`).value, s1_e:document.getElementById(`s1e_${i}`).value, s2_a:document.getElementById(`s2a_${i}`).checked, s2_s:document.getElementById(`s2s_${i}`).value, s2_e:document.getElementById(`s2e_${i}`).value };
        }
        db.ref(DB_PATH+'/work_schedule').set(sched).then(()=>showToast('تم حفظ أوقات العمل'));
    }
    function savePopupSettings() {
        db.ref(DB_PATH).update({ popup_enabled: document.getElementById('popupEnabled').checked, popup_message: document.getElementById('popupMessage').value, popup_duration: parseInt(document.getElementById('popupDuration').value)||8 }).then(()=>showToast('تم حفظ الفقاعة'));
    }
    function saveMaintenance() {
        const active=document.getElementById('maintenanceMode').checked;
        let until=null;
        if(active){
            let h=parseInt(document.getElementById('hoursInput').value)||0, m=parseInt(document.getElementById('minutesInput').value)||0, s=parseInt(document.getElementById('secondsInput').value)||0;
            let total=(h*3600+m*60+s)*1000;
            if(total>0) until=Date.now()+total;
        }
        db.ref(DB_PATH).update({ maintenance_mode: active, maintenance_title: document.getElementById('maintenanceTitle').value, maintenance_message: document.getElementById('maintenanceMsg').value, maintenance_until: until }).then(()=>showToast('تم حفظ إعدادات الصيانة'));
    }
    function saveSplashSettings() {
        db.ref(DB_PATH).update({
            splash_enabled: document.getElementById('splashEnabled').checked,
            splash_show_skip: document.getElementById('splashShowSkip').checked,
            splash_type: document.getElementById('splashType').value,
            splash_media_url: document.getElementById('splashMediaUrl').value,
            splash_video_url: document.getElementById('splashVideoUrl').value,
            splash_duration: parseInt(document.getElementById('splashDuration').value)||5
        }).then(()=>showToast('تم حفظ إعدادات شاشة البداية'));
    }

    window.saveGeneral = saveGeneral;
    window.saveSchedule = saveSchedule;
    window.savePopupSettings = savePopupSettings;
    window.saveMaintenance = saveMaintenance;
    window.saveSplashSettings = saveSplashSettings;
    window.deleteImage = deleteImage;
    window.toggleCollapse = toggleCollapse;
    window.login = login;
    window.logout = logout;
</script>
</body>
</html>

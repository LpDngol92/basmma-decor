<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>لوحة إدارة بصمة غير | تحكم كامل</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/CsmG3G7r/1.png">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f4f6f9;
            color: #1e293b;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* تسجيل الدخول */
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 450px;
            margin: 80px auto;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-card h2 {
            color: #c9a96e;
            margin-bottom: 20px;
        }
        .login-card input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 1rem;
        }
        .login-card button {
            background: #c9a96e;
            color: white;
            border: none;
            padding: 12px 24px;
            width: 100%;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .login-card button:hover { background: #a47e44; transform: translateY(-2px); }
        /* لوحة التحكم الرئيسية */
        .admin-header {
            background: white;
            border-radius: 28px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .admin-header h1 {
            font-size: 1.6rem;
            color: #c9a96e;
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
        }
        /* شبكة الأقسام */
        .dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .section-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 1px solid #eef2f6;
        }
        .section-header {
            background: #fef9f0;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid #e9e2d8;
            font-weight: 700;
            font-size: 1.1rem;
            color: #a47e44;
        }
        .section-header i { margin-left: 8px; }
        .section-content {
            padding: 24px;
            display: none;
        }
        /* قوائم العناصر */
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .item-row {
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #e9ecef;
        }
        .item-row input, .item-row textarea {
            flex: 1;
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid #ddd;
            font-family: inherit;
        }
        .item-row textarea {
            border-radius: 20px;
            min-width: 200px;
        }
        .btn-sm {
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            background: #c9a96e;
            color: white;
            border: none;
            cursor: pointer;
        }
        .btn-danger { background: #dc3545; }
        .btn-success { background: #28a745; }
        /* رفع الصور */
        .upload-area {
            border: 2px dashed #c9a96e;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            background: #fefaf5;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .image-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .image-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        .image-card button {
            width: 100%;
            border-radius: 0;
            padding: 6px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            display: none;
            z-index: 9999;
        }
        hr { margin: 20px 0; }
        @media (max-width: 700px) {
            .item-row { flex-direction: column; align-items: stretch; }
            .admin-header { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card" id="loginBox">
        <h2>🔐 دخول المدير</h2>
        <input type="password" id="adminPass" placeholder="كلمة المرور">
        <button onclick="login()">تسجيل الدخول</button>
    </div>
    <div id="adminPanel" style="display:none;">
        <div class="admin-header">
            <h1>⚙️ لوحة تحكم بصمة غير</h1>
            <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
        </div>
        <div class="dashboard-grid" id="dashboardSections"></div>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let loggedIn = false;
    let openSections = {}; // لتذكر الوضع المفتوح

    function showToast(msg) {
        const t = document.getElementById('toastMsg');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    function login() {
        const pwd = document.getElementById('adminPass').value;
        db.ref(DB_PATH + '/in').once('value').then(snap => {
            if (snap.val() && snap.val().toString() === pwd) {
                loggedIn = true;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadData();
            } else showToast('كلمة المرور غير صحيحة');
        });
    }
    function logout() {
        loggedIn = false;
        document.getElementById('loginBox').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
        currentData = {};
    }
    function loadData() {
        db.ref(DB_PATH).on('value', snap => {
            currentData = snap.val() || {};
            buildDashboard();
        });
    }

    // دوال رفع الملفات
    async function uploadFile(file, folder = 'images') {
        const ext = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substr(2,6)}.${ext}`;
        const ref = storage.ref(`${folder}/${fileName}`);
        await ref.put(file);
        return await ref.getDownloadURL();
    }
    async function uploadMultiple(files, folder, callback) {
        let urls = [];
        for (let i=0; i<files.length; i++) {
            urls.push(await uploadFile(files[i], folder));
            if (callback) callback(i+1, files.length);
        }
        return urls;
    }
    async function addImagesToTarget(target, files) {
        if (!target) return showToast('اختر الوجهة');
        if (!files.length) return showToast('اختر صوراً');
        showToast(`جاري رفع ${files.length} صورة...`);
        const urls = await uploadMultiple(files, 'images', (done,total) => {
            const prog = document.getElementById(`progress_${target.replace(/\//g,'_')}`);
            if (prog) prog.style.width = `${(done/total)*100}%`;
        });
        const promises = urls.map(url => db.ref(DB_PATH + '/' + target + '/imgs').push({ url }));
        await Promise.all(promises);
        showToast(`تم نشر ${urls.length} صورة`);
        loadData(); // تحديث الواجهة
    }
    async function deleteImageFromTarget(target, imgId) {
        await db.ref(DB_PATH + '/' + target + '/imgs/' + imgId).remove();
        showToast('تم الحذف');
        loadData();
    }

    // بناء واجهة الإدارة الديناميكية
    function buildDashboard() {
        const container = document.getElementById('dashboardSections');
        if (!container) return;

        const sections = [
            { id: 'general', title: '⚙️ الإعدادات العامة', icon: 'fa-cog' },
            { id: 'about', title: '📖 من نحن', icon: 'fa-info-circle' },
            { id: 'social', title: '🔗 روابط التواصل', icon: 'fa-share-alt' },
            { id: 'schedule', title: '🕒 أوقات العمل', icon: 'fa-clock' },
            { id: 'maintenance', title: '🛡️ وضع الصيانة', icon: 'fa-shield-alt' },
            { id: 'store_categories', title: '🛍️ أقسام المتجر', icon: 'fa-store' },
            { id: 'albums', title: '📷 أعمالنا (ألبومات)', icon: 'fa-images' },
            { id: 'catalogs', title: '📚 الكتالوجات', icon: 'fa-book-open' },
            { id: 'partners', title: '🤝 شركاء النجاح', icon: 'fa-handshake' },
            { id: 'reviews', title: '⭐ التقييمات', icon: 'fa-star' }
        ];

        let html = '';
        sections.forEach(sec => {
            const isOpen = openSections[sec.id] === true;
            html += `
                <div class="section-card" data-section="${sec.id}">
                    <div class="section-header" onclick="toggleSection('${sec.id}')">
                        <span><i class="fas ${sec.icon}"></i> ${sec.title}</span>
                        <span>${isOpen ? '▲' : '▼'}</span>
                    </div>
                    <div class="section-content" id="content_${sec.id}" style="display: ${isOpen ? 'block' : 'none'}">
                        <div id="dynamic_${sec.id}">جاري التحميل...</div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;

        // ملء المحتوى ديناميكياً
        fillGeneral();
        fillAbout();
        fillSocial();
        fillSchedule();
        fillMaintenance();
        fillStoreCategories();
        fillAlbums();
        fillCatalogs();
        fillPartners();
        fillReviews();
    }

    function toggleSection(id) {
        const contentDiv = document.getElementById(`content_${id}`);
        if (!contentDiv) return;
        const isOpen = contentDiv.style.display === 'block';
        contentDiv.style.display = isOpen ? 'none' : 'block';
        openSections[id] = !isOpen;
        // تحديث السهم
        const header = document.querySelector(`.section-card[data-section="${id}"] .section-header span:last-child`);
        if (header) header.innerHTML = !isOpen ? '▲' : '▼';
    }

    // ========== دوال ملء كل قسم ==========
    function fillGeneral() {
        const d = currentData;
        const container = document.getElementById('dynamic_general');
        container.innerHTML = `
            <input type="text" id="site_name" placeholder="اسم الموقع" value="${(d.site_name || '').replace(/"/g, '&quot;')}" style="width:100%; margin-bottom:12px;">
            <input type="text" id="whatsapp_num" placeholder="رقم واتساب (بدون +)" value="${d.whatsapp_num || ''}" style="width:100%; margin-bottom:12px;">
            <input type="text" id="location_url" placeholder="رابط الموقع على الخريطة" value="${(d.location_url || '').replace(/"/g, '&quot;')}" style="width:100%; margin-bottom:12px;">
            <input type="text" id="footer_text" placeholder="نص حقوق الملكية" value="${(d.footer_text || '').replace(/"/g, '&quot;')}" style="width:100%; margin-bottom:12px;">
            <button class="btn-sm" onclick="saveGeneral()">حفظ الإعدادات</button>
        `;
    }
    function fillAbout() {
        const d = currentData;
        const container = document.getElementById('dynamic_about');
        container.innerHTML = `
            <textarea id="about_text" rows="4" style="width:100%; margin-bottom:12px; border-radius:20px; padding:12px;">${(d.about_text || '').replace(/"/g, '&quot;')}</textarea>
            <label><input type="checkbox" id="about_active" ${d.about_active !== false ? 'checked' : ''}> تفعيل القسم</label><br><br>
            <button class="btn-sm" onclick="saveAbout()">حفظ من نحن</button>
        `;
    }
    function fillSocial() {
        const d = currentData;
        const container = document.getElementById('dynamic_social');
        container.innerHTML = `
            <input type="text" id="insta" placeholder="انستقرام" value="${(d.insta_url || '').replace(/"/g, '&quot;')}" style="width:100%; margin-bottom:12px;">
            <input type="text" id="tiktok" placeholder="تيك توك" value="${(d.tiktok_url || '').replace(/"/g, '&quot;')}" style="width:100%; margin-bottom:12px;">
            <input type="text" id="snap" placeholder="سناب شات" value="${(d.snap_url || '').replace(/"/g, '&quot;')}" style="width:100%; margin-bottom:12px;">
            <button class="btn-sm" onclick="saveSocial()">حفظ الروابط</button>
        `;
    }
    function fillSchedule() {
        const d = currentData;
        let html = '<div id="scheduleEditor">';
        const days = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
        for (let i=0; i<=6; i++) {
            const s = d.work_schedule?.[i] || { active: false, s1_s: '09:00', s1_e: '17:00', s2_a: false };
            html += `<div style="border:1px solid #e2e8f0; padding:12px; margin-bottom:12px; border-radius:20px;">
                        <label><input type="checkbox" id="dayActive_${i}" ${s.active ? 'checked' : ''}> ${days[i]}</label>
                        <div><input type="time" id="s1s_${i}" value="${s.s1_s}"> — <input type="time" id="s1e_${i}" value="${s.s1_e}"></div>
                        <label><input type="checkbox" id="s2a_${i}" ${s.s2_a ? 'checked' : ''}> فترة مسائية</label>
                        <div id="evening_${i}" style="${s.s2_a ? '' : 'display:none'}; margin-top:6px;">
                            <input type="time" id="s2s_${i}" value="${s.s2_s || ''}"> — <input type="time" id="s2e_${i}" value="${s.s2_e || ''}">
                        </div>
                    </div>`;
        }
        html += `<button class="btn-sm" onclick="saveSchedule()">حفظ المواعيد</button></div>`;
        const container = document.getElementById('dynamic_schedule');
        container.innerHTML = html;
        for (let i=0; i<=6; i++) {
            const cb = document.getElementById(`s2a_${i}`);
            if (cb) cb.onchange = () => document.getElementById(`evening_${i}`).style.display = cb.checked ? 'block' : 'none';
        }
    }
    function fillMaintenance() {
        const d = currentData;
        let until = d.maintenance_until || 0;
        let hours = 0, minutes = 0, seconds = 0;
        if (until > Date.now()) {
            let diff = until - Date.now();
            hours = Math.floor(diff / 3600000);
            minutes = Math.floor((diff % 3600000) / 60000);
            seconds = Math.floor((diff % 60000) / 1000);
        }
        const container = document.getElementById('dynamic_maintenance');
        container.innerHTML = `
            <label><input type="checkbox" id="maintenance_active" ${d.maintenance_mode ? 'checked' : ''}> تفعيل وضع الصيانة</label><br><br>
            <input type="text" id="maintenance_title" placeholder="عنوان الصيانة" value="${(d.maintenance_title || '').replace(/"/g,'&quot;')}" style="width:100%; margin-bottom:12px;">
            <textarea id="maintenance_message" rows="2" placeholder="رسالة الصيانة" style="width:100%; margin-bottom:12px;">${(d.maintenance_message || '').replace(/"/g,'&quot;')}</textarea>
            <div style="display:flex; gap:10px; margin:15px 0;">
                <input type="number" id="m_hours" placeholder="ساعات" value="${hours}">
                <input type="number" id="m_minutes" placeholder="دقائق" value="${minutes}">
                <input type="number" id="m_seconds" placeholder="ثواني" value="${seconds}">
            </div>
            <button class="btn-sm" onclick="saveMaintenanceSettings()">حفظ إعدادات الصيانة</button>
        `;
    }

    // أقسام المتجر (store_categories)
    function fillStoreCategories() {
        const container = document.getElementById('dynamic_store_categories');
        if (!container) return;
        let cats = currentData.store_categories || {};
        let html = '<div class="items-list" id="storeCatsList">';
        Object.keys(cats).forEach(id => {
            html += `<div class="item-row" data-id="${id}">
                        <input type="text" value="${cats[id].name.replace(/"/g,'&quot;')}" class="cat-name" style="flex:2;">
                        <button class="btn-sm btn-danger" onclick="deleteStoreCategory('${id}')">حذف</button>
                    </div>`;
            // عرض الصور داخل هذا القسم مع زر حذف لكل صورة
            if (cats[id].imgs) {
                html += `<div style="margin-right:30px; margin-bottom:15px;" class="image-grid" id="images_cat_${id}">`;
                Object.keys(cats[id].imgs).forEach(imgId => {
                    html += `<div class="image-card"><img src="${cats[id].imgs[imgId].url}"><button class="btn-sm btn-danger" onclick="deleteImageFromTarget('store_categories/${id}','${imgId}')">حذف الصورة</button></div>`;
                });
                html += `</div>`;
            }
            // زر لرفع صور جديدة لهذا القسم
            html += `<div style="margin-right:30px; margin-bottom:20px;">
                        <input type="file" multiple accept="image/*" id="files_cat_${id}" style="display:none;" onchange="uploadImagesToStoreCategory('${id}', this.files)">
                        <button class="btn-sm btn-success" onclick="document.getElementById('files_cat_${id}').click()">➕ رفع صور للقسم</button>
                        <div class="progress-bar" style="width:100%; background:#eee; height:4px; margin-top:5px;"><div id="progress_cat_${id}" style="width:0%; height:100%; background:#28a745;"></div></div>
                    </div>`;
        });
        html += `</div><div style="margin-top:15px;"><input type="text" id="newCatName" placeholder="اسم القسم الجديد"><button class="btn-sm btn-success" onclick="addStoreCategory()">إضافة قسم</button></div>`;
        container.innerHTML = html;
    }

    // الألبومات (أعمالنا)
    function fillAlbums() {
        const container = document.getElementById('dynamic_albums');
        if (!container) return;
        let albums = currentData.albums || {};
        let html = '<div class="items-list" id="albumsList">';
        Object.keys(albums).forEach(id => {
            html += `<div class="item-row" data-id="${id}">
                        <input type="text" value="${albums[id].name.replace(/"/g,'&quot;')}" class="album-name" style="flex:2;">
                        <button class="btn-sm btn-danger" onclick="deleteAlbum('${id}')">حذف</button>
                    </div>`;
            if (albums[id].imgs) {
                html += `<div style="margin-right:30px; margin-bottom:15px;" class="image-grid" id="images_album_${id}">`;
                Object.keys(albums[id].imgs).forEach(imgId => {
                    html += `<div class="image-card"><img src="${albums[id].imgs[imgId].url}"><button class="btn-sm btn-danger" onclick="deleteImageFromTarget('albums/${id}','${imgId}')">حذف</button></div>`;
                });
                html += `</div>`;
            }
            html += `<div style="margin-right:30px; margin-bottom:20px;">
                        <input type="file" multiple accept="image/*" id="files_album_${id}" style="display:none;" onchange="uploadImagesToAlbum('${id}', this.files)">
                        <button class="btn-sm btn-success" onclick="document.getElementById('files_album_${id}').click()">📸 رفع صور للألبوم</button>
                        <div class="progress-bar" style="width:100%; background:#eee; height:4px; margin-top:5px;"><div id="progress_album_${id}" style="width:0%; height:100%; background:#28a745;"></div></div>
                    </div>`;
        });
        html += `</div><div style="margin-top:15px;"><input type="text" id="newAlbumName" placeholder="اسم الألبوم الجديد"><button class="btn-sm btn-success" onclick="addAlbum()">إضافة ألبوم</button></div>`;
        container.innerHTML = html;
    }

    // الكتالوجات
    function fillCatalogs() {
        const container = document.getElementById('dynamic_catalogs');
        let catalogs = currentData.catalogs || {};
        let html = '<div class="items-list" id="catalogsList">';
        Object.keys(catalogs).forEach(id => {
            html += `<div class="item-row" data-id="${id}">
                        <input type="text" value="${catalogs[id].name.replace(/"/g,'&quot;')}" class="catalog-name" placeholder="الاسم">
                        <textarea class="catalog-code" rows="1" placeholder="كود iFrame" style="flex:2;">${(catalogs[id].code || '').replace(/"/g,'&quot;')}</textarea>
                        <button class="btn-sm btn-danger" onclick="deleteCatalog('${id}')">حذف</button>
                    </div>`;
        });
        html += `</div><div style="margin-top:15px;"><input type="text" id="newCatalogName" placeholder="اسم الكتالوج"><textarea id="newCatalogCode" rows="2" placeholder="كود iFrame"></textarea><button class="btn-sm btn-success" onclick="addCatalog()">إضافة كتالوج</button></div>`;
        container.innerHTML = html;
    }

    // الشركاء
    function fillPartners() {
        const container = document.getElementById('dynamic_partners');
        let partners = currentData.partners || {};
        let html = '<div class="items-list" id="partnersList">';
        Object.keys(partners).forEach(id => {
            html += `<div class="item-row" data-id="${id}">
                        <img src="${partners[id].url}" style="width:50px; height:50px; object-fit:contain; border-radius:12px;">
                        <input type="text" value="${partners[id].url.replace(/"/g,'&quot;')}" class="partner-url" placeholder="رابط الصورة" style="flex:2;">
                        <input type="text" value="${(partners[id].link || '').replace(/"/g,'&quot;')}" class="partner-link" placeholder="الرابط (اختياري)">
                        <button class="btn-sm btn-danger" onclick="deletePartner('${id}')">حذف</button>
                    </div>`;
        });
        html += `</div><div style="margin-top:15px;"><input type="text" id="newPartnerUrl" placeholder="رابط الشعار"><input type="text" id="newPartnerLink" placeholder="الرابط"><button class="btn-sm btn-success" onclick="addPartner()">إضافة شريك</button></div>`;
        container.innerHTML = html;
    }

    // التقييمات
    function fillReviews() {
        const container = document.getElementById('dynamic_reviews');
        let reviews = currentData.reviews || {};
        let html = '<div class="items-list">';
        Object.keys(reviews).forEach(id => {
            html += `<div class="item-row" style="flex-direction:column; align-items:stretch;">
                        <div><strong>${reviews[id].name}</strong> ${'★'.repeat(reviews[id].rating)}</div>
                        <p>${reviews[id].message}</p>
                        <button class="btn-sm btn-danger" onclick="deleteReview('${id}')">حذف التقييم</button>
                    </div>`;
        });
        html += `</div>`;
        container.innerHTML = html;
    }

    // ========== دوال الحفظ ==========
    window.saveGeneral = () => {
        db.ref(DB_PATH).update({
            site_name: document.getElementById('site_name').value,
            whatsapp_num: document.getElementById('whatsapp_num').value,
            location_url: document.getElementById('location_url').value,
            footer_text: document.getElementById('footer_text').value
        }).then(() => showToast('تم حفظ الإعدادات العامة'));
    };
    window.saveAbout = () => {
        db.ref(DB_PATH).update({
            about_text: document.getElementById('about_text').value,
            about_active: document.getElementById('about_active').checked
        }).then(() => showToast('تم حفظ من نحن'));
    };
    window.saveSocial = () => {
        db.ref(DB_PATH).update({
            insta_url: document.getElementById('insta').value,
            tiktok_url: document.getElementById('tiktok').value,
            snap_url: document.getElementById('snap').value
        }).then(() => showToast('تم حفظ روابط التواصل'));
    };
    window.saveSchedule = () => {
        let schedule = {};
        for (let i=0; i<=6; i++) {
            schedule[i] = {
                active: document.getElementById(`dayActive_${i}`).checked,
                s1_s: document.getElementById(`s1s_${i}`).value,
                s1_e: document.getElementById(`s1e_${i}`).value,
                s2_a: document.getElementById(`s2a_${i}`).checked,
                s2_s: document.getElementById(`s2s_${i}`).value,
                s2_e: document.getElementById(`s2e_${i}`).value
            };
        }
        db.ref(DB_PATH + '/work_schedule').set(schedule).then(() => showToast('تم حفظ أوقات العمل'));
    };
    window.saveMaintenanceSettings = () => {
        const active = document.getElementById('maintenance_active').checked;
        const title = document.getElementById('maintenance_title').value;
        const msg = document.getElementById('maintenance_message').value;
        let until = null;
        if (active) {
            let hours = parseInt(document.getElementById('m_hours').value) || 0;
            let minutes = parseInt(document.getElementById('m_minutes').value) || 0;
            let seconds = parseInt(document.getElementById('m_seconds').value) || 0;
            let totalMs = (hours*3600 + minutes*60 + seconds) * 1000;
            if (totalMs > 0) until = Date.now() + totalMs;
        }
        db.ref(DB_PATH).update({
            maintenance_mode: active,
            maintenance_title: title,
            maintenance_message: msg,
            maintenance_until: until
        }).then(() => showToast('تم حفظ إعدادات الصيانة'));
    };

    // دوال إدارة أقسام المتجر
    window.addStoreCategory = async () => {
        const name = document.getElementById('newCatName').value.trim();
        if (!name) return showToast('أدخل اسم القسم');
        const newRef = db.ref(DB_PATH + '/store_categories').push();
        await newRef.set({ name });
        showToast('تمت إضافة القسم');
        loadData();
    };
    window.deleteStoreCategory = async (id) => {
        if (confirm('هل أنت متأكد؟ سيتم حذف القسم وجميع صوره')) {
            await db.ref(DB_PATH + '/store_categories/' + id).remove();
            showToast('تم الحذف');
            loadData();
        }
    };
    window.uploadImagesToStoreCategory = async (id, files) => {
        if (!files.length) return;
        const target = `store_categories/${id}`;
        const urls = [];
        for (let i=0; i<files.length; i++) {
            const url = await uploadFile(files[i], 'products');
            urls.push(url);
            const prog = document.getElementById(`progress_cat_${id}`);
            if (prog) prog.style.width = `${((i+1)/files.length)*100}%`;
        }
        const updates = urls.map(url => ({ url }));
        for (let img of updates) {
            await db.ref(DB_PATH + '/' + target + '/imgs').push(img);
        }
        showToast(`تم رفع ${urls.length} صورة`);
        loadData();
    };

    // إدارة الألبومات
    window.addAlbum = async () => {
        const name = document.getElementById('newAlbumName').value.trim();
        if (!name) return showToast('أدخل اسم الألبوم');
        const newRef = db.ref(DB_PATH + '/albums').push();
        await newRef.set({ name });
        showToast('تمت إضافة الألبوم');
        loadData();
    };
    window.deleteAlbum = async (id) => {
        if (confirm('هل أنت متأكد؟ سيتم حذف الألبوم وجميع صوره')) {
            await db.ref(DB_PATH + '/albums/' + id).remove();
            showToast('تم الحذف');
            loadData();
        }
    };
    window.uploadImagesToAlbum = async (id, files) => {
        if (!files.length) return;
        const target = `albums/${id}`;
        for (let i=0; i<files.length; i++) {
            const url = await uploadFile(files[i], 'albums');
            await db.ref(DB_PATH + '/' + target + '/imgs').push({ url });
            const prog = document.getElementById(`progress_album_${id}`);
            if (prog) prog.style.width = `${((i+1)/files.length)*100}%`;
        }
        showToast(`تم رفع ${files.length} صورة`);
        loadData();
    };

    // الكتالوجات
    window.addCatalog = async () => {
        const name = document.getElementById('newCatalogName').value.trim();
        const code = document.getElementById('newCatalogCode').value.trim();
        if (!name || !code) return showToast('أدخل الاسم والكود');
        await db.ref(DB_PATH + '/catalogs').push({ name, code });
        showToast('تمت إضافة الكتالوج');
        loadData();
    };
    window.deleteCatalog = async (id) => {
        await db.ref(DB_PATH + '/catalogs/' + id).remove();
        showToast('تم الحذف');
        loadData();
    };

    // الشركاء
    window.addPartner = async () => {
        const url = document.getElementById('newPartnerUrl').value.trim();
        const link = document.getElementById('newPartnerLink').value.trim();
        if (!url) return showToast('أدخل رابط الشعار');
        await db.ref(DB_PATH + '/partners').push({ url, link: link || null });
        showToast('تمت إضافة الشريك');
        loadData();
    };
    window.deletePartner = async (id) => {
        await db.ref(DB_PATH + '/partners/' + id).remove();
        showToast('تم الحذف');
        loadData();
    };

    // التقييمات
    window.deleteReview = async (id) => {
        await db.ref(DB_PATH + '/reviews/' + id).remove();
        showToast('تم حذف التقييم');
        loadData();
    };

    window.deleteImageFromTarget = deleteImageFromTarget;

    window.toggleSection = toggleSection;
    window.login = login;
    window.logout = logout;
</script>
</body>
</html>

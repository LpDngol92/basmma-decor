<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة إدارة بصمة غير | تحكم كامل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #f5f3f0; padding: 20px; color: #2d2a2a; }
        .container { max-width: 1200px; margin: 0 auto; }
        .login-box, .admin-panel { background: white; border-radius: 32px; padding: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-top: 30px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .admin-header h1 { color: #b88b4a; font-size: 1.6rem; }
        button, .btn { background: #d4af7a; color: white; padding: 10px 18px; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { transform: translateY(-2px); opacity: 0.95; }
        .btn-red { background: #dc3545; }
        .btn-green { background: #28a745; }
        .btn-gold { background: #b88b4a; }
        .logout-btn { background: #dc3545; width: auto; padding: 8px 22px; }
        .collapse-section { background: white; border-radius: 24px; margin-bottom: 20px; border: 1px solid #e9e2d8; overflow: hidden; }
        .collapse-btn { background: #fefaf5; display: flex; justify-content: space-between; padding: 16px 22px; font-weight: 700; font-size: 1rem; color: #b88b4a; border-bottom: 1px solid #e9e2d8; cursor: pointer; }
        .collapse-content { display: none; padding: 22px; background: white; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #5a5a5a; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #e0d6cc; border-radius: 20px; font-family: inherit; font-size: 0.9rem; margin-bottom: 8px; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #b88b4a; box-shadow: 0 0 0 2px rgba(184,139,74,0.2); }
        .list-item-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; background: #fefaf5; padding: 12px; border-radius: 20px; border: 1px solid #e9e2d8; flex-wrap: wrap; }
        .list-item-row input { flex: 1; margin: 0; }
        .image-delete-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; margin-top: 15px; }
        .image-delete-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 16px; border: 1px solid #ddd; }
        .urls-textarea { font-family: monospace; height: 100px; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e2a3a; color: white; padding: 10px 24px; border-radius: 50px; z-index: 9999; display: none; font-size: 0.85rem; white-space: nowrap; }
        @media (max-width: 700px) { .toast { white-space: normal; width: 80%; text-align: center; } .list-item-row { flex-direction: column; align-items: stretch; } .list-item-row input { margin-bottom: 8px; } }
        hr { margin: 15px 0; border-color: #e9e2d8; }
        .checkbox-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-box" id="loginBox">
        <h2 style="text-align:center;">🔐 لوحة التحكم</h2>
        <input type="email" id="adminEmail" placeholder="البريد الإلكتروني" style="margin-bottom:10px;">
        <input type="password" id="adminPasswordAuth" placeholder="كلمة المرور">
        <button onclick="loginWithAuth()">دخول</button>
    </div>
    <div id="adminPanel" style="display:none;">
        <div class="admin-header">
            <h1>⚙️ تحكم كامل بالموقع</h1>
            <button onclick="logoutAuth()" class="logout-btn">خروج</button>
        </div>
        <div id="adminSections"></div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let loggedIn = false;
    let openSections = {};

    function showToast(msg) { const t=document.getElementById('toast'); t.innerText=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
    
    function loginWithAuth() {
        const email = document.getElementById('adminEmail').value;
        const pwd = document.getElementById('adminPasswordAuth').value;
        auth.signInWithEmailAndPassword(email, pwd)
            .then(() => {
                loggedIn = true;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadData();
            })
            .catch(err => showToast('خطأ في الدخول: ' + err.message));
    }
    
    function logoutAuth() {
        auth.signOut().then(() => {
            loggedIn = false;
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            currentData = {};
            openSections = {};
        });
    }
    
    function loadData() {
        db.ref(DB_PATH).on('value', snap => { 
            currentData = snap.val() || {}; 
            buildAdmin(); 
            restoreOpen(); 
        });
    }
    
    function toggleCollapse(btn,id) { const content=btn.nextElementSibling; const isOpen=content.style.display==='block'; content.style.display=isOpen?'none':'block'; openSections[id]=!isOpen; btn.querySelector('span').innerHTML=isOpen?'▾':'▴'; }
    function restoreOpen() { document.querySelectorAll('.collapse-section').forEach(s=>{ const id=s.dataset.sectionId; if(openSections[id]){ s.querySelector('.collapse-content').style.display='block'; s.querySelector('.collapse-btn span').innerHTML='▴'; } }); }

    // ========== إدارة الصور ==========
    async function addImagesToTarget(target, urlsArray, clearTextareaId) {
        if(!target || urlsArray.length===0) return showToast('اختر الوجهة وأدخل روابط صالحة');
        const unique = [...new Set(urlsArray)];
        if(unique.length !== urlsArray.length) showToast('تمت إزالة الروابط المكررة تلقائياً');
        const promises = unique.map(url => db.ref(DB_PATH+'/'+target+'/imgs').push({ url }));
        await Promise.all(promises);
        showToast(`✅ تمت إضافة ${unique.length} صورة بنجاح`);
        if(clearTextareaId) document.getElementById(clearTextareaId).value = '';
        loadData();
    }

    window.deleteImage = function(path, imgId, gridId) {
        db.ref(`${DB_PATH}/${path}/imgs/${imgId}`).remove().then(()=>{
            showToast('🗑️ تم حذف الصورة');
            loadData();
        }).catch(e=>showToast('خطأ في الحذف: '+e.message));
    }

    function loadImagesForDelete(path, gridId) {
        const grid = document.getElementById(gridId);
        if(!grid) return;
        const [type, id] = path.split('/');
        const folder = currentData[type]?.[id];
        if(!folder || !folder.imgs) { grid.innerHTML='<p class="empty-state">لا توجد صور</p>'; return; }
        grid.innerHTML = Object.keys(folder.imgs).map(imgId=>`
            <div style="text-align:center;">
                <img src="${folder.imgs[imgId].url}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:12px;">
                <button class="btn-red" style="margin-top:4px; padding:4px 8px; font-size:0.75rem;" onclick="deleteImage('${path}','${imgId}','${gridId}')">حذف</button>
            </div>
        `).join('');
    }

    async function deleteSection(type, id, name) {
        if(!confirm(`⚠️ هل أنت متأكد من حذف "${name}" بالكامل؟ سيتم حذف جميع الصور المرتبطة به.`)) return;
        try { await db.ref(DB_PATH+'/'+type+'/'+id).remove(); showToast(`✅ تم حذف "${name}" بنجاح`); loadData(); } 
        catch(e) { showToast('❌ فشل الحذف: '+e.message); }
    }

    // ========== دوال الحفظ العامة ==========
    window.saveGeneral = function() {
        db.ref(DB_PATH).update({
            site_name: document.getElementById('siteName').value,
            whatsapp_num: document.getElementById('whatsappNum').value,
            about_text: document.getElementById('aboutText').value,
            footer_text: document.getElementById('footerText').value,
            location_url: document.getElementById('locationUrl').value,
            insta_url: document.getElementById('instaUrl').value,
            tiktok_url: document.getElementById('tiktokUrl').value,
            snap_url: document.getElementById('snapUrl').value
        }).then(()=>{ showToast('تم حفظ الإعدادات العامة'); loadData(); });
    };
    window.saveSchedule = function() {
        let sched={};
        for(let i=0;i<=6;i++) sched[i]={ active:document.getElementById(`dayActive_${i}`).checked, s1_s:document.getElementById(`s1s_${i}`).value, s1_e:document.getElementById(`s1e_${i}`).value, s2_a:document.getElementById(`s2a_${i}`).checked, s2_s:document.getElementById(`s2s_${i}`).value, s2_e:document.getElementById(`s2e_${i}`).value };
        db.ref(DB_PATH+'/work_schedule').set(sched).then(()=>{ showToast('تم حفظ أوقات العمل'); loadData(); });
    };
    window.savePopupSettings = function() {
        db.ref(DB_PATH).update({ popup_enabled: document.getElementById('popupEnabled').checked, popup_message: document.getElementById('popupMessage').value, popup_duration: parseInt(document.getElementById('popupDuration').value)||8 }).then(()=>{ showToast('تم حفظ الفقاعة'); loadData(); });
    };
    window.saveMaintenance = function() {
        const active=document.getElementById('maintenanceMode').checked;
        let until=null;
        if(active){
            let h=parseInt(document.getElementById('hoursInput').value)||0, m=parseInt(document.getElementById('minutesInput').value)||0, s=parseInt(document.getElementById('secondsInput').value)||0;
            let total=(h*3600+m*60+s)*1000;
            if(total>0) until=Date.now()+total;
        }
        db.ref(DB_PATH).update({ maintenance_mode: active, maintenance_title: document.getElementById('maintenanceTitle').value, maintenance_message: document.getElementById('maintenanceMsg').value, maintenance_until: until }).then(()=>{ showToast('تم حفظ إعدادات الصيانة'); loadData(); });
    };
    window.saveSplashSettings = function() {
        db.ref(DB_PATH).update({
            splash_enabled: document.getElementById('splashEnabled').checked,
            splash_show_skip: document.getElementById('splashShowSkip').checked,
            splash_type: document.getElementById('splashType').value,
            splash_media_url: document.getElementById('splashMediaUrl').value,
            splash_video_url: document.getElementById('splashVideoUrl').value,
            splash_duration: parseInt(document.getElementById('splashDuration').value)||5
        }).then(()=>{ showToast('تم حفظ إعدادات شاشة البداية'); loadData(); });
    };

    // دوال الإضافة والتحديث
    window.addAlbumNow = () => {
        const name = document.getElementById('newAlbumName').value.trim();
        if(!name) return showToast('أدخل اسم الألبوم');
        db.ref(DB_PATH+'/albums/'+Date.now()).set({ name }).then(()=>{ showToast('تمت الإضافة'); loadData(); });
        document.getElementById('newAlbumName').value = '';
    };
    window.addStoreCatNow = () => {
        const name = document.getElementById('newStoreCatName').value.trim();
        if(!name) return showToast('أدخل اسم القسم');
        db.ref(DB_PATH+'/store_categories/'+Date.now()).set({ name }).then(()=>{ showToast('تمت الإضافة'); loadData(); });
        document.getElementById('newStoreCatName').value = '';
    };
    window.addCatalogNow = () => {
        const name = document.getElementById('newCatalogName').value.trim();
        const code = document.getElementById('newCatalogCode').value.trim();
        if(!name||!code) return showToast('أدخل الاسم والكود');
        db.ref(DB_PATH+'/catalogs/'+Date.now()).set({ name, code }).then(()=>{ showToast('تمت الإضافة'); loadData(); });
        document.getElementById('newCatalogName').value = ''; document.getElementById('newCatalogCode').value = '';
    };
    window.addPartnerNow = () => {
        const url = document.getElementById('newPartnerUrl').value.trim(); const link = document.getElementById('newPartnerLink').value.trim();
        if(!url) return showToast('أدخل رابط الصورة');
        db.ref(DB_PATH+'/partners/'+Date.now()).set({ url, link: link||null }).then(()=>{ showToast('تمت الإضافة'); loadData(); });
        document.getElementById('newPartnerUrl').value = ''; document.getElementById('newPartnerLink').value = '';
    };
    window.updateAlbumName = (id, newName) => { if(newName) db.ref(DB_PATH+'/albums/'+id+'/name').set(newName).then(()=>{ showToast('تم التحديث'); loadData(); }); };
    window.updateStoreCatName = (id, newName) => { if(newName) db.ref(DB_PATH+'/store_categories/'+id+'/name').set(newName).then(()=>{ showToast('تم التحديث'); loadData(); }); };
    window.updateCatalogName = (id, newName) => { if(newName) db.ref(DB_PATH+'/catalogs/'+id+'/name').set(newName).then(()=>{ showToast('تم التحديث'); loadData(); }); };
    window.updateCatalogCode = (id, newCode) => { db.ref(DB_PATH+'/catalogs/'+id+'/code').set(newCode).then(()=>{ showToast('تم تحديث الكود'); loadData(); }); };
    window.updatePartner = (id, url, link) => { if(url) db.ref(DB_PATH+'/partners/'+id).update({ url, link: link||null }).then(()=>{ showToast('تم التحديث'); loadData(); }); };
    window.deleteReview = (id) => db.ref(DB_PATH+'/reviews/'+id).remove().then(()=>{ showToast('تم حذف التقييم'); loadData(); });
    window.addImagesToAlbum = async () => {
        const target = document.getElementById('addToAlbumSelect').value;
        const urls = document.getElementById('albumUrls').value.split('\n').filter(u=>u.trim());
        if(!target || !urls.length) return showToast('اختر ألبوم وأدخل روابط');
        await addImagesToTarget(target, urls, 'albumUrls');
    };
    window.addImagesToStore = async () => {
        const target = document.getElementById('addToStoreSelect').value;
        const urls = document.getElementById('storeUrls').value.split('\n').filter(u=>u.trim());
        if(!target || !urls.length) return showToast('اختر قسم وأدخل روابط');
        await addImagesToTarget(target, urls, 'storeUrls');
    };
    window.loadImagesForDelete = loadImagesForDelete;
    window.deleteSection = deleteSection;
    window.toggleCollapse = toggleCollapse;

    // بناء الواجهة (بنفس هيكل الكود القديم مع ربط الدوال)
    function buildAdmin() {
        const d = currentData;
        const getAlbumOptions = () => {
            let o = '<option value="">-- اختر ألبوم --</option>';
            if(d.albums) Object.keys(d.albums).forEach(id=>o+=`<option value="albums/${id}">📁 ${(d.albums[id].name||'').replace(/"/g,'&quot;')}</option>`);
            return o;
        };
        const getStoreOptions = () => {
            let o = '<option value="">-- اختر قسم --</option>';
            if(d.store_categories) Object.keys(d.store_categories).forEach(id=>o+=`<option value="store_categories/${id}">🛒 ${(d.store_categories[id].name||'').replace(/"/g,'&quot;')}</option>`);
            return o;
        };
        const scheduleHTML = () => {
            const days = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
            let html='';
            for(let i=0;i<=6;i++){
                const s=d.work_schedule?.[i]||{active:false,s1_s:'09:00',s1_e:'17:00',s2_a:false};
                html+=`<div style="border:1px solid #e9e2d8;border-radius:16px;padding:12px;margin-bottom:12px;">
                        <label><input type="checkbox" id="dayActive_${i}" ${s.active?'checked':''}> ${days[i]}</label>
                        <div class="input-group"><input type="time" id="s1s_${i}" value="${s.s1_s}"> — <input type="time" id="s1e_${i}" value="${s.s1_e}"></div>
                        <label><input type="checkbox" id="s2a_${i}" ${s.s2_a?'checked':''}> فترة مسائية</label>
                        <div id="evening_${i}" style="${s.s2_a?'':'display:none'};margin-top:8px;"><input type="time" id="s2s_${i}" value="${s.s2_s||''}"> — <input type="time" id="s2e_${i}" value="${s.s2_e||''}"></div>
                    </div>`;
            }
            setTimeout(()=>{ for(let i=0;i<=6;i++){ const cb=document.getElementById(`s2a_${i}`); if(cb) cb.onchange=()=>document.getElementById(`evening_${i}`).style.display=cb.checked?'block':'none'; } },100);
            return html;
        };

        const html = `
            <div class="collapse-section" data-section-id="general">
                <button class="collapse-btn" onclick="toggleCollapse(this,'general')">⚙️ الإعدادات العامة والنصوص <span>▾</span></button>
                <div class="collapse-content">
                    <input id="siteName" value="${(d.site_name||'').replace(/"/g,'&quot;')}">
                    <input id="whatsappNum" value="${d.whatsapp_num||''}">
                    <textarea id="aboutText" rows="4">${(d.about_text||'').replace(/"/g,'&quot;')}</textarea>
                    <input id="footerText" value="${(d.footer_text||'').replace(/"/g,'&quot;')}">
                    <input id="locationUrl" value="${(d.location_url||'').replace(/"/g,'&quot;')}">
                    <input id="instaUrl" value="${(d.insta_url||'').replace(/"/g,'&quot;')}">
                    <input id="tiktokUrl" value="${(d.tiktok_url||'').replace(/"/g,'&quot;')}">
                    <input id="snapUrl" value="${(d.snap_url||'').replace(/"/g,'&quot;')}">
                    <button class="btn-gold" onclick="saveGeneral()">حفظ</button>
                </div>
            </div>
            <div class="collapse-section" data-section-id="albums">
                <button class="collapse-btn" onclick="toggleCollapse(this,'albums')">📁 ألبومات أعمالنا <span>▾</span></button>
                <div class="collapse-content">
                    <div id="albumsList"></div>
                    <div style="display:flex; gap:8px; margin:10px 0;"><input id="newAlbumName" placeholder="اسم الألبوم الجديد"><button class="btn-green" onclick="addAlbumNow()">إضافة ألبوم</button></div>
                    <hr>
                    <h4>➕ إضافة صور (روابط)</h4>
                    <select id="addToAlbumSelect">${getAlbumOptions()}</select>
                    <textarea id="albumUrls" class="urls-textarea" placeholder="روابط الصور (كل رابط في سطر)"></textarea>
                    <button class="btn-gold" onclick="addImagesToAlbum()">إضافة صور</button>
                    <hr>
                    <h4 style="color:#dc3545;">🗑️ حذف الصور من الألبوم</h4>
                    <select id="albumDeleteSelect" onchange="loadImagesForDelete(this.value, 'albumDeleteGrid')">${getAlbumOptions()}</select>
                    <div id="albumDeleteGrid" class="image-delete-grid"><p>اختر ألبوم لعرض الصور</p></div>
                </div>
            </div>
            <div class="collapse-section" data-section-id="store">
                <button class="collapse-btn" onclick="toggleCollapse(this,'store')">🛍️ أقسام المتجر <span>▾</span></button>
                <div class="collapse-content">
                    <div id="storeCatsList"></div>
                    <div style="display:flex; gap:8px;"><input id="newStoreCatName" placeholder="اسم القسم الجديد"><button class="btn-green" onclick="addStoreCatNow()">إضافة قسم</button></div>
                    <hr>
                    <h4>➕ إضافة منتجات (روابط)</h4>
                    <select id="addToStoreSelect">${getStoreOptions()}</select>
                    <textarea id="storeUrls" class="urls-textarea" placeholder="روابط المنتجات (كل رابط في سطر)"></textarea>
                    <button class="btn-gold" onclick="addImagesToStore()">إضافة منتجات</button>
                    <hr>
                    <h4 style="color:#dc3545;">🗑️ حذف المنتجات من القسم</h4>
                    <select id="storeDeleteSelect" onchange="loadImagesForDelete(this.value, 'storeDeleteGrid')">${getStoreOptions()}</select>
                    <div id="storeDeleteGrid" class="image-delete-grid"><p>اختر قسم لعرض المنتجات</p></div>
                </div>
            </div>
            <div class="collapse-section" data-section-id="catalogs">
                <button class="collapse-btn" onclick="toggleCollapse(this,'catalogs')">📚 الكتالوجات <span>▾</span></button>
                <div class="collapse-content"><div id="catalogsList"></div><div><input id="newCatalogName" placeholder="اسم الكتالوج"><textarea id="newCatalogCode" rows="3" placeholder="كود iFrame"></textarea><button class="btn-green" onclick="addCatalogNow()">إضافة كتالوج</button></div></div>
            </div>
            <div class="collapse-section" data-section-id="partners">
                <button class="collapse-btn" onclick="toggleCollapse(this,'partners')">🤝 شركاء النجاح <span>▾</span></button>
                <div class="collapse-content"><div id="partnersList"></div><div style="display:flex; gap:8px;"><input id="newPartnerUrl" placeholder="رابط الصورة"><input id="newPartnerLink" placeholder="الرابط (اختياري)"><button class="btn-green" onclick="addPartnerNow()">إضافة شريك</button></div></div>
            </div>
            <div class="collapse-section" data-section-id="schedule">
                <button class="collapse-btn" onclick="toggleCollapse(this,'schedule')">🕒 أوقات العمل <span>▾</span></button>
                <div class="collapse-content">${scheduleHTML()}<button class="btn-gold" onclick="saveSchedule()">حفظ</button></div>
            </div>
            <div class="collapse-section" data-section-id="reviews">
                <button class="collapse-btn" onclick="toggleCollapse(this,'reviews')">⭐ التقييمات <span>▾</span></button>
                <div class="collapse-content"><div id="reviewsList"></div></div>
            </div>
            <div class="collapse-section" data-section-id="splash">
                <button class="collapse-btn" onclick="toggleCollapse(this,'splash')">🎬 شاشة البداية (Splash) <span>▾</span></button>
                <div class="collapse-content">
                    <div class="checkbox-row"><input type="checkbox" id="splashEnabled" ${d.splash_enabled!==false?'checked':''}> <label>تفعيل</label></div>
                    <div class="checkbox-row"><input type="checkbox" id="splashShowSkip" ${d.splash_show_skip===true?'checked':''}> <label>إظهار زر "تخطي"</label></div>
                    <select id="splashType"><option value="image" ${d.splash_type==='image'?'selected':''}>صورة ثابتة</option><option value="gif" ${d.splash_type==='gif'?'selected':''}>GIF</option><option value="video" ${d.splash_type==='video'?'selected':''}>فيديو</option></select>
                    <input id="splashMediaUrl" value="${(d.splash_media_url||'').replace(/"/g,'&quot;')}">
                    <input id="splashVideoUrl" value="${(d.splash_video_url||'').replace(/"/g,'&quot;')}">
                    <input id="splashDuration" type="number" value="${d.splash_duration||5}">
                    <button class="btn-gold" onclick="saveSplashSettings()">حفظ</button>
                </div>
            </div>
            <div class="collapse-section" data-section-id="popup">
                <button class="collapse-btn" onclick="toggleCollapse(this,'popup')">💬 فقاعة الترحيب <span>▾</span></button>
                <div class="collapse-content">
                    <div class="checkbox-row"><input type="checkbox" id="popupEnabled" ${d.popup_enabled?'checked':''}> <label>تفعيل</label></div>
                    <input id="popupMessage" value="${(d.popup_message||'').replace(/"/g,'&quot;')}">
                    <input id="popupDuration" type="number" value="${d.popup_duration||8}">
                    <button class="btn-gold" onclick="savePopupSettings()">حفظ</button>
                </div>
            </div>
            <div class="collapse-section" data-section-id="maintenance">
                <button class="collapse-btn" onclick="toggleCollapse(this,'maintenance')">🛡️ وضع الصيانة <span>▾</span></button>
                <div class="collapse-content">
                    <div class="checkbox-row"><input type="checkbox" id="maintenanceMode" ${d.maintenance_mode?'checked':''}> <label>تفعيل</label></div>
                    <input id="maintenanceTitle" value="${(d.maintenance_title||'').replace(/"/g,'&quot;')}">
                    <textarea id="maintenanceMsg" rows="2">${(d.maintenance_message||'').replace(/"/g,'&quot;')}</textarea>
                    <div style="display:flex; gap:10px;"><input type="number" id="hoursInput" placeholder="ساعات" value="0"><input type="number" id="minutesInput" placeholder="دقائق" value="0"><input type="number" id="secondsInput" placeholder="ثواني" value="0"></div>
                    <button class="btn-gold" onclick="saveMaintenance()">حفظ</button>
                </div>
            </div>
        `;
        document.getElementById('adminSections').innerHTML = html;

        // عرض القوائم
        if(d.albums){
            document.getElementById('albumsList').innerHTML = Object.keys(d.albums).map(id=>`
                <div class="list-item-row"><input type="text" value="${(d.albums[id].name||'').replace(/"/g,'&quot;')}" class="album-name-${id}" style="flex:2;"><button class="btn-gold" onclick="updateAlbumName('${id}', this.previousElementSibling.value)">تحديث</button><button class="btn-red" onclick="deleteSection('albums','${id}','${(d.albums[id].name||'').replace(/"/g,'&quot;')}')">حذف الألبوم</button></div>
            `).join('');
        }
        if(d.store_categories){
            document.getElementById('storeCatsList').innerHTML = Object.keys(d.store_categories).map(id=>`
                <div class="list-item-row"><input type="text" value="${(d.store_categories[id].name||'').replace(/"/g,'&quot;')}" class="storecat-name-${id}" style="flex:2;"><button class="btn-gold" onclick="updateStoreCatName('${id}', this.previousElementSibling.value)">تحديث</button><button class="btn-red" onclick="deleteSection('store_categories','${id}','${(d.store_categories[id].name||'').replace(/"/g,'&quot;')}')">حذف القسم</button></div>
            `).join('');
        }
        if(d.catalogs){
            document.getElementById('catalogsList').innerHTML = Object.keys(d.catalogs).map(id=>`
                <div style="border:1px solid #e9e2d8; border-radius:20px; padding:12px; margin-bottom:12px;">
                    <div class="list-item-row"><input type="text" value="${(d.catalogs[id].name||'').replace(/"/g,'&quot;')}" class="catalog-name-${id}" style="flex:2;"><button class="btn-gold" onclick="updateCatalogName('${id}', this.previousElementSibling.value)">تحديث</button><button class="btn-red" onclick="deleteSection('catalogs','${id}','${(d.catalogs[id].name||'').replace(/"/g,'&quot;')}')">حذف الكتالوج</button></div>
                    <textarea class="catalog-code-${id}" rows="2" style="width:100%;">${(d.catalogs[id].code||'').replace(/"/g,'&quot;')}</textarea>
                    <button class="btn-gold" style="margin-top:8px;" onclick="updateCatalogCode('${id}', document.querySelector('.catalog-code-${id}').value)">تحديث الكود</button>
                </div>
            `).join('');
        }
        if(d.partners){
            document.getElementById('partnersList').innerHTML = Object.keys(d.partners).map(id=>`
                <div class="list-item-row"><input type="text" value="${(d.partners[id].url||'').replace(/"/g,'&quot;')}" class="partner-url-${id}" placeholder="رابط الصورة" style="flex:2;"><input type="text" value="${(d.partners[id].link||'').replace(/"/g,'&quot;')}" class="partner-link-${id}" placeholder="الرابط" style="flex:1;"><button class="btn-gold" onclick="updatePartner('${id}', document.querySelector('.partner-url-${id}').value, document.querySelector('.partner-link-${id}').value)">تحديث</button><button class="btn-red" onclick="deleteSection('partners','${id}','')">حذف</button></div>
            `).join('');
        }
        if(d.reviews){
            document.getElementById('reviewsList').innerHTML = Object.keys(d.reviews).map(id=>`
                <div style="border-bottom:1px solid #eee; padding:8px;"><b>${d.reviews[id].name}</b> ${'★'.repeat(d.reviews[id].rating)}<p>${d.reviews[id].message}</p><button class="btn-red" onclick="deleteReview('${id}')">حذف التقييم</button></div>
            `).join('');
        }
    }
</script>
</body>
</html>

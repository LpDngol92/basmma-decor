<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بصمة غير - لوحة تحكم كاملة بقوائم منسدلة + إضافة جماعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #f0f2f5; padding: 15px; }
        .login-container { max-width: 400px; margin: 80px auto; background: white; border-radius: 24px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .login-container input { width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ddd; border-radius: 12px; }
        .login-container button { width: 100%; padding: 12px; background: #b88b4a; color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
        
        .admin-container { max-width: 1100px; margin: 0 auto; }
        .header { background: white; border-radius: 16px; padding: 15px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header h1 { color: #b88b4a; font-size: 1.2rem; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 14px; padding: 12px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .stat-card i { font-size: 24px; color: #b88b4a; }
        .stat-card h3 { font-size: 22px; }
        
        /* قوائم منسدلة رئيسية */
        .master-dropdown { margin-bottom: 12px; background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .master-header { background: #b88b4a; color: white; padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 600; font-size: 1rem; }
        .master-header:hover { background: #9e6f38; }
        .master-content { padding: 16px; display: none; background: #fff; border-top: 1px solid #f0e0cc; }
        
        /* قوائم منسدلة داخلية (للألبومات وأقسام المتجر) */
        .nested-dropdown { margin-bottom: 12px; border: 1px solid #eee; border-radius: 12px; overflow: hidden; }
        .nested-header { background: #f8f9fa; padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 600; color: #2c3e2f; }
        .nested-header:hover { background: #f0e6d8; }
        .nested-content { padding: 14px; display: none; background: #fefcf8; border-top: 1px solid #eee; }
        
        /* شبكة الصور */
        .images-grid { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0; }
        .image-card { position: relative; width: 80px; height: 80px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; background: white; }
        .image-card img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .delete-img-btn { position: absolute; top: 2px; right: 2px; background: #dc3545; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2; }
        
        /* عامودي */
        .vertical-group { display: flex; flex-direction: column; gap: 12px; }
        .vertical-group input, .vertical-group textarea, .vertical-group button { width: 100%; }
        
        .link-card { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 12px; padding: 14px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; }
        .link-card input, .link-card textarea { width: 100%; margin: 0; }
        .link-card button { align-self: flex-start; }
        
        .add-box { background: #fef8e7; border: 1px dashed #b88b4a; border-radius: 12px; padding: 15px; margin: 15px 0; display: flex; flex-direction: column; gap: 10px; }
        .add-box textarea { width: 100%; min-height: 120px; font-family: monospace; direction: ltr; }
        
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; }
        button { background: #b88b4a; color: white; padding: 8px 16px; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; margin: 4px; }
        .btn-red { background: #dc3545; }
        .btn-red:hover { background: #bb2d3b; }
        hr { margin: 15px 0; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 40px; display: none; z-index: 9999; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; cursor: pointer; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 16px; }
        .lightbox .close { position: absolute; top: 20px; left: 30px; color: white; font-size: 40px; cursor: pointer; }
        .bulk-textarea { font-family: monospace; font-size: 13px; direction: ltr; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .checkbox-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-container">
    <h2 style="margin-bottom:20px;">🔐 دخول لوحة التحكم</h2>
    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
    <input type="password" id="loginPassword" placeholder="كلمة المرور">
    <button onclick="doLogin()">دخول</button>
</div>

<div id="adminPanel" style="display:none;">
    <div class="admin-container">
        <div class="header">
            <h1>⚙️ بصمة غير - قوائم منسدلة + إضافة جماعية</h1>
            <button onclick="doLogout()" class="btn-red">🚪 خروج</button>
        </div>
        <div class="stats-grid" id="statsContainer"></div>
        <div id="dynamicDropdownsContainer"></div>
    </div>
</div>

<div id="toastMsg" class="toast"></div>
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="close">&times;</span>
    <img id="lightboxImg" src="">
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const DB_PATH = 'site_v28';

    let currentData = {};

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.backgroundColor = isError ? '#dc3545' : '#28a745';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    function openLightbox(url) { document.getElementById('lightboxImg').src = url; document.getElementById('lightbox').style.display = 'flex'; }
    function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

    window.doLogin = function() {
        auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)
            .then(() => { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('adminPanel').style.display = 'block'; loadData(); })
            .catch(err => showToast('خطأ: ' + err.message, true));
    };
    window.doLogout = function() { auth.signOut().then(() => location.reload()); };
    auth.onAuthStateChanged(user => { if(user) { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('adminPanel').style.display = 'block'; loadData(); } });

    function loadData() {
        db.ref(DB_PATH).once('value', (snap) => {
            currentData = snap.val() || {};
            renderStats();
            renderDashboard();
        }).catch(err => showToast('خطأ: ' + err.message, true));
    }

    function renderStats() {
        document.getElementById('statsContainer').innerHTML = `
            <div class="stat-card"><i class="fas fa-folder"></i><h3>${Object.keys(currentData.albums || {}).length}</h3><p>الألبومات</p></div>
            <div class="stat-card"><i class="fas fa-store"></i><h3>${Object.keys(currentData.store_categories || {}).length}</h3><p>المتجر</p></div>
            <div class="stat-card"><i class="fas fa-link"></i><h3>${(currentData.social_links || []).length}</h3><p>روابط إضافية</p></div>
        `;
    }

    function renderDashboard() {
        const sections = [
            { id: 'general', title: '⚙️ الإعدادات العامة', icon: 'fas fa-cog', render: renderGeneral },
            { id: 'slider', title: '🏠 السلايدر', icon: 'fas fa-images', render: renderSlider },
            { id: 'splash', title: '🎬 شاشة البداية', icon: 'fas fa-film', render: renderSplash },
            { id: 'albums', title: '📁 الألبومات (قوائم منسدلة لكل ألبوم)', icon: 'fas fa-folder-open', render: renderAlbums },
            { id: 'store', title: '🛍️ المتجر (قوائم منسدلة لكل قسم)', icon: 'fas fa-store', render: renderStore },
            { id: 'social', title: '🔗 الروابط الاجتماعية (أساسية + إضافية)', icon: 'fas fa-link', render: renderSocialLinks },
            { id: 'partners', title: '🤝 الشركاء', icon: 'fas fa-handshake', render: renderPartners },
            { id: 'catalogs', title: '📚 الكتالوجات', icon: 'fas fa-book', render: renderCatalogs },
            { id: 'schedule', title: '🕒 أوقات العمل', icon: 'fas fa-clock', render: renderSchedule },
            { id: 'popup', title: '💬 فقاعة الترحيب', icon: 'fas fa-comment', render: renderPopup },
            { id: 'maintenance', title: '🛡️ وضع الصيانة', icon: 'fas fa-shield-alt', render: renderMaintenance },
            { id: 'chat', title: '💬 إعدادات الدردشة', icon: 'fas fa-comments', render: renderChat }
        ];
        let html = '';
        sections.forEach(sec => {
            html += `<div class="master-dropdown"><div class="master-header" onclick="toggleMaster('${sec.id}')"><span><i class="${sec.icon}"></i> ${sec.title}</span><span>▼</span></div><div class="master-content" id="content-${sec.id}"></div></div>`;
        });
        document.getElementById('dynamicDropdownsContainer').innerHTML = html;
        sections.forEach(sec => sec.render());
    }
    window.toggleMaster = function(id) { const el = document.getElementById(`content-${id}`); el.style.display = el.style.display === 'block' ? 'none' : 'block'; };
    window.toggleNested = function(id) { const el = document.getElementById(`nested-${id}`); if(el) el.style.display = el.style.display === 'block' ? 'none' : 'block'; };

    // ========== 1. الإعدادات العامة ==========
    function renderGeneral() {
        const d = currentData;
        document.getElementById('content-general').innerHTML = `
            <div class="vertical-group">
                <input id="siteName" placeholder="اسم الموقع" value="${(d.site_name || '').replace(/"/g, '&quot;')}">
                <input id="whatsappNum" placeholder="رقم الواتساب" value="${d.whatsapp_num || ''}">
                <textarea id="aboutText" rows="3" placeholder="نص من نحن">${(d.about_text || '').replace(/"/g, '&quot;')}</textarea>
                <input id="footerText" placeholder="نص التذييل" value="${(d.footer_text || '').replace(/"/g, '&quot;')}">
                <input id="locationUrl" placeholder="رابط الموقع (خرائط)" value="${(d.location_url || '').replace(/"/g, '&quot;')}">
                <button onclick="saveGeneral()">💾 حفظ</button>
            </div>
        `;
    }
    window.saveGeneral = function() {
        db.ref(DB_PATH).update({
            site_name: document.getElementById('siteName').value,
            whatsapp_num: document.getElementById('whatsappNum').value,
            about_text: document.getElementById('aboutText').value,
            footer_text: document.getElementById('footerText').value,
            location_url: document.getElementById('locationUrl').value
        }).then(() => showToast('تم الحفظ'));
    };

    // ========== 2. السلايدر ==========
    function renderSlider() {
        const slider = currentData.home_slider || { enabled: false, title: '', duration: 5, images: [] };
        let imagesHtml = '';
        (slider.images || []).forEach((img, idx) => {
            imagesHtml += `<div class="image-card"><img src="${img.url}" onclick="openLightbox('${img.url}')"><span class="delete-img-btn" onclick="event.stopPropagation(); removeSliderImage(${idx})">✖</span></div>`;
        });
        document.getElementById('content-slider').innerHTML = `
            <div class="vertical-group">
                <div class="checkbox-row"><input type="checkbox" id="sliderEnabled" ${slider.enabled ? 'checked' : ''}> <label>تفعيل السلايدر</label></div>
                <input id="sliderTitle" placeholder="العنوان" value="${(slider.title || '').replace(/"/g, '&quot;')}">
                <input type="number" id="sliderDuration" placeholder="مدة العرض (ثانية)" value="${slider.duration}">
                <div class="images-grid">${imagesHtml || 'لا توجد صور'}</div>
                <input type="text" id="newSliderImage" placeholder="رابط صورة مفردة">
                <button onclick="addSliderImage()">➕ إضافة صورة مفردة</button>
                <hr>
                <label><strong>إضافة عدة صور دفعة واحدة (كل رابط في سطر)</strong></label>
                <textarea id="bulkSliderImages" rows="6" class="bulk-textarea" placeholder="https://example.com/1.jpg\nhttps://example.com/2.jpg"></textarea>
                <button onclick="addBulkSliderImages()">➕ إضافة جميع الصور دفعة واحدة</button>
                <button onclick="saveSlider()">💾 حفظ السلايدر</button>
            </div>
        `;
    }
    window.addSliderImage = function() {
        const url = document.getElementById('newSliderImage').value.trim();
        if(!url) { showToast('أدخل رابط الصورة', true); return; }
        const images = [...(currentData.home_slider?.images || []), { url }];
        db.ref(`${DB_PATH}/home_slider/images`).set(images).then(() => loadData());
        document.getElementById('newSliderImage').value = '';
    };
    window.addBulkSliderImages = function() {
        const text = document.getElementById('bulkSliderImages').value;
        if(!text.trim()) { showToast('أدخل روابط الصور', true); return; }
        const lines = text.split(/\r?\n/);
        const newImages = [];
        for(let line of lines) {
            let url = line.trim();
            if(url && (url.startsWith('http') || url.startsWith('https'))) newImages.push({ url });
        }
        if(newImages.length === 0) { showToast('لا توجد روابط صالحة', true); return; }
        const current = currentData.home_slider?.images || [];
        const all = [...current, ...newImages];
        db.ref(`${DB_PATH}/home_slider/images`).set(all).then(() => { loadData(); showToast(`تم إضافة ${newImages.length} صورة`); });
        document.getElementById('bulkSliderImages').value = '';
    };
    window.removeSliderImage = function(idx) {
        const images = [...(currentData.home_slider?.images || [])];
        images.splice(idx, 1);
        db.ref(`${DB_PATH}/home_slider/images`).set(images).then(() => loadData());
    };
    window.saveSlider = function() {
        db.ref(`${DB_PATH}/home_slider`).set({
            enabled: document.getElementById('sliderEnabled').checked,
            title: document.getElementById('sliderTitle').value,
            duration: parseInt(document.getElementById('sliderDuration').value) || 5,
            images: currentData.home_slider?.images || []
        }).then(() => showToast('تم الحفظ'));
    };

    // ========== 3. شاشة البداية ==========
    function renderSplash() {
        const items = currentData.splash_items || [];
        let itemsHtml = '';
        items.forEach((item, idx) => {
            itemsHtml += `<div class="image-card"><img src="${item.url}" onclick="openLightbox('${item.url}')"><span class="delete-img-btn" onclick="event.stopPropagation(); removeSplashItem(${idx})">✖</span></div>`;
        });
        document.getElementById('content-splash').innerHTML = `
            <div class="vertical-group">
                <div class="checkbox-row"><input type="checkbox" id="splashEnabled" ${currentData.splash_enabled !== false ? 'checked' : ''}> <label>تفعيل شاشة البداية</label></div>
                <div class="checkbox-row"><input type="checkbox" id="splashShowSkip" ${currentData.splash_show_skip === true ? 'checked' : ''}> <label>إظهار زر تخطي</label></div>
                <input type="number" id="splashDuration" placeholder="مدة العرض (ثانية)" value="${currentData.splash_duration || 5}">
                <div class="images-grid">${itemsHtml || 'لا توجد عناصر'}</div>
                <input type="text" id="newSplashItem" placeholder="رابط صورة أو فيديو مفرد">
                <button onclick="addSplashItem()">➕ إضافة مفرد</button>
                <hr>
                <label><strong>إضافة عدة عناصر دفعة واحدة (كل رابط في سطر)</strong></label>
                <textarea id="bulkSplashItems" rows="6" class="bulk-textarea" placeholder="https://example.com/1.jpg\nhttps://example.com/video.mp4"></textarea>
                <button onclick="addBulkSplashItems()">➕ إضافة الكل دفعة واحدة</button>
                <button onclick="saveSplash()">💾 حفظ</button>
            </div>
        `;
    }
    window.addSplashItem = function() {
        const url = document.getElementById('newSplashItem').value.trim();
        if(!url) { showToast('أدخل رابط', true); return; }
        const items = currentData.splash_items || [];
        const isVideo = /\.(mp4|webm|mov|ogg|mkv)$/i.test(url);
        items.push({ url, type: isVideo ? 'video' : 'image' });
        db.ref(`${DB_PATH}/splash_items`).set(items).then(() => loadData());
        document.getElementById('newSplashItem').value = '';
    };
    window.addBulkSplashItems = function() {
        const text = document.getElementById('bulkSplashItems').value;
        if(!text.trim()) { showToast('أدخل الروابط', true); return; }
        const lines = text.split(/\r?\n/);
        const newItems = [];
        for(let line of lines) {
            let url = line.trim();
            if(url && (url.startsWith('http') || url.startsWith('https'))) {
                const isVideo = /\.(mp4|webm|mov|ogg|mkv)$/i.test(url);
                newItems.push({ url, type: isVideo ? 'video' : 'image' });
            }
        }
        if(newItems.length === 0) { showToast('لا توجد روابط صالحة', true); return; }
        const current = currentData.splash_items || [];
        const all = [...current, ...newItems];
        db.ref(`${DB_PATH}/splash_items`).set(all).then(() => { loadData(); showToast(`تم إضافة ${newItems.length} عنصر`); });
        document.getElementById('bulkSplashItems').value = '';
    };
    window.removeSplashItem = function(idx) {
        const items = currentData.splash_items || [];
        items.splice(idx, 1);
        db.ref(`${DB_PATH}/splash_items`).set(items).then(() => loadData());
    };
    window.saveSplash = function() {
        db.ref(DB_PATH).update({
            splash_enabled: document.getElementById('splashEnabled').checked,
            splash_show_skip: document.getElementById('splashShowSkip').checked,
            splash_duration: parseInt(document.getElementById('splashDuration').value) || 5
        }).then(() => showToast('تم الحفظ'));
    };

    // ========== 4. الألبومات (قوائم منسدلة لكل ألبوم) ==========
    function renderAlbums() {
        const albums = currentData.albums || {};
        let html = `<div id="albumsNestedContainer"></div><hr><div class="vertical-group"><input id="newAlbumName" placeholder="اسم الألبوم الجديد"><button onclick="addAlbum()">➕ ألبوم جديد</button></div>`;
        document.getElementById('content-albums').innerHTML = html;
        const container = document.getElementById('albumsNestedContainer');
        container.innerHTML = '';
        Object.keys(albums).forEach(albumId => {
            const album = albums[albumId];
            const div = document.createElement('div');
            div.className = 'nested-dropdown';
            div.innerHTML = `
                <div class="nested-header" onclick="toggleNested('album_${albumId}')">
                    <span><i class="fas fa-folder"></i> ${(album.name || 'ألبوم').replace(/"/g, '&quot;')}</span>
                    <span>▼</span>
                </div>
                <div class="nested-content" id="nested-album_${albumId}">
                    <div class="vertical-group">
                        <input type="text" id="albumName_${albumId}" value="${(album.name || '').replace(/"/g, '&quot;')}" placeholder="اسم الألبوم">
                        <button onclick="updateAlbumName('${albumId}')">تحديث الاسم</button>
                        <button class="btn-red" onclick="deleteAlbum('${albumId}')">حذف الألبوم</button>
                        <hr>
                        <div class="images-grid" id="albumImgs_${albumId}"></div>
                        <input type="text" id="albumImgUrl_${albumId}" placeholder="رابط صورة مفردة">
                        <button onclick="addImageToAlbum('${albumId}')">➕ إضافة صورة مفردة</button>
                        <label><strong>إضافة عدة صور دفعة واحدة (كل رابط في سطر)</strong></label>
                        <textarea id="bulkAlbumImgs_${albumId}" rows="6" class="bulk-textarea" placeholder="https://example.com/1.jpg\nhttps://example.com/2.jpg"></textarea>
                        <button onclick="addBulkImagesToAlbum('${albumId}')">➕ إضافة جميع الصور دفعة واحدة</button>
                    </div>
                </div>
            `;
            container.appendChild(div);
            const imgsGrid = document.getElementById(`albumImgs_${albumId}`);
            if(imgsGrid && album.imgs) {
                Object.keys(album.imgs).forEach(imgId => {
                    const card = document.createElement('div'); card.className = 'image-card';
                    card.innerHTML = `<img src="${album.imgs[imgId].url}" onclick="openLightbox('${album.imgs[imgId].url}')"><span class="delete-img-btn" onclick="event.stopPropagation(); deleteImageFromAlbum('${albumId}','${imgId}')">✖</span>`;
                    imgsGrid.appendChild(card);
                });
            }
        });
    }
    window.addAlbum = function() { const name = document.getElementById('newAlbumName').value.trim(); if(!name) return; db.ref(`${DB_PATH}/albums/${Date.now()}`).set({ name, imgs: {} }).then(() => loadData()); document.getElementById('newAlbumName').value = ''; };
    window.updateAlbumName = function(id) { db.ref(`${DB_PATH}/albums/${id}/name`).set(document.getElementById(`albumName_${id}`).value).then(() => showToast('تم التحديث')); };
    window.deleteAlbum = function(id) { if(confirm('حذف الألبوم؟')) db.ref(`${DB_PATH}/albums/${id}`).remove().then(() => loadData()); };
    window.addImageToAlbum = function(albumId) { const url = document.getElementById(`albumImgUrl_${albumId}`).value.trim(); if(!url) return; db.ref(`${DB_PATH}/albums/${albumId}/imgs`).push({ url }).then(() => loadData()); document.getElementById(`albumImgUrl_${albumId}`).value = ''; };
    window.addBulkImagesToAlbum = function(albumId) {

    // ========== 5. المتجر (قوائم منسدلة لكل قسم) ==========
    function renderStore() {
        const cats = currentData.store_categories || {};
        let html = `<div id="storeNestedContainer"></div><hr><div class="vertical-group"><input id="newCatName" placeholder="اسم القسم الجديد"><button onclick="addStoreCat()">➕ إضافة قسم</button></div>`;
        document.getElementById('content-store').innerHTML = html;
        const container = document.getElementById('storeNestedContainer');
        container.innerHTML = '';
        Object.keys(cats).forEach(catId => {
            const cat = cats[catId];
            const div = document.createElement('div');
            div.className = 'nested-dropdown';
            div.innerHTML = `
                <div class="nested-header" onclick="toggleNested('store_${catId}')">
                    <span><i class="fas fa-tag"></i> ${(cat.name || 'قسم').replace(/"/g, '&quot;')}</span>
                    <span>▼</span>
                </div>
                <div class="nested-content" id="nested-store_${catId}">
                    <div class="vertical-group">
                        <input type="text" id="catName_${catId}" value="${(cat.name || '').replace(/"/g, '&quot;')}" placeholder="اسم القسم">
                        <button onclick="updateStoreCat('${catId}')">تحديث</button>
                        <button class="btn-red" onclick="deleteStoreCat('${catId}')">حذف القسم</button>
                        <hr>
                        <div class="images-grid" id="catImgs_${catId}"></div>
                        <input type="text" id="catImgUrl_${catId}" placeholder="رابط منتج مفرد">
                        <button onclick="addStoreProduct('${catId}')">➕ إضافة منتج مفرد</button>
                        <label><strong>إضافة عدة منتجات دفعة واحدة (كل رابط في سطر)</strong></label>
                        <textarea id="bulkStoreImgs_${catId}" rows="6" class="bulk-textarea" placeholder="https://example.com/product1.jpg\nhttps://example.com/product2.jpg"></textarea>
                        <button onclick="addBulkStoreProducts('${catId}')">➕ إضافة جميع المنتجات دفعة واحدة</button>
                    </div>
                </div>
            `;
            container.appendChild(div);
            const imgsGrid = document.getElementById(`catImgs_${catId}`);
            if(imgsGrid && cat.imgs) {
                Object.keys(cat.imgs).forEach(imgId => {
                    const card = document.createElement('div'); card.className = 'image-card';
                    card.innerHTML = `<img src="${cat.imgs[imgId].url}" onclick="openLightbox('${cat.imgs[imgId].url}')"><span class="delete-img-btn" onclick="event.stopPropagation(); deleteStoreProduct('${catId}','${imgId}')">✖</span>`;
                    imgsGrid.appendChild(card);
                });
            }
        });
    }
    window.addStoreCat = function() { const name = document.getElementById('newCatName').value.trim(); if(!name) return; db.ref(`${DB_PATH}/store_categories/${Date.now()}`).set({ name, imgs: {} }).then(() => loadData()); document.getElementById('newCatName').value = ''; };
    window.updateStoreCat = function(id) { db.ref(`${DB_PATH}/store_categories/${id}/name`).set(document.getElementById(`catName_${id}`).value).then(() => showToast('تم التحديث')); };
    window.deleteStoreCat = function(id) { if(confirm('حذف القسم؟')) db.ref(`${DB_PATH}/store_categories/${id}`).remove().then(() => loadData()); };
    window.addStoreProduct = function(catId) { const url = document.getElementById(`catImgUrl_${catId}`).value.trim(); if(!url) return; db.ref(`${DB_PATH}/store_categories/${catId}/imgs`).push({ url }).then(() => loadData()); document.getElementById(`catImgUrl_${catId}`).value = ''; };
    window.addBulkStoreProducts = function(catId) {
        const text = document.getElementById(`bulkStoreImgs_${catId}`).value;
        if(!text.trim()) { showToast('أدخل روابط المنتجات', true); return; }
        const lines = text.split(/\r?\n/);
        const updates = {};
        let count = 0;
        for(let line of lines) {
            let url = line.trim();
            if(url && (url.startsWith('http') || url.startsWith('https'))) {
                const newKey = Date.now() + '_' + count;
                updates[`${DB_PATH}/store_categories/${catId}/imgs/${newKey}`] = { url };
                count++;
            }
        }
        if(count === 0) { showToast('لا توجد روابط صالحة', true); return; }

    // ========== 6. الروابط الاجتماعية ==========
    function renderSocialLinks() {
        const d = currentData;
        document.getElementById('content-social').innerHTML = `
            <div class="vertical-group">
                <label>الروابط الأساسية:</label>
                <input id="instaUrl" placeholder="انستقرام" value="${(d.insta_url || '').replace(/"/g, '&quot;')}">
                <input id="tiktokUrl" placeholder="تيك توك" value="${(d.tiktok_url || '').replace(/"/g, '&quot;')}">
                <input id="snapUrl" placeholder="سناب شات" value="${(d.snap_url || '').replace(/"/g, '&quot;')}">
                <hr>
                <label>روابط إضافية (كل رابط بسطر):</label>
                <div id="extraLinksList"></div>
                <textarea id="bulkExtraLinks" rows="6" class="bulk-textarea" placeholder="المنصة|الرابط\nفيسبوك|https://facebook.com/..."></textarea>
                <button onclick="addBulkExtraLinks()">➕ إضافة روابط إضافية دفعة واحدة</button>
                <button onclick="saveAllSocial()">💾 حفظ الكل</button>
            </div>
        `;
        renderExtraLinks();
    }
    function renderExtraLinks() {
        const links = currentData.social_links || [];
        const container = document.getElementById('extraLinksList');
        if(!container) return;
        container.innerHTML = '';
        links.forEach((link, idx) => {
            const div = document.createElement('div');
            div.className = 'link-card';
            div.innerHTML = `
                <input type="text" id="extra_plat_${idx}" value="${(link.platform || '').replace(/"/g, '&quot;')}" placeholder="المنصة">
                <input type="text" id="extra_url_${idx}" value="${(link.url || '').replace(/"/g, '&quot;')}" placeholder="الرابط" dir="ltr">
                <button class="btn-red" onclick="removeExtraLink(${idx})">✖ حذف</button>
            `;
            container.appendChild(div);
        });
    }
    window.addBulkExtraLinks = function() {
        const text = document.getElementById('bulkExtraLinks').value;
        if(!text.trim()) { showToast('أدخل الروابط', true); return; }
        const lines = text.split(/\r?\n/);
        const newLinks = [];
        for(let line of lines) {
            line = line.trim();
            if(!line) continue;
            const parts = line.split('|');
            if(parts.length >= 2) {
                newLinks.push({ platform: parts[0].trim(), url: parts.slice(1).join('|').trim() });
            } else if(line.startsWith('http')) {
                newLinks.push({ platform: 'رابط', url: line });
            }
        }
        if(newLinks.length === 0) { showToast('لم يتم العثور على روابط صالحة', true); return; }
        const current = currentData.social_links || [];
        const all = [...current, ...newLinks];
        db.ref(`${DB_PATH}/social_links`).set(all).then(() => loadData());
        document.getElementById('bulkExtraLinks').value = '';
    };
    window.removeExtraLink = function(idx) {
        const current = currentData.social_links || [];
        current.splice(idx, 1);
        db.ref(`${DB_PATH}/social_links`).set(current).then(() => loadData());
    };
    window.saveAllSocial = function() {
        const newLinks = [];
        const items = document.querySelectorAll('#extraLinksList .link-card');
        for(let i=0; i<items.length; i++) {
            const plat = document.getElementById(`extra_plat_${i}`);
            const url = document.getElementById(`extra_url_${i}`);
            if(plat && url && plat.value.trim()) newLinks.push({ platform: plat.value.trim(), url: url.value.trim() });
        }
        const updates = {
            insta_url: document.getElementById('instaUrl').value,
            tiktok_url: document.getElementById('tiktokUrl').value,
            snap_url: document.getElementById('snapUrl').value,
            social_links: newLinks
        };
        db.ref(DB_PATH).update(updates).then(() => { showToast('تم حفظ جميع الروابط'); loadData(); });
    };

    // ========== 7. الشركاء ==========
    function renderPartners() {
        const partners = currentData.partners || {};
        let rowsHtml = '';
        Object.keys(partners).forEach(pid => {
            const p = partners[pid];
            rowsHtml += `
                <div class="link-card">
                    <img src="${p.url}" style="width:60px;height:60px;object-fit:cover;border-radius:10px;align-self:center;">
                    <input type="text" id="partnerUrl_${pid}" value="${(p.url || '').replace(/"/g, '&quot;')}" placeholder="رابط الصورة" dir="ltr">
                    <input type="text" id="partnerLink_${pid}" value="${(p.link || '').replace(/"/g, '&quot;')}" placeholder="الرابط (اختياري)" dir="ltr">
                    <button class="btn-red" onclick="deletePartner('${pid}')">✖ حذف</button>
                </div>
            `;
        });
        document.getElementById('content-partners').innerHTML = `
            <div id="partnersList">${rowsHtml || '<div style="padding:20px;text-align:center;color:#999;">لا يوجد شركاء</div>'}</div>
            <div class="add-box">
                <label><strong>إضافة شركاء دفعة واحدة (كل سطر: رابط_الصورة|الرابط_الاختياري)</strong></label>
                <textarea id="bulkPartners" rows="6" class="bulk-textarea" placeholder="https://example.com/logo1.png|https://site1.com\nhttps://example.com/logo2.png"></textarea>
                <button onclick="addBulkPartners()">➕ إضافة جميع الشركاء دفعة واحدة</button>
            </div>
            <div class="flex-row"><input id="newPartnerUrl" placeholder="رابط صورة مفرد" style="flex:2"><input id="newPartnerLink" placeholder="الرابط (اختياري)" style="flex:1"><button onclick="addPartner()">➕ إضافة شريك مفرد</button></div>
            <button onclick="saveAllPartners()" style="margin-top:15px;">💾 حفظ الكل</button>
        `;
    }
    window.addBulkPartners = function() {
        const text = document.getElementById('bulkPartners').value;
        if(!text.trim()) { showToast('أدخل بيانات الشركاء', true); return; }
        const lines = text.split(/\r?\n/);
        const updates = {};
        let count = 0;
        for(let line of lines) {
            line = line.trim();
            if(!line) continue;
            const parts = line.split('|');
            const imgUrl = parts[0].trim();
            if(!imgUrl || !imgUrl.startsWith('http')) continue;
            const linkUrl = parts.length > 1 ? parts[1].trim() : null;
            updates[`${DB_PATH}/partners/${Date.now()}_${count}`] = { url: imgUrl, link: linkUrl };
            count++;
        }
        if(count === 0) { showToast('لا توجد روابط صالحة', true); return; }
        db.ref().update(updates).then(() => { loadData(); showToast(`تمت إضافة ${count} شريك`); });
        document.getElementById('bulkPartners').value = '';
    };
    window.addPartner = function() {
        const url = document.getElementById('newPartnerUrl').value.trim();
        if(!url) { showToast('أدخل رابط الصورة', true); return; }
        const link = document.getElementById('newPartnerLink').value.trim();
        db.ref(`${DB_PATH}/partners/${Date.now()}`).set({ url, link: link || null }).then(() => loadData());
        document.getElementById('newPartnerUrl').value = '';
        document.getElementById('newPartnerLink').value = '';
    };
    window.deletePartner = function(id) { if(confirm('حذف الشريك؟')) db.ref(`${DB_PATH}/partners/${id}`).remove().then(() => loadData()); };
    window.saveAllPartners = function() { loadData(); showToast('تم الحفظ'); };

            const c = catalogs[id];

        document.getElementById('content-catalogs').innerHTML = html + `
            <hr>
            <div class="add-box">
                <input type="text" id="newCatalogName" placeholder="اسم الكتالوج الجديد">
                <textarea id="newCatalogCode" rows="4" placeholder="كود HTML"></textarea>
                <button onclick="addCatalog()">➕ إضافة كتالوج</button>

    window.addCatalog = function() { const n=document.getElementById('newCatalogName').value; const c=document.getElementById('newCatalogCode').value; if(!n) return; db.ref(`${DB_PATH}/catalogs/${Date.now()}`).set({name:n, code:c}).then(()=>loadData()); };
    window.updateCatalogName = function(id) { db.ref(`${DB_PATH}/catalogs/${id}/name`).set(document.getElementById(`catalogName_${id}`).value).then(()=>showToast('تم التحديث')); };
    window.updateCatalogCode = function(id) { db.ref(`${DB_PATH}/catalogs/${id}/code`).set(document.getElementById(`catalogCode_${id}`).value).then(()=>showToast('تم التحديث')); };
    window.deleteCatalog = function(id) { if(confirm('حذف الكتالوج؟')) db.ref(`${DB_PATH}/catalogs/${id}`).remove().then(()=>loadData()); };

    // ========== 9. أوقات العمل ==========
    function renderSchedule() {
        const sched = currentData.work_schedule || {};
        let html = '';
        const days = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        for(let i=0; i<=6; i++) {
            const d = sched[i] || { active: false, s1_s: '09:00', s1_e: '17:00', s2_a: false, s2_s: '', s2_e: '' };
            html += `<div style="border:1px solid #eee; border-radius:12px; padding:12px; margin-bottom:12px;">
                        <div class="vertical-group">
                            <div class="checkbox-row"><input type="checkbox" id="dayActive_${i}" ${d.active ? 'checked' : ''}> <strong>${days[i]}</strong></div>
                            <div class="flex-row"><input type="time" id="s1s_${i}" value="${d.s1_s}"> إلى <input type="time" id="s1e_${i}" value="${d.s1_e}"></div>
                            <div class="checkbox-row"><input type="checkbox" id="s2a_${i}" ${d.s2_a ? 'checked' : ''} onchange="toggleEvening(${i})"> فترة مسائية</div>
                            <div id="evening_${i}" style="${d.s2_a ? 'display:flex' : 'display:none'}" class="flex-row"><input type="time" id="s2s_${i}" value="${d.s2_s}"> إلى <input type="time" id="s2e_${i}" value="${d.s2_e}"></div>
                        </div>
                    </div>`;
        }
        document.getElementById('content-schedule').innerHTML = html + `<button onclick="saveSchedule()">💾 حفظ أوقات العمل</button>`;
    }
    window.toggleEvening = function(i) { const el = document.getElementById(`evening_${i}`); if(el) el.style.display = document.getElementById(`s2a_${i}`).checked ? 'flex' : 'none'; };
    window.saveSchedule = function() {
        let sch = {};
        for(let i=0; i<=6; i++) {
            sch[i] = {
                active: document.getElementById(`dayActive_${i}`).checked,
                s1_s: document.getElementById(`s1s_${i}`).value,
                s1_e: document.getElementById(`s1e_${i}`).value,
                s2_a: document.getElementById(`s2a_${i}`).checked,
                s2_s: document.getElementById(`s2s_${i}`).value,
                s2_e: document.getElementById(`s2e_${i}`).value
            };
        }
        db.ref(`${DB_PATH}/work_schedule`).set(sch).then(() => showToast('تم الحفظ'));
    };

        const d = currentData;
        document.getElementById('content-popup').innerHTML = `
            <div class="vertical-group">
                <div class="checkbox-row"><input type="checkbox" id="popupEnabled" ${d.popup_enabled ? 'checked' : ''}> <label>تفعيل الفقاعة</label></div>

    // ========== 11. وضع الصيانة ==========
    function renderMaintenance() {
        const d = currentData;
        document.getElementById('content-maintenance').innerHTML = `
            <div class="vertical-group">
                <div class="checkbox-row"><input type="checkbox" id="maintenanceMode" ${d.maintenance_mode ? 'checked' : ''}> <label>تفعيل وضع الصيانة</label></div>
                <input id="maintenanceTitle" placeholder="عنوان الصيانة" value="${(d.maintenance_title || '').replace(/"/g, '&quot;')}">
                <textarea id="maintenanceMsg" rows="3" placeholder="رسالة الصيانة">${(d.maintenance_message || '').replace(/"/g, '&quot;')}</textarea>
                <div class="flex-row"><input type="number" id="hoursInput" placeholder="ساعات" value="0" style="width:80px"><input type="number" id="minutesInput" placeholder="دقائق" value="0" style="width:80px"><input type="number" id="secondsInput" placeholder="ثواني" value="0" style="width:80px"></div>
                <button onclick="saveMaintenance()">💾 حفظ</button>
            </div>
        `;
    }
    window.saveMaintenance = function() {
        const active = document.getElementById('maintenanceMode').checked;
        let until = null;
        if(active) {
            const h = parseInt(document.getElementById('hoursInput').value) || 0;
            const m = parseInt(document.getElementById('minutesInput').value) || 0;
            const s = parseInt(document.getElementById('secondsInput').value) || 0;
            const totalMs = (h * 3600 + m * 60 + s) * 1000;
            if(totalMs > 0) until = Date.now() + totalMs;
        }
        db.ref(DB_PATH).update({
            maintenance_mode: active,
            maintenance_title: document.getElementById('maintenanceTitle').value,
            maintenance_message: document.getElementById('maintenanceMsg').value,
            maintenance_until: until
        }).then(() => showToast('تم حفظ الصيانة'));
    };

                <input id="chatOfflineMsg" placeholder="رسالة عدم الاتصال" value="${(d.chat_offline_msg || 'المشرف غير متصل حالياً').replace(/"/g, '&quot;')}">

        }).then(() => showToast('تم الحفظ'));

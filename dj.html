<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم بصمة غير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f5f5f5; direction: rtl; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 28px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1, h2 { color: #a47e44; margin-bottom: 20px; }
        .section { margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #fafafa; border-radius: 20px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        input, textarea, button { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; }
        button { background: #c8a165; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #a47e44; }
        .delete-btn { background: #dc3545; }
        .delete-btn:hover { background: #b02a37; }
        .small-btn { width: auto; padding: 5px 12px; margin: 0 5px; }
        .image-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; margin: 5px; }
        .images-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        hr { margin: 20px 0; }
        .success { background: #28a745; }
        .warning { background: #ffc107; color: #333; }
        .flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .toast { position: fixed; bottom: 20px; left: 20px; background: #333; color: white; padding: 10px 20px; border-radius: 40px; display: none; z-index: 9999; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-cog"></i> لوحة تحكم بصمة غير</h1>
    <div id="statusMsg" style="background:#e9ecef; padding:10px; border-radius:16px; margin-bottom:20px;">⏳ جاري التحميل...</div>

    <!-- إدارة الإعدادات العامة -->
    <div class="section">
        <h2>⚙️ الإعدادات العامة</h2>
        <div id="generalSettingsForm">
            <input type="text" id="siteName" placeholder="اسم الموقع">
            <input type="text" id="whatsappNum" placeholder="رقم الواتساب (مثال: 9665xxxxxxx)">
            <input type="text" id="instaUrl" placeholder="رابط انستقرام">
            <input type="text" id="tiktokUrl" placeholder="رابط تيك توك">
            <input type="text" id="snapUrl" placeholder="رابط سناب شات">
            <input type="text" id="locationUrl" placeholder="رابط الموقع (خرائط جوجل)">
            <textarea id="footerText" rows="2" placeholder="نص التذييل"></textarea>
            <button id="saveGeneralBtn">💾 حفظ الإعدادات العامة</button>
        </div>
    </div>

    <!-- إدارة السلايدر الرئيسي -->
    <div class="section">
        <h2>🖼️ السلايدر الرئيسي (صور النسبة 9:16)</h2>
        <div>
            <input type="text" id="sliderTitle" placeholder="عنوان السلايدر">
            <input type="number" id="sliderDuration" placeholder="مدة العرض بالثواني (مثال: 5)">
            <div id="sliderImagesList"></div>
            <div class="flex">
                <input type="text" id="newSliderImage" placeholder="رابط الصورة الجديدة" style="flex:1">
                <button id="addSliderImageBtn" class="small-btn">➕ إضافة</button>
            </div>
            <button id="saveSliderBtn">💾 حفظ السلايدر</button>
            <button id="enableSliderBtn" class="success">✅ تفعيل السلايدر</button>
            <button id="disableSliderBtn" class="delete-btn">⛔ تعطيل السلايدر</button>
        </div>
    </div>

    <!-- إدارة الألبومات (أعمالنا) -->
    <div class="section">
        <h2>📁 الألبومات (أعمالنا)</h2>
        <div id="albumsContainer"></div>
        <hr>
        <h3>➕ إضافة ألبوم جديد</h3>
        <input type="text" id="newAlbumName" placeholder="اسم الألبوم">
        <div id="newAlbumImages"></div>
        <div class="flex">
            <input type="text" id="newAlbumImageUrl" placeholder="رابط الصورة" style="flex:1">
            <button id="addAlbumImageBtn" class="small-btn">➕ إضافة صورة</button>
        </div>
        <button id="saveAlbumBtn">💾 حفظ الألبوم الجديد</button>
    </div>

    <!-- إدارة الكتالوجات -->
    <div class="section">
        <h2>📚 الكتالوجات</h2>
        <div id="catalogsContainer"></div>
        <hr>
        <h3>➕ إضافة كتالوج جديد</h3>
        <input type="text" id="newCatalogName" placeholder="اسم الكتالوج">
        <textarea id="newCatalogCode" rows="4" placeholder="كود HTML للكتالوج (يمكن أن يكون iframe أو محتوى)"></textarea>
        <button id="saveCatalogBtn">💾 حفظ الكتالوج الجديد</button>
    </div>

    <!-- إدارة الشركاء -->
    <div class="section">
        <h2>🤝 الشركاء</h2>
        <div id="partnersContainer"></div>
        <hr>
        <h3>➕ إضافة شريك</h3>
        <input type="text" id="newPartnerName" placeholder="اسم الشريك">
        <input type="text" id="newPartnerLogo" placeholder="رابط شعار الشريك">
        <input type="text" id="newPartnerLink" placeholder="رابط موقع الشريك (اختياري)">
        <button id="savePartnerBtn">💾 حفظ الشريك</button>
    </div>

    <!-- إدارة أوقات العمل -->
    <div class="section">
        <h2>🕒 أوقات العمل</h2>
        <div id="scheduleContainer"></div>
        <button id="saveScheduleBtn">💾 حفظ أوقات العمل</button>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY", authDomain: "mydecor-b29bd.firebaseapp.com", databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mydecor-b29bd", storageBucket: "mydecor-b29bd.firebasestorage.app", messagingSenderId: "302609299720", appId: "1:302609299720:web:e086b600c3ee824acd54bd" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let tempSliderImages = [];
    let tempNewAlbumImages = [];

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.backgroundColor = isError ? '#dc3545' : '#28a745';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    async function loadData() {
        const snap = await db.ref(DB_PATH).once('value');
        currentData = snap.val() || {};
        document.getElementById('statusMsg').innerHTML = '✅ تم تحميل البيانات';
        renderGeneral();
        renderSlider();
        renderAlbums();
        renderCatalogs();
        renderPartners();
        renderSchedule();
    }

    function renderGeneral() {
        document.getElementById('siteName').value = currentData.site_name || '';
        document.getElementById('whatsappNum').value = currentData.whatsapp_num || '';
        document.getElementById('instaUrl').value = currentData.insta_url || '';
        document.getElementById('tiktokUrl').value = currentData.tiktok_url || '';
        document.getElementById('snapUrl').value = currentData.snap_url || '';
        document.getElementById('locationUrl').value = currentData.location_url || '';
        document.getElementById('footerText').value = currentData.footer_text || '';
    }

    function renderSlider() {
        const slider = currentData.home_slider || { enabled: false, title: '', duration: 5, images: [] };
        document.getElementById('sliderTitle').value = slider.title || '';
        document.getElementById('sliderDuration').value = slider.duration || 5;
        tempSliderImages = (slider.images || []).map(img => img.url);
        const container = document.getElementById('sliderImagesList');
        container.innerHTML = '<strong>الصور الحالية:</strong><div class="images-list" id="sliderImagesPreview"></div>';
        const previewDiv = document.getElementById('sliderImagesPreview');
        tempSliderImages.forEach((url, idx) => {
            previewDiv.innerHTML += `<div style="position:relative;"><img src="${url}" class="image-preview"><button class="small-btn delete-btn" data-slider-idx="${idx}" style="position:absolute; top:0; left:0; padding:2px 6px;">✖</button></div>`;
        });
        document.querySelectorAll('[data-slider-idx]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-slider-idx'));
                tempSliderImages.splice(idx, 1);
                renderSlider();
            });
        });
    }

    async function saveSlider() {
        const enabled = currentData.home_slider?.enabled || false;
        const title = document.getElementById('sliderTitle').value;
        const duration = parseInt(document.getElementById('sliderDuration').value) || 5;
        const images = tempSliderImages.map(url => ({ url }));
        await db.ref(`${DB_PATH}/home_slider`).set({ enabled, title, duration, images });
        showToast('تم حفظ السلايدر');
        loadData();
    }

    function renderAlbums() {
        const albums = currentData.albums || {};
        const container = document.getElementById('albumsContainer');
        container.innerHTML = '<div class="grid" id="albumsGrid"></div>';
        const grid = document.getElementById('albumsGrid');
        Object.keys(albums).forEach(id => {
            const alb = albums[id];
            grid.innerHTML += `
                <div class="card">
                    <strong>${alb.name || 'بدون اسم'}</strong>
                    <div class="images-list">${Object.values(alb.imgs || {}).slice(0,3).map(i => `<img src="${i.url}" class="image-preview">`).join('')}</div>
                    <button class="delete-btn small-btn" data-album-id="${id}">🗑️ حذف الألبوم</button>
                </div>
            `;
        });
        document.querySelectorAll('[data-album-id]').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('حذف الألبوم نهائياً؟')) {
                    await db.ref(`${DB_PATH}/albums/${btn.getAttribute('data-album-id')}`).remove();
                    showToast('تم الحذف');
                    loadData();
                }
            });
        });
    }

    async function saveNewAlbum() {
        const name = document.getElementById('newAlbumName').value.trim();
        if (!name) { showToast('أدخل اسم الألبوم', true); return; }
        if (tempNewAlbumImages.length === 0) { showToast('أضف صورة واحدة على الأقل', true); return; }
        const imgs = {};
        tempNewAlbumImages.forEach((url, idx) => { imgs[`img_${idx}`] = { url }; });
        const newId = Date.now().toString();
        await db.ref(`${DB_PATH}/albums/${newId}`).set({ name, imgs, views: 0, rating_sum: 0, rating_count: 0 });
        showToast('تمت إضافة الألبوم');
        document.getElementById('newAlbumName').value = '';
        tempNewAlbumImages = [];
        document.getElementById('newAlbumImages').innerHTML = '';
        loadData();
    }

    function renderCatalogs() {
        const catalogs = currentData.catalogs || {};
        const container = document.getElementById('catalogsContainer');
        container.innerHTML = '<div class="grid" id="catalogsGrid"></div>';
        const grid = document.getElementById('catalogsGrid');
        Object.keys(catalogs).forEach(id => {
            const cat = catalogs[id];
            grid.innerHTML += `
                <div class="card">
                    <strong>${cat.name}</strong>
                    <button class="delete-btn small-btn" data-catalog-id="${id}">🗑️ حذف</button>
                </div>
            `;
        });
        document.querySelectorAll('[data-catalog-id]').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('حذف الكتالوج؟')) {
                    await db.ref(`${DB_PATH}/catalogs/${btn.getAttribute('data-catalog-id')}`).remove();
                    loadData();
                }
            });
        });
    }

    async function saveNewCatalog() {
        const name = document.getElementById('newCatalogName').value.trim();
        const code = document.getElementById('newCatalogCode').value;
        if (!name) { showToast('أدخل اسم الكتالوج', true); return; }
        const newId = Date.now().toString();
        await db.ref(`${DB_PATH}/catalogs/${newId}`).set({ name, code });
        showToast('تمت إضافة الكتالوج');
        document.getElementById('newCatalogName').value = '';
        document.getElementById('newCatalogCode').value = '';
        loadData();
    }

    function renderPartners() {
        const partners = currentData.partners || {};
        const container = document.getElementById('partnersContainer');
        container.innerHTML = '<div class="grid" id="partnersGrid"></div>';
        const grid = document.getElementById('partnersGrid');
        Object.keys(partners).forEach(id => {
            const p = partners[id];
            grid.innerHTML += `
                <div class="card">
                    <strong>${p.name || 'شريك'}</strong><br>
                    <img src="${p.url}" style="max-width:100px;"><br>
                    <button class="delete-btn small-btn" data-partner-id="${id}">🗑️ حذف</button>
                </div>
            `;
        });
        document.querySelectorAll('[data-partner-id]').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('حذف الشريك؟')) {
                    await db.ref(`${DB_PATH}/partners/${btn.getAttribute('data-partner-id')}`).remove();
                    loadData();
                }
            });
        });
    }

    async function saveNewPartner() {
        const name = document.getElementById('newPartnerName').value.trim();
        const url = document.getElementById('newPartnerLogo').value.trim();
        const link = document.getElementById('newPartnerLink').value.trim();
        if (!name || !url) { showToast('الاسم والرابط مطلوبان', true); return; }
        const newId = Date.now().toString();
        await db.ref(`${DB_PATH}/partners/${newId}`).set({ name, url, link });
        showToast('تمت إضافة الشريك');
        document.getElementById('newPartnerName').value = '';
        document.getElementById('newPartnerLogo').value = '';
        document.getElementById('newPartnerLink').value = '';
        loadData();
    }

    function renderSchedule() {
        const schedule = currentData.work_schedule || {};
        const days = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
        const container = document.getElementById('scheduleContainer');
        let html = '<div class="grid">';
        days.forEach((day, idx) => {
            const s = schedule[idx] || { active: false, s1_s: '09:00', s1_e: '17:00', s2_a: false, s2_s: '', s2_e: '' };
            html += `
                <div class="card">
                    <label><input type="checkbox" class="dayActive" data-day="${idx}" ${s.active ? 'checked' : ''}> ${day}</label>
                    <div class="flex">
                        <input type="time" class="s1_s" data-day="${idx}" value="${s.s1_s || '09:00'}">
                        <span>إلى</span>
                        <input type="time" class="s1_e" data-day="${idx}" value="${s.s1_e || '17:00'}">
                    </div>
                    <label><input type="checkbox" class="s2Active" data-day="${idx}" ${s.s2_a ? 'checked' : ''}> فترة مسائية</label>
                    <div class="flex" style="margin-top:5px;">
                        <input type="time" class="s2_s" data-day="${idx}" value="${s.s2_s || ''}" ${!s.s2_a ? 'disabled' : ''}>
                        <span>إلى</span>
                        <input type="time" class="s2_e" data-day="${idx}" value="${s.s2_e || ''}" ${!s.s2_a ? 'disabled' : ''}>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;
        // تفعيل/تعطيل المدخلات المسائية
        document.querySelectorAll('.s2Active').forEach(chk => {
            chk.addEventListener('change', function() {
                const day = this.getAttribute('data-day');
                const s2_s = document.querySelector(`.s2_s[data-day="${day}"]`);
                const s2_e = document.querySelector(`.s2_e[data-day="${day}"]`);
                s2_s.disabled = !this.checked;
                s2_e.disabled = !this.checked;
            });
        });
    }

    async function saveSchedule() {
        const schedule = {};
        for (let i = 0; i <= 6; i++) {
            const active = document.querySelector(`.dayActive[data-day="${i}"]`)?.checked || false;
            const s1_s = document.querySelector(`.s1_s[data-day="${i}"]`)?.value || '09:00';
            const s1_e = document.querySelector(`.s1_e[data-day="${i}"]`)?.value || '17:00';
            const s2_a = document.querySelector(`.s2Active[data-day="${i}"]`)?.checked || false;
            const s2_s = document.querySelector(`.s2_s[data-day="${i}"]`)?.value || '';
            const s2_e = document.querySelector(`.s2_e[data-day="${i}"]`)?.value || '';
            schedule[i] = { active, s1_s, s1_e, s2_a, s2_s, s2_e };
        }
        await db.ref(`${DB_PATH}/work_schedule`).set(schedule);
        showToast('تم حفظ أوقات العمل');
        loadData();
    }

    // الأحداث
    document.getElementById('saveGeneralBtn').onclick = async () => {
        await db.ref(DB_PATH).update({
            site_name: document.getElementById('siteName').value,
            whatsapp_num: document.getElementById('whatsappNum').value,
            insta_url: document.getElementById('instaUrl').value,
            tiktok_url: document.getElementById('tiktokUrl').value,
            snap_url: document.getElementById('snapUrl').value,
            location_url: document.getElementById('locationUrl').value,
            footer_text: document.getElementById('footerText').value,
        });
        showToast('تم حفظ الإعدادات العامة');
        loadData();
    };
    document.getElementById('saveSliderBtn').onclick = saveSlider;
    document.getElementById('enableSliderBtn').onclick = async () => { await db.ref(`${DB_PATH}/home_slider/enabled`).set(true); showToast('تم تفعيل السلايدر'); loadData(); };
    document.getElementById('disableSliderBtn').onclick = async () => { await db.ref(`${DB_PATH}/home_slider/enabled`).set(false); showToast('تم تعطيل السلايدر'); loadData(); };
    document.getElementById('addSliderImageBtn').onclick = () => {
        const url = document.getElementById('newSliderImage').value.trim();
        if (url) { tempSliderImages.push(url); document.getElementById('newSliderImage').value = ''; renderSlider(); }
        else showToast('أدخل رابط صورة', true);
    };
    document.getElementById('addAlbumImageBtn').onclick = () => {
        const url = document.getElementById('newAlbumImageUrl').value.trim();
        if (url) { tempNewAlbumImages.push(url); document.getElementById('newAlbumImageUrl').value = ''; document.getElementById('newAlbumImages').innerHTML = tempNewAlbumImages.map((u,i) => `<img src="${u}" class="image-preview"><button class="small-btn delete-btn" data-remove-img="${i}">✖</button>`).join(''); }
        else showToast('أدخل رابط صورة', true);
    };
    document.getElementById('saveAlbumBtn').onclick = saveNewAlbum;
    document.getElementById('saveCatalogBtn').onclick = saveNewCatalog;
    document.getElementById('savePartnerBtn').onclick = saveNewPartner;
    document.getElementById('saveScheduleBtn').onclick = saveSchedule;

    loadData();
</script>
</body>
</html>

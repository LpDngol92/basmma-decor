<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>بصمة غير | عيد الأضحى المبارك - تصميم متحرك فاخر</title>
    <meta name="description" content="أحدث تصاميم الديكور الخشبي مع تأثيرات عيد الأضحى المبهرة">
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/LpDngol92/my-images/images/20260504_203712_%D8%AA%D8%B5%D9%85%D9%8A%D9%85%20%D8%A8%D8%AF%D9%88%D9%86%20%D8%B9%D9%86%D9%88%D8%A7%D9%86%20(3).png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a0a2a; color: #fff; overflow-x: hidden; }
        
        /* خلفية متحركة جميلة */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* نجوم متحركة */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        /* شهب متساقطة */
        .shooting-star {
            position: fixed;
            top: -10px;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, gold, transparent);
            opacity: 0;
            pointer-events: none;
            z-index: -1;
            animation: shoot 4s linear infinite;
        }
        @keyframes shoot {
            0% { transform: translateX(0) translateY(0); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: translateX(-200px) translateY(200px); opacity: 0; }
        }
        
        /* فوانيس متحركة */
        .lantern-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 60px;
            opacity: 0.4;
            animation: floatLantern 6s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }
        .lantern-float2 {
            position: fixed;
            top: 100px;
            left: 20px;
            font-size: 80px;
            opacity: 0.3;
            animation: floatLantern 8s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes floatLantern {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(5deg); }
        }
        
        /* عناصر واجهة المستخدم */
        .header { background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,215,0,0.3); position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; flex-wrap: wrap; }
        .logo h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #ffd700, #ffb347); background-clip: text; -webkit-background-clip: text; color: transparent; cursor: pointer; }
        .nav-links { display: flex; gap: 1.8rem; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; font-weight: 600; color: #ffd700; transition: 0.3s; cursor: pointer; font-size: 1rem; position: relative; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-shadow: 0 0 10px gold; }
        
        /* شريط ماركيز متحرك */
        .marquee-container { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 12px 0; overflow: hidden; border-bottom: 1px solid gold; }
        .marquee-track { display: inline-flex; gap: 50px; animation: marqueeScroll 25s linear infinite; white-space: nowrap; }
        .marquee-track span { color: gold; font-size: 1.1rem; margin: 0 15px; }
        @keyframes marqueeScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        /* هيرو مع تأثير كتابة */
        .hero { text-align: center; padding: 70px 20px; position: relative; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; text-shadow: 0 0 20px gold; }
        .hero .eid-greeting { font-size: 2rem; color: #ffd700; margin: 20px 0; animation: pulseText 1.5s ease-in-out infinite; }
        @keyframes pulseText { 0%, 100% { text-shadow: 0 0 5px gold; } 50% { text-shadow: 0 0 25px #ffaa00, 0 0 35px orange; } }
        
        .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
        .btn { padding: 12px 30px; border-radius: 60px; font-weight: 700; text-decoration: none; transition: 0.3s; font-size: 1rem; display: inline-block; cursor: pointer; border: none; position: relative; overflow: hidden; }
        .btn-primary { background: linear-gradient(45deg, #ffd700, #ffb347); color: #1a1a2e; }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,215,0,0.6); animation: btnPulse 0.8s infinite; }
        @keyframes btnPulse { 0% { box-shadow: 0 0 0 0 rgba(255,215,0,0.7); } 70% { box-shadow: 0 0 0 15px rgba(255,215,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); } }
        .btn-outline { border: 2px solid #ffd700; color: #ffd700; background: transparent; }
        .btn-outline:hover { background: #ffd700; color: #1a1a2e; transform: translateY(-3px); }
        
        /* عد تنازلي */
        .countdown-section { background: rgba(0,0,0,0.5); border-radius: 50px; padding: 20px; margin: 30px auto; max-width: 500px; text-align: center; backdrop-filter: blur(10px); }
        .countdown-timer { display: flex; justify-content: center; gap: 20px; font-size: 2rem; font-weight: bold; margin-top: 10px; }
        .countdown-timer div { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; min-width: 80px; }
        .countdown-timer span { font-size: 0.8rem; display: block; color: #ffd700; }
        
        /* بطاقات متحركة */
        .section { padding: 60px 0; }
        .section-title { font-size: 2.2rem; text-align: center; margin-bottom: 3rem; color: #ffd700; position: relative; }
        .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 28px; overflow: hidden; transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1); cursor: pointer; border: 1px solid rgba(255,215,0,0.2); animation: fadeInUp 0.6s ease-out backwards; }
        .card:hover { transform: translateY(-15px) scale(1.02); border-color: #ffd700; box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(255,215,0,0.3); }
        .img-square { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; }
        .img-square img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .card:hover .img-square img { transform: scale(1.1); }
        .card-body { padding: 1rem; text-align: center; }
        .card-title { font-size: 1.2rem; font-weight: 700; color: #ffd700; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .footer { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 3rem 0 1rem; margin-top: 50px; }
        .copyright { text-align: center; padding-top: 2rem; border-top: 1px solid rgba(255,215,0,0.2); }
        
        /* باقي العناصر الأساسية */
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .lightbox-img { max-width: 90%; max-height: 85vh; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: gold; padding: 10px 25px; border-radius: 50px; z-index: 2001; display: none; }
        
        @media (max-width: 700px) {
            .hero h1 { font-size: 2rem; }
            .countdown-timer div { min-width: 60px; font-size: 1.3rem; padding: 5px 10px; }
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>
<div class="stars" id="stars"></div>
<div class="lantern-float">🏮✨</div>
<div class="lantern-float2">🏮🌟</div>

<header class="header">
    <div class="container">
        <div class="nav-bar">
            <div class="logo"><h1>بصمة غير <i class="fas fa-moon"></i></h1></div>
            <div class="nav-links" id="navLinks"></div>
        </div>
    </div>
</header>

<div class="marquee-container">
    <div class="marquee-track" id="marqueeTrack">
        <span>🐏✨ عيد أضحى مبارك ✨🐏</span>
        <span>🌙 كل عام وأنتم بخير 🌙</span>
        <span>🕌 تقبل الله طاعاتكم 🕌</span>
        <span>🎉 أطيب التهاني بمناسبة العيد 🎉</span>
        <span>🏮 بصمة غير تهنئكم بحلول عيد الأضحى 🏮</span>
    </div>
</div>

<main id="mainContent"></main>

<footer class="footer">
    <div class="container">
        <div class="copyright" id="footerCopyright">© 2025 بصمة غير - كل عام وأنتم بخير ✨</div>
    </div>
</footer>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" class="lightbox-img" style="cursor: pointer;">
</div>
<div id="toastMsg" class="toast"></div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let currentPage = 'home';
    let currentWhatsappNum = '966541780995';
    
    // دالة إنشاء النجوم المتساقطة
    function createStars() {
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = Math.random() * 3 + 2 + 's';
            starsContainer.appendChild(star);
        }
        
        // شهب
        for (let i = 0; i < 6; i++) {
            const meteor = document.createElement('div');
            meteor.classList.add('shooting-star');
            meteor.style.top = Math.random() * 50 + '%';
            meteor.style.left = Math.random() * 80 + '%';
            meteor.style.animationDelay = Math.random() * 8 + 's';
            meteor.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(meteor);
        }
    }
    createStars();
    
    // تكرار شريط الماركيز
    const track = document.getElementById('marqueeTrack');
    if (track) {
        track.innerHTML = track.innerHTML + track.innerHTML;
    }
    
    // عد تنازلي للعيد (10 ذو الحجة)
    function updateCountdown() {
        const eidDate = new Date(new Date().getFullYear(), 5, 6); // 6 يونيو تقريبي، يمكن تعديله
        if (new Date() > eidDate) eidDate.setFullYear(new Date().getFullYear() + 1);
        const diff = eidDate - new Date();
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (86400000)) / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        
        const cdDiv = document.getElementById('countdownDisplay');
        if (cdDiv) cdDiv.innerHTML = `
            <div><span>${days}</span> يوم</div>
            <div><span>${hours}</span> ساعة</div>
            <div><span>${minutes}</span> دقيقة</div>
            <div><span>${seconds}</span> ثانية</div>
        `;
    }
    
    function showToast(msg) {
        const t = document.getElementById('toastMsg');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }
    
    function openLightbox(url) {
        const lb = document.getElementById('lightbox');
        const img = document.getElementById('lightboxImg');
        img.src = url;
        lb.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    window.closeLightbox = function() {
        document.getElementById('lightbox').style.display = 'none';
        document.body.style.overflow = '';
    };
    
    function getWatermarkedImage(src, alt) {
        if (!src) return '<div class="empty-state">لا توجد صورة</div>';
        return `<div class="img-square"><img src="${src}" loading="lazy" alt="${alt}" onclick="openLightbox('${src}')" style="cursor:pointer"></div>`;
    }
    
    function getAlbumsList() {
        if (!currentData.albums) return [];
        return Object.keys(currentData.albums).map(id => ({ id, ...currentData.albums[id] }));
    }
    
    function buildHomepageWorksGrid() {
        const cont = document.getElementById('homepageWorksGrid');
        if (!cont) return;
        let albums = getAlbumsList();
        if (albums.length === 0) {
            cont.innerHTML = '<div class="empty-state">✨ لا توجد أعمال بعد ✨</div>';
            return;
        }
        let html = '<div class="grid-auto">';
        albums.slice(0, 6).forEach((alb, idx) => {
            let cover = (alb.imgs && Object.keys(alb.imgs).length) ? Object.values(alb.imgs)[0].url : '';
            let delay = idx * 0.1;
            html += `<div class="card" data-album="${alb.id}" style="animation-delay: ${delay}s">
                        ${cover ? getWatermarkedImage(cover, alb.name || 'ألبوم') : '<div class="img-square" style="background:#333;"></div>'}
                        <div class="card-body">
                            <div class="card-title">${alb.name || 'ألبوم'}</div>
                            <small style="color:#aaa;">${alb.imgs ? Object.keys(alb.imgs).length : 0} صورة</small>
                        </div>
                    </div>`;
        });
        html += '</div>';
        cont.innerHTML = html;
        document.querySelectorAll('#homepageWorksGrid .card').forEach(c => {
            c.addEventListener('click', () => {
                const albId = c.getAttribute('data-album');
                const alb = currentData.albums?.[albId];
                if (alb && alb.imgs) {
                    const urls = Object.values(alb.imgs).map(i => i.url).filter(u => u);
                    if (urls.length) openLightbox(urls[0]);
                }
            });
        });
    }
    
    function loadPage() {
        const main = document.getElementById('mainContent');
        if (!main) return;
        
        if (currentPage === 'home') {
            main.innerHTML = `
                <div class="hero">
                    <div class="container">
                        <div class="eid-greeting">🐏✨ عيد أضحى مبارك ✨🐏</div>
                        <h1>بصمة غير · ديكورات فاخرة<br>للمعابر والمحلات التجارية</h1>
                        <div class="countdown-section">
                            <div style="font-size:1.2rem;">⏳ متبقي على عيد الأضحى</div>
                            <div class="countdown-timer" id="countdownDisplay"></div>
                        </div>
                        <div class="btn-group">
                            <a class="btn btn-primary" data-page="store">🛍️ تسوق الآن</a>
                            <a class="btn btn-outline" data-page="works">📸 أعمالنا</a>
                            <a class="btn btn-outline" data-page="catalogs">📚 كتالوجات</a>
                        </div>
                    </div>
                </div>
                <div class="container section">
                    <h2 class="section-title">⭐ أحدث أعمالنا المميزة ⭐</h2>
                    <div id="homepageWorksGrid"></div>
                </div>
            `;
            buildHomepageWorksGrid();
            updateCountdown();
            setInterval(updateCountdown, 1000);
        } 
        else if (currentPage === 'store') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">🛒 المتجر · جميع المنتجات</h2><div id="allProductsGrid"><div class="empty-state">جاري التحميل...</div></div></div>`;
            let allImgs = [];
            if (currentData.store_categories) {
                Object.keys(currentData.store_categories).forEach(cid => {
                    const cat = currentData.store_categories[cid];
                    if (cat.imgs) Object.values(cat.imgs).forEach(img => { if (img.url) allImgs.push(img.url); });
                });
            }
            if (allImgs.length === 0) {
                document.getElementById('allProductsGrid').innerHTML = '<div class="empty-state">لا توجد منتجات بعد</div>';
            } else {
                let html = '<div class="grid-auto">';
                allImgs.forEach((url, idx) => {
                    html += `<div class="card" style="animation-delay: ${idx * 0.05}s">
                                ${getWatermarkedImage(url, 'منتج')}
                                <div class="card-body">
                                    <button class="btn btn-primary" style="width:100%;margin-top:10px;" onclick="event.stopPropagation(); window.open('https://wa.me/${currentWhatsappNum}?text=${encodeURIComponent('أريد طلب هذا المنتج: '+url)}','_blank')"><i class="fab fa-whatsapp"></i> طلب عبر واتساب</button>
                                </div>
                            </div>`;
                });
                html += '</div>';
                document.getElementById('allProductsGrid').innerHTML = html;
            }
        }
        else if (currentPage === 'works') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">📸 معرض أعمالنا</h2><div id="worksGrid"></div></div>`;
            let albums = getAlbumsList();
            if (albums.length === 0) {
                document.getElementById('worksGrid').innerHTML = '<div class="empty-state">لا توجد أعمال</div>';
            } else {
                let html = '<div class="grid-auto">';
                albums.forEach((alb, idx) => {
                    let cover = (alb.imgs && Object.keys(alb.imgs).length) ? Object.values(alb.imgs)[0].url : '';
                    html += `<div class="card" data-album="${alb.id}" style="animation-delay: ${idx * 0.1}s">
                                ${cover ? getWatermarkedImage(cover, alb.name) : '<div class="img-square" style="background:#333;"></div>'}
                                <div class="card-body"><div class="card-title">${alb.name || 'ألبوم'}</div></div>
                            </div>`;
                });
                html += '</div>';
                document.getElementById('worksGrid').innerHTML = html;
                document.querySelectorAll('#worksGrid .card').forEach(c => {
                    c.addEventListener('click', () => {
                        const albId = c.getAttribute('data-album');
                        const alb = currentData.albums?.[albId];
                        if (alb && alb.imgs) {
                            const urls = Object.values(alb.imgs).map(i => i.url).filter(u => u);
                            if (urls.length) openLightbox(urls[0]);
                        }
                    });
                });
            }
        }
        else if (currentPage === 'catalogs') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">📚 الكتالوجات الحصرية</h2><div id="catalogsGrid"><div class="empty-state">جاري التحميل...</div></div></div>`;
            if (!currentData.catalogs || Object.keys(currentData.catalogs).length === 0) {
                document.getElementById('catalogsGrid').innerHTML = '<div class="empty-state">لا توجد كتالوجات</div>';
            } else {
                let html = '<div class="grid-auto">';
                Object.keys(currentData.catalogs).forEach((id, idx) => {
                    const cat = currentData.catalogs[id];
                    html += `<div class="card" data-catalog="${id}" style="animation-delay: ${idx * 0.1}s">
                                <div class="card-body">
                                    <i class="fas fa-book-open fa-4x" style="color:#ffd700; margin:20px 0;"></i>
                                    <div class="card-title">${cat.name}</div>
                                    <button class="btn btn-primary" style="margin-top:15px;" onclick="event.stopPropagation(); alert('سيتم فتح الكتالوج قريباً')">عرض الكتالوج</button>
                                </div>
                            </div>`;
                });
                html += '</div>';
                document.getElementById('catalogsGrid').innerHTML = html;
            }
        }
        else if (currentPage === 'contact') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">📞 تواصل معنا</h2><div style="text-align:center; font-size:1.3rem; padding:40px; background:rgba(255,255,255,0.05); border-radius:40px;"><p><i class="fas fa-phone-alt" style="color:gold;"></i> <strong>0541780995</strong></p><p><i class="fab fa-whatsapp" style="color:#25D366;"></i> <strong>${currentWhatsappNum}</strong></p><p><i class="fab fa-instagram" style="color:#ffd700;"></i> <strong>بصمة_غير</strong></p><div style="margin-top:30px;"><a href="https://wa.me/${currentWhatsappNum}" target="_blank" class="btn btn-primary"><i class="fab fa-whatsapp"></i> واتساب الآن</a></div></div></div>`;
        }
        
        // ربط أزرار التنقل
        document.querySelectorAll('.btn[data-page]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const page = btn.getAttribute('data-page');
                if (page) changePage(page);
            });
        });
    }
    
    function changePage(page) {
        currentPage = page;
        loadPage();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function renderNavLinks() {
        const container = document.getElementById('navLinks');
        const pages = [
            { id: 'home', name: 'الرئيسية', icon: 'fas fa-home' },
            { id: 'store', name: 'المتجر', icon: 'fas fa-store' },
            { id: 'works', name: 'أعمالنا', icon: 'fas fa-images' },
            { id: 'catalogs', name: 'الكتالوجات', icon: 'fas fa-book-open' },
            { id: 'contact', name: 'اتصل بنا', icon: 'fas fa-phone-alt' }
        ];
        let html = '';
        pages.forEach(p => {
            html += `<a data-page="${p.id}" class="${currentPage === p.id ? 'active' : ''}"><i class="${p.icon}"></i> ${p.name}</a>`;
        });
        container.innerHTML = html;
        container.querySelectorAll('[data-page]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                changePage(link.getAttribute('data-page'));
            });
        });
    }
    
    function init() {
        renderNavLinks();
        loadPage();
        showToast('🐏✨ عيد أضحى مبارك ✨🐏');
    }
    
    // جلب البيانات من Firebase
    db.ref(DB_PATH).once('value').then(snap => {
        currentData = snap.val() || {};
        currentWhatsappNum = currentData.whatsapp_num || '966541780995';
        init();
    }).catch(err => {
        console.error(err);
        init();
        showToast('تم التحميل بنجاح');
    });
    
    window.openLightbox = openLightbox;
</script>
</body>
</html>

<script>
    const firebaseConfig = { apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY", authDomain: "mydecor-b29bd.firebaseapp.com", databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mydecor-b29bd", storageBucket: "mydecor-b29bd.firebasestorage.app", messagingSenderId: "302609299720", appId: "1:302609299720:web:e086b600c3ee824acd54bd" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let currentPage = 'home';
    let currentImageList = [];
    let currentIndex = 0;
    let currentWhatsappNum = '966500000000';
    let currentAlbumId = null;

    // ========== دوال مساعدة ==========
    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
    function formatTime12(t) { if (!t) return ''; let [h, m] = t.split(':'); h = parseInt(h); return `${h % 12 || 12}:${m} ${h >= 12 ? 'م' : 'ص'}`; }
    function getGroupedScheduleHtml(d) {
        if (!d.work_schedule) return '<p>لم تحدد المواعيد</p>';
        const days = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
        const order = [6,0,1,2,3,4,5];
        let groups = [], off = [];
        order.forEach(jsDay => {
            const s = d.work_schedule[jsDay];
            if (s && s.active) {
                const key = `${s.s1_s}-${s.s1_e}-${s.s2_a}`;
                let g = groups.find(g => g.key === key);
                if (g) g.days.push(days[jsDay]);
                else groups.push({ key, days: [days[jsDay]], data: s });
            } else off.push(days[jsDay]);
        });
        let html = '';
        groups.forEach(g => {
            const dTxt = g.days.length === 1 ? g.days[0] : `من ${g.days[0]} إلى ${g.days[g.days.length-1]}`;
            html += `<div class="schedule-item"><strong>${dTxt}</strong><br>${formatTime12(g.data.s1_s)} - ${formatTime12(g.data.s1_e)}`;
            if (g.data.s2_a) html += `<br>${formatTime12(g.data.s2_s)} - ${formatTime12(g.data.s2_e)}`;
            html += `</div>`;
        });
        if (off.length) html += `<div class="schedule-item"><strong>عطلة:</strong> ${off.join('، ')}</div>`;
        return html;
    }
    function getAllStoreProducts() {
        let imgs = [];
        if (currentData.store_categories) {
            Object.keys(currentData.store_categories).forEach(cid => {
                const cat = currentData.store_categories[cid];
                if (cat.imgs) Object.values(cat.imgs).forEach(img => { if (img.url) imgs.push(img.url); });
            });
        }
        return imgs;
    }
    function getAlbumsList() { if (!currentData.albums) return []; return Object.keys(currentData.albums).map(id => ({ id, ...currentData.albums[id] })); }
    function renderPartnersMarquee() {
        const cont = document.getElementById('partnersMarquee'), track = document.getElementById('marqueeTrack');
        if (!cont || !track) return;
        if (currentData.partners && Object.keys(currentData.partners).length) {

    let scale = 1, translateX = 0, translateY = 0, startX = 0, startY = 0, isPanning = false;
    let initialPinchDist = 0, startScale = 1, pinchCenterX = 0, pinchCenterY = 0, touchStartX = 0;

    function setTransform() { imgElement.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`; }
    function resetTransform() { scale = 1; translateX = 0; translateY = 0; setTransform(); }
    function clampMovement() {
        const containerRect = imgElement.parentElement.getBoundingClientRect();
        const imgRect = imgElement.getBoundingClientRect();
        const maxX = Math.max(0, (imgRect.width * scale - containerRect.width) / 2);
        const maxY = Math.max(0, (imgRect.height * scale - containerRect.height) / 2);
        translateX = Math.min(Math.max(translateX, -maxX), maxX);
        translateY = Math.min(Math.max(translateY, -maxY), maxY);
        setTransform();
    }
    function onMouseDown(e) { if (scale <= 1) return; e.preventDefault(); isPanning = true; startX = e.clientX - translateX; startY = e.clientY - translateY; imgElement.style.cursor = 'grabbing'; }
    function onMouseMove(e) { if (!isPanning) return; translateX = e.clientX - startX; translateY = e.clientY - startY; clampMovement(); }
    function onMouseUp() { isPanning = false; imgElement.style.cursor = 'grab'; }
    function getDistance(touches) { return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY); }
    function onTouchStart(e) {
        if (e.touches.length === 2) {
            e.preventDefault();
            initialPinchDist = getDistance(e.touches);
            startScale = scale;
            pinchCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            pinchCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            document.getElementById('zoomHint').style.opacity = '1';
            setTimeout(() => document.getElementById('zoomHint').style.opacity = '0', 2000);
        } else if (e.touches.length === 1) {
            touchStartX = e.touches[0].clientX;
            if (scale > 1) { isPanning = true; startX = e.touches[0].clientX - translateX; startY = e.touches[0].clientY - translateY; }
        }
    }
    function onTouchMove(e) {
        if (e.touches.length === 2 && initialPinchDist > 0) {
            e.preventDefault();
            const newDist = getDistance(e.touches);
            let newScale = startScale * (newDist / initialPinchDist);
            newScale = Math.min(4, Math.max(1, newScale));
            if (newScale !== scale) {
                const rect = imgElement.getBoundingClientRect();
                const offsetX = pinchCenterX - rect.left;
                const offsetY = pinchCenterY - rect.top;
                const ratio = newScale / scale;
                translateX = pinchCenterX - rect.left - (offsetX - translateX) * ratio;
                translateY = pinchCenterY - rect.top - (offsetY - translateY) * ratio;
                scale = newScale;
                clampMovement();
            }
        } else if (e.touches.length === 1 && isPanning && scale > 1) {
            e.preventDefault();
            translateX = e.touches[0].clientX - startX;
            translateY = e.touches[0].clientY - startY;
            clampMovement();
        }
    }
    function onTouchEnd(e) {
        if (e.touches.length < 2) initialPinchDist = 0;
        if (e.touches.length === 0) {
            if (touchStartX && e.changedTouches[0] && scale <= 1) {
                const diff = e.changedTouches[0].clientX - touchStartX;
                if (Math.abs(diff) > 50) { if (diff > 0) prevImage(); else nextImage(); }
            }
            touchStartX = 0; isPanning = false;
        }
    }
    function onWheel(e) {
        e.preventDefault();
        let delta = e.deltaY > 0 ? -0.1 : 0.1;
        let newScale = scale + delta;
        newScale = Math.min(4, Math.max(1, newScale));
        if (newScale === scale) return;
        const rect = imgElement.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const ratio = newScale / scale;
        translateX = e.clientX - rect.left - (mouseX - translateX) * ratio;
        translateY = e.clientY - rect.top - (mouseY - translateY) * ratio;
        scale = newScale;
        clampMovement();
        document.getElementById('zoomHint').style.opacity = '1';
        setTimeout(() => document.getElementById('zoomHint').style.opacity = '0', 2000);
    }
    function bindLightboxEvents() {

    function buildHomeSlider() {
        const container = document.getElementById('homeSliderContainer');
        if (!container) return;
        const sliderData = currentData.home_slider;
        if (!sliderData || !sliderData.enabled || !sliderData.images || sliderData.images.length === 0) {
            buildAlbumsBackup(container);
            return;
        }
        sliderImages = sliderData.images.map(img => img.url).filter(url => url);
        if (sliderImages.length === 0) { buildAlbumsBackup(container); return; }
        let html = `<div class="slider-container"><div class="slider-track" id="sliderTrack">`;
        sliderImages.forEach((url, idx) => {
            html += `<div class="slider-item" data-index="${idx}"><img src="${url}" loading="lazy" onerror="this.src='https://placehold.co/600x1067?text=خطأ+تحميل';"></div>`;
        });
        html += `</div><div class="slider-nav"><div class="slider-dots" id="sliderDots"></div></div></div>`;
        container.innerHTML = html;
        const dotsDiv = document.getElementById('sliderDots');
        if (dotsDiv) {
            dotsDiv.innerHTML = sliderImages.map((_, i) => `<div class="dot ${i === currentSlideIndex ? 'active' : ''}" data-dot="${i}"></div>`).join('');
            dotsDiv.querySelectorAll('.dot').forEach(dot => {
                dot.addEventListener('click', (e) => {
                    const idx = parseInt(dot.getAttribute('data-dot'));
                    if (!isNaN(idx)) snapToIndex(idx);
                });
            });
        }
        sliderTrack = document.getElementById('sliderTrack');
        if (!sliderTrack) return;
        function getOffsetForIndex(index) {
            const items = sliderTrack.children;
            if (!items.length) return 0;
            const targetItem = items[index];
            if (!targetItem) return 0;
            const targetRect = targetItem.getBoundingClientRect();
            const containerRect = sliderTrack.parentElement.getBoundingClientRect();
            const targetCenter = targetRect.left + targetRect.width/2;
            const containerCenter = containerRect.left + containerRect.width/2;
            const currentTransform = getCurrentTranslate();
            return currentTransform - (targetCenter - containerCenter);
        }
        function getCurrentTranslate() {
            const transform = sliderTrack.style.transform;
            const match = transform.match(/translateX\(([-\d.]+)px\)/);
            return match ? parseFloat(match[1]) : 0;
        }
        function setTranslate(value, animate = false) {
            sliderTrack.style.transition = animate ? 'transform 0.3s ease' : 'none';
            sliderTrack.style.transform = `translateX(${value}px)`;
        }
        function snapToIndex(index) {
            if (index < 0) index = 0;
            if (index >= sliderImages.length) index = sliderImages.length - 1;
            currentSlideIndex = index;
            const finalOffset = getOffsetForIndex(currentSlideIndex);
            setTranslate(finalOffset, true);
            const items = sliderTrack.children;
            for (let i = 0; i < items.length; i++) {
                if (i === currentSlideIndex) items[i].classList.add('active');
                else items[i].classList.remove('active');
            }
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => {
                if (i === currentSlideIndex) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }
        function onDragStart(e) {
            e.preventDefault();
            isDraggingSlider = true;
            dragStartX = (e.type === 'mousedown') ? e.clientX : e.touches[0].clientX;
            startTranslate = getCurrentTranslate();
            sliderTrack.style.transition = 'none';
            sliderTrack.classList.add('dragging');
        }
        function onDragMove(e) {
            if (!isDraggingSlider) return;
            const currentX = (e.type === 'mousemove') ? e.clientX : e.touches[0].clientX;
            const dx = currentX - dragStartX;
            let newTranslate = startTranslate + dx;
            const maxOffset = getOffsetForIndex(0);
            const minOffset = getOffsetForIndex(sliderImages.length - 1);
            newTranslate = Math.min(maxOffset, Math.max(minOffset, newTranslate));
            sliderTrack.style.transform = `translateX(${newTranslate}px)`;
        }
        function onDragEnd(e) {
            if (!isDraggingSlider) return;
            isDraggingSlider = false;
            sliderTrack.classList.remove('dragging');
            const endX = (e.type === 'mouseup') ? e.clientX : (e.changedTouches ? e.changedTouches[0].clientX : dragStartX);
            const diff = endX - dragStartX;
            const threshold = 50;
            let targetIndex = currentSlideIndex;
            if (Math.abs(diff) > threshold) {
                if (diff > 0) targetIndex--;
                else targetIndex++;
                targetIndex = Math.max(0, Math.min(sliderImages.length - 1, targetIndex));
            } else {
                let minDist = Infinity;
                for (let i = 0; i < sliderImages.length; i++) {
                    const offset = getOffsetForIndex(i);
                    const current = getCurrentTranslate();
                    const dist = Math.abs(offset - current);
                    if (dist < minDist) { minDist = dist; targetIndex = i; }
                }
            }
            snapToIndex(targetIndex);
        }
        sliderTrack.addEventListener('mousedown', onDragStart);
        window.addEventListener('mousemove', onDragMove);
        window.addEventListener('mouseup', onDragEnd);
        sliderTrack.addEventListener('touchstart', onDragStart, { passive: false });
        window.addEventListener('touchmove', onDragMove, { passive: false });
        window.addEventListener('touchend', onDragEnd);
        const items = sliderTrack.children;
        for (let i = 0; i < items.length; i++) {
            items[i].addEventListener('click', (e) => {
                e.stopPropagation();
                openLightbox(sliderImages, i);
            });
        }
        window.addEventListener('resize', () => snapToIndex(currentSlideIndex));
        setTimeout(() => snapToIndex(0), 50);
    }

        if (hoursDiv) hoursDiv.innerHTML = getGroupedScheduleHtml(d);
        if (d.footer_text) document.getElementById('footerCopyright').innerHTML = d.footer_text;
        else document.getElementById('footerCopyright').innerHTML = '© 2025 بصمة غير - جميع الحقوق محفوظة';
    }

    // ========== التنقل ==========
    function navHandler(e) { e.preventDefault(); const page = this.getAttribute('data-page'); if (page) changePage(page); }
    function renderNavLinks() {
        const container = document.getElementById('navLinks');
        if (!container) return;
        const pages = [
            { id: 'home', name: 'الرئيسية', icon: 'fas fa-home' },
            { id: 'store', name: 'المتجر', icon: 'fas fa-store' },
            { id: 'works', name: 'أعمالنا', icon: 'fas fa-images' },
            { id: 'catalogs', name: 'الكتالوجات', icon: 'fas fa-book-open' },
            { id: 'contact', name: 'اتصل بنا', icon: 'fas fa-phone-alt' }
        ];
        let html = '';
        pages.forEach(p => { html += `<a data-page="${p.id}" class="${currentPage === p.id ? 'active' : ''}"><i class="${p.icon}"></i> ${p.name}</a>`; });
        container.innerHTML = html;
        container.querySelectorAll('[data-page]').forEach(link => {
            link.removeEventListener('click', navHandler);
            link.addEventListener('click', navHandler);
        });
    }
    function changePage(page) { if (currentPage === page) return; currentPage = page; loadPage(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    function bindHeroButtons() { document.querySelectorAll('.btn[data-page]').forEach(btn => { btn.removeEventListener('click', heroClickHandler); btn.addEventListener('click', heroClickHandler); }); }
    function heroClickHandler(e) { e.preventDefault(); const page = this.getAttribute('data-page'); if (page) changePage(page); }
    function loadPage() {
        const main = document.getElementById('mainContent');
        if (!main) return;
        if (currentPage === 'home') {
            const sliderTitle = (currentData.home_slider && currentData.home_slider.title) ? currentData.home_slider.title : 'أحدث أعمالنا';
            main.innerHTML = `<div class="hero"><div class="container"><h1>بصمة غير: ديكورات معارض ومحلات تجارية في جدة</h1><p>ديكورات خشب، دواليب عرض، ارفف تخزين، كاونترات استقبال، مكتبات تلفزيون - تصاميم فاخرة</p><div class="btn-group"><a class="btn btn-primary" data-page="store">تسوق الآن</a><a class="btn btn-outline" data-page="works">شاهد أعمالنا</a><a class="btn btn-outline" data-page="catalogs">الكتالوجات</a></div></div></div><div class="container section"><h2 class="section-title">${sliderTitle}</h2><div id="homeSliderContainer"></div></div>`;
            buildHomeSlider();
        } else if (currentPage === 'store') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">جميع المنتجات</h2><div id="allProductsGrid"></div></div>`;
            buildAllProductsGrid();
        } else if (currentPage === 'works') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">أعمالنا</h2><div id="worksGrid"></div></div>`;
            buildWorksGrid();
        } else if (currentPage === 'catalogs') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">الكتالوجات</h2><div id="catalogsPageGrid"></div></div>`;
            buildCatalogsPageGrid();
        } else if (currentPage === 'contact') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">اتصل بنا</h2><div style="display:flex; justify-content:center; gap:2rem; flex-wrap:wrap; text-align:center;"><a href="tel:0541780995" style="text-decoration:none;"><div><i class="fas fa-phone fa-2x" style="color:var(--primary);"></i><p>اتصل بنا</p></div></a><a href="https://wa.me/${currentWhatsappNum}" target="_blank" style="text-decoration:none;"><div><i class="fab fa-whatsapp fa-2x" style="color:#25D366;"></i><p>واتساب</p></div></a>${currentData.insta_url ? `<a href="${currentData.insta_url}" target="_blank" style="text-decoration:none;"><div><i class="fab fa-instagram fa-2x" style="color:var(--primary);"></i><p>انستقرام</p></div></a>` : ''}${currentData.tiktok_url ? `<a href="${currentData.tiktok_url}" target="_blank" style="text-decoration:none;"><div><i class="fab fa-tiktok fa-2x" style="color:var(--primary);"></i><p>تيك توك</p></div></a>` : ''}${currentData.snap_url ? `<a href="${currentData.snap_url}" target="_blank" style="text-decoration:none;"><div><i class="fab fa-snapchat fa-2x" style="color:var(--primary);"></i><p>سناب شات</p></div></a>` : ''}<a href="${currentData.location_url || '#'}" target="_blank" style="text-decoration:none;"><div><i class="fas fa-map-marker-alt fa-2x" style="color:var(--primary);"></i><p>الموقع</p></div></a></div><div style="text-align:center; margin-top:20px;"><p>📞 0541780995</p></div></div>`;
        }
        updateFooterData();
        renderNavLinks();
        bindHeroButtons();
    }

    // ========== إدارة الشاشة الافتتاحية والصيانة ==========
    let splashTimeout, maintenanceInterval, popupTimeout;
    function showSplash(settings) {
        const splashDiv = document.getElementById('splash');
        if (!splashDiv) return;
        splashDiv.innerHTML = '';
        if (!settings.enabled) { splashDiv.style.display = 'none'; return; }
        const mediaUrl = settings.media_url;
        const duration = (settings.duration || 5) * 1000;
        const showSkip = settings.show_skip === true;
        const img = document.createElement('img');
        img.src = mediaUrl || '';
        img.className = 'splash-media';
        img.alt = 'Splash';
        img.oncontextmenu = (e) => e.preventDefault();
        img.ondragstart = (e) => e.preventDefault();
        splashDiv.appendChild(img);
        if (showSkip) {
            const skipBtn = document.createElement('button');
            skipBtn.innerText = 'تخطي ←';
            skipBtn.className = 'splash-skip';
            skipBtn.onclick = () => { clearTimeout(splashTimeout); splashDiv.style.opacity = '0'; setTimeout(() => { splashDiv.style.display = 'none'; }, 500); };
            splashDiv.appendChild(skipBtn);
        }
        splashDiv.style.display = 'flex';
        splashDiv.style.opacity = '1';
        if (splashTimeout) clearTimeout(splashTimeout);
        splashTimeout = setTimeout(() => { splashDiv.style.opacity = '0'; setTimeout(() => { splashDiv.style.display = 'none'; }, 500); }, duration);
    }
    function updateMaintenanceMode() {
        const d = currentData, screen = document.getElementById('maintenanceScreen');
        if (!d.maintenance_mode) { if (screen.style.display !== 'none') screen.style.display = 'none'; if (maintenanceInterval) clearInterval(maintenanceInterval); return; }
        const until = d.maintenance_until;
        const title = d.maintenance_title || 'الموقع في صيانة', msg = d.maintenance_message || 'نعمل على تحسين تجربتك، سنعود قريباً';
        if (until && until <= Date.now()) { db.ref(DB_PATH).update({ maintenance_mode: false, maintenance_until: null }); return; }
        screen.innerHTML = `<div style="background:white; border-radius:48px; padding:40px; max-width:500px; text-align:center;"><i class="fas fa-tools fa-4x" style="color:var(--primary);"></i><h2 style="margin:15px 0;">${title}</h2><p>${msg}</p>${until ? `<div id="maintenanceCountdown" style="font-size:2rem; font-weight:bold;"></div>` : ''}</div>`;
        screen.style.display = 'flex'; document.body.style.overflow = 'hidden';
        if (until) {
            const countdownEl = document.getElementById('maintenanceCountdown');
            const updateCountdown = () => {
                let diff = until - Date.now();
                if (diff <= 0) { clearInterval(maintenanceInterval); window.location.reload(); return; }
                const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
                if (countdownEl) countdownEl.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            };
            updateCountdown(); maintenanceInterval = setInterval(updateCountdown, 1000);
        }
    }
    function updatePopup() {
        const bubble = document.getElementById('popupBubble'), msgSpan = document.getElementById('popupMessage');
        if (!currentData.popup_enabled || !currentData.popup_message) { if (bubble) bubble.style.display = 'none'; if (popupTimeout) clearTimeout(popupTimeout); return; }
        if (bubble.style.display === 'none' || bubble.style.display === '') {
            msgSpan.innerText = currentData.popup_message;
            bubble.style.display = 'block';
            if (popupTimeout) clearTimeout(popupTimeout);
            popupTimeout = setTimeout(() => { bubble.style.display = 'none'; }, (currentData.popup_duration || 7) * 1000);
        }
    }
    window.closePopup = function() { const bubble = document.getElementById('popupBubble'); if (bubble) bubble.style.display = 'none'; if (popupTimeout) clearTimeout(popupTimeout); };
    function refreshAll() { renderPartnersMarquee(); loadPage(); updateMaintenanceMode(); updatePopup(); }

    // ========== بدء التطبيق ==========
    let forceHideTimer = null;
    function forceHideSplash() {
        const splashDiv = document.getElementById('splash');
        if (splashDiv && splashDiv.style.display !== 'none') {
            splashDiv.style.opacity = '0';
            setTimeout(() => { splashDiv.style.display = 'none'; }, 500);
        }
        if (forceHideTimer) clearTimeout(forceHideTimer);
    }
    const splashDurationSetting = (currentData && currentData.splash_duration) ? currentData.splash_duration : 5;
    const maxWaitTime = Math.max(splashDurationSetting * 1000, 5000);
    forceHideTimer = setTimeout(() => {
        forceHideSplash();
        if (!currentData || Object.keys(currentData).length === 0) {
            currentData = { splash_enabled: false };
            refreshAll();
        }
    }, maxWaitTime);
    db.ref(DB_PATH).once('value').then(snap => {
        clearTimeout(forceHideTimer);
        currentData = snap.val() || {};
        const splashSettings = {
            enabled: currentData.splash_enabled !== false,
            media_url: currentData.splash_media_url || '',
            duration: currentData.splash_duration || 5,
            show_skip: currentData.splash_show_skip === true
        };
        showSplash(splashSettings);
        refreshAll();
    }).catch(err => {
        console.error(err);
        clearTimeout(forceHideTimer);
        currentData = { splash_enabled: false };
        forceHideSplash();
        refreshAll();
        showToast('حدث خطأ في الاتصال');
    });
    db.ref(DB_PATH).on('value', snap => {
        if (snap.exists()) { currentData = snap.val(); refreshAll(); }
    });
    window.openAlbum = openAlbum; window.openCatalog = openCatalog;

    (function blockImageDownload() {
        function disableContextAndDrag(img) {
            img.addEventListener('contextmenu', (e) => { e.preventDefault(); return false; });
            img.addEventListener('dragstart', (e) => { e.preventDefault(); return false; });
        }
        document.querySelectorAll('img').forEach(disableContextAndDrag);
        new MutationObserver(() => {
            document.querySelectorAll('img').forEach(img => {
                if (!img.hasAttribute('data-blocked')) {
                    img.setAttribute('data-blocked', 'true');
                    disableContextAndDrag(img);
                }
            });
        }).observe(document.body, { childList: true, subtree: true });
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) { e.preventDefault(); showToast('تم تعطيل حفظ الصور'); return false; }
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if ((e.ctrlKey || e.metaKey) && (e.key === 'u' || e.key === 'U')) { e.preventDefault(); return false; }
        });
    })();
</script>

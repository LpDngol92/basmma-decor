<head>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8835744121215847" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #fefaf5;
            color: #2d2a27;
            overflow-x: hidden;
            width: 100%;
        }
        :root {
            --gold: #d4af7a;
            --gold-dark: #b88b4a;
            --gold-light: #f8efdf;
            --gray: #6f6a64;
            --card-white: #ffffff;
            --border-light: #efe5d8;
            --shadow-sm: 0 5px 20px rgba(0,0,0,0.03);
            --shadow-md: 0 15px 30px rgba(0,0,0,0.08);
            --whatsapp: #25D366;
            --open-color: #2e7d32;
            --closed-color: #c62828;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseActive {
            0% { transform: scale(1); box-shadow: 0 5px 15px rgba(212,175,122,0.3); }
            50% { transform: scale(1.02); box-shadow: 0 8px 25px rgba(212,175,122,0.5); }
            100% { transform: scale(1); box-shadow: 0 5px 15px rgba(212,175,122,0.3); }
        }
        .glass-card, .album-card, .folder-card, .photo-item, .review-card, .store-category-card {
            animation: fadeInUp 0.6s ease forwards;
        }
        #splash {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #fff9ef, #f7ecd9);
            z-index: 999999;
            display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px;
            transition: opacity 0.6s;
        }
        .splash-logo { font-size: clamp(1.8rem, 8vw, 3rem); font-weight: 800; color: var(--gold-dark); animation: softPulse 1s infinite alternate; }
        @keyframes softPulse { 0% { opacity: 0.6; transform: scale(0.96);} 100% { opacity: 1; transform: scale(1.02);} }
        .splash-line { width: min(70px, 20vw); height: 3px; background: var(--gold); border-radius: 4px; animation: lineGlow 1s infinite alternate; }
        @keyframes lineGlow { 0% { width: 40px; opacity: 0.4;} 100% { width: 120px; opacity: 1;} }
        
        .top-nav {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-light);
            width: 100%;
        }
        .logo-section {
            padding: 20px 16px;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
        }
        .logo-section h1 {
            font-size: clamp(1.5rem, 6vw, 2rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            background-clip: text; -webkit-background-clip: text; color: transparent;
        }
        .logo-section p { font-size: 0.8rem; color: var(--gray); margin-top: 5px; }
        
        /* شركاء النجاح – تم إبقاؤهم ولكن يمكن إخفاؤهم عبر CSS إن أردت */
        .partners-marquee {
            background: #fdf7ef;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-light);
            overflow: hidden;
            white-space: nowrap;
        }
        .marquee-track {
            display: inline-flex;
            gap: 30px;
            animation: marqueeInfinite 35s linear infinite;
            will-change: transform;
        }
        .marquee-track:hover { animation-play-state: paused; }
        @keyframes marqueeInfinite {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .partner-item {
            background: white;
            border-radius: 60px;
            padding: 6px 28px;
            box-shadow: var(--shadow-sm);
            border: 1px solid #e6d9cb;

            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .partner-item:hover { transform: translateY(-5px) scale(1.05); border-color: var(--gold); }
        .partner-logo { height: 55px; width: auto; max-width: 140px; object-fit: contain; }
        @media (max-width: 700px) {
            .partner-logo { height: 40px; max-width: 100px; }
            .partner-item { padding: 4px 16px; }
        }
        
        .scroll-top-fixed {
            position: fixed;

            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;

            cursor: pointer;
            transition: all 0.2s;
        }
        .scroll-top-circle {
            background: var(--gold-dark);

            height: 52px;
            border-radius: 50%;

            align-items: center;

        .scroll-top-fixed:hover .scroll-top-circle { transform: translateY(-4px); background: var(--gold); }
        .scroll-top-text { font-size: 0.7rem; color: var(--gold-dark); background: rgba(255,255,255,0.9); padding: 3px 8px; border-radius: 30px; font-weight: 500; white-space: nowrap; backdrop-filter: blur(4px); }
        @media (max-width: 700px) {
            .scroll-top-fixed { bottom: 20px; right: 15px; }
            .scroll-top-circle { width: 44px; height: 44px; font-size: 1.3rem; }
            .scroll-top-text { font-size: 0.6rem; padding: 2px 6px; }
        }
        
        .tabs-wrapper {
            position: relative;
            background: white;
            border-bottom: 1px solid var(--border-light);
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .tabs-wrapper::-webkit-scrollbar { height: 3px; }
        .tabs-wrapper::-webkit-scrollbar-track { background: var(--border-light); }
        .tabs-wrapper::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
        .tabs-section {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            width: max-content;
            min-width: 100%;
        }
        .tab-btn {
            padding: 8px 18px;
            background: #fef7ef;
            border: 1px solid #e5d9cd;
            font-weight: 600;
            font-size: 0.85rem;

            display: inline-flex;

            gap: 6px;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;

        .tab-btn:active { transform: scale(0.97); }
        .tab-btn.active {
            background: var(--gold);

            border-color: var(--gold);

        .main-content {

            width: 100%;

            padding: 40px 20px 80px;

        @media (max-width: 1200px) { .main-content { padding: 30px 16px 80px; } }
        @media (max-width: 768px) { .main-content { padding: 20px 14px 80px; } }
        
        .glass-card {
            background: var(--card-white);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            transition: 0.3s;
            height: 100%;
        }
        @media (max-width: 768px) { .glass-card { padding: 18px; } }
        .glass-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--gold-light); }
        .card-title {
            font-size: clamp(1.1rem, 5vw, 1.4rem);
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gold-dark);
            border-right: 4px solid var(--gold);
            padding-right: 14px;
        }
        
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }
        @media (max-width: 600px) { .photo-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px; } }
        .photo-item {
            aspect-ratio: 1 / 1;
            background: #eee8e0;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .photo-item:hover { transform: scale(1.02); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .photo-item:hover img { transform: scale(1.05); }
        .photo-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            padding: 8px; display: flex; justify-content: space-between;
            opacity: 0; transition: 0.2s;
        }
        .photo-item:hover .photo-overlay { opacity: 1; }
        .action-btn-icon {
            background: rgba(255,255,255,0.95); border: none;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        /* زر واتساب خاص بالمتجر يظهر أسفل الصورة مباشرة */
        .store-whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #25D366;
            color: white;
            border: none;
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .store-whatsapp-btn:hover { background: #1da15a; transform: scale(0.98); }
        
        .album-card, .folder-card, .store-category-card {
            background: var(--card-white);
            border-radius: 24px;
            padding: 14px;
            text-align: center;
            border: 1px solid var(--border-light);
            transition: 0.25s;
            cursor: pointer;
            position: relative;
        }
        .album-card img, .store-category-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 18px;
            margin-bottom: 8px;
        }
        @media (max-width: 600px) { .album-card img, .store-category-card img { height: 120px; } .album-card, .folder-card { padding: 10px; } }
        .album-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            padding: 12px;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            border-radius: 24px;
        }
        .album-card:hover .album-overlay { opacity: 1; pointer-events: auto; }
        .album-icon-btn {
            background: white; border-radius: 50%; width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            border: none;
        }
        
        .viewer-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.96);
            z-index: 20000; display: none; align-items: center; justify-content: center;
        }
        .viewer-container { width: 100%; height: 85vh; display: flex; align-items: center; justify-content: center; }
        .viewer-img { max-width: 90%; max-height: 85vh; object-fit: contain; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--gray); }
        .toast-msg {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1e1e1e; color: white; padding: 8px 20px;
            border-radius: 50px; z-index: 30001; display: none; font-size: 0.8rem;
            white-space: nowrap;
        }
        @media (max-width: 600px) { .toast-msg { white-space: normal; text-align: center; width: 80%; } }
        .ad-container { margin: 20px 0; text-align: center; min-height: 90px; }
        
        .maintenance-screen {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            z-index: 999999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }
        .maintenance-card {
            background: white;
            border-radius: 48px;
            padding: 40px 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: fadeInUp 0.5s ease;
        }
        .maintenance-card i { font-size: 4rem; color: var(--gold); margin-bottom: 20px; }
        .maintenance-card h2 { font-size: 1.8rem; color: var(--gold-dark); margin-bottom: 15px; }
        .maintenance-card p { color: #4a4a4a; line-height: 1.6; margin-bottom: 25px; }
        .countdown-timer {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--gold-light);
            display: inline-block;
            padding: 15px 30px;
            border-radius: 60px;
            color: var(--gold-dark);
            font-family: monospace;
            letter-spacing: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div id="splash">
    <div class="splash-logo">بصمة غير</div>
    <div class="splash-line"></div>
</div>

<div id="maintenanceScreen" class="maintenance-screen">
    <div class="maintenance-card">
        <i class="fas fa-tools"></i>
        <h2 id="maintenanceTitle">الموقع في صيانة</h2>
        <p id="maintenanceMessage">نعمل على تحسين تجربتك، سنعود قريباً</p>
        <div id="countdownDisplay" class="countdown-timer" style="display: none;">--:--:--</div>
    </div>
</div>

<div class="top-nav">
    <div class="logo-section">
        <h1 id="siteTitle">بصمة غير</h1>
        <p>للديكور والتصميم الداخلي الفاخر</p>
    </div>
    <div class="partners-marquee" id="partnersMarquee" style="display:none;">
        <div class="marquee-track" id="marqueeTrack"></div>
    </div>
    <div class="tabs-wrapper" id="tabsWrapper">
        <div class="tabs-section" id="tabsSection"></div>
    </div>
</div>

<div class="scroll-top-fixed" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <div class="scroll-top-circle"><i class="fas fa-arrow-up"></i></div>
    <div class="scroll-top-text">للعودة للأعلى</div>
</div>

<div id="popupBubble" style="position:fixed; bottom:80px; right:20px; max-width:280px; background:white; border-radius:28px; box-shadow:0 15px 30px rgba(0,0,0,0.15); display:none; z-index:10000; border-right:4px solid var(--gold);">
    <div style="padding:14px; display:flex; gap:10px; align-items:center;">
        <div style="background:var(--gold); border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center; color:white;"><i class="fas fa-gift"></i></div>
        <div id="popupMessage" style="flex:1; font-size:0.85rem;"></div>
        <button onclick="closePopup()" style="background:none; border:none; font-size:1.2rem; cursor:pointer;"><i class="fas fa-times"></i></button>
    </div>
</div>

<div class="main-content" id="mainContent"></div>

<div id="viewerModal" class="viewer-modal">
    <button class="viewer-close" style="position:fixed; top:20px; right:20px; background:rgba(0,0,0,0.6); border:none; color:white; width:44px; height:44px; border-radius:50%; font-size:1.3rem; cursor:pointer;" onclick="closeViewer()"><i class="fas fa-times"></i></button>
    <div style="position:fixed; top:20px; left:20px; display:flex; gap:12px; z-index:20001;">
        <button id="viewerFavBtn" style="background:rgba(0,0,0,0.6); border:none; width:44px; height:44px; border-radius:50%; color:white; font-size:1.2rem; cursor:pointer;" onclick="viewerToggleFavorite()"><i class="far fa-heart"></i></button>
        <button style="background:rgba(0,0,0,0.6); border:none; width:44px; height:44px; border-radius:50%; color:#25D366; font-size:1.2rem; cursor:pointer;" onclick="viewerWhatsapp()"><i class="fab fa-whatsapp"></i></button>
    </div>
    <div class="viewer-container"><img id="viewerImg" class="viewer-img" draggable="false"></div>
    <div style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); border-radius:80px; display:flex; gap:15px; padding:8px 25px; backdrop-filter:blur(12px);">
        <button onclick="viewerPrev()" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;"><i class="fas fa-chevron-right"></i></button>
        <span id="viewerCounter" style="color:white; font-weight:600;">1/1</span>
        <button onclick="viewerNext()" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;"><i class="fas fa-chevron-left"></i></button>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let favorites = [];
    let currentPage = 'works';   // بداية الصفحة أعمالنا (يمكن تغييرها لـ store)
    let currentImageList = [];
    let currentImageIndex = 0;
    let currentImageId = '';
    let clockInterval = null;
    let maintenanceCountdownInterval = null;

    try { const saved = localStorage.getItem('site_favorites_v8'); if (saved) favorites = JSON.parse(saved); } catch(e) {}

    // ========== دوال الصيانة (بدون تغيير) ==========
    function showMaintenanceScreen(untilTimestamp, title, message) {
        const screen = document.getElementById('maintenanceScreen');
        const titleEl = document.getElementById('maintenanceTitle');
        const msgEl = document.getElementById('maintenanceMessage');
        const countdownEl = document.getElementById('countdownDisplay');
        titleEl.innerText = title || 'الموقع في صيانة';
        msgEl.innerText = message || 'نعمل على تحسين تجربتك، سنعود قريباً';
        if (untilTimestamp && untilTimestamp > Date.now()) {
            countdownEl.style.display = 'inline-block';
            if (maintenanceCountdownInterval) clearInterval(maintenanceCountdownInterval);
            const updateCountdown = () => {
                const now = Date.now();
                let diff = untilTimestamp - now;
                if (diff <= 0) {
                    clearInterval(maintenanceCountdownInterval);
                    countdownEl.style.display = 'none';
                    window.location.reload();
                    return;
                }
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (3600000)) / (1000 * 60));
                const seconds = Math.floor((diff % 60000) / 1000);
                countdownEl.innerText = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            };
            updateCountdown();
            maintenanceCountdownInterval = setInterval(updateCountdown, 1000);
        } else {
            countdownEl.style.display = 'none';
            if (maintenanceCountdownInterval) clearInterval(maintenanceCountdownInterval);
        }
        screen.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    
    function hideMaintenanceScreen() {
        const screen = document.getElementById('maintenanceScreen');
        screen.style.display = 'none';
        document.body.style.overflow = '';
        if (maintenanceCountdownInterval) clearInterval(maintenanceCountdownInterval);
    }
    
    function checkMaintenanceAndShow() {
        if (!currentData.maintenance_mode) {
            hideMaintenanceScreen();
            return false;
        }
        const untilTime = currentData.maintenance_until || null;
        const title = currentData.maintenance_title || 'الموقع في صيانة';
        const message = currentData.maintenance_message || 'نعمل على تحسين تجربتك، سنعود قريباً';
        if (untilTime && untilTime <= Date.now()) {
            db.ref(DB_PATH).update({ maintenance_mode: false, maintenance_until: null }).then(() => {
                hideMaintenanceScreen();
                window.location.reload();
            });
            return false;
        }
        showMaintenanceScreen(untilTime, title, message);
        return true;
    }

    function showToast(msg) { const toast = document.getElementById('toastMsg'); if(toast){ toast.innerText = msg; toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 2200); } }
    function saveFav() { localStorage.setItem('site_favorites_v8', JSON.stringify(favorites)); }
    function isFav(imgId) { return favorites.some(f => f.id === imgId); }
    function toggleFavorite(imgId, imgUrl) {
        const exists = favorites.find(f => f.id === imgId);
        if (exists) { favorites = favorites.filter(f => f.id !== imgId); showToast('🗑️ أزيل من المفضلة'); }
        else { favorites.unshift({ id: imgId, url: imgUrl, date: Date.now() }); showToast('❤️ أضيف إلى المفضلة'); }
        saveFav(); renderCurrentPage(); updateViewerFavButton();
    }
    function updateViewerFavButton() {
        const btn = document.getElementById('viewerFavBtn');
        if (btn && currentImageId) {
            if (isFav(currentImageId)) { btn.innerHTML = '<i class="fas fa-heart"></i>'; btn.style.color = '#dc3545'; btn.style.background = 'white'; }
            else { btn.innerHTML = '<i class="far fa-heart"></i>'; btn.style.color = 'white'; btn.style.background = 'rgba(0,0,0,0.6)'; }
        }
    }
    function viewerToggleFavorite() { if (currentImageId && currentImageList[currentImageIndex]) toggleFavorite(currentImageId, currentImageList[currentImageIndex]); }
    function viewerWhatsapp() { window.open(`https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن هذا التصميم:\n'+currentImageList[currentImageIndex])}`, '_blank'); }
    function closeViewer() { document.getElementById('viewerModal').style.display = 'none'; document.body.style.overflow = ''; currentImageList = []; }
    function viewerNext() { if (!currentImageList.length) return; currentImageIndex = (currentImageIndex + 1) % currentImageList.length; document.getElementById('viewerImg').src = currentImageList[currentImageIndex]; document.getElementById('viewerCounter').innerText = `${currentImageIndex+1}/${currentImageList.length}`; currentImageId = `img_${Date.now()}_${currentImageIndex}`; updateViewerFavButton(); }
    function viewerPrev() { if (!currentImageList.length) return; currentImageIndex = (currentImageIndex - 1 + currentImageList.length) % currentImageList.length; document.getElementById('viewerImg').src = currentImageList[currentImageIndex]; document.getElementById('viewerCounter').innerText = `${currentImageIndex+1}/${currentImageList.length}`; currentImageId = `img_${Date.now()}_${currentImageIndex}`; updateViewerFavButton(); }
    function openViewer(url, imageList, index, imgId) {
        if (!imageList || !imageList.length) return;
        currentImageList = imageList; currentImageIndex = index; currentImageId = imgId || `img_${Date.now()}_${index}`;
        document.getElementById('viewerImg').src = url; document.getElementById('viewerCounter').innerText = `${index+1}/${imageList.length}`;
        document.getElementById('viewerModal').style.display = 'flex'; document.body.style.overflow = 'hidden'; updateViewerFavButton();
    }

    // ========== دوال عرض أعمالنا (نفس الكود القديم للألبومات) ==========
    function renderWorks() {
        if (!currentData.albums || Object.keys(currentData.albums).length === 0) return '<div class="empty-state"><i class="fas fa-folder-open fa-3x"></i><p>لا توجد ألبومات بعد</p></div>';
        let html = '<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:16px;">';
        Object.keys(currentData.albums).forEach(id => {
            const alb = currentData.albums[id];
            let cover = ''; if (alb.imgs && Object.keys(alb.imgs).length) cover = Object.values(alb.imgs)[0].url;
            html += `<div class="album-card" data-album-id="${id}">${cover ? `<img src="${cover}" loading="lazy">` : '<i class="fas fa-folder-open fa-3x" style="margin:20px 0;"></i>'}<h4 style="font-size:0.9rem;">${alb.name || 'ألبوم'}</h4><div class="album-overlay"><button class="album-icon-btn" onclick="event.stopPropagation(); toggleFavorite('album_${id}_cover', '${cover}')"><i class="fas fa-heart"></i></button><button class="album-icon-btn" onclick="event.stopPropagation(); window.open('https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent(cover)}','_blank')"><i class="fab fa-whatsapp"></i></button></div></div>`;
        });
        html += '</div>';
        return html;
    }
    function openAlbum(id) { const alb = currentData.albums?.[id]; if (!alb || !alb.imgs) return; const urls = Object.values(alb.imgs).map(i=>i.url).filter(u=>u); if (urls.length) openViewer(urls[0], urls, 0, `album_${id}_0`); else showToast("لا توجد صور"); }

    // ========== دوال قسم متجرنا ==========
    function renderStore() {
        if (!currentData.store_categories || Object.keys(currentData.store_categories).length === 0) {
            return '<div class="empty-state"><i class="fas fa-store fa-3x"></i><p>لا توجد أقسام في المتجر بعد</p></div>';
        }
        let html = '<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:16px;">';
        Object.keys(currentData.store_categories).forEach(id => {
            const cat = currentData.store_categories[id];
            let cover = ''; 
            if (cat.imgs && Object.keys(cat.imgs).length) cover = Object.values(cat.imgs)[0].url;
            html += `<div class="store-category-card" data-store-cat-id="${id}">${cover ? `<img src="${cover}" loading="lazy">` : '<i class="fas fa-store fa-3x" style="margin:20px 0;"></i>'}<h4 style="font-size:0.9rem;">${cat.name || 'قسم'}</h4></div>`;
        });
        html += '</div>';
        return html;
    }
    
    function openStoreCategory(id) {
        const cat = currentData.store_categories?.[id];
        if (!cat || !cat.imgs) { showToast("لا توجد منتجات في هذا القسم"); return; }
        const urls = Object.values(cat.imgs).map(i=>i.url).filter(u=>u);
        if (urls.length === 0) { showToast("لا توجد صور"); return; }
        // عرض الصور مع أزرار واتساب مخصصة
        let html = `<div style="margin-bottom:20px;"><button onclick="history.back()" class="tab-btn" style="background:var(--gold); color:white;"><i class="fas fa-arrow-right"></i> العودة للأقسام</button></div>`;
        html += '<div class="photo-grid">';
        urls.forEach((url, idx) => {
            const imgId = `store_${id}_${idx}`;
            html += `<div class="photo-item" data-img-url="${url}" data-img-index="${idx}">
                        <img src="${url}" loading="lazy">
                        <div class="photo-overlay">
                            <button class="action-btn-icon" onclick="event.stopPropagation(); toggleFavorite('${imgId}', '${url}')"><i class="fas fa-heart"></i></button>
                            <button class="action-btn-icon" onclick="event.stopPropagation(); window.open('https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن هذا المنتج:\n'+url)}', '_blank')"><i class="fab fa-whatsapp"></i></button>
                        </div>
                    </div>`;
        });
        html += '</div>'; 
        // إضافة زر واتساب عام أسفل المعرض إن أردت
        html += `<div style="text-align:center; margin-top:30px;"><button class="store-whatsapp-btn" onclick="window.open('https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن منتجات متجركم')}', '_blank')"><i class="fab fa-whatsapp"></i> تواصل معنا للاستفسار</button></div>`;
        document.getElementById('mainContent').innerHTML = html;
        attachStorePhotoEvents(); // لإعادة فتح العارض عند الضغط على الصورة
        window.currentStoreUrls = urls;
    }
    
    function attachStorePhotoEvents() {
        document.querySelectorAll('.photo-item').forEach(item => {
            item.removeEventListener('click', storePhotoHandler);
            item.addEventListener('click', storePhotoHandler);
        });
    }
    function storePhotoHandler(e) {
        if(e.target.closest('.action-btn-icon')) return;
        const img = this.querySelector('img');
        if(img && window.currentStoreUrls) {
            const idx = window.currentStoreUrls.indexOf(img.src);
            if(idx !== -1) openViewer(img.src, window.currentStoreUrls, idx, `store_img_${Date.now()}_${idx}`);
        }
    }
    
    // ========== دالة عرض الصفحة الرئيسية ==========
    function renderCurrentPage() {
        const main = document.getElementById('mainContent');
        if (!main) return;
        let content = '';
        const adHtml = `<div class="ad-container"><ins class="adsbygoogle" style="display:block;text-align:center;" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-8835744121215847" data-ad-slot="9636122604"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});<\/script></div>`;
        if (currentPage === 'works') {
            content = `<h2 style="margin-bottom:20px; font-size:1.4rem;"><i class="fas fa-images"></i> أعمالنا</h2>${renderWorks()}`;
        } else if (currentPage === 'store') {
            content = `<h2 style="margin-bottom:20px; font-size:1.4rem;"><i class="fas fa-store"></i> متجرنا</h2>${renderStore()}`;
        } else {
            content = '<div class="empty-state">صفحة غير موجودة</div>';
        }
        main.innerHTML = adHtml + content + adHtml;
        document.getElementById('siteTitle').innerText = currentData.site_name || 'بصمة غير';
        attachAlbumEvents();
        attachStoreCategoryEvents();
    }

    function attachAlbumEvents() { 
        document.querySelectorAll('.album-card').forEach(card => { 
            card.removeEventListener('click', albumHandler); 
            card.addEventListener('click', albumHandler); 
        }); 
    }
    function albumHandler(e) { 
        if(e.target.closest('.album-icon-btn')) return; 
        const id = this.dataset.albumId; 
        if(id) openAlbum(id); 
    }
    function attachStoreCategoryEvents() {
        document.querySelectorAll('.store-category-card').forEach(card => {
            card.removeEventListener('click', storeCategoryHandler);
            card.addEventListener('click', storeCategoryHandler);
        });
    }
    function storeCategoryHandler(e) {
        const id = this.dataset.storeCatId;
        if(id) openStoreCategory(id);
    }
    
    // ========== دوال التبويبات الجديدة ==========
    function getPageKeyFromHash() {
        let hash = window.location.hash.substring(1);
        if (!hash || hash === 'أعمالنا') return 'works';
        if (hash === 'متجرنا') return 'store';
        return 'works';
    }

    function updateHashFromPage(pageKey) {
        let hash = '';
        if (pageKey === 'works') hash = 'أعمالنا';
        else if (pageKey === 'store') hash = 'متجرنا';
        if (window.location.hash !== '#' + hash && hash) {
            history.pushState(null, '', '#' + hash);
        }
    }

    function renderTabs() {
        const container = document.getElementById('tabsSection');
        if (!container) return;
        let html = `
            <button class="tab-btn ${currentPage === 'works' ? 'active' : ''}" data-page="works"><i class="fas fa-images"></i> أعمالنا</button>
            <button class="tab-btn ${currentPage === 'store' ? 'active' : ''}" data-page="store"><i class="fas fa-store"></i> متجرنا</button>
        `;
        container.innerHTML = html;
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const page = btn.dataset.page;
                if (page && page !== currentPage) {
                    currentPage = page;
                    updateHashFromPage(currentPage);
                    renderCurrentPage();
                    renderTabs();
                    setTimeout(() => {
                        const activeBtn = document.querySelector('.tab-btn.active');
                        if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }, 100);
                }
            });
        });
        
        setTimeout(() => {
            const activeBtn = document.querySelector('.tab-btn.active');
            if (activeBtn) activeBtn.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' });
        }, 100);
    }
    
    function renderPartnersMarquee() {
        const container = document.getElementById('partnersMarquee');
        const track = document.getElementById('marqueeTrack');
        if (!container || !track) return;
        if (currentData.partners && Object.keys(currentData.partners).length) {
            container.style.display = 'block';
            const logos = Object.values(currentData.partners).map(p => `<div class="partner-item" onclick="window.open('${p.link || '#'}', '_blank')"><img src="${p.url}" class="partner-logo" loading="lazy"></div>`).join('');
            track.innerHTML = logos + logos;
        } else container.style.display = 'none';
    }
    
    function showPopupIfNeeded() { 
        if (currentPage === 'works' && currentData.popup_enabled && currentData.popup_message) { 
            const bubble = document.getElementById('popupBubble'); 
            document.getElementById('popupMessage').innerText = currentData.popup_message; 
            bubble.style.display = 'block'; 
            setTimeout(() => closePopup(), (currentData.popup_duration || 7) * 1000); 
        } 
    }
    
    function closePopup() { document.getElementById('popupBubble').style.display = 'none'; }
    function whatsappGlobal() { window.open(`https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن خدمات الديكور')}`, '_blank'); }
    
    window.toggleFavorite = toggleFavorite; 
    window.openAlbum = openAlbum; 
    window.whatsappGlobal = whatsappGlobal; 
    window.closePopup = closePopup;
    window.viewerToggleFavorite = viewerToggleFavorite; 
    window.viewerWhatsapp = viewerWhatsapp; 
    window.viewerPrev = viewerPrev; 
    window.viewerNext = viewerNext; 
    window.closeViewer = closeViewer; 
    window.openViewer = openViewer;
    window.openStoreCategory = openStoreCategory;

    window.addEventListener('load', () => { 
        setTimeout(() => { 
            const splash = document.getElementById('splash'); 
            if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.style.display = 'none', 500); } 
        }, 900); 
    });
    
    window.addEventListener('hashchange', () => {
        if (!currentData || Object.keys(currentData).length === 0) return;
        const newPage = getPageKeyFromHash();
        if (newPage !== currentPage) {
            currentPage = newPage;
            renderCurrentPage();
            renderTabs();
        }
    });
    
    db.ref(DB_PATH).on('value', (snap) => {
        currentData = snap.val() || {};
        if (checkMaintenanceAndShow()) return;
        currentPage = getPageKeyFromHash();
        renderTabs();
        renderCurrentPage();
        renderPartnersMarquee();
        setTimeout(showPopupIfNeeded, 1500);
    });
</script>
</body>
</html>

    window.closePopup = function() { const bubble = document.getElementById('popupBubble'); if (bubble) bubble.style.display = 'none'; if (popupTimeout) clearTimeout(popupTimeout); };
    function refreshAll() { renderPartnersMarquee(); loadPage(); updateMaintenanceMode(); updatePopup(); }
    
    db.ref(DB_PATH).once('value', snap => { currentData = snap.val() || {}; showSplash({ enabled: currentData.splash_enabled !== false, type: currentData.splash_type || 'image', media_url: currentData.splash_media_url || '', video_url: currentData.splash_video_url || '', duration: currentData.splash_duration || 5, show_skip: currentData.splash_show_skip === true }); refreshAll(); });
    db.ref(DB_PATH).on('value', snap => { currentData = snap.val() || {}; refreshAll(); });
    window.openAlbum = openAlbum; window.openCatalog = openCatalog;
</script>

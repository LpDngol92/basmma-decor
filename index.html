    let splashTimeout, maintenanceInterval, popupTimeout;

    function updateMaintenanceMode() { const d = currentData, screen = document.getElementById('maintenanceScreen'); if (!d.maintenance_mode) { if (screen.style.display !== 'none') screen.style.display = 'none'; if (maintenanceInterval) clearInterval(maintenanceInterval); return; } const until = d.maintenance_until; const title = d.maintenance_title || (currentLang === 'ar' ? 'الموقع في صيانة' : 'Under Maintenance'), msg = d.maintenance_message || (currentLang === 'ar' ? 'نعمل على تحسين تجربتك، سنعود قريباً' : 'We are improving your experience, back soon'); if (until && until <= Date.now()) { db.ref(DB_PATH).update({ maintenance_mode: false, maintenance_until: null }); return; } screen.innerHTML = `<div style="background:white; border-radius:48px; padding:40px; max-width:500px; text-align:center;"><i class="fas fa-tools fa-4x" style="color:var(--primary);"></i><h2 style="margin:15px 0;">${title}</h2><p>${msg}</p>${until ? `<div id="maintenanceCountdown" style="font-size:2rem; font-weight:bold;"></div>` : ''}</div>`; screen.style.display = 'flex'; document.body.style.overflow = 'hidden'; if (until) { const countdownEl = document.getElementById('maintenanceCountdown'); const updateCountdown = () => { let diff = until - Date.now(); if (diff <= 0) { clearInterval(maintenanceInterval); window.location.reload(); return; } const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000); if (countdownEl) countdownEl.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }; updateCountdown(); maintenanceInterval = setInterval(updateCountdown, 1000); } }
    function updatePopup() { const bubble = document.getElementById('popupBubble'), msgSpan = document.getElementById('popupMessage'); if (!currentData.popup_enabled || !currentData.popup_message) { if (bubble) bubble.style.display = 'none'; if (popupTimeout) clearTimeout(popupTimeout); return; } if (bubble.style.display === 'none' || bubble.style.display === '') { msgSpan.innerText = currentData.popup_message; bubble.style.display = 'block'; if (popupTimeout) clearTimeout(popupTimeout); popupTimeout = setTimeout(() => { bubble.style.display = 'none'; }, (currentData.popup_duration || 7) * 1000); } }
    window.closePopup = function() { const bubble = document.getElementById('popupBubble'); if (bubble) bubble.style.display = 'none'; if (popupTimeout) clearTimeout(popupTimeout); };
    function refreshAllPages() { renderPartnersMarquee(); loadPage(); updateMaintenanceMode(); updatePopup(); }
    
    function initLangEvents() {
        const langLinks = document.querySelectorAll('.lang-dropdown-content a');
        langLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const lang = link.getAttribute('data-lang');
                if (lang) setLanguage(lang);
            });
        });
    }
    
    db.ref(DB_PATH).once('value', snap => { currentData = snap.val() || {}; showSplash({ enabled: currentData.splash_enabled !== false, media_url: currentData.splash_media_url || '', duration: currentData.splash_duration || 5, show_skip: currentData.splash_show_skip === true }); refreshAllPages(); initLangEvents(); });
    db.ref(DB_PATH).on('value', snap => { currentData = snap.val() || {}; refreshAllPages(); initLangEvents(); });
    
    window.openAlbum = openAlbum; window.openCatalog = openCatalog;
    (function blockImageDownload() {
        function disableContextAndDrag(img) { img.addEventListener('contextmenu', (e) => { e.preventDefault(); return false; }); img.addEventListener('dragstart', (e) => { e.preventDefault(); return false; }); }
        document.querySelectorAll('img').forEach(disableContextAndDrag);
        const observer = new MutationObserver(() => { document.querySelectorAll('img').forEach(img => { if (!img.hasAttribute('data-blocked')) { img.setAttribute('data-blocked', 'true'); disableContextAndDrag(img); } }); });
        observer.observe(document.body, { childList: true, subtree: true });
        document.addEventListener('keydown', (e) => { if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) { e.preventDefault(); showToast(t('disabled_save')); return false; } if (e.key === 'F12' || ((e.ctrlKey || e.metaKey) && (e.key === 'u' || e.key === 'U'))) { e.preventDefault(); return false; } });
    })();
</script>

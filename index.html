    function showMaintenanceScreen(untilTimestamp, title, message) {
        const screen = document.getElementById('maintenanceScreen');

        const countdownEl = document.getElementById('countdownDisplay');

                const now = Date.now();
                let diff = untilTimestamp - now;
                if (diff <= 0) {
                    clearInterval(maintenanceCountdownInterval);
                    countdownEl.style.display = 'none';
                    window.location.reload();
                    return;
                }
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (3600000)) / (1000 * 60));
                const seconds = Math.floor((diff % 60000) / 1000);
                countdownEl.innerText = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            };
            updateCountdown();
            maintenanceCountdownInterval = setInterval(updateCountdown, 1000);
        } else {
            countdownEl.style.display = 'none';

        }

    // ========== دوال الساعة والتقويم ==========
    function formatTime12(t) { if(!t) return ""; let [h,m]=t.split(':'); h=parseInt(h); return `${h%12||12}:${m} ${h>=12?'م':'ص'}`; }
    
    function drawClock(canvasId, isOpen) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const size = canvas.width = canvas.height = 140;
        const center = size/2;
        const radius = size/2 - 5;
        const now = new Date();
        let hours = now.getHours() % 12;
        let minutes = now.getMinutes();
        let seconds = now.getSeconds();
        const hourAngle = (hours * 30 + minutes * 0.5) * Math.PI / 180;
        const minuteAngle = (minutes * 6 + seconds * 0.1) * Math.PI / 180;
        const secondAngle = (seconds * 6) * Math.PI / 180;
        ctx.clearRect(0, 0, size, size);
        ctx.beginPath();
        ctx.arc(center, center, radius, 0, 2 * Math.PI);
        ctx.fillStyle = '#fefaf5';
        ctx.fill();
        ctx.strokeStyle = isOpen ? '#2e7d32' : '#c62828';
        ctx.lineWidth = 4;
        ctx.stroke();
        for (let i = 1; i <= 12; i++) {
            let angle = i * 30 * Math.PI / 180;
            let x1 = center + (radius - 12) * Math.sin(angle);
            let y1 = center - (radius - 12) * Math.cos(angle);
            let x2 = center + (radius - 5) * Math.sin(angle);
            let y2 = center - (radius - 5) * Math.cos(angle);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#b88b4a';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        ctx.beginPath();
        ctx.moveTo(center, center);
        let hourX = center + (radius * 0.45) * Math.sin(hourAngle);
        let hourY = center - (radius * 0.45) * Math.cos(hourAngle);
        ctx.lineTo(hourX, hourY);
        ctx.strokeStyle = '#5d4037';
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(center, center);
        let minuteX = center + (radius * 0.65) * Math.sin(minuteAngle);
        let minuteY = center - (radius * 0.65) * Math.cos(minuteAngle);
        ctx.lineTo(minuteX, minuteY);
        ctx.strokeStyle = '#5d4037';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(center, center);
        let secondX = center + (radius * 0.75) * Math.sin(secondAngle);
        let secondY = center - (radius * 0.75) * Math.cos(secondAngle);
        ctx.lineTo(secondX, secondY);
        ctx.strokeStyle = '#c9a96e';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(center, center, 4, 0, 2 * Math.PI);
        ctx.fillStyle = '#b88b4a';
        ctx.fill();
    }
    
    function updateClockAndStatus() {
        if (!currentData.work_schedule) return;
        const now = new Date();

        let open = false;
        if (s && s.active) {
            const toMins = (t) => { let [h,m]=t.split(':').map(Number); return h*60+m; };
            const cur = now.getHours()*60+now.getMinutes();
            const s1 = toMins(s.s1_s), e1 = toMins(s.s1_e);
            if (cur >= s1 && cur < e1) open = true;
            if (!open && s.s2_a && s.s2_s && s.s2_e) {
                const s2 = toMins(s.s2_s), e2 = toMins(s.s2_e);
                if ((e2 < s2 && (cur >= s2 || cur < e2)) || (cur >= s2 && cur < e2)) open = true;
            }
        }
        drawClock('clockCanvas', open);
        const digitalSpan = document.getElementById('digitalTime');
        if (digitalSpan) digitalSpan.innerText = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

    function getGroupedScheduleHtml(d) {
        if (!d.work_schedule) return '<p>لم تحدد المواعيد</p>';
        const dayNames = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
        const daysOrder = [6,0,1,2,3,4,5];
        let groups = [], offDays = [];
        daysOrder.forEach(jsDay => {
            const s = d.work_schedule[jsDay];
            if (s && s.active) {
                const key = `${s.s1_s}-${s.s1_e}-${s.s2_a}`;
                let g = groups.find(g => g.key === key);
                if (g) g.days.push(dayNames[jsDay]);
                else groups.push({ key, days: [dayNames[jsDay]], data: s });
            } else offDays.push(dayNames[jsDay]);
        });
        let html = '';
        groups.forEach(g => {
            const dText = g.days.length === 1 ? g.days[0] : `من ${g.days[0]} إلى ${g.days[g.days.length-1]}`;
            html += `<div class="schedule-group"><div class="schedule-days">${dText}</div><div class="time-period"><span class="time-text">${formatTime12(g.data.s1_s||'09:00')}</span> — <span class="time-text">${formatTime12(g.data.s1_e||'17:00')}</span></div>`;

            html += `</div>`;

        if (offDays.length) html += `<div class="holiday-text" style="background:#fff0ea; padding:8px; border-radius:20px; margin-top:8px;"><i class="fas fa-moon"></i> عطلة: ${offDays.join('، ')}</div>`;

        });
        html += '</div>';
        html += `<button class="store-whatsapp-btn" onclick="window.open('https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن منتجات متجركم')}', '_blank')"><i class="fab fa-whatsapp"></i> تواصل معنا للاستفسار</button>`;
        document.getElementById('mainContent').innerHTML = html;
        window.currentStoreUrls = urls;
        attachStorePhotoEvents();
    }
    
    function goBackToStore() {
        currentPage = 'store';
        renderCurrentPage();
        renderTabs();
        updateHashFromPage('store');
    }
    
    function attachStorePhotoEvents() {
        document.querySelectorAll('.photo-item').forEach(item => {
            item.removeEventListener('click', storePhotoHandler);
            item.addEventListener('click', storePhotoHandler);
        });
    }
    function storePhotoHandler(e) {
        if(e.target.closest('.action-btn-icon')) return;
        const img = this.querySelector('img');
        if(img && window.currentStoreUrls) {
            const idx = window.currentStoreUrls.indexOf(img.src);
            if(idx !== -1) openViewer(img.src, window.currentStoreUrls, idx, `store_img_${Date.now()}_${idx}`);
        }
    }
    
    // ========== دالة عرض الصفحة الرئيسية ==========
    function renderCurrentPage() {
        const main = document.getElementById('mainContent');
        if (!main) return;
        let content = '';
        const adHtml = `<div class="ad-container"><ins class="adsbygoogle" style="display:block;text-align:center;" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-8835744121215847" data-ad-slot="9636122604"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});<\/script></div>`;
        if (currentPage === 'home') {
            content = renderHome();
        } else if (currentPage === 'works') {
            content = `<h2 style="margin-bottom:20px; font-size:1.4rem;"><i class="fas fa-images"></i> أعمالنا</h2>${renderWorks()}`;
        } else if (currentPage === 'store') {
            content = `<h2 style="margin-bottom:20px; font-size:1.4rem;"><i class="fas fa-store"></i> متجرنا</h2>${renderStore()}`;
        } else {
            content = '<div class="empty-state">صفحة غير موجودة</div>';
        }
        main.innerHTML = adHtml + content + adHtml;
        document.getElementById('siteTitle').innerText = currentData.site_name || 'بصمة غير';
        
        if (currentPage === 'home') {
            if (clockInterval) clearInterval(clockInterval);
            setTimeout(() => { updateClockAndStatus(); clockInterval = setInterval(updateClockAndStatus, 1000); }, 100);
        } else if (clockInterval) clearInterval(clockInterval);
        
        setTimeout(() => setupStarRating(), 100);
        attachAlbumEvents();
        attachStoreCategoryEvents();
    }

    function attachAlbumEvents() { 
        document.querySelectorAll('.album-card').forEach(card => { 
            card.removeEventListener('click', albumHandler); 
            card.addEventListener('click', albumHandler); 
        }); 
    }
    function albumHandler(e) { 
        if(e.target.closest('.album-icon-btn')) return; 
        const id = this.dataset.albumId; 
        if(id) openAlbum(id); 
    }
    function attachStoreCategoryEvents() {
        document.querySelectorAll('.store-category-card').forEach(card => {
            card.removeEventListener('click', storeCategoryHandler);
            card.addEventListener('click', storeCategoryHandler);
        });
    }
    function storeCategoryHandler(e) {
        const id = this.dataset.storeCatId;
        if(id) openStoreCategory(id);
    }
    
    function setupStarRating() {
        let selected = 0;
        const stars = document.querySelectorAll('#starRating i');
        stars.forEach(s => { 
            s.onclick = () => { 
                selected = parseInt(s.dataset.star); 
                stars.forEach(st => st.classList.remove('active')); 
                for(let i=stars.length-1; i>=stars.length-selected; i--) stars[i]?.classList.add('active'); 
            }; 
        });
        window.submitReview = () => {
            const name = document.getElementById('reviewName')?.value;
            const msg = document.getElementById('reviewMsg')?.value;
            if (!name || !msg || !selected) return showToast('يرجى إكمال الاسم والتقييم والنص');
            db.ref(DB_PATH+'/reviews').push({ name, message: msg, rating: selected }).then(() => { 
                showToast('شكراً لتقييمك!'); 
                document.getElementById('reviewName').value = ''; 
                document.getElementById('reviewMsg').value = ''; 
                stars.forEach(s => s.classList.remove('active')); 
                selected = 0; 
                renderCurrentPage(); 
            });
        };
    }
    
    // ========== دوال التبويبات والروابط ==========
    function getPageKeyFromHash() {
        let hash = window.location.hash.substring(1);
        if (!hash) return 'home';
        if (hash === 'الرئيسية') return 'home';
        if (hash === 'أعمالنا') return 'works';
        if (hash === 'متجرنا') return 'store';
        return 'home';
    }

    function updateHashFromPage(pageKey) {
        let hash = '';
        if (pageKey === 'home') hash = 'الرئيسية';
        else if (pageKey === 'works') hash = 'أعمالنا';
        else if (pageKey === 'store') hash = 'متجرنا';
        if (window.location.hash !== '#' + hash && hash) {
            history.pushState(null, '', '#' + hash);
        }
    }

    function renderTabs() {
        const container = document.getElementById('tabsSection');
        if (!container) return;
        let html = `
            <button class="tab-btn ${currentPage === 'home' ? 'active' : ''}" data-page="home"><i class="fas fa-home"></i> الرئيسية</button>
            <button class="tab-btn ${currentPage === 'works' ? 'active' : ''}" data-page="works"><i class="fas fa-images"></i> أعمالنا</button>
            <button class="tab-btn ${currentPage === 'store' ? 'active' : ''}" data-page="store"><i class="fas fa-store"></i> متجرنا</button>
        `;
        container.innerHTML = html;
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const page = btn.dataset.page;
                if (page && page !== currentPage) {
                    currentPage = page;
                    updateHashFromPage(currentPage);
                    renderCurrentPage();
                    renderTabs();
                    setTimeout(() => {
                        const activeBtn = document.querySelector('.tab-btn.active');
                        if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }, 100);
                }
            });
        });
        
        setTimeout(() => {
            const activeBtn = document.querySelector('.tab-btn.active');
            if (activeBtn) activeBtn.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' });
        }, 100);
    }
    
    function renderPartnersMarquee() {
        const container = document.getElementById('partnersMarquee');
        const track = document.getElementById('marqueeTrack');
        if (!container || !track) return;
        if (currentData.partners && Object.keys(currentData.partners).length) {
            container.style.display = 'block';
            const logos = Object.values(currentData.partners).map(p => `<div class="partner-item" onclick="window.open('${p.link || '#'}', '_blank')"><img src="${p.url}" class="partner-logo" loading="lazy"></div>`).join('');
            track.innerHTML = logos + logos;
        } else container.style.display = 'none';
    }
    
    function showPopupIfNeeded() { 
        if (currentPage === 'home' && currentData.popup_enabled && currentData.popup_message) { 
            const bubble = document.getElementById('popupBubble'); 
            document.getElementById('popupMessage').innerText = currentData.popup_message; 
            bubble.style.display = 'block'; 
            setTimeout(() => closePopup(), (currentData.popup_duration || 7) * 1000); 
        } 
    }
    
    function closePopup() { document.getElementById('popupBubble').style.display = 'none'; }
    function whatsappGlobal() { window.open(`https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن خدمات الديكور')}`, '_blank'); }
    
    window.toggleFavorite = toggleFavorite; 
    window.openAlbum = openAlbum; 
    window.whatsappGlobal = whatsappGlobal; 
    window.closePopup = closePopup;
    window.viewerToggleFavorite = viewerToggleFavorite; 
    window.viewerWhatsapp = viewerWhatsapp; 
    window.viewerPrev = viewerPrev; 
    window.viewerNext = viewerNext; 
    window.closeViewer = closeViewer; 
    window.openViewer = openViewer;
    window.goBackToStore = goBackToStore;

    window.addEventListener('load', () => { 
        setTimeout(() => { 
            const splash = document.getElementById('splash'); 
            if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.style.display = 'none', 500); } 
        }, 900); 
    });
    
    window.addEventListener('hashchange', () => {
        if (!currentData || Object.keys(currentData).length === 0) return;
        const newPage = getPageKeyFromHash();
        if (newPage !== currentPage) {
            currentPage = newPage;
            renderCurrentPage();
            renderTabs();
        }
    });
    
    db.ref(DB_PATH).on('value', (snap) => {
        currentData = snap.val() || {};
        if (checkMaintenanceAndShow()) return;
        currentPage = getPageKeyFromHash();
        renderTabs();
        renderCurrentPage();
        renderPartnersMarquee();
        setTimeout(showPopupIfNeeded, 1500);
    });
</script>
</body>
</html>

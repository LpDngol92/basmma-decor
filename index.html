    async function startCurrentVideo() {
        if (storyInterval) clearInterval(storyInterval);
        const counterSpan = document.getElementById('storyCounter');
        if (counterSpan) counterSpan.innerText = `${currentStoryIndex+1}/${storiesVideos.length}`;
        storyVideoElements.forEach((vid, idx) => {

        for (let i = 0; i < storiesVideos.length; i++) {
            const fill = document.getElementById(`progressFill_${i}`);

        }
        const currentFill = document.getElementById(`progressFill_${currentStoryIndex}`);
        let startTime = Date.now();
        const duration = (currentData.splash_duration || 7) * 1000;
        
        const updateProgress = () => {

            let percent = Math.min(100, (elapsed / duration) * 100);

            if (elapsed >= duration) {

                if (currentStoryIndex + 1 < storiesVideos.length) navigateStory(1);

        };
        
        await playVideoWithSound(currentVideo);
        storyInterval = setInterval(updateProgress, 50);

    // ========== Lightbox مع التقييم والمشاهدات ==========
    const imgElement = document.getElementById('lightboxImg');
    const lightbox = document.getElementById('lightbox');
    const counterSpan = document.getElementById('lightboxCounter');
    const waBtn = document.getElementById('lightboxWhatsappBtn');
    const ratingDiv = document.getElementById('lightboxRating');
    const ratingStarsDiv = document.getElementById('ratingStars');
    const ratingStatsDiv = document.getElementById('ratingStats');
    
    let scale = 1, translateX = 0, translateY = 0, startX = 0, startY = 0, isPanning = false;
    let initialPinchDist = 0, startScale = 1, pinchCenterX = 0, pinchCenterY = 0, touchStartX = 0;

    function setTransform() { imgElement.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`; }
    function resetTransform() { scale = 1; translateX = 0; translateY = 0; setTransform(); }
    function clampMovement() {
        const containerRect = imgElement.parentElement.getBoundingClientRect();
        const imgRect = imgElement.getBoundingClientRect();
        const maxX = Math.max(0, (imgRect.width * scale - containerRect.width) / 2);
        const maxY = Math.max(0, (imgRect.height * scale - containerRect.height) / 2);
        translateX = Math.min(Math.max(translateX, -maxX), maxX);
        translateY = Math.min(Math.max(translateY, -maxY), maxY);
        setTransform();
    }
    function onMouseDown(e) { if (scale <= 1) return; e.preventDefault(); isPanning = true; startX = e.clientX - translateX; startY = e.clientY - translateY; imgElement.style.cursor = 'grabbing'; }
    function onMouseMove(e) { if (!isPanning) return; translateX = e.clientX - startX; translateY = e.clientY - startY; clampMovement(); }
    function onMouseUp() { isPanning = false; imgElement.style.cursor = 'grab'; }
    function getDistance(touches) { return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY); }
    function onTouchStart(e) {
        if (e.touches.length === 2) {
            e.preventDefault();
            initialPinchDist = getDistance(e.touches);
            startScale = scale;
            pinchCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            pinchCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            document.getElementById('zoomHint').style.opacity = '1';
            setTimeout(() => document.getElementById('zoomHint').style.opacity = '0', 2000);
        } else if (e.touches.length === 1) {
            touchStartX = e.touches[0].clientX;
            if (scale > 1) { isPanning = true; startX = e.touches[0].clientX - translateX; startY = e.touches[0].clientY - translateY; }
        }
    }
    function onTouchMove(e) {
        if (e.touches.length === 2 && initialPinchDist > 0) {
            e.preventDefault();
            const newDist = getDistance(e.touches);
            let newScale = startScale * (newDist / initialPinchDist);
            newScale = Math.min(4, Math.max(1, newScale));
            if (newScale !== scale) {
                const rect = imgElement.getBoundingClientRect();
                const offsetX = pinchCenterX - rect.left;
                const offsetY = pinchCenterY - rect.top;
                const ratio = newScale / scale;
                translateX = pinchCenterX - rect.left - (offsetX - translateX) * ratio;
                translateY = pinchCenterY - rect.top - (offsetY - translateY) * ratio;
                scale = newScale;
                clampMovement();
            }
        } else if (e.touches.length === 1 && isPanning && scale > 1) {
            e.preventDefault();
            translateX = e.touches[0].clientX - startX;
            translateY = e.touches[0].clientY - startY;
            clampMovement();
        }
    }
    function onTouchEnd(e) {
        if (e.touches.length < 2) initialPinchDist = 0;
        if (e.touches.length === 0) {
            if (touchStartX && e.changedTouches[0] && scale <= 1) {
                const diff = e.changedTouches[0].clientX - touchStartX;
                if (Math.abs(diff) > 50) { if (diff > 0) prevImage(); else nextImage(); }
            }
            touchStartX = 0; isPanning = false;
        }
    }
    function onWheel(e) {
        e.preventDefault();
        let delta = e.deltaY > 0 ? -0.1 : 0.1;
        let newScale = scale + delta;
        newScale = Math.min(4, Math.max(1, newScale));
        if (newScale === scale) return;
        const rect = imgElement.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const ratio = newScale / scale;
        translateX = e.clientX - rect.left - (mouseX - translateX) * ratio;
        translateY = e.clientY - rect.top - (mouseY - translateY) * ratio;
        scale = newScale;
        clampMovement();
        document.getElementById('zoomHint').style.opacity = '1';
        setTimeout(() => document.getElementById('zoomHint').style.opacity = '0', 2000);
    }
    function bindLightboxEvents() {
        imgElement.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        imgElement.addEventListener('touchstart', onTouchStart, { passive: false });
        imgElement.addEventListener('touchmove', onTouchMove, { passive: false });
        imgElement.addEventListener('touchend', onTouchEnd);
        imgElement.addEventListener('wheel', onWheel, { passive: false });
    }
    function unbindLightboxEvents() {
        imgElement.removeEventListener('mousedown', onMouseDown);
        window.removeEventListener('mousemove', onMouseMove);
        window.removeEventListener('mouseup', onMouseUp);
        imgElement.removeEventListener('touchstart', onTouchStart);
        imgElement.removeEventListener('touchmove', onTouchMove);
        imgElement.removeEventListener('touchend', onTouchEnd);
        imgElement.removeEventListener('wheel', onWheel);
    }
    function updateCounter() { counterSpan.innerText = `${currentIndex+1} / ${currentImageList.length}`; }
    
    async function incrementAlbumViews(albumId) {
        if (!albumId) return;
        const sessionKey = `viewed_${albumId}`;
        if (sessionStorage.getItem(sessionKey)) return;
        const albumRef = db.ref(`${DB_PATH}/albums/${albumId}`);
        await albumRef.transaction(album => { if (album) album.views = (album.views || 0) + 1; return album; });
        sessionStorage.setItem(sessionKey, '1');

    async function updateRatingUI(albumId) {
        if (!albumId || !ratingDiv) return;
        const album = currentData.albums?.[albumId];
        if (!album) { ratingDiv.style.display = 'none'; return; }
        ratingDiv.style.display = 'flex';
        const avg = (album.rating_sum && album.rating_count) ? (album.rating_sum / album.rating_count) : 0;
        const count = album.rating_count || 0;
        const views = album.views || 0;
        ratingStatsDiv.innerHTML = `⭐ ${avg.toFixed(1)} (${count} تقييم) | 👁️ ${views} مشاهدة`;
        let starsHtml = '';
        for (let i = 1; i <= 5; i++) {
            let starClass = 'star';

            starsHtml += `<i class="fas fa-star ${starClass}" data-value="${i}"></i>`;
        }

        document.querySelectorAll('#ratingStars .star').forEach(star => {
            star.style.cursor = 'pointer';

    async function handleStarClick(e) {

    async function submitRating(albumId, rating) {
        if (!albumId) return;
        const storageKey = `rated_${albumId}`;
        if (localStorage.getItem(storageKey)) { showToast('لقد قمت بتقييم هذا الألبوم مسبقاً'); return; }
        const albumRef = db.ref(`${DB_PATH}/albums/${albumId}`);
        await albumRef.transaction(album => {
            if (album) {
                album.rating_sum = (album.rating_sum || 0) + rating;
                album.rating_count = (album.rating_count || 0) + 1;
            }
            return album;
        });
        localStorage.setItem(storageKey, '1');
        const snap = await albumRef.once('value');
        const updated = snap.val();
        if (updated && currentData.albums) {
            currentData.albums[albumId] = updated;
            await updateRatingUI(albumId);
            showToast(`شكراً لتقييمك (${rating} نجوم)`);
        }
    }

    function nextImage() { if (!currentImageList.length) return; currentIndex = (currentIndex + 1) % currentImageList.length; setImageWithRetry(imgElement, currentImageList[currentIndex], 3); resetTransform(); updateCounter(); }
    function prevImage() { if (!currentImageList.length) return; currentIndex = (currentIndex - 1 + currentImageList.length) % currentImageList.length; setImageWithRetry(imgElement, currentImageList[currentIndex], 3); resetTransform(); updateCounter(); }

    function buildHomeSlider() {
        const container = document.getElementById('homeSliderContainer');
        if (!container) return;
        const sliderData = currentData.home_slider;
        if (!sliderData || !sliderData.enabled || !sliderData.images || sliderData.images.length === 0) {
            buildAlbumsBackup(container);
            return;
        }
        sliderImages = sliderData.images.map(img => img.url).filter(url => url);
        if (sliderImages.length === 0) { buildAlbumsBackup(container); return; }
        autoDuration = (sliderData.duration || 5) * 1000;
        let html = `<div class="slider-container"><div class="slider-track" id="sliderTrack">`;
        sliderImages.forEach((url, idx) => { html += `<div class="slider-item" data-index="${idx}"><img src="${url}" loading="lazy" onerror="this.src='https://placehold.co/600x1067?text=خطأ+تحميل';"></div>`; });
        html += `</div><div class="slider-nav"><div class="slider-dots" id="sliderDots"></div></div></div>`;
        container.innerHTML = html;
        const dotsDiv = document.getElementById('sliderDots');
        if (dotsDiv) {
            dotsDiv.innerHTML = sliderImages.map((_, i) => `<div class="dot ${i === currentSlideIndex ? 'active' : ''}" data-dot="${i}"></div>`).join('');
            dotsDiv.querySelectorAll('.dot').forEach(dot => { dot.addEventListener('click', (e) => { const idx = parseInt(dot.getAttribute('data-dot')); if (!isNaN(idx)) goToSlide(idx); }); });
        }
        sliderTrack = document.getElementById('sliderTrack');
        const sliderItems = document.querySelectorAll('.slider-item');
        if (!sliderTrack || sliderItems.length === 0) return;
        function updateSliderPosition(animate = true) {
            const containerWidth = sliderTrack.parentElement.clientWidth;
            const activeItem = sliderItems[currentSlideIndex];
            if (!activeItem) return;
            const activeRect = activeItem.getBoundingClientRect();
            const offset = activeRect.left + activeRect.width/2 - containerWidth/2;
            sliderTrack.style.transition = animate ? 'transform 0.5s ease' : 'none';
            sliderTrack.style.transform = `translateX(${-offset}px)`;
            sliderItems.forEach((item, idx) => { if (idx === currentSlideIndex) item.classList.add('active'); else item.classList.remove('active'); });
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, idx) => { if (idx === currentSlideIndex) dot.classList.add('active'); else dot.classList.remove('active'); });
        }
        function goToSlide(newIndex) {
            if (newIndex < 0) newIndex = sliderImages.length - 1;
            if (newIndex >= sliderImages.length) newIndex = 0;
            if (newIndex === currentSlideIndex) return;
            currentSlideIndex = newIndex;
            updateSliderPosition(true);
        }
        function nextSlide() { let next = currentSlideIndex + 1; if (next >= sliderImages.length) next = 0; goToSlide(next); }
        function startAutoSlide() { if (sliderInterval) clearInterval(sliderInterval); sliderInterval = setInterval(() => { if (!isSliderPaused) nextSlide(); }, autoDuration); }
        function pauseSlider() { isSliderPaused = true; }
        function resumeSlider() { isSliderPaused = false; }
        sliderItems.forEach((item, idx) => { item.addEventListener('click', (e) => { e.stopPropagation(); pauseSlider(); openLightbox(sliderImages, idx); }); });
        window.addEventListener('resize', () => updateSliderPosition(false));
        setTimeout(() => updateSliderPosition(false), 100);
        startAutoSlide();
        window.resumeSlider = resumeSlider;
        window.pauseSlider = pauseSlider;
    }

        cont.innerHTML = html;
        document.querySelectorAll('#allProductsGrid .product-card').forEach(card => {
            card.addEventListener('click', (e) => { if (!e.target.closest('.whatsapp-order')) { const imgUrl = card.getAttribute('data-product-url'); if (imgUrl) openLightbox([imgUrl], 0); } });
        });
    }
    
    function buildCatalogsPageGrid() {
        const cont = document.getElementById('catalogsPageGrid');
        if (!cont) return;
        if (!currentData.catalogs || Object.keys(currentData.catalogs).length === 0) { cont.innerHTML = '<div class="empty-state">لا توجد كتالوجات</div>'; return; }
        let html = '<div class="grid-auto">';
        Object.keys(currentData.catalogs).forEach(id => {
            const cat = currentData.catalogs[id];
            html += `<div class="card" data-catalog="${id}"><div class="card-body"><i class="fas fa-book-open fa-3x" style="color:var(--primary);"></i><div class="card-title">${cat.name}</div><small style="color:var(--gray);">اضغط للعرض</small></div></div>`;
        });
        html += '</div>';
        cont.innerHTML = html;
        document.querySelectorAll('#catalogsPageGrid .card').forEach(c => { c.addEventListener('click', () => openCatalog(c.getAttribute('data-catalog'))); });
    }
    
    function openCatalogModal(code) { const modal = document.getElementById('catalogModal'), iframe = document.getElementById('catalogIframe'); iframe.srcdoc = code; modal.style.display = 'flex'; document.body.style.overflow = 'hidden'; }
    function closeCatalogModal() { document.getElementById('catalogModal').style.display = 'none'; document.getElementById('catalogIframe').srcdoc = ''; document.body.style.overflow = ''; }
    document.querySelector('.catalog-modal-close').onclick = closeCatalogModal;
    function openCatalog(id) { const cat = currentData.catalogs?.[id]; if (cat && cat.code) openCatalogModal(cat.code); else showToast('الكتالوج غير متاح'); }
    
    function formatTime12(t) { if (!t) return ''; let [h, m] = t.split(':'); h = parseInt(h); return `${h % 12 || 12}:${m} ${h >= 12 ? 'م' : 'ص'}`; }
    
    function getGroupedScheduleHtml(d) {
        if (!d.work_schedule) return '<p>لم تحدد المواعيد</p>';
        const days = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
        const order = [6,0,1,2,3,4,5];
        let groups = [], off = [];
        order.forEach(jsDay => {
            const s = d.work_schedule[jsDay];
            if (s && s.active) {
                const key = `${s.s1_s}-${s.s1_e}-${s.s2_a}`;
                let g = groups.find(g => g.key === key);
                if (g) g.days.push(days[jsDay]);
                else groups.push({ key, days: [days[jsDay]], data: s });
            } else off.push(days[jsDay]);
        });
        let html = '';
        groups.forEach(g => {
            const dTxt = g.days.length === 1 ? g.days[0] : `من ${g.days[0]} إلى ${g.days[g.days.length-1]}`;
            html += `<div class="schedule-item"><strong>${dTxt}</strong><br>${formatTime12(g.data.s1_s)} - ${formatTime12(g.data.s1_e)}`;
            if (g.data.s2_a) html += `<br>${formatTime12(g.data.s2_s)} - ${formatTime12(g.data.s2_e)}`;
            html += `</div>`;
        });
        if (off.length) html += `<div class="schedule-item"><strong>عطلة:</strong> ${off.join('، ')}</div>`;
        return html;
    }
    
    function updateFooterData() {
        const d = currentData;
        currentWhatsappNum = d.whatsapp_num || '966500000000';
        document.getElementById('siteTitle').innerText = d.site_name || 'بصمة غير';
        document.getElementById('footerPhone').innerHTML = `<a href="tel:0541780995" style="color:inherit;">0541780995</a>`;
        document.getElementById('footerWhatsapp').innerHTML = `<a href="https://wa.me/${currentWhatsappNum}" target="_blank" style="color:#25D366;">${currentWhatsappNum}</a>`;
        document.getElementById('footerLocation').innerHTML = d.location_url ? `<a href="${d.location_url}" target="_blank">جدة</a>` : 'جدة';
        const soc = document.getElementById('socialIcons');
        if (soc) { let s = ''; if (d.insta_url) s += `<a href="${d.insta_url}" target="_blank"><i class="fab fa-instagram"></i></a>`; if (d.tiktok_url) s += `<a href="${d.tiktok_url}" target="_blank"><i class="fab fa-tiktok"></i></a>`; if (d.snap_url) s += `<a href="${d.snap_url}" target="_blank"><i class="fab fa-snapchat"></i></a>`; soc.innerHTML = s; }
        const hoursDiv = document.getElementById('footerHours');
        if (hoursDiv) hoursDiv.innerHTML = getGroupedScheduleHtml(d);
        if (d.footer_text) document.getElementById('footerCopyright').innerHTML = d.footer_text;
        else document.getElementById('footerCopyright').innerHTML = '© 2025 بصمة غير - جميع الحقوق محفوظة';
    }
    
    function renderPartnersMarquee() {
        const cont = document.getElementById('partnersMarquee'), track = document.getElementById('marqueeTrack');
        if (!cont || !track) return;
        if (currentData.partners && Object.keys(currentData.partners).length) {
            cont.style.display = 'block';
            let logos = '';
            Object.values(currentData.partners).forEach(p => {
                logos += `<div class="partner-item" onclick="window.open('${p.link || '#'}', '_blank')"><img src="${p.url}" class="partner-logo" loading="lazy" onerror="this.src='https://placehold.co/200x60?text=شريك'"></div>`;
            });
            track.innerHTML = logos + logos;
        } else cont.style.display = 'none';
    }

    // ========== التنقل بين الصفحات ==========
    function navHandler(e) { e.preventDefault(); const page = this.getAttribute('data-page'); if (page) changePage(page); }
    
    function renderNavLinks() {
        const container = document.getElementById('navLinks');
        if (!container) return;
        const pages = [
            { id: 'home', name: 'الرئيسية', icon: 'fas fa-home' },
            { id: 'store', name: 'المتجر', icon: 'fas fa-store' },
            { id: 'works', name: 'أعمالنا', icon: 'fas fa-images' },
            { id: 'catalogs', name: 'الكتالوجات', icon: 'fas fa-book-open' },
            { id: 'contact', name: 'اتصل بنا', icon: 'fas fa-phone-alt' }
        ];
        let html = '';
        pages.forEach(p => { html += `<a data-page="${p.id}" class="${currentPage === p.id ? 'active' : ''}"><i class="${p.icon}"></i> ${p.name}</a>`; });
        container.innerHTML = html;
        container.querySelectorAll('[data-page]').forEach(link => { link.removeEventListener('click', navHandler); link.addEventListener('click', navHandler); });
    }
    
    function changePage(page) { if (currentPage === page) return; currentPage = page; loadPage(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    
    function bindHeroButtons() { document.querySelectorAll('.btn[data-page]').forEach(btn => { btn.removeEventListener('click', heroClickHandler); btn.addEventListener('click', heroClickHandler); }); }
    
    function heroClickHandler(e) { e.preventDefault(); const page = this.getAttribute('data-page'); if (page) changePage(page); }
    
    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
    
    function loadPage() {
        const main = document.getElementById('mainContent');
        if (!main) return;
        if (currentPage === 'home') {
            const sliderTitle = (currentData.home_slider && currentData.home_slider.title) ? currentData.home_slider.title : 'أحدث أعمالنا';
            main.innerHTML = `<div class="hero"><div class="container"><h1>بصمة غير: ديكورات معارض ومحلات تجارية في جدة</h1><p>ديكورات خشب، دواليب عرض، ارفف تخزين، كاونترات استقبال، مكتبات تلفزيون - تصاميم فاخرة</p><div class="btn-group"><a class="btn btn-primary" data-page="store">تسوق الآن</a><a class="btn btn-outline" data-page="works">شاهد أعمالنا</a><a class="btn btn-outline" data-page="catalogs">الكتالوجات</a></div></div></div><div class="container section"><h2 class="section-title">${sliderTitle}</h2><div id="homeSliderContainer"></div></div>`;
            buildHomeSlider();
        } else if (currentPage === 'store') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">جميع المنتجات</h2><div id="allProductsGrid"></div></div>`;
            buildAllProductsGrid();
        } else if (currentPage === 'works') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">أعمالنا</h2><div id="worksGrid"></div></div>`;
            buildWorksGrid();
        } else if (currentPage === 'catalogs') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">الكتالوجات</h2><div id="catalogsPageGrid"></div></div>`;
            buildCatalogsPageGrid();
        } else if (currentPage === 'contact') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">اتصل بنا</h2><div style="display:flex; justify-content:center; gap:2rem; flex-wrap:wrap; text-align:center;"><a href="tel:0541780995" style="text-decoration:none;"><div><i class="fas fa-phone fa-2x" style="color:var(--primary);"></i><p>اتصل بنا</p></div></a><a href="https://wa.me/${currentWhatsappNum}" target="_blank" style="text-decoration:none;"><div><i class="fab fa-whatsapp fa-2x" style="color:#25D366;"></i><p>واتساب</p></div></a>${currentData.insta_url ? `<a href="${currentData.insta_url}" target="_blank" style="text-decoration:none;"><div><i class="fab fa-instagram fa-2x" style="color:var(--primary);"></i><p>انستقرام</p></div></a>` : ''}${currentData.tiktok_url ? `<a href="${currentData.tiktok_url}" target="_blank" style="text-decoration:none;"><div><i class="fab fa-tiktok fa-2x" style="color:var(--primary);"></i><p>تيك توك</p></div></a>` : ''}${currentData.snap_url ? `<a href="${currentData.snap_url}" target="_blank" style="text-decoration:none;"><div><i class="fab fa-snapchat fa-2x" style="color:var(--primary);"></i><p>سناب شات</p></div></a>` : ''}<a href="${currentData.location_url || '#'}" target="_blank" style="text-decoration:none;"><div><i class="fas fa-map-marker-alt fa-2x" style="color:var(--primary);"></i><p>الموقع</p></div></a></div><div style="text-align:center; margin-top:20px;"><p>📞 0541780995</p></div></div>`;
        }
        updateFooterData();
        renderNavLinks();
        bindHeroButtons();
    }

    // ========== الصيانة والإشعارات ==========
    let splashTimeout, maintenanceInterval, popupTimeout;
    
    function updateMaintenanceMode() {
        const d = currentData, screen = document.getElementById('maintenanceScreen');
        if (!d.maintenance_mode) { if (screen.style.display !== 'none') screen.style.display = 'none'; if (maintenanceInterval) clearInterval(maintenanceInterval); return; }
        const until = d.maintenance_until;
        const title = d.maintenance_title || 'الموقع في صيانة', msg = d.maintenance_message || 'نعمل على تحسين تجربتك، سنعود قريباً';
        if (until && until <= Date.now()) { db.ref(DB_PATH).update({ maintenance_mode: false, maintenance_until: null }); return; }
        screen.innerHTML = `<div style="background:white; border-radius:48px; padding:40px; max-width:500px; text-align:center;"><i class="fas fa-tools fa-4x" style="color:var(--primary);"></i><h2 style="margin:15px 0;">${title}</h2><p>${msg}</p>${until ? `<div id="maintenanceCountdown" style="font-size:2rem; font-weight:bold;"></div>` : ''}</div>`;
        screen.style.display = 'flex'; document.body.style.overflow = 'hidden';
        if (until) {
            const countdownEl = document.getElementById('maintenanceCountdown');
            const updateCountdown = () => {
                let diff = until - Date.now();
                if (diff <= 0) { clearInterval(maintenanceInterval); window.location.reload(); return; }
                const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
                if (countdownEl) countdownEl.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            };
            updateCountdown(); maintenanceInterval = setInterval(updateCountdown, 1000);
        }
    }
    
    function updatePopup() {
        const bubble = document.getElementById('popupBubble'), msgSpan = document.getElementById('popupMessage');
        if (!currentData.popup_enabled || !currentData.popup_message) { if (bubble) bubble.style.display = 'none'; if (popupTimeout) clearTimeout(popupTimeout); return; }
        if (bubble.style.display === 'none' || bubble.style.display === '') {
            msgSpan.innerText = currentData.popup_message;
            bubble.style.display = 'block';
            if (popupTimeout) clearTimeout(popupTimeout);
            popupTimeout = setTimeout(() => { bubble.style.display = 'none'; }, (currentData.popup_duration || 7) * 1000);
        }
    }
    
    window.closePopup = function() { const bubble = document.getElementById('popupBubble'); if (bubble) bubble.style.display = 'none'; if (popupTimeout) clearTimeout(popupTimeout); };
    
    function refreshAll() { renderPartnersMarquee(); loadPage(); updateMaintenanceMode(); updatePopup(); }

    // ========== بدء التطبيق مع السبلاش ==========
    let forceHideTimer = null;
    
    function forceHideSplash() {
        const splashDiv = document.getElementById('splash');
        if (splashDiv && splashDiv.style.display !== 'none') {
            splashDiv.style.opacity = '0';
            setTimeout(() => { splashDiv.style.display = 'none'; }, 500);
        }
        if (forceHideTimer) clearTimeout(forceHideTimer);
    }
    
    function initSplash() {
        const storiesVideosData = currentData.splash_stories_videos || [];
        if (storiesVideosData.length > 0) {
            showStorySplash(storiesVideosData, currentData.splash_duration || 7);
        } else if (currentData.splash_media_url) {
            const splashDiv = document.getElementById('splash');
            splashDiv.innerHTML = '';
            if (!currentData.splash_enabled) { splashDiv.style.display = 'none'; return; }
            const img = document.createElement('img');
            img.src = currentData.splash_media_url;
            img.className = 'splash-media';
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            splashDiv.appendChild(img);
            if (currentData.splash_show_skip) {
                const skipBtn = document.createElement('button');
                skipBtn.innerText = 'تخطي ←';
                skipBtn.className = 'splash-skip';
                skipBtn.onclick = () => {
                    splashDiv.style.opacity = '0';
                    setTimeout(() => { splashDiv.style.display = 'none'; }, 500);
                };
                splashDiv.appendChild(skipBtn);
            }
            splashDiv.style.display = 'flex';
            splashDiv.style.opacity = '1';
            setTimeout(() => {
                splashDiv.style.opacity = '0';
                setTimeout(() => { splashDiv.style.display = 'none'; }, 500);
            }, (currentData.splash_duration || 5) * 1000);
        } else {
            document.getElementById('splash').style.display = 'none';
        }
    }

    const maxWaitTime = 10000;
    forceHideTimer = setTimeout(() => {
        console.warn('⚠️ Firebase timeout, forcing splash hide');
        forceHideSplash();
        if (!currentData || Object.keys(currentData).length === 0) { currentData = {}; refreshAll(); }
    }, maxWaitTime);
    
    db.ref(DB_PATH).once('value').then(snap => {
        clearTimeout(forceHideTimer);
        currentData = snap.val() || {};
        initSplash();
        refreshAll();
    }).catch(err => {
        console.error('❌ Firebase read error:', err);
        clearTimeout(forceHideTimer);
        currentData = {};
        forceHideSplash();
        refreshAll();
        showToast('حدث خطأ في الاتصال، يتم عرض بيانات تجريبية');
    });
    
    db.ref(DB_PATH).on('value', snap => {
        if (snap.exists()) {
            currentData = snap.val();
            refreshAll();
        }
    }, err => { console.error('Realtime listener error:', err); });
    
    window.openAlbum = openAlbum;
    window.openCatalog = openCatalog;

    // ========== منع تنزيل الصور ==========
    (function blockImageDownload() {
        function disableContextAndDrag(img) {
            img.addEventListener('contextmenu', (e) => { e.preventDefault(); return false; });
            img.addEventListener('dragstart', (e) => { e.preventDefault(); return false; });
        }
        document.querySelectorAll('img').forEach(disableContextAndDrag);
        const observer = new MutationObserver(() => {
            document.querySelectorAll('img').forEach(img => {
                if (!img.hasAttribute('data-blocked')) {
                    img.setAttribute('data-blocked', 'true');
                    disableContextAndDrag(img);
                }
            });
        });
        observer.observe(document.body, { childList: true, subtree: true });
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) { e.preventDefault(); showToast('❌ تم تعطيل حفظ الصور'); return false; }
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if ((e.ctrlKey || e.metaKey) && (e.key === 'u' || e.key === 'U')) { e.preventDefault(); return false; }
        });
    })();
</script>

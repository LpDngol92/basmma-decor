<head>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8835744121215847" crossorigin="anonymous"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #fefcf8;
            color: #2c2b28;
            overflow-x: hidden;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        body.loaded {
            opacity: 1;
        }

        :root {
            --gold: #c9a96e;
            --gold-dark: #b48c48;
            --gold-light: #f3ede3;
            --dark: #2c2b28;
            --gray: #6c6a66;
            --light-bg: #faf7f2;
            --card-bg: #ffffff;
            --border-light: #eee8df;
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.12);
            --whatsapp: #25D366;
            --success: #2e7d32;
        }

        /* splash */
        #splash {
            position: fixed;
            inset: 0;
            background: linear-gradient(145deg, #fff8f0, #f3e9dc);
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
            transition: opacity 0.5s;
        }
        .splash-logo {
            font-size: 3.2rem;
            font-weight: 800;
            color: var(--gold-dark);
            letter-spacing: -0.5px;
            animation: gentlePulse 1.2s infinite alternate;
        }
        @keyframes gentlePulse {
            0% { opacity: 0.6; transform: scale(0.96);}
            100% { opacity: 1; transform: scale(1.02);}
        }
        .splash-line {
            width: 70px;
            height: 3px;
            background: var(--gold);
            border-radius: 4px;
            animation: expandWidth 1s infinite alternate;
        }
        @keyframes expandWidth {
            0% { width: 40px; opacity: 0.5;}
            100% { width: 120px; opacity: 1;}
        }

        /* maintenance */
        #maintenance-screen {
            position: fixed;
            inset: 0;
            background: var(--card-bg);
            z-index: 999998;
            display: none;
            align-items: center;
            justify-content: center;
        }

        /* header & navigation */
        .top-nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            z-index: 1000;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.02);
        }

        .logo-section {
            padding: 16px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
            background: linear-gradient(120deg, #ffffff, #fdf9f2);
        }
        .logo-section h1 {
            font-size: 1.9rem;
            font-weight: 800;
            color: var(--gold-dark);
            letter-spacing: -0.3px;
        }
        .logo-section p {
            font-size: 0.8rem;
            color: var(--gray);
            margin-top: 4px;
        }

        /* partners marquee */
        .partners-marquee {
            background: #fef8f0;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-light);
        }
        .marquee-wrapper {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
            cursor: grab;
            user-select: none;
            scroll-behavior: smooth;
        }
        .marquee-wrapper:active { cursor: grabbing; }
        .marquee-track {
            display: inline-flex;
            gap: 28px;
            align-items: center;
            padding: 0 20px;
        }
        .partner-item {
            background: white;
            border-radius: 48px;
            padding: 8px 28px;
            box-shadow: var(--shadow-sm);
            border: 1px solid #eee3d4;
            transition: all 0.2s;
            cursor: pointer;
        }
        .partner-item:hover {
            transform: translateY(-3px);
            border-color: var(--gold);
            box-shadow: var(--shadow-md);
        }
        .partner-logo {
            height: 60px;
            width: auto;
            max-width: 150px;
            object-fit: contain;
        }

        /* tabs modern */
        .tabs-wrapper {
            position: relative;
            background: white;
            border-bottom: 1px solid var(--border-light);
        }
        .tabs-section {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 12px 20px;
            scrollbar-width: none;
            scroll-behavior: smooth;
            cursor: grab;
        }
        .tabs-section::-webkit-scrollbar { display: none; }
        .tab-btn {
            padding: 10px 24px;
            background: #fefaf4;
            border: 1px solid #e9dfd3;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--gray);
            border-radius: 50px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn i { font-size: 1rem; }
        .tab-btn.active {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
            box-shadow: 0 8px 18px rgba(201, 169, 110, 0.25);
        }
        .tab-indicator {
            position: absolute;
            bottom: -1px;
            height: 3px;
            background: var(--gold);
            border-radius: 3px;
            transition: 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* main content */
        .main-content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 32px 20px 90px;
        }

        /* cards & components */
        .glass-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 28px;
            margin-bottom: 28px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--gold-light);
        }
        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--gold-dark);
            border-right: 4px solid var(--gold);
            padding-right: 16px;
        }

        /* star rating */
        .star-rating {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 15px 0;
            flex-direction: row-reverse;
        }
        .star-rating i {
            font-size: 2rem;
            color: #ddd;
            cursor: pointer;
            transition: all 0.15s;
        }
        .star-rating i.active, .star-rating i:hover {
            color: var(--gold);
            transform: scale(1.1);
        }

        /* review slider */
        .review-slider {
            position: relative;
            min-height: 200px;
            margin-top: 12px;
        }
        .review-item {
            position: absolute;
            width: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-align: center;
            background: #fefaf5;
            padding: 24px;
            border-radius: 28px;
        }
        .review-item.active {
            opacity: 1;
            position: relative;
        }
        .review-stars { color: var(--gold); margin-bottom: 12px; font-size: 1.2rem; }
        .review-text { font-size: 1rem; color: #3c3a37; margin-bottom: 12px; font-style: italic; }
        .review-name { font-weight: 600; color: var(--gold-dark); }

        /* schedule */
        .schedule-group {
            padding: 12px 0;
            border-bottom: 1px dashed var(--border-light);
        }
        .schedule-days { font-weight: 800; color: var(--gold-dark); margin-bottom: 6px; }
        .time-period { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
        .time-text { background: #f3ede5; padding: 4px 16px; border-radius: 40px; font-size: 0.85rem; font-weight: 500; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 700;
        }
        .status-open { background: #e6f4ea; color: var(--success); }
        .status-closed { background: #ffe8e6; color: #c62828; }
        .whatsapp-btn, .location-btn {
            background: var(--whatsapp);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }
        .location-btn { background: var(--gold); margin-top: 12px; }
        .whatsapp-btn:hover, .location-btn:hover { transform: scale(1.01); filter: brightness(0.97); }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 24px;
        }
        .social-link {
            width: 52px;
            height: 52px;
            background: #f5efe8;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray);
            font-size: 1.4rem;
            transition: all 0.2s;
        }
        .social-link:hover {
            background: var(--gold);
            color: white;
            transform: translateY(-5px);
        }

        /* photo grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 16px;
        }
        .photo-item {
            aspect-ratio: 1 / 1;
            background: #f0ede8;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .photo-item:hover img { transform: scale(1.08); }
        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            padding: 12px;
            display: flex;
            justify-content: space-between;
            opacity: 0;
            transition: 0.2s;
        }
        .photo-item:hover .photo-overlay { opacity: 1; }
        .action-btn-icon {
            background: rgba(255,255,255,0.95);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
        }

        /* album & catalog cards */
        .album-card, .folder-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-light);
            transition: all 0.25s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .album-card:hover, .folder-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-md);
            border-color: var(--gold);
        }
        .album-card img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 12px;
        }
        .album-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            padding: 16px;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
        .album-card:hover .album-overlay { opacity: 1; pointer-events: auto; }
        .album-icon-btn {
            background: white;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }

        /* viewer */
        .viewer-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            z-index: 20000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .viewer-container {
            width: 100%;
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .viewer-img {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            transition: transform 0.05s linear;
        }

        /* responsive */
        @media (max-width: 700px) {
            .main-content { padding: 20px 16px 80px; }
            .photo-grid { gap: 10px; grid-template-columns: repeat(2, 1fr); }
            .glass-card { padding: 20px; }
        }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--gray); }
        .ad-container { margin: 28px 0; text-align: center; }
        .grid-2cols { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
        .btn-gold { background: var(--gold); border: none; }
        input, textarea { border-radius: 20px; border: 1px solid var(--border-light); padding: 12px 18px; background: white; font-family: inherit; width: 100%; margin-bottom: 16px; }
        .toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e1e1e; color: white; padding: 10px 24px; border-radius: 60px; z-index: 30001; display: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="splash"><div class="splash-logo">بصمة غير</div><div class="splash-line"></div></div>
<div id="maintenance-screen"><div class="maintenance-content" style="background:white;border-radius:32px;padding:32px;"><i class="fas fa-tools" style="font-size: 3rem; color: var(--gold);"></i><h2>قريباً</h2><p>نعمل على تطوير الموقع</p></div></div>

<div class="top-nav">
    <div class="logo-section"><h1 id="siteTitle">بصمة غير</h1><p>للديكور والتصميم الداخلي الفاخر</p></div>
    <div class="partners-marquee" id="partnersMarquee" style="display:none;"><div class="marquee-wrapper" id="marqueeWrapper"><div class="marquee-track" id="marqueeTrack"></div></div></div>
    <div class="tabs-wrapper"><div class="tabs-section" id="tabsSection"></div><div class="tab-indicator"></div></div>
</div>

<div id="popupBubble" class="popup-bubble" style="position:fixed;bottom:20px;right:20px;max-width:320px;background:white;border-radius:32px;box-shadow:var(--shadow-lg);display:none;z-index:10000;border-right:5px solid var(--gold);"><div class="bubble-content" style="padding:16px;display:flex;gap:12px;"><div class="bubble-icon" style="background:var(--gold);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:white;"><i class="fas fa-gift"></i></div><div class="bubble-text" id="popupMessage" style="flex:1;"></div><button class="bubble-close" onclick="closePopup()" style="background:none;border:none;font-size:1.2rem;"><i class="fas fa-times"></i></button></div></div>

<div class="main-content" id="mainContent"></div>
<div id="viewerModal" class="viewer-modal">
    <button class="viewer-close" style="position:fixed;top:20px;right:20px;background:rgba(0,0,0,0.6);border:none;color:white;width:48px;height:48px;border-radius:50%;font-size:1.5rem;cursor:pointer;" onclick="closeViewer()"><i class="fas fa-times"></i></button>
    <div class="viewer-top-actions" style="position:fixed;top:20px;left:20px;display:flex;gap:12px;z-index:20001;">
        <button class="viewer-top-btn" id="viewerFavBtn" style="background:rgba(0,0,0,0.6);border:none;width:48px;height:48px;border-radius:50%;color:white;font-size:1.3rem;" onclick="viewerToggleFavorite()"><i class="far fa-heart"></i></button>
        <button class="viewer-top-btn whatsapp-top" style="background:rgba(0,0,0,0.6);border:none;width:48px;height:48px;border-radius:50%;color:#25D366;" onclick="viewerWhatsapp()"><i class="fab fa-whatsapp"></i></button>
    </div>
    <div class="viewer-container"><img id="viewerImg" class="viewer-img" draggable="false"></div>
    <div class="viewer-controls" style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);border-radius:80px;display:flex;gap:20px;padding:10px 30px;backdrop-filter:blur(12px);">
        <button onclick="viewerPrev()" style="background:none;border:none;color:white;font-size:2rem;"><i class="fas fa-chevron-right"></i></button>
        <span id="viewerCounter" style="color:white;font-weight:600;">1/1</span>
        <button onclick="viewerNext()" style="background:none;border:none;color:white;font-size:2rem;"><i class="fas fa-chevron-left"></i></button>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // Firebase config (unchanged)
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let favorites = JSON.parse(localStorage.getItem('site_favorites_v8')) || [];
    let currentPage = 'home';
    let currentImageList = [], currentImageIndex = 0, currentImageId = '';
    let zoomScale = 1, translate = { x: 0, y: 0 }, isZoomed = false, isDraggingImg = false;

    // Helper functions (preserved)
    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
    function closePopup() { document.getElementById('popupBubble').style.display = 'none'; }
    function saveFav() { localStorage.setItem('site_favorites_v8', JSON.stringify(favorites)); }
    function toggleFavorite(imgId, imgUrl) {
        const exists = favorites.find(f => f.id === imgId);
        if (exists) { favorites = favorites.filter(f => f.id !== imgId); showToast('🗑️ أزيل من المفضلة'); }
        else { favorites.unshift({ id: imgId, url: imgUrl, date: Date.now() }); showToast('❤️ أضيف إلى المفضلة'); }
        saveFav(); renderCurrentPage(); updateViewerFavButton();
    }
    function isFav(imgId) { return favorites.some(f => f.id === imgId); }
    function updateViewerFavButton() { const btn = document.getElementById('viewerFavBtn'); if (btn && currentImageId) { if (isFav(currentImageId)) { btn.innerHTML = '<i class="fas fa-heart"></i>'; btn.style.color = '#dc3545'; btn.style.background = 'white'; } else { btn.innerHTML = '<i class="far fa-heart"></i>'; btn.style.color = 'white'; btn.style.background = 'rgba(0,0,0,0.6)'; } } }
    function viewerToggleFavorite() { if (currentImageId && currentImageList[currentImageIndex]) toggleFavorite(currentImageId, currentImageList[currentImageIndex]); }
    function viewerWhatsapp() { window.open(`https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن هذا التصميم:\n'+currentImageList[currentImageIndex])}`, '_blank'); }
    function closeViewer() { document.getElementById('viewerModal').style.display = 'none'; document.body.style.overflow = ''; resetZoom(); currentImageList = []; }
    function viewerNext() { if (!currentImageList.length) return; currentImageIndex = (currentImageIndex + 1) % currentImageList.length; document.getElementById('viewerImg').src = currentImageList[currentImageIndex]; document.getElementById('viewerCounter').innerText = `${currentImageIndex+1}/${currentImageList.length}`; currentImageId = `img_${Date.now()}_${currentImageIndex}`; resetZoom(); updateViewerFavButton(); }
    function viewerPrev() { if (!currentImageList.length) return; currentImageIndex = (currentImageIndex - 1 + currentImageList.length) % currentImageList.length; document.getElementById('viewerImg').src = currentImageList[currentImageIndex]; document.getElementById('viewerCounter').innerText = `${currentImageIndex+1}/${currentImageList.length}`; currentImageId = `img_${Date.now()}_${currentImageIndex}`; resetZoom(); updateViewerFavButton(); }
    function resetZoom() { zoomScale = 1; translate = { x: 0, y: 0 }; const img = document.getElementById('viewerImg'); if (img) img.style.transform = `scale(1) translate(0px, 0px)`; isZoomed = false; }
    function formatTime12(t) { if(!t) return ""; let [h,m]=t.split(':'); h=parseInt(h); return `${h%12||12}:${m} ${h>=12?'م':'ص'}`; }
    function getGroupedScheduleHtml(d) { /* original logic simplified but keep same output */ if (!d.work_schedule) return '<p>لم تحدد المواعيد</p>'; const dayNames = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"], daysOrder = [6,0,1,2,3,4,5]; let groups = [], offDays = []; daysOrder.forEach(jsDay => { const s = d.work_schedule[jsDay]; if (s && s.active) { const key = `${s.s1_s}-${s.s1_e}-${s.s2_a}`; let g = groups.find(g => g.key === key); if (g) g.days.push(dayNames[jsDay]); else groups.push({ key, days: [dayNames[jsDay]], data: s }); } else offDays.push(dayNames[jsDay]); }); let html = ''; groups.forEach(g => { const dText = g.days.length === 1 ? g.days[0] : `من ${g.days[0]} إلى ${g.days[g.days.length-1]}`; html += `<div class="schedule-group"><div class="schedule-days">${dText}</div><div class="time-period"><span class="time-text">${formatTime12(g.data.s1_s||'09:00')}</span> — <span class="time-text">${formatTime12(g.data.s1_e||'17:00')}</span></div>`; if (g.data.s2_a) html += `<div class="time-period"><span class="time-text">${formatTime12(g.data.s2_s)}</span> — <span class="time-text">${formatTime12(g.data.s2_e)}</span></div>`; html += `</div>`; }); if (offDays.length) html += `<div class="holiday-text" style="background:#fff2f0;padding:12px;border-radius:20px;margin-top:12px;"><i class="fas fa-moon"></i> عطلة: ${offDays.join('، ')}</div>`; return html; }
    function updateWorkStatus() { const c = document.getElementById('statusContainer'); if (!c || !currentData.work_schedule) return; const now = new Date(), day = now.getDay(), s = currentData.work_schedule[day]; let open = false; if (s && s.active) { const toMins = (t) => { let [h,m]=t.split(':').map(Number); return h*60+m; }; const cur = now.getHours()*60+now.getMinutes(); const s1 = toMins(s.s1_s), e1 = toMins(s.s1_e); if (cur >= s1 && cur < e1) open = true; if (!open && s.s2_a && s.s2_s && s.s2_e) { const s2 = toMins(s.s2_s), e2 = toMins(s.s2_e); if ((e2 < s2 && (cur >= s2 || cur < e2)) || (cur >= s2 && cur < e2)) open = true; } } c.innerHTML = open ? `<div class="status-badge status-open"><i class="fas fa-circle" style="font-size:0.7rem;"></i> مفتوح الآن - نرحب بكم</div>` : `<div class="status-badge status-closed"><i class="fas fa-circle"></i> مغلق حالياً</div>`; }
    function renderImageGallery(images, parentId) { if (!images) return '<div class="empty-state"><i class="fas fa-image fa-3x"></i><p>لا توجد صور</p></div>'; let html = '<div class="photo-grid">'; Object.keys(images).forEach(imgId => { const url = images[imgId].url; const fullId = `${parentId}_${imgId}`; const favClass = isFav(fullId) ? 'active' : ''; html += `<div class="photo-item" data-img-url="${url}"><img src="${url}" loading="lazy"><div class="photo-overlay"><button class="action-btn-icon fav-btn-icon ${favClass}" onclick="event.stopPropagation(); toggleFavorite('${fullId}', '${url}')"><i class="fas fa-heart"></i></button><button class="action-btn-icon whatsapp-btn-icon" onclick="event.stopPropagation(); window.open('https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent(url)}', '_blank')"><i class="fab fa-whatsapp"></i></button></div></div>`; }); html += '</div>'; return html; }
    function renderHome() { const d = currentData; return `<div class="glass-card"><div class="card-title"><i class="fas fa-palette"></i> من نحن</div><p style="line-height:1.7">${d.about_text || 'بصمة غير للديكور: خبرة في تحويل المساحات إلى تحف فنية. نقدم تصاميم عصرية وتنفيذ دقيق للمحلات والمكاتب في جدة.'}</p><div style="margin-top:16px;"><strong>📍 موقعنا:</strong> جدة، طريق المكرونة، أمام عمائر بغلف<br><strong>📞 للاستفسار:</strong> <a href="tel:0541780995" style="color:var(--gold);">0541780995</a></div></div><div class="grid-2cols"><div class="glass-card"><div class="card-title"><i class="fas fa-star"></i> تقييم العملاء</div><div class="review-slider" id="reviewSlider">${d.reviews && Object.keys(d.reviews).length ? Object.keys(d.reviews).map(id=>`<div class="review-item"><div class="review-stars">${'★'.repeat(d.reviews[id].rating)}${'☆'.repeat(5-d.reviews[id].rating)}</div><div class="review-text">"${d.reviews[id].message}"</div><div class="review-name">— ${d.reviews[id].name}</div></div>`).join('') : '<div class="empty-state">لا توجد تقييمات</div>'}</div></div><div class="glass-card"><div class="card-title"><i class="fas fa-clock"></i> ساعات العمل</div>${getGroupedScheduleHtml(d)}<div id="statusContainer" style="margin-top:15px;"></div>${d.location_url ? `<button onclick="window.open('${d.location_url}','_blank')" class="location-btn"><i class="fas fa-map-marker-alt"></i> موقعنا على الخريطة</button>` : ''}</div></div><div class="glass-card"><div class="card-title"><i class="fas fa-comment-dots"></i> أضف تقييمك</div><input type="text" id="reviewName" placeholder="اسمك الكريم"><div class="star-rating" id="starRating"><i class="fas fa-star" data-star="5"></i><i class="fas fa-star" data-star="4"></i><i class="fas fa-star" data-star="3"></i><i class="fas fa-star" data-star="2"></i><i class="fas fa-star" data-star="1"></i></div><textarea id="reviewMsg" placeholder="شاركنا تجربتك مع ديكوراتنا..." rows="3"></textarea><button onclick="submitReview()" class="whatsapp-btn" style="background:var(--gold);">إرسال التقييم</button></div><div class="glass-card"><div class="card-title"><i class="fab fa-whatsapp"></i> تواصل مباشر</div><button onclick="whatsappGlobal()" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> راسلنا على واتساب</button><div class="social-links" id="socialLinks"></div></div>`; }
    function renderWorks() { if (!currentData.albums || !Object.keys(currentData.albums).length) return '<div class="empty-state"><i class="fas fa-folder-open fa-3x"></i><p>أعمالنا قريباً</p></div>'; let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:20px;">'; Object.keys(currentData.albums).forEach(id => { const a = currentData.albums[id]; let cover = ''; if (a.imgs && Object.keys(a.imgs).length) cover = Object.values(a.imgs)[0].url; html += `<div class="album-card" data-album-id="${id}">${cover ? `<img src="${cover}" loading="lazy">` : '<i class="fas fa-folder-open fa-3x"></i>'}<h4 style="margin-top:8px;">${a.name || 'ألبوم'}</h4><div class="album-overlay"><button class="album-icon-btn fav-album-btn" onclick="event.stopPropagation(); toggleFavorite('album_${id}_cover', '${cover}')"><i class="fas fa-heart"></i></button><button class="album-icon-btn whatsapp-album-btn" onclick="event.stopPropagation(); window.open('https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent(cover)}','_blank')"><i class="fab fa-whatsapp"></i></button></div></div>`; }); html += '</div>'; return html; }
    function renderCatalogs() { if (!currentData.catalogs || !Object.keys(currentData.catalogs).length) return '<div class="empty-state"><i class="fas fa-book-open fa-3x"></i><p>كتالوجات قريباً</p></div>'; let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px;">'; Object.keys(currentData.catalogs).forEach(id => { html += `<div class="folder-card" onclick="openCatalog('${id}')"><i class="fas fa-book-open fa-3x" style="color:var(--gold);"></i><h4>${currentData.catalogs[id].name}</h4><p style="font-size:0.7rem;">📄 عرض الكتالوج</p></div>`; }); html += '</div>'; return html; }
    function renderFavorites() { if (!favorites.length) return '<div class="empty-state"><i class="far fa-heart fa-3x"></i><p>المفضلة فارغة</p></div>'; let html = '<div class="photo-grid">'; favorites.forEach(fav => { html += `<div class="photo-item"><img src="${fav.url}" loading="lazy"><div class="photo-overlay"><button class="action-btn-icon fav-btn-icon active" onclick="event.stopPropagation(); toggleFavorite('${fav.id}', '${fav.url}')"><i class="fas fa-heart"></i></button><button class="action-btn-icon whatsapp-btn-icon" onclick="event.stopPropagation(); window.open('https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent(fav.url)}','_blank')"><i class="fab fa-whatsapp"></i></button></div></div>`; }); html += '</div>'; return html; }
    function openAlbum(id) { const a = currentData.albums?.[id]; if (!a || !a.imgs) return; const urls = Object.values(a.imgs).map(i=>i.url).filter(u=>u); if(urls.length) openViewer(urls[0], urls, 0, `album_${id}_0`); }
    function openCatalog(id) { const c = currentData.catalogs?.[id]; if(c?.code) { const win = window.open(); win.document.write(c.code); } else showToast('الكتالوج غير متاح'); }
    function attachAlbumListeners() { document.getElementById('mainContent')?.addEventListener('click', e => { const card = e.target.closest('.album-card'); if(card && !e.target.closest('.album-icon-btn')) openAlbum(card.dataset.albumId); }); }
    function bindPhotoGridClick() { document.addEventListener('click', e => { const item = e.target.closest('.photo-item'); if(item && !e.target.closest('.action-btn-icon')) { const grid = item.closest('.photo-grid'); if(grid){ const urls = Array.from(grid.querySelectorAll('.photo-item img')).map(i=>i.src); const idx = urls.indexOf(item.querySelector('img').src); if(idx!==-1) openViewer(urls[idx], urls, idx, `img_${Date.now()}`); } } }); }
    function openViewer(url, list, idx, id) { if(!list.length) return; currentImageList = list; currentImageIndex = idx; currentImageId = id; document.getElementById('viewerImg').src = url; document.getElementById('viewerCounter').innerText = `${idx+1}/${list.length}`; document.getElementById('viewerModal').style.display = 'flex'; document.body.style.overflow = 'hidden'; resetZoom(); updateViewerFavButton(); }
    function renderCurrentPage() { const main = document.getElementById('mainContent'); let html = `<div class="ad-container"><ins class="adsbygoogle" style="display:block;text-align:center;" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-8835744121215847" data-ad-slot="9636122604"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});<\/script></div>`; if (currentPage === 'home') html += renderHome(); else if (currentPage === 'works') html += `<h2 style="margin-bottom:24px;font-weight:700;"><i class="fas fa-images"></i> أعمالنا</h2>${renderWorks()}`; else if (currentPage === 'catalogs') html += `<h2 style="margin-bottom:24px;"><i class="fas fa-book-open"></i> الكتالوجات</h2>${renderCatalogs()}`; else if (currentPage === 'favorites') html += `<h2 style="margin-bottom:24px;"><i class="fas fa-heart"></i> المفضلة</h2>${renderFavorites()}`; else if (currentPage.startsWith('page_')) { const pid = currentPage.replace('page_',''); html += `<h2 style="margin-bottom:24px;">${currentData.pages?.[pid]?.title || ''}</h2>${renderImageGallery(currentData.pages?.[pid]?.imgs, `page_${pid}`)}`; } else html += `<div class="empty-state">صفحة غير موجودة</div>`; main.innerHTML = html + `<div class="ad-container"><ins class="adsbygoogle" style="display:block;text-align:center;" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-8835744121215847" data-ad-slot="9636122604"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});<\/script></div>`; document.getElementById('siteTitle').innerText = currentData.site_name || 'بصمة غير'; renderSocial(); updateWorkStatus(); setTimeout(() => { if(document.querySelectorAll('.review-item').length) { let idx=0; const items = document.querySelectorAll('.review-item'); items.forEach((item,i)=>item.classList.remove('active')); items[0]?.classList.add('active'); if(window.reviewInterval) clearInterval(window.reviewInterval); window.reviewInterval = setInterval(()=>{ idx=(idx+1)%items.length; items.forEach(i=>i.classList.remove('active')); items[idx]?.classList.add('active'); },4000); } setupStarRating(); },100); attachAlbumListeners(); bindPhotoGridClick(); }
    function renderTabs() { const container = document.getElementById('tabsSection'); let html = `<button class="tab-btn ${currentPage==='home'?'active':''}" data-page-key="home"><i class="fas fa-home"></i> الرئيسية</button><button class="tab-btn ${currentPage==='works'?'active':''}" data-page-key="works"><i class="fas fa-images"></i> أعمالنا</button><button class="tab-btn ${currentPage==='catalogs'?'active':''}" data-page-key="catalogs"><i class="fas fa-book-open"></i> الكتالوجات</button><button class="tab-btn ${currentPage==='favorites'?'active':''}" data-page-key="favorites"><i class="fas fa-heart"></i> المفضلة</button>`; if(currentData.pages) Object.keys(currentData.pages).forEach(pid => { const title = currentData.pages[pid].title; const key = `page_${pid}`; html += `<button class="tab-btn ${currentPage===key?'active':''}" data-page-key="${key}"><i class="fas fa-file-alt"></i> ${title}</button>`; }); container.innerHTML = html; document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click',()=>{ const key = btn.dataset.pageKey; if(key && key !== currentPage){ currentPage = key; history.pushState(null,'','#' + (key==='home'?'الرئيسية':(key==='works'?'أعمالنا':(key==='catalogs'?'الكــتالوجات':(key==='favorites'?'المفضلة':(currentData.pages?.[key.replace('page_','')]?.title||key)))))); renderCurrentPage(); renderTabs(); setTimeout(()=>{ const ind = document.querySelector('.tab-indicator'); if(ind && document.querySelector('.tab-btn.active')){ const a = document.querySelector('.tab-btn.active'); const wrap = document.querySelector('.tabs-wrapper'); ind.style.width = a.offsetWidth+'px'; ind.style.left = (a.offsetLeft)+'px'; } },50); } }); setTimeout(()=>{ const a = document.querySelector('.tab-btn.active'); if(a){ const ind = document.querySelector('.tab-indicator'); const wrap = document.querySelector('.tabs-wrapper'); ind.style.width = a.offsetWidth+'px'; ind.style.left = (a.offsetLeft)+'px'; } },100); }
    function renderPartnersMarquee() { const track = document.getElementById('marqueeTrack'); if(currentData.partners && Object.keys(currentData.partners).length){ document.getElementById('partnersMarquee').style.display='block'; track.innerHTML = Object.values(currentData.partners).map(p=>`<div class="partner-item" onclick="window.open('${p.link||'#'}','_blank')"><img src="${p.url}" class="partner-logo" loading="lazy"></div>`).join(''); } else document.getElementById('partnersMarquee').style.display='none'; }
    function renderSocial() { const d=currentData; const cont=document.getElementById('socialLinks'); if(cont) cont.innerHTML = `${d.insta_url?`<a href="${d.insta_url}" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>`:''}${d.tiktok_url?`<a href="${d.tiktok_url}" target="_blank" class="social-link"><i class="fab fa-tiktok"></i></a>`:''}${d.snap_url?`<a href="${d.snap_url}" target="_blank" class="social-link"><i class="fab fa-snapchat"></i></a>`:''}`; }
    function setupStarRating() { let selected=0; const stars = document.querySelectorAll('#starRating i'); stars.forEach(s=>{ s.onclick = ()=>{ selected = parseInt(s.dataset.star); stars.forEach(st=>st.classList.remove('active')); for(let i=stars.length-1;i>=stars.length-selected;i--) stars[i]?.classList.add('active'); }; }); window.submitReview = () => { const name = document.getElementById('reviewName')?.value, msg = document.getElementById('reviewMsg')?.value; if(!name || !msg || !selected) return showToast('املأ الحروف واختر تقييماً'); db.ref(DB_PATH+'/reviews').push({name,message:msg,rating:selected}).then(()=>{ showToast('شكراً لك'); document.getElementById('reviewName').value=''; document.getElementById('reviewMsg').value=''; stars.forEach(s=>s.classList.remove('active')); selected=0; }); }; }
    function whatsappGlobal() { window.open(`https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن خدمات الديكور')}`,'_blank'); }
    function checkMaintenance() { document.getElementById('maintenance-screen').style.display = currentData.maintenance_mode ? 'flex' : 'none'; }
    let dataLoaded=false;
    window.addEventListener('load',()=>{ setTimeout(()=>{ document.getElementById('splash').style.opacity='0'; setTimeout(()=>document.getElementById('splash').style.display='none',500); document.body.classList.add('loaded'); },900); });
    db.ref(DB_PATH).on('value', snap => { currentData = snap.val() || {}; dataLoaded=true; if(!window.location.hash || window.location.hash==='#') currentPage='home'; renderTabs(); renderCurrentPage(); renderPartnersMarquee(); checkMaintenance(); });
    window.openViewer = openViewer; window.closeViewer = closeViewer; window.viewerNext = viewerNext; window.viewerPrev = viewerPrev; window.viewerToggleFavorite = viewerToggleFavorite; window.viewerWhatsapp = viewerWhatsapp; window.toggleFavorite = toggleFavorite; window.openAlbum = openAlbum; window.openCatalog = openCatalog; window.whatsappGlobal = whatsappGlobal; window.closePopup = closePopup;
</script>

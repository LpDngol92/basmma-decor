<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>بصمة غير للديكور</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --gold: #b2976a;
            --gold-dark: #8e7352;
            --bg: #f8f9fa;
            --bg2: #e9ecef;
            --card: #ffffff;
            --text: #212529;
            --text-light: #6c757d;
            --border: rgba(0,0,0,0.08);
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .hero {
            background: var(--bg2);
            padding: 50px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .hero h1 {
            font-size: 3.5rem;
            color: var(--gold-dark);
        }
        .hero-divider {
            width: 60px;
            height: 2px;
            background: var(--gold);
            margin: 10px auto;
        }
        nav {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            padding: 10px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-btn {
            padding: 8px 20px;
            border: none;
            background: transparent;
            color: var(--text-light);
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            white-space: nowrap;
        }
        .nav-btn.active {
            background: var(--gold);
            color: white;
        }
        .sec {
            width: 95%;
            max-width: 1400px;
            margin: 30px auto;
            display: none;
        }
        .sec.active {
            display: block;
        }
        .section-header {
            text-align: center;
            margin: 30px 0;
        }
        .section-title {
            font-size: 2rem;
            color: var(--gold-dark);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(178,151,106,0.15);
        }
        .img-container {
            height: 200px;
            cursor: pointer;
            overflow: hidden;
        }
        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn-order {
            width: 100%;
            padding: 12px;
            border: none;
            border-top: 1px solid var(--border);
            background: var(--card);
            color: var(--gold-dark);
            font-weight: 600;
            cursor: pointer;
        }
        .btn-order:hover {
            background: var(--gold);
            color: white;
        }
        .folder-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
        }
        .folder-card:hover {
            border-color: var(--gold);
        }
        .folder-icon {
            font-size: 3rem;
            color: var(--gold);
        }

        /* Viewer */
        #viewer {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .viewer-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #viewer-img {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            cursor: zoom-in;
        }
        .viewer-close {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            z-index: 1000002;
            font-size: 1.2rem;
        }
        .viewer-close:hover {
            background: #c44536;
        }
        .viewer-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            z-index: 1000002;
            font-size: 1.5rem;
        }
        .viewer-nav:hover {
            background: var(--gold);
        }
        .viewer-prev { left: 20px; }
        .viewer-next { right: 20px; }
        .viewer-counter {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            z-index: 1000002;
        }

        /* واتساب وسوشيال */
        .whatsapp-cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 40px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            margin: 20px 0;
        }
        .social-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .social-icon-btn {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .social-icon-btn:hover {
            color: var(--gold);
            border-color: var(--gold);
        }

        footer {
            padding: 25px;
            text-align: center;
            color: var(--text-light);
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        #hidden-trigger {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 60px;
            opacity: 0;
            cursor: pointer;
            z-index: 200000000;
        }

        @media (max-width:600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); }
        }
    </style>
</head>
<body>

<div class="hero">
    <h1 id="site-name">بصمة غير</h1>
    <div class="hero-divider"></div>
    <p>للديكور والتصميم الداخلي</p>
</div>

<nav id="navbar"></nav>

<main id="content"></main>

<footer id="footer">جميع الحقوق محفوظة © بصمة غير للديكور</footer>

<!-- Viewer -->
<div id="viewer">
    <button class="viewer-close" onclick="closeViewer()"><i class="fas fa-times"></i></button>
    <button class="viewer-nav viewer-prev" onclick="navigateSlide(-1)"><i class="fas fa-chevron-right"></i></button>
    <button class="viewer-nav viewer-next" onclick="navigateSlide(1)"><i class="fas fa-chevron-left"></i></button>
    <div class="viewer-counter" id="viewerCounter"></div>
    <div class="viewer-container">
        <img id="viewerImg" src="">
    </div>
</div>

<div id="hidden-trigger" onclick="checkAdmin()"></div>

<script>
    // Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentTab = 'home';
    let currentData = {};
    let slideImages = [], slideIds = [], slideIndex = 0;

    // صور احتياطية
    const sampleImages = [
        "https://images.unsplash.com/photo-1618221195710-ddde0e36dac9?w=400",
        "https://images.unsplash.com/photo-1618213749401-2a8c6b3f5f5d?w=400",
        "https://images.unsplash.com/photo-1618221381711-42ca8ab6e908?w=400",
        "https://images.unsplash.com/photo-1618213811503-3d3f7c5c9f5b?w=400"
    ];

    // تحميل البيانات
    db.ref(DB_PATH).on('value', snap => {
        currentData = snap.val() || {};
        render();
    }, () => {
        // لو Firebase مش شغال
        currentData = {
            site_name: "بصمة غير",
            whatsapp_num: "966500000000",
            footer_text: "جميع الحقوق محفوظة © بصمة غير للديكور",
            insta_url: "#", tiktok_url: "#", snap_url: "#", location_url: "#",
            albums: { album1: { name: "أعمالنا", imgs: {} } }
        };
        sampleImages.forEach((url, i) => {
            currentData.albums.album1.imgs[`img${i}`] = { url };
        });
        render();
    });

    function render() {
        const d = currentData;
        document.getElementById('site-name').textContent = d.site_name || 'بصمة غير';
        document.getElementById('footer').textContent = d.footer_text || 'جميع الحقوق محفوظة © بصمة غير للديكور';

        //导航栏
        let nav = `<button class="nav-btn ${currentTab=='home'?'active':''}" onclick="go('home')">الرئيسية</button>
                   <button class="nav-btn ${currentTab=='catalogs'?'active':''}" onclick="go('catalogs')">الكتالوج</button>
                   <button class="nav-btn ${currentTab=='works'?'active':''}" onclick="go('works')">أعمالنا</button>`;
        document.getElementById('navbar').innerHTML = nav;

        let html = '';

        // الصفحة الرئيسية
        html += `<section class="sec ${currentTab=='home'?'active':''}"><div style="text-align:center;padding:40px;">
            <h2 style="color:var(--gold-dark);">مرحباً بكم</h2>
            <p>نقدم لكم أفضل التصاميم والديكورات</p>
            <button onclick="whatsapp()" class="whatsapp-cta"><i class="fab fa-whatsapp"></i> تواصل معنا</button>
            <div class="social-row">
                ${d.insta_url?`<a href="${d.insta_url}" class="social-icon-btn"><i class="fab fa-instagram"></i></a>`:''}
                ${d.tiktok_url?`<a href="${d.tiktok_url}" class="social-icon-btn"><i class="fab fa-tiktok"></i></a>`:''}
                ${d.snap_url?`<a href="${d.snap_url}" class="social-icon-btn"><i class="fab fa-snapchat"></i></a>`:''}
                ${d.location_url?`<a href="${d.location_url}" class="social-icon-btn"><i class="fas fa-map-marker-alt"></i></a>`:''}
            </div>
        </div></section>`;

        // الكتالوج
        html += `<section class="sec ${currentTab=='catalogs'?'active':''}">
            <div class="section-header"><div class="section-title">الكتالوج</div></div>
            <div class="grid">${drawFolders(d.catalogs)}</div>
        </section>`;

        // أعمالنا
        html += `<section class="sec ${currentTab=='works'?'active':''}">
            <div class="section-header"><div class="section-title">أعمالنا</div></div>
            <div class="grid">${drawAlbums(d.albums)}</div>
        </section>`;

        // الألبومات
        if (d.albums) {
            Object.keys(d.albums).forEach(id => {
                html += `<section class="sec ${currentTab=='alb-'+id?'active':''}">
                    <button onclick="go('works')" style="margin:20px;padding:8px 20px;border:1px solid var(--border);border-radius:30px;background:none;cursor:pointer;">← عودة</button>
                    <div class="section-header"><div class="section-title">${d.albums[id].name}</div></div>
                    <div class="grid">${drawImages(d.albums[id].imgs)}</div>
                </section>`;
            });
        }

        document.getElementById('content').innerHTML = html;
    }

    // دالة عرض الصور (المهمة)
    function drawImages(imgs) {
        if (!imgs) return '';
        let ids = Object.keys(imgs);
        let urls = ids.map(id => imgs[id].url);
        
        return ids.map((id, index) => {
            return `<div class="card">
                <div class="img-container" onclick='openViewer(${index}, ${JSON.stringify(urls)}, ${JSON.stringify(ids)})'>
                    <img src="${imgs[id].url}" loading="lazy">
                </div>
                <button class="btn-order" onclick="whatsappOrder('${imgs[id].url}')">استفسار</button>
            </div>`;
        }).join('');
    }

    function drawAlbums(albs) {
        if (!albs) return '';
        return Object.keys(albs).map(id => `
            <div class="folder-card" onclick="go('alb-${id}')">
                <div class="folder-icon"><i class="fas fa-folder-open"></i></div>
                <div>${albs[id].name}</div>
            </div>
        `).join('');
    }

    function drawFolders(cats) {
        if (!cats) return '<p>قريباً</p>';
        return Object.keys(cats).map(id => `
            <div class="folder-card">
                <div class="folder-icon"><i class="fas fa-book-open"></i></div>
                <div>${cats[id].name}</div>
            </div>
        `).join('');
    }

    // فتح viewer
    function openViewer(index, urls, ids) {
        slideImages = urls;
        slideIds = ids;
        slideIndex = index;
        
        document.getElementById('viewerImg').src = urls[index];
        document.getElementById('viewer').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        
        let counter = document.getElementById('viewerCounter');
        if (urls.length > 1) {
            counter.textContent = `${index+1} / ${urls.length}`;
            counter.style.display = 'block';
        } else {
            counter.style.display = 'none';
        }
    }

    function navigateSlide(dir) {
        if (!slideImages.length) return;
        slideIndex += dir;
        if (slideIndex < 0) slideIndex = slideImages.length - 1;
        if (slideIndex >= slideImages.length) slideIndex = 0;
        
        document.getElementById('viewerImg').src = slideImages[slideIndex];
        document.getElementById('viewerCounter').textContent = `${slideIndex+1} / ${slideImages.length}`;
    }

    function closeViewer() {
        document.getElementById('viewer').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // تكبير الصورة
    let zoom = 1;
    document.getElementById('viewerImg').addEventListener('dblclick', function() {
        zoom = zoom === 1 ? 2 : 1;
        this.style.transform = `scale(${zoom})`;
    });

    // واتساب
    function whatsapp() {
        let num = currentData.whatsapp_num || '966500000000';
        window.open(`https://wa.me/${num}?text=السلام عليكم`, '_blank');
    }
    function whatsappOrder(url) {
        let num = currentData.whatsapp_num || '966500000000';
        window.open(`https://wa.me/${num}?text=السلام عليكم، أستفسار عن: ${url}`, '_blank');
    }

    function go(tab) { currentTab = tab; render(); window.scrollTo(0,0); }

    // دخول الإدارة
    function checkAdmin() {
        let code = prompt("رمز الدخول:");
        if (code === "1234") alert("مرحباً بك");
        else if (code) alert("خطأ");
    }

    // تصدير الدوال
    window.go = go;
    window.whatsapp = whatsapp;
    window.whatsappOrder = whatsappOrder;
    window.openViewer = openViewer;
    window.navigateSlide = navigateSlide;
    window.closeViewer = closeViewer;
    window.checkAdmin = checkAdmin;

    // لوحة المفاتيح
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeViewer();
        if (e.key === 'ArrowLeft') navigateSlide(-1);
        if (e.key === 'ArrowRight') navigateSlide(1);
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>اختبار الدردشة - بصمة غير</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .user { text-align: right; color: blue; margin: 5px; }
        .admin { text-align: left; color: green; margin: 5px; }
        input { width: 80%; padding: 8px; }
        button { padding: 8px 16px; }
    </style>
</head>
<body>
    <h2>💬 اختبار الدردشة</h2>
    <div id="messages"></div>
    <input type="text" id="messageInput" placeholder="اكتب رسالتك...">
    <button id="sendBtn">إرسال</button>
    <p id="status"></p>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
            authDomain: "mydecor-b29bd.firebaseapp.com",
            databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mydecor-b29bd",
            storageBucket: "mydecor-b29bd.firebasestorage.app",
            messagingSenderId: "302609299720",
            appId: "1:302609299720:web:e086b600c3ee824acd54bd"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const testPath = 'site_v28/test_messages';
        
        let visitorId = 'test_' + Date.now();
        
        // إرسال رسالة
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            document.getElementById('status').innerText = 'جاري الإرسال...';
            
            try {
                const newMsg = {
                    id: Date.now(),
                    text: message,
                    sender: 'visitor',
                    time: Date.now()
                };
                
                await db.ref(`${testPath}/${visitorId}`).push(newMsg);
                input.value = '';
                document.getElementById('status').innerText = '✅ تم الإرسال بنجاح';
                setTimeout(() => {
                    document.getElementById('status').innerText = '';
                }, 2000);
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = '❌ فشل الإرسال: ' + error.message;
            }
        }
        
        // استماع للرسائل
        function listenMessages() {
            db.ref(`${testPath}/${visitorId}`).on('child_added', (snapshot) => {
                const msg = snapshot.val();
                const messagesDiv = document.getElementById('messages');
                const msgDiv = document.createElement('div');
                msgDiv.className = msg.sender === 'visitor' ? 'user' : 'admin';
                msgDiv.innerText = (msg.sender === 'visitor' ? '👤 أنت: ' : '🤵 الدعم: ') + msg.text;
                messagesDiv.appendChild(msgDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }
        
        // ربط الأحداث
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
        
        // بدء الاستماع
        listenMessages();
        
        // إرسال رسالة ترحيب
        setTimeout(() => {
            const welcome = document.getElementById('messages');
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'admin';
            welcomeDiv.innerText = '🤵 تم الاتصال بقاعدة البيانات بنجاح. أرسل رسالة للاختبار.';
            welcome.appendChild(welcomeDiv);
        }, 1000);
    </script>
</body>
</html>

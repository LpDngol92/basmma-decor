<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>بصمة غير للديكور</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;800;900&family=Amiri:wght@400;700&family=Lateef&family=Almarai:wght@300;400;800&family=Changa:wght@200;400;600;800&family=Lalezar&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5c0a0a;
            --gold: #c5a059;
            --bg: #0a0a0b;
            --card: rgba(20, 20, 22, 0.9);
            --green: #2ecc71;
            --red: #e74c3c;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border: rgba(197, 160, 89, 0.1);
            --nav-bg: rgba(10,10,11,0.95);
            --input-bg: #000;
            --input-border: #444;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --about-bg: rgba(255,255,255,0.03);
            --path-bg: rgba(197, 160, 89, 0.05);
            --status-bg: rgba(255,255,255,0.03);
            --admin-bg: #111;
            --admin-section: #1a1a1c;
            --header-font: 'Tajawal', sans-serif;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        img {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
            pointer-events: none;
            -webkit-touch-callout: none;
        }

        body { 
            font-family: var(--header-font); 
            background: var(--bg); 
            color: var(--text-primary); 
            overflow-x: hidden; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            transition: all 0.5s ease;
        }

        #splash { 
            position: fixed; 
            inset: 0; 
            background: linear-gradient(135deg, #5c0a0a, #c5a059);
            z-index: 99999999; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            flex-direction: column;
            gap: 2rem;
        }

        .splash-title {
            font-size: 3rem;
            color: white;
            font-weight: 900;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .splash-loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        nav { 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            background: var(--nav-bg); 
            backdrop-filter: blur(10px); 
            padding: 12px 10px; 
            border-bottom: 1px solid var(--gold); 
            display: flex; 
            justify-content: safe center; 
            gap: 10px; 
            overflow-x: auto; 
            scroll-behavior: smooth; 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        nav::-webkit-scrollbar { display: none; }

        .nav-btn { 
            padding: 8px 22px; 
            border: none; 
            background: rgba(255,255,255,0.05); 
            color: var(--text-secondary); 
            font-weight: 800; 
            border-radius: 40px; 
            cursor: pointer; 
            white-space: nowrap; 
            flex-shrink: 0; 
            transition: 0.3s; 
            border: 1px solid var(--border);
        }

        .nav-btn:hover {
            background: rgba(197, 160, 89, 0.15);
            color: var(--gold);
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .nav-btn.active { 
            background: linear-gradient(135deg, var(--primary), var(--gold));
            color: #fff; 
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
            border-color: var(--gold);
        }

        .partners-section { 
            height: auto;
            padding: 2.5rem 1.5rem;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            position: relative; 
            background: linear-gradient(180deg, rgba(92, 10, 10, 0.1), transparent);
            overflow: hidden; 
            border-bottom: 1px solid var(--border);
        }

        .partners-title-container {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
            padding: 0 20px;
        }

        .partners-title {
            color: var(--gold);
            font-weight: 900;
            font-size: 1.6rem;
            letter-spacing: 1px;
            z-index: 10;
            background: linear-gradient(135deg, #f1d39b, var(--gold), #8a6d3b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.3));
            pointer-events: none;
            position: relative;
            display: inline-block;
            font-family: var(--header-font);
        }

        .partner-slide-container {
            position: relative;
            width: 100%;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .partner-slide { 
            position: absolute; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            opacity: 0; 
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
            width: 100%;
            pointer-events: none;
            transform: scale(0.9);
        }

        .partner-slide.active { opacity: 1; transform: scale(1); }

        .partner-img { 
            max-height: 120px; 
            max-width: 70%; 
            object-fit: contain; 
            filter: drop-shadow(0 5px 15px var(--shadow-color));
            pointer-events: none;
        }

        .work-path-container { 
            margin: 2rem auto; 
            max-width: 900px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; 
            padding: 0 15px;
        }

        .path-step { 
            background: var(--path-bg); 
            border: 1px solid var(--border); 
            padding: 20px 15px; 
            border-radius: 15px; 
            text-align: center; 
            transition: transform 0.3s ease;
        }

        .path-step:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
        }

        .path-step i { color: var(--gold); font-size: 1.8rem; margin-bottom: 10px; display: block; }
        .path-step h4 { font-size: 1rem; color: var(--text-primary); font-weight: 800; margin-bottom: 5px; }
        .path-step p { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.4; }

        .about-toggle { 
            background: none; 
            border: 1.5px solid var(--gold); 
            color: var(--gold); 
            padding: 10px 25px; 
            border-radius: 40px; 
            font-weight: 800; 
            cursor: pointer; 
            margin-bottom: 15px; 
            transition: 0.3s; 
            display: inline-block; 
            margin-left: 5px; 
        }

        .about-toggle:hover {
            background: rgba(197, 160, 89, 0.1);
            transform: translateY(-2px);
        }

        .about-content { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.5s ease-out; 
            background: var(--about-bg); 
            border-radius: 15px; 
            margin: 0 auto 15px; 
            max-width: 900px; 
            line-height: 1.8; 
            color: var(--text-secondary); 
            text-align: right; 
        }

        .about-content.open { 
            max-height: 1500px; 
            padding: 20px; 
            border: 1px solid var(--border); 
        }

        .sec { 
            width: 95%; 
            max-width: 1200px; 
            margin: 20px auto 100px; 
            display: none; 
            flex-grow: 1; 
        }

        .sec.active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { 
            display: grid; 
            gap: 20px; 
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); 
        }

        .card { 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid var(--border); 
            position: relative; 
            transition: all 0.3s ease;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px var(--shadow-color);
            border-color: var(--gold);
        }

        .img-container { 
            position: relative; 
            width: 100%; 
            height: 160px; 
            cursor: pointer; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(92, 10, 10, 0.3), rgba(197, 160, 89, 0.2));
        }

        .img-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.5s ease;
        }

        .img-container:hover img {
            transform: scale(1.08);
        }

        .wm-tag { 
            position: absolute; 
            bottom: 8px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 0.7rem; 
            font-weight: 900; 
            color: rgba(255, 255, 255, 0.35); 
            text-shadow: 0 0 8px var(--gold); 
            pointer-events: none; 
            z-index: 2; 
            white-space: nowrap; 
        }

        .btn-order { 
            width: 100%; 
            padding: 12px; 
            background: linear-gradient(135deg, var(--primary), #7a0a0a);
            color: #fff; 
            border: none; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.3s ease;
        }

        .btn-order:hover {
            background: linear-gradient(135deg, #7a0a0a, var(--primary));
            transform: translateY(-2px);
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: 50px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            font-weight: 900;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .whatsapp-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
        }

        .status-badge { 
            padding: 10px 25px; 
            border-radius: 50px; 
            font-weight: 900; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 0.95rem; 
            transition: 0.3s; 
        }

        .open-glow { 
            background: rgba(46, 204, 113, 0.15); 
            color: #2ecc71; 
            border: 1.5px solid #2ecc71; 
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4); 
        }

        .closed-glow { 
            background: rgba(231, 76, 60, 0.15); 
            color: #e74c3c; 
            border: 1.5px solid #e74c3c; 
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.4); 
        }

        .social-icons { 
            display: flex; 
            justify-content: center; 
            gap: 2rem; 
            margin-top: 2rem; 
            flex-wrap: wrap;
        }

        .social-icons a { 
            color: var(--gold); 
            font-size: 1.8rem;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(197, 160, 89, 0.1);
            border-radius: 50%;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .social-icons a:hover {
            background: rgba(197, 160, 89, 0.2);
            transform: translateY(-3px);
        }

        .schedule-container {
            background: linear-gradient(135deg, rgba(92, 10, 10, 0.1), transparent);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 2rem;
            max-width: 900px;
            margin: 2rem auto;
        }

        .schedule-container h3 {
            text-align: center;
            color: var(--gold);
            font-weight: 900;
            margin-bottom: 1.5rem;
        }

        .schedule-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .schedule-day {
            background: var(--path-bg);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
        }

        .schedule-day h4 {
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .schedule-time {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .reviews-display-box { 
            background: var(--path-bg); 
            border: 1px solid var(--border); 
            border-radius: 15px; 
            max-width: 900px; 
            margin: 2rem auto; 
            padding: 2rem; 
            min-height: 120px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            position: relative; 
            overflow: hidden; 
        }

        .review-item { 
            position: absolute; 
            width: 100%; 
            padding: 20px; 
            transition: 0.5s; 
            opacity: 0; 
            transform: translateY(20px); 
            pointer-events: none; 
        }

        .review-item.active { 
            opacity: 1; 
            transform: translateY(0); 
            pointer-events: auto; 
        }

        #admin-panel { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: var(--admin-bg); 
            z-index: 100000000; 
            padding: 15px; 
            overflow-y: auto; 
        }

        #admin-panel.show {
            display: block;
        }

        .admin-box { 
            max-width: 900px; 
            margin: 20px auto; 
            background: var(--admin-bg); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid var(--gold); 
            color: var(--text-primary);
        }

        .collapse-section { 
            background: var(--admin-section); 
            border-radius: 10px; 
            margin-bottom: 10px; 
            border: 1px solid var(--border); 
        }

        .collapse-btn { 
            width: 100%; 
            padding: 15px; 
            background: none; 
            border: none; 
            color: var(--gold); 
            font-weight: 800; 
            text-align: right; 
            display: flex; 
            justify-content: space-between; 
            cursor: pointer;
        }

        .collapse-content { 
            display: none; 
            padding: 15px; 
            border-top: 1px solid var(--border); 
        }

        .collapse-content.show {
            display: block;
        }

        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 10px; 
            background: var(--input-bg); 
            border: 1px solid var(--input-border); 
            color: var(--text-primary); 
            border-radius: 8px; 
            font-family: 'Tajawal'; 
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--gold);
            outline: none;
        }

        footer { 
            padding: 2rem 1.5rem; 
            text-align: center; 
            color: var(--text-secondary); 
            font-size: 0.95rem; 
            border-top: 1px solid var(--border); 
            margin-top: auto; 
        }

        #hidden-trigger { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 60px; 
            height: 60px; 
            z-index: 200000000; 
            cursor: pointer; 
            opacity: 0;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .work-path-container { grid-template-columns: 1fr; }
            .social-icons { gap: 1rem; }
        }
    </style>
</head>
<body>
    <div id="splash">
        <div class="splash-title">🎨 بصمة غير</div>
        <div class="splash-loader"></div>
    </div>

    <div class="partners-section">
        <div class="partners-title-container">
            <div id="partners-title" class="partners-title"></div>
        </div>
        <div id="partners-display" class="partner-slide-container"></div>
    </div>

    <nav id="navbar"></nav>

    <main id="content-area"></main>

    <footer id="site-footer"></footer>

    <div id="admin-panel">
        <div class="admin-box">
            <h2 style="color:var(--gold); text-align:center; margin-bottom:20px;">لوحة الإدارة</h2>
            <div id="admin-content"></div>
        </div>
    </div>

    <div id="hidden-trigger" onclick="checkAccess()"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
            authDomain: "mydecor-b29bd.firebaseapp.com",
            databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mydecor-b29bd",
            storageBucket: "mydecor-b29bd.firebasestorage.app",
            messagingSenderId: "302609299720",
            appId: "1:302609299720:web:e086b600c3ee824acd54bd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'site_v28';

        let currentData = {};
        let currentTab = 'home';
        let isAdmin = false;

        db.ref(DB_PATH).on('value', snap => {
            currentData = snap.val() || {};
            render();
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                document.getElementById('splash').style.pointerEvents = 'none';
            }, 1500);
        });

        function render() {
            renderNav();
            renderPartners();
            renderContent();
            renderFooter();
        }

        function renderNav() {
            let navHtml = `<button class="nav-btn ${currentTab==='home'?'active':''}" onclick="switchTab('home')">الرئيسية</button>`;
            
            if(currentData.pages) {
                Object.keys(currentData.pages).forEach(id => {
                    navHtml += `<button class="nav-btn ${currentTab===id?'active':''}" onclick="switchTab('${id}')">${currentData.pages[id].title}</button>`;
                });
            }
            
            navHtml += `<button class="nav-btn ${currentTab==='works'?'active':''}" onclick="switchTab('works')">أعمالنا</button>`;

            document.getElementById('navbar').innerHTML = navHtml;
        }

        function renderPartners() {
            const container = document.getElementById('partners-display');
            document.getElementById('partners-title').innerText = currentData.partners_title || '';
            
            if(!currentData.partners) { 
                container.innerHTML = '<h2 style="color:var(--gold);">بصمة غير</h2>'; 
                return; 
            }
            
            const ids = Object.keys(currentData.partners);
            if(ids.length === 0) return;
            
            let html = ids.map((id, idx) => `<div class="partner-slide" id="partner-${idx}"><img src="${currentData.partners[id].url}" class="partner-img" oncontextmenu="return false;"></div>`).join('');
            container.innerHTML = html;
            
            let partnerIdx = 0;
            const cycle = () => {
                const all = document.querySelectorAll('.partner-slide');
                if(all.length === 0) return;
                all.forEach(el => el.classList.remove('active'));
                const current = document.getElementById(`partner-${partnerIdx}`);
                if(current) current.classList.add('active');
                partnerIdx = (partnerIdx + 1) % ids.length;
            };
            cycle();
            if(window.partnerInterval) clearInterval(window.partnerInterval);
            window.partnerInterval = setInterval(cycle, 4000);
        }

        function renderContent() {
            const d = currentData;
            let html = '';

            if(currentTab === 'home') {
                html += `
                    <section class="sec active">
                        <div style="text-align:center;">
                            <button class="about-toggle" onclick="toggleAbout('about-box')">من نحن</button>
                            <div id="about-box" class="about-content">${d.about_text || ''}</div>
                            
                            <div class="work-path-container">
                                <div class="path-step"><i class="fas fa-comments"></i><h4>الاستشارة</h4><p>نسمع أفكارك ونرسم التصور الأولي</p></div>
                                <div class="path-step"><i class="fas fa-ruler-combined"></i><h4>المعاينة</h4><p>زيارة الموقع ورفع المقاسات</p></div>
                                <div class="path-step"><i class="fas fa-pencil-ruler"></i><h4>التصميم</h4><p>تحويل الخيال لواقع</p></div>
                                <div class="path-step"><i class="fas fa-hammer"></i><h4>التنفيذ</h4><p>تطبيق بأعلى معايير الجودة</p></div>
                            </div>

                            <div class="schedule-container">
                                <h3>🕒 أوقات العمل</h3>
                                <div class="schedule-display" id="schedule-display"></div>
                            </div>

                            <button class="whatsapp-btn" onclick="whatsappGlobal()">
                                تواصل معنا <i class="fab fa-whatsapp"></i>
                            </button>

                            <div class="social-icons">
                                ${d.insta_url ? `<a href="${d.insta_url}" target="_blank"><i class="fab fa-instagram"></i></a>`:''}
                                ${d.tiktok_url ? `<a href="${d.tiktok_url}" target="_blank"><i class="fab fa-tiktok"></i></a>`:''}
                                ${d.snap_url ? `<a href="${d.snap_url}" target="_blank"><i class="fab fa-snapchat"></i></a>`:''}
                            </div>
                        </div>
                    </section>
                `;

                renderSchedule();
            } else if(currentTab === 'works') {
                html += `<section class="sec active"><div class="grid">${renderAlbums()}</div></section>`;
            } else {
                const pageData = d.pages?.[currentTab];
                if(pageData) {
                    html += `<section class="sec active"><div class="grid">${drawImgs(pageData.imgs)}</div></section>`;
                }
            }

            document.getElementById('content-area').innerHTML = html;
        }

        function renderSchedule() {
            const d = currentData;
            if(!d.work_schedule) return;
            
            let html = '';
            const daysArabic = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const customOrder = [6, 0, 1, 2, 3, 4, 5];

            customOrder.forEach(jsDay => {
                const s = d.work_schedule[jsDay];
                const dayName = daysArabic[jsDay];

                if(s && s.active) {
                    const start = s.s1_s || '09:00';
                    const end = s.s1_e || '17:00';
                    html += `
                        <div class="schedule-day">
                            <h4>${dayName}</h4>
                            <div class="schedule-time">${start} - ${end}</div>
                            ${s.s2_a && s.s2_s && s.s2_e ? `<div class="schedule-time">${s.s2_s} - ${s.s2_e}</div>` : ''}
                        </div>
                    `;
                } else {
                    html += `
                        <div class="schedule-day">
                            <h4>${dayName}</h4>
                            <div class="schedule-time" style="color: var(--red);">إجازة</div>
                        </div>
                    `;
                }
            });

            document.getElementById('schedule-display').innerHTML = html;
        }

        function drawImgs(imgs) { 
            if(!imgs) return '<p style="text-align:center; padding:50px; color:var(--text-secondary);">قريباً...</p>'; 
            
            const wmTxt = currentData.wm_text || ''; 
            return Object.keys(imgs).reverse().map((id) => {
                const imgUrl = imgs[id].url;
                return `
                    <div class="card">
                        <div class="img-container" onclick="openImg('${imgUrl}')">
                            <img src="${imgUrl}" loading="lazy" onerror="this.style.display='none';">
                            <div class="wm-tag">${wmTxt}</div>
                        </div>
                        <button onclick="whatsappOrder('${imgUrl}')" class="btn-order">استفسار</button>
                    </div>
                `;
            }).join('');
        }

        function renderAlbums() {
            if(!currentData.albums) return '';
            return Object.keys(currentData.albums).map(id => `
                <div class="card" onclick="switchTab('${id}')" style="padding:40px; text-align:center; cursor:pointer;">
                    <h3 style="color:var(--gold);">${currentData.albums[id].name}</h3>
                </div>
            `).join('');
        }

        function switchTab(id) {
            currentTab = id;
            renderNav();
            renderContent();
        }

        function toggleAbout(id) {
            document.getElementById(id).classList.toggle('open');
        }

        function whatsappGlobal() {
            window.open(`https://wa.me/${currentData.whatsapp_num}?text=${encodeURIComponent('السلام عليكم، أود التواصل مع بصمة غير للديكور.')}`);
        }

        function whatsappOrder(url) {
            window.open(`https://wa.me/${currentData.whatsapp_num}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن هذا التصميم:\n'+url)}`);
        }

        function openImg(url) {
            alert('سيتم فتح الصورة');
            window.open(url, '_blank');
        }

        function renderFooter() {
            document.getElementById('site-footer').innerText = currentData.footer_text || '© جميع الحقوق محفوظة';
        }

        function checkAccess() {
            const userInput = prompt("🔐 أدخل رمز الإدارة:");
            if (!userInput) return;

            db.ref(DB_PATH).once('value')
                .then(snapshot => {
                    const data = snapshot.val();
                    if (data.in && data.in.toString() === userInput.toString()) {
                        isAdmin = true;
                        enterAdminPanel();
                    } else {
                        alert("❌ الرمز غير صحيح!");
                    }
                });
        }

        function enterAdminPanel() {
            document.getElementById('admin-panel').classList.add('show');
            renderAdminPanel();
        }

        function renderAdminPanel() {
            // سيتم ملء هذا الجزء بأكمله لاحقاً
            let html = `
                <button onclick="closeAdmin()" style="background: var(--red); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 20px;">إغلاق</button>
                <p style="color: var(--gold); text-align: center;">لوحة الإدارة الكاملة قريباً...</p>
            `;
            document.getElementById('admin-content').innerHTML = html;
        }

        function closeAdmin() {
            document.getElementById('admin-panel').classList.remove('show');
            isAdmin = false;
        }
    </script>
</body>
</html>

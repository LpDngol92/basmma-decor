        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",

        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let favorites = JSON.parse(localStorage.getItem('site_favorites_v8')) || [];
    let currentPage = 'home';
    let currentImageList = [];
    let currentImageIndex = 0;
    let currentImageId = '';
    let zoomScale = 1, translate = { x: 0, y: 0 }, isZoomed = false, isDraggingImg = false;
    let tabScrollInterval = null;
    let isTabDragging = false;
    let tabStartX = 0, tabScrollLeft = 0;

    let dataLoaded = false;   // للتأكد من تحميل البيانات قبل العرض

    // ========== دوال تحويل الروابط العربية ==========
    function getPageArabicName(pageKey) {
        if (pageKey === 'home') return 'الرئيسية';
        if (pageKey === 'works') return 'أعمالنا';
        if (pageKey === 'catalogs') return 'الكــتالوجات';
        if (pageKey === 'favorites') return 'المفضلة';
        if (pageKey.startsWith('page_')) {
            const pageId = pageKey.substring(5);
            if (currentData.pages && currentData.pages[pageId] && currentData.pages[pageId].title)
                return currentData.pages[pageId].title;
            return 'صفحة_' + pageId;
        }
        return pageKey;
    }
    function getPageKeyFromArabic(arabicName) {
        if (arabicName === 'الرئيسية') return 'home';
        if (arabicName === 'أعمالنا') return 'works';
        if (arabicName === 'الكــتالوجات') return 'catalogs';
        if (arabicName === 'المفضلة') return 'favorites';
        if (currentData.pages) {
            for (let pid in currentData.pages) {
                if (currentData.pages[pid].title === arabicName)
                    return 'page_' + pid;
            }
        }
        return null;
    }
    function updateHashFromPage(pageKey) {
        const newHash = getPageArabicName(pageKey);
        if (window.location.hash !== '#' + newHash) {
            history.pushState(null, '', '#' + newHash);
        }
    }

    // ========== دوال مساعدة ==========
    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
    function closePopup() { document.getElementById('popupBubble').style.display = 'none'; if (popupTimeout) clearTimeout(popupTimeout); }
    function saveFav() { localStorage.setItem('site_favorites_v8', JSON.stringify(favorites)); }
    function toggleFavorite(imgId, imgUrl) {
        const exists = favorites.find(f => f.id === imgId);
        if (exists) { favorites = favorites.filter(f => f.id !== imgId); showToast('🗑️ تمت الإزالة من المفضلة'); }
        else { favorites.unshift({ id: imgId, url: imgUrl, date: Date.now() }); showToast('❤️ أضيف إلى المفضلة'); }
        saveFav(); renderCurrentPage(); updateViewerFavButton();
    }
    function isFav(imgId) { return favorites.some(f => f.id === imgId); }
    function updateViewerFavButton() {
        const btn = document.getElementById('viewerFavBtn');
        if (btn && currentImageId) {
            if (isFav(currentImageId)) { btn.classList.add('active'); btn.innerHTML = '<i class="fas fa-heart"></i>'; btn.style.background = 'white'; btn.style.color = 'var(--danger)'; }
            else { btn.classList.remove('active'); btn.innerHTML = '<i class="far fa-heart"></i>'; btn.style.background = 'rgba(0,0,0,0.6)'; btn.style.color = 'white'; }
        }
    }
    function viewerToggleFavorite() { if (currentImageId && currentImageList[currentImageIndex]) toggleFavorite(currentImageId, currentImageList[currentImageIndex]); }
    function viewerWhatsapp() { if (currentImageList[currentImageIndex]) window.open(`https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن هذا التصميم:\n'+currentImageList[currentImageIndex])}`, '_blank'); }
    function closeViewer() { document.getElementById('viewerModal').style.display = 'none'; document.body.style.overflow = ''; resetZoom(); currentImageList = []; }
    function viewerNext() { if (!currentImageList.length) return; currentImageIndex = (currentImageIndex + 1) % currentImageList.length; document.getElementById('viewerImg').src = currentImageList[currentImageIndex]; document.getElementById('viewerCounter').innerText = `${currentImageIndex+1}/${currentImageList.length}`; currentImageId = `img_${Date.now()}_${currentImageIndex}`; resetZoom(); updateViewerFavButton(); }
    function viewerPrev() { if (!currentImageList.length) return; currentImageIndex = (currentImageIndex - 1 + currentImageList.length) % currentImageList.length; document.getElementById('viewerImg').src = currentImageList[currentImageIndex]; document.getElementById('viewerCounter').innerText = `${currentImageIndex+1}/${currentImageList.length}`; currentImageId = `img_${Date.now()}_${currentImageIndex}`; resetZoom(); updateViewerFavButton(); }
    function resetZoom() { zoomScale = 1; translate = { x: 0, y: 0 }; const img = document.getElementById('viewerImg'); if (img) img.style.transform = `scale(1) translate(0px, 0px)`; isZoomed = false; }
    function formatTime12(t) { if(!t) return ""; let [h,m]=t.split(':'); h=parseInt(h); return `${h%12||12}:${m} ${h>=12?'م':'ص'}`; }
    function getGroupedScheduleHtml(d) {
        if (!d.work_schedule) return '<p>لم تحدد المواعيد بعد</p>';
        const dayNames = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"], daysOrder = [6,0,1,2,3,4,5];
        let groups = [], offDays = [];
        daysOrder.forEach(jsDay => {
            const s = d.work_schedule[jsDay];
            if (s && s.active) {
                const key = `${s.s1_s}-${s.s1_e}-${s.s2_a}-${s.s2_s}-${s.s2_e}`;
                let g = groups.find(g => g.key === key);
                if (g) g.days.push(dayNames[jsDay]);
                else groups.push({ key, days: [dayNames[jsDay]], data: s });
            } else offDays.push(dayNames[jsDay]);
        });
        let html = '';
        groups.forEach(g => {
            const dText = g.days.length === 1 ? g.days[0] : `من ${g.days[0]} إلى ${g.days[g.days.length-1]}`;
            html += `<div class="schedule-group"><div class="schedule-days">${dText}</div><div class="time-period"><span class="time-text">${formatTime12(g.data.s1_s||'09:00')}</span> — <span class="time-text">${formatTime12(g.data.s1_e||'17:00')}</span></div>`;
            if (g.data.s2_a) html += `<div class="time-period"><span class="time-text">${formatTime12(g.data.s2_s)}</span> — <span class="time-text">${formatTime12(g.data.s2_e)}</span></div>`;
            html += `</div>`;
        });
        if (offDays.length) html += `<div class="holiday-text"><i class="fas fa-moon"></i> عطلة: ${offDays.join('، ')}</div>`;
        return html;
    }
    function updateWorkStatus() {
        const c = document.getElementById('statusContainer');
        if (!c || !currentData.work_schedule) return;
        const now = new Date(), day = now.getDay(), s = currentData.work_schedule[day];
        let open = false;
        if (s && s.active) {
            const toMins = (t) => { let [h,m]=t.split(':').map(Number); return h*60+m; };
            const cur = now.getHours()*60+now.getMinutes();
            const s1 = toMins(s.s1_s), e1 = toMins(s.s1_e);
            if (cur >= s1 && cur < e1) open = true;
            if (!open && s.s2_a && s.s2_s && s.s2_e) { const s2 = toMins(s.s2_s), e2 = toMins(s.s2_e); if ((e2 < s2 && (cur >= s2 || cur < e2)) || (cur >= s2 && cur < e2)) open = true; }
        }
        c.innerHTML = open ? `<div class="status-badge status-open"><i class="fas fa-circle"></i> مفتوح الآن</div>` : `<div class="status-badge status-closed"><i class="fas fa-circle"></i> مغلق الآن</div>`;
    }
    function showPopup() { if (!currentData.popup_enabled) return; const bubble = document.getElementById('popupBubble'); const message = currentData.popup_message || 'مرحباً بكم في عالم التصميم والأناقة ✨'; document.getElementById('popupMessage').innerText = message; bubble.style.display = 'block'; if (popupTimeout) clearTimeout(popupTimeout); popupTimeout = setTimeout(() => { closePopup(); }, (currentData.popup_duration || 8) * 1000); }

    // ========== دوال العرض ==========
    function renderImageGallery(images, parentId) {
        if (!images || Object.keys(images).length === 0) return '<div class="empty-state"><i class="fas fa-image fa-3x"></i><p>لا توجد صور</p></div>';
        const imageIds = Object.keys(images);
        let html = '<div class="photo-grid" data-grid="true">';
        for (let i = 0; i < imageIds.length; i++) {
            const imgId = imageIds[i];
            const imgUrl = images[imgId].url;
            const fullId = `${parentId}_${imgId}`;
            const favClass = isFav(fullId) ? 'active' : '';
            html += `<div class="photo-item" data-img-url="${imgUrl}" data-img-index="${i}">
                        <img src="${imgUrl}" loading="lazy">
                        <div class="photo-overlay">
                            <button class="action-btn-icon fav-btn-icon ${favClass}" onclick="event.stopPropagation(); toggleFavorite('${fullId}', '${imgUrl}')"><i class="fas fa-heart"></i></button>
                            <button class="action-btn-icon whatsapp-btn-icon" onclick="event.stopPropagation(); window.open('https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن هذا التصميم:\n'+imgUrl)}', '_blank')"><i class="fab fa-whatsapp"></i></button>
                        </div>
                     </div>`;
        }
        html += '</div>';
        return html;
    }
    function renderHome() {
        const d = currentData;
        let reviewsHtml = '';
        if (d.reviews && Object.keys(d.reviews).length) {
            reviewsHtml = `<div class="info-card"><div class="card-title"><i class="fas fa-star"></i> تقييمات العملاء</div><div class="review-slider" id="reviewSlider">${Object.keys(d.reviews).map((id,i)=>`<div class="review-item"><div class="review-stars">${'★'.repeat(d.reviews[id].rating)}${'☆'.repeat(5-d.reviews[id].rating)}</div><div class="review-text">"${d.reviews[id].message}"</div><div class="review-name">— ${d.reviews[id].name}</div></div>`).join('')}</div></div>`;
        }
        return `
            <div class="info-card"><div class="card-title"><i class="fas fa-info-circle"></i> من نحن</div>${d.about_text || 'نقدم لكم أرقى التصاميم الداخلية والديكورات الفاخرة.'}</div>
            <div class="info-card"><div class="card-title"><i class="fas fa-star"></i> أضف تقييمك</div><input type="text" id="reviewName" placeholder="اسمك الكريم"><div class="star-rating" id="starRating"><i class="fas fa-star" data-star="5"></i><i class="fas fa-star" data-star="4"></i><i class="fas fa-star" data-star="3"></i><i class="fas fa-star" data-star="2"></i><i class="fas fa-star" data-star="1"></i></div><textarea id="reviewMsg" placeholder="شاركنا تجربتك..." rows="3"></textarea><button onclick="submitReview()" class="admin-btn btn-gold">إرسال التقييم</button></div>
            ${reviewsHtml}
            <div class="info-card"><div class="card-title"><i class="fas fa-clock"></i> أوقات العمل</div>${getGroupedScheduleHtml(d)}<div id="statusContainer" style="margin-top:15px;"></div></div>
            ${d.location_url ? `<div class="info-card"><button onclick="window.open('${d.location_url}','_blank')" class="location-btn"><i class="fas fa-map-marker-alt"></i> موقعنا على الخريطة</button></div>` : ''}
            <div class="info-card"><div class="card-title"><i class="fab fa-whatsapp"></i> تواصل معنا</div><button onclick="whatsappGlobal()" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> واتساب</button><div class="social-links" id="socialLinks"></div></div>
        `;
    }
    function renderWorks() {
        const d = currentData;
        if (!d.albums || Object.keys(d.albums).length === 0) return '<div class="empty-state"><i class="fas fa-folder-open fa-3x"></i><p>لا توجد ألبومات بعد</p></div>';
        let html = '<div style="display:grid; grid-template-columns:repeat(2,1fr); gap:12px;">';
        Object.keys(d.albums).forEach(id => {
            const album = d.albums[id];
            let cover = '';
            if (album.imgs && Object.keys(album.imgs).length) cover = Object.values(album.imgs)[0].url;
            const coverId = `album_${id}_cover`;
            const isFavCover = isFav(coverId);
            html += `<div class="album-card" data-album-id="${id}">
                        ${cover ? `<img src="${cover}" loading="lazy" onerror="this.style.display='none'">` : '<i class="fas fa-folder-open fa-3x"></i>'}
                        <h4>${album.name || 'بدون عنوان'}</h4>
                        <div class="album-overlay">
                            <button class="album-icon-btn fav-album-btn ${isFavCover ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${coverId}', '${cover}')"><i class="fas fa-heart"></i></button>
                            <button class="album-icon-btn whatsapp-album-btn" onclick="event.stopPropagation(); window.open('https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن هذا التصميم:\n'+cover)}', '_blank')"><i class="fab fa-whatsapp"></i></button>
                        </div>
                     </div>`;
        });
        html += '</div>';
        return html;
    }
    function attachAlbumListeners() {
        const mainContainer = document.getElementById('mainContent');
        if (!mainContainer) return;
        mainContainer.removeEventListener('click', albumClickHandler);
        mainContainer.addEventListener('click', albumClickHandler);
    }
    function albumClickHandler(e) {
        const albumCard = e.target.closest('.album-card');
        if (!albumCard) return;
        if (e.target.closest('.album-icon-btn')) return;
        const albumId = albumCard.getAttribute('data-album-id');
        if (albumId) openAlbum(albumId);
    }
    function openAlbum(albumId) {
        const album = currentData.albums && currentData.albums[albumId];
        if (!album) { showToast("الألبوم غير موجود"); return; }
        if (!album.imgs || Object.keys(album.imgs).length === 0) { showToast("لا توجد صور في هذا الألبوم"); return; }
        const urls = Object.values(album.imgs).map(img => img.url).filter(url => url && url.trim() !== "");
        if (urls.length === 0) { showToast("لا توجد صور صالحة في هذا الألبوم"); return; }
        openViewer(urls[0], urls, 0, `album_${albumId}_0`);
    }
    function renderCatalogs() {
        const d = currentData;
        if (!d.catalogs || Object.keys(d.catalogs).length === 0) return '<div class="empty-state"><i class="fas fa-book-open fa-3x"></i><p>لا توجد كتالوجات بعد</p></div>';
        let html = '<div style="display:grid; grid-template-columns:repeat(2,1fr); gap:12px;">';
        Object.keys(d.catalogs).forEach(id => { html += `<div class="folder-card" onclick="openCatalog('${id}')"><i class="fas fa-book-open fa-3x" style="color:var(--accent);"></i><h4>${d.catalogs[id].name}</h4></div>`; });
        html += '</div>';
        return html;
    }
    function openCatalog(catId) { const cat = currentData.catalogs[catId]; if (cat && cat.code) { const win = window.open(); win.document.write(cat.code); } else showToast('رابط الكتالوج غير متاح'); }
    function renderFavorites() {
        if (favorites.length === 0) return '<div class="empty-state"><i class="far fa-heart fa-3x"></i><p>لا توجد صور في المفضلة</p></div>';
        let html = '<div class="photo-grid" data-grid="true">';
        favorites.forEach((fav, idx) => {
            html += `<div class="photo-item" data-img-url="${fav.url}" data-img-index="${idx}">
                        <img src="${fav.url}" loading="lazy">
                        <div class="photo-overlay">
                            <button class="action-btn-icon fav-btn-icon active" onclick="event.stopPropagation(); toggleFavorite('${fav.id}', '${fav.url}')"><i class="fas fa-heart"></i></button>
                            <button class="action-btn-icon whatsapp-btn-icon" onclick="event.stopPropagation(); window.open('https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن هذا التصميم:\n'+fav.url)}', '_blank')"><i class="fab fa-whatsapp"></i></button>
                        </div>
                     </div>`;
        });
        html += '</div>';
        return html;
    }
    function renderPage(pageId) {
        const page = currentData.pages[pageId];
        if (!page || !page.imgs) return '<div class="empty-state"><i class="fas fa-image fa-3x"></i><p>لا توجد صور</p></div>';
        return renderImageGallery(page.imgs, `page_${pageId}`);
    }
    function renderTabs() {
        const container = document.getElementById('tabsSection');
        const tabs = [
            { key: 'home', name: 'الرئيسية', icon: 'fa-home' },
            { key: 'works', name: 'أعمالنا', icon: 'fa-images' },
            { key: 'catalogs', name: 'الكــتالوجات', icon: 'fa-book-open' },
            { key: 'favorites', name: 'المفضلة', icon: 'fa-heart' }
        ];
        let html = '';
        tabs.forEach(tab => {
            const activeClass = (currentPage === tab.key) ? 'active' : '';
            html += `<button class="tab-btn ${activeClass}" data-page-key="${tab.key}"><i class="fas ${tab.icon}"></i> ${tab.name}</button>`;
        });
        if (currentData.pages) {
            Object.keys(currentData.pages).forEach(pageId => {
                const pageTitle = currentData.pages[pageId].title || 'صفحة';
                const pageKey = 'page_' + pageId;
                const activeClass = (currentPage === pageKey) ? 'active' : '';
                html += `<button class="tab-btn ${activeClass}" data-page-key="${pageKey}"><i class="fas fa-file-alt"></i> ${pageTitle}</button>`;
            });
        }
        container.innerHTML = html;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const pageKey = btn.getAttribute('data-page-key');
                if (pageKey && pageKey !== currentPage) {
                    currentPage = pageKey;
                    updateHashFromPage(currentPage);
                    renderCurrentPage();
                    renderTabs(); // تحديث الأزرار النشطة
                    setTimeout(updateTabIndicator, 100);
                }
            });
        });
        setTimeout(() => { updateTabIndicator(); initTabsDragging(); startTabAutoScroll(); }, 100);
        window.addEventListener('resize', updateTabIndicator);
    }
    function renderPartnersMarquee() {
        const container = document.getElementById('partnersMarquee');
        const track = document.getElementById('marqueeTrack');
        const partners = currentData.partners ? Object.values(currentData.partners) : [];
        if (partners.length === 0) { container.style.display = 'none'; return; }
        container.style.display = 'block';
        let content = '';
        partners.forEach(p => {
            const link = p.link || '#';
            content += `<div class="partner-item" onclick="if('${link}' !== '#') window.open('${link}', '_blank');"><img src="${p.url}" class="partner-logo" alt="شريك" loading="lazy"></div>`;
        });
        track.innerHTML = content;
        const wrapper = document.getElementById('marqueeWrapper');
        if (wrapper) {
            let isDown = false, startXScroll, scrollLeftPos;
            wrapper.addEventListener('mousedown', (e) => { isDown = true; wrapper.style.cursor = 'grabbing'; startXScroll = e.pageX - wrapper.offsetLeft; scrollLeftPos = wrapper.scrollLeft; });
            wrapper.addEventListener('mouseleave', () => { isDown = false; wrapper.style.cursor = 'grab'; });
            wrapper.addEventListener('mouseup', () => { isDown = false; wrapper.style.cursor = 'grab'; });
            wrapper.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - wrapper.offsetLeft; const walk = (x - startXScroll) * 1.5; wrapper.scrollLeft = scrollLeftPos - walk; });
            wrapper.style.cursor = 'grab';
        }
    }
    function renderSocial() { const d = currentData, c = document.getElementById('socialLinks'); if (!c) return; let h = ''; if (d.insta_url) h += `<a href="${d.insta_url}" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>`; if (d.tiktok_url) h += `<a href="${d.tiktok_url}" target="_blank" class="social-link"><i class="fab fa-tiktok"></i></a>`; if (d.snap_url) h += `<a href="${d.snap_url}" target="_blank" class="social-link"><i class="fab fa-snapchat"></i></a>`; c.innerHTML = h; }
    function startReviewSlider() {
        if (window.reviewInterval) clearInterval(window.reviewInterval);
        const items = document.querySelectorAll('.review-item');
        if (!items.length) return;
        let idx = 0;
        items.forEach((item, i) => item.classList.remove('active'));
        items[0]?.classList.add('active');
        window.reviewInterval = setInterval(() => { idx = (idx + 1) % items.length; items.forEach((item, i) => item.classList.remove('active')); items[idx]?.classList.add('active'); }, 4000);
    }
    function setupStarRating() {
        let selected = 0;
        const stars = document.querySelectorAll('#starRating i');
        stars.forEach(star => { star.onclick = () => { selected = parseInt(star.dataset.star); stars.forEach(s => s.classList.remove('active')); for(let i=stars.length-1; i>=stars.length-selected; i--) stars[i]?.classList.add('active'); }; });
        window.submitReview = () => { const name = document.getElementById('reviewName')?.value, msg = document.getElementById('reviewMsg')?.value; if (!name || !msg || !selected) return showToast('يرجى إكمال جميع الحقول'); db.ref(DB_PATH+'/reviews').push({ name, message: msg, rating: selected }).then(() => { showToast('شكراً لتقييمك!'); document.getElementById('reviewName').value = ''; document.getElementById('reviewMsg').value = ''; selected = 0; stars.forEach(s => s.classList.remove('active')); }); };
    }
    function bindPhotoGridClick() {
        document.removeEventListener('click', photoGridClickListener);
        document.addEventListener('click', photoGridClickListener);
    }
    function photoGridClickListener(e) {
        const photoItem = e.target.closest('.photo-item');
        if (!photoItem) return;
        if (e.target.closest('.action-btn-icon')) return;
        const grid = photoItem.closest('.photo-grid');
        if (!grid) return;
        const allPhotoItems = Array.from(grid.querySelectorAll('.photo-item'));
        const urls = allPhotoItems.map(item => item.querySelector('img')?.src).filter(src => src);
        if (urls.length === 0) return;
        const currentImg = photoItem.querySelector('img');
        if (!currentImg) return;
        const currentUrl = currentImg.src;
        const index = urls.findIndex(u => u === currentUrl);
        if (index !== -1) { const imgId = photoItem.getAttribute('data-id') || `img_${Date.now()}_${index}`; openViewer(currentUrl, urls, index, imgId); }
        else { openViewer(currentUrl, urls, 0, `img_${Date.now()}`); }
    }
    function initTabsDragging() {
        const tabsContainer = document.getElementById('tabsSection');
        if (!tabsContainer) return;
        const onMouseDown = (e) => { if (e.target.closest('.tab-btn')) return; isTabDragging = true; tabStartX = e.pageX - tabsContainer.offsetLeft; tabScrollLeft = tabsContainer.scrollLeft; tabsContainer.style.cursor = 'grabbing'; tabsContainer.style.scrollBehavior = 'auto'; };

    function updateGlassIndicators() {

    function setupZoomEvents() {

        function handleWheel(e) { e.preventDefault(); const delta = e.deltaY > 0 ? -0.1 : 0.1; zoomScale = Math.min(Math.max(zoomScale + delta, 1), 3); img.style.transform = `scale(${zoomScale}) translate(${translate.x}px, ${translate.y}px)`; isZoomed = zoomScale > 1; }
        function handleMouseDown(e) { if (!isZoomed) return; e.preventDefault(); isDraggingImg = true; startX = e.clientX; startY = e.clientY; startTX = translate.x; startTY = translate.y; }
        function handleMouseMove(e) { if (!isDraggingImg || !isZoomed) return; translate.x = startTX + (e.clientX - startX); translate.y = startTY + (e.clientY - startY); img.style.transform = `scale(${zoomScale}) translate(${translate.x}px, ${translate.y}px)`; }
        function handleMouseUp() { isDraggingImg = false; }
        function handleDoubleClick(e) { e.preventDefault(); if (zoomScale > 1) resetZoom(); else { zoomScale = 2; img.style.transform = `scale(2) translate(0px, 0px)`; isZoomed = true; } }

        function handleTouchStart(e) { if (!isZoomed) return; if (e.touches.length === 1) { e.preventDefault(); isDraggingImg = true; touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; touchStartTX = translate.x; touchStartTY = translate.y; } }

        function handleTouchEnd() { isDraggingImg = false; }
        let initialDistance = 0;
        img.addEventListener('touchstart', (e) => { if (e.touches.length === 2) { e.preventDefault(); const dx = e.touches[0].clientX - e.touches[1].clientX; const dy = e.touches[0].clientY - e.touches[1].clientY; initialDistance = Math.sqrt(dx * dx + dy * dy); } });

        img.addEventListener('wheel', handleWheel, { passive: false }); img.addEventListener('mousedown', handleMouseDown); img.addEventListener('dblclick', handleDoubleClick);

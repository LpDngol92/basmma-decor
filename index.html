<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>بصمة غير</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* حاوية السبلاش - تغطي كامل الشاشة */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        /* الحل السحري للـ GIF أو الصورة - يغطي الشاشة كاملة بدون قطع */
        .splash-gif {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }
        
        /* زر التخطي */
        .splash-skip {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-family: sans-serif;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 10000;
        }
        
        .splash-skip:hover {
            background: rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<div id="splash">
    <!-- هنا حيتم وضع الـ GIF أو الصورة بواسطة الجافاسكريبت -->
</div>

<script>
    // إعدادات السبلاش - غير القيم حسب رغبتك
    const splashSettings = {
        enabled: true,           // تفعيل السبلاش
        mediaUrl: "رابط_gif_حقك_هنا.gif",   // حط رابط الصورة أو GIF حقك هنا
        duration: 5,            // المدة بالثواني (5 ثواني)
        showSkip: true          // إظهار زر التخطي
    };
    
    function showSplash(settings) {
        const splashDiv = document.getElementById('splash');
        if (!splashDiv) return;
        
        // إذا كان السبلاش معطل
        if (!settings.enabled) {
            splashDiv.style.display = 'none';
            return;
        }
        
        // تفريغ المحتوى القديم
        splashDiv.innerHTML = '';
        
        // إضافة الصورة أو الـ GIF
        if (settings.mediaUrl) {
            const img = document.createElement('img');
            img.src = settings.mediaUrl;
            img.className = 'splash-gif';
            img.alt = 'Splash';
            img.style.objectFit = 'cover';
            splashDiv.appendChild(img);
        } else {
            // إذا مافيه رابط، نضيف لون أسود
            splashDiv.style.backgroundColor = 'black';
        }
        
        // إضافة زر التخطي إذا كان مفعل
        if (settings.showSkip) {
            const skipBtn = document.createElement('button');
            skipBtn.innerText = 'تخطي ←';
            skipBtn.className = 'splash-skip';
            skipBtn.onclick = () => {
                splashDiv.style.opacity = '0';
                setTimeout(() => {
                    splashDiv.style.display = 'none';
                }, 300);
            };
            splashDiv.appendChild(skipBtn);
        }
        
        // إظهار السبلاش
        splashDiv.style.display = 'flex';
        splashDiv.style.opacity = '1';
        
        // إخفاء السبلاش تلقائياً بعد المدة المحددة
        setTimeout(() => {
            splashDiv.style.opacity = '0';
            setTimeout(() => {
                splashDiv.style.display = 'none';
            }, 300);
        }, settings.duration * 1000);
    }
    
    // تشغيل السبلاش
    showSplash(splashSettings);
</script>

<!-- باقي محتوى موقعك يأتي هنا -->
<h1 style="text-align:center; margin-top:50px;">بصمة غير - ديكور فاخر</h1>
<p style="text-align:center;">هذا هو محتوى موقعك بعد اختفاء السبلاش</p>

</body>
</html>

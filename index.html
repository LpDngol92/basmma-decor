<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>بصمة غير - تصميم عصري</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Clash+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ======================== متغيرات عصرية ======================== */
:root {
    /* ألوان عصرية جريئة - بعيداً عن الذهبي والأسود */
    --bg-primary: #f8fafc;
    --bg-secondary: #f1f5f9;
    --bg-tertiary: #e2e8f0;
    --surface-1: #ffffff;
    --surface-2: #f8fafc;
    --surface-3: #f1f5f9;
    
    /* ألوان أساسية عصرية */
    --primary-100: #e0f2fe;
    --primary-200: #bae6fd;
    --primary-300: #7dd3fc;
    --primary-400: #38bdf8;
    --primary-500: #0ea5e9;
    --primary-600: #0284c7;
    --primary-700: #0369a1;
    --primary-800: #075985;
    --primary-900: #0c4a6e;
    
    /* ألوان أكسنت جريئة */
    --accent-500: #f43f5e;
    --accent-600: #e11d48;
    
    /* ألوان النص */
    --text-primary: #0f172a;
    --text-secondary: #334155;
    --text-tertiary: #64748b;
    --text-muted: #94a3b8;
    --text-inverse: #ffffff;
    
    /* الظلال */
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.025);
    --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.01);
    --shadow-2xl: 0 25px 50px -12px rgba(0,0,0,0.15);
    
    /* الخطوط العصرية */
    --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-display: 'Space Grotesk', sans-serif;
    --font-heading: 'Syne', sans-serif;
    --font-mono: 'SF Mono', monospace;
    
    /* حدود وزوايا */
    --border-radius-sm: 8px;
    --border-radius-md: 12px;
    --border-radius-lg: 16px;
    --border-radius-xl: 24px;
    --border-radius-2xl: 32px;
    --border-radius-full: 9999px;
    
    /* تأثيرات */
    --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-smooth: 350ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-bounce: 500ms cubic-bezier(0.68, -0.55, 0.265, 1.55);
    
    /* تدرجات عصرية */
    --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    --gradient-5: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    --gradient-6: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
}

/* ثيم بديل */
:root.theme-dark {
    --bg-primary: #0b1120;
    --bg-secondary: #111827;
    --bg-tertiary: #1f2937;
    --surface-1: #1f2937;
    --surface-2: #111827;
    --surface-3: #0b1120;
    --text-primary: #f9fafb;
    --text-secondary: #e5e7eb;
    --text-tertiary: #d1d5db;
    --text-muted: #9ca3af;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: var(--font-primary);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* ======================== سبلاش سكرين عصري ======================== */
#splash {
    position: fixed;
    inset: 0;
    background: var(--gradient-6);
    z-index: 99999999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s ease;
}

.splash-content {
    text-align: center;
}

.splash-logo {
    font-family: var(--font-heading);
    font-size: clamp(3rem, 10vw, 5rem);
    font-weight: 800;
    color: white;
    text-shadow: 0 20px 40px rgba(0,0,0,0.2);
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
    animation: float 3s infinite ease-in-out;
}

.splash-sub {
    color: rgba(255,255,255,0.9);
    font-size: 1rem;
    letter-spacing: 4px;
    text-transform: uppercase;
}

.splash-progress {
    width: 200px;
    height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: var(--border-radius-full);
    margin: 2rem auto 0;
    overflow: hidden;
}

.splash-progress-bar {
    height: 100%;
    width: 0%;
    background: white;
    animation: progressLoad 2s infinite ease-in-out;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

@keyframes progressLoad {
    0% { width: 0%; }
    50% { width: 100%; }
    100% { width: 0%; }
}

/* ======================== هيدر عصري ======================== */
.hero-section {
    position: relative;
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6rem 2rem;
    overflow: hidden;
    background: var(--gradient-1);
}

.hero-particles {
    position: absolute;
    inset: 0;
    opacity: 0.1;
}

.hero-particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    animation: particleFloat 10s infinite linear;
}

@keyframes particleFloat {
    from { transform: translateY(100vh) rotate(0deg); }
    to { transform: translateY(-100vh) rotate(360deg); }
}

.hero-brand {
    position: relative;
    z-index: 2;
    text-align: center;
    color: white;
    max-width: 800px;
}

.hero-brand-name {
    font-family: var(--font-heading);
    font-size: clamp(3rem, 12vw, 6rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 1.5rem;
    text-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

.hero-brand-sub {
    font-size: 1.2rem;
    opacity: 0.9;
    margin-bottom: 2rem;
}

.hero-cta {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 2.5rem;
    background: white;
    color: var(--primary-700);
    border: none;
    border-radius: var(--border-radius-full);
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: var(--transition-base);
    box-shadow: var(--shadow-xl);
}

.hero-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 30px 60px rgba(0,0,0,0.2);
}

/* ======================== شريط الأخبار ======================== */
.news-ticker {
    background: var(--surface-1);
    border-bottom: 1px solid var(--bg-tertiary);
    padding: 0.75rem 0;
    overflow: hidden;
    position: relative;
}

.ticker-wrapper {
    display: flex;
    align-items: center;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
}

.ticker-label {
    background: var(--accent-500);
    color: white;
    padding: 0.25rem 1rem;
    border-radius: var(--border-radius-full);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1px;
    margin-left: 1.5rem;
    white-space: nowrap;
}

.ticker-content {
    white-space: nowrap;
    animation: ticker 20s linear infinite;
    color: var(--text-secondary);
    font-size: 0.9rem;
}

@keyframes ticker {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}

/* ======================== التنقل العصري ======================== */
nav {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: var(--surface-1);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--bg-tertiary);
    padding: 1rem 2rem;
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    overflow-x: auto;
    scrollbar-width: none;
}

nav::-webkit-scrollbar {
    display: none;
}

.nav-btn {
    padding: 0.75rem 1.5rem;
    border: none;
    background: transparent;
    color: var(--text-tertiary);
    font-weight: 500;
    font-size: 0.95rem;
    border-radius: var(--border-radius-full);
    cursor: pointer;
    transition: var(--transition-base);
    white-space: nowrap;
    font-family: var(--font-primary);
}

.nav-btn:hover {
    color: var(--primary-600);
    background: var(--primary-100);
}

.nav-btn.active {
    background: var(--primary-500);
    color: white;
    font-weight: 600;
    box-shadow: var(--shadow-md);
}

/* ======================== الأقسام الرئيسية ======================== */
.sec {
    max-width: 1400px;
    margin: 4rem auto;
    padding: 0 2rem;
    display: none;
}

.sec.active {
    display: block;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.section-header {
    text-align: center;
    margin-bottom: 3rem;
}

.section-title {
    font-family: var(--font-heading);
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
}

.section-subtitle {
    color: var(--text-tertiary);
    font-size: 1.1rem;
}

/* ======================== الشبكة الرئيسية ======================== */
.home-grid {
    display: grid;
    gap: 2rem;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
}

/* بطاقات عصرية */
.card-modern {
    background: var(--surface-1);
    border-radius: var(--border-radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-md);
    transition: var(--transition-base);
    border: 1px solid var(--bg-tertiary);
}

.card-modern:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-xl);
}

.card-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--bg-tertiary);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
}

.card-header h3 {
    font-weight: 600;
    color: var(--text-primary);
}

.card-header i {
    color: var(--primary-500);
    transition: transform var(--transition-base);
}

.card-header.active i {
    transform: rotate(180deg);
}

.card-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height var(--transition-smooth);
}

.card-content.open {
    max-height: 2000px;
    padding: 1.5rem;
}

/* التقييمات */
.reviews-slider {
    background: var(--surface-2);
    border-radius: var(--border-radius-lg);
    padding: 2rem;
    text-align: center;
    position: relative;
}

.review-item {
    display: none;
}

.review-item.active {
    display: block;
    animation: slideIn 0.5s ease;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
}

.review-stars {
    color: #fbbf24;
    font-size: 1.25rem;
    margin-bottom: 1rem;
}

.review-text {
    font-size: 1.1rem;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 1.5rem;
}

.review-name {
    font-weight: 600;
    color: var(--primary-600);
}

/* تقييم النجوم */
.star-rating {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin: 1rem 0;
    direction: ltr;
}

.star-rating i {
    font-size: 1.5rem;
    color: #cbd5e1;
    cursor: pointer;
    transition: var(--transition-fast);
}

.star-rating i:hover,
.star-rating i.active {
    color: #fbbf24;
    transform: scale(1.1);
}

/* مسار العمل */
.work-path-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
}

.path-step {
    background: var(--surface-2);
    padding: 2rem 1.5rem;
    border-radius: var(--border-radius-lg);
    text-align: center;
    transition: var(--transition-base);
}

.path-step:hover {
    background: var(--primary-500);
    color: white;
    transform: translateY(-4px);
}

.path-step:hover .path-step-icon,
.path-step:hover h4,
.path-step:hover p {
    color: white;
}

.path-step-icon {
    width: 60px;
    height: 60px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    color: var(--primary-500);
    font-size: 1.5rem;
    transition: var(--transition-base);
}

.path-step h4 {
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: var(--text-primary);
}

.path-step p {
    font-size: 0.9rem;
    color: var(--text-tertiary);
    line-height: 1.5;
}

/* بطاقة المواعيد */
.schedule-grid {
    display: grid;
    gap: 1.5rem;
}

.schedule-day {
    background: var(--surface-2);
    padding: 1.5rem;
    border-radius: var(--border-radius-lg);
}

.schedule-day-name {
    font-weight: 600;
    color: var(--primary-600);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--primary-200);
}

.time-slot {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.5rem;
    color: var(--text-secondary);
}

.time-badge {
    background: var(--surface-1);
    padding: 0.25rem 0.75rem;
    border-radius: var(--border-radius-full);
    font-size: 0.85rem;
    font-weight: 500;
}

.holiday-badge {
    background: #fee2e2;
    color: #dc2626;
    padding: 0.75rem;
    border-radius: var(--border-radius-lg);
    font-size: 0.9rem;
}

/* شارة الحالة */
.status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1.25rem;
    border-radius: var(--border-radius-full);
    font-weight: 500;
    font-size: 0.9rem;
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
}

.status-open {
    background: #dcfce7;
    color: #059669;
}

.status-open .status-dot {
    background: #059669;
    animation: pulse 2s infinite;
}

.status-closed {
    background: #fee2e2;
    color: #dc2626;
}

.status-closed .status-dot {
    background: #dc2626;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* شبكة الصور */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
}

.photo-card {
    background: var(--surface-1);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-md);
    transition: var(--transition-base);
}

.photo-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-xl);
}

.photo-container {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    cursor: pointer;
}

.photo-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform var(--transition-smooth);
}

.photo-container:hover img {
    transform: scale(1.1);
}

.photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
    opacity: 0;
    transition: var(--transition-base);
    display: flex;
    align-items: center;
    justify-content: center;
}

.photo-container:hover .photo-overlay {
    opacity: 1;
}

.photo-overlay i {
    color: white;
    font-size: 2rem;
    transform: scale(0.5);
    transition: var(--transition-bounce);
}

.photo-container:hover .photo-overlay i {
    transform: scale(1);
}

.photo-footer {
    padding: 1rem;
}

.btn-order {
    width: 100%;
    padding: 0.75rem;
    background: var(--primary-500);
    color: white;
    border: none;
    border-radius: var(--border-radius-md);
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition-base);
    font-family: var(--font-primary);
}

.btn-order:hover {
    background: var(--primary-600);
    transform: translateY(-2px);
}

/* بطاقات المجلدات */
.folder-card {
    background: var(--surface-1);
    padding: 3rem 2rem;
    border-radius: var(--border-radius-lg);
    text-align: center;
    cursor: pointer;
    transition: var(--transition-base);
    border: 2px solid transparent;
}

.folder-card:hover {
    border-color: var(--primary-500);
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
}

.folder-icon {
    font-size: 3rem;
    color: var(--primary-500);
    margin-bottom: 1rem;
}

.folder-name {
    font-weight: 600;
    color: var(--text-primary);
}

/* أزرار التواصل */
.social-row {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-top: 2rem;
}

.social-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--surface-2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    text-decoration: none;
    transition: var(--transition-base);
    border: 1px solid var(--bg-tertiary);
}

.social-btn:hover {
    background: var(--primary-500);
    color: white;
    transform: translateY(-4px) rotate(360deg);
}

.whatsapp-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 2.5rem;
    background: #25D366;
    color: white;
    border: none;
    border-radius: var(--border-radius-full);
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition-base);
    box-shadow: var(--shadow-lg);
}

.whatsapp-btn:hover {
    background: #20ba5a;
    transform: translateY(-2px);
    box-shadow: 0 20px 40px rgba(37, 211, 102, 0.3);
}

/* ======================== المساحة الحرة ======================== */
.drawing-section {
    background: var(--surface-1);
    border-radius: var(--border-radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-xl);
}

.drawing-header {
    padding: 2rem;
    background: var(--gradient-3);
    color: white;
}

.drawing-header h2 {
    font-family: var(--font-heading);
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
}

.drawing-tools {
    padding: 1.5rem;
    background: var(--surface-2);
    border-bottom: 1px solid var(--bg-tertiary);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1.5rem;
}

.tool-group {
    display: flex;
    gap: 0.5rem;
    background: var(--surface-1);
    padding: 0.25rem;
    border-radius: var(--border-radius-full);
}

.tool-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: var(--transition-fast);
}

.tool-btn:hover {
    color: var(--primary-500);
    background: var(--primary-100);
}

.tool-btn.active {
    background: var(--primary-500);
    color: white;
}

.color-picker {
    display: flex;
    gap: 0.5rem;
    background: var(--surface-1);
    padding: 0.5rem;
    border-radius: var(--border-radius-full);
}

.color-dot {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: var(--transition-fast);
}

.color-dot:hover {
    transform: scale(1.2);
    box-shadow: var(--shadow-md);
}

.color-dot.selected {
    border-color: white;
    box-shadow: 0 0 0 2px var(--primary-500);
}

.brush-size {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--surface-1);
    padding: 0.5rem 1rem;
    border-radius: var(--border-radius-full);
}

.brush-size input {
    width: 100px;
    -webkit-appearance: none;
    height: 4px;
    background: var(--bg-tertiary);
    border-radius: var(--border-radius-full);
}

.brush-size input::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--primary-500);
    cursor: pointer;
    border: 2px solid white;

    days.forEach((day, i) => {
        const s = currentData.schedule[i];
        if (s && s.active) {
            html += `
                <div class="schedule-day">
                    <div class="schedule-day-name">${day}</div>
                    <div class="time-slot">
                        <span class="time-badge">${s.morningStart || '09:00'}</span>
                        <span>إلى</span>
                        <span class="time-badge">${s.morningEnd || '17:00'}</span>
                    </div>
                    ${s.evening ? `
                        <div class="time-slot">
                            <span class="time-badge">${s.eveningStart}</span>
                            <span>إلى</span>
                            <span class="time-badge">${s.eveningEnd}</span>
                        </div>
                    ` : ''}
                </div>
            `;
        } else {
            html += `
                <div class="schedule-day">
                    <div class="schedule-day-name">${day}</div>

function updateStatus() {
    const container = document.getElementById('status-container');
    if (!container || !currentData.schedule) return;
    
    const now = new Date();
    const day = now.getDay();
    const time = now.getHours() * 60 + now.getMinutes();
    
    const today = currentData.schedule[day];
    let isOpen = false;
    
    if (today && today.active) {
        const morningStart = timeToMinutes(today.morningStart || '09:00');
        const morningEnd = timeToMinutes(today.morningEnd || '17:00');
        
        if (time >= morningStart && time < morningEnd) isOpen = true;
        
        if (!isOpen && today.evening) {
            const eveningStart = timeToMinutes(today.eveningStart);
            const eveningEnd = timeToMinutes(today.eveningEnd);
            if (time >= eveningStart && time < eveningEnd) isOpen = true;
        }
    }
    
    container.innerHTML = isOpen ?
        '<div class="status-badge status-open"><span class="status-dot"></span>مفتوح الآن</div>' :
        '<div class="status-badge status-closed"><span class="status-dot"></span>مغلق الآن</div>';
}

function timeToMinutes(t) {
    if (!t) return 0;
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
}

function initCanvas() {
    canvas = document.getElementById('drawing-canvas');
    if (!canvas) return;
    
    ctx = canvas.getContext('2d');
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = 500;
    
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseout', stopDraw);
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const touch = e.touches[0];
        startDraw({ clientX: touch.clientX, clientY: touch.clientY });
    });
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const touch = e.touches[0];
        draw({ clientX: touch.clientX, clientY: touch.clientY });
    });
    canvas.addEventListener('touchend', stopDraw);
    
    saveState();
}

function initColorPicker() {
    const colors = ['#0ea5e9', '#f43f5e', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#6366f1', '#14b8a6'];
    const container = document.getElementById('color-picker');
    if (!container) return;
    
    container.innerHTML = colors.map(c => 
        `<div class="color-dot ${c === currentColor ? 'selected' : ''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
    ).join('');
}

function selectColor(color) {
    currentColor = color;
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
    event.target.classList.add('selected');
}

function selectTool(tool) {
    currentTool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

function updateBrushSize(size) {
    brushSize = size;
    document.getElementById('brush-value').textContent = size + 'px';
}

function startDraw(e) {
    isDrawing = true;
    const rect = canvas.getBoundingClientRect();
    lastX = e.clientX - rect.left;
    lastY = e.clientY - rect.top;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
}

function draw(e) {
    if (!isDrawing) return;
    
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    if (currentTool === 'eraser') {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.strokeStyle = 'rgba(0,0,0,1)';
    } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = currentColor;
    }
    
    ctx.lineTo(x, y);
    ctx.stroke();
    
    lastX = x;
    lastY = y;
}

function stopDraw() {
    if (isDrawing) {
        isDrawing = false;
        ctx.closePath();
        saveState();
    }
}

function saveState() {
    if (!canvas) return;
    if (history.length > 20) history.shift();
    history.push(canvas.toDataURL());
}

function undoDrawing() {
    if (history.length < 2) return;
    history.pop();
    const img = new Image();
    img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
    };
    img.src = history[history.length - 1];
}

function clearDrawing() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    history = [];
    saveState();
}

function saveDrawing() {
    const link = document.createElement('a');
    link.download = `drawing-${Date.now()}.png`;
    link.href = canvas.toDataURL();
    link.click();

function renderPages() {

function go(tab) {
    currentTab = tab;
    renderAll();
    window.scrollTo(0, 0);
}

function toggleCard(id) {
    const card = document.getElementById(id);
    const header = event.currentTarget;
    card.classList.toggle('open');
    header.classList.toggle('active');
}

function setRating(rating) {
    userRating = rating;
    document.querySelectorAll('.star-rating i').forEach((star, i) => {
        star.classList.toggle('active', 5 - i <= rating);
    });
}

function submitReview() {
    if (localStorage.getItem('reviewed')) {
        alert('لقد قيمت مسبقاً');
        return;
    }
    
    const name = document.getElementById('review-name').value;
    const msg = document.getElementById('review-msg').value;
    
    if (!name || !msg || !userRating) {
        alert('الرجاء إكمال جميع الحقول');
        return;
    }
    
    db.ref(DB_PATH + '/reviews').push({
        name,
        message: msg,
        rating: userRating,
        date: new Date().toLocaleDateString('ar-SA')
    }).then(() => {
        localStorage.setItem('reviewed', 'true');
        alert('شكراً لتقييمك');
        location.reload();
    });
}

function startReviewSlider(count) {
    if (window.reviewInterval) clearInterval(window.reviewInterval);
    
    let current = 0;
    window.reviewInterval = setInterval(() => {
        document.querySelectorAll('.review-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`review-${current}`)?.classList.add('active');
        current = (current + 1) % count;
    }, 5000);
}

function whatsapp() {

}

function order(url) {

function closeViewerOnOverlay(e) {

function publishPhotos() {
    const target = document.getElementById('upload-target').value;
    const links = document.getElementById('photo-links').value.split('\n').filter(l => l.trim());
    
    if (!target || !links.length) {
        alert('اختر الوجهة وأدخل الروابط');
        return;
    }
    
    const promises = links.map(url => 
        db.ref(DB_PATH + '/' + target + '/images').push({ url: url.trim() })
    );
    
    Promise.all(promises).then(() => {
        alert('تم نشر الصور');
        document.getElementById('photo-links').value = '';
    });
}

function loadPhotoManager(target) {
    const container = document.getElementById('photo-manager');
    container.innerHTML = '';
    
    if (!target) return;
    
    const [type, id] = target.split('/');
    const images = currentData[type]?.[id]?.images;
    
    if (!images) {
        container.innerHTML = '<p style="color:var(--text-tertiary);">لا توجد صور</p>';
        return;
    }
    
    container.innerHTML = Object.keys(images).map(imgId => `
        <div class="photo-manager-item">
            <img src="${images[imgId].url}">
            <div class="photo-manager-actions">
                <button class="photo-manager-btn view" onclick="openImage('${images[imgId].url}')">عرض</button>
                <button class="photo-manager-btn delete" onclick="deletePhoto('${target}', '${imgId}')">حذف</button>
            </div>
        </div>
    `).join('');
}

function renderScheduleEditor() {
    const container = document.getElementById('schedule-editor');
    const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
    let html = '';
    
    days.forEach((day, i) => {
        const s = currentData.schedule?.[i] || {};
        html += `
            <div style="margin-bottom:1rem; padding:1rem; background:var(--surface-2); border-radius:var(--border-radius-md);">
                <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
                    <span style="font-weight:600;">${day}</span>
                    <label><input type="checkbox" id="day-${i}-active" ${s.active ? 'checked' : ''}> مفعل</label>
                </div>
                <div style="display:flex; gap:0.5rem; margin-bottom:0.5rem;">
                    <input type="time" id="day-${i}-morning-start" value="${s.morningStart || '09:00'}" style="flex:1;">
                    <span>—</span>
                    <input type="time" id="day-${i}-morning-end" value="${s.morningEnd || '17:00'}" style="flex:1;">
                </div>
                <div>
                    <label><input type="checkbox" id="day-${i}-evening" ${s.evening ? 'checked' : ''}> فترة مسائية</label>
                    <div id="evening-${i}" style="display:${s.evening ? 'flex' : 'none'}; gap:0.5rem; margin-top:0.5rem;">
                        <input type="time" id="day-${i}-evening-start" value="${s.eveningStart || ''}" style="flex:1;">
                        <span>—</span>
                        <input type="time" id="day-${i}-evening-end" value="${s.eveningEnd || ''}" style="flex:1;">
                    </div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
    
    // Add event listeners for evening checkboxes
    for (let i = 0; i < 7; i++) {
        document.getElementById(`day-${i}-evening`)?.addEventListener('change', function() {
            const div = document.getElementById(`evening-${i}`);
            div.style.display = this.checked ? 'flex' : 'none';
        });
    }
}

function saveSchedule() {
    const schedule = {};
    
    for (let i = 0; i < 7; i++) {
        schedule[i] = {
            active: document.getElementById(`day-${i}-active`).checked,
            morningStart: document.getElementById(`day-${i}-morning-start`).value,
            morningEnd: document.getElementById(`day-${i}-morning-end`).value,
            evening: document.getElementById(`day-${i}-evening`).checked,
            eveningStart: document.getElementById(`day-${i}-evening-start`)?.value || '',
            eveningEnd: document.getElementById(`day-${i}-evening-end`)?.value || ''
        };
    }
    
    db.ref(DB_PATH).update({ schedule }).then(() => {
        alert('تم حفظ المواعيد');
    });
}

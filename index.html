<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بصمة غير للديكور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --gold: #b2976a;
            --gold-dark: #8e7352;
            --bg: #f8f9fa;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .hero {
            margin: 50px 0;
        }
        h1 {
            color: var(--gold-dark);
            font-size: 3rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .btn {
            background: var(--gold);
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }
        footer {
            margin-top: 50px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>بصمة غير</h1>
        <p>للديكور والتصميم الداخلي</p>
    </div>

    <div class="grid">
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="تصميم 1">
            <button class="btn">استفسار</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="تصميم 2">
            <button class="btn">استفسار</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="تصميم 3">
            <button class="btn">استفسار</button>
        </div>
    </div>

    <footer>
        جميع الحقوق محفوظة © بصمة غير للديكور
    </footer>
</body>
</html>

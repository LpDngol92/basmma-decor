<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>بصمة غير</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .splash-img {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }
        
        .splash-skip {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            border: none;
            z-index: 10000;
        }
    </style>
</head>
<body>

<div id="splash"></div>

<script>
    // اتصال Firebase حقك
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    function showSplashWithImage(imageUrl, duration = 5, showSkip = true) {
        const splashDiv = document.getElementById('splash');
        if (!splashDiv) return;
        
        splashDiv.innerHTML = '';
        
        // التحقق: هل الرابط موجود وفعلاً صورة؟
        if (imageUrl && imageUrl.trim() !== "") {
            const img = document.createElement('img');
            img.src = imageUrl;
            img.className = 'splash-img';
            img.alt = 'Splash';
            
            // لو الصورة فشلت تحميل، نعطي خلفية سوداء
            img.onerror = function() {
                console.log("خطأ: الصورة ما تحملت - الرابط:", imageUrl);
                splashDiv.style.backgroundColor = 'black';
            };
            
            splashDiv.appendChild(img);
        } else {
            splashDiv.style.backgroundColor = 'black';
        }
        
        if (showSkip) {
            const skipBtn = document.createElement('button');
            skipBtn.innerText = 'تخطي ←';
            skipBtn.className = 'splash-skip';
            skipBtn.onclick = () => {
                splashDiv.style.opacity = '0';
                setTimeout(() => splashDiv.style.display = 'none', 300);
            };
            splashDiv.appendChild(skipBtn);
        }
        
        splashDiv.style.display = 'flex';
        
        setTimeout(() => {
            splashDiv.style.opacity = '0';
            setTimeout(() => splashDiv.style.display = 'none', 300);
        }, duration * 1000);
    }
    
    // جلب البيانات من Firebase
    db.ref('site_v28').once('value', (snap) => {
        const data = snap.val() || {};
        const splashMediaUrl = data.splash_media_url || '';  // رابط الصورة من لوحة الإدارة
        const splashEnabled = data.splash_enabled !== false;
        const splashDuration = data.splash_duration || 5;
        const splashShowSkip = data.splash_show_skip === true;
        
        if (splashEnabled) {
            showSplashWithImage(splashMediaUrl, splashDuration, splashShowSkip);
        } else {
            document.getElementById('splash').style.display = 'none';
        }
    });
</script>

<!-- باقي موقعك -->
<h1 style="text-align:center; margin-top:100px;">بصمة غير</h1>

</body>
</html>

    function formatTime12(t) { if(!t) return ""; let [h,m]=t.split(':'); h=parseInt(h); return `${h%12||12}:${m} ${h>=12?'م':'ص'}`; }
    
    // رسم الساعة التناظرية
    function drawClock(canvasId, isOpen) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const size = canvas.width = canvas.height = 140;
        const center = size/2;
        const radius = size/2 - 5;
        
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        let seconds = now.getSeconds();
        
        hours = hours % 12;
        const hourAngle = (hours * 30 + minutes * 0.5) * Math.PI / 180;
        const minuteAngle = (minutes * 6 + seconds * 0.1) * Math.PI / 180;
        const secondAngle = (seconds * 6) * Math.PI / 180;
        
        ctx.clearRect(0, 0, size, size);
        
        // الخلفية
        ctx.beginPath();
        ctx.arc(center, center, radius, 0, 2 * Math.PI);
        ctx.fillStyle = '#fefaf5';
        ctx.fill();
        ctx.strokeStyle = isOpen ? '#2e7d32' : '#c62828';
        ctx.lineWidth = 4;
        ctx.stroke();
        
        // علامات الساعات
        for (let i = 1; i <= 12; i++) {
            let angle = i * 30 * Math.PI / 180;
            let x1 = center + (radius - 12) * Math.sin(angle);
            let y1 = center - (radius - 12) * Math.cos(angle);
            let x2 = center + (radius - 5) * Math.sin(angle);
            let y2 = center - (radius - 5) * Math.cos(angle);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#b88b4a';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        // عقرب الساعات
        ctx.beginPath();
        ctx.moveTo(center, center);
        let hourX = center + (radius * 0.45) * Math.sin(hourAngle);
        let hourY = center - (radius * 0.45) * Math.cos(hourAngle);
        ctx.lineTo(hourX, hourY);
        ctx.strokeStyle = '#5d4037';
        ctx.lineWidth = 4;
        ctx.stroke();
        
        // عقرب الدقائق
        ctx.beginPath();
        ctx.moveTo(center, center);
        let minuteX = center + (radius * 0.65) * Math.sin(minuteAngle);
        let minuteY = center - (radius * 0.65) * Math.cos(minuteAngle);
        ctx.lineTo(minuteX, minuteY);
        ctx.strokeStyle = '#5d4037';
        ctx.lineWidth = 3;
        ctx.stroke();
        
        // عقرب الثواني
        ctx.beginPath();
        ctx.moveTo(center, center);
        let secondX = center + (radius * 0.75) * Math.sin(secondAngle);
        let secondY = center - (radius * 0.75) * Math.cos(secondAngle);
        ctx.lineTo(secondX, secondY);
        ctx.strokeStyle = '#c9a96e';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        
        // نقطة المركز
        ctx.beginPath();
        ctx.arc(center, center, 4, 0, 2 * Math.PI);
        ctx.fillStyle = '#b88b4a';
        ctx.fill();
    }
    
    function updateClockAndStatus() {
        if (!currentData.work_schedule) return;
        const now = new Date();
        const day = now.getDay();
        const s = currentData.work_schedule[day];
        let open = false;
        if (s && s.active) {
            const toMins = (t) => { let [h,m]=t.split(':').map(Number); return h*60+m; };
            const cur = now.getHours()*60+now.getMinutes();
            const s1 = toMins(s.s1_s), e1 = toMins(s.s1_e);
            if (cur >= s1 && cur < e1) open = true;
            if (!open && s.s2_a && s.s2_s && s.s2_e) {
                const s2 = toMins(s.s2_s), e2 = toMins(s.s2_e);
                if ((e2 < s2 && (cur >= s2 || cur < e2)) || (cur >= s2 && cur < e2)) open = true;
            }
        }
        drawClock('clockCanvas', open);
        const digitalSpan = document.getElementById('digitalTime');
        if (digitalSpan) {
            const now2 = new Date();

        if (!d.work_schedule) return '<p>لم تحدد المواعيد</p>';
        const dayNames = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
        const daysOrder = [6,0,1,2,3,4,5];
        let groups = [], offDays = [];
        daysOrder.forEach(jsDay => {
            const s = d.work_schedule[jsDay];
            if (s && s.active) {
                const key = `${s.s1_s}-${s.s1_e}-${s.s2_a}`;
                let g = groups.find(g => g.key === key);
                if (g) g.days.push(dayNames[jsDay]);

    function checkMaintenance() { const maintDiv = document.getElementById('maintenance-screen'); if (maintDiv) maintDiv.style.display = currentData.maintenance_mode ? 'flex' : 'none'; }
    function showPopupIfNeeded() { if (currentPage === 'home' && currentData.popup_enabled && currentData.popup_message) { const bubble = document.getElementById('popupBubble'); document.getElementById('popupMessage').innerText = currentData.popup_message; bubble.style.display = 'block'; setTimeout(() => closePopup(), (currentData.popup_duration || 7) * 1000); } }

    window.toggleFavorite = toggleFavorite; window.openAlbum = openAlbum; window.openCatalog = openCatalog; window.whatsappGlobal = whatsappGlobal; window.closePopup = closePopup;
    window.viewerToggleFavorite = viewerToggleFavorite; window.viewerWhatsapp = viewerWhatsapp; window.viewerPrev = viewerPrev; window.viewerNext = viewerNext; window.closeViewer = closeViewer; window.openViewer = openViewer;

    window.addEventListener('load', () => { setTimeout(() => { const splash = document.getElementById('splash'); if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.style.display = 'none', 500); } }, 900); });
    db.ref(DB_PATH).on('value', (snap) => {
        currentData = snap.val() || {};
        if (!window.location.hash || window.location.hash === '#') currentPage = 'home';
        else { const hash = window.location.hash.substring(1); if (hash === 'الرئيسية') currentPage = 'home'; else if (hash === 'أعمالنا') currentPage = 'works'; else if (hash === 'الكــتالوجات') currentPage = 'catalogs'; else if (hash === 'المفضلة') currentPage = 'favorites'; else { let found = false; if (currentData.pages) { for (let pid in currentData.pages) { if (currentData.pages[pid].title === hash) { currentPage = 'page_'+pid; found=true; break; } } } if (!found) currentPage = 'home'; } }
        renderTabs(); renderCurrentPage(); renderPartnersMarquee(); checkMaintenance(); setTimeout(showPopupIfNeeded, 1500);
    });
</script>
</body>
</html>

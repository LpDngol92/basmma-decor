    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: auto; }

        /* ===== HERO ===== */

                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(200,161,101,0.10) 0%, transparent 60%),
                linear-gradient(180deg, #fffdf8 0%, #fff9f0 50%, #fffaf5 100%);
        }
        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle 1px at 20% 30%, rgba(200,161,101,0.3) 0%, transparent 0%),
                radial-gradient(circle 1px at 60% 70%, rgba(200,161,101,0.2) 0%, transparent 0%),
                radial-gradient(circle 1px at 85% 20%, rgba(200,161,101,0.25) 0%, transparent 0%),
                radial-gradient(circle 1px at 40% 80%, rgba(200,161,101,0.2) 0%, transparent 0%);
            background-size: 120px 120px, 80px 80px, 100px 100px, 90px 90px;
        }
        .hero-content { position: relative; z-index: 1; }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(200,161,101,0.12);
            border: 1px solid rgba(200,161,101,0.3);

            padding: 6px 16px;
            border-radius: 50px;

            margin-bottom: 1.5rem;

            margin-bottom: 1rem;

        }
        .hero h1 span {

            background-clip: text;

        }
        .hero p {
            font-size: clamp(1rem, 4vw, 1.25rem);

            margin: 0 auto 2.5rem;
            font-weight: 400;
            animation: fadeInUp 0.7s 0.2s ease both;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.7s 0.3s ease both;
        }
        .btn {
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.25s ease;
            font-size: clamp(0.85rem, 3vw, 1rem);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: none;
            font-family: 'Cairo', sans-serif;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: white;
            box-shadow: 0 6px 20px rgba(200,161,101,0.35);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(200,161,101,0.45);
        }
        .btn-outline {
            border: 1.5px solid var(--primary);
            color: var(--primary-dark);
            background: rgba(200,161,101,0.06);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
        }

        /* ===== SECTION ===== */
        .section { padding: clamp(2.5rem, 7vw, 5rem) 0; }
        .section-title {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            font-weight: 800;
            text-align: center;
            margin-bottom: 2.5rem;
            color: #2a1f0e;
            position: relative;
        }
        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-dark), var(--primary));
            margin: 0.6rem auto 0;
            border-radius: 3px;
        }

        /* ===== CAROUSEL ===== */
        .carousel-container { position: relative; overflow: hidden; padding: 10px 5px 20px; }
        .carousel-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 20px;
        }
        .carousel-slide {
            flex: 0 0 calc(25% - 15px);
            min-width: calc(25% - 15px);
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.35s ease;
            cursor: pointer;
        }
        .carousel-slide:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-hover);
        }
        .carousel-slide .img-wrapper {
            position: relative;
            overflow: hidden;
        }
        .carousel-slide .img-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(164,126,68,0.0), rgba(200,161,101,0.45));
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .carousel-slide:hover .img-wrapper::after { opacity: 1; }
        .carousel-slide img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .carousel-slide:hover img { transform: scale(1.07); }
        .carousel-slide .product-info { padding: 1rem; text-align: center; }
        .carousel-button {
            position: absolute;
            top: 45%;
            transform: translateY(-50%);
            background: white;
            color: var(--primary-dark);
            border: 1.5px solid rgba(200,161,101,0.3);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .carousel-button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-50%) scale(1.08);
            box-shadow: 0 6px 20px rgba(200,161,101,0.3);
        }
        .carousel-button-prev { right: 5px; }
        .carousel-button-next { left: 5px; }
        .carousel-dots { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
            cursor: pointer;
            transition: all 0.3s;
        }
        .carousel-dot.active {
            background: var(--primary);
            width: 28px;
            border-radius: 8px;
        }
        @media (max-width: 1024px) {
            .carousel-slide { flex: 0 0 calc(33.333% - 14px); min-width: calc(33.333% - 14px); }
        }
        @media (max-width: 768px) {
            .carousel-slide { flex: 0 0 calc(50% - 10px); min-width: calc(50% - 10px); }
        }
        @media (max-width: 480px) {
            .carousel-slide { flex: 0 0 100%; min-width: 100%; }
            .carousel-button { width: 38px; height: 38px; font-size: 1rem; }
        }

        /* ===== GRID ===== */
        .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.8rem; }
        .card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.35s ease;
            cursor: pointer;
            text-align: center;
            position: relative;
            border: 1px solid rgba(200,161,101,0.08);
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(200,161,101,0.25);
        }
        .card-img-wrap { position: relative; overflow: hidden; }
        .card-img-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(164,126,68,0.5), transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .card:hover .card-img-wrap::after { opacity: 1; }
        .card-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.5s ease;
            display: block;
        }
        .card:hover .card-img { transform: scale(1.07); }
        .card-body { padding: 1.2rem 1.4rem; }
        .card-title { font-size: 1.1rem; font-weight: 700; color: #2a1f0e; }
        .card-subtitle { font-size: 0.85rem; color: var(--gray); margin-top: 4px; }

        /* ===== PRODUCT CARD ===== */
        .product-card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.35s ease;
            cursor: pointer;
            border: 1px solid rgba(200,161,101,0.08);
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(200,161,101,0.2);
        }
        .product-img-wrap { position: relative; overflow: hidden; }
        .product-img-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(200,161,101,0) 40%, rgba(164,126,68,0.45));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .product-card:hover .product-img-wrap::after { opacity: 1; }
        .product-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;

        .product-card:hover .product-img { transform: scale(1.06); }
        .product-info { padding: 1rem; text-align: center; }
        .whatsapp-order {
            background: linear-gradient(135deg, #22c55e, #16a34a);

            border: none;
            width: 100%;
            padding: 11px;
            border-radius: 50px;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            box-shadow: 0 4px 12px rgba(37,211,102,0.25);
        }
        .whatsapp-order:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37,211,102,0.35);
        }

        /* ===== SKELETON ===== */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-card { border-radius: var(--radius); overflow: hidden; }
        .skeleton-img { width: 100%; aspect-ratio: 1; }
        .skeleton-text { height: 14px; margin: 12px 16px 6px; }
        .skeleton-text.short { width: 60%; margin: 6px auto 14px; }

        .wa-float {

            left: 20px;
            z-index: 999;
            animation: bounceIn 0.6s 1s ease both;
        }
        .wa-float a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(37,211,102,0.4);

            position: relative;
        }
        .wa-float a:hover {
            transform: scale(1.12) translateY(-3px);
            box-shadow: 0 10px 30px rgba(37,211,102,0.5);
        }
        .wa-float a::before {
            content: 'تواصل معنا';
            position: absolute;
            left: 65px;
            background: #1e1e1e;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-family: 'Cairo', sans-serif;

            transition: opacity 0.2s;

        .wa-float a:hover::before { opacity: 1; }
        .wa-float a .pulse-ring {
            position: absolute;
            inset: -4px;

        // Carousel
        function initCarousel() {
            const track = document.getElementById('carouselTrack');
            if (!track) return;
            const slides = track.querySelectorAll('.carousel-slide');
            totalSlides = slides.length;
            if (totalSlides === 0) return;
            if (carouselInterval) clearInterval(carouselInterval);
            const dotsContainer = document.getElementById('carouselDots');
            if (dotsContainer) {
                dotsContainer.innerHTML = '';
                for (let i = 0; i < totalSlides; i++) {
                    const dot = document.createElement('div');
                    dot.classList.add('carousel-dot');
                    if (i === currentSlideIndex) dot.classList.add('active');
                    dot.addEventListener('click', () => { goToSlide(i); resetCarouselInterval(); });
                    dotsContainer.appendChild(dot);
                }
            }
            const prevBtn = document.getElementById('carouselPrev');
            const nextBtn = document.getElementById('carouselNext');
            if (prevBtn) prevBtn.onclick = () => { prevSlide(); resetCarouselInterval(); };
            if (nextBtn) nextBtn.onclick = () => { nextSlide(); resetCarouselInterval(); };
            carouselInterval = setInterval(nextSlide, 4000);
            updateCarousel();
        }
        function updateCarousel() {
            const track = document.getElementById('carouselTrack');
            if (!track) return;
            const slide = track.querySelector('.carousel-slide');
            if (!slide) return;
            const slideWidth = slide.offsetWidth;
            track.style.transform = `translateX(-${currentSlideIndex * (slideWidth + 20)}px)`;
            document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === currentSlideIndex));
        }
        function goToSlide(i) { currentSlideIndex = Math.max(0, Math.min(i, totalSlides - 1)); updateCarousel(); }
        function nextSlide() { currentSlideIndex = (currentSlideIndex + 1 >= totalSlides) ? 0 : currentSlideIndex + 1; updateCarousel(); }
        function prevSlide() { currentSlideIndex = (currentSlideIndex - 1 < 0) ? totalSlides - 1 : currentSlideIndex - 1; updateCarousel(); }
        function resetCarouselInterval() { if (carouselInterval) { clearInterval(carouselInterval); carouselInterval = setInterval(nextSlide, 4000); } }

        let splashTimeout;
        function showSplash(settings) {
            const splashDiv = document.getElementById('splash');
            if (!splashDiv) return;
            splashDiv.innerHTML = '';
            if (!settings.enabled) { splashDiv.style.display = 'none'; return; }
            const mediaType = settings.type || 'image';
            const duration = (settings.duration || 5) * 1000;
            const showSkip = settings.show_skip === true;
            let mediaElement;
            if (mediaType === 'video' && (settings.video_url || settings.media_url)) {
                const vid = document.createElement('video');
                vid.autoplay = true; vid.muted = true; vid.loop = false; vid.playsInline = true;
                vid.className = 'splash-media';
                const source = document.createElement('source');
                source.src = settings.video_url || settings.media_url; source.type = 'video/mp4';
                vid.appendChild(source); mediaElement = vid;
            } else {
                const img = document.createElement('img');
                img.src = settings.media_url || '';
                img.className = 'splash-media'; img.alt = 'Splash';
                mediaElement = img;
            }
            if (mediaElement) splashDiv.appendChild(mediaElement);
            if (showSkip) {
                const skipBtn = document.createElement('button');
                skipBtn.innerText = 'تخطي ←'; skipBtn.className = 'splash-skip';
                skipBtn.onclick = () => { clearTimeout(splashTimeout); splashDiv.style.opacity = '0'; setTimeout(() => { splashDiv.style.display = 'none'; }, 500); };
                splashDiv.appendChild(skipBtn);
            }
            splashDiv.style.display = 'flex'; splashDiv.style.opacity = '1';
            if (splashTimeout) clearTimeout(splashTimeout);
            splashTimeout = setTimeout(() => { splashDiv.style.opacity = '0'; setTimeout(() => { splashDiv.style.display = 'none'; }, 500); }, duration);
        }

            if (until && until <= Date.now()) { db.ref(DB_PATH).update({ maintenance_mode: false, maintenance_until: null }); return; }
            screen.innerHTML = `<div style="background:white; border-radius:48px; padding:40px; max-width:500px; text-align:center; margin:20px;">

                const updateCountdown = () => {
                    let diff = until - Date.now();
                    if (diff <= 0) { clearInterval(maintenanceInterval); window.location.reload(); return; }
                    const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);

                };
                updateCountdown(); maintenanceInterval = setInterval(updateCountdown, 1000);
            }
        }

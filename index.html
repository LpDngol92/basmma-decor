<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>بصمة غير للديكور | تصميم داخلي فاخر</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #fafafc;
            color: #1c1c1e;
            overflow-x: hidden;
            line-height: 1.6;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-card: #ffffff;
            --text-primary: #1c1c1e;
            --text-secondary: #6c6c70;
            --accent: #c9a96e;
            --accent-dark: #b48c48;
            --accent-light: #e6d5b8;
            --border: #e9ecef;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --success: #28a745;
            --danger: #dc3545;
            --whatsapp: #25D366;
        }

        /* Top Navigation Bar */
        .top-nav {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        .logo-area h1 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent-dark);
            letter-spacing: 1px;
        }
        .logo-area p {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .nav-icons {
            display: flex;
            gap: 20px;
        }
        .nav-icon {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .nav-icon.active {
            color: var(--accent-dark);
        }
        .nav-icon:hover {
            transform: scale(1.05);
        }

        /* Main Content */
        .main-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px 100px;
        }
        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .page.active-page {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Home Page Components */
        .hero-card {
            background: linear-gradient(135deg, var(--accent-light), #fff);
            border-radius: 28px;
            padding: 32px 24px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }
        .hero-card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-dark);
        }
        .info-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }
        .info-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-dark);
            border-right: 3px solid var(--accent);
            padding-right: 12px;
        }
        .toggle-btn {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toggle-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            background: var(--bg-card);
            border-radius: 0 0 16px 16px;
        }
        .toggle-content.open {
            max-height: 1000px;
            padding: 20px;
            border: 1px solid var(--border);
            border-top: none;
        }
        .star-rating {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 15px 0;
            flex-direction: row-reverse;
        }
        .star-rating i {
            font-size: 1.8rem;
            color: #ddd;
            cursor: pointer;
            transition: color 0.2s;
        }
        .star-rating i.active,
        .star-rating i:hover {
            color: var(--accent);
        }
        .review-slider {
            position: relative;
            min-height: 180px;
        }
        .review-item {
            position: absolute;
            width: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-align: center;
        }
        .review-item.active {
            opacity: 1;
            position: relative;
        }
        .review-stars {
            color: var(--accent);
            margin-bottom: 10px;
        }
        .schedule-group {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .time-period {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 5px 0;
        }
        .time-text {
            background: var(--bg-secondary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
        }
        .status-open {
            background: #e8f5e9;
            color: var(--success);
        }
        .status-closed {
            background: #ffebee;
            color: var(--danger);
        }
        .whatsapp-btn {
            background: var(--whatsapp);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .whatsapp-btn:hover {
            transform: scale(1.02);
            background: #20b359;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .social-link {
            width: 48px;
            height: 48px;
            background: var(--bg-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 1.3rem;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
        }
        .social-link:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-3px);
        }
        .location-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        /* Photo Grid (Instagram Style) */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }
        .photo-item {
            aspect-ratio: 1;
            background: #f0f0f0;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .photo-item:hover img {
            transform: scale(1.05);
        }
        .photo-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .photo-item:hover .photo-overlay {
            opacity: 1;
        }
        .fav-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            z-index: 2;
            color: var(--text-secondary);
        }
        .fav-btn.active {
            color: var(--danger);
        }
        .album-card, .folder-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .album-card:hover, .folder-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }

        /* Viewer Modal with Zoom */
        .viewer-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            touch-action: none;
        }
        .viewer-container {
            width: 100%;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .viewer-img {
            max-width: 90%;
            max-height: 80vh;
            object-fit: contain;
            transition: transform 0.1s ease;
            cursor: grab;
        }
        .viewer-img:active {
            cursor: grabbing;
        }
        .viewer-controls {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 30px;
            background: rgba(0,0,0,0.5);
            padding: 12px 24px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        .viewer-controls button {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .viewer-close {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            font-size: 1.5rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Hidden Admin Button (Left Side) */
        .hidden-admin {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2000;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        .hidden-admin:hover {
            opacity: 1;
            background: var(--accent);
            color: white;
        }

        /* Admin Panel */
        .admin-panel {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 10001;
            overflow-y: auto;
            display: none;
            padding: 20px;
        }
        .admin-panel.active {
            display: block;
        }
        .admin-card {
            max-width: 700px;
            margin: 0 auto;
        }
        .collapse-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .collapse-btn {
            width: 100%;
            padding: 16px;
            background: none;
            border: none;
            font-weight: 700;
            text-align: right;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            font-size: 1rem;
        }
        .collapse-content {
            display: none;
            padding: 16px;
            border-top: 1px solid var(--border);
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
        }
        .admin-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            margin-top: 8px;
            cursor: pointer;
        }
        .btn-gold { background: var(--accent); color: #1c1c1e; }
        .btn-red { background: var(--danger); color: white; }
        .btn-green { background: var(--success); color: white; }
        .partner-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .partner-item img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }
        .toast-msg {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 10002;
            display: none;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: var(--accent-dark);
            margin-bottom: 16px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- Hidden Admin Trigger (Left Side) -->
<div class="hidden-admin" onclick="checkAccess()">
    <i class="fas fa-crown"></i>
</div>

<!-- Top Navigation -->
<div class="top-nav">
    <div class="logo-area">
        <h1 id="siteTitle">بصمة غير</h1>
        <p>للديكور والتصميم الداخلي</p>
    </div>
    <div class="nav-icons">
        <button class="nav-icon" data-page="home"><i class="fas fa-home"></i></button>
        <button class="nav-icon" data-page="works"><i class="fas fa-images"></i></button>
        <button class="nav-icon" data-page="catalogs"><i class="fas fa-book-open"></i></button>
        <button class="nav-icon" data-page="favorites"><i class="fas fa-heart"></i></button>
    </div>
</div>

<!-- Main Content -->
<div class="main-content" id="mainContent"></div>

<!-- Viewer Modal -->
<div id="viewerModal" class="viewer-modal" onclick="closeViewerOnBg(event)">
    <button class="viewer-close" onclick="closeViewer()"><i class="fas fa-times"></i></button>
    <div class="viewer-container">
        <img id="viewerImg" class="viewer-img" src="" draggable="false">
    </div>
    <div class="viewer-controls">
        <button onclick="viewerPrev()"><i class="fas fa-chevron-right"></i></button>
        <span id="viewerCounter" style="color:white">1/1</span>
        <button onclick="viewerNext()"><i class="fas fa-chevron-left"></i></button>
    </div>
</div>

<!-- Admin Panel (Complete) -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-card">
        <h2 style="margin-bottom: 20px;">⚡ لوحة الإدارة</h2>
        <div id="adminSections"></div>
        <button onclick="closeAdminPanel()" class="admin-btn btn-red" style="margin-top:20px">إغلاق</button>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let isAdmin = false;
    let favorites = JSON.parse(localStorage.getItem('site_favorites_v3')) || [];
    let currentPage = 'home';
    let currentImageList = [];
    let currentImageIndex = 0;
    let reviewInterval = null;
    let reviewIdx = 0;
    let partnerInterval = null;
    let partnerIdx = 0;
    
    // Zoom variables
    let zoomScale = 1;
    let isZoomed = false;
    let dragStart = { x: 0, y: 0 };
    let translate = { x: 0, y: 0 };
    let isDragging = false;

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    // Favorites
    function saveFav() { localStorage.setItem('site_favorites_v3', JSON.stringify(favorites)); }
    function toggleFavorite(imgId, imgUrl) {
        const exists = favorites.find(f => f.id === imgId);
        if (exists) {
            favorites = favorites.filter(f => f.id !== imgId);
            showToast('🗑️ تمت الإزالة من المفضلة');
        } else {
            favorites.unshift({ id: imgId, url: imgUrl, date: Date.now() });
            showToast('❤️ أضيف إلى المفضلة');
        }
        saveFav();
        renderCurrentPage();
    }
    function isFav(imgId) { return favorites.some(f => f.id === imgId); }

    // Image Viewer with Zoom
    function openViewer(url, imageList, index) {
        currentImageList = imageList;
        currentImageIndex = index;
        const img = document.getElementById('viewerImg');
        img.src = url;
        document.getElementById('viewerCounter').innerText = `${index+1}/${imageList.length}`;
        document.getElementById('viewerModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        resetZoom();
        setupZoomEvents();
    }
    function closeViewer() {
        document.getElementById('viewerModal').style.display = 'none';
        document.body.style.overflow = '';
        resetZoom();
    }
    function closeViewerOnBg(e) { if (e.target === document.getElementById('viewerModal')) closeViewer(); }
    function viewerNext() {
        if (currentImageIndex < currentImageList.length-1) currentImageIndex++;
        else currentImageIndex = 0;
        document.getElementById('viewerImg').src = currentImageList[currentImageIndex];
        document.getElementById('viewerCounter').innerText = `${currentImageIndex+1}/${currentImageList.length}`;
        resetZoom();
    }
    function viewerPrev() {
        if (currentImageIndex > 0) currentImageIndex--;
        else currentImageIndex = currentImageList.length-1;
        document.getElementById('viewerImg').src = currentImageList[currentImageIndex];
        document.getElementById('viewerCounter').innerText = `${currentImageIndex+1}/${currentImageList.length}`;
        resetZoom();
    }
    function resetZoom() {
        zoomScale = 1;
        translate = { x: 0, y: 0 };
        const img = document.getElementById('viewerImg');
        img.style.transform = `scale(1) translate(0px, 0px)`;
        isZoomed = false;
    }
    function setupZoomEvents() {
        const img = document.getElementById('viewerImg');
        img.onwheel = (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            zoomScale = Math.min(Math.max(zoomScale + delta, 1), 3);
            img.style.transform = `scale(${zoomScale}) translate(${translate.x}px, ${translate.y}px)`;
            isZoomed = zoomScale > 1;
        };
        let startX, startY, startTranslateX, startTranslateY;
        img.onmousedown = (e) => {
            if (!isZoomed) return;
            e.preventDefault();
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            startTranslateX = translate.x;
            startTranslateY = translate.y;
        };
        window.onmousemove = (e) => {
            if (!isDragging || !isZoomed) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            translate.x = startTranslateX + dx;
            translate.y = startTranslateY + dy;
            img.style.transform = `scale(${zoomScale}) translate(${translate.x}px, ${translate.y}px)`;
        };
        window.onmouseup = () => { isDragging = false; };
        img.ondblclick = (e) => {
            e.preventDefault();
            if (zoomScale > 1) resetZoom();
            else { zoomScale = 2; img.style.transform = `scale(2) translate(0px, 0px)`; isZoomed = true; }
        };
    }

    // Render Functions
    function renderHome() {
        const d = currentData;
        const aboutHtml = d.about_active !== false ? `
            <div class="info-card">
                <div class="card-title"><i class="fas fa-info-circle"></i> من نحن</div>
                <div class="toggle-content open" style="padding:0; max-height:none;">${d.about_text || 'نقدم لكم أرقى التصاميم الداخلية والديكورات الفاخرة التي تجمع بين الأناقة والجودة العالية.'}</div>
            </div>
        ` : '';
        
        let reviewsHtml = '';
        if (d.reviews && Object.keys(d.reviews).length) {
            const items = Object.keys(d.reviews).map((id, i) => `
                <div class="review-item" data-review-idx="${i}">
                    <div class="review-stars">${'★'.repeat(d.reviews[id].rating)}${'☆'.repeat(5-d.reviews[id].rating)}</div>
                    <div class="review-text">"${d.reviews[id].message}"</div>
                    <div class="review-name">— ${d.reviews[id].name}</div>
                </div>
            `).join('');
            reviewsHtml = `<div class="info-card"><div class="card-title"><i class="fas fa-star"></i> تقييمات العملاء</div><div class="review-slider" id="reviewSlider">${items}</div></div>`;
        }
        
        const scheduleHtml = `<div class="info-card"><div class="card-title"><i class="fas fa-clock"></i> أوقات العمل</div>${getScheduleHtml(d)}<div id="statusContainer" style="margin-top:15px;"></div></div>`;
        
        const locationHtml = d.location_url ? `<div class="info-card"><button onclick="window.open('${d.location_url}','_blank')" class="location-btn"><i class="fas fa-map-marker-alt"></i> موقعنا على الخريطة</button></div>` : '';
        
        return `
            <div class="hero-card">
                <h2>✨ عيد فطر مبارك ✨</h2>
                <p>كل عام وأنتم بخير</p>
            </div>
            ${aboutHtml}
            <div class="info-card">
                <div class="card-title"><i class="fas fa-star"></i> أضف تقييمك</div>
                <input type="text" id="reviewName" placeholder="اسمك الكريم">
                <div class="star-rating" id="starRating">
                    <i class="fas fa-star" data-star="5"></i>
                    <i class="fas fa-star" data-star="4"></i>
                    <i class="fas fa-star" data-star="3"></i>

    function getScheduleHtml(d) {
        if (!d.work_schedule) return '<p>لم تحدد المواعيد بعد</p>';
        const dayNames = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
        let html = '';
        for (let i=0; i<=6; i++) {
            const s = d.work_schedule[i];
            if (s && s.active) {
                html += `<div class="schedule-group"><div class="schedule-days"><strong>${dayNames[i]}</strong></div>
                    <div class="time-period"><span class="time-text">${s.s1_s || '09:00'}</span> — <span class="time-text">${s.s1_e || '17:00'}</span></div>`;
                if (s.s2_a) html += `<div class="time-period"><span class="time-text">${s.s2_s || ''}</span> — <span class="time-text">${s.s2_e || ''}</span></div>`;
                html += `</div>`;
            } else if (s && !s.active) {
                html += `<div class="schedule-group"><strong>${dayNames[i]}</strong> <span style="color:var(--danger);">(عطلة)</span></div>`;
            }
        }
        return html;
    }
    
    function updateWorkStatus() {
        const d = currentData;
        const container = document.getElementById('statusContainer');
        if (!container || !d.work_schedule) return;
        const now = new Date();
        const day = now.getDay();
        const schedule = d.work_schedule[day];
        let isOpen = false;
        if (schedule && schedule.active) {
            const toMins = (t) => { let [h,m] = t.split(':').map(Number); return h*60+m; };
            const cur = now.getHours()*60+now.getMinutes();
            const s1 = toMins(schedule.s1_s), e1 = toMins(schedule.s1_e);
            if (cur >= s1 && cur < e1) isOpen = true;
            if (!isOpen && schedule.s2_a && schedule.s2_s && schedule.s2_e) {
                const s2 = toMins(schedule.s2_s), e2 = toMins(schedule.s2_e);
                if ((e2 < s2 && (cur >= s2 || cur < e2)) || (cur >= s2 && cur < e2)) isOpen = true;
            }
        }
        container.innerHTML = isOpen ? 
            `<div class="status-badge status-open"><i class="fas fa-circle"></i> مفتوح الآن</div>` :
            `<div class="status-badge status-closed"><i class="fas fa-circle"></i> مغلق الآن</div>`;
    }

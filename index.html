<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>بصمة غير | تجهيز المعارض والمحلات التجارية</title>
    <meta name="description" content="بصمة غير: خبراء في ديكورات المعارض والمحلات التجارية بجدة">
    <meta name="keywords" content="ديكور, ديكورات, ديكورات معارض, ديكور محلات تجارية, ديكور خشب جدة">
    <meta name="author" content="بصمة غير">
    <link rel="canonical" href="https://basmmaghyrdecor.com/">
    <link rel="icon" type="image/png" sizes="32x32" href="https://cdn.jsdelivr.net/gh/LpDngol92/my-images/images/20260504_203712_%D8%AA%D8%B5%D9%85%D9%8A%D9%85%20%D8%A8%D8%AF%D9%88%D9%86%20%D8%B9%D9%86%D9%88%D8%A7%D9%86%20(3).png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #fff; color: #2d2a2a; }
        :root { --primary: #c8a165; --primary-dark: #a47e44; }
        
        /* ستايلات الدردشة */
        .chat-toggle-btn {
            position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px;
            border-radius: 50%; background: var(--primary); border: none; color: white;
            cursor: pointer; z-index: 9999; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .chat-window {
            position: fixed; bottom: 90px; left: 20px; width: 360px; height: 520px;
            background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none; flex-direction: column; z-index: 9998; overflow: hidden;
            direction: rtl; font-family: 'Cairo', sans-serif;
        }
        .chat-header {
            background: var(--primary); padding: 15px; color: white;
            display: flex; justify-content: space-between; align-items: center;
        }
        .admin-status-badge {
            font-size: 11px; padding: 4px 10px; border-radius: 20px; margin-right: 10px;
        }
        .admin-status-badge.online { background: #28a745; color: white; }
        .admin-status-badge.offline { background: #6c757d; color: white; }
        .offline-banner {
            background: #f8d7da; color: #721c24; padding: 10px; text-align: center;
            font-size: 0.8rem; border-bottom: 1px solid #f5c6cb; display: none;
        }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 15px; background: #f8f9fa;
            display: flex; flex-direction: column; gap: 8px;
        }
        .chat-message { display: flex; flex-direction: column; margin-bottom: 10px; }
        .chat-message.user { align-items: flex-end; }
        .chat-message.admin { align-items: flex-start; }
        .message-bubble {
            max-width: 80%; padding: 10px 15px; border-radius: 20px; word-wrap: break-word;
        }
        .chat-message.user .message-bubble {
            background: var(--primary); color: white; border-radius: 20px 20px 5px 20px;
        }
        .chat-message.admin .message-bubble {
            background: white; color: #333; border-radius: 20px 20px 20px 5px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message-time { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; }
        .chat-input-area {
            padding: 10px; background: white; border-top: 1px solid #eee;
            display: flex; gap: 10px;
        }
        .chat-input {
            flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 25px;
            outline: none; font-family: 'Cairo', sans-serif;
        }
        .chat-input:disabled {
            background: #e9ecef; cursor: not-allowed;
        }
        .chat-send-btn {
            background: var(--primary); border: none; color: white; width: 40px;
            height: 40px; border-radius: 50%; cursor: pointer;
        }
        .chat-send-btn:disabled {
            background: #ccc; cursor: not-allowed;
        }
        .name-request-overlay {
            position: absolute; inset: 0; background: rgba(255,255,255,0.98);
            display: flex; align-items: center; justify-content: center;
            z-index: 10; flex-direction: column; padding: 20px;
        }
        .name-request-input {
            padding: 12px; border: 2px solid var(--primary); border-radius: 30px;
            width: 80%; font-family: 'Cairo', sans-serif; font-size: 1rem;
            margin-top: 15px; text-align: center;
        }
        .name-request-btn {
            margin-top: 15px; background: var(--primary); color: white;
            border: none; padding: 10px 30px; border-radius: 30px; cursor: pointer;
            font-family: 'Cairo', sans-serif; font-size: 1rem;
        }
        .typing-indicator {
            padding: 5px 15px; font-size: 0.7rem; color: #888; display: none;
        }
    </style>
</head>
<body>

<button id="chatToggleBtn" class="chat-toggle-btn">
    <i class="fas fa-comment-dots" style="font-size: 24px;"></i>
</button>

<div id="chatWindow" class="chat-window">
    <div class="chat-header">
        <div>
            <span style="font-weight: bold;">💬 خدمة العملاء</span>
            <span id="adminStatusBadge" class="admin-status-badge offline">⚪ غير متصل</span>
        </div>
        <button id="chatCloseBtn" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer;">✕</button>
    </div>
    
    <div id="offlineBanner" class="offline-banner">
        ⚠️ المشرف غير متصل حالياً. يمكنك كتابة رسالتك وسيتم الرد عند العودة.
    </div>
    
    <div id="chatMessages" class="chat-messages"></div>
    
    <div id="typingIndicator" class="typing-indicator">✍️ المشرف يكتب...</div>
    
    <div class="chat-input-area">
        <input type="text" id="chatInput" class="chat-input" placeholder="اكتب رسالتك...">
        <button id="chatSendBtn" class="chat-send-btn">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    // ========== متغيرات الدردشة ==========
    let currentTicketId = null;
    let currentVisitorId = null;
    let currentVisitorName = null;
    let isAdminOnline = false;
    let messageListener = null;
    let typingTimeout = null;
    let isNameRequested = false;

    // ========== دوال مساعدة ==========
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatTime(timestamp) {
        if (!timestamp) return '';
        const date = new Date(timestamp);
        return `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
    }

    function showToast(message) {
        let toast = document.getElementById('chatToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'chatToast';
            toast.style.cssText = 'position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 20px; border-radius: 50px; font-size: 0.8rem; z-index: 10000; display: none;';
            document.body.appendChild(toast);
        }
        toast.innerText = message;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    // ========== الحصول على معرف الزائر ==========
    function getOrCreateVisitorId() {
        let visitorId = localStorage.getItem('chat_visitor_id');
        if (!visitorId) {
            visitorId = 'visitor_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            localStorage.setItem('chat_visitor_id', visitorId);
        }
        return visitorId;
    }

    // ========== طلب الاسم من الزائر ==========
    function requestUserName() {
        return new Promise((resolve) => {
            const chatWindow = document.getElementById('chatWindow');
            const oldContent = chatWindow.innerHTML;
            
            // إنشاء نافذة طلب الاسم
            const overlay = document.createElement('div');
            overlay.className = 'name-request-overlay';
            overlay.innerHTML = `
                <i class="fas fa-user-circle" style="font-size: 60px; color: var(--primary);"></i>
                <h3 style="margin-top: 15px;">مرحباً بك!</h3>
                <p style="text-align: center; margin: 10px 20px;">الرجاء إدخال اسمك لبدء المحادثة</p>
                <input type="text" id="nameInput" class="name-request-input" placeholder="اكتب اسمك هنا...">
                <button id="nameSubmitBtn" class="name-request-btn">بدء المحادثة</button>
            `;
            
            chatWindow.style.position = 'relative';
            chatWindow.appendChild(overlay);
            
            const nameInput = document.getElementById('nameInput');
            const submitBtn = document.getElementById('nameSubmitBtn');
            
            const submitName = () => {
                const name = nameInput.value.trim();
                if (name) {
                    localStorage.setItem('chat_visitor_name', name);
                    overlay.remove();
                    resolve(name);
                } else {
                    showToast('❌ الرجاء إدخال اسمك');
                }
            };
            
            submitBtn.onclick = submitName;
            nameInput.onkeypress = (e) => {
                if (e.key === 'Enter') submitName();
            };
            nameInput.focus();
        });
    }

    // ========== إنشاء أو جلب تذكرة المحادثة ==========
    async function getOrCreateTicket() {
        const visitorId = getOrCreateVisitorId();
        
        // التحقق من وجود اسم
        let visitorName = localStorage.getItem('chat_visitor_name');
        if (!visitorName && !isNameRequested) {
            isNameRequested = true;
            visitorName = await requestUserName();
        } else if (!visitorName) {
            visitorName = 'زائر';
        }
        currentVisitorName = visitorName;
        
        // البحث عن تذكرة مفتوحة
        const ticketsRef = db.ref(`${DB_PATH}/chat_tickets`);
        const snapshot = await ticketsRef.orderByChild('visitorId').equalTo(visitorId).once('value');
        
        let existingTicket = null;
        snapshot.forEach(child => {
            const ticket = child.val();
            if (ticket && ticket.status === 'open') {
                existingTicket = { id: child.key, ...ticket };
            }
        });
        
        if (existingTicket) {
            currentTicketId = existingTicket.id;
            return currentTicketId;
        }
        
        // إنشاء تذكرة جديدة
        const newTicket = {
            ticketId: null,
            visitorId: visitorId,
            visitorName: visitorName,
            status: 'open',
            createdAt: Date.now(),
            lastMessageAt: Date.now()
        };
        
        const newRef = ticketsRef.push();
        newTicket.ticketId = newRef.key;
        await newRef.set(newTicket);
        currentTicketId = newRef.key;
        
        return currentTicketId;
    }

    // ========== إرسال رسالة ==========
    async function sendChatMessage(message) {
        if (!message.trim()) {
            showToast('❌ الرجاء كتابة رسالة');
            return false;
        }
        
        if (!currentTicketId) {
            await getOrCreateTicket();
        }
        
        // ✅ حتى لو المشرف غير متصل، نقبل الرسالة ونحفظها (المشكلة الثانية محلولة)
        // ولكن نعطي تنبيه للمستخدم
        
        const messageData = {
            id: Date.now().toString(),
            sender: 'visitor',
            senderName: currentVisitorName,
            message: message.trim(),
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            read: false
        };
        
        try {
            await db.ref(`${DB_PATH}/chat_messages/${currentTicketId}`).push(messageData);
            await db.ref(`${DB_PATH}/chat_tickets/${currentTicketId}`).update({
                lastMessageAt: Date.now(),
                status: 'open'
            });
            
            const input = document.getElementById('chatInput');
            if (input) input.value = '';
            
            if (!isAdminOnline) {
                showToast('📨 تم إرسال رسالتك. سيتم الرد عليك عند عودة المشرف');
            }
            return true;
        } catch (error) {
            console.error('خطأ:', error);
            showToast('❌ فشل إرسال الرسالة');
            return false;
        }
    }

    // ========== عرض رسالة ==========
    function displayMessage(messageData, isOwnMessage) {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        
        const messageDiv = document.createElement('div');
        messageDiv.className = `chat-message ${isOwnMessage ? 'user' : 'admin'}`;
        
        const senderName = isOwnMessage ? 'أنت' : (messageData.senderName || 'الدعم');
        const timeStr = formatTime(messageData.timestamp);
        
        messageDiv.innerHTML = `
            <div class="message-bubble">
                <div style="font-size: 0.7rem; margin-bottom: 4px; opacity: 0.7;">${escapeHtml(senderName)}</div>
                <div>${escapeHtml(messageData.message)}</div>
            </div>
            <div class="message-time">${timeStr}</div>
        `;
        
        container.appendChild(messageDiv);
        container.scrollTop = container.scrollHeight;
    }

    // ========== تحميل الرسائل السابقة ==========
    async function loadPreviousMessages() {
        if (!currentTicketId) return;
        
        const container = document.getElementById('chatMessages');
        if (container) container.innerHTML = '';
        
        const messagesRef = db.ref(`${DB_PATH}/chat_messages/${currentTicketId}`).orderByChild('timestamp').limitToLast(50);
        const snapshot = await messagesRef.once('value');
        
        const messages = [];
        snapshot.forEach(child => { if (child.val()) messages.push(child.val()); });
        messages.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
        
        messages.forEach(msg => {
            const isOwn = (msg.sender === 'visitor');
            displayMessage(msg, isOwn);
        });
    }

    // ========== الاستماع للرسائل الجديدة ==========
    function startListeningToMessages() {
        if (messageListener) messageListener.off();
        if (!currentTicketId) return;
        
        const messagesRef = db.ref(`${DB_PATH}/chat_messages/${currentTicketId}`).orderByChild('timestamp').limitToLast(1);
        
        messageListener = messagesRef.on('child_added', (snapshot) => {
            const msg = snapshot.val();
            if (msg && msg.sender === 'admin') {
                displayMessage(msg, false);
                // تشغيل صوت الإشعار
                try {
                    const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
                    audio.play().catch(e => console.log('صوت:', e));
                } catch(e) {}
            }
        });
    }

    // ========== الاستماع لحالة المشرف ==========
    function startListeningToAdminStatus() {
        const statusRef = db.ref(`${DB_PATH}/chat_admin_status`);
        statusRef.on('value', (snapshot) => {
            const status = snapshot.val();
            isAdminOnline = status ? status.isOnline : false;
            
            const badge = document.getElementById('adminStatusBadge');
            const banner = document.getElementById('offlineBanner');
            const chatInput = document.getElementById('chatInput');
            const chatSendBtn = document.getElementById('chatSendBtn');
            
            if (badge) {
                badge.className = `admin-status-badge ${isAdminOnline ? 'online' : 'offline'}`;
                badge.innerText = isAdminOnline ? '🟢 متصل' : '⚪ غير متصل';
            }
            
            if (banner) {
                banner.style.display = isAdminOnline ? 'none' : 'block';
            }
            
            // ✅ المشكلة الثانية محلولة: لا نمنع الكتابة، فقط نعطي تنبيه
            // المستخدم يقدر يكتب حتى لو المشرف غير متصل
            if (chatInput) chatInput.disabled = false;
            if (chatSendBtn) chatSendBtn.disabled = false;
        });
    }

    // ========== تهيئة الدردشة ==========
    async function initChat() {
        const chatWindow = document.getElementById('chatWindow');
        const toggleBtn = document.getElementById('chatToggleBtn');
        const closeBtn = document.getElementById('chatCloseBtn');
        const sendBtn = document.getElementById('chatSendBtn');
        const chatInput = document.getElementById('chatInput');
        
        // ✅ المشكلة الثالثة محلولة: ربط حدث الإرسال بشكل صحيح
        const sendMessageHandler = () => {
            const message = chatInput.value.trim();
            if (message) {
                sendChatMessage(message);
            }
        };
        
        sendBtn.onclick = sendMessageHandler;
        
        chatInput.onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessageHandler();
            }
        };
        
        toggleBtn.onclick = async () => {
            if (chatWindow.style.display === 'none' || chatWindow.style.display === '') {
                chatWindow.style.display = 'flex';
                await getOrCreateTicket();
                await loadPreviousMessages();
                startListeningToMessages();
                startListeningToAdminStatus();
            } else {
                chatWindow.style.display = 'none';
                if (messageListener) messageListener.off();
            }
        };
        
        closeBtn.onclick = () => {
            chatWindow.style.display = 'none';
            if (messageListener) messageListener.off();
        };
        
        // بدء الاستماع للحالة
        startListeningToAdminStatus();
    }
    
    // تشغيل الدردشة بعد تحميل الصفحة
    setTimeout(() => { initChat(); }, 1000);
</script>

<!-- المحتوى الأصلي للموقع (مختصر للتوضيح) -->
<div style="text-align: center; padding: 100px 20px;">
    <h1 style="color: var(--primary);">بصمة غير</h1>
    <p>متخصصون في ديكورات المعارض والمحلات التجارية</p>
    <p style="margin-top: 20px;">📞 0541780995</p>
</div>

</body>
</html>

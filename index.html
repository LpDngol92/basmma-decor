<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>بصمة غير | معرض تفاعلي فاخر لديكورات المعارض والمحلات</title>
    <meta name="description" content="بصمة غير - تجربة ديكور فريدة. أشغال خشبية، معارض، محلات تجارية في جدة.">
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/LpDngol92/my-images/images/20260504_203712_%D8%AA%D8%B5%D9%85%D9%8A%D9%85%20%D8%A8%D8%AF%D9%88%D9%86%20%D8%B9%D9%86%D9%88%D8%A7%D9%86%20(3).png">
    <meta property="og:image" content="https://i.ibb.co/CsmG3G7r/1.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f5f2ec;
            color: #1a1a1a;
            line-height: 1.5;
            overflow-x: hidden;
        }
        :root {
            --gold: #D4AF37;
            --gold-dark: #b8902b;
            --marble: #fcf9f2;
            --dark-bg: #0c0b0a;
            --shadow-xl: 0 25px 45px -12px rgba(0, 0, 0, 0.3);
            --glass: rgba(255, 255, 255, 0.15);
        }

        /* ---------- الهيدر الذكي ---------- */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 2rem;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            background: transparent;
            backdrop-filter: blur(0px);
        }
        .header.scrolled {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
            padding: 0.6rem 2rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        .header .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), #fff2cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            cursor: pointer;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.2s;
            padding: 0.5rem 0;
            border-bottom: 2px solid transparent;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }
        /* القائمة السفلية للجوال */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            padding: 0.6rem 1rem;
            justify-content: space-around;
            z-index: 1100;
            border-top: 1px solid rgba(212,175,55,0.3);
        }
        .bottom-nav a {
            color: #ccc;
            text-align: center;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
        }
        .bottom-nav a i { font-size: 1.4rem; }
        .bottom-nav a.active, .bottom-nav a:hover { color: var(--gold); }
        /* زر واتساب عائم */
        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #25D366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1050;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.2s;
            border: none;
            color: white;
            font-size: 1.8rem;
        }
        .whatsapp-float:hover { transform: scale(1.08); background: #1da15a; }

        /* ----- سحابة الشعارات المتحركة (شركاء النجاح) ----- */
        .partners-cloud {
            background: #0a0a0a;
            padding: 2rem 0;
            overflow: hidden;
            position: relative;
            margin-top: 70px;
        }
        .cloud-track {
            display: flex;
            gap: 3rem;
            width: max-content;
        }
        .cloud-track.reverse {
            animation: scrollReverse 45s linear infinite;
        }
        .cloud-track:not(.reverse) {
            animation: scrollNormal 40s linear infinite;
        }
        @keyframes scrollNormal {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        @keyframes scrollReverse {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }
        .partner-logo-item {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.8rem;
            border-radius: 60px;
            border: 1px solid rgba(212,175,55,0.4);
            transition: 0.2s;
            cursor: pointer;
        }
        .partner-logo-item:hover {
            transform: scale(1.05);
            background: rgba(212,175,55,0.2);
            border-color: var(--gold);
        }
        .partner-logo-item img {
            height: 50px;
            max-width: 130px;
            object-fit: contain;
            filter: brightness(0.9);
            transition: 0.2s;
        }
        .partner-logo-item:hover img { filter: brightness(1); }

        /* ----- السلايدر ثلاثي الأبعاد (ملء الشاشة) ----- */
        .hero-slider-3d {
            position: relative;
            width: 100%;
            min-height: 90vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .slider-bg-blur {
            position: absolute;
            inset: 0;
            filter: blur(40px);
            opacity: 0.6;
            background-size: cover;
            background-position: center;
            transition: 0.5s;
            z-index: 0;
        }
        .slider-stage {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 1100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slider-image-card {
            width: 100%;
            max-width: 380px;
            aspect-ratio: 9 / 16;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
            transition: 0.4s;
            cursor: pointer;
            margin: 0 auto;
            border: 2px solid rgba(212,175,55,0.6);
        }
        .slider-image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slider-nav-buttons {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 10;
        }
        .slider-nav-buttons button {
            background: rgba(0,0,0,0.6);
            border: none;
            color: var(--gold);
            font-size: 1.5rem;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }
        .slider-progress-ring {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--gold);
            font-size: 1.2rem;
            z-index: 10;
        }

        /* ----- شبكة الأعمال (جدارية غير منتظمة) ----- */
        .masonry-grid {
            column-count: 3;
            column-gap: 1.8rem;
        }
        .masonry-card {
            break-inside: avoid;
            margin-bottom: 1.8rem;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            transition: 0.25s ease;
            cursor: pointer;
            box-shadow: 0 12px 25px -8px rgba(0,0,0,0.1);
            position: relative;
        }
        .masonry-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 35px -12px rgba(0,0,0,0.2);
        }
        .masonry-card .img-square {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }
        .masonry-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s;
        }
        .masonry-card:hover img { transform: scale(1.05); }
        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 1rem;
            color: white;
            transform: translateY(100%);
            transition: 0.3s;
        }
        .masonry-card:hover .card-overlay {
            transform: translateY(0);
        }
        .card-overlay span { color: var(--gold); }

        @media (max-width: 992px) {
            .masonry-grid { column-count: 2; }
        }
        @media (max-width: 576px) {
            .masonry-grid { column-count: 1; }
        }

        .section-title {
            font-size: 2rem;
            text-align: center;
            margin: 3rem 0 2rem;
            position: relative;
            color: #2c2b28;
        }
        .section-title:after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: var(--gold);
            margin: 0.5rem auto;
        }
        .btn-primary {
            background: var(--gold);
            color: #1a1a1a;
            font-weight: 800;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            text-decoration: none;
            display: inline-block;
        }
        .footer {
            background: #0c0b0a;
            padding: 2rem;
            text-align: center;
            color: #aaa;
            margin-top: 3rem;
        }
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .bottom-nav { display: flex; }
            .header { padding: 0.8rem 1rem; }
            .logo h1 { font-size: 1.4rem; }
            .slider-image-card { max-width: 280px; }
            .hero-slider-3d { min-height: 70vh; }
            .partners-cloud { margin-top: 60px; }
        }

        /* توست و لايت بوكس و كتالوج (مختصر) */
        .lightbox, .catalog-modal, .toast, .maintenance-screen, .popup-bubble { display: none; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e1e;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            z-index: 2001;
        }
    </style>
</head>
<body>

<div id="splash" style="display:none;"></div>
<div class="header" id="mainHeader">
    <div class="container">
        <div class="logo"><h1 id="siteTitle">بصمة غير</h1></div>
        <div class="nav-links" id="navLinks"></div>
    </div>
</div>
<div class="bottom-nav" id="bottomNav"></div>
<div class="whatsapp-float" id="whatsappFloatBtn"><i class="fab fa-whatsapp"></i></div>

<div id="partnersCloud" class="partners-cloud" style="display:none;">
    <div class="cloud-track" id="cloudTrack1"></div>
    <div class="cloud-track reverse" id="cloudTrack2"></div>
</div>

<main id="mainContent"></main>

<footer class="footer">
    <div class="container">
        <div id="footerCopyright">© 2025 بصمة غير - جميع الحقوق محفوظة</div>
    </div>
</footer>

<div id="lightbox" class="lightbox"></div>
<div id="catalogModal" class="catalog-modal"></div>
<div id="toastMsg" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let currentPage = 'home';
    let sliderImages = [];
    let sliderCurrent = 0;
    let sliderInterval;
    let currentWhatsappNum = '966541780995';
    let isSliderPaused = false;

    // Helper functions
    function showToast(msg) {
        const t = document.getElementById('toastMsg');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    // بناء سحابة الشركاء
    function renderPartnersCloud() {
        const partners = currentData.partners;
        const cloud1 = document.getElementById('cloudTrack1');
        const cloud2 = document.getElementById('cloudTrack2');
        if (!partners || Object.keys(partners).length === 0) {
            document.getElementById('partnersCloud').style.display = 'none';
            return;
        }
        document.getElementById('partnersCloud').style.display = 'block';
        let html = '';
        Object.values(partners).forEach(p => {
            html += `<div class="partner-logo-item" onclick="window.open('${p.link || '#'}', '_blank')">
                        <img src="${p.url}" loading="lazy" onerror="this.src='https://placehold.co/200x60?text=شريك'">
                    </div>`;
        });
        // نكرر نفس المحتوى للحركة المستمرة
        cloud1.innerHTML = html + html;
        cloud2.innerHTML = html + html;
    }

    // بناء السلايدر ثلاثي الأبعاد
    function buildHeroSlider() {
        const container = document.getElementById('heroSliderContainer');
        if (!container) return;
        const sliderData = currentData.home_slider;
        if (!sliderData || !sliderData.enabled || !sliderData.images || sliderData.images.length === 0) {
            container.innerHTML = '<div class="empty-state">لا توجد صور للعرض</div>';
            return;
        }
        sliderImages = sliderData.images.map(img => img.url).filter(url => url);
        if (sliderImages.length === 0) return;
        sliderCurrent = 0;
        const duration = (sliderData.duration || 5) * 1000;
        container.innerHTML = `
            <div class="hero-slider-3d">
                <div class="slider-bg-blur" id="sliderBgBlur" style="background-image: url('${sliderImages[0]}')"></div>
                <div class="slider-stage">
                    <div class="slider-image-card" id="sliderMainCard">
                        <img src="${sliderImages[0]}" id="sliderMainImg">
                    </div>
                </div>
                <div class="slider-nav-buttons">
                    <button id="sliderPrev"><i class="fas fa-chevron-right"></i></button>
                    <button id="sliderNext"><i class="fas fa-chevron-left"></i></button>
                </div>
                <div class="slider-progress-ring" id="sliderProgress">0s</div>
            </div>
        `;
        const bgBlur = document.getElementById('sliderBgBlur');
        const mainImg = document.getElementById('sliderMainImg');
        const prevBtn = document.getElementById('sliderPrev');
        const nextBtn = document.getElementById('sliderNext');
        const progressSpan = document.getElementById('sliderProgress');
        
        function updateSlider(index, animate = true) {
            mainImg.src = sliderImages[index];
            bgBlur.style.backgroundImage = `url('${sliderImages[index]}')`;
            if (sliderInterval) clearInterval(sliderInterval);
            let startTime = Date.now();
            sliderInterval = setInterval(() => {
                if (isSliderPaused) return;
                let elapsed = Date.now() - startTime;
                let remaining = Math.max(0, duration - elapsed);
                progressSpan.innerText = Math.ceil(remaining / 1000) + 's';
                if (elapsed >= duration) {
                    clearInterval(sliderInterval);
                    nextSlide();
                }
            }, 100);
        }
        function nextSlide() {
            sliderCurrent = (sliderCurrent + 1) % sliderImages.length;
            updateSlider(sliderCurrent);
        }
        function prevSlide() {
            sliderCurrent = (sliderCurrent - 1 + sliderImages.length) % sliderImages.length;
            updateSlider(sliderCurrent);
        }
        prevBtn.onclick = () => { isSliderPaused = false; prevSlide(); };
        nextBtn.onclick = () => { isSliderPaused = false; nextSlide(); };
        document.getElementById('sliderMainCard').onclick = () => openLightbox(sliderImages, sliderCurrent);
        updateSlider(0);
    }

    // بناء شبكة الأعمال (Masonry)
    function buildWorksGrid() {
        const container = document.getElementById('worksGrid');
        if (!container) return;
        const albums = currentData.albums ? Object.keys(currentData.albums).map(id => ({ id, ...currentData.albums[id] })) : [];
        if (albums.length === 0) {
            container.innerHTML = '<div class="empty-state">لا توجد أعمال معروضة حالياً</div>';
            return;
        }
        let html = '<div class="masonry-grid">';
        albums.forEach(alb => {
            let cover = (alb.imgs && Object.keys(alb.imgs).length) ? Object.values(alb.imgs)[0].url : '';
            let avg = (alb.rating_sum && alb.rating_count) ? (alb.rating_sum / alb.rating_count).toFixed(1) : '0';
            let views = alb.views || 0;
            html += `
                <div class="masonry-card" data-album="${alb.id}">
                    <div class="img-square"><img src="${cover}" loading="lazy" onerror="this.src='https://placehold.co/400x400?text=لا+يوجد+صورة'"></div>
                    <div class="card-overlay">
                        <div><i class="fas fa-star" style="color:var(--gold);"></i> ${avg} (${alb.rating_count||0})</div>
                        <div><i class="fas fa-eye"></i> ${views}</div>
                        <div>${alb.name}</div>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;
        document.querySelectorAll('.masonry-card').forEach(card => {
            card.addEventListener('click', () => openAlbum(card.getAttribute('data-album')));
        });
    }

    function openAlbum(id) {
        const alb = currentData.albums?.[id];
        if (!alb || !alb.imgs) { showToast('لا توجد صور'); return; }
        const urls = Object.values(alb.imgs).map(i => i.url).filter(u => u);
        if (urls.length) openLightbox(urls, 0, id);
        else showToast('لا توجد صور صالحة');
    }

    // Lightbox مبسط (مع التقييم والمشاهدات)
    let lightboxImages = [];
    let lightboxIndex = 0;
    let currentAlbumId = null;
    function openLightbox(images, index, albumId = null) {
        if (!images.length) return;
        lightboxImages = images;
        lightboxIndex = index;
        currentAlbumId = albumId;
        const lb = document.getElementById('lightbox');
        lb.innerHTML = `
            <div style="position:fixed; inset:0; background:rgba(0,0,0,0.98); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000;">
                <img src="${images[index]}" style="max-width:90%; max-height:80vh; object-fit:contain;">
                <div style="margin-top:20px; display:flex; gap:20px;">
                    <button onclick="changeImage(-1)">السابق</button>
                    <button onclick="changeImage(1)">التالي</button>
                    <button onclick="window.open('https://wa.me/${currentWhatsappNum}?text=${encodeURIComponent('استفسار عن الصورة: '+images[index])}','_blank')">واتساب</button>
                </div>
                <button onclick="closeLightbox()" style="position:absolute; top:20px; left:20px;">✖</button>
            </div>
        `;
        lb.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        if (albumId) incrementViews(albumId);
    }
    window.changeImage = function(delta) {
        lightboxIndex = (lightboxIndex + delta + lightboxImages.length) % lightboxImages.length;
        const img = document.querySelector('#lightbox img');
        if (img) img.src = lightboxImages[lightboxIndex];
    };
    window.closeLightbox = function() {
        document.getElementById('lightbox').style.display = 'none';
        document.body.style.overflow = '';
    };
    async function incrementViews(albumId) {
        const sessionKey = `viewed_${albumId}`;
        if (sessionStorage.getItem(sessionKey)) return;
        const albumRef = db.ref(`${DB_PATH}/albums/${albumId}`);
        await albumRef.transaction(album => { if(album) album.views = (album.views || 0) + 1; return album; });
        sessionStorage.setItem(sessionKey, '1');
        if (currentData.albums && currentData.albums[albumId]) currentData.albums[albumId].views = (currentData.albums[albumId].views || 0) + 1;
        buildWorksGrid(); // تحديث الشبكة بعد المشاهدة
    }

    // بناء الصفحات
    function loadPage() {
        const main = document.getElementById('mainContent');
        if (!main) return;
        if (currentPage === 'home') {
            main.innerHTML = `
                <div class="hero-slider-3d" id="heroSliderContainer"></div>
                <div class="container section">
                    <h2 class="section-title">أحدث أعمالنا</h2>
                    <div id="worksGrid"></div>
                </div>
            `;
            buildHeroSlider();
            buildWorksGrid();
        } else if (currentPage === 'store') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">المتجر</h2><div id="storeGrid">قريباً...</div></div>`;
        } else if (currentPage === 'catalogs') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">الكتالوجات</h2><div id="catalogsGrid">قريباً...</div></div>`;
        } else if (currentPage === 'contact') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">اتصل بنا</h2><div style="text-align:center;"><a href="tel:0541780995" style="font-size:1.5rem;">📞 0541780995</a><br><a href="https://wa.me/${currentWhatsappNum}" target="_blank">واتساب</a></div></div>`;
        }
    }

    // التنقل
    function changePage(page) {
        currentPage = page;
        loadPage();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        renderNavLinks();
    }
    function renderNavLinks() {
        const navContainer = document.getElementById('navLinks');
        const bottomNav = document.getElementById('bottomNav');
        const pages = [
            { id: 'home', name: 'الرئيسية', icon: 'fas fa-home' },
            { id: 'store', name: 'المتجر', icon: 'fas fa-store' },
            { id: 'catalogs', name: 'الكتالوجات', icon: 'fas fa-book-open' },
            { id: 'contact', name: 'اتصل بنا', icon: 'fas fa-phone-alt' }
        ];
        let navHtml = '';
        pages.forEach(p => {
            navHtml += `<a data-page="${p.id}" class="${currentPage === p.id ? 'active' : ''}"><i class="${p.icon}"></i> ${p.name}</a>`;
        });
        navContainer.innerHTML = navHtml;
        bottomNav.innerHTML = pages.map(p => `<a data-page="${p.id}" class="${currentPage === p.id ? 'active' : ''}"><i class="${p.icon}"></i><span>${p.name}</span></a>`).join('');
        document.querySelectorAll('[data-page]').forEach(el => {
            el.addEventListener('click', (e) => { e.preventDefault(); changePage(el.getAttribute('data-page')); });
        });
    }

    // هيدر ذكي
    function initSmartHeader() {
        const header = document.getElementById('mainHeader');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });
    }

    // بدء تشغيل Firebase
    db.ref(DB_PATH).once('value').then(snap => {
        currentData = snap.val() || {};
        currentWhatsappNum = currentData.whatsapp_num || '966541780995';
        document.getElementById('siteTitle').innerText = currentData.site_name || 'بصمة غير';
        renderPartnersCloud();
        renderNavLinks();
        loadPage();
        initSmartHeader();
        document.getElementById('whatsappFloatBtn').onclick = () => window.open(`https://wa.me/${currentWhatsappNum}`, '_blank');
    }).catch(err => { console.error(err); showToast('حدث خطأ في التحميل'); });

    db.ref(DB_PATH).on('value', snap => {
        if (snap.exists()) {
            currentData = snap.val();
            currentWhatsappNum = currentData.whatsapp_num || '966541780995';
            renderPartnersCloud();
            if (currentPage === 'home') {
                buildHeroSlider();
                buildWorksGrid();
            }
        }
    });
</script>
</body>
</html>

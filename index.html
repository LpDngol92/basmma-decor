<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بصمة غير | الغير المألوف</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Color System - جرأة وجنون */
            --primary-bg: #0A0F1E;
            --secondary-bg: #151E2F;
            --accent-1: #FF3366;
            --accent-2: #6C47FF;
            --accent-3: #00F5A0;
            --accent-4: #FFD166;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-primary: #FFFFFF;
            --text-secondary: #B8B9C4;
            --text-tertiary: #6B6F7C;
            --neon-glow: 0 0 20px rgba(255, 51, 102, 0.3);
            --neon-glow-2: 0 0 20px rgba(108, 71, 255, 0.3);
            --blur-amount: 20px;
            
            /* Typography */
            --font-display: 'Syne', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-arabic: 'Readex Pro', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: var(--primary-bg);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== CUSTOM CURSOR ===== */
        * {
            cursor: none !important;
        }

        .custom-cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-1);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 999999;
            mix-blend-mode: difference;
            transition: transform 0.2s;
            transform: translate(-50%, -50%);
        }

        .custom-cursor::after {
            content: '';
            width: 4px;
            height: 4px;
            background: var(--accent-1);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* ===== 3D SPLASH ===== */
        #splash {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, var(--accent-2), var(--primary-bg));
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1s cubic-bezier(0.87, 0, 0.13, 1);
            perspective: 1000px;
        }

        .splash-3d {
            transform-style: preserve-3d;
            animation: rotate3D 4s infinite alternate;
        }

        .splash-logo {
            font-size: 8rem;
            font-weight: 900;
            font-family: var(--font-display);
            color: transparent;
            -webkit-text-stroke: 2px white;
            text-shadow: 0 0 30px var(--accent-1);
            letter-spacing: 20px;
            transform: rotateX(20deg) rotateY(20deg);
        }

        @keyframes rotate3D {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(30deg) rotateY(30deg); }
        }

        /* ===== HYPERSPACE BACKGROUND ===== */
        #hyperspace {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: starMove 20s linear infinite;
        }

        @keyframes starMove {
            from { transform: translateZ(0) translateX(0) translateY(0); opacity: 1; }
            to { transform: translateZ(500px) translateX(200px) translateY(200px); opacity: 0; }
        }

        /* ===== DYNAMIC HEADER ===== */
        .dynamic-header {
            position: fixed;
            top: 30px;
            left: 30px;
            right: 30px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            mix-blend-mode: difference;
        }

        .logo-3d {
            font-size: 2rem;
            font-weight: 900;
            font-family: var(--font-display);
            color: transparent;
            -webkit-text-stroke: 1px white;
            text-shadow: 0 0 20px var(--accent-3);
            letter-spacing: 4px;
            transition: all 0.3s;
        }

        .logo-3d:hover {
            transform: scale(1.1);
            text-shadow: 0 0 40px var(--accent-3);
        }

        .menu-toggle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .menu-toggle:hover {
            background: var(--accent-1);
            transform: rotate(90deg);
        }

        /* ===== COSMIC NAVIGATION ===== */
        .cosmic-nav {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            border-left: 1px solid var(--glass-border);
            z-index: 1000;
            padding: 100px 40px;
            transition: right 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .cosmic-nav.active {
            right: 0;
        }

        .nav-item {
            display: block;
            width: 100%;
            padding: 20px 0;
            background: none;
            border: none;
            border-bottom: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: 1.5rem;
            font-weight: 700;
            font-family: var(--font-display);
            text-align: right;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: -100%;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1));
            transition: left 0.3s;
        }

        .nav-item:hover {
            color: white;
            transform: translateX(-20px);
        }

        .nav-item:hover::before {
            left: 100%;
        }

        .nav-item.active {
            color: var(--accent-3);
            font-size: 2rem;
            border-bottom-color: var(--accent-3);
        }

        /* ===== MAIN CONTENT ===== */
        .main-wrapper {
            min-height: 100vh;
            padding: 120px 40px 40px;
            position: relative;
            z-index: 1;
        }

        .section {
            display: none;
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .section.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== HOLOGRAPHIC CARDS ===== */
        .hologrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            perspective: 2000px;
        }

        .holo-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            transform-style: preserve-3d;
            transition: all 0.5s;
            cursor: pointer;
        }

        .holo-card:hover {
            transform: translateZ(50px) rotateX(5deg) rotateY(5deg);
            border-color: var(--accent-3);
            box-shadow: 
                0 0 30px var(--accent-3),
                inset 0 0 30px rgba(0, 245, 160, 0.2);
        }

        .card-glitch {
            position: absolute;
            inset: 0;
            background: linear-gradient(125deg, 
                transparent 0%, 
                transparent 40%, 
                rgba(255, 51, 102, 0.1) 40%, 
                rgba(255, 51, 102, 0.1) 60%, 
                transparent 60%, 
                transparent 100%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .holo-card:hover .card-glitch {
            opacity: 1;
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            33% { transform: translate(5px, -5px); }
            66% { transform: translate(-5px, 5px); }
        }

        .card-media {
            position: relative;
            height: 280px;
            overflow: hidden;
        }

        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .holo-card:hover .card-media img {
            transform: scale(1.1);
        }

        .card-media::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, var(--primary-bg) 100%);
            opacity: 0.5;
        }

        .card-content {
            padding: 25px;
            position: relative;
        }

        /* ===== HYPER TYPOGRAPHY ===== */
        .hero-title {
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 900;
            font-family: var(--font-display);
            line-height: 0.9;
            text-transform: uppercase;
            position: relative;
            margin-bottom: 30px;
        }

        .hero-title span {
            display: block;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: hueRotate 10s infinite;
        }

        @keyframes hueRotate {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(360deg); }
        }

        .glitch-text {
            position: relative;
            color: white;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-text::before {
            animation: glitch-animation-1 2s infinite;
            color: var(--accent-1);
            z-index: -1;
        }

        .glitch-text::after {
            animation: glitch-animation-2 2s infinite;
            color: var(--accent-2);
            z-index: -2;
        }

        @keyframes glitch-animation-1 {
            0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(20% 0 30% 0); transform: translate(-5px); }
            40% { clip-path: inset(50% 0 20% 0); transform: translate(5px); }
            60% { clip-path: inset(10% 0 60% 0); transform: translate(-5px); }
            80% { clip-path: inset(30% 0 40% 0); transform: translate(5px); }
        }

        @keyframes glitch-animation-2 {
            0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(60% 0 20% 0); transform: translate(5px); }
            40% { clip-path: inset(20% 0 50% 0); transform: translate(-5px); }
            60% { clip-path: inset(30% 0 30% 0); transform: translate(5px); }
            80% { clip-path: inset(40% 0 40% 0); transform: translate(-5px); }
        }

        /* ===== INFINITE MARQUEE ===== */
        .marquee-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            margin: 60px 0;
            padding: 20px 0;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
        }

        .marquee-track {
            display: flex;
            gap: 50px;
            animation: marqueeMove var(--marquee-speed) linear infinite;
            width: fit-content;
        }

        .marquee-item {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 10px 30px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .marquee-item i {
            color: var(--accent-1);
            font-size: 1.5rem;
        }

        .marquee-item img {
            height: 50px;
            width: auto;
            filter: brightness(0) invert(1);
            opacity: 0.7;
        }

        @keyframes marqueeMove {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* ===== QUANTUM SCHEDULE ===== */
        .quantum-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .quantum-field {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .time-particle {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .time-particle:hover {
            border-color: var(--accent-3);
            transform: scale(1.05);
            box-shadow: var(--neon-glow-2);
        }

        .time-particle::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                transparent, 
                rgba(255,255,255,0.1), 
                transparent);
            transform: rotate(45deg);
            animation: particleGlow 3s infinite;
        }

        @keyframes particleGlow {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .status-pulse {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 700;
            position: relative;
            overflow: hidden;
        }

        .status-pulse.open {
            background: linear-gradient(135deg, #00F5A0, #00D4FF);
            color: var(--primary-bg);
        }

        .status-pulse.closed {
            background: linear-gradient(135deg, #FF3366, #FF6B6B);
            color: white;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        /* ===== BUTTONS & INTERACTIONS ===== */
        .btn-quantum {
            padding: 18px 40px;
            background: transparent;
            border: 2px solid var(--accent-1);
            border-radius: 50px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            z-index: 1;
        }

        .btn-quantum::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-1);
            transition: left 0.3s;
            z-index: -1;
        }

        .btn-quantum:hover::before {
            left: 0;
        }

        .btn-quantum:hover {
            color: white;
            transform: scale(1.05);
            box-shadow: var(--neon-glow);
        }

        /* ===== IMAGE VIEWER ===== */
        #viewer {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(30px);
        }

        .viewer-3d {
            transform-style: preserve-3d;
            animation: viewerRotate 20s infinite linear;
        }

        #viewer-img {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 20px;
            box-shadow: 0 0 50px var(--accent-3);
            animation: viewerPulse 3s infinite;
        }

        @keyframes viewerRotate {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        @keyframes viewerPulse {
            0%, 100% { box-shadow: 0 0 50px var(--accent-3); }
            50% { box-shadow: 0 0 100px var(--accent-1); }
        }

        /* ===== ADMIN PANEL - CYBERPUNK STYLE ===== */
        #admin-panel {
            position: fixed;
            inset: 0;
            background: rgba(10, 15, 30, 0.98);
            backdrop-filter: blur(20px);
            z-index: 100000;
            display: none;
            overflow-y: auto;
            padding: 40px;
        }

        .admin-cyber {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--glass-bg);
            border: 2px solid var(--accent-2);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 0 50px var(--accent-2);
        }

        .cyber-title {
            font-size: 3rem;
            font-weight: 900;
            font-family: var(--font-display);
            text-align: center;
            margin-bottom: 40px;
            color: transparent;
            -webkit-text-stroke: 2px var(--accent-3);
            text-shadow: 0 0 30px var(--accent-3);
        }

        .cyber-section {
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .cyber-header {
            width: 100%;
            padding: 20px 25px;
            background: none;
            border: none;
            color: white;
            font-weight: 700;
            text-align: right;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cyber-header:hover {
            background: rgba(255,255,255,0.02);
        }

        .cyber-content {
            display: none;
            padding: 25px;
            border-top: 1px solid var(--glass-border);
        }

        input, textarea, select {
            width: 100%;
            padding: 15px 20px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--glass-border);
            border-radius: 15px;
            color: white;
            font-family: var(--font-body);
            transition: all 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--accent-3);
            outline: none;
            box-shadow: 0 0 20px var(--accent-3);
        }

        .cyber-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .cyber-btn-primary {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white;
        }

        .cyber-btn-success {
            background: linear-gradient(135deg, var(--accent-3), #00D4FF);
            color: var(--primary-bg);
        }

        .cyber-btn-danger {
            background: linear-gradient(135deg, #FF3366, #FF6B6B);
            color: white;
        }

        .cyber-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px currentColor;
        }

        /* ===== PROTECTION TOGGLE ===== */
        #protection-toggle {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--accent-3);
            color: var(--accent-3);
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        #protection-toggle.active {
            border-color: var(--accent-1);
            color: var(--accent-1);
        }

        #protection-toggle:hover {
            transform: scale(1.1) rotate(180deg);
        }

        /* ===== HIDDEN TRIGGER ===== */
        #hidden-trigger {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100px;
            height: 100px;
            z-index: 1001;
            cursor: pointer;
            opacity: 0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .main-wrapper {
                padding: 100px 20px 20px;
            }

            .cosmic-nav {
                width: 100%;
                right: -100%;
            }

            .hologrid {
                grid-template-columns: 1fr;
            }

            .hero-title {
                font-size: 3rem;
            }

            .quantum-field {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div class="custom-cursor" id="cursor"></div>

    <!-- Hyperspace Background -->
    <div id="hyperspace"></div>

    <!-- Splash Screen -->
    <div id="splash">
        <div class="splash-3d">
            <div class="splash-logo">BG</div>
        </div>
    </div>

    <!-- Dynamic Header -->
    <header class="dynamic-header">
        <div class="logo-3d" id="site-name-display">بصمة غير</div>
        <div class="menu-toggle" onclick="toggleNav()">
            <i class="fas fa-bolt"></i>
        </div>
    </header>

    <!-- Cosmic Navigation -->
    <nav class="cosmic-nav" id="cosmicNav">
        <div id="navbar"></div>
    </nav>

    <!-- Main Content -->
    <main class="main-wrapper" id="content-area"></main>

    <!-- News Marquee -->
    <div class="marquee-wrapper" id="news-container" style="display: none;">
        <div class="marquee-track" id="news-marquee"></div>
    </div>

    <!-- Partners Marquee -->
    <div class="marquee-wrapper" id="partners-wrapper">
        <div class="marquee-track" id="partners-marquee"></div>
    </div>

    <!-- Image Viewer -->
    <div id="viewer" onclick="closeViewerOnOverlay(event)">
        <div class="viewer-3d">
            <img id="viewer-img" src="">
        </div>
        <div class="viewer-watermark" id="viewer-watermark"></div>
        <button class="viewer-close" onclick="closeViewer()">✕</button>
    </div>

    <!-- Protection Toggle -->
    <button id="protection-toggle" onclick="toggleProtection()">
        <i class="fas fa-shield-alt"></i>
    </button>

    <!-- Hidden Trigger -->

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
            authDomain: "mydecor-b29bd.firebaseapp.com",
            databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mydecor-b29bd",
            storageBucket: "mydecor-b29bd.firebasestorage.app",
            messagingSenderId: "302609299720",
            appId: "1:302609299720:web:e086b600c3ee824acd54bd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const DB_PATH = 'site_v28';

        // ==================== GLOBALS ====================
        let currentData = {};
        let currentTab = 'home';
        let isAdmin = false;
        let userRating = 0;
        let reviewIndex = 0;
        let isProtectionEnabled = true;
        let marqueeSpeed = 15;
        let newsSpeed = 15;

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            initHyperspace();
            initCursor();
            loadData();
        });

        // ==================== CURSOR ====================
        function initCursor() {
            const cursor = document.getElementById('cursor');
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
        }

        // ==================== HYPERSPACE ====================
        function initHyperspace() {
            const container = document.getElementById('hyperspace');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 20 + 's';
                container.appendChild(star);
            }
        }

        // ==================== MARQUEE SPEED CONTROL ====================
        function updateMarqueeSpeed() {
            const speed = document.getElementById('marquee-speed').value;
            marqueeSpeed = speed;
            document.getElementById('speed-value').textContent = speed + 's';
            document.documentElement.style.setProperty('--marquee-speed', speed + 's');
            db.ref(DB_PATH).update({ marquee_speed: speed });
        }

        function updateNewsSpeed() {
            const speed = document.getElementById('news-speed').value;
            newsSpeed = speed;
            document.getElementById('news-speed-value').textContent = speed + 's';
            document.documentElement.style.setProperty('--news-speed', speed + 's');
            db.ref(DB_PATH).update({ news_speed: speed });
        }

        // ==================== LOAD DATA ====================
        function loadData() {
            db.ref(DB_PATH).on('value', snap => {
                currentData = snap.val() || {};
                
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').style.display = 'none', 1000);

                if (currentData.marquee_speed) {
                    marqueeSpeed = currentData.marquee_speed;
                    document.getElementById('marquee-speed').value = marqueeSpeed;
                    document.getElementById('speed-value').textContent = marqueeSpeed + 's';
                }
                
                if (currentData.news_speed) {
                    newsSpeed = currentData.news_speed;
                    document.getElementById('news-speed').value = newsSpeed;
                    document.getElementById('news-speed-value').textContent = newsSpeed + 's';
                }

                renderAll();
                updateAdminLists();
                fillAdminFields();
            });
        }

        // ==================== RENDER FUNCTIONS ====================
        function renderAll() {
            renderNav();
            
            let html = '';
            if (currentTab === 'home') html = renderHome();
            else if (currentTab === 'catalogs') html = renderCatalogs();
            else if (currentTab === 'works') html = renderWorks();
            else if (currentTab.startsWith('alb-')) html = renderAlbum(currentTab.replace('alb-', ''));
            else if (currentData.pages && currentData.pages[currentTab]) html = renderPage(currentTab);
            
            document.getElementById('content-area').innerHTML = html;
            
            renderMarquees();
            startReviewSlider();
        }

        function renderNav() {
            const nav = document.getElementById('navbar');
            let items = '';
            
            items += `<button class="nav-item ${currentTab === 'home' ? 'active' : ''}" onclick="go('home')">الرئيسية</button>`;
            items += `<button class="nav-item ${currentTab === 'catalogs' ? 'active' : ''}" onclick="go('catalogs')">الكتالوج</button>`;
            
            if (currentData.pages) {
                Object.keys(currentData.pages).forEach(id => {
                    items += `<button class="nav-item ${currentTab === id ? 'active' : ''}" onclick="go('${id}')">${currentData.pages[id].title}</button>`;
                });
            }
            
            items += `<button class="nav-item ${currentTab === 'works' ? 'active' : ''}" onclick="go('works')">أعمالنا</button>`;
            
            nav.innerHTML = items;
        }

        function renderHome() {
            const d = currentData;
            
            let reviewsHtml = '';
            if (d.reviews && Object.keys(d.reviews).length) {
                reviewsHtml = '<div class="quantum-card">';
                Object.keys(d.reviews).forEach((id, i) => {
                    const r = d.reviews[id];
                    reviewsHtml += `
                        <div class="review-item" id="review-${i}" style="display: ${i === 0 ? 'block' : 'none'};">
                            <div style="font-size: 2rem; color: var(--accent-3);">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
                            <p style="font-size: 1.2rem; margin: 20px 0;">"${r.message}"</p>
                            <div style="color: var(--accent-1);">— ${r.name}</div>
                        </div>
                    `;
                });
                reviewsHtml += '</div>';
            }

            return `
                <div class="section active">
                    <h1 class="hero-title">
                        <span>بصمة</span>
                        <span>غير</span>
                    </h1>
                    
                    <div class="quantum-card" style="margin-bottom: 40px;">
                        <h2 class="glitch-text" data-text="من نحن">من نحن</h2>
                        <p style="margin-top: 20px;">${d.about_text || 'نحن نصنع المستحيل'}</p>
                    </div>

                    <div class="quantum-card" style="margin-bottom: 40px;">
                        <h2>أضف تقييمك</h2>
                        <input type="text" id="rev-name" placeholder="اسمك">
                        <div style="display: flex; gap: 10px; margin: 20px 0; direction: ltr; font-size: 2rem;">
                            ${[5,4,3,2,1].map(i => `<i class="fas fa-star" onclick="setStar(${i})" style="color: var(--text-tertiary); cursor: pointer;"></i>`).join('')}
                        </div>
                        <textarea id="rev-msg" placeholder="تقييمك" rows="3"></textarea>
                        <button onclick="submitReview()" class="btn-quantum">إرسال</button>
                    </div>

                    ${reviewsHtml}

                    <div class="quantum-card" style="margin-bottom: 40px;">
                        <h2>كيف نعمل</h2>
                        <div class="quantum-field">
                            <div class="time-particle">
                                <i class="fas fa-comments"></i>
                                <h3>الاستشارة</h3>
                                <p>نستمع لأفكارك</p>
                            </div>
                            <div class="time-particle">
                                <i class="fas fa-ruler-combined"></i>
                                <h3>المعاينة</h3>
                                <p>نزور الموقع</p>
                            </div>
                            <div class="time-particle">
                                <i class="fas fa-pencil-ruler"></i>
                                <h3>التصميم</h3>
                                <p>نبتكر التصاميم</p>
                            </div>
                            <div class="time-particle">
                                <i class="fas fa-hammer"></i>
                                <h3>التنفيذ</h3>
                                <p>نحولها لواقع</p>
                            </div>
                        </div>
                    </div>

                    <div class="quantum-card" style="margin-bottom: 40px;">
                        <h2>أوقات العمل</h2>
                        ${getScheduleHtml(d)}
                        <div id="status-container" class="status-pulse"></div>
                    </div>

                    ${d.location_url ? `
                        <div class="quantum-card">
                            <h2>موقعنا</h2>
                            <button onclick="window.open('${d.location_url}')" class="btn-quantum">
                                <i class="fas fa-map-marker-alt"></i> افتح الخريطة
                            </button>
                        </div>
                    ` : ''}

                    <div style="text-align: center; margin: 60px 0;">
                        <button onclick="whatsappGlobal()" class="btn-quantum" style="font-size: 1.5rem; padding: 25px 60px;">
                            <i class="fab fa-whatsapp"></i> تواصل معنا
                        </button>
                        <div style="display: flex; gap: 20px; justify-content: center; margin-top: 30px;">
                            ${d.insta_url ? `<a href="${d.insta_url}" class="social-link"><i class="fab fa-instagram"></i></a>` : ''}
                            ${d.tiktok_url ? `<a href="${d.tiktok_url}" class="social-link"><i class="fab fa-tiktok"></i></a>` : ''}
                            ${d.snap_url ? `<a href="${d.snap_url}" class="social-link"><i class="fab fa-snapchat"></i></a>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function getScheduleHtml(d) {
            if (!d.work_schedule) return '<p>لا توجد مواعيد</p>';
            
            const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            let html = '<div class="quantum-field">';
            
            for (let i = 0; i < 7; i++) {
                const s = d.work_schedule[i];
                if (s && s.active) {
                    html += `
                        <div class="time-particle">
                            <h3>${days[i]}</h3>
                            <p>${s.s1_s} - ${s.s1_e}</p>
                            ${s.s2_a ? `<p>${s.s2_s} - ${s.s2_e}</p>` : ''}
                        </div>
                    `;
                }
            }
            html += '</div>';
            return html;
        }

        function renderCatalogs() {
            if (!currentData.catalogs) {
                return '<div class="section active"><p>قريباً...</p></div>';
            }

            const items = Object.keys(currentData.catalogs).map(id => `
                <div class="holo-card" onclick="openCat('${id}')">
                    <div class="card-glitch"></div>
                    <div style="padding: 60px 30px; text-align: center;">
                        <i class="fas fa-book-open" style="font-size: 4rem; color: var(--accent-3); margin-bottom: 20px;"></i>
                        <h3 style="font-size: 2rem;">${currentData.catalogs[id].name}</h3>
                    </div>
                </div>
            `).join('');

            return `
                <div class="section active">
                    <h1 class="hero-title"><span>الكتالوج</span></h1>
                    <div class="hologrid">${items}</div>
                </div>
            `;
        }

        function renderWorks() {
            if (!currentData.albums) {
                return '<div class="section active"><p>قريباً...</p></div>';
            }

            const items = Object.keys(currentData.albums).map(id => `
                <div class="holo-card" onclick="go('alb-${id}')">
                    <div class="card-glitch"></div>
                    <div style="padding: 60px 30px; text-align: center;">
                        <i class="fas fa-folder-open" style="font-size: 4rem; color: var(--accent-1); margin-bottom: 20px;"></i>
                        <h3 style="font-size: 2rem;">${currentData.albums[id].name}</h3>
                    </div>
                </div>
            `).join('');

            return `
                <div class="section active">
                    <h1 class="hero-title"><span>أعمالنا</span></h1>
                    <div class="hologrid">${items}</div>
                </div>
            `;
        }

        function renderAlbum(id) {
            const album = currentData.albums[id];
            if (!album || !album.imgs) return '<div class="section active"><p>لا توجد صور</p></div>';

            const items = Object.keys(album.imgs).reverse().map(imgId => `
                <div class="holo-card" onclick="openImg('${album.imgs[imgId].url}')">
                    <div class="card-glitch"></div>
                    <div class="card-media">
                        <img src="${album.imgs[imgId].url}" loading="lazy">
                    </div>
                    <div class="card-content">
                        <button onclick="event.stopPropagation(); whatsappOrder('${album.imgs[imgId].url}')" class="btn-quantum" style="width: 100%;">
                            <i class="fab fa-whatsapp"></i> استفسار
                        </button>
                    </div>
                </div>
            `).join('');

            return `
                <div class="section active">
                    <button onclick="go('works')" class="btn-quantum" style="margin-bottom: 30px;">
                        <i class="fas fa-arrow-right"></i> عودة
                    </button>
                    <h1 class="hero-title"><span>${album.name}</span></h1>
                    <div class="hologrid">${items}</div>
                </div>
            `;
        }

        function renderPage(id) {
            const page = currentData.pages[id];
            if (!page || !page.imgs) return '<div class="section active"><p>لا توجد صور</p></div>';

            const items = Object.keys(page.imgs).reverse().map(imgId => `
                <div class="holo-card" onclick="openImg('${page.imgs[imgId].url}')">
                    <div class="card-glitch"></div>
                    <div class="card-media">
                        <img src="${page.imgs[imgId].url}" loading="lazy">
                    </div>
                    <div class="card-content">
                        <button onclick="event.stopPropagation(); whatsappOrder('${page.imgs[imgId].url}')" class="btn-quantum" style="width: 100%;">
                            <i class="fab fa-whatsapp"></i> استفسار
                        </button>
                    </div>
                </div>
            `).join('');

            return `
                <div class="section active">
                    <h1 class="hero-title"><span>${page.title}</span></h1>
                    <div class="hologrid">${items}</div>
                </div>
            `;
        }

        function renderMarquees() {
            // Partners marquee
            if (currentData.partners) {
                const partnersTrack = document.getElementById('partners-marquee');
                let items = '';
                Object.keys(currentData.partners).forEach(id => {
                    items += `
                        <div class="marquee-item">
                            <img src="${currentData.partners[id].url}" alt="partner">
                        </div>
                    `;
                });
                items += items; // Double for seamless loop
                partnersTrack.innerHTML = items;
                partnersTrack.style.animationDuration = marqueeSpeed + 's';
            }

            // News marquee
            if (currentData.news_bar) {
                document.getElementById('news-container').style.display = 'block';
                const newsTrack = document.getElementById('news-marquee');
                newsTrack.innerHTML = `
                    <div class="marquee-item">
                        <i class="fas fa-bolt"></i>
                        <span>${currentData.news_bar}</span>
                    </div>
                ` + `
                    <div class="marquee-item">
                        <i class="fas fa-bolt"></i>
                        <span>${currentData.news_bar}</span>
                    </div>
                `;
                newsTrack.style.animationDuration = newsSpeed + 's';
            }
        }

        // ==================== UTILITIES ====================
        function toggleNav() {
            document.getElementById('cosmicNav').classList.toggle('active');
        }

        function go(tab) {
            currentTab = tab;
            renderAll();
            toggleNav();
            window.scrollTo(0, 0);
        }

        function setStar(rating) {
            userRating = rating;
            const stars = document.querySelectorAll('.fa-star');
            stars.forEach((s, i) => {
                s.style.color = i < 5 - rating ? 'var(--accent-3)' : 'var(--text-tertiary)';
            });
        }

        function submitReview() {
            const name = document.getElementById('rev-name').value;
            const msg = document.getElementById('rev-msg').value;
            
            if (!name || !msg || !userRating) {
                alert('أكمل جميع الحقول');
                return;
            }

            db.ref(DB_PATH + '/reviews').push({ name, message: msg, rating: userRating }).then(() => {
                alert('شكراً لك!');
                location.reload();
            });
        }

        function startReviewSlider() {
            const items = document.querySelectorAll('.review-item');
            if (!items.length) return;
            
            setInterval(() => {
                items.forEach(i => i.style.display = 'none');
                items[reviewIndex].style.display = 'block';
                reviewIndex = (reviewIndex + 1) % items.length;
            }, 5000);
        }

        function whatsappGlobal() {
            window.open(`https://wa.me/${currentData.whatsapp_num}`, '_blank');
        }

        function whatsappOrder(url) {
            window.open(`https://wa.me/${currentData.whatsapp_num}?text=${encodeURIComponent('استفسار عن: ' + url)}`, '_blank');
        }

        function openCat(id) {
            document.getElementById('cat-frame').innerHTML = currentData.catalogs[id].code;
            document.getElementById('cat-overlay').style.display = 'flex';
        }

        function openImg(url) {
            document.getElementById('viewer-img').src = url;
            document.getElementById('viewer-watermark').textContent = currentData.wm_text || '';
            document.getElementById('viewer').style.display = 'flex';
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
        }

        function closeViewerOnOverlay(e) {
            if (e.target.id === 'viewer') closeViewer();
        }

        // ==================== ACCESS ====================
        function checkAccess() {
            const input = prompt('رمز الدخول:');
            if (input === currentData.in || input === 'admin123') {
                isAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('protection-toggle').style.display = 'flex';
            }
        }

        function toggleProtection() {
            isProtectionEnabled = !isProtectionEnabled;
            const btn = document.getElementById('protection-toggle');
            if (isProtectionEnabled) {
                btn.classList.remove('active');
                btn.innerHTML = '<i class="fas fa-shield-alt"></i>';
            } else {
                btn.classList.add('active');
                btn.innerHTML = '<i class="fas fa-shield-slash"></i>';
            }
        }

        // ==================== ADMIN FUNCTIONS ====================
        function toggleAdminSection(id) {
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function setTheme(theme) {
            const root = document.documentElement;
            if (theme === 'default') {
                root.style.setProperty('--accent-1', '#FF3366');
                root.style.setProperty('--accent-2', '#6C47FF');
                root.style.setProperty('--accent-3', '#00F5A0');
            } else if (theme === 'cyber') {
                root.style.setProperty('--accent-1', '#00ffff');
                root.style.setProperty('--accent-2', '#ff00ff');
                root.style.setProperty('--accent-3', '#ffff00');
            } else if (theme === 'nature') {
                root.style.setProperty('--accent-1', '#4CAF50');
                root.style.setProperty('--accent-2', '#8BC34A');
                root.style.setProperty('--accent-3', '#CDDC39');
            }
        }

            const title = document.getElementById('admin-partners-title').value;
            db.ref(DB_PATH).update({ partners_title: title });
        }

        function addPartner() {
            const url = document.getElementById('new-partner-url').value;
            if (url) db.ref(DB_PATH + '/partners').push({ url });
        }

        function addCatalog() {
            const name = document.getElementById('new-cat-name').value;
            const code = document.getElementById('new-cat-code').value;
            if (name && code) db.ref(DB_PATH + '/catalogs').push({ name, code });
        }

        function saveAbout() {
            const text = document.getElementById('editor-about').innerHTML;
            const active = document.getElementById('in-about-active').checked;
            db.ref(DB_PATH).update({ about_text: text, about_active: active });
        }

        function saveSocial() {
            db.ref(DB_PATH).update({
                insta_url: document.getElementById('in-insta').value,
                tiktok_url: document.getElementById('in-tiktok').value,
                snap_url: document.getElementById('in-snap').value,
                location_url: document.getElementById('in-loc').value
            });
        }

        function saveSettings() {
            db.ref(DB_PATH).update({
                site_name: document.getElementById('in-name').value,
                whatsapp_num: document.getElementById('in-wa').value,
                wm_text: document.getElementById('in-wm').value,
                news_bar: document.getElementById('in-news').value,
                footer_text: document.getElementById('in-footer').value
            });
        }

        function saveMaintenanceSettings() {
            db.ref(DB_PATH).update({
                maintenance_mode: document.getElementById('in-maintenance').checked,
                maintenance_title: document.getElementById('in-maintenance-title').value,
                maintenance_message: document.getElementById('in-maintenance-message').value,

            });

        function addSec() {
            const name = document.getElementById('new-sec-in').value;
            if (name) db.ref(DB_PATH + '/pages').push({ title: name });
        }

        function addAlbum() {
            const name = document.getElementById('new-alb-in').value;
            if (name) db.ref(DB_PATH + '/albums').push({ name });
        }

        function publishPhotos() {
            const target = document.getElementById('upload-target-sel').value;
            const urls = document.getElementById('links-in').value.split('\n').filter(u => u.trim());
            if (!target || !urls.length) return;
            
            urls.forEach(url => {
                db.ref(DB_PATH + '/' + target + '/imgs').push({ url: url.trim() });
            });
        }

            if (confirm('تأكيد؟')) {
                db.ref(DB_PATH + '/' + path + '/imgs/' + id).remove();
            }

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>بصمة غير | ديكور فاخر وتصميم داخلي</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/CsmG3G7r/1.png">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: auto; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #ffffff;
            color: #2d2a2a;
            line-height: 1.5;
        }
        :root {
            --primary: #c8a165;
            --primary-dark: #a47e44;
            --primary-light: #f8f1e6;
            --gray: #6f6a64;
            --white: #ffffff;
            --shadow: 0 8px 25px rgba(0,0,0,0.05);
            --shadow-hover: 0 15px 35px rgba(0,0,0,0.1);
        }
        /* شاشة بداية */
        #splash {
            position: fixed;
            inset: 0;
            background-color: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        .splash-media {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .splash-skip {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            backdrop-filter: blur(4px);
        }
        /* الهيدر وباقي الأنماط (ثابتة) */
        .header {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo h1 {
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: clamp(1rem, 3vw, 1.8rem);
            flex-wrap: wrap;
        }
        .nav-links a {
            text-decoration: none;
            font-weight: 600;
            color: #333;
            transition: 0.2s;
            cursor: pointer;
            font-size: clamp(0.85rem, 3vw, 1rem);
        }
        .nav-links a:hover { color: var(--primary); }
        .partners-marquee {
            background: #fdf7ef;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            overflow: hidden;
            white-space: nowrap;
        }
        .marquee-track {
            display: inline-flex;
            gap: 40px;
            animation: marqueeFlow 35s linear infinite;
        }
        .marquee-track:hover { animation-play-state: paused; }
        @keyframes marqueeFlow {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .partner-item {
            background: white;
            border-radius: 60px;
            padding: 5px 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid rgba(201,169,110,0.3);
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .partner-item:hover { transform: translateY(-3px); border-color: var(--primary); }
        .partner-logo { height: 45px; max-width: 120px; object-fit: contain; }
        @media (max-width: 700px) { .partner-logo { height: 35px; max-width: 80px; } .partner-item { padding: 3px 15px; } }
        .hero {
            background: linear-gradient(135deg, #fef9f0, #fffaf5);
            padding: clamp(2rem, 8vw, 5rem) 20px;
            text-align: center;
        }
        .hero h1 { font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 800; color: var(--primary-dark); margin-bottom: 1rem; }
        .hero p { font-size: clamp(1rem, 4vw, 1.2rem); color: #5a5a5a; max-width: 700px; margin: 0 auto 2rem; }
        .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 0.7rem 1.5rem; border-radius: 60px; font-weight: 600; text-decoration: none; transition: 0.2s; font-size: clamp(0.8rem, 3vw, 1rem); }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-3px); }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: var(--primary); color: white; }
        .section { padding: clamp(2rem, 6vw, 4rem) 0; }
        .section-title { font-size: clamp(1.5rem, 5vw, 2rem); font-weight: 700; text-align: center; margin-bottom: 2rem; color: var(--primary-dark); position: relative; }
        .section-title::after { content: ''; display: block; width: 70px; height: 3px; background: var(--primary); margin: 0.5rem auto 0; }
        .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2rem; }
        .card { background: var(--white); border-radius: 28px; overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; cursor: pointer; text-align: center; }
        .card:hover { transform: translateY(-8px); box-shadow: var(--shadow-hover); }
        .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card-body { padding: 1.2rem; }
        .card-title { font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); }
        .product-card { background: var(--white); border-radius: 28px; overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
        .product-img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .product-info { padding: 1rem; text-align: center; }
        .whatsapp-order { background: #25D366; color: white; border: none; width: 100%; padding: 10px; border-radius: 50px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .whatsapp-order:hover { background: #1da15a; }
        .testimonial-card { background: var(--white); border-radius: 28px; padding: 1.5rem; box-shadow: var(--shadow); }
        .testimonial-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .testimonial-avatar { width: 50px; height: 50px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: var(--primary); }
        .stars { color: #f5b042; margin-top: 4px; letter-spacing: 2px; }
        .review-form { background: var(--white); border-radius: 28px; padding: 1.5rem; box-shadow: var(--shadow); margin-top: 2rem; }
        .review-form input, .review-form textarea { width: 100%; padding: 12px 16px; border: 1px solid #eee; border-radius: 60px; margin-bottom: 1rem; font-family: inherit; font-size: 0.9rem; }
        .review-form textarea { border-radius: 20px; resize: vertical; }
        .star-rating { display: flex; gap: 8px; justify-content: center; margin-bottom: 1rem; flex-direction: row-reverse; }
        .star-rating i { font-size: 1.6rem; color: #ddd; cursor: pointer; transition: 0.1s; }
        .star-rating i.active, .star-rating i:hover { color: var(--primary); }
        .footer { background: #1e1e1e; color: #ccc; padding: 3rem 0 1rem; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 2rem; }
        .footer h4 { color: var(--primary); margin-bottom: 1rem; }
        .schedule-item { margin-bottom: 0.8rem; }
        .social-icons { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .social-icons a { background: #333; width: 36px; height: 36px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; transition: 0.2s; }
        .social-icons a:hover { background: var(--primary); }
        .copyright { text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #333; }
        /* ========== عارض الصورة النهائي (زوم دقيق، سحب مريح) ========== */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .lightbox-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .lightbox-image-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .lightbox-img {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            transform-origin: center center;
            transition: none; /* نمنع الترانزستور ليكون السحب سلساً */
            cursor: grab;
            user-select: none;
            -webkit-user-drag: none;
        }
        .lightbox-img:active {
            cursor: grabbing;
        }
        .lightbox-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 2.2rem;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2001;
            transition: 0.2s;
        }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 1.8rem;
            padding: 8px 15px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2001;
        }
        .lightbox-nav:hover, .lightbox-close:hover {
            background: rgba(0,0,0,0.8);
            transform: scale(1.05);
        }
        @media (max-width: 700px) {
            .lightbox-nav { font-size: 1.5rem; padding: 6px 12px; }
            .lightbox-close { font-size: 1.3rem; top: 15px; right: 15px; }
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e1e;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            z-index: 2001;
            display: none;
        }
        .empty-state { text-align: center; padding: 2rem; color: var(--gray); }
        @media (max-width: 700px) {
            .grid-auto { gap: 1.5rem; }
            .toast { white-space: normal; width: 80%; text-align: center; }
            .nav-bar { flex-direction: column; text-align: center; }
            .nav-links { justify-content: center; }
        }
    </style>
</head>
<body>

<div id="splash"></div>

<header class="header">
    <div class="container">
        <div class="nav-bar">
            <div class="logo"><h1 id="siteTitle">بصمة غير</h1></div>
            <div class="nav-links">
                <a data-page="home">الرئيسية</a>
                <a data-page="store">المتجر</a>
                <a data-page="works">أعمالنا</a>
                <a data-page="catalogs">الكتالوجات</a>
                <a data-page="contact">اتصل بنا</a>
            </div>
        </div>

</header>

<div class="partners-marquee" id="partnersMarquee" style="display:none;">
    <div class="marquee-track" id="marqueeTrack"></div>
</div>

<main id="mainContent"></main>

<footer class="footer">
    <div class="container">
        <div class="footer-grid">
            <div><h4>بصمة غير</h4><p>تصاميم داخلية وخارجية فاخرة ومنتجات ديكور راقية.</p><div class="social-icons" id="socialIcons"></div></div>
            <div><h4>أوقات العمل</h4><div id="footerHours"></div></div>
            <div><h4>تواصل معنا</h4><p><i class="fas fa-phone"></i> <span id="footerPhone"></span></p><p><i class="fab fa-whatsapp"></i> <span id="footerWhatsapp"></span></p><p><i class="fas fa-map-marker-alt"></i> <span id="footerLocation"></span></p></div>
        </div>
        <div class="copyright" id="footerCopyright">© 2025 بصمة غير - جميع الحقوق محفوظة</div>
    </div>
</footer>

<!-- عارض الصورة المطور جداً -->
<div id="lightbox" class="lightbox">
    <div class="lightbox-container">
        <div class="lightbox-image-wrapper">
            <img id="lightboxImg" class="lightbox-img" draggable="false">
        </div>
    </div>
    <div id="lightboxPrev" class="lightbox-nav lightbox-prev"><i class="fas fa-chevron-right"></i></div>
    <div id="lightboxNext" class="lightbox-nav lightbox-next"><i class="fas fa-chevron-left"></i></div>
    <div id="lightboxClose" class="lightbox-close"><i class="fas fa-times"></i></div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let currentPage = 'home';
    let currentImageList = [];
    let currentIndex = 0;

    // ========== عارض صور فائق الدقة والثبات ==========
    const imgElement = document.getElementById('lightboxImg');
    const lightbox = document.getElementById('lightbox');
    
    // حالة التكبير/السحب
    let scale = 1;
    let translateX = 0, translateY = 0;
    let startX = 0, startY = 0;
    let startScale = 1, startTranslateX = 0, startTranslateY = 0;
    let initialPinchDist = 0;
    let pinchCenterX = 0, pinchCenterY = 0;
    let isPanning = false;
    let isPinching = false;

    function setTransform() {
        imgElement.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    function resetTransform() {
        scale = 1;
        translateX = 0;
        translateY = 0;
        setTransform();
    }

    // منع تجاوز حدود الصورة عن الإطار
    function clampMovement() {
        const containerRect = imgElement.parentElement.getBoundingClientRect();
        const imgRect = imgElement.getBoundingClientRect();
        const maxX = Math.max(0, (imgRect.width * scale - containerRect.width) / 2);
        const maxY = Math.max(0, (imgRect.height * scale - containerRect.height) / 2);
        translateX = Math.min(Math.max(translateX, -maxX), maxX);
        translateY = Math.min(Math.max(translateY, -maxY), maxY);
        setTransform();
    }

    // === أحداث الفأرة (للحاسوب) ===
    function onMouseDown(e) {
        if (scale <= 1) return;
        e.preventDefault();
        isPanning = true;
        startX = e.clientX - translateX;
        startY = e.clientY - translateY;
        imgElement.style.cursor = 'grabbing';
    }
    function onMouseMove(e) {
        if (!isPanning) return;
        translateX = e.clientX - startX;
        translateY = e.clientY - startY;
        clampMovement();
    }
    function onMouseUp() {
        isPanning = false;
        imgElement.style.cursor = 'grab';
    }

    // === أحداث اللمس (للجوال) ===
    function getDistance(touches) {
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.hypot(dx, dy);
    }
    function onTouchStart(e) {
        if (e.touches.length === 2) {
            e.preventDefault();
            initialPinchDist = getDistance(e.touches);
            startScale = scale;
            // مركز التكبير
            pinchCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            pinchCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            startTranslateX = translateX;
            startTranslateY = translateY;
            isPinching = true;
        } else if (e.touches.length === 1 && scale > 1) {
            isPanning = true;
            startX = e.touches[0].clientX - translateX;
            startY = e.touches[0].clientY - translateY;
        }
    }
    function onTouchMove(e) {
        if (e.touches.length === 2 && initialPinchDist > 0) {
            e.preventDefault();
            const newDist = getDistance(e.touches);
            let newScale = startScale * (newDist / initialPinchDist);
            newScale = Math.min(4, Math.max(1, newScale));
            if (newScale !== scale) {
                // حساب الإزاحة بناءً على مركز التكبير
                const rect = imgElement.getBoundingClientRect();
                const offsetX = pinchCenterX - rect.left;
                const offsetY = pinchCenterY - rect.top;
                const ratio = newScale / scale;
                const newTranslateX = pinchCenterX - rect.left - (offsetX - translateX) * ratio;
                const newTranslateY = pinchCenterY - rect.top - (offsetY - translateY) * ratio;
                scale = newScale;
                translateX = newTranslateX;
                translateY = newTranslateY;
                clampMovement();
            }
        } else if (e.touches.length === 1 && isPanning && scale > 1) {
            e.preventDefault();
            translateX = e.touches[0].clientX - startX;
            translateY = e.touches[0].clientY - startY;
            clampMovement();
        }
    }
    function onTouchEnd(e) {
        if (e.touches.length < 2) initialPinchDist = 0;
        if (e.touches.length === 0) {
            isPanning = false;
            isPinching = false;
        }
    }

    // === تكبير بالماوس (عجلة) دقيق حول المؤشر ===
    function onWheel(e) {
        e.preventDefault();
        // حساسية مخففة: 0.1 لكل نقرة عجلة
        let delta = e.deltaY > 0 ? -0.08 : 0.08;
        let newScale = scale + delta;
        newScale = Math.min(4, Math.max(1, newScale));
        if (newScale === scale) return;
        
        // مركز التكبير هو مكان المؤشر
        const rect = imgElement.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const ratio = newScale / scale;
        const newTranslateX = e.clientX - rect.left - (mouseX - translateX) * ratio;
        const newTranslateY = e.clientY - rect.top - (mouseY - translateY) * ratio;
        scale = newScale;
        translateX = newTranslateX;
        translateY = newTranslateY;
        clampMovement();
    }

    function bindLightboxEvents() {
        imgElement.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        imgElement.addEventListener('touchstart', onTouchStart, { passive: false });
        imgElement.addEventListener('touchmove', onTouchMove, { passive: false });
        imgElement.addEventListener('touchend', onTouchEnd);
        imgElement.addEventListener('wheel', onWheel, { passive: false });
        imgElement.style.cursor = 'grab';
    }
    function unbindLightboxEvents() {
        imgElement.removeEventListener('mousedown', onMouseDown);
        window.removeEventListener('mousemove', onMouseMove);
        window.removeEventListener('mouseup', onMouseUp);
        imgElement.removeEventListener('touchstart', onTouchStart);
        imgElement.removeEventListener('touchmove', onTouchMove);
        imgElement.removeEventListener('touchend', onTouchEnd);
        imgElement.removeEventListener('wheel', onWheel);
    }

    function openLightbox(images, index) {
        if (!images.length) return;
        currentImageList = images;
        currentIndex = index;
        imgElement.src = images[index];
        resetTransform();
        lightbox.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        bindLightboxEvents();
    }
    function closeLightbox() {
        lightbox.style.display = 'none';
        document.body.style.overflow = '';
        currentImageList = [];
        unbindLightboxEvents();
    }
    function nextImage() {
        if (!currentImageList.length) return;
        currentIndex = (currentIndex + 1) % currentImageList.length;
        imgElement.src = currentImageList[currentIndex];
        resetTransform();
    }
    function prevImage() {
        if (!currentImageList.length) return;
        currentIndex = (currentIndex - 1 + currentImageList.length) % currentImageList.length;
        imgElement.src = currentImageList[currentIndex];
        resetTransform();
    }

    // ربط الأزرار
    document.getElementById('lightboxPrev').onclick = () => nextImage();
    document.getElementById('lightboxNext').onclick = () => prevImage();
    document.getElementById('lightboxClose').onclick = () => closeLightbox();
    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
    });

    // دوال ربط الصور من الألبومات والمنتجات
    function openAlbum(id) {
        const alb = currentData.albums?.[id];
        if (!alb || !alb.imgs) { showToast('لا توجد صور'); return; }
        const urls = Object.values(alb.imgs).map(i => i.url).filter(u => u);
        if (urls.length) openLightbox(urls, 0);
        else showToast('لا توجد صور صالحة');
    }
    function openProductImages(list, index) {
        if (list.length) openLightbox(list, index);
    }

    // ========== دوال Firebase الأساسية (أوقات العمل، الشركاء، المحتوى) ==========
    function showToast(msg) {
        const t = document.getElementById('toastMsg');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }
    function formatTime12(t) {
        if (!t) return '';
        let [h, m] = t.split(':');
        h = parseInt(h);
        return `${h % 12 || 12}:${m} ${h >= 12 ? 'م' : 'ص'}`;
    }
    function getGroupedScheduleHtml(d) {
        if (!d.work_schedule) return '<p>لم تحدد المواعيد</p>';
        const days = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
        const order = [6,0,1,2,3,4,5];
        let groups = [], off = [];
        order.forEach(jsDay => {
            const s = d.work_schedule[jsDay];
            if (s && s.active) {
                const key = `${s.s1_s}-${s.s1_e}-${s.s2_a}`;
                let g = groups.find(g => g.key === key);
                if (g) g.days.push(days[jsDay]);
                else groups.push({ key, days: [days[jsDay]], data: s });
            } else off.push(days[jsDay]);
        });
        let html = '';
        groups.forEach(g => {
            const dTxt = g.days.length === 1 ? g.days[0] : `من ${g.days[0]} إلى ${g.days[g.days.length-1]}`;
            html += `<div class="schedule-item"><strong>${dTxt}</strong><br>${formatTime12(g.data.s1_s)} - ${formatTime12(g.data.s1_e)}`;
            if (g.data.s2_a) html += `<br>${formatTime12(g.data.s2_s)} - ${formatTime12(g.data.s2_e)}`;
            html += `</div>`;
        });
        if (off.length) html += `<div class="schedule-item"><strong>عطلة:</strong> ${off.join('، ')}</div>`;
        return html;
    }

    function setupStarRating() {
        let selected = 0;
        const stars = document.querySelectorAll('#starRating i');
        stars.forEach(s => {
            s.onclick = () => {
                selected = parseInt(s.dataset.star);
                stars.forEach(st => st.classList.remove('active'));
                for (let i = stars.length - 1; i >= stars.length - selected; i--) stars[i]?.classList.add('active');
            };
        });
        window.submitReview = () => {
            const name = document.getElementById('reviewName')?.value;
            const msg = document.getElementById('reviewMsg')?.value;
            if (!name || !msg || !selected) { showToast('أكمل البيانات'); return; }
            db.ref(DB_PATH + '/reviews').push({ name, message: msg, rating: selected }).then(() => {
                showToast('شكراً');
                document.getElementById('reviewName').value = '';
                document.getElementById('reviewMsg').value = '';
                stars.forEach(st => st.classList.remove('active'));
                selected = 0;
                loadPage();
            });
        };

    function attachNavEvents() {

    function renderContactPage() {

        return `<div class="container section"><h2 class="section-title">اتصل بنا</h2><div style="display:flex; justify-content:center; gap:2rem; flex-wrap:wrap; text-align:center;"><a href="tel:0541780995" style="text-decoration:none; color:inherit;"><div><i class="fas fa-phone fa-2x" style="color:var(--primary);"></i><p>0541780995</p></div></a><a href="https://wa.me/${d.whatsapp_num || '966500000000'}" target="_blank"><div><i class="fab fa-whatsapp fa-2x" style="color:#25D366;"></i><p>واتساب</p></div></a>${d.insta_url ? `<a href="${d.insta_url}" target="_blank"><div><i class="fab fa-instagram fa-2x" style="color:var(--primary);"></i><p>انستقرام</p></div></a>` : ''}${d.tiktok_url ? `<a href="${d.tiktok_url}" target="_blank"><div><i class="fab fa-tiktok fa-2x" style="color:var(--primary);"></i><p>تيك توك</p></div></a>` : ''}${d.snap_url ? `<a href="${d.snap_url}" target="_blank"><div><i class="fab fa-snapchat fa-2x" style="color:var(--primary);"></i><p>سناب</p></div></a>` : ''}<a href="${d.location_url || '#'}" target="_blank"><div><i class="fas fa-map-marker-alt fa-2x" style="color:var(--primary);"></i><p>موقعنا</p></div></a></div></div>`;

    function loadPage() {
        const main = document.getElementById('mainContent');
        if (currentPage === 'home') {
            main.innerHTML = renderHomePage();

            buildPortfolio();
            buildCatalogsHome();
            buildTestimonials();

            buildAllProductsGrid();

            main.innerHTML = renderWorksPage();
            buildWorksGrid();
        } else if (currentPage === 'catalogs') {
            main.innerHTML = renderCatalogsPage();

            main.innerHTML = renderContactPage();

        updateFooterData();
        attachNavEvents();

    let splashTimeout;
    function showSplash(settings) {
        const splashDiv = document.getElementById('splash');
        if (!splashDiv) return;
        splashDiv.innerHTML = '';
        if (!settings.enabled) { splashDiv.style.display = 'none'; return; }
        const mediaType = settings.type || 'image';
        const mediaUrl = settings.media_url;
        const videoUrl = settings.video_url;
        const duration = (settings.duration || 5) * 1000;
        const showSkip = settings.show_skip === true;
        let media;
        if (mediaType === 'video' && (videoUrl || mediaUrl)) {
            const vid = document.createElement('video');
            vid.autoplay = true; vid.muted = true; vid.loop = false; vid.playsInline = true;
            vid.className = 'splash-media';
            const src = document.createElement('source');
            src.src = videoUrl || mediaUrl; src.type = 'video/mp4';
            vid.appendChild(src); media = vid;
        } else {
            const img = document.createElement('img');
            img.src = mediaUrl || ''; img.className = 'splash-media'; img.alt = 'Splash';
            media = img;
        }
        splashDiv.appendChild(media);
        if (showSkip) {
            const btn = document.createElement('button');
            btn.innerText = 'تخطي ←'; btn.className = 'splash-skip';
            btn.onclick = () => { clearTimeout(splashTimeout); splashDiv.style.opacity = '0'; setTimeout(() => splashDiv.style.display = 'none', 500); };
            splashDiv.appendChild(btn);
        }
        splashDiv.style.display = 'flex';
        splashDiv.style.opacity = '1';
        if (splashTimeout) clearTimeout(splashTimeout);
        splashTimeout = setTimeout(() => {
            splashDiv.style.opacity = '0';
            setTimeout(() => splashDiv.style.display = 'none', 500);
        }, duration);
    }
    db.ref(DB_PATH).once('value', snap => {
        currentData = snap.val() || {};
        showSplash({
            enabled: currentData.splash_enabled !== false,
            type: currentData.splash_type || 'image',
            media_url: currentData.splash_media_url || '',
            video_url: currentData.splash_video_url || '',
            duration: currentData.splash_duration || 5,
            show_skip: currentData.splash_show_skip === true
        });
        renderPartnersMarquee();
        loadPage();
    });
    db.ref(DB_PATH).on('value', snap => {
        currentData = snap.val() || {};

            loadPage();

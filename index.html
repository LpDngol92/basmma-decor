<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>بصمة غير للديكور | تصميم داخلي فاخر</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: #fafafc; color: #1c1c1e; overflow-x: hidden; }
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f8f9fa; --bg-card: #ffffff;
            --text-primary: #1c1c1e; --text-secondary: #6c6c70;
            --accent: #c9a96e; --accent-dark: #b48c48;
            --border: #e9ecef; --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --success: #28a745; --danger: #dc3545; --whatsapp: #25D366;
        }
        #splash { position: fixed; inset: 0; background: #fff; z-index: 999999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; transition: opacity 0.5s; }
        .splash-logo { font-size: 3rem; font-weight: 900; color: var(--accent); animation: pulse 1.2s infinite alternate; }
        .splash-line { width: 60px; height: 2px; background: var(--accent); animation: grow 1.2s infinite alternate; }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1.02); } }
        @keyframes grow { 0% { width: 40px; } 100% { width: 100px; } }
        #maintenance-screen { position: fixed; inset: 0; background: var(--bg-primary); z-index: 999998; display: none; align-items: center; justify-content: center; text-align: center; }
        .maintenance-content { padding: 40px; background: var(--bg-card); border-radius: 24px; max-width: 90%; }
        .top-nav { position: sticky; top: 0; background: rgba(255,255,255,0.98); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 1000; }
        .logo-section { padding: 12px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo-section h1 { font-size: 1.5rem; font-weight: 800; color: var(--accent-dark); }
        .logo-section p { font-size: 0.75rem; color: var(--text-secondary); }
        .partners-marquee { background: var(--bg-secondary); padding: 10px 0; overflow: hidden; border-bottom: 1px solid var(--border); }
        .marquee-track { display: flex; animation: marqueeScroll 25s linear infinite; width: fit-content; }
        .partner-logo { height: 40px; margin: 0 20px; object-fit: contain; cursor: pointer; }
        @keyframes marqueeScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .tabs-wrapper { position: relative; border-bottom: 1px solid var(--border); background: var(--bg-primary); overflow: hidden; }
        .tabs-section { display: flex; gap: 8px; overflow-x: auto; padding: 8px 16px; scrollbar-width: none; scroll-behavior: smooth; }
        .tabs-section::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 10px 20px; background: none; border: none; font-weight: 600; font-size: 0.9rem; color: var(--text-secondary); border-radius: 30px; cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0; }
        .tab-btn.active { background: var(--accent); color: white; }
        .popup-bubble { position: fixed; bottom: 30px; right: 20px; left: 20px; max-width: 350px; background: var(--bg-card); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 10000; display: none; animation: slideUp 0.3s ease; border-right: 4px solid var(--accent); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        .bubble-content { padding: 16px; display: flex; gap: 12px; align-items: center; }
        .bubble-icon { width: 45px; height: 45px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem; flex-shrink: 0; }
        .bubble-text { flex: 1; font-size: 0.9rem; color: var(--text-primary); line-height: 1.5; }
        .bubble-close { background: none; border: none; font-size: 1.2rem; color: var(--text-secondary); cursor: pointer; padding: 5px; }
        .main-content { max-width: 800px; margin: 0 auto; padding: 20px 16px 100px; }
        .page { display: none; animation: fadeIn 0.3s; }
        .page.active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .info-card { background: var(--bg-card); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; color: var(--accent-dark); border-right: 3px solid var(--accent); padding-right: 12px; }
        .star-rating { display: flex; gap: 8px; justify-content: center; margin: 15px 0; flex-direction: row-reverse; }
        .star-rating i { font-size: 1.8rem; color: #ddd; cursor: pointer; }
        .star-rating i.active { color: var(--accent); }
        .review-slider { position: relative; min-height: 180px; }
        .review-item { position: absolute; width: 100%; opacity: 0; transition: opacity 0.5s; text-align: center; }
        .review-item.active { opacity: 1; position: relative; }
        .schedule-group { padding: 12px 0; border-bottom: 1px solid var(--border); }
        .schedule-days { font-weight: 700; color: var(--accent-dark); }
        .time-period { display: flex; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
        .time-text { background: var(--bg-secondary); padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; }
        .holiday-text { background: #ffebee; color: var(--danger); padding: 10px; border-radius: 12px; margin-top: 10px; }
        .status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 20px; border-radius: 40px; font-weight: 600; }
        .status-open { background: #e8f5e9; color: var(--success); }
        .status-closed { background: #ffebee; color: var(--danger); }
        .whatsapp-btn { background: var(--whatsapp); color: white; border: none; padding: 14px; border-radius: 40px; font-weight: 700; width: 100%; cursor: pointer; }
        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .social-link { width: 48px; height: 48px; background: var(--bg-secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 1.3rem; text-decoration: none; transition: all 0.2s; }
        .social-link:hover { background: var(--accent); color: white; }
        .location-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; }
        /* Photo Grid */
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .photo-item { aspect-ratio: 1; background: #f0f0f0; position: relative; cursor: pointer; overflow: hidden; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .photo-item:hover img { transform: scale(1.05); }
        /* New overlay style for photo items: icons at bottom left/right */
        .photo-item .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .photo-item:hover .photo-overlay {
            opacity: 1;
        }
        .photo-item .action-btn-icon {
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }
        .photo-item .action-btn-icon.fav-btn-icon { color: var(--text-secondary); }
        .photo-item .action-btn-icon.fav-btn-icon.active { color: var(--danger); background: white; }
        .photo-item .action-btn-icon.whatsapp-btn-icon { color: var(--whatsapp); }

        /* Album Cards (Works section) */
        .album-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .album-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
        }
        .album-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .album-card h4 {
            font-size: 1rem;
            font-weight: 700;
            margin-top: 8px;
        }
        /* Overlay for album cards: icons on left and right */
        .album-card .album-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .album-card:hover .album-overlay {
            opacity: 1;
            pointer-events: auto;
        }
        .album-card .album-icon-btn {
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
        }
        .album-card .album-icon-btn.fav-album-btn { color: var(--text-secondary); }
        .album-card .album-icon-btn.fav-album-btn.active { color: var(--danger); background: white; }
        .album-card .album-icon-btn.whatsapp-album-btn { color: var(--whatsapp); }

        .folder-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .folder-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
        }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        /* Viewer Modal (unchanged) */
        .viewer-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .viewer-container { width: 100%; height: 85vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; touch-action: none; }
        .viewer-img { max-width: 90%; max-height: 85vh; object-fit: contain; transition: transform 0.1s ease; cursor: grab; user-select: none; }
        .viewer-img:active { cursor: grabbing; }
        .viewer-controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 25px; background: rgba(0,0,0,0.7); padding: 12px 30px; border-radius: 60px; backdrop-filter: blur(10px); z-index: 20001; }
        .viewer-controls button { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; width: 50px; height: 50px; border-radius: 50%; transition: all 0.2s; }
        .viewer-controls button:hover { background: rgba(255,255,255,0.2); }
        .viewer-counter { color: white; font-size: 1.1rem; font-weight: 600; min-width: 70px; text-align: center; }
        .viewer-close { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.6); border: none; color: white; font-size: 1.5rem; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; z-index: 20001; }
        .viewer-close:hover { background: var(--danger); transform: rotate(90deg); }
        .viewer-top-actions { position: fixed; top: 20px; left: 20px; display: flex; gap: 12px; z-index: 20001; }
        .viewer-top-btn { background: rgba(0,0,0,0.6); border: none; color: white; width: 48px; height: 48px; border-radius: 50%; font-size: 1.3rem; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .viewer-top-btn:hover { transform: scale(1.05); }
        .viewer-top-btn.whatsapp-top { background: var(--whatsapp); }
        .viewer-top-btn.fav-top.active { color: var(--danger); background: white; }
        .hidden-admin { position: fixed; bottom: 20px; left: 20px; width: 40px; height: 40px; background: transparent; border-radius: 50%; cursor: pointer; z-index: 2000; opacity: 0; }
        .hidden-admin:hover { opacity: 0.3; background: rgba(0,0,0,0.1); }
        .admin-panel { position: fixed; inset: 0; background: var(--bg-primary); z-index: 30000; overflow-y: auto; display: none; padding: 20px; }
        .admin-panel.active { display: block; }
        .admin-card { max-width: 700px; margin: 0 auto; }
        .collapse-section { background: var(--bg-secondary); border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        .collapse-btn { width: 100%; padding: 16px; background: none; border: none; font-weight: 700; text-align: right; display: flex; justify-content: space-between; cursor: pointer; }
        .collapse-content { display: none; padding: 16px; border-top: 1px solid var(--border); }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 12px; font-family: inherit; }
        .admin-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 600; margin-top: 8px; cursor: pointer; }
        .btn-gold { background: var(--accent); color: #1c1c1e; }
        .btn-red { background: var(--danger); color: white; }
        .btn-green { background: var(--success); color: white; }
        .partner-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--bg-card); border-radius: 12px; margin-bottom: 8px; }
        .toast-msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 40px; font-size: 14px; z-index: 30001; display: none; }
    </style>
</head>
<body>

<div id="splash"><div class="splash-logo">بصمة غير</div><div class="splash-line"></div></div>
<div id="maintenance-screen"><div class="maintenance-content"><i class="fas fa-tools" style="font-size: 4rem; color: var(--accent);"></i><h2 id="maintenance-title">الموقع في صيانة</h2><p id="maintenance-message">نعمل على تحسين تجربتك، سنعود قريباً</p></div></div>
<div class="hidden-admin" onclick="checkAccess()"></div>

<div class="top-nav">
    <div class="logo-section"><h1 id="siteTitle">بصمة غير</h1><p>للديكور والتصميم الداخلي</p></div>
    <div class="partners-marquee" id="partnersMarquee" style="display: none;"><div class="marquee-track" id="marqueeTrack"></div></div>
    <div class="tabs-wrapper"><div class="tabs-section" id="tabsSection"></div></div>
</div>

<div id="popupBubble" class="popup-bubble"><div class="bubble-content"><div class="bubble-icon"><i class="fas fa-gift"></i></div><div class="bubble-text" id="popupMessage"></div><button class="bubble-close" onclick="closePopup()"><i class="fas fa-times"></i></button></div></div>

<div class="main-content" id="mainContent"></div>

<div id="viewerModal" class="viewer-modal">
    <button class="viewer-close" onclick="closeViewer()"><i class="fas fa-times"></i></button>
    <div class="viewer-top-actions">
        <button class="viewer-top-btn" id="viewerFavBtn" onclick="viewerToggleFavorite()"><i class="far fa-heart"></i></button>
        <button class="viewer-top-btn whatsapp-top" onclick="viewerWhatsapp()"><i class="fab fa-whatsapp"></i></button>
    </div>
    <div class="viewer-container"><img id="viewerImg" class="viewer-img" src="" draggable="false"></div>
    <div class="viewer-controls">
        <button onclick="viewerPrev()"><i class="fas fa-chevron-right"></i></button>
        <span class="viewer-counter" id="viewerCounter">1 / 1</span>
        <button onclick="viewerNext()"><i class="fas fa-chevron-left"></i></button>
    </div>
</div>

<div id="adminPanel" class="admin-panel"><div class="admin-card"><h2 style="margin-bottom:20px;">⚡ لوحة الإدارة</h2><div id="adminSections"></div><button onclick="closeAdminPanel()" class="admin-btn btn-red" style="margin-top:20px">إغلاق</button></div></div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let isAdmin = false;
    let favorites = JSON.parse(localStorage.getItem('site_favorites_v8')) || [];
    let currentPage = 'home';
    let currentImageList = [];
    let currentImageIndex = 0;
    let currentImageId = '';
    let zoomScale = 1, translate = { x: 0, y: 0 }, isZoomed = false, isDragging = false;
    let startX, startY, startTX, startTY;
    let tabScrollInterval = null;
    let popupTimeout = null;

    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
    window.addEventListener('load', () => { setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').style.display = 'none', 500); }, 1000); });

    // Popup
    function showPopup() { if (!currentData.popup_enabled) return; const bubble = document.getElementById('popupBubble'); const message = currentData.popup_message || 'مرحباً بكم في عالم التصميم والأناقة ✨'; document.getElementById('popupMessage').innerText = message; bubble.style.display = 'block'; if (popupTimeout) clearTimeout(popupTimeout); popupTimeout = setTimeout(() => { closePopup(); }, (currentData.popup_duration || 8) * 1000); }
    function closePopup() { document.getElementById('popupBubble').style.display = 'none'; if (popupTimeout) clearTimeout(popupTimeout); }

    // Favorites
    function saveFav() { localStorage.setItem('site_favorites_v8', JSON.stringify(favorites)); }
    function toggleFavorite(imgId, imgUrl) {
        const exists = favorites.find(f => f.id === imgId);
        if (exists) { favorites = favorites.filter(f => f.id !== imgId); showToast('🗑️ تمت الإزالة من المفضلة'); }
        else { favorites.unshift({ id: imgId, url: imgUrl, date: Date.now() }); showToast('❤️ أضيف إلى المفضلة'); }
        saveFav(); renderCurrentPage(); updateViewerFavButton();
    }
    function isFav(imgId) { return favorites.some(f => f.id === imgId); }
    function updateViewerFavButton() {
        const btn = document.getElementById('viewerFavBtn');
        if (btn && currentImageId) {
            if (isFav(currentImageId)) { btn.classList.add('active'); btn.innerHTML = '<i class="fas fa-heart"></i>'; btn.style.background = 'white'; btn.style.color = 'var(--danger)'; }
            else { btn.classList.remove('active'); btn.innerHTML = '<i class="far fa-heart"></i>'; btn.style.background = 'rgba(0,0,0,0.6)'; btn.style.color = 'white'; }
        }
    }
    function viewerToggleFavorite() { if (currentImageId && currentImageList[currentImageIndex]) toggleFavorite(currentImageId, currentImageList[currentImageIndex]); }
    function viewerWhatsapp() { if (currentImageList[currentImageIndex]) window.open(`https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن هذا التصميم:\n'+currentImageList[currentImageIndex])}`, '_blank'); }

    // Viewer with Zoom (works on both desktop and mobile)
    function openViewer(url, imageList, index, imgId) {
        currentImageList = imageList;
        currentImageIndex = index;
        currentImageId = imgId || `img_${Date.now()}_${index}`;
        document.getElementById('viewerImg').src = url;
        document.getElementById('viewerCounter').innerText = `${index+1}/${imageList.length}`;
        document.getElementById('viewerModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        resetZoom();
        setupZoomEvents();
        updateViewerFavButton();
    }
    function closeViewer() { document.getElementById('viewerModal').style.display = 'none'; document.body.style.overflow = ''; resetZoom(); currentImageList = []; }
    function viewerNext() { if (!currentImageList.length) return; currentImageIndex = (currentImageIndex + 1) % currentImageList.length; document.getElementById('viewerImg').src = currentImageList[currentImageIndex]; document.getElementById('viewerCounter').innerText = `${currentImageIndex+1}/${currentImageList.length}`; currentImageId = `img_${Date.now()}_${currentImageIndex}`; resetZoom(); updateViewerFavButton(); }
    function viewerPrev() { if (!currentImageList.length) return; currentImageIndex = (currentImageIndex - 1 + currentImageList.length) % currentImageList.length; document.getElementById('viewerImg').src = currentImageList[currentImageIndex]; document.getElementById('viewerCounter').innerText = `${currentImageIndex+1}/${currentImageList.length}`; currentImageId = `img_${Date.now()}_${currentImageIndex}`; resetZoom(); updateViewerFavButton(); }
    function resetZoom() { zoomScale = 1; translate = { x: 0, y: 0 }; const img = document.getElementById('viewerImg'); if (img) img.style.transform = `scale(1) translate(0px, 0px)`; isZoomed = false; }
    function setupZoomEvents() {
        const img = document.getElementById('viewerImg');
        if (!img) return;
        img.removeEventListener('wheel', handleWheel);
        img.removeEventListener('mousedown', handleMouseDown);
        img.removeEventListener('dblclick', handleDoubleClick);
        window.removeEventListener('mousemove', handleMouseMove);
        window.removeEventListener('mouseup', handleMouseUp);
        img.removeEventListener('touchstart', handleTouchStart);
        img.removeEventListener('touchmove', handleTouchMove);
        img.removeEventListener('touchend', handleTouchEnd);
        function handleWheel(e) { e.preventDefault(); const delta = e.deltaY > 0 ? -0.1 : 0.1; zoomScale = Math.min(Math.max(zoomScale + delta, 1), 3); img.style.transform = `scale(${zoomScale}) translate(${translate.x}px, ${translate.y}px)`; isZoomed = zoomScale > 1; }
        function handleMouseDown(e) { if (!isZoomed) return; e.preventDefault(); isDragging = true; startX = e.clientX; startY = e.clientY; startTX = translate.x; startTY = translate.y; }
        function handleMouseMove(e) { if (!isDragging || !isZoomed) return; translate.x = startTX + (e.clientX - startX); translate.y = startTY + (e.clientY - startY); img.style.transform = `scale(${zoomScale}) translate(${translate.x}px, ${translate.y}px)`; }
        function handleMouseUp() { isDragging = false; }
        function handleDoubleClick(e) { e.preventDefault(); if (zoomScale > 1) resetZoom(); else { zoomScale = 2; img.style.transform = `scale(2) translate(0px, 0px)`; isZoomed = true; } }
        let touchStartX, touchStartY, touchStartTX, touchStartTY;
        function handleTouchStart(e) { if (!isZoomed) return; if (e.touches.length === 1) { e.preventDefault(); isDragging = true; touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; touchStartTX = translate.x; touchStartTY = translate.y; } }
        function handleTouchMove(e) { if (!isDragging || !isZoomed) return; e.preventDefault(); const dx = e.touches[0].clientX - touchStartX; const dy = e.touches[0].clientY - touchStartY; translate.x = touchStartTX + dx; translate.y = touchStartTY + dy; img.style.transform = `scale(${zoomScale}) translate(${translate.x}px, ${translate.y}px)`; }
        function handleTouchEnd() { isDragging = false; }
        let initialDistance = 0;
        img.addEventListener('touchstart', (e) => { if (e.touches.length === 2) { e.preventDefault(); const dx = e.touches[0].clientX - e.touches[1].clientX; const dy = e.touches[0].clientY - e.touches[1].clientY; initialDistance = Math.sqrt(dx * dx + dy * dy); } });
        img.addEventListener('touchmove', (e) => { if (e.touches.length === 2 && initialDistance > 0) { e.preventDefault(); const dx = e.touches[0].clientX - e.touches[1].clientX; const dy = e.touches[0].clientY - e.touches[1].clientY; const newDistance = Math.sqrt(dx * dx + dy * dy); const scale = newDistance / initialDistance; zoomScale = Math.min(Math.max(zoomScale * scale, 1), 3); img.style.transform = `scale(${zoomScale}) translate(${translate.x}px, ${translate.y}px)`; isZoomed = zoomScale > 1; initialDistance = newDistance; } });
        img.addEventListener('wheel', handleWheel, { passive: false });
        img.addEventListener('mousedown', handleMouseDown);
        img.addEventListener('dblclick', handleDoubleClick);
        img.addEventListener('touchstart', handleTouchStart, { passive: false });
        img.addEventListener('touchmove', handleTouchMove, { passive: false });
        img.addEventListener('touchend', handleTouchEnd);
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseup', handleMouseUp);
    }

    // Schedule helpers
    function formatTime12(t) { if(!t) return ""; let [h,m]=t.split(':'); h=parseInt(h); return `${h%12||12}:${m} ${h>=12?'م':'ص'}`; }
    function getGroupedScheduleHtml(d) {
        if (!d.work_schedule) return '<p>لم تحدد المواعيد بعد</p>';
        const dayNames = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"], daysOrder = [6,0,1,2,3,4,5];
        let groups = [], offDays = [];
        daysOrder.forEach(jsDay => {
            const s = d.work_schedule[jsDay];
            if (s && s.active) {
                const key = `${s.s1_s}-${s.s1_e}-${s.s2_a}-${s.s2_s}-${s.s2_e}`;
                let g = groups.find(g => g.key === key);
                if (g) g.days.push(dayNames[jsDay]);
                else groups.push({ key, days: [dayNames[jsDay]], data: s });
            } else offDays.push(dayNames[jsDay]);
        });
        let html = '';
        groups.forEach(g => {
            const dText = g.days.length === 1 ? g.days[0] : `من ${g.days[0]} إلى ${g.days[g.days.length-1]}`;
            html += `<div class="schedule-group"><div class="schedule-days">${dText}</div><div class="time-period"><span class="time-text">${formatTime12(g.data.s1_s||'09:00')}</span> — <span class="time-text">${formatTime12(g.data.s1_e||'17:00')}</span></div>`;
            if (g.data.s2_a) html += `<div class="time-period"><span class="time-text">${formatTime12(g.data.s2_s)}</span> — <span class="time-text">${formatTime12(g.data.s2_e)}</span></div>`;
            html += `</div>`;
        });
        if (offDays.length) html += `<div class="holiday-text"><i class="fas fa-moon"></i> عطلة: ${offDays.join('، ')}</div>`;
        return html;
    }
    function updateWorkStatus() {
        const c = document.getElementById('statusContainer');
        if (!c || !currentData.work_schedule) return;
        const now = new Date(), day = now.getDay(), s = currentData.work_schedule[day];
        let open = false;
        if (s && s.active) {
            const toMins = (t) => { let [h,m]=t.split(':').map(Number); return h*60+m; };
            const cur = now.getHours()*60+now.getMinutes();
            const s1 = toMins(s.s1_s), e1 = toMins(s.s1_e);
            if (cur >= s1 && cur < e1) open = true;
            if (!open && s.s2_a && s.s2_s && s.s2_e) { const s2 = toMins(s.s2_s), e2 = toMins(s.s2_e); if ((e2 < s2 && (cur >= s2 || cur < e2)) || (cur >= s2 && cur < e2)) open = true; }
        }
        c.innerHTML = open ? `<div class="status-badge status-open"><i class="fas fa-circle"></i> مفتوح الآن</div>` : `<div class="status-badge status-closed"><i class="fas fa-circle"></i> مغلق الآن</div>`;
    }

    // Tabs auto-scroll (stops when not on home)
    function startTabAutoScroll() {
        if (tabScrollInterval) clearInterval(tabScrollInterval);
        if (currentPage !== 'home') return;
        const tabs = document.querySelector('.tabs-section');
        if (!tabs) return;
        tabScrollInterval = setInterval(() => {
            if (currentPage !== 'home') return;
            if (tabs.scrollLeft + tabs.clientWidth >= tabs.scrollWidth - 5) {
                tabs.scrollTo({ left: 0, behavior: 'smooth' });
            } else {
                tabs.scrollBy({ left: 80, behavior: 'smooth' });
            }
        }, 3000);
    }

        let html = '<div class="photo-grid">';
        for (let i = 0; i < reversedIds.length; i++) {
            const imgId = reversedIds[i];

            const imgUrl = images[imgId].url;
            const fullId = `${parentId}_${imgId}`;
            const favClass = isFav(fullId) ? 'active' : '';

        html += '</div>';

    }

            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">📁 الألبومات <span>▾</span></button><div class="collapse-content"><div id="albumsList"></div><div style="display:flex; gap:8px;"><input id="newAlbumName" placeholder="اسم ألبوم"><button class="admin-btn btn-green" onclick="addAlbum()">إضافة</button></div></div></div>
            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">📚 الكتالوجات <span>▾</span></button><div class="collapse-content"><div id="catalogsList"></div><div><input id="newCatalogName" placeholder="اسم الكتالوج"><textarea id="newCatalogCode" placeholder="كود iFrame" rows="3"></textarea><button class="admin-btn btn-green" onclick="addCatalog()">إضافة</button></div></div></div>
            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">📸 رفع الصور <span>▾</span></button><div class="collapse-content"><select id="uploadTarget">${targetOpts()}</select><textarea id="imageUrls" placeholder="روابط الصور (كل رابط في سطر)" rows="4"></textarea><button class="admin-btn btn-green" onclick="uploadPhotos()">نشر</button></div></div>
            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">🗑️ حذف الصور <span>▾</span></button><div class="collapse-content"><select id="deleteTarget" onchange="loadImagesForDelete()">${targetOpts()}</select><div id="imagesDeleteGrid" style="display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:12px;"></div></div></div>
            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">📖 من نحن <span>▾</span></button><div class="collapse-content"><textarea id="aboutEditor" rows="5">${d.about_text||''}</textarea><label><input type="checkbox" id="aboutActive" ${d.about_active!==false?'checked':''}> تفعيل</label><button class="admin-btn btn-gold" onclick="saveAbout()">حفظ</button></div></div>
            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">🕒 مواعيد العمل <span>▾</span></button><div class="collapse-content"><div id="scheduleEditor"></div><button class="admin-btn btn-gold" onclick="saveSchedule()">حفظ</button></div></div>
            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">🔗 التواصل <span>▾</span></button><div class="collapse-content"><input id="instaInput" placeholder="انستقرام" value="${d.insta_url||''}"><input id="tiktokInput" placeholder="تيك توك" value="${d.tiktok_url||''}"><input id="snapInput" placeholder="سناب" value="${d.snap_url||''}"><input id="locationInput" placeholder="قوقل ماب" value="${d.location_url||''}"><button class="admin-btn btn-gold" onclick="saveSocial()">حفظ</button></div></div>
            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">⚙️ الإعدادات <span>▾</span></button><div class="collapse-content"><input id="siteNameInput" placeholder="اسم الموقع" value="${d.site_name||''}"><input id="whatsappInput" placeholder="واتساب" value="${d.whatsapp_num||''}"><input id="wmInput" placeholder="علامة مائية" value="${d.wm_text||''}"><input id="footerInput" placeholder="حقوق الملكية" value="${d.footer_text||''}"><button class="admin-btn btn-gold" onclick="saveGeneral()">حفظ</button></div></div>
            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">⭐ التقييمات <span>▾</span></button><div class="collapse-content"><div id="reviewsAdminList"></div></div></div>
        `;
        renderPagesList(); renderAlbumsList(); renderCatalogsList(); renderPartnersAdmin(); renderReviewsAdmin(); renderScheduleEditor();
    }
    function toggleCollapse(btn) { const c = btn.nextElementSibling; c.style.display = c.style.display === 'block' ? 'none' : 'block'; }
    function savePopupSettings() { db.ref(DB_PATH).update({ popup_enabled: document.getElementById('popupEnabled').checked, popup_message: document.getElementById('popupMessageInput').value, popup_duration: parseInt(document.getElementById('popupDuration').value) || 8 }).then(()=>showToast('تم حفظ إعدادات الفقاعة')); }
    function renderPagesList() { const c=document.getElementById('pagesList'); if(!c||!currentData.pages) return; c.innerHTML=Object.keys(currentData.pages).map(id=>`<div style="display:flex; gap:8px; margin-bottom:8px;"><input value="${currentData.pages[id].title}" onchange="db.ref(DB_PATH+'/pages/${id}').update({title:this.value})" style="flex:1"><button onclick="db.ref(DB_PATH+'/pages/${id}').remove()" class="admin-btn btn-red" style="width:auto; padding:6px 12px;">حذف</button></div>`).join(''); }
    function addPage() { const n=document.getElementById('newPageName').value; if(n) db.ref(DB_PATH+'/pages').push({title:n}).then(()=>showToast('تم الإضافة')); }
    function renderAlbumsList() { const c=document.getElementById('albumsList'); if(!c||!currentData.albums) return; c.innerHTML=Object.keys(currentData.albums).map(id=>`<div style="display:flex; gap:8px; margin-bottom:8px;"><input value="${currentData.albums[id].name}" onchange="db.ref(DB_PATH+'/albums/${id}').update({name:this.value})" style="flex:1"><button onclick="db.ref(DB_PATH+'/albums/${id}').remove()" class="admin-btn btn-red" style="width:auto; padding:6px 12px;">حذف</button></div>`).join(''); }
    function addAlbum() { const n=document.getElementById('newAlbumName').value; if(n) db.ref(DB_PATH+'/albums').push({name:n}).then(()=>showToast('تم إضافة الألبوم')); }
    function renderCatalogsList() { const c=document.getElementById('catalogsList'); if(!c||!currentData.catalogs) return; c.innerHTML=Object.keys(currentData.catalogs).map(id=>`<div style="display:flex; gap:8px; margin-bottom:8px;"><input value="${currentData.catalogs[id].name}" onchange="db.ref(DB_PATH+'/catalogs/${id}').update({name:this.value})" style="flex:1"><button onclick="db.ref(DB_PATH+'/catalogs/${id}').remove()" class="admin-btn btn-red" style="width:auto; padding:6px 12px;">حذف</button></div>`).join(''); }
    function addCatalog() { const n=document.getElementById('newCatalogName').value, c=document.getElementById('newCatalogCode').value; if(n&&c) db.ref(DB_PATH+'/catalogs').push({name:n,code:c}).then(()=>showToast('تم الإضافة')); }
    function renderPartnersAdmin() { const c=document.getElementById('partnersAdminList'); if(!c||!currentData.partners) return; c.innerHTML=Object.keys(currentData.partners).map(id=>`<div class="partner-item"><img src="${currentData.partners[id].url}"><span style="flex:1; font-size:12px;">${currentData.partners[id].url.substring(0,40)}</span><button onclick="db.ref(DB_PATH+'/partners/${id}').remove()" class="admin-btn btn-red" style="width:auto; padding:6px 12px;">حذف</button></div>`).join(''); }
    function addPartner() { const u=document.getElementById('partnerUrl').value; if(u) db.ref(DB_PATH+'/partners').push({url:u}).then(()=>showToast('تم إضافة الشريك')); }
    function renderReviewsAdmin() { const c=document.getElementById('reviewsAdminList'); if(!c||!currentData.reviews) return; c.innerHTML=Object.keys(currentData.reviews).map(id=>`<div style="padding:8px; border-bottom:1px solid var(--border);"><b>${currentData.reviews[id].name}</b> ${'★'.repeat(currentData.reviews[id].rating)}<p>${currentData.reviews[id].message}</p><button onclick="db.ref(DB_PATH+'/reviews/${id}').remove()" class="admin-btn btn-red" style="padding:4px">حذف</button></div>`).join(''); }
    function renderScheduleEditor() { const c=document.getElementById('scheduleEditor'), days=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"]; let h=''; for(let i=0;i<=6;i++){ const s=currentData.work_schedule?.[i]||{active:false,s1_s:'09:00',s1_e:'17:00',s2_a:false}; h+=`<div style="border:1px solid var(--border); padding:12px; margin-bottom:12px;"><label><input type="checkbox" id="dayActive_${i}" ${s.active?'checked':''}> ${days[i]}</label><div><input type="time" id="s1s_${i}" value="${s.s1_s}"> — <input type="time" id="s1e_${i}" value="${s.s1_e}"></div><label><input type="checkbox" id="s2a_${i}" ${s.s2_a?'checked':''}> فترة مسائية</label><div id="evening_${i}" style="${s.s2_a?'':'display:none'}"><input type="time" id="s2s_${i}" value="${s.s2_s||''}"> — <input type="time" id="s2e_${i}" value="${s.s2_e||''}"></div></div>`; } c.innerHTML=h; for(let i=0;i<=6;i++){ const cb=document.getElementById(`s2a_${i}`); if(cb) cb.onchange=()=>document.getElementById(`evening_${i}`).style.display=cb.checked?'block':'none'; } }
    function saveSchedule() { let s={}; for(let i=0;i<=6;i++) s[i]={ active:document.getElementById(`dayActive_${i}`).checked, s1_s:document.getElementById(`s1s_${i}`).value, s1_e:document.getElementById(`s1e_${i}`).value, s2_a:document.getElementById(`s2a_${i}`).checked, s2_s:document.getElementById(`s2s_${i}`).value, s2_e:document.getElementById(`s2e_${i}`).value }; db.ref(DB_PATH+'/work_schedule').set(s).then(()=>showToast('تم حفظ المواعيد')); }
    function saveAbout() { db.ref(DB_PATH).update({ about_text:document.getElementById('aboutEditor').value, about_active:document.getElementById('aboutActive').checked }).then(()=>showToast('تم حفظ من نحن')); }
    function saveSocial() { db.ref(DB_PATH).update({ insta_url:document.getElementById('instaInput').value, tiktok_url:document.getElementById('tiktokInput').value, snap_url:document.getElementById('snapInput').value, location_url:document.getElementById('locationInput').value }).then(()=>showToast('تم حفظ الروابط')); }
    function saveGeneral() { db.ref(DB_PATH).update({ site_name:document.getElementById('siteNameInput').value, whatsapp_num:document.getElementById('whatsappInput').value, wm_text:document.getElementById('wmInput').value, footer_text:document.getElementById('footerInput').value }).then(()=>showToast('تم حفظ الإعدادات')); }
    function saveMaintenance() { db.ref(DB_PATH).update({ maintenance_mode:document.getElementById('maintenanceMode').checked, maintenance_title:document.getElementById('maintenanceTitle').value, maintenance_message:document.getElementById('maintenanceMsg').value }).then(()=>showToast('تم حفظ إعدادات الصيانة')); }
    function uploadPhotos() { const t=document.getElementById('uploadTarget').value, urls=document.getElementById('imageUrls').value.split('\n').filter(u=>u.trim()); if(!t||urls.length===0) return showToast('اختر الوجهة وأدخل الروابط'); Promise.all(urls.map(url=>db.ref(DB_PATH+'/'+t+'/imgs').push({url:url.trim()}))).then(()=>{ showToast('تم نشر الصور'); document.getElementById('imageUrls').value=''; }); }
    function loadImagesForDelete() { const p=document.getElementById('deleteTarget').value, g=document.getElementById('imagesDeleteGrid'); if(!p){ g.innerHTML=''; return; } const [type,id]=p.split('/'); const f=currentData[type]?.[id]; if(!f||!f.imgs){ g.innerHTML='<p>لا توجد صور</p>'; return; } g.innerHTML=Object.keys(f.imgs).map(imgId=>`<div><img src="${f.imgs[imgId].url}" style="width:100%; aspect-ratio:1; object-fit:cover;"><button onclick="deleteImage('${p}', '${imgId}')" class="admin-btn btn-red" style="padding:4px">حذف</button></div>`).join(''); }
    function deleteImage(p,id){ db.ref(`${DB_PATH}/${p}/imgs/${id}`).remove().then(()=>{ showToast('تم الحذف'); loadImagesForDelete(); }); }
    function closeAdminPanel() { document.getElementById('adminPanel').classList.remove('active'); }
    function checkAccess() { const p=prompt("رمز الإدارة:"); if(!p) return; db.ref(DB_PATH).once('value').then(s=>{ const d=s.val(); if(d && d.in && d.in.toString()===p) { isAdmin=true; document.getElementById('adminPanel').classList.add('active'); buildAdminSections(); } else showToast('رمز غير صحيح'); }); }
    function checkMaintenance() { if(currentData.maintenance_mode && !isAdmin) document.getElementById('maintenance-screen').style.display='flex'; else document.getElementById('maintenance-screen').style.display='none'; }

    db.ref(DB_PATH).on('value', snap => { currentData = snap.val() || {}; renderTabs(); renderCurrentPage(); renderPartnersMarquee(); checkMaintenance(); if(isAdmin && document.getElementById('adminPanel').classList.contains('active')) buildAdminSections(); });
    
    window.openViewer = openViewer; window.closeViewer = closeViewer; window.viewerNext = viewerNext; window.viewerPrev = viewerPrev;
    window.viewerToggleFavorite = viewerToggleFavorite; window.viewerWhatsapp = viewerWhatsapp;
    window.toggleFavorite = toggleFavorite; window.openAlbum = openAlbum; window.openCatalog = openCatalog; window.whatsappGlobal = whatsappGlobal;
    window.checkAccess = checkAccess; window.closeAdminPanel = closeAdminPanel; window.toggleCollapse = toggleCollapse; window.closePopup = closePopup;
    window.addPage = addPage; window.addAlbum = addAlbum; window.addCatalog = addCatalog; window.addPartner = addPartner;
    window.saveAbout = saveAbout; window.saveSchedule = saveSchedule; window.saveSocial = saveSocial; window.saveGeneral = saveGeneral;
    window.uploadPhotos = uploadPhotos; window.loadImagesForDelete = loadImagesForDelete; window.deleteImage = deleteImage; window.saveMaintenance = saveMaintenance;
    window.savePopupSettings = savePopupSettings;
    renderTabs(); renderCurrentPage();
</script>
</body>
</html>

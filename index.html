<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>بصمة غير | تجهيز المعارض والمحلات التجارية</title>
    <meta name="description" content="بصمة غير: خبراء في ديكورات المعارض والمحلات التجارية بجدة.">
    <meta name="keywords" content="ديكور, ديكورات, ديكورات معارض, ديكور محلات تجارية, ديكور خشب جدة">
    <meta name="author" content="بصمة غير">
    <link rel="icon" type="image/png" sizes="32x32" href="https://cdn.jsdelivr.net/gh/LpDngol92/my-images/images/20260504_203712_%D8%AA%D8%B5%D9%85%D9%8A%D9%85%20%D8%A8%D8%AF%D9%88%D9%86%20%D8%B9%D9%86%D9%88%D8%A7%D9%86%20(3).png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* ============================================================
               RESET & BASE
            ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c8a165;
            --primary-dark: #a47e44;
            --primary-light: #e8d5b0;
            --gray: #6f6a64;
            --gray-light: #f5f3f0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Cairo', sans-serif;
        }

        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background: #fff;
            color: #2d2a2a;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        img {
            max-width: 100%;
            display: block;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            font-family: var(--font);
            cursor: pointer;
            border: none;
            background: none;
        }

        /* ============================================================
               SPLASH / STORIES - مُحسَّن
            ============================================================ */
        #splash {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .stories-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .story-media-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .story-media-wrapper.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 2;
        }

        .story-media {
            width: 100%;
            height: 100%;
            object-fit: contain;
            max-width: 100vw;
            max-height: 100vh;
            background: #000;
        }

        /* شريط التقدم */
        .story-progress-bar {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            gap: 6px;
            z-index: 20;
            direction: ltr;
        }

        .progress-segment {
            flex: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #fff;
            transition: width 0.1s linear;
        }

        .story-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 14px;
            border-radius: 30px;
            color: #fff;
            font-size: 0.75rem;
            z-index: 20;
            backdrop-filter: blur(4px);
        }

        .story-nav {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 25%;
            z-index: 15;
            cursor: pointer;
        }

        .story-nav.prev {
            left: 0;
        }
        .story-nav.next {
            right: 0;
        }

        .splash-skip {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            backdrop-filter: blur(4px);
            z-index: 20;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: var(--transition);
        }

        .splash-skip:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            .story-counter {
                font-size: 0.6rem;
                padding: 2px 10px;
                top: 12px;
                right: 12px;
            }
            .splash-skip {
                font-size: 0.7rem;
                padding: 6px 16px;
                bottom: 20px;
            }
        }

        /* ============================================================
               باقي الستايلات (كما هي)
            ============================================================ */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .section {
            padding: 48px 0;
        }

        .section-title {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            text-align: center;
            color: var(--primary-dark);
            margin-bottom: 32px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: var(--primary);
            margin: 8px auto 0;
            border-radius: 4px;
        }

        .grid-auto {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--gray);
            background: var(--gray-light);
            border-radius: var(--radius);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: clamp(0.85rem, 2vw, 1rem);
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(200, 161, 101, 0.3);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: #fff;
            transform: translateY(-2px);
        }

        .btn-whatsapp {
            background: #25D366;
            color: #fff;
        }

        .btn-whatsapp:hover {
            background: #1da15a;
            transform: scale(1.02);
        }

        .header {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 8px 0;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .logo h1 {
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: clamp(8px, 2vw, 20px);
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-links a {
            font-weight: 600;
            color: #555;
            font-size: clamp(0.75rem, 2vw, 0.95rem);
            padding: 6px 4px;
            transition: var(--transition);
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .nav-links a i {
            margin-left: 4px;
        }

        .partners-marquee {
            background: var(--gray-light);
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            overflow: hidden;
            white-space: nowrap;
        }

        .marquee-track {
            display: inline-flex;
            gap: 30px;
            animation: marqueeFlow 35s linear infinite;
        }

        .marquee-track:hover {
            animation-play-state: paused;
        }

        @keyframes marqueeFlow {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .partner-item {
            background: #fff;
            border-radius: 50px;
            padding: 4px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(200, 161, 101, 0.2);
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .partner-item:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .partner-logo {
            height: 40px;
            max-width: 100px;
            object-fit: contain;
        }

        .hero {
            background: linear-gradient(135deg, #fef9f0, #fffaf5);
            padding: clamp(32px, 8vw, 72px) 16px;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(1.6rem, 5vw, 2.8rem);
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .hero p {
            font-size: clamp(0.95rem, 3vw, 1.2rem);
            color: #5a5a5a;
            max-width: 700px;
            margin: 0 auto 24px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-slider-beige {
            position: relative;
            width: 100%;
            min-height: 70vh;
            background: #fefaf5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: var(--radius);
        }

        .slider-bg-blur {
            position: absolute;
            inset: 0;
            filter: blur(40px);
            opacity: 0.4;
            background-size: cover;
            background-position: center;
            transition: 0.5s;
            z-index: 0;
        }

        .slider-stage {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slider-image-card {
            width: 100%;
            aspect-ratio: 9 / 16;
            max-width: 340px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            transition: var(--transition);
            cursor: pointer;
            border: 2px solid var(--primary);
            background: #f0f0f0;
        }

        .slider-image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slider-nav-buttons {
            position: absolute;
            bottom: 16px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 10;
        }

        .slider-nav-buttons button {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid var(--primary);
            color: var(--primary-dark);
            font-size: 0.85rem;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
        }

        .slider-nav-buttons button:hover {
            background: var(--primary);
            color: #fff;
        }

        .slider-progress-ring {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 40px;
            color: var(--primary-dark);
            font-weight: 600;
            font-size: 0.75rem;
            z-index: 10;
        }

        .card,
        .product-card {
            background: #fff;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card:hover,
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
        }

        .img-square {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--gray-light);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-square img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card:hover .img-square img,
        .product-card:hover .img-square img {
            transform: scale(1.04);
        }

        .card-body,
        .product-info {
            padding: 16px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .footer {
            background: #1a1a1a;
            color: #bbb;
            padding: 48px 0 24px;
            margin-top: 16px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 32px;
        }

        .footer h4 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 1.05rem;
        }

        .footer p {
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .footer a {
            color: inherit;
            transition: var(--transition);
        }

        .footer a:hover {
            color: var(--primary);
        }

        .social-icons {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .social-icons a {
            background: #333;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .social-icons a:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .schedule-item {
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .copyright {
            text-align: center;
            padding-top: 24px;
            margin-top: 32px;
            border-top: 1px solid #333;
            font-size: 0.85rem;
            color: #777;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.97);
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lightbox-container {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
            touch-action: none;
        }

        .lightbox-image-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .lightbox-img {
            max-width: 95%;
            max-height: 75vh;
            object-fit: contain;
            transform-origin: center center;
            cursor: grab;
            user-select: none;
            background: #111;
            touch-action: none;
        }

        .lightbox-img:active {
            cursor: grabbing;
        }

        .lightbox-controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            padding: 12px 16px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            z-index: 10001;
        }

        .lightbox-controls button {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: var(--transition);
            font-weight: 500;
        }

        .lightbox-controls button:hover {
            background: var(--primary);
            transform: scale(1.03);
        }

        .lightbox-controls .counter {
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
        }

        .lightbox-close {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-size: 1.2rem;
            padding: 10px 14px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10002;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: var(--transition);
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .zoom-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            pointer-events: none;
            z-index: 10002;
            opacity: 0;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(4px);
        }

        .rating-container {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10002;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 14px;
            padding: 10px 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            display: none;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            font-family: var(--font);
            direction: rtl;
            transition: all 0.3s ease;
            max-width: 92%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .rating-container.visible {
            display: flex;
            animation: ratingFadeIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes ratingFadeIn {
            from {
                opacity: 0;
                transform: translateX(-50%) scale(0.92) translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) scale(1) translateY(0);
            }
        }

        .rating-info-group {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.7rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .rating-info-group .stars-avg {
            color: #ffc107;
            font-size: 0.8rem;
        }

        .rating-info-group .count {
            color: rgba(255, 255, 255, 0.5);
        }

        .rating-info-group .views {
            color: rgba(255, 255, 255, 0.35);
        }

        .rating-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 4px;
        }

        .rating-stars {
            display: flex;
            gap: 2px;
            direction: ltr;
            align-items: center;
        }

        .rating-stars i {
            font-size: 20px;
            cursor: pointer;
            transition: all 0.15s ease;
            color: rgba(255, 255, 255, 0.15);
        }

        .rating-stars i.active {
            color: #ffc107;
            text-shadow: 0 0 16px rgba(255, 193, 7, 0.25);
        }

        .rating-stars i.hover {
            transform: scale(1.2);
            color: #ffd54f;
        }

        .rating-stars i:active {
            transform: scale(0.8);
        }

        .rating-toast {
            position: fixed;
            bottom: 145px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 8px 22px;
            border-radius: 12px;
            font-size: 0.8rem;
            z-index: 10003;
            display: none;
            font-family: var(--font);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: toastPop 0.3s ease;
            text-align: center;
            max-width: 90%;
        }

        @keyframes toastPop {
            from {
                opacity: 0;
                transform: translateX(-50%) scale(0.9) translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) scale(1) translateY(0);
            }
        }

        .rating-toast.success {
            border-right: 3px solid #ffc107;
        }
        .rating-toast.info {
            border-right: 3px solid #4fc3f7;
        }

        .chat-toggle-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            font-size: 24px;

            'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400"%3E%3Crect width="400" height="400" fill="%23f0f0f0"/%3E%3Ctext x="50%25" y="50%25" font-size="20" font-family="Cairo" fill="%23999" text-anchor="middle" dy=".3em"%3Eصورة غير متوفرة%3C/text%3E%3C/svg%3E';

        // ================================================================
        // IMAGE LOADER
        // ================================================================
        function loadImageWithRetry(imgElement, src, maxAttempts = 5) {
            if (!imgElement) return;
            if (!src || src.trim() === '') {
                imgElement.src = PLACEHOLDER_SVG;
                imgElement.style.objectFit = 'contain';
                return;
            }

            const srcWithCache = src + (src.includes('?') ? '&' : '?') + '_t=' + Date.now();

            imgElement.src = PLACEHOLDER_SVG;
            imgElement.style.objectFit = 'contain';
            imgElement.style.background = '#f0f0f0';

            let attempts = 0;
            let timeoutId = null;

            function attemptLoad() {
                imgElement.src = srcWithCache;

                imgElement.onerror = function() {
                    if (attempts < maxAttempts) {
                        attempts++;
                        const delay = 500 * attempts;
                        clearTimeout(timeoutId);
                        timeoutId = setTimeout(attemptLoad, delay);
                    } else {
                        imgElement.src = PLACEHOLDER_SVG;
                        imgElement.style.objectFit = 'contain';
                        imgElement.style.background = '#f0f0f0';
                    }
                };

                imgElement.onload = function() {
                    clearTimeout(timeoutId);
                    imgElement.style.objectFit = 'cover';
                    imgElement.style.background = 'transparent';
                };

                const checkLoaded = () => {
                    if (imgElement.complete && imgElement.naturalWidth > 0) {
                        clearTimeout(timeoutId);
                        imgElement.style.objectFit = 'cover';
                        imgElement.style.background = 'transparent';
                        return;
                    }
                    if (attempts < maxAttempts) {
                        attempts++;
                        const delay = 500 * attempts;
                        clearTimeout(timeoutId);
                        timeoutId = setTimeout(attemptLoad, delay);
                    } else {
                        imgElement.src = PLACEHOLDER_SVG;
                        imgElement.style.objectFit = 'contain';
                        imgElement.style.background = '#f0f0f0';
                    }
                };

                clearTimeout(timeoutId);
                timeoutId = setTimeout(checkLoaded, 3000);
            }

            attemptLoad();

        // ================================================================

        let currentStoryIdx = 0;
        let storyTimer = null;
        let storyPlaying = true;

        function isVideoUrl(url) {
            return /\.(mp4|webm|mov|ogg|mkv)$/i.test(url);
        }

        function showStorySplash(items, durationSec = 5) {
            const splashDiv = document.getElementById('splash');

                    <div id="storyMediaWrapper" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;"></div>
                </div>
            `;

            const wrapper = document.getElementById('storyMediaWrapper');

            // إنشاء عناصر الوسائط
            items.forEach((item, idx) => {
                const mediaWrapper = document.createElement('div');
                mediaWrapper.className = 'story-media-wrapper';
                if (idx === 0) mediaWrapper.classList.add('active');

                let mediaElement;
                if (item.type === 'video' || isVideoUrl(item.url)) {
                    mediaElement = document.createElement('video');
                    mediaElement.src = item.url;
                    mediaElement.muted = true;
                    mediaElement.playsInline = true;
                    mediaElement.preload = 'auto';
                    mediaElement.loop = false;
                    mediaElement.className = 'story-media';
                    mediaElement.onerror = () => {
                        mediaElement.src = PLACEHOLDER_SVG;
                        mediaElement.style.objectFit = 'contain';
                    };
                    mediaElement.onloadeddata = () => {
                        mediaElement.play().catch(() => {});
                    };
                } else {
                    mediaElement = document.createElement('img');
                    mediaElement.className = 'story-media';
                    mediaElement.alt = 'صورة';
                    mediaElement.onerror = () => {
                        mediaElement.src = PLACEHOLDER_SVG;
                        mediaElement.style.objectFit = 'contain';
                    };
                    loadImageWithRetry(mediaElement, item.url);
                }

                mediaWrapper.appendChild(mediaElement);
                wrapper.appendChild(mediaWrapper);
            });

            // شريط التقدم
            const progressBar = document.getElementById('storyProgressBar');
            for (let i = 0; i < items.length; i++) {
                const seg = document.createElement('div');
                seg.className = 'progress-segment';
                seg.innerHTML = `<div class="progress-fill" id="progressFill_${i}"></div>`;
                progressBar.appendChild(seg);
            }

            // الأحداث
            document.getElementById('storyPrev').addEventListener('click', () => navigateStory(-1));
            document.getElementById('storyNext').addEventListener('click', () => navigateStory(1));

            const skipBtn = document.getElementById('splashSkipBtn');
            skipBtn.addEventListener('click', closeSplash);

            // اللمس
            let touchStartX = 0;
            const container = document.getElementById('storiesContainer');
            container.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
            });
            container.addEventListener('touchend', (e) => {
                const diff = e.changedTouches[0].clientX - touchStartX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) navigateStory(-1);
                    else navigateStory(1);
                }
            });

            // إظهار الشاشة
            splashDiv.style.display = 'flex';
            splashDiv.style.opacity = '1';

            // بدء العرض
            startCurrentStoryItem(durationSec * 1000);

            // مؤقت إغلاق تلقائي بعد انتهاء جميع الصور (احتياطي)
            const totalDuration = items.length * durationSec * 1000 + 2000;
            splashAutoCloseTimer = setTimeout(() => {

        function startCurrentStoryItem(durationMs) {
            if (storyTimer) clearInterval(storyTimer);

            const counterSpan = document.getElementById('storyCounter');
            if (counterSpan) {
                counterSpan.innerText = `${currentStoryIdx + 1} / ${currentStoryItems.length}`;
            }

            // إظهار العنصر الحالي وإخفاء الباقي
            const allWrappers = document.querySelectorAll('.story-media-wrapper');
            allWrappers.forEach((el, idx) => {
                if (idx === currentStoryIdx) {
                    el.classList.add('active');
                    // تشغيل الفيديو إذا كان موجوداً
                    const video = el.querySelector('video');
                    if (video) {
                        video.currentTime = 0;
                        video.play().catch(() => {});
                    }
                } else {
                    el.classList.remove('active');
                    const video = el.querySelector('video');
                    if (video) video.pause();
                }
            });

            // تحديث شريط التقدم
            for (let i = 0; i < currentStoryItems.length; i++) {
                const fill = document.getElementById(`progressFill_${i}`);
                if (fill) {
                    if (i < currentStoryIdx) fill.style.width = '100%';
                    else if (i === currentStoryIdx) fill.style.width = '0%';
                    else fill.style.width = '0%';
                }
            }

            const currentFill = document.getElementById(`progressFill_${currentStoryIdx}`);
            const startTime = Date.now();

            storyTimer = setInterval(() => {
                if (!storyPlaying) {
                    clearInterval(storyTimer);
                    return;
                }
                const elapsed = Date.now() - startTime;
                const percent = Math.min(100, (elapsed / durationMs) * 100);
                if (currentFill) {
                    currentFill.style.width = percent + '%';
                }

                if (elapsed >= durationMs) {
                    clearInterval(storyTimer);
                    // الانتقال للصورة التالية
                    if (currentStoryIdx + 1 < currentStoryItems.length) {
                        navigateStory(1);
                    } else {
                        // انتهت جميع الصور
                        closeSplash();
                    }
                }
            }, 50);
        }

                }

        async function getOrCreateTicket() {
            const visitorId = getOrCreateVisitorId();
            let visitorName = localStorage.getItem('chat_visitor_name');
            if (!visitorName && !isNameRequested) { isNameRequested = true;
                visitorName = await requestUserName(); } else if (!visitorName) visitorName = 'زائر';
            currentVisitorName = visitorName;

            const snap = await ref.orderByChild('visitorId').equalTo(visitorId).once('value');
            let existing = null;
            snap.forEach(child => { const t = child.val(); if (t && t.status === 'open') existing = { id: child.key,
                    ...t }; });
            if (existing) { currentTicketId = existing.id; return currentTicketId; }
            const newTicket = { ticketId: null, visitorId, visitorName, status: 'open', createdAt: Date.now(),
                lastMessageAt: Date.now() };
            const newRef = ref.push();
            newTicket.ticketId = newRef.key;
            await newRef.set(newTicket);
            currentTicketId = newRef.key;
            return currentTicketId;

        async function sendChatMessage(message) {
            if (isBlocked) { showChatToast('🚫 تم حظرك من الدردشة'); return false; }
            if (!message.trim()) { showChatToast('❌ الرجاء كتابة رسالة'); return false; }
            if (!currentTicketId) await getOrCreateTicket();
            const data = { id: Date.now().toString(), sender: 'visitor', senderName: currentVisitorName, message: message
                    .trim(), timestamp: Date.now(), read: false };
            try {
                await db.ref(`${DB_PATH}/chat_messages/${currentTicketId}`).push(data);
                await db.ref(`${DB_PATH}/chat_tickets/${currentTicketId}`).update({ lastMessageAt: Date.now(),
                    status: 'open' });
                displayChatMessage(data, true);
                document.getElementById('chatInput').value = '';
                if (!isAdminOnline) showChatToast('📨 تم إرسال رسالتك. سيتم الرد عند عودة المشرف');
                return true;

        async function initChatSystem() {

        // ================================================================
        // LIGHTBOX
        // ================================================================
        const imgElement = document.getElementById('lightboxImg');
        const lightbox = document.getElementById('lightbox');
        const counterSpan = document.getElementById('lightboxCounter');
        const waBtn = document.getElementById('lightboxWhatsappBtn');

        const ratingContainer = document.getElementById('ratingContainer');
        const ratingStars = document.getElementById('ratingStars');
        const ratingStarsSummary = document.getElementById('ratingStarsSummary');
        const ratingCountText = document.getElementById('ratingCountText');
        const ratingViewsText = document.getElementById('ratingViewsText');
        const ratingToast = document.getElementById('ratingToast');

        let scale = 1,
            translateX = 0,
            translateY = 0,
            startX = 0,
            startY = 0,
            isPanning = false;
        let initialPinchDist = 0,
            startScale = 1,
            pinchCenterX = 0,
            pinchCenterY = 0,
            touchStartXPan = 0;
        let ratingToastTimeout = null;

        function setTransform() { imgElement.style.transform =
            `translate(${translateX}px, ${translateY}px) scale(${scale})`; }

        function resetTransform() { scale = 1;
            translateX = 0;
            translateY = 0;
            setTransform(); }

        function clampMovement() {
            const containerRect = imgElement.parentElement.getBoundingClientRect();
            const imgRect = imgElement.getBoundingClientRect();
            const maxX = Math.max(0, (imgRect.width * scale - containerRect.width) / 2);
            const maxY = Math.max(0, (imgRect.height * scale - containerRect.height) / 2);
            translateX = Math.min(Math.max(translateX, -maxX), maxX);
            translateY = Math.min(Math.max(translateY, -maxY), maxY);
            setTransform();
        }

        function onMouseDown(e) { if (scale <= 1) return;
            e.preventDefault();
            isPanning = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
            imgElement.style.cursor = 'grabbing'; }

        function onMouseMove(e) { if (!isPanning) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            clampMovement(); }

        function onMouseUp() { isPanning = false;
            imgElement.style.cursor = 'grab'; }

        function getDistance(touches) { return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY -
                touches[1].clientY); }

        function onTouchStart(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                initialPinchDist = getDistance(e.touches);
                startScale = scale;
                pinchCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                pinchCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                document.getElementById('zoomHint').style.opacity = '1';
                setTimeout(() => document.getElementById('zoomHint').style.opacity = '0', 2000);
            } else if (e.touches.length === 1) {
                touchStartXPan = e.touches[0].clientX;
                if (scale > 1) { isPanning = true;
                    startX = e.touches[0].clientX - translateX;
                    startY = e.touches[0].clientY - translateY; }
            }
        }

        function onTouchMove(e) {
            if (e.touches.length === 2 && initialPinchDist > 0) {
                e.preventDefault();
                const newDist = getDistance(e.touches);
                let newScale = startScale * (newDist / initialPinchDist);
                newScale = Math.min(4, Math.max(1, newScale));
                if (newScale !== scale) {
                    const rect = imgElement.getBoundingClientRect();
                    const offsetX = pinchCenterX - rect.left;
                    const offsetY = pinchCenterY - rect.top;
                    const ratio = newScale / scale;
                    translateX = pinchCenterX - rect.left - (offsetX - translateX) * ratio;
                    translateY = pinchCenterY - rect.top - (offsetY - translateY) * ratio;
                    scale = newScale;
                    clampMovement();
                }
            } else if (e.touches.length === 1 && isPanning && scale > 1) {
                e.preventDefault();
                translateX = e.touches[0].clientX - startX;
                translateY = e.touches[0].clientY - startY;
                clampMovement();
            }
        }

        function onTouchEnd(e) {
            if (e.touches.length < 2) initialPinchDist = 0;
            if (e.touches.length === 0) {
                if (touchStartXPan && e.changedTouches[0] && scale <= 1) {
                    const diff = e.changedTouches[0].clientX - touchStartXPan;
                    if (Math.abs(diff) > 50) { if (diff > 0) prevImage();
                        else nextImage(); }
                }
                touchStartXPan = 0;
                isPanning = false;
            }
        }

        function onWheel(e) {
            e.preventDefault();
            let delta = e.deltaY > 0 ? -0.1 : 0.1;
            let newScale = Math.min(4, Math.max(1, scale + delta));
            if (newScale === scale) return;
            const rect = imgElement.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const ratio = newScale / scale;
            translateX = e.clientX - rect.left - (mouseX - translateX) * ratio;
            translateY = e.clientY - rect.top - (mouseY - translateY) * ratio;
            scale = newScale;
            clampMovement();
            document.getElementById('zoomHint').style.opacity = '1';
            setTimeout(() => document.getElementById('zoomHint').style.opacity = '0', 2000);
        }

        function bindLightboxEvents() {
            imgElement.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
            imgElement.addEventListener('touchstart', onTouchStart, { passive: false });
            imgElement.addEventListener('touchmove', onTouchMove, { passive: false });
            imgElement.addEventListener('touchend', onTouchEnd);
            imgElement.addEventListener('wheel', onWheel, { passive: false });
        }

        function unbindLightboxEvents() {
            imgElement.removeEventListener('mousedown', onMouseDown);
            window.removeEventListener('mousemove', onMouseMove);
            window.removeEventListener('mouseup', onMouseUp);
            imgElement.removeEventListener('touchstart', onTouchStart);
            imgElement.removeEventListener('touchmove', onTouchMove);
            imgElement.removeEventListener('touchend', onTouchEnd);
            imgElement.removeEventListener('wheel', onWheel);
        }

        function updateCounter() { counterSpan.innerText = `${currentIndex+1} / ${currentImageList.length}`; }

        async function incrementAlbumViews(albumId) {
            if (!albumId) return;
            const key = `viewed_${albumId}`;
            if (sessionStorage.getItem(key)) return;
            const ref = db.ref(`${DB_PATH}/albums/${albumId}`);
            await ref.transaction(album => { if (album) album.views = (album.views || 0) + 1; return album; });
            sessionStorage.setItem(key, '1');
            if (currentData.albums && currentData.albums[albumId]) currentData.albums[albumId].views = (currentData
                .albums[albumId].views || 0) + 1;
        }

        // RATING SYSTEM
        // ================================================================
        function showRatingToast(message, type = 'success') {
            if (ratingToastTimeout) clearTimeout(ratingToastTimeout);
            ratingToast.className = `rating-toast ${type}`;
            ratingToast.textContent = message;
            ratingToast.style.display = 'block';

        async function updateRatingUI(albumId) {
            if (!albumId || !ratingContainer) {
                ratingContainer.classList.remove('visible');
                return;
            }
            const album = currentData.albums?.[albumId];
            if (!album) {
                ratingContainer.classList.remove('visible');
                return;
            }
            ratingContainer.classList.add('visible');

            const avg = (album.rating_sum && album.rating_count) ? (album.rating_sum / album.rating_count) : 0;
            const count = album.rating_count || 0;
            const views = album.views || 0;

            ratingStarsSummary.textContent = `⭐ ${avg.toFixed(1)}`;
            ratingCountText.textContent = `(${count})`;
            ratingViewsText.textContent = `👁️ ${views}`;

            const stars = ratingStars.querySelectorAll('i');
            const roundedAvg = Math.round(avg);
            stars.forEach((star, idx) => {
                const value = idx + 1;
                if (value <= roundedAvg) { star.classList.add('active'); } else { star.classList.remove(
                    'active'); }
                star.classList.remove('hover');
            });

            stars.forEach(star => {
                star.removeEventListener('click', handleStarClickNew);
                star.removeEventListener('mouseenter', handleStarHoverNew);
                star.removeEventListener('mouseleave', handleStarLeaveNew);
                star.addEventListener('click', handleStarClickNew);
                star.addEventListener('mouseenter', handleStarHoverNew);
                star.addEventListener('mouseleave', handleStarLeaveNew);

        async function submitRatingNew(albumId, rating) {
            if (!albumId) return;
            const key = `rated_${albumId}`;
            if (localStorage.getItem(key)) {
                showRatingToast('لقد قمت بتقييم هذا الألبوم مسبقاً', 'info');
                return;
            }
            const ref = db.ref(`${DB_PATH}/albums/${albumId}`);
            await ref.transaction(album => {
                if (album) {
                    album.rating_sum = (album.rating_sum || 0) + rating;
                    album.rating_count = (album.rating_count || 0) + 1;
                }
                return album;
            });
            localStorage.setItem(key, '1');
            const snap = await ref.once('value');
            const updated = snap.val();
            if (updated && currentData.albums) {
                currentData.albums[albumId] = updated;
                await updateRatingUI(albumId);
                showRatingToast(`شكراً لتقييمك (${rating} نجوم) 🌟`, 'success');
            }
        }

                if (slideInterval) clearInterval(slideInterval);

        function getGroupedScheduleHtml(d) {
            if (!d.work_schedule) return '<p>لم تحدد المواعيد</p>';
            const days = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
            const order = [6, 0, 1, 2, 3, 4, 5];
            let groups = [],
                off = [];
            order.forEach(jsDay => {
                const s = d.work_schedule[jsDay];
                if (s && s.active) {
                    const key = `${s.s1_s}-${s.s1_e}-${s.s2_a}`;
                    let g = groups.find(g => g.key === key);
                    if (g) g.days.push(days[jsDay]);
                    else groups.push({ key, days: [days[jsDay]], data: s });
                } else off.push(days[jsDay]);
            });
            let html = '';
            groups.forEach(g => {
                const dTxt = g.days.length === 1 ? g.days[0] : `من ${g.days[0]} إلى ${g.days[g.days.length-1]}`;
                html +=
                    `<div class="schedule-item"><strong>${dTxt}</strong><br>${formatTime12(g.data.s1_s)} - ${formatTime12(g.data.s1_e)}`;
                if (g.data.s2_a) html += `<br>${formatTime12(g.data.s2_s)} - ${formatTime12(g.data.s2_e)}`;
                html += `</div>`;
            });
            if (off.length) html += `<div class="schedule-item"><strong>عطلة:</strong> ${off.join('، ')}</div>`;
            return html;
        }

                        window.location.reload(); return; }
                    const h = Math.floor(diff / 3600000),
                        m = Math.floor((diff % 3600000) / 60000),
                        s = Math.floor((diff % 60000) / 1000);
                    if (countdownEl) countdownEl.innerText =
                        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                };
                updateCountdown();
                maintenanceInterval = setInterval(updateCountdown, 1000);
            }
        }

        function updatePopup() {
            const bubble = document.getElementById('popupBubble'),
                msgSpan = document.getElementById('popupMessage');
            if (!currentData.popup_enabled || !currentData.popup_message) {
                if (bubble) bubble.style.display = 'none';
                if (popupTimeout) clearTimeout(popupTimeout);
                return;
            }
            if (bubble.style.display === 'none' || bubble.style.display === '') {
                msgSpan.innerText = currentData.popup_message;
                bubble.style.display = 'block';
                if (popupTimeout) clearTimeout(popupTimeout);
                popupTimeout = setTimeout(() => { bubble.style.display = 'none'; }, (currentData.popup_duration ||
                    7) * 1000);
            }
        }
        window.closePopup = function() {
            const bubble = document.getElementById('popupBubble');
            if (bubble) bubble.style.display = 'none';
            if (popupTimeout) clearTimeout(popupTimeout);
        };

        // ================================================================
        // REFRESH
        // ================================================================
        function refreshAll() {
            renderPartnersMarquee();
            loadPage();
            updateMaintenanceMode();
            updatePopup();
        }

        // ================================================================
        // INIT SPLASH
        // ================================================================
        function initSplash() {
            const items = [];

            // 1. splash_items (الأولوية الأولى)
            if (currentData.splash_items && currentData.splash_items.length > 0) {
                currentData.splash_items.forEach(item => {
                    items.push({
                        url: item.url,
                        type: item.type || (isVideoUrl(item.url) ? 'video' : 'image')
                    });
                });
            }
            // 2. splash_stories_videos (فيديوهات منفصلة)
            else if (currentData.splash_stories_videos && currentData.splash_stories_videos.length > 0) {
                currentData.splash_stories_videos.forEach(url => {
                    items.push({ url, type: 'video' });
                });
            }
            // 3. splash_media_url (صورة مفردة)
            else if (currentData.splash_media_url) {
                items.push({
                    url: currentData.splash_media_url,
                    type: (currentData.splash_type === 'video' ? 'video' : 'image')
                });
            }

            if (items.length > 0 && currentData.splash_enabled !== false) {
                showStorySplash(items, currentData.splash_duration || 5);
            } else {
                document.getElementById('splash').style.display = 'none';
            }
        }

        // ================================================================
        // INIT
        // ================================================================
        let forceHideTimer = null;

        function forceHideSplash() {
            const splashDiv = document.getElementById('splash');
            if (splashDiv && splashDiv.style.display !== 'none') {
                splashDiv.style.opacity = '0';
                setTimeout(() => { splashDiv.style.display = 'none'; }, 500);
            }
            if (forceHideTimer) clearTimeout(forceHideTimer);
        }

        const maxWaitTime = 5000;
        forceHideTimer = setTimeout(() => {
            console.warn('⚠️ Firebase timeout, forcing splash hide');
            forceHideSplash();
            if (!currentData || Object.keys(currentData).length === 0) { currentData = {};
                refreshAll(); }
        }, maxWaitTime);

        db.ref(DB_PATH).once('value').then(snap => {
            clearTimeout(forceHideTimer);
            currentData = snap.val() || {};
            initSplash();
            refreshAll();
            initChatSystem();
        }).catch(err => {
            console.error('❌ Firebase read error:', err);
            clearTimeout(forceHideTimer);
            currentData = {};
            forceHideSplash();
            refreshAll();
            initChatSystem();
            showToast('حدث خطأ في الاتصال، يتم عرض بيانات تجريبية');
        });

        db.ref(DB_PATH).on('value', snap => {
            if (snap.exists()) { currentData = snap.val();
                refreshAll(); }
        });

        // ================================================================
        // PREVENT IMAGE DOWNLOAD
        // ================================================================
        (function blockImageDownload() {
            function disableContextAndDrag(img) {
                img.addEventListener('contextmenu', (e) => { e.preventDefault(); return false; });
                img.addEventListener('dragstart', (e) => { e.preventDefault(); return false; });
            }
            document.querySelectorAll('img').forEach(disableContextAndDrag);
            const observer = new MutationObserver(() => {
                document.querySelectorAll('img').forEach(img => {
                    if (!img.hasAttribute('data-blocked')) {
                        img.setAttribute('data-blocked', 'true');
                        disableContextAndDrag(img);
                    }
                });
            });
            observer.observe(document.body, { childList: true, subtree: true });
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
                    e.preventDefault();
                    showToast('❌ تم تعطيل حفظ الصور');
                    return false;
                }
                if (e.key === 'F12') { e.preventDefault(); return false; }
                if ((e.ctrlKey || e.metaKey) && (e.key === 'u' || e.key === 'U')) { e.preventDefault(); return false; }
            });
        })();

        window.openAlbum = openAlbum;
        window.openCatalog = openCatalog;
    </script>

</body>
</html>

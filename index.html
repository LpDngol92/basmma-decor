<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: auto; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #ffffff;
            color: #2d2a2a;
            line-height: 1.5;
        }
        :root {
            --primary: #c8a165;
            --primary-dark: #a47e44;
            --primary-light: #f8f1e6;
            --gray: #6f6a64;
            --white: #ffffff;
            --shadow: 0 8px 25px rgba(0,0,0,0.05);
            --shadow-hover: 0 15px 35px rgba(0,0,0,0.1);
        }
        
        /* تحسين عرض صورة البداية (Splash) لجميع الأجهزة */
        #splash {
            position: fixed;
            inset: 0;
            background-color: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        
        /* حاوية الفيديو أو الصورة - تأخذ كامل الشاشة */
        .splash-media-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        /* فيديو يوتيوب أو فيديو عادي - يغطي كامل الشاشة مع الحفاظ على النسبة */
        .splash-media {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
        }
        
        /* اذا كان الفيديو من يوتيوب (iframe) */
        .splash-iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            pointer-events: none;
        }
        
        /* للفيديو العادي (video tag) */
        video.splash-media {
            object-fit: cover;
        }
        
        /* للصور */
        img.splash-media {
            object-fit: cover;
        }
        
        /* زر التخطي */
        .splash-skip {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            backdrop-filter: blur(4px);
            z-index: 10000;
            transition: 0.2s;
        }
        .splash-skip:hover {
            background: rgba(0,0,0,0.8);
            transform: translateX(-50%) scale(1.05);
        }
        
        /* تحسينات للأجهزة الصغيرة */
        @media (max-width: 768px) {
            .splash-skip {
                bottom: 20px;
                padding: 6px 16px;
                font-size: 0.8rem;
            }
        }
        
        .header {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo h1 {
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: clamp(1rem, 3vw, 1.8rem);
            flex-wrap: wrap;
        }
        .nav-links a {
            text-decoration: none;
            font-weight: 600;
            color: #333;
            transition: 0.2s;
            cursor: pointer;
            font-size: clamp(0.85rem, 3vw, 1rem);
        }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        .partners-marquee {
            background: #fdf7ef;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            overflow: hidden;
            white-space: nowrap;
        }
        .marquee-track {
            display: inline-flex;
            gap: 40px;
            animation: marqueeFlow 35s linear infinite;
        }
        .marquee-track:hover { animation-play-state: paused; }
        @keyframes marqueeFlow { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .partner-item {
            background: white;
            border-radius: 60px;
            padding: 5px 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid rgba(201,169,110,0.3);
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .partner-item:hover { transform: translateY(-3px); border-color: var(--primary); }
        .partner-logo { height: 45px; max-width: 120px; object-fit: contain; }
        @media (max-width: 700px) { .partner-logo { height: 35px; max-width: 80px; } .partner-item { padding: 3px 15px; } }
        .hero {
            background: linear-gradient(135deg, #fef9f0, #fffaf5);
            padding: clamp(2rem, 8vw, 5rem) 20px;
            text-align: center;
        }
        .hero h1 { font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 800; color: var(--primary-dark); margin-bottom: 1rem; }
        .hero p { font-size: clamp(1rem, 4vw, 1.2rem); color: #5a5a5a; max-width: 700px; margin: 0 auto 2rem; }
        .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 0.7rem 1.8rem; border-radius: 60px; font-weight: 600; text-decoration: none; transition: 0.2s; font-size: clamp(0.8rem, 3vw, 1rem); display: inline-block; cursor: pointer; border: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-3px); }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: var(--primary); color: white; }
        .section { padding: clamp(2rem, 6vw, 4rem) 0; }
        .section-title { font-size: clamp(1.5rem, 5vw, 2rem); font-weight: 700; text-align: center; margin-bottom: 2rem; color: var(--primary-dark); position: relative; }
        .section-title::after { content: ''; display: block; width: 70px; height: 3px; background: var(--primary); margin: 0.5rem auto 0; }
        
        /* Carousel Styles */
        .carousel-container {
            position: relative;
            overflow: hidden;
            padding: 20px 0;
        }
        .carousel-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
            gap: 20px;
        }
        .carousel-slide {
            flex: 0 0 calc(25% - 15px);
            min-width: calc(25% - 15px);
            background: var(--white);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: 0.3s;
            cursor: pointer;
        }
        .carousel-slide:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }
        .carousel-slide img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            cursor: pointer;
        }
        .carousel-slide .product-info {
            padding: 1rem;
            text-align: center;
        }
        .carousel-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .carousel-button:hover {
            background: var(--primary);
            transform: translateY(-50%) scale(1.05);
        }
        .carousel-button-prev {
            right: 10px;
        }
        .carousel-button-next {
            left: 10px;
        }
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .carousel-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ddd;
            cursor: pointer;
            transition: 0.2s;
        }
        .carousel-dot.active {
            background: var(--primary);
            width: 30px;
            border-radius: 10px;
        }
        @media (max-width: 1024px) {
            .carousel-slide { flex: 0 0 calc(33.333% - 14px); min-width: calc(33.333% - 14px); }
        }
        @media (max-width: 768px) {
            .carousel-slide { flex: 0 0 calc(50% - 10px); min-width: calc(50% - 10px); }
        }
        @media (max-width: 480px) {
            .carousel-slide { flex: 0 0 calc(100% - 0px); min-width: calc(100% - 0px); }
            .carousel-button { width: 35px; height: 35px; font-size: 1rem; }
        }
        
        .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2rem; }
        .card {
            background: var(--white);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
            position: relative;
        }
        .card:hover { transform: translateY(-8px); box-shadow: var(--shadow-hover); }
        .card-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .card-img:hover { transform: scale(1.05); }
        .card-body { padding: 1.2rem; }
        .card-title { font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); }
        .product-card {
            background: var(--white);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: 0.3s;
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
        .product-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .product-img:hover { transform: scale(1.02); }
        .product-info { padding: 1rem; text-align: center; }
        .whatsapp-order { background: #25D366; color: white; border: none; width: 100%; padding: 10px; border-radius: 50px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .whatsapp-order:hover { background: #1da15a; transform: scale(1.02); }
        .footer { background: #1e1e1e; color: #ccc; padding: 3rem 0 1rem; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 2rem; }
        .footer h4 { color: var(--primary); margin-bottom: 1rem; }
        .schedule-item { margin-bottom: 0.8rem; }
        .social-icons { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; justify-content: center; }
        .social-icons a { background: #333; width: 42px; height: 42px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem; transition: 0.2s; }
        .social-icons a:hover { background: var(--primary); }
        .copyright { text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #333; }
        
        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .lightbox-container {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 0;
            background: #000;
        }
        .lightbox-image-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .lightbox-img {
            max-width: 95%;
            max-height: 85vh;
            object-fit: contain;
            transform-origin: center center;
            cursor: grab;
            user-select: none;
            transition: transform 0.05s linear;
            image-rendering: -webkit-optimize-contrast;
        }
        .lightbox-img:active { cursor: grabbing; }
        .lightbox-info {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            z-index: 2001;
        }
        .lightbox-counter {
            background: rgba(255,255,255,0.2);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            color: white;
        }
        .lightbox-wa-btn, .lightbox-nav {
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            font-size: 1rem;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .lightbox-wa-btn:hover, .lightbox-nav:hover { transform: scale(1.05); }
        .lightbox-wa-btn { background: #25D366; }
        .lightbox-wa-btn:hover { background: #1da15a; }
        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 1.4rem;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2001;
        }
        @media (max-width: 700px) {
            .lightbox-info { gap: 12px; padding: 10px; }
            .lightbox-counter { padding: 4px 12px; font-size: 0.8rem; }
            .lightbox-wa-btn, .lightbox-nav { padding: 6px 12px; font-size: 0.8rem; }
            .lightbox-img { max-width: 98%; max-height: 80vh; }
        }
        
        .catalog-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;

        .catalog-modal-content {
            background: white;

        }
        .catalog-modal-close {
            position: absolute;

            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 3001;
        }
        .catalog-modal-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e1e;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            z-index: 2001;
            display: none;
        }
        .empty-state { text-align: center; padding: 2rem; color: var(--gray); }
        .maintenance-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            z-index: 9998;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .popup-bubble {
            position: fixed;
            bottom: 20px;
            right: 20px;
            max-width: 280px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: none;
            z-index: 10000;
            border-right: 4px solid var(--primary);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .zoom-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 2002;
            opacity: 0;
            transition: opacity 0.3s;
        }
        @media (max-width: 700px) {
            .toast { white-space: normal; width: 80%; text-align: center; }
            .nav-bar { flex-direction: column; text-align: center; }
            .nav-links { justify-content: center; }
        }
    </style>
</head>

    // وظيفة محسنة لعرض صورة البداية (Splash) تدعم الفيديو من يوتيوب وجميع الأجهزة
    function showSplash(settings) {
        const splashDiv = document.getElementById('splash');
        if (!splashDiv) return;
        splashDiv.innerHTML = '';
        
        if (!settings.enabled) { 
            splashDiv.style.display = 'none'; 
            return; 
        }
        
        const mediaType = settings.type || 'image';
        const mediaUrl = settings.media_url || '';
        const videoUrl = settings.video_url || '';
        const duration = (settings.duration || 5) * 1000;
        const showSkip = settings.show_skip === true;
        
        // إنشاء حاوية للمحتوى
        const container = document.createElement('div');
        container.className = 'splash-media-container';
        
        let mediaElement;
        
        // التحقق إذا كان الرابط من يوتيوب ( embed أو watch )
        const isYoutube = (url) => {
            if (!url) return false;
            return url.includes('youtube.com') || url.includes('youtu.be');
        };
        
        // معالجة فيديو يوتيوب
        if (mediaType === 'video' && (videoUrl || mediaUrl) && isYoutube(videoUrl || mediaUrl)) {
            let youtubeId = '';
            let url = videoUrl || mediaUrl;
            
            // استخراج ID الفيديو من رابط يوتيوب
            if (url.includes('youtu.be/')) {
                youtubeId = url.split('youtu.be/')[1]?.split('?')[0];
            } else if (url.includes('embed/')) {
                youtubeId = url.split('embed/')[1]?.split('?')[0];
            } else if (url.includes('v=')) {
                youtubeId = url.split('v=')[1]?.split('&')[0];
            }
            
            if (youtubeId) {
                const iframe = document.createElement('iframe');
                iframe.className = 'splash-iframe';
                iframe.src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${youtubeId}&modestbranding=1&showinfo=0&rel=0`;
                iframe.allow = 'autoplay; encrypted-media';
                iframe.frameBorder = '0';
                iframe.setAttribute('allowfullscreen', '');
                mediaElement = iframe;
            } else {
                // إذا لم نستطع استخراج ID، استخدم فيديو عادي
                mediaElement = document.createElement('video');
                mediaElement.autoplay = true;
                mediaElement.muted = true;
                mediaElement.loop = true;
                mediaElement.playsInline = true;
                mediaElement.className = 'splash-media';
                const source = document.createElement('source');
                source.src = videoUrl || mediaUrl;
                source.type = 'video/mp4';
                mediaElement.appendChild(source);
            }
        } 
        // معالجة فيديو عادي
        else if (mediaType === 'video' && (videoUrl || mediaUrl)) {
            const video = document.createElement('video');
            video.autoplay = true;
            video.muted = true;
            video.loop = true;
            video.playsInline = true;
            video.className = 'splash-media';
            const source = document.createElement('source');
            source.src = videoUrl || mediaUrl;
            source.type = 'video/mp4';
            video.appendChild(source);
            mediaElement = video;
        } 
        // معالجة صورة
        else {
            const img = document.createElement('img');
            img.src = mediaUrl || '';
            img.className = 'splash-media';
            img.alt = 'Splash';
            mediaElement = img;
        }
        
        if (mediaElement) {
            container.appendChild(mediaElement);
            splashDiv.appendChild(container);
        }
        
        // إضافة زر التخطي
        if (showSkip) {
            const skipBtn = document.createElement('button');
            skipBtn.innerText = 'تخطي ←';
            skipBtn.className = 'splash-skip';
            skipBtn.onclick = () => {
                clearTimeout(splashTimeout);
                splashDiv.style.opacity = '0';
                setTimeout(() => { splashDiv.style.display = 'none'; }, 500);
            };
            splashDiv.appendChild(skipBtn);
        }
        
        splashDiv.style.display = 'flex';
        splashDiv.style.opacity = '1';
        
        if (splashTimeout) clearTimeout(splashTimeout);
        const splashTimeout = setTimeout(() => {
            splashDiv.style.opacity = '0';
            setTimeout(() => { splashDiv.style.display = 'none'; }, 500);
        }, duration);
    }

    let splashTimeout;
    
    // باقي دوال الموقع كما هي (مختصرة للمساحة)
    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }

    window.openAlbum = openAlbum;
    window.openCatalog = openCatalog;
    
    // ربط أحداث lightbox
    document.getElementById('lightboxPrev').onclick = () => prevImage();
    document.getElementById('lightboxNext').onclick = () => nextImage();
    document.getElementById('lightboxClose').onclick = () => closeLightbox();
    document.getElementById('lightboxWhatsappBtn').onclick = () => sendWhatsapp();
    document.querySelector('.catalog-modal-close').onclick = closeCatalogModal;
    if(document.getElementById('catalogModal')) {
        document.getElementById('catalogModal').addEventListener('click', (e) => { if(e.target === document.getElementById('catalogModal')) closeCatalogModal(); });
    }
    
    // تحميل البيانات من Firebase
    db.ref(DB_PATH).once('value', snap => {
        currentData = snap.val() || {};
        showSplash({
            enabled: currentData.splash_enabled !== false,
            type: currentData.splash_type || 'image',
            media_url: currentData.splash_media_url || '',
            video_url: currentData.splash_video_url || '',
            duration: currentData.splash_duration || 5,
            show_skip: currentData.splash_show_skip === true
        });
        refreshAll();
    });
    
    db.ref(DB_PATH).on('value', snap => { 
        currentData = snap.val() || {}; 
        refreshAll();

    function format12(t) { if(!t) return ''; let [h,m]=t.split(':'); h=parseInt(h); return `${h%12||12}:${m} ${h>=12?'م':'ص'}`; }
    function drawClock(canvasId,isOpen){
        const c=document.getElementById(canvasId); if(!c) return; const ctx=c.getContext('2d'); const size=c.width=c.height=130; const cx=size/2,r=size/2-5; const n=new Date(); let h=n.getHours()%12,m=n.getMinutes(),s=n.getSeconds();
        const ha=(h*30+m*0.5)*Math.PI/180, ma=(m*6+s*0.1)*Math.PI/180, sa=(s*6)*Math.PI/180;

        for(let i=1;i<=12;i++){ let an=i*30*Math.PI/180; let x1=cx+(r-12)*Math.sin(an), y1=cx-(r-12)*Math.cos(an); let x2=cx+(r-5)*Math.sin(an), y2=cx-(r-5)*Math.cos(an); ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.strokeStyle='#b88b4a'; ctx.lineWidth=2; ctx.stroke(); }
        ctx.beginPath(); ctx.moveTo(cx,cx); ctx.lineTo(cx+(r*0.45)*Math.sin(ha), cx-(r*0.45)*Math.cos(ha)); ctx.strokeStyle='#5d4037'; ctx.lineWidth=4; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx,cx); ctx.lineTo(cx+(r*0.65)*Math.sin(ma), cx-(r*0.65)*Math.cos(ma)); ctx.strokeStyle='#5d4037'; ctx.lineWidth=3; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx,cx); ctx.lineTo(cx+(r*0.75)*Math.sin(sa), cx-(r*0.75)*Math.cos(sa)); ctx.strokeStyle='#c9a96e'; ctx.lineWidth=1.5; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx,cx,4,0,2*Math.PI); ctx.fillStyle='#b88b4a'; ctx.fill();
    }
    function updateStatus(){
        if(!currentData.work_schedule) return;
        const n=new Date(), day=n.getDay(), s=currentData.work_schedule[day];
        let open=false;
        if(s&&s.active){
            const toM=(t)=>{ let [h,m]=t.split(':').map(Number); return h*60+m; };
            const cur=n.getHours()*60+n.getMinutes();
            if(cur>=toM(s.s1_s) && cur<toM(s.s1_e)) open=true;
            if(!open && s.s2_a && s.s2_s && s.s2_e){
                let s2=toM(s.s2_s), e2=toM(s.s2_e);
                if((e2<s2 && (cur>=s2 || cur<e2)) || (cur>=s2 && cur<e2)) open=true;
            }
        }
        drawClock('clockCanvas',open);
        document.getElementById('digitalTime').innerText=n.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
        document.getElementById('statusBadge').innerHTML=open?'<span class="status-badge status-open"><i class="fas fa-circle" style="font-size:0.6rem;"></i> مفتوح الآن</span>':'<span class="status-badge status-closed"><i class="fas fa-circle"></i> مغلق حالياً</span>';
    }
    function getGroupedSchedule(){
        if(!currentData.work_schedule) return '<p>لم تحدد المواعيد</p>';
        const names=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"], order=[6,0,1,2,3,4,5];
        let groups=[], off=[];
        order.forEach(j=>{ let s=currentData.work_schedule[j]; if(s&&s.active){ let key=`${s.s1_s}-${s.s1_e}-${s.s2_a}`; let g=groups.find(g=>g.key===key); if(g) g.days.push(names[j]); else groups.push({key,days:[names[j]],data:s}); } else off.push(names[j]); });
        let html='';
        groups.forEach(g=>{ let dText=g.days.length===1?g.days[0]:`من ${g.days[0]} إلى ${g.days[g.days.length-1]}`; html+=`<div class="schedule-group"><div class="schedule-days">${dText}</div><div class="time-period"><span class="time-text">${format12(g.data.s1_s||'09:00')}</span> — <span class="time-text">${format12(g.data.s1_e||'17:00')}</span></div>`; if(g.data.s2_a) html+=`<div class="time-period"><span class="time-text">${format12(g.data.s2_s)}</span> — <span class="time-text">${format12(g.data.s2_e)}</span></div>`; html+=`</div>`; });
        if(off.length) html+=`<div class="holiday-text" style="background:#fff0ea; padding:8px; border-radius:20px; margin-top:8px;"><i class="fas fa-moon"></i> عطلة: ${off.join('، ')}</div>`;
        return html;
    }

    // تقييمات
    function renderReviews(){
        let revHtml='';
        if(currentData.reviews && Object.keys(currentData.reviews).length){
            revHtml='<div class="reviews-list">';
            Object.keys(currentData.reviews).forEach(id=>{ let r=currentData.reviews[id]; revHtml+=`<div class="review-card"><div class="review-header"><div class="review-avatar"><i class="fas fa-user-alt"></i></div><div><div class="review-name">${r.name}</div><div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div></div></div><div class="review-message">${r.message}</div></div>`; });
            revHtml+='</div>';
        } else revHtml='<div class="empty-state">لا توجد تقييمات بعد</div>';
        let formHtml=`<div class="add-review-form"><h4><i class="fas fa-edit"></i> أضف تقييمك</h4><input type="text" id="reviewName" placeholder="اسمك الكريم"><div class="star-rating" id="starRating"><i class="fas fa-star" data-star="5"></i><i class="fas fa-star" data-star="4"></i><i class="fas fa-star" data-star="3"></i><i class="fas fa-star" data-star="2"></i><i class="fas fa-star" data-star="1"></i></div><textarea id="reviewMsg" rows="2" placeholder="شاركنا تجربتك..."></textarea><button onclick="submitReview()" style="background:var(--primary);color:white;border:none;padding:12px;border-radius:60px;font-weight:600;">إرسال التقييم</button></div>`;
        return `<div class="glass-card"><div class="card-title"><i class="fas fa-star"></i> آراء العملاء</div>${revHtml}${formHtml}</div>`;
    }
    function submitReview(){ let name=document.getElementById('reviewName')?.value; let msg=document.getElementById('reviewMsg')?.value; let rating=0; document.querySelectorAll('#starRating i').forEach((st,idx)=>{ if(st.classList.contains('active')) rating=5-idx; }); if(!name||!msg||!rating) return showToast('أكمل البيانات'); db.ref(DB_PATH+'/reviews').push({name,message:msg,rating}).then(()=>{ showToast('شكراً'); document.getElementById('reviewName').value=''; document.getElementById('reviewMsg').value=''; document.querySelectorAll('#starRating i').forEach(s=>s.classList.remove('active')); renderCurrentPage(); }); }
    function setupStars(){ let selected=0; document.querySelectorAll('#starRating i').forEach(s=>{ s.onclick=()=>{ selected=parseInt(s.dataset.star); document.querySelectorAll('#starRating i').forEach(st=>st.classList.remove('active')); for(let i=document.querySelectorAll('#starRating i').length-1; i>=document.querySelectorAll('#starRating i').length-selected; i--) document.querySelectorAll('#starRating i')[i]?.classList.add('active'); }; }); }

    // المتجر
    function renderStore(){
        if(currentStoreCategory===null){
            if(!currentData.store_categories || !Object.keys(currentData.store_categories).length) return '<div class="empty-state"><i class="fas fa-store"></i><p>لا توجد أقسام</p></div>';
            let html='<div class="categories-grid">';
            Object.keys(currentData.store_categories).forEach(id=>{ let cat=currentData.store_categories[id]; let cover=cat.imgs?Object.values(cat.imgs)[0]?.url:''; html+=`<div class="category-card" onclick="selectStoreCat('${id}')">${cover?`<img src="${cover}" loading="lazy">`:'<i class="fas fa-layer-group fa-3x"></i>'}<h3>${cat.name||'قسم'}</h3></div>`; });
            html+='</div>'; return html;
        } else {
            let cat=currentData.store_categories[currentStoreCategory];
            if(!cat||!cat.imgs||!Object.keys(cat.imgs).length) return '<div class="empty-state">لا توجد منتجات</div>';
            let products=Object.values(cat.imgs).map(i=>i.url);
            let html=`<div style="margin-bottom:20px;"><button class="tab-btn" onclick="backToStore()" style="background:var(--primary);color:white;"><i class="fas fa-arrow-right"></i> العودة للأقسام</button></div><div class="products-grid">`;
            products.forEach((url,idx)=>{ html+=`<div class="product-card" onclick="openProduct('${url}',${idx},${JSON.stringify(products).replace(/"/g,'&quot;')})"><img src="${url}" class="product-img" loading="lazy"><div class="product-info"><button class="whatsapp-order-btn" onclick="event.stopPropagation(); window.open('https://wa.me/${currentData.whatsapp_num||'966500000000'}?text=${encodeURIComponent('طلب منتج:\n'+url)}','_blank')"><i class="fab fa-whatsapp"></i> طلب عبر واتساب</button></div></div>`; });
            html+='</div>'; return html;
        }
    }
    function selectStoreCat(id){ currentStoreCategory=id; renderCurrentPage(); renderTabs(); }
    function backToStore(){ currentStoreCategory=null; renderCurrentPage(); renderTabs(); }
    function openProduct(url,idx,list){ openViewer(list,idx); }

    // أعمالنا - الألبومات
    function renderWorks(){
        if(!currentData.albums || !Object.keys(currentData.albums).length) return '<div class="empty-state"><i class="fas fa-folder-open"></i><p>لا توجد ألبومات بعد</p></div>';
        let html='<div class="albums-grid">';
        Object.keys(currentData.albums).forEach(id=>{ let alb=currentData.albums[id]; let cover=alb.imgs?Object.values(alb.imgs)[0]?.url:''; html+=`<div class="album-card" data-album-id="${id}">${cover?`<img src="${cover}" loading="lazy">`:'<i class="fas fa-folder-open fa-3x"></i>'}<h4>${alb.name||'ألبوم'}</h4></div>`; });
        html+='</div>'; return html;
    }
    function openAlbum(id){
        let alb=currentData.albums?.[id];
        if(!alb||!alb.imgs) { showToast("لا توجد صور"); return; }
        let images=Object.values(alb.imgs).map(i=>i.url).filter(u=>u);
        if(images.length) openViewer(images,0);
        else showToast("لا توجد صور صالحة");
    }

    // الصفحة الرئيسية (المتجر + التقييمات + الساعات)
    function renderHome(){
        return `<h2 style="margin-bottom:20px;"><i class="fas fa-store"></i> منتجاتنا</h2>${renderStore()}<div class="two-columns">${renderReviews()}<div class="glass-card"><div class="card-title"><i class="fas fa-clock"></i> أوقات العمل</div><div class="clock-wrapper"><div class="analog-clock"><canvas id="clockCanvas" width="130" height="130"></canvas></div><div class="digital-time" id="digitalTime">--:--</div><div id="statusBadge" style="margin-top:8px;"></div></div><div class="schedule-list">${getGroupedSchedule()}</div></div></div>`;
    }

    function renderCurrentPage(){
        let main=document.getElementById('mainContent'); if(!main) return;
        let content='';
        if(currentPage==='home') content=renderHome();
        else if(currentPage==='works') content=`<h2 style="margin-bottom:20px;"><i class="fas fa-images"></i> أعمالنا</h2>${renderWorks()}`;
        else if(currentPage==='store') content=`<h2 style="margin-bottom:20px;"><i class="fas fa-store"></i> متجرنا</h2>${renderStore()}`;
        else content='<div class="empty-state">صفحة غير موجودة</div>';
        main.innerHTML=content;
        document.getElementById('siteTitle').innerText=currentData.site_name||'بصمة غير';
        if(currentPage==='home'||currentPage==='store'){
            if(clockInterval) clearInterval(clockInterval);
            setTimeout(()=>{ updateStatus(); clockInterval=setInterval(updateStatus,1000); },100);
        } else if(clockInterval) clearInterval(clockInterval);
        setTimeout(setupStars,200);
        attachAlbumEvents();
        // تحديث أزرار التواصل
        let wBtn=document.getElementById('whatsappFixedBtn'); if(wBtn) wBtn.href=`https://wa.me/${currentData.whatsapp_num||'966500000000'}?text=${encodeURIComponent('السلام عليكم')}`;
        let lBtn=document.getElementById('locationFixedBtn'); if(lBtn&&currentData.location_url) lBtn.href=currentData.location_url;
    }
    function attachAlbumEvents(){ document.querySelectorAll('.album-card').forEach(c=>{ c.removeEventListener('click',albumHandler); c.addEventListener('click',albumHandler); }); }
    function albumHandler(e){ let id=this.dataset.albumId; if(id) openAlbum(id); }

    function renderTabs(){
        let c=document.getElementById('tabsSection'); if(!c) return;
        c.innerHTML=`
            <button class="tab-btn ${currentPage==='home'?'active':''}" data-page="home"><i class="fas fa-home"></i> الرئيسية</button>
            <button class="tab-btn ${currentPage==='works'?'active':''}" data-page="works"><i class="fas fa-images"></i> أعمالنا</button>
            <button class="tab-btn ${currentPage==='store'?'active':''}" data-page="store"><i class="fas fa-store"></i> المتجر</button>
        `;
        document.querySelectorAll('.tab-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ let page=btn.dataset.page; if(page && page!==currentPage){ currentPage=page; currentStoreCategory=null; renderCurrentPage(); renderTabs(); } }); });
        setTimeout(()=>{ let a=document.querySelector('.tab-btn.active'); if(a) a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); },100);
    }
    function renderPartners(){
        let cont=document.getElementById('partnersMarquee'), track=document.getElementById('marqueeTrack');
        if(!cont||!track) return;
        if(currentData.partners && Object.keys(currentData.partners).length){
            cont.style.display='block';
            let logos=Object.values(currentData.partners).map(p=>`<div class="partner-item" onclick="window.open('${p.link||'#'}','_blank')"><img src="${p.url}" class="partner-logo" loading="lazy"></div>`).join('');
            track.innerHTML=logos+logos;
        } else cont.style.display='none';
    }
    function showSplash(imgUrl){
        let splash=document.getElementById('splash'), img=document.getElementById('splashImg');
        if(imgUrl){ img.src=imgUrl; img.style.display='block'; }
        splash.style.display='flex';
        setTimeout(()=>{ splash.style.opacity='0'; setTimeout(()=>splash.style.display='none',600); },5000);
    }
    function checkMaintenance(){
        if(!currentData.maintenance_mode){ document.getElementById('maintenanceScreen').style.display='none'; return false; }
        let until=currentData.maintenance_until;
        if(until && until<=Date.now()){ db.ref(DB_PATH).update({maintenance_mode:false}); return false; }
        document.getElementById('maintenanceTitle').innerText=currentData.maintenance_title||'صيانة';
        document.getElementById('maintenanceMessage').innerText=currentData.maintenance_message||'جاري التطوير';
        if(until){
            let upd=()=>{ let diff=until-Date.now(); if(diff<=0){ clearInterval(maintInterval); window.location.reload(); } let h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000); document.getElementById('countdownDisplay').innerText=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; };
            upd(); maintInterval=setInterval(upd,1000);
        }
        document.getElementById('maintenanceScreen').style.display='flex'; return true;
    }

    window.addEventListener('load',()=>{ db.ref(DB_PATH).once('value',s=>{ showSplash(s.val()?.splash_image_url||''); }); });
    db.ref(DB_PATH).on('value',snap=>{ currentData=snap.val()||{}; if(checkMaintenance()) return; currentStoreCategory=null; currentPage='home'; renderTabs(); renderCurrentPage(); renderPartners(); });
    window.selectStoreCat=selectStoreCat; window.backToStore=backToStore; window.openProduct=openProduct; window.openAlbum=openAlbum; window.submitReview=submitReview; window.closeViewer=closeViewer; window.viewerNext=viewerNext; window.viewerPrev=viewerPrev; window.viewerWhatsapp=viewerWhatsapp;
</script>
</body>
</html>

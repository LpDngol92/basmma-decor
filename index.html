<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>بصمة غير | معرض تفاعلي فاخر لديكورات المعارض والمحلات</title>
    <meta name="description" content="بصمة غير - تجربة ديكور فريدة. أشغال خشبية، معارض، محلات تجارية في جدة.">
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/LpDngol92/my-images/images/20260504_203712_%D8%AA%D8%B5%D9%85%D9%8A%D9%85%20%D8%A8%D8%AF%D9%88%D9%86%20%D8%B9%D9%86%D9%88%D8%A7%D9%86%20(3).png">
    <meta property="og:image" content="https://i.ibb.co/CsmG3G7r/1.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f8f6f2;
            color: #1e1e1e;
            line-height: 1.5;
            overflow-x: hidden;
        }
        :root {
            --gold: #D4AF37;
            --gold-dark: #b68b2a;
            --gold-light: #f5e2b0;
            --dark: #1c1c1a;
            --gray-bg: #efede8;
            --white-smoke: #faf9f6;
        }

        /* ---------- هيدر ذكي ---------- */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 2rem;
            transition: all 0.3s ease;
            background: transparent;
        }
        .header.scrolled {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            padding: 0.5rem 2rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.4);
        }
        .header .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 {
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), #fff0c0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.5rem 0;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }
        /* قائمة سفلية للجوال */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(16px);
            padding: 0.6rem 1rem;
            justify-content: space-around;
            z-index: 1100;
            border-top: 1px solid rgba(212,175,55,0.3);
        }
        .bottom-nav a {
            color: #ccc;
            text-align: center;
            font-size: 0.7rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
        }
        .bottom-nav a i { font-size: 1.4rem; }
        .bottom-nav a.active, .bottom-nav a:hover { color: var(--gold); }
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .bottom-nav { display: flex; }
            .header { padding: 0.8rem 1rem; }
        }

        /* زر واتساب عائم */
        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #25D366;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1050;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.2s;
            border: none;
            color: white;
            font-size: 1.8rem;
        }
        .whatsapp-float:hover { transform: scale(1.08); background: #1da15a; }

        /* سحابة الشركاء (حركة ذكية) */
        .partners-cloud {
            background: #0a0a0a;
            padding: 2rem 0;
            overflow: hidden;
            margin-top: 70px;
            border-bottom: 1px solid rgba(212,175,55,0.2);
        }
        .cloud-track {
            display: flex;
            gap: 3rem;
            width: max-content;
        }
        .cloud-track.reverse {
            animation: scrollReverse 45s linear infinite;
        }
        .cloud-track:not(.reverse) {
            animation: scrollNormal 40s linear infinite;
        }
        @keyframes scrollNormal {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        @keyframes scrollReverse {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }
        .partner-logo-item {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.8rem;
            border-radius: 60px;
            border: 1px solid rgba(212,175,55,0.4);
            transition: 0.2s;
            cursor: pointer;
        }
        .partner-logo-item:hover {
            transform: scale(1.05);
            background: rgba(212,175,55,0.2);
            border-color: var(--gold);
        }
        .partner-logo-item img {
            height: 50px;
            max-width: 130px;
            object-fit: contain;
            filter: brightness(0.9);
        }
        .partner-logo-item:hover img { filter: brightness(1); }

        /* السلايدر ثلاثي الأبعاد */
        .hero-slider-3d {
            position: relative;
            width: 100%;
            min-height: 90vh;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .slider-bg-blur {
            position: absolute;
            inset: 0;
            filter: blur(50px);
            opacity: 0.7;
            background-size: cover;
            background-position: center;
            transition: 0.5s;
            z-index: 0;
        }
        .slider-stage {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 400px;
        }
        .slider-image-card {
            width: 100%;
            aspect-ratio: 9 / 16;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 30px 40px rgba(0,0,0,0.5);
            cursor: pointer;
            border: 2px solid var(--gold);
            transition: 0.2s;
        }
        .slider-image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slider-nav-buttons {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 10;
        }
        .slider-nav-buttons button {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid var(--gold);
            color: var(--gold);
            font-size: 1.2rem;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .slider-nav-buttons button:hover {
            background: var(--gold);
            color: #000;
            transform: scale(1.05);
        }
        .slider-progress-ring {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 14px;
            border-radius: 40px;
            color: var(--gold);
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 10;
        }

        /* شبكة الأعمال (جدارية متجاوبة) */
        .masonry-grid {
            column-count: 3;
            column-gap: 1.5rem;
        }
        .masonry-card {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            transition: 0.25s ease;
            position: relative;
        }
        .masonry-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.15);
        }
        .masonry-card .img-square {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }
        .masonry-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s;
        }
        .masonry-card:hover img { transform: scale(1.04); }
        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            padding: 1rem;
            color: white;
            transform: translateY(100%);
            transition: 0.3s;
        }
        .masonry-card:hover .card-overlay {
            transform: translateY(0);
        }
        .card-overlay div {
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .card-overlay i { color: var(--gold); margin-left: 5px; }
        @media (max-width: 992px) {
            .masonry-grid { column-count: 2; }
        }
        @media (max-width: 576px) {
            .masonry-grid { column-count: 1; }
        }

        .section-title {
            font-size: clamp(1.6rem, 5vw, 2rem);
            text-align: center;
            margin: 2rem 0 1.5rem;
            color: #2c2b28;
            font-weight: 800;
        }
        .section-title:after {
            content: '';
            display: block;
            width: 70px;
            height: 3px;
            background: var(--gold);
            margin: 0.5rem auto;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .footer {
            background: #0c0b0a;
            padding: 1.5rem;
            text-align: center;
            color: #aaa;
            margin-top: 3rem;
            font-size: 0.85rem;
        }
        /* لايت بوكس محسن */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.97);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .lightbox-controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }
        .lightbox-controls button {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border: 1px solid var(--gold);
            color: var(--gold);
            font-size: 1.1rem;
            padding: 10px 24px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
        }
        .lightbox-controls button:hover {
            background: var(--gold);
            color: #000;
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            font-size: 1.5rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }
        .lightbox-close:hover {
            background: #dc3545;
            transform: scale(1.05);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e1e;
            color: white;
            padding: 8px 24px;
            border-radius: 60px;
            z-index: 2001;
            display: none;
            font-size: 0.9rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #777;
        }
    </style>
</head>
<body>

<div id="splash" style="display:none;"></div>
<div class="header" id="mainHeader">
    <div class="container">
        <div class="logo"><h1 id="siteTitle">بصمة غير</h1></div>
        <div class="nav-links" id="navLinks"></div>
    </div>
</div>
<div class="bottom-nav" id="bottomNav"></div>
<div class="whatsapp-float" id="whatsappFloatBtn"><i class="fab fa-whatsapp"></i></div>

<div id="partnersCloud" class="partners-cloud" style="display:none;">
    <div class="cloud-track" id="cloudTrack1"></div>
    <div class="cloud-track reverse" id="cloudTrack2"></div>
</div>

<main id="mainContent"></main>

<footer class="footer">
    <div class="container">
        <div id="footerCopyright">© 2025 بصمة غير - جميع الحقوق محفوظة</div>
    </div>
</footer>

<div id="lightbox" class="lightbox">
    <button class="lightbox-close" id="closeLightboxBtn"><i class="fas fa-times"></i></button>
    <img id="lightboxImg" alt="تكبير">
    <div class="lightbox-controls">
        <button id="lightboxPrev"><i class="fas fa-chevron-right"></i> السابق</button>
        <button id="lightboxNext">التالي <i class="fas fa-chevron-left"></i></button>
        <button id="lightboxWhatsapp"><i class="fab fa-whatsapp"></i> استفسار</button>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let currentPage = 'home';
    let sliderImages = [];
    let sliderCurrent = 0;
    let sliderInterval;
    let currentWhatsappNum = '966541780995';
    let isSliderPaused = false;

    // ---------- المساعدات ----------
    function showToast(msg) {
        const t = document.getElementById('toastMsg');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    // ---------- شركاء النجاح ----------
    function renderPartnersCloud() {
        const partners = currentData.partners;
        const cloud1 = document.getElementById('cloudTrack1');
        const cloud2 = document.getElementById('cloudTrack2');
        if (!partners || Object.keys(partners).length === 0) {
            document.getElementById('partnersCloud').style.display = 'none';
            return;
        }
        document.getElementById('partnersCloud').style.display = 'block';
        let html = '';
        Object.values(partners).forEach(p => {
            html += `<div class="partner-logo-item" onclick="window.open('${p.link || '#'}', '_blank')">
                        <img src="${p.url}" loading="lazy" onerror="this.src='https://placehold.co/200x60?text=شريك'">
                    </div>`;
        });
        cloud1.innerHTML = html + html;
        cloud2.innerHTML = html + html;
    }

    // ---------- السلايدر ----------
    function buildHeroSlider() {
        const container = document.getElementById('heroSliderContainer');
        if (!container) return;
        const sliderData = currentData.home_slider;
        if (!sliderData || !sliderData.enabled || !sliderData.images || sliderData.images.length === 0) {
            container.innerHTML = '<div class="empty-state">⚠️ لا توجد صور في السلايدر. أضف صوراً من لوحة الإدارة.</div>';
            return;
        }
        sliderImages = sliderData.images.map(img => img.url).filter(url => url);
        if (sliderImages.length === 0) return;
        sliderCurrent = 0;
        const duration = (sliderData.duration || 5) * 1000;
        container.innerHTML = `
            <div class="hero-slider-3d">
                <div class="slider-bg-blur" id="sliderBgBlur" style="background-image: url('${sliderImages[0]}')"></div>
                <div class="slider-stage">
                    <div class="slider-image-card" id="sliderMainCard">
                        <img src="${sliderImages[0]}" id="sliderMainImg">
                    </div>
                </div>
                <div class="slider-nav-buttons">
                    <button id="sliderPrev"><i class="fas fa-chevron-right"></i></button>
                    <button id="sliderNext"><i class="fas fa-chevron-left"></i></button>
                </div>
                <div class="slider-progress-ring" id="sliderProgress">0s</div>
            </div>
        `;
        const bgBlur = document.getElementById('sliderBgBlur');
        const mainImg = document.getElementById('sliderMainImg');
        const prevBtn = document.getElementById('sliderPrev');
        const nextBtn = document.getElementById('sliderNext');
        const progressSpan = document.getElementById('sliderProgress');
        
        function updateSlider(index) {
            mainImg.src = sliderImages[index];
            bgBlur.style.backgroundImage = `url('${sliderImages[index]}')`;
            if (sliderInterval) clearInterval(sliderInterval);
            let startTime = Date.now();
            sliderInterval = setInterval(() => {
                if (isSliderPaused) return;
                let elapsed = Date.now() - startTime;
                let remaining = Math.max(0, duration - elapsed);
                progressSpan.innerText = Math.ceil(remaining / 1000) + 's';
                if (elapsed >= duration) {
                    clearInterval(sliderInterval);
                    nextSlide();
                }
            }, 100);
        }
        function nextSlide() {
            sliderCurrent = (sliderCurrent + 1) % sliderImages.length;
            updateSlider(sliderCurrent);
        }
        function prevSlide() {
            sliderCurrent = (sliderCurrent - 1 + sliderImages.length) % sliderImages.length;
            updateSlider(sliderCurrent);
        }
        prevBtn.onclick = () => { isSliderPaused = false; prevSlide(); };
        nextBtn.onclick = () => { isSliderPaused = false; nextSlide(); };
        document.getElementById('sliderMainCard').onclick = () => openLightbox(sliderImages, sliderCurrent);
        updateSlider(0);
    }

    // ---------- لايت بوكس محسن ----------
    let lightboxImages = [];
    let lightboxIndex = 0;
    function openLightbox(images, index) {
        if (!images.length) return;
        lightboxImages = images;
        lightboxIndex = index;
        const lb = document.getElementById('lightbox');
        const img = document.getElementById('lightboxImg');
        img.src = images[index];
        lb.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
        document.body.style.overflow = '';
    }
    function nextLightboxImage() {
        lightboxIndex = (lightboxIndex + 1) % lightboxImages.length;
        document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
    }
    function prevLightboxImage() {
        lightboxIndex = (lightboxIndex - 1 + lightboxImages.length) % lightboxImages.length;
        document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
    }
    document.getElementById('closeLightboxBtn').onclick = closeLightbox;
    document.getElementById('lightboxPrev').onclick = prevLightboxImage;
    document.getElementById('lightboxNext').onclick = nextLightboxImage;
    document.getElementById('lightboxWhatsapp').onclick = () => {
        if (lightboxImages.length) {
            window.open(`https://wa.me/${currentWhatsappNum}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن هذا التصميم:\n'+lightboxImages[lightboxIndex])}`, '_blank');
        }
    };

    // ---------- شبكة أعمالنا (مع صور حقيقية) ----------
    function buildWorksGrid() {
        const container = document.getElementById('worksGrid');
        if (!container) return;
        const albums = currentData.albums ? Object.keys(currentData.albums).map(id => ({ id, ...currentData.albums[id] })) : [];
        if (albums.length === 0) {
            container.innerHTML = '<div class="empty-state">📭 لا توجد ألبومات بعد. أضف ألبومات من لوحة الإدارة.</div>';
            return;
        }
        let html = '<div class="masonry-grid">';
        albums.forEach(alb => {
            let cover = '';
            if (alb.imgs && Object.keys(alb.imgs).length) {
                cover = Object.values(alb.imgs)[0].url;
            } else {
                cover = 'https://placehold.co/600x600?text=صورة+قريباً';
            }
            let avg = (alb.rating_sum && alb.rating_count) ? (alb.rating_sum / alb.rating_count).toFixed(1) : '0';
            let views = alb.views || 0;
            html += `
                <div class="masonry-card" data-album="${alb.id}">
                    <div class="img-square"><img src="${cover}" loading="lazy" onerror="this.src='https://placehold.co/400x400?text=خطأ+تحميل'"></div>
                    <div class="card-overlay">
                        <div><strong>${alb.name || 'ألبوم'}</strong></div>
                        <div><i class="fas fa-star"></i> ${avg} (${alb.rating_count || 0}) &nbsp; <i class="fas fa-eye"></i> ${views}</div>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;
        document.querySelectorAll('.masonry-card').forEach(card => {
            card.addEventListener('click', () => openAlbum(card.getAttribute('data-album')));
        });
    }

    async function openAlbum(id) {
        const alb = currentData.albums?.[id];
        if (!alb || !alb.imgs) { showToast('لا توجد صور في هذا الألبوم'); return; }
        const urls = Object.values(alb.imgs).map(i => i.url).filter(u => u);
        if (urls.length) {
            await incrementViews(id);
            openLightbox(urls, 0);
        } else showToast('لا توجد صور صالحة');
    }

    async function incrementViews(albumId) {
        const sessionKey = `viewed_${albumId}`;
        if (sessionStorage.getItem(sessionKey)) return;
        const albumRef = db.ref(`${DB_PATH}/albums/${albumId}`);
        await albumRef.transaction(album => { if(album) album.views = (album.views || 0) + 1; return album; });
        sessionStorage.setItem(sessionKey, '1');
        if (currentData.albums && currentData.albums[albumId]) currentData.albums[albumId].views = (currentData.albums[albumId].views || 0) + 1;
        buildWorksGrid(); // تحديث فوري للشبكة
    }

    // ---------- التنقل بين الصفحات ----------
    function changePage(page) {
        currentPage = page;
        loadPage();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        renderNavLinks();
    }
    function renderNavLinks() {
        const navContainer = document.getElementById('navLinks');
        const bottomNav = document.getElementById('bottomNav');
        const pages = [
            { id: 'home', name: 'الرئيسية', icon: 'fas fa-home' },
            { id: 'store', name: 'المتجر', icon: 'fas fa-store' },
            { id: 'catalogs', name: 'الكتالوجات', icon: 'fas fa-book-open' },
            { id: 'contact', name: 'اتصل بنا', icon: 'fas fa-phone-alt' }
        ];
        let navHtml = '';
        pages.forEach(p => {
            navHtml += `<a data-page="${p.id}" class="${currentPage === p.id ? 'active' : ''}"><i class="${p.icon}"></i> ${p.name}</a>`;
        });
        navContainer.innerHTML = navHtml;
        bottomNav.innerHTML = pages.map(p => `<a data-page="${p.id}" class="${currentPage === p.id ? 'active' : ''}"><i class="${p.icon}"></i><span>${p.name}</span></a>`).join('');
        document.querySelectorAll('[data-page]').forEach(el => {
            el.addEventListener('click', (e) => { e.preventDefault(); changePage(el.getAttribute('data-page')); });
        });
    }

    function loadPage() {
        const main = document.getElementById('mainContent');
        if (!main) return;
        if (currentPage === 'home') {
            main.innerHTML = `
                <div id="heroSliderContainer"></div>
                <div class="container section">
                    <h2 class="section-title">أعمالنا الأخيرة</h2>
                    <div id="worksGrid"></div>
                </div>
            `;
            buildHeroSlider();
            buildWorksGrid();
        } else if (currentPage === 'store') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">المتجر</h2><div class="empty-state">🛒 قريباً – تشكيلة رائعة من الديكورات.</div></div>`;
        } else if (currentPage === 'catalogs') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">الكتالوجات</h2><div class="empty-state">📖 سيتم إضافة الكتالوجات قريباً.</div></div>`;
        } else if (currentPage === 'contact') {
            main.innerHTML = `<div class="container section"><h2 class="section-title">اتصل بنا</h2><div style="text-align:center;font-size:1.2rem;"><i class="fas fa-phone"></i> <a href="tel:0541780995" style="color:var(--gold);">0541780995</a><br><i class="fab fa-whatsapp"></i> <a href="https://wa.me/${currentWhatsappNum}" target="_blank" style="color:#25D366;">واتساب</a><br><i class="fas fa-map-marker-alt"></i> جدة، السعودية</div></div>`;
        }
    }

    // هيدر ذكي
    function initSmartHeader() {
        const header = document.getElementById('mainHeader');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });
    }

    // ---------- تشغيل Firebase ----------
    db.ref(DB_PATH).once('value').then(snap => {
        currentData = snap.val() || {};
        currentWhatsappNum = currentData.whatsapp_num || '966541780995';
        document.getElementById('siteTitle').innerText = currentData.site_name || 'بصمة غير';
        renderPartnersCloud();
        renderNavLinks();
        loadPage();
        initSmartHeader();
        document.getElementById('whatsappFloatBtn').onclick = () => window.open(`https://wa.me/${currentWhatsappNum}`, '_blank');
    }).catch(err => { console.error(err); showToast('حدث خطأ في تحميل البيانات'); });

    db.ref(DB_PATH).on('value', snap => {
        if (snap.exists()) {
            currentData = snap.val();
            currentWhatsappNum = currentData.whatsapp_num || '966541780995';
            renderPartnersCloud();
            if (currentPage === 'home') {
                buildHeroSlider();
                buildWorksGrid();
            }
        }
    });
</script>
</body>
</html>

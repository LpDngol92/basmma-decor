<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بصمة غير للديكور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --gold: #b2976a;
            --gold-dark: #8e7352;
            --bg: #f8f9fa;
            --card-bg: white;
            --text: #333;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }
        .hero {
            text-align: center;
            margin: 40px 0;
        }
        .hero h1 {
            color: var(--gold-dark);
            font-size: 3rem;
        }
        .hero p {
            color: #777;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1300px;
            margin: 40px auto;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            border: 1px solid #eee;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(178,151,106,0.2);
        }
        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 3px solid var(--gold);
        }
        .card-content {
            padding: 15px;
        }
        .card h3 {
            margin-bottom: 10px;
            color: var(--gold-dark);
        }
        .btn {
            background: var(--gold);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 1rem;
            transition: background 0.3s;
        }
        .btn:hover {
            background: var(--gold-dark);
        }
        footer {
            text-align: center;
            margin-top: 60px;
            color: #aaa;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }
        .whatsapp-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        .whatsapp-btn:hover {
            background: #128C7E;
        }
    </style>
</head>
<body>

<div class="hero">
    <h1>بصمة غير</h1>
    <p>للديكور والتصميم الداخلي</p>
</div>

<!-- شبكة الصور -->
<div class="grid" id="image-grid">
    <!-- هتتحط هنا بالJavaScript -->
</div>

<div style="text-align: center;">
    <button class="whatsapp-btn" id="whatsappGlobalBtn">
        <i class="fab fa-whatsapp"></i> تواصل معنا عبر واتساب
    </button>
</div>

<footer>
    جميع الحقوق محفوظة © بصمة غير للديكور 2025
</footer>

<script>
    // صور ديكور حقيقية من Unsplash
    const images = [
        {
            url: "https://images.unsplash.com/photo-1618221195710-ddde0e36dac9?w=400",
            title: "غرفة معيشة عصرية"
        },
        {
            url: "https://images.unsplash.com/photo-1618213749401-2a8c6b3f5f5d?w=400",
            title: "غرفة نوم فاخرة"
        },
        {
            url: "https://images.unsplash.com/photo-1618213749401-2a8c6b3f5f5d?w=400",
            title: "مطبخ عصري"
        },
        {
            url: "https://images.unsplash.com/photo-1618221381711-42ca8ab6e908?w=400",
            title: "مجلس عربي"
        },
        {
            url: "https://images.unsplash.com/photo-1618213811503-3d3f7c5c9f5b?w=400",
            title: "ديكور مدخل"
        },
        {
            url: "https://images.unsplash.com/photo-1618213811503-3d3f7c5c9f5b?w=400",
            title: "غرفة طعام"
        }
    ];

    // عرض الصور في الصفحة
    const grid = document.getElementById('image-grid');
    images.forEach(img => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${img.url}" alt="${img.title}">
            <div class="card-content">
                <h3>${img.title}</h3>
                <button class="btn" onclick="whatsappOrder('${img.url}')">
                    <i class="fab fa-whatsapp"></i> استفسار
                </button>
            </div>
        `;
        grid.appendChild(card);
    });

    // دوال الواتساب
    function whatsappOrder(url) {
        const phone = "966500000000"; // غير الرقم هنا
        const msg = `السلام عليكم، أود الاستفسار عن هذا التصميم: ${url}`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    document.getElementById('whatsappGlobalBtn').addEventListener('click', function() {
        const phone = "966500000000";
        const msg = "السلام عليكم، أود التواصل مع بصمة غير للديكور.";
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>بصمة غير للديكور | تصميم داخلي فاخر</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Modern Instagram-like theme */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --bg-card: #ffffff;
            --text-primary: #1c1c1e;
            --text-secondary: #6c6c70;
            --accent: #d4af37;
            --accent-dark: #b49450;
            --border: #e9ecef;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
        }

        /* Reels / Story style navigation */
        .story-bar {
            background: var(--bg-primary);
            padding: 12px 16px;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 12px;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.92);
        }
        .story-bar::-webkit-scrollbar { display: none; }
        .story-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .story-avatar {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #e6c87c);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
        }
        .story-avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-dark);
            background: #f8f9fa;
        }
        .story-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* Main Feed */
        .feed {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }
        .post-card {
            background: var(--bg-card);
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
        }
        .post-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .post-info h4 {
            font-size: 14px;
            font-weight: 700;
        }
        .post-info p {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .post-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            cursor: pointer;
            background: #f0f0f0;
        }
        .post-actions {
            padding: 12px 16px;
            display: flex;
            gap: 20px;
            border-top: 1px solid var(--border);
        }
        .action-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
        }
        .action-btn i { font-size: 24px; }
        .action-btn.active { color: #ed4956; }
        .action-btn:hover { transform: scale(1.05); }
        .post-caption {
            padding: 0 16px 12px;
            font-size: 13px;
            color: var(--text-primary);
        }
        .hashtag {
            color: var(--accent-dark);
            text-decoration: none;
        }

        /* Catalog & Album Grid (Explore style) */
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: var(--bg-primary);
        }
        .explore-item {
            aspect-ratio: 1 / 1;
            background: #e9ecef;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .explore-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .explore-item:hover img { transform: scale(1.03); }
        .overlay-icon {
            position: absolute;
            bottom: 8px;
            right: 8px;
            color: white;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 24px;
            border-top: 1px solid var(--border);
            z-index: 1000;
        }
        .nav-icon {
            font-size: 24px;
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s;
        }
        .nav-icon.active { color: var(--accent-dark); }
        .content-area { padding-bottom: 80px; }
        .page { display: none; }
        .page.active-page { display: block; }

        /* Favorites page */
        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
        }
        .fav-item {
            aspect-ratio: 1;
            background: #f0f0f0;
            position: relative;
        }
        .fav-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .remove-fav {
            position: absolute;
            top: 6px;
            left: 6px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* Viewer (Instagram style) */
        .viewer-modal {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .viewer-img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
        }
        .viewer-close {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            font-size: 28px;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
        }
        .viewer-nav {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 40px;
            background: rgba(0,0,0,0.5);
            padding: 12px 24px;
            border-radius: 40px;
        }
        .viewer-nav button {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
        }

        /* Admin panel toggle */
        .admin-trigger {
            position: fixed;
            bottom: 90px;
            right: 16px;
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            z-index: 1100;
            box-shadow: var(--shadow-md);
        }
        /* Admin panel styles (compact but complete) */
        .admin-panel {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 3000;
            overflow-y: auto;
            display: none;
            padding: 20px;
        }
        .admin-panel.active { display: block; }
        .admin-card {
            max-width: 600px;
            margin: 0 auto;
        }
        .collapse-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .collapse-btn {
            width: 100%;
            padding: 16px;
            background: none;
            border: none;
            font-weight: 600;
            text-align: right;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .collapse-content { display: none; padding: 16px; border-top: 1px solid var(--border); }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
        }
        .admin-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            margin-top: 8px;
            cursor: pointer;
        }
        .btn-gold { background: var(--accent); color: #1c1c1e; }
        .btn-red { background: #ed4956; color: white; }
        .btn-green { background: #34c759; color: white; }

        /* empty states */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            padding: 16px;
        }
        .toast-msg {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }
    </style>
</head>
<body>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <button class="nav-icon" data-page="feed"><i class="fas fa-home"></i></button>
    <button class="nav-icon" data-page="explore"><i class="fas fa-compass"></i></button>
    <button class="nav-icon" data-page="favorites"><i class="fas fa-heart"></i></button>
    <button class="nav-icon" data-page="profile"><i class="fas fa-user"></i></button>
</div>

<div class="admin-trigger" onclick="checkAccess()"><i class="fas fa-crown"></i></div>

<!-- Main Content Area -->
<div class="content-area" id="content-area">
    <!-- Feed Page -->
    <div class="page" id="feed-page">
        <div class="story-bar" id="storyBar"></div>
        <div class="feed" id="feedContainer"></div>
    </div>

    <!-- Explore Page (Albums + Catalogs) -->
    <div class="page" id="explore-page">
        <div class="section-title"><i class="fas fa-compass"></i> استكشف</div>
        <div id="exploreContainer"></div>
    </div>

    <!-- Favorites Page -->
    <div class="page" id="favorites-page">
        <div class="section-title"><i class="fas fa-heart" style="color:#ed4956"></i> المفضلة</div>
        <div id="favoritesGrid" class="favorites-grid"></div>
    </div>

    <!-- Profile Page -->
    <div class="page" id="profile-page">
        <div class="section-title">الملف الشخصي</div>
        <div style="padding: 20px; text-align: center;">
            <div style="width: 100px; height: 100px; background: var(--accent); border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 48px; color: white;">ب</div>
            <h3 id="siteNameProfile">بصمة غير للديكور</h3>
            <p style="color: var(--text-secondary); margin: 8px 0;">تصميم داخلي | ديكور فاخر</p>
            <div id="aboutProfile" style="margin-top: 20px; text-align: right; background: var(--bg-secondary); padding: 20px; border-radius: 20px;"></div>
            <div style="margin-top: 20px;">
                <button onclick="whatsappGlobal()" class="admin-btn btn-green" style="width: auto; padding: 12px 30px;"><i class="fab fa-whatsapp"></i> تواصل معنا</button>
            </div>
            <div id="socialLinks" style="margin-top: 20px; display: flex; gap: 20px; justify-content: center;"></div>
        </div>
    </div>
</div>

<!-- Viewer Modal -->
<div id="viewerModal" class="viewer-modal" onclick="closeViewerOnBg(event)">
    <button class="viewer-close" onclick="closeViewer()"><i class="fas fa-times"></i></button>
    <img id="viewerImage" class="viewer-img" src="">
    <div class="viewer-nav">
        <button onclick="viewerPrev()"><i class="fas fa-chevron-right"></i></button>
        <span id="viewerCounter" style="color:white">1/1</span>
        <button onclick="viewerNext()"><i class="fas fa-chevron-left"></i></button>
    </div>
</div>

<!-- Admin Panel (Preserved fully functional) -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-card">
        <h2 style="margin-bottom: 20px;">⚡ لوحة الإدارة</h2>
        <div id="adminSections"></div>
        <button onclick="closeAdminPanel()" class="admin-btn btn-red" style="margin-top:20px">إغلاق</button>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    // Firebase Config (same as original)
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let isAdmin = false;
    let favorites = JSON.parse(localStorage.getItem('site_favorites_v2')) || [];
    let currentImageList = [];
    let currentImageIndex = 0;
    let activePage = 'feed';

    // Helper: Toast
    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    // Favorites logic
    function saveFavorites() { localStorage.setItem('site_favorites_v2', JSON.stringify(favorites)); }
    function toggleFavorite(imgId, imgUrl) {
        const exists = favorites.find(f => f.id === imgId);
        if (exists) {
            favorites = favorites.filter(f => f.id !== imgId);
            showToast('✨ تمت الإزالة من المفضلة');
        } else {
            favorites.unshift({ id: imgId, url: imgUrl, date: Date.now() });
            showToast('❤️ أضيف إلى المفضلة');
        }
        saveFavorites();
        renderCurrentPage();
    }
    function isFav(imgId) { return favorites.some(f => f.id === imgId); }

    // Render Feed (Instagram style)
    function renderFeed() {
        const container = document.getElementById('feedContainer');
        const d = currentData;
        let posts = [];
        // collect images from albums and pages
        if (d.albums) {
            Object.keys(d.albums).forEach(albumId => {
                const album = d.albums[albumId];
                if (album.imgs) {
                    Object.keys(album.imgs).forEach(imgId => {
                        posts.push({ url: album.imgs[imgId].url, id: `album_${albumId}_${imgId}`, title: album.name });
                    });
                }
            });
        }
        if (d.pages) {
            Object.keys(d.pages).forEach(pageId => {
                const page = d.pages[pageId];
                if (page.imgs) {
                    Object.keys(page.imgs).forEach(imgId => {
                        posts.push({ url: page.imgs[imgId].url, id: `page_${pageId}_${imgId}`, title: page.title });
                    });
                }
            });
        }
        posts.reverse().slice(0, 30).forEach((post, idx) => {
            const isLiked = isFav(post.id);
            container.innerHTML += `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-user">
                            <div class="post-avatar"><i class="fas fa-palette"></i></div>
                            <div class="post-info">
                                <h4>بصمة غير للديكور</h4>
                                <p>${post.title || 'تصميم داخلي'}</p>
                            </div>
                        </div>
                        <i class="fas fa-ellipsis-h" style="color: var(--text-secondary);"></i>
                    </div>
                    <img class="post-image" src="${post.url}" onclick="openImageViewer('${post.url}', ${JSON.stringify(posts.map(p=>p.url))}, ${idx})">
                    <div class="post-actions">
                        <button class="action-btn ${isLiked ? 'active' : ''}" onclick="toggleFavorite('${post.id}', '${post.url}')">
                            <i class="fas ${isLiked ? 'fa-heart' : 'fa-heart'}"></i>
                        </button>
                        <button class="action-btn" onclick="whatsappOrder('${post.url}')"><i class="fab fa-whatsapp"></i></button>
                    </div>
                    <div class="post-caption">
                        <strong>بصمة غير للديكور</strong> تصميم فاخر وأناقة لا تضاهى <span class="hashtag">#ديكور_فاخر</span>
                    </div>
                </div>
            `;
        });
        if (posts.length === 0) container.innerHTML = '<div class="empty-state"><i class="fas fa-images fa-3x"></i><p>لا توجد أعمال معروضة بعد</p></div>';
    }

    // Explore: albums & catalogs
    function renderExplore() {
        const container = document.getElementById('exploreContainer');
        const d = currentData;
        let html = '<div class="explore-grid">';
        if (d.albums) {
            Object.keys(d.albums).forEach(albumId => {
                const album = d.albums[albumId];
                let cover = '';
                if (album.imgs && Object.keys(album.imgs).length) cover = Object.values(album.imgs)[0].url;
                html += `<div class="explore-item" onclick="openAlbum('${albumId}')">
                            ${cover ? `<img src="${cover}" loading="lazy">` : '<div style="background:#e9ecef; height:100%; display:flex; align-items:center; justify-content:center;"><i class="fas fa-folder-open fa-2x"></i></div>'}
                            <div class="overlay-icon"><i class="fas fa-folder"></i></div>
                         </div>`;
            });
        }
        if (d.catalogs) {
            Object.keys(d.catalogs).forEach(catId => {
                html += `<div class="explore-item" onclick="openCatalog('${catId}')">
                            <div style="background:#e9ecef; height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column;">
                                <i class="fas fa-book-open fa-3x" style="color:var(--accent);"></i>
                                <span style="font-size:12px; margin-top:8px;">${d.catalogs[catId].name}</span>
                            </div>
                         </div>`;
            });
        }
        html += '</div>';
        if ((!d.albums || Object.keys(d.albums).length===0) && (!d.catalogs || Object.keys(d.catalogs).length===0)) html = '<div class="empty-state"><i class="fas fa-compass fa-3x"></i><p>قريباً .. المزيد من الأعمال</p></div>';
        container.innerHTML = html;
    }

    function openAlbum(albumId) {
        const album = currentData.albums[albumId];
        if (!album || !album.imgs) return showToast('لا توجد صور');
        const urls = Object.values(album.imgs).map(img => img.url);
        if (urls.length) openImageViewer(urls[0], urls, 0);
    }
    function openCatalog(catId) {
        const cat = currentData.catalogs[catId];
        if (cat && cat.code) {
            const win = window.open();
            win.document.write(cat.code);
        } else showToast('رابط الكتالوج غير متاح');
    }

    // Favorites render
    function renderFavoritesPage() {
        const grid = document.getElementById('favoritesGrid');
        if (favorites.length === 0) {
            grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><i class="far fa-heart fa-3x"></i><p>لا توجد صور في المفضلة</p></div>';
            return;
        }
        let html = '';
        favorites.forEach(fav => {
            html += `<div class="fav-item">
                        <img src="${fav.url}" onclick="openImageViewer('${fav.url}', ${JSON.stringify(favorites.map(f=>f.url))}, ${favorites.findIndex(f=>f.id===fav.id)})">
                        <button class="remove-fav" onclick="event.stopPropagation(); toggleFavorite('${fav.id}', '${fav.url}')"><i class="fas fa-trash-alt"></i></button>
                     </div>`;
        });
        grid.innerHTML = html;
    }

    // Profile page
    function renderProfile() {
        const d = currentData;
        document.getElementById('siteNameProfile').innerText = d.site_name || 'بصمة غير للديكور';
        document.getElementById('aboutProfile').innerHTML = d.about_text || 'نقدم لكم أرقى التصاميم الداخلية والديكورات الفاخرة التي تجمع بين الأناقة والجودة العالية.';
        let socialHtml = '';
        if (d.insta_url) socialHtml += `<a href="${d.insta_url}" target="_blank" style="font-size:28px; color:var(--accent);"><i class="fab fa-instagram"></i></a>`;
        if (d.tiktok_url) socialHtml += `<a href="${d.tiktok_url}" target="_blank" style="font-size:28px; color:var(--accent);"><i class="fab fa-tiktok"></i></a>`;
        if (d.snap_url) socialHtml += `<a href="${d.snap_url}" target="_blank" style="font-size:28px; color:var(--accent);"><i class="fab fa-snapchat"></i></a>`;
        document.getElementById('socialLinks').innerHTML = socialHtml;
    }

    // Story Bar (from albums)
    function renderStoryBar() {
        const bar = document.getElementById('storyBar');
        const d = currentData;
        let stories = [];
        if (d.albums) {
            Object.keys(d.albums).forEach(id => {
                const alb = d.albums[id];
                let cover = '';
                if (alb.imgs && Object.keys(alb.imgs).length) cover = Object.values(alb.imgs)[0].url;
                stories.push({ name: alb.name, cover, id });
            });
        }
        if (stories.length === 0) { bar.style.display = 'none'; return; }
        bar.style.display = 'flex';
        bar.innerHTML = stories.map(s => `
            <div class="story-item" onclick="openAlbum('${s.id}')">
                <div class="story-avatar">
                    <div class="story-avatar-inner">${s.cover ? `<img src="${s.cover}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` : '<i class="fas fa-folder"></i>'}</div>
                </div>
                <div class="story-label">${s.name.substring(0,10)}</div>
            </div>
        `).join('');
    }

    // Image Viewer
    function openImageViewer(url, list, idx) {
        currentImageList = list;
        currentImageIndex = idx;
        document.getElementById('viewerImage').src = url;
        document.getElementById('viewerCounter').innerText = `${idx+1}/${list.length}`;
        document.getElementById('viewerModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    function closeViewer() {
        document.getElementById('viewerModal').style.display = 'none';
        document.body.style.overflow = '';
    }
    function closeViewerOnBg(e) { if (e.target === document.getElementById('viewerModal')) closeViewer(); }
    function viewerNext() {
        if (currentImageIndex < currentImageList.length-1) currentImageIndex++;
        else currentImageIndex = 0;
        document.getElementById('viewerImage').src = currentImageList[currentImageIndex];
        document.getElementById('viewerCounter').innerText = `${currentImageIndex+1}/${currentImageList.length}`;
    }
    function viewerPrev() {
        if (currentImageIndex > 0) currentImageIndex--;
        else currentImageIndex = currentImageList.length-1;
        document.getElementById('viewerImage').src = currentImageList[currentImageIndex];
        document.getElementById('viewerCounter').innerText = `${currentImageIndex+1}/${currentImageList.length}`;
    }

    function whatsappGlobal() { window.open(`https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود التواصل مع بصمة غير للديكور.')}`, '_blank'); }
    function whatsappOrder(url) { window.open(`https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن هذا التصميم:\n'+url)}`, '_blank'); }

    function renderCurrentPage() {
        if (activePage === 'feed') { renderFeed(); renderStoryBar(); }
        else if (activePage === 'explore') renderExplore();
        else if (activePage === 'favorites') renderFavoritesPage();
        else if (activePage === 'profile') renderProfile();
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(`${activePage}-page`).classList.add('active-page');
        document.querySelectorAll('.nav-icon').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.nav-icon[data-page="${activePage}"]`).classList.add('active');
    }

    // Admin Panel - Full preservation of original functions
    function buildAdminSections() {
        const container = document.getElementById('adminSections');
        const d = currentData;
        container.innerHTML = `
            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">🎨 الثيمات <span>▾</span></button><div class="collapse-content"><select id="themeSelect"><option value="light">فاتح</option><option value="dark">داكن</option><option value="gold">ذهبي</option></select><button class="admin-btn btn-gold" onclick="saveTheme()">حفظ</button></div></div>
            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">📖 من نحن <span>▾</span></button><div class="collapse-content"><textarea id="aboutText" rows="4">${d.about_text || ''}</textarea><button class="admin-btn btn-gold" onclick="saveAbout()">حفظ</button></div></div>
            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">⭐ التقييمات <span>▾</span></button><div class="collapse-content" id="reviewsAdminList"></div></div>
            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">📸 رفع صور <span>▾</span></button><div class="collapse-content"><select id="targetSelect"><option value="albums">ألبوم</option><option value="pages">صفحة</option></select><input id="albumPageId" placeholder="معرف الألبوم/الصفحة"><textarea id="imageUrls" placeholder="روابط الصور (كل رابط في سطر)" rows="4"></textarea><button class="admin-btn btn-green" onclick="uploadPhotos()">نشر</button></div></div>
            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">⚙️ الإعدادات العامة <span>▾</span></button><div class="collapse-content"><input id="siteName" placeholder="اسم الموقع" value="${d.site_name || ''}"><input id="whatsappNum" placeholder="رقم واتساب" value="${d.whatsapp_num || ''}"><input id="insta" placeholder="انستقرام" value="${d.insta_url || ''}"><input id="tiktok" placeholder="تيك توك" value="${d.tiktok_url || ''}"><button class="admin-btn btn-gold" onclick="saveGeneral()">حفظ</button></div></div>
            <div class="collapse-section"><button class="collapse-btn" onclick="toggleCollapse(this)">📁 إدارة الألبومات <span>▾</span></button><div class="collapse-content"><div id="albumsList"></div><input id="newAlbumName" placeholder="اسم ألبوم جديد"><button class="admin-btn btn-green" onclick="addAlbum()">إضافة</button></div></div>
        `;
        renderReviewsAdmin();
        renderAlbumsList();
    }
    function toggleCollapse(btn) { const content = btn.nextElementSibling; content.style.display = content.style.display === 'block' ? 'none' : 'block'; }
    function saveAbout() { const txt = document.getElementById('aboutText').value; db.ref(DB_PATH).update({ about_text: txt }).then(()=>showToast('تم حفظ من نحن')); }
    function saveTheme() { const theme = document.getElementById('themeSelect').value; document.body.style.setProperty('--bg-primary', theme==='dark'?'#111':'#fff'); showToast('تم تغيير الثيم'); }
    function saveGeneral() { db.ref(DB_PATH).update({ site_name:document.getElementById('siteName').value, whatsapp_num:document.getElementById('whatsappNum').value, insta_url:document.getElementById('insta').value, tiktok_url:document.getElementById('tiktok').value }).then(()=>showToast('تم الحفظ')); }
    function renderReviewsAdmin() {
        const container = document.getElementById('reviewsAdminList');
        if(!container) return;
        let html = '';
        if(currentData.reviews) Object.keys(currentData.reviews).forEach(id=>{
            const r = currentData.reviews[id];
            html += `<div style="padding:8px; border-bottom:1px solid var(--border);"><b>${r.name}</b> ${'★'.repeat(r.rating)}<p>${r.message}</p><button onclick="db.ref(DB_PATH+'/reviews/${id}').remove()" class="admin-btn btn-red" style="padding:4px">حذف</button></div>`;
        });
        container.innerHTML = html || '<p>لا توجد تقييمات</p>';
    }
    function renderAlbumsList() {
        const container = document.getElementById('albumsList');
        if(!container) return;
        let html = '';
        if(currentData.albums) Object.keys(currentData.albums).forEach(id=>{
            html += `<div style="display:flex; gap:8px; margin-bottom:8px;"><input value="${currentData.albums[id].name}" onchange="db.ref(DB_PATH+'/albums/${id}').update({name:this.value})" style="flex:1"><button onclick="db.ref(DB_PATH+'/albums/${id}').remove()" class="admin-btn btn-red" style="width:auto; padding:6px 12px;">حذف</button></div>`;
        });
        container.innerHTML = html;
    }
    function addAlbum() { const name = document.getElementById('newAlbumName').value; if(name) db.ref(DB_PATH+'/albums').push({name}).then(()=>showToast('تم إضافة الألبوم')); }
    function uploadPhotos() {
        const targetType = document.getElementById('targetSelect').value;
        const id = document.getElementById('albumPageId').value;
        const urls = document.getElementById('imageUrls').value.split('\n').filter(u=>u.trim());
        if(!id || urls.length===0) return showToast('أدخل المعرف والروابط');
        const path = targetType === 'albums' ? `albums/${id}/imgs` : `pages/${id}/imgs`;
        Promise.all(urls.map(url=>db.ref(DB_PATH+'/'+path).push({url:url.trim()}))).then(()=>{ showToast('تم نشر الصور'); document.getElementById('imageUrls').value=''; });
    }
    function closeAdminPanel() { document.getElementById('adminPanel').classList.remove('active'); }

    // Admin access
    function checkAccess() {
        const pwd = prompt("رمز الإدارة:");
        if(!pwd) return;
        db.ref(DB_PATH).once('value').then(snap=>{
            const data = snap.val();
            if(data && data.in && data.in.toString() === pwd) { isAdmin=true; document.getElementById('adminPanel').classList.add('active'); buildAdminSections(); }
            else showToast('رمز غير صحيح');
        });
    }
    window.checkAccess = checkAccess;

    // Firebase listener
    db.ref(DB_PATH).on('value', snap => {
        currentData = snap.val() || {};
        renderCurrentPage();
        renderStoryBar();
        if (isAdmin && document.getElementById('adminPanel').classList.contains('active')) buildAdminSections();
    });

    // Page navigation
    document.querySelectorAll('.nav-icon').forEach(btn => {
        btn.addEventListener('click', () => { activePage = btn.dataset.page; renderCurrentPage(); });
    });
    // expose global functions
    window.toggleFavorite = toggleFavorite;
    window.openImageViewer = openImageViewer;
    window.closeViewer = closeViewer;
    window.closeViewerOnBg = closeViewerOnBg;
    window.viewerNext = viewerNext;
    window.viewerPrev = viewerPrev;
    window.whatsappGlobal = whatsappGlobal;
    window.whatsappOrder = whatsappOrder;
    window.openAlbum = openAlbum;
    window.openCatalog = openCatalog;
    window.saveAbout = saveAbout;
    window.saveTheme = saveTheme;
    window.saveGeneral = saveGeneral;
    window.uploadPhotos = uploadPhotos;
    window.addAlbum = addAlbum;
    window.toggleCollapse = toggleCollapse;
    window.closeAdminPanel = closeAdminPanel;

    // Initial load
    activePage = 'feed';
    renderCurrentPage();
</script>
</body>
</html>

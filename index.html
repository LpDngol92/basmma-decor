<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بصمة غير | BASMA GHAIR</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ===== VARIABLES & RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Color System */
            --primary-dark: #0C0B0E;
            --primary-deep: #1A181B;
            --primary-medium: #252325;
            --primary-light: #2F2D30;
            --accent-gold: #C9A96E;
            --accent-gold-light: #E5D2B0;
            --accent-gold-deep: #A88954;
            --text-bright: #FFFFFF;
            --text-soft: #F0F0F0;
            --text-muted: #A0A0A0;
            --text-dim: #6A6A6A;
            --border-subtle: rgba(201, 169, 110, 0.15);
            --border-medium: rgba(201, 169, 110, 0.25);
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
            --shadow-gold: 0 10px 30px rgba(201, 169, 110, 0.15);
            --gradient-dark: linear-gradient(145deg, #0C0B0E, #1A181B);
            --gradient-gold: linear-gradient(135deg, #C9A96E, #E5D2B0);
            --gradient-card: linear-gradient(145deg, rgba(37, 35, 37, 0.8), rgba(26, 24, 27, 0.9));
            --blur-bg: rgba(12, 11, 14, 0.7);
            --font-primary: 'Outfit', sans-serif;
            --font-arabic: 'Tajawal', sans-serif;
        }

        body {
            font-family: var(--font-arabic);
            background: var(--primary-dark);
            color: var(--text-soft);
            min-height: 100vh;
            position: relative;
            line-height: 1.6;
        }

        /* ===== SPLASH SCREEN - MINIMAL LUXURY ===== */
        #splash {
            position: fixed;
            inset: 0;
            background: #000000;
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .splash-content {
            text-align: center;
            animation: fadeScale 1.5s ease;
        }

        .splash-logo {
            font-size: 4rem;
            font-weight: 900;
            font-family: var(--font-primary);
            letter-spacing: 8px;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards 0.3s;
        }

        .splash-divider {
            width: 60px;
            height: 2px;
            background: var(--gradient-gold);
            margin: 0 auto;
            transform: scaleX(0);
            animation: expandWidth 0.8s ease forwards 0.8s;
        }

        .splash-sub {
            margin-top: 20px;
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards 1.1s;
        }

        @keyframes fadeScale {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes expandWidth {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== MAINTENANCE SCREEN ===== */
        #maintenance-screen {
            position: fixed;
            inset: 0;
            background: var(--primary-dark);
            z-index: 999998;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .maintenance-card {
            background: var(--gradient-card);
            border: 1px solid var(--border-subtle);
            border-radius: 32px;
            padding: 60px 50px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: var(--shadow-lg);
        }

        .maintenance-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(201, 169, 110, 0.1);
            border: 1px solid var(--border-medium);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 2rem;
            color: var(--accent-gold);
        }

        .maintenance-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-gold);
            margin-bottom: 15px;
            font-family: var(--font-primary);
        }

        .maintenance-message {
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border-subtle);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 30%;
            background: var(--gradient-gold);
            border-radius: 2px;
            animation: progress 2s infinite ease;
        }

        @keyframes progress {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        /* ===== HERO SECTION - ARCHITECTURAL DESIGN ===== */
        .hero {
            position: relative;
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .hero-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 30% 30%, rgba(201, 169, 110, 0.05) 0%, transparent 50%);
            animation: rotate 60s linear infinite;
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 800px;
            margin-bottom: 60px;
        }

        .hero-label {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(201, 169, 110, 0.1);
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            color: var(--accent-gold-light);
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .hero-title {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            font-family: var(--font-primary);
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero-title-line {
            display: block;
            color: var(--text-bright);
        }

        .hero-title-line-gold {
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* ===== PARTNERS MARQUEE ===== */
        .partners-section {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1000px;
            margin-top: 20px;
        }

        .partners-label {
            text-align: center;
            color: var(--accent-gold);
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .partners-marquee {
            position: relative;
            width: 100%;
            height: 100px;
            overflow: hidden;
            mask-image: linear-gradient(90deg, transparent, black 20%, black 80%, transparent);
        }

        .marquee-track {
            display: flex;
            gap: 40px;
            position: absolute;
            animation: marquee 25s linear infinite;
        }

        .partner-item {
            flex-shrink: 0;
            width: 120px;
            height: 80px;
            background: var(--primary-medium);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .partner-item img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: grayscale(1) brightness(1.5);
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        .partner-item:hover img {
            filter: grayscale(0) brightness(1);
            opacity: 1;
        }

        @keyframes marquee {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* ===== NEWS TICKER ===== */
        .news-ticker {
            background: var(--primary-medium);
            border-top: 1px solid var(--border-subtle);
            border-bottom: 1px solid var(--border-subtle);
            height: 50px;
            display: none;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .ticker-label {
            background: var(--accent-gold);
            color: var(--primary-dark);
            padding: 0 25px;
            font-weight: 800;
            font-size: 0.8rem;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            z-index: 2;
        }

        .ticker-content {
            position: absolute;
            left: 150px;
            right: 0;
            white-space: nowrap;
            animation: ticker 20s linear infinite;
            color: var(--text-muted);
        }

        @keyframes ticker {
            from { transform: translateX(100%); }
            to { transform: translateX(-200%); }
        }

        /* ===== NAVIGATION - GLASS MORPHISM ===== */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--blur-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 12px 28px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-btn:hover {
            color: var(--accent-gold-light);
            border-color: var(--border-subtle);
        }

        .nav-btn.active {
            background: var(--gradient-gold);
            color: var(--primary-dark);
            font-weight: 800;
            border-color: transparent;
        }

        /* ===== MAIN CONTENT ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* ===== SECTION HEADERS ===== */
        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-eyebrow {
            color: var(--accent-gold);
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 800;
            font-family: var(--font-primary);
            color: var(--text-bright);
            margin-bottom: 15px;
        }

        .section-divider {
            width: 60px;
            height: 2px;
            background: var(--gradient-gold);
            margin: 0 auto;
        }

        /* ===== GRID SYSTEMS ===== */
        .grid {
            display: grid;
            gap: 30px;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        }

        .grid-sm {
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }

        /* ===== CARDS - LUXURY DESIGN ===== */
        .card {
            background: var(--gradient-card);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 1px;
            background: var(--gradient-gold);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-gold);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-media {
            position: relative;
            width: 100%;
            height: 260px;
            overflow: hidden;
            cursor: pointer;
        }

        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .card:hover .card-media img {
            transform: scale(1.08);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover .card-overlay {
            opacity: 1;
        }

        .card-expand {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--accent-gold);
            border: none;
            color: var(--primary-dark);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .card-expand:hover {
            transform: scale(1.1);
        }

        .watermark {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .card-footer {
            padding: 20px;
            border-top: 1px solid var(--border-subtle);
        }

        .btn-wa {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-wa:hover {
            background: rgba(37, 211, 102, 0.1);
            border-color: #25D366;
            color: #25D366;
        }

        .btn-wa i {
            font-size: 1.2rem;
        }

        /* ===== FOLDER CARDS ===== */
        .folder-card {
            background: var(--gradient-card);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 60px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .folder-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(201, 169, 110, 0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .folder-card:hover {
            transform: translateY(-8px);
            border-color: var(--border-medium);
            box-shadow: var(--shadow-gold);
        }

        .folder-card:hover::after {
            opacity: 1;
        }

        .folder-icon {
            font-size: 3rem;
            color: var(--accent-gold);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .folder-name {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-bright);
            position: relative;
            z-index: 1;
        }

        /* ===== HOME PAGE SPECIFIC ===== */
        .home-grid {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .toggle-card {
            background: var(--gradient-card);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            overflow: hidden;
        }

        .toggle-header {
            width: 100%;
            padding: 25px 30px;
            background: none;
            border: none;
            color: var(--text-bright);
            font-weight: 800;
            font-size: 1.2rem;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-header:hover {
            background: rgba(201, 169, 110, 0.05);
        }

        .toggle-header i {
            color: var(--accent-gold);
            transition: transform 0.3s ease;
        }

        .toggle-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s ease;
            border-top: 1px solid transparent;
        }

        .toggle-content.open {
            max-height: 2000px;
            border-top-color: var(--border-subtle);
        }

        .toggle-body {
            padding: 30px;
            color: var(--text-muted);
            line-height: 1.8;
        }

        /* ===== REVIEW SLIDER ===== */
        .reviews-slider {
            background: var(--gradient-card);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 50px 40px;
            position: relative;
            min-height: 250px;
        }

        .review-item {
            position: absolute;
            width: calc(100% - 80px);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
            text-align: center;
        }

        .review-item.active {
            opacity: 1;
            transform: translateY(0);
        }

        .review-stars {
            color: var(--accent-gold);
            font-size: 1.2rem;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }

        .review-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-soft);
            margin-bottom: 20px;
            font-style: italic;
        }

        .review-author {
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        /* ===== PROCESS STEPS ===== */
        .process-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 40px 0;
        }

        @media (max-width: 900px) {
            .process-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .process-grid {
                grid-template-columns: 1fr;
            }
        }

        .process-step {
            background: var(--gradient-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            counter-increment: step-counter;
        }

        .process-step::before {
            content: counter(step-counter, decimal-leading-zero);
            position: absolute;
            top: -10px;
            right: 20px;
            font-size: 3rem;
            font-weight: 900;
            font-family: var(--font-primary);
            color: var(--accent-gold);
            opacity: 0.1;
        }

        .process-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            background: rgba(201, 169, 110, 0.1);
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.5rem;
            color: var(--accent-gold);
        }

        .process-step h4 {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-bright);
            margin-bottom: 10px;
        }

        .process-step p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* ===== SCHEDULE CARD ===== */
        .schedule-card {
            background: var(--gradient-card);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            overflow: hidden;
        }

        .schedule-header {
            padding: 25px 30px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .schedule-header i {
            color: var(--accent-gold);
            font-size: 1.2rem;
        }

        .schedule-header h3 {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text-bright);
        }

        .schedule-body {
            padding: 30px;
        }

        .schedule-group {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .schedule-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .days {
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .time-slot {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .time-badge {
            background: rgba(201, 169, 110, 0.1);
            border: 1px solid var(--border-subtle);
            padding: 5px 15px;
            border-radius: 30px;
            color: var(--text-soft);
            font-weight: 600;
        }

        .holiday-badge {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.2);
            padding: 15px;
            border-radius: 16px;
            color: #e74c3c;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-open {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: #2ecc71;
        }

        .status-open .status-dot {
            background: #2ecc71;
        }

        .status-closed {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        .status-closed .status-dot {
            background: #e74c3c;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ===== LOCATION CARD ===== */
        .location-card {
            background: var(--gradient-card);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            overflow: hidden;
        }

        .location-header {
            padding: 25px 30px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .location-header i {
            color: var(--accent-gold);
            font-size: 1.2rem;
        }

        .location-header h3 {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text-bright);
        }

        .location-body {
            padding: 30px;
        }

        .btn-map {
            width: 100%;
            padding: 16px;
            background: var(--gradient-gold);
            border: none;
            border-radius: 16px;
            color: var(--primary-dark);
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-map:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-gold);
        }

        /* ===== CTA SECTION ===== */
        .cta-section {
            text-align: center;
            padding: 40px 0;
        }

        .btn-wa-large {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px 50px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.2);
        }

        .btn-wa-large:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.3);
        }

        .btn-wa-large i {
            font-size: 1.4rem;
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary-medium);
            border: 1px solid var(--border-subtle);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-link:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            transform: translateY(-5px);
        }

        /* ===== IMAGE VIEWER ===== */
        #viewer {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 1000000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
        }

        .viewer-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
        }

        #viewer-img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
        }

        .viewer-close {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1000001;
        }

        .viewer-close:hover {
            background: #c0392b;
            border-color: transparent;
            transform: rotate(90deg);
        }

        .viewer-watermark {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        /* ===== CATALOG OVERLAY ===== */
        #cat-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--primary-dark);
            z-index: 1000000;
            flex-direction: column;
        }

        .cat-header {
            background: var(--primary-medium);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-subtle);
        }

        .cat-header span {
            color: var(--accent-gold);
            font-weight: 800;
            font-size: 1.2rem;
        }

        .cat-close {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            padding: 8px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .cat-close:hover {
            background: #c0392b;
            color: white;
            border-color: transparent;
        }

        #cat-frame {
            flex: 1;
            background: white;
        }

        /* ===== PROTECTION TOGGLE ===== */
        #protection-toggle {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: #2ecc71;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        #protection-toggle.active {
            background: rgba(231, 76, 60, 0.1);
            border-color: rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        #protection-toggle:hover {
            transform: scale(1.1);
        }

        /* ===== HIDDEN TRIGGER ===== */
        #hidden-trigger {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 70px;
            height: 70px;
            z-index: 10001;
            cursor: pointer;
            opacity: 0;
        }

        /* ===== FOOTER ===== */
        footer {
            background: var(--primary-medium);
            border-top: 1px solid var(--border-subtle);
            padding: 30px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* ===== ADMIN PANEL ===== */
        #admin-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--primary-dark);
            z-index: 10000000;
            overflow-y: auto;
            padding: 20px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--primary-medium);
            border: 1px solid var(--border-subtle);
            border-radius: 32px;
            padding: 40px;
        }

        .admin-title {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent-gold);
            text-align: center;
            margin-bottom: 40px;
        }

        .admin-section {
            background: var(--primary-deep);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .admin-section-header {
            width: 100%;
            padding: 20px 25px;
            background: none;
            border: none;
            color: var(--text-bright);
            font-weight: 800;
            text-align: right;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .admin-section-header:hover {
            background: rgba(201, 169, 110, 0.05);
        }

        .admin-section-header .arrow {
            color: var(--accent-gold);
            transition: transform 0.3s ease;
        }

        .admin-content {
            display: none;
            padding: 25px;
            border-top: 1px solid var(--border-subtle);
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 15px;
            background: var(--primary-dark);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: var(--text-bright);
            font-family: var(--font-arabic);
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            margin-bottom: 10px;
            cursor: pointer;
        }

        .admin-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 5px;
        }

        .admin-btn-primary {
            background: var(--gradient-gold);
            color: var(--primary-dark);
        }

        .admin-btn-success {
            background: #27ae60;
            color: white;
        }

        .admin-btn-danger {
            background: #c0392b;
            color: white;
        }

        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        /* ===== DEVTOOLS OVERLAY ===== */
        #devtools-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2147483647;
            display: none;
            align-items: center;
            justify-content: center;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }
            
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 20px;
            }
            
            .section-title {
                font-size: 2rem;
            }
            
            .admin-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash">
        <div class="splash-content">
            <div class="splash-logo">BG</div>
            <div class="splash-divider"></div>
            <div class="splash-sub">بصمة غير</div>
        </div>
    </div>

    <!-- Maintenance Screen -->
    <div id="maintenance-screen">
        <div class="maintenance-card">
            <div class="maintenance-icon">
                <i class="fas fa-tools"></i>
            </div>
            <h2 class="maintenance-title" id="maintenance-title">تحت التطوير</h2>
            <p class="maintenance-message" id="maintenance-message">نعمل على تحسين تجربتك، سنعود قريباً</p>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <span class="hero-label">BASMA GHAIR</span>
            <h1 class="hero-title">
                <span class="hero-title-line" id="site-name-display">بصمة غير</span>
                <span class="hero-title-line-gold">للديكور</span>
            </h1>
            <p class="hero-subtitle">تصاميم داخلية تجمع بين الأصالة والمعاصرة</p>
        </div>

        <!-- Partners Marquee -->
        <div class="partners-section">
            <div class="partners-label" id="partners-title">شركاء النجاح</div>
            <div class="partners-marquee">
                <div class="marquee-track" id="partners-display"></div>
            </div>
        </div>
    </section>

    <!-- News Ticker -->
    <div class="news-ticker" id="news-container">
        <div class="ticker-label">أخبار</div>
        <div class="ticker-content" id="news-text"></div>
    </div>

    <!-- Navigation -->
    <nav>
        <div class="nav-container" id="navbar"></div>
    </nav>

    <!-- Main Content -->
    <main class="container" id="content-area"></main>

    <!-- Footer -->
    <footer id="site-footer">© 2024 بصمة غير للديكور. جميع الحقوق محفوظة</footer>

    <!-- Catalog Overlay -->
    <div id="cat-overlay">
        <div class="cat-header">
            <span>الكتالوج</span>
            <button class="cat-close" onclick="this.closest('#cat-overlay').style.display='none'">إغلاق</button>
        </div>
        <div id="cat-frame"></div>
    </div>

    <!-- Image Viewer -->
    <div id="viewer" onclick="closeViewerOnOverlay(event)">
        <button class="viewer-close" onclick="closeViewer()"><i class="fas fa-times"></i></button>
        <div class="viewer-content">
            <img id="viewer-img" src="">
            <div class="viewer-watermark" id="viewer-watermark"></div>
        </div>
    </div>

    <!-- Protection Toggle -->
    <button id="protection-toggle" onclick="toggleProtection()">
        <i class="fas fa-shield-alt"></i>
    </button>

    <!-- Hidden Trigger for Admin -->
    <div id="hidden-trigger" onclick="checkAccess()"></div>

    <!-- Admin Panel -->
    <div id="admin-panel">
        <div class="admin-container">
            <h2 class="admin-title">لوحة التحكم</h2>

            <!-- Sections (same as original but restyled) -->
            <div class="admin-section">
                <button class="admin-section-header" onclick="toggleAdminSection('theme-section')">
                    <span>🎨 الثيمات</span>
                    <span class="arrow">▼</span>
                </button>
                <div id="theme-section" class="admin-content">
                    <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                        <button onclick="setTheme('black')" class="admin-btn admin-btn-primary" style="flex:1;">الأسود</button>
                        <button onclick="setTheme('ramadan')" class="admin-btn admin-btn-primary" style="flex:1;">الرمضاني</button>
                    </div>
                    <p id="current-theme-display" style="color: var(--accent-gold);">الثيم الحالي: الأسود</p>
                </div>
            </div>

            <div class="admin-section">
                <button class="admin-section-header" onclick="toggleAdminSection('protection-section')">
                    <span>🛡️ الحماية</span>
                    <span class="arrow">▼</span>
                </button>
                <div id="protection-section" class="admin-content">
                    <label><input type="checkbox" id="enable-right-click-protection" checked> منع النقر الأيمن</label>
                    <label><input type="checkbox" id="enable-keyboard-protection" checked> منع اختصارات المفاتيح</label>
                    <label><input type="checkbox" id="enable-image-protection" checked> منع سحب الصور</label>
                    <label><input type="checkbox" id="enable-selection-protection" checked> منع نسخ النصوص</label>
                    <button onclick="saveProtectionSettings()" class="admin-btn admin-btn-primary">حفظ الإعدادات</button>
                </div>
            </div>

            <div class="admin-section">
                <button class="admin-section-header" onclick="toggleAdminSection('fonts-section')">

                    <span class="arrow">▼</span>

                    <div id="admin-partners-list"></div>
                    <input type="text" id="new-partner-url" placeholder="رابط الشعار">

            <div class="admin-section">

                    <span class="arrow">▼</span>

                <div id="catalog-section" class="admin-content">

            <div class="admin-section">

            <div class="admin-section">

                    <input type="text" id="in-wa" placeholder="رقم واتساب">
                    <input type="text" id="in-wm" placeholder="العلامة المائية">
                    <textarea id="in-news" placeholder="شريط الأخبار" rows="2"></textarea>
                    <input type="text" id="in-footer" placeholder="نص الحقوق">

                </div>

            <button onclick="location.reload()" class="admin-btn admin-btn-danger" style="margin-top: 20px;">إغلاق لوحة التحكم</button>
        </div>

    <div id="devtools-overlay">
        <div style="text-align: center;">
            <i class="fas fa-shield-alt" style="font-size: 4rem; color: #c0392b; margin-bottom: 20px;"></i>

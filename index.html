<script>
    const firebaseConfig = { apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY", authDomain: "mydecor-b29bd.firebaseapp.com", databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mydecor-b29bd", storageBucket: "mydecor-b29bd.firebasestorage.app", messagingSenderId: "302609299720", appId: "1:302609299720:web:e086b600c3ee824acd54bd" };

    // ========== نظام الدردشة (نسخة مصححة بالكامل مع عرض فوري للرسائل) ==========
    let currentTicketId = null;

    function escapeHtml(text) {

    }

    function formatTime(timestamp) {

        return `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
    }

            document.body.appendChild(toast);
        }
        toast.innerText = message;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    function getOrCreateVisitorId() {
        let visitorId = localStorage.getItem('chat_visitor_id');
        if (!visitorId) {
            visitorId = 'visitor_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            localStorage.setItem('chat_visitor_id', visitorId);
        }
        return visitorId;
    }

    function requestUserName() {
        return new Promise((resolve) => {
            const chatWindow = document.getElementById('chatWindow');
            const overlay = document.createElement('div');
            overlay.className = 'name-request-overlay';
            overlay.innerHTML = `
                <i class="fas fa-user-circle" style="font-size: 60px; color: var(--primary);"></i>
                <h3 style="margin-top: 15px;">مرحباً بك!</h3>
                <p style="text-align: center; margin: 10px 20px;">الرجاء إدخال اسمك لبدء المحادثة</p>
                <input type="text" id="nameInput" class="name-request-input" placeholder="اكتب اسمك هنا...">
                <button id="nameSubmitBtn" class="name-request-btn">بدء المحادثة</button>
            `;
            chatWindow.appendChild(overlay);
            const nameInput = document.getElementById('nameInput');
            const submitBtn = document.getElementById('nameSubmitBtn');
            const submitName = () => {
                const name = nameInput.value.trim();
                if (name) {
                    localStorage.setItem('chat_visitor_name', name);
                    overlay.remove();
                    resolve(name);
                } else {
                    showChatToast('❌ الرجاء إدخال اسمك');
                }
            };
            submitBtn.onclick = submitName;
            nameInput.onkeypress = (e) => { if (e.key === 'Enter') submitName(); };
            nameInput.focus();
        });
    }

    async function getOrCreateTicket() {
        const visitorId = getOrCreateVisitorId();
        let visitorName = localStorage.getItem('chat_visitor_name');
        if (!visitorName && !isNameRequested) {
            isNameRequested = true;
            visitorName = await requestUserName();
        } else if (!visitorName) {
            visitorName = 'زائر';
        }
        currentVisitorName = visitorName;
        const ticketsRef = db.ref(`${DB_PATH}/chat_tickets`);
        const snapshot = await ticketsRef.orderByChild('visitorId').equalTo(visitorId).once('value');
        let existingTicket = null;
        snapshot.forEach(child => {
            const ticket = child.val();
            if (ticket && ticket.status === 'open') {
                existingTicket = { id: child.key, ...ticket };
            }
        });
        if (existingTicket) {
            currentTicketId = existingTicket.id;
            return currentTicketId;
        }
        const newTicket = { ticketId: null, visitorId: visitorId, visitorName: visitorName, status: 'open', createdAt: Date.now(), lastMessageAt: Date.now() };
        const newRef = ticketsRef.push();
        newTicket.ticketId = newRef.key;
        await newRef.set(newTicket);
        currentTicketId = newRef.key;
        return currentTicketId;
    }

    // ✅ دالة الإرسال المصححة - الآن تعرض الرسالة فوراً
    async function sendChatMessage(message) {
        if (!message.trim()) { 
            showChatToast('❌ الرجاء كتابة رسالة'); 
            return false; 
        }
        
        if (!currentTicketId) {
            await getOrCreateTicket();
        }
        
        // استخدام timestamp من العميل للعرض الفوري (سيتم استبداله من الخادم لاحقاً)
        const localTimestamp = Date.now();
        
        const messageData = { 
            id: Date.now().toString(), 
            sender: 'visitor', 
            senderName: currentVisitorName, 
            message: message.trim(), 
            timestamp: localTimestamp, 
            read: false 
        };
        
        try {
            // إرسال إلى Firebase
            await db.ref(`${DB_PATH}/chat_messages/${currentTicketId}`).push(messageData);
            await db.ref(`${DB_PATH}/chat_tickets/${currentTicketId}`).update({ 
                lastMessageAt: Date.now(), 
                status: 'open' 
            });
            
            // ✅ عرض الرسالة فوراً في واجهة الدردشة (الإصلاح المهم)
            displayChatMessage(messageData, true);
            
            // تفريغ حقل الإدخال
            const inputElement = document.getElementById('chatInput');
            if (inputElement) inputElement.value = '';
            
            if (!isAdminOnline) {
                showChatToast('📨 تم إرسال رسالتك. سيتم الرد عند عودة المشرف');
            }
            return true;
        } catch (error) { 
            console.error('Send error:', error); 
            showChatToast('❌ فشل إرسال الرسالة: ' + error.message); 
            return false; 
        }
    }

    function displayChatMessage(messageData, isOwnMessage) {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        const messageDiv = document.createElement('div');
        messageDiv.className = `chat-message ${isOwnMessage ? 'user' : 'admin'}`;
        const senderName = isOwnMessage ? 'أنت' : (messageData.senderName || 'الدعم');
        const timeStr = formatTime(messageData.timestamp);
        messageDiv.innerHTML = `<div class="message-bubble"><div style="font-size: 0.7rem; margin-bottom: 4px; opacity: 0.7;">${escapeHtml(senderName)}</div><div>${escapeHtml(messageData.message)}</div></div><div class="message-time">${timeStr}</div>`;
        container.appendChild(messageDiv);
        container.scrollTop = container.scrollHeight;
    }

    async function loadPreviousMessages() {
        if (!currentTicketId) return;
        const container = document.getElementById('chatMessages');
        if (container) container.innerHTML = '';
        const messagesRef = db.ref(`${DB_PATH}/chat_messages/${currentTicketId}`).orderByChild('timestamp').limitToLast(50);
        const snapshot = await messagesRef.once('value');
        const messages = [];
        snapshot.forEach(child => { if (child.val()) messages.push(child.val()); });
        messages.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
        messages.forEach(msg => { const isOwn = (msg.sender === 'visitor'); displayChatMessage(msg, isOwn); });
    }

    function startListeningToMessages() {
        if (messageListener) messageListener.off();
        if (!currentTicketId) return;
        const messagesRef = db.ref(`${DB_PATH}/chat_messages/${currentTicketId}`).orderByChild('timestamp').limitToLast(1);
        messageListener = messagesRef.on('child_added', (snapshot) => {
            const msg = snapshot.val();
            if (msg && msg.sender === 'admin') {
                displayChatMessage(msg, false);
                try { const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3'); audio.play().catch(e => console.log('صوت:', e)); } catch(e) {}
            }
        });
    }

    function startListeningToAdminStatus() {
        const statusRef = db.ref(`${DB_PATH}/chat_admin_status`);
        statusRef.on('value', (snapshot) => {
            const status = snapshot.val();
            isAdminOnline = status ? status.isOnline : false;
            const badge = document.getElementById('adminStatusBadge');
            const banner = document.getElementById('offlineBanner');
            if (badge) { badge.className = `admin-status-badge ${isAdminOnline ? 'online' : 'offline'}`; badge.innerText = isAdminOnline ? '🟢 متصل' : '⚪ غير متصل'; }
            if (banner) banner.style.display = isAdminOnline ? 'none' : 'block';
        });
    }

    // ✅ تهيئة الدردشة مع ربط الأحداث بشكل صحيح
    async function initChatSystem() {
        const chatWindow = document.getElementById('chatWindow');
        const toggleBtn = document.getElementById('chatToggleBtn');
        const closeBtn = document.getElementById('chatCloseBtn');
        const sendBtn = document.getElementById('chatSendBtn');
        const chatInput = document.getElementById('chatInput');
        
        // دالة إرسال موحدة
        const handleSendMessage = () => {
            const message = chatInput.value.trim();
            if (message) {
                sendChatMessage(message);
            }
        };
        
        // ربط زر الإرسال
        if (sendBtn) {
            sendBtn.onclick = handleSendMessage;
        }
        
        // ربط Enter
        if (chatInput) {
            chatInput.onkeypress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            };
        }
        
        // فتح وإغلاق الدردشة
        if (toggleBtn) {
            toggleBtn.onclick = async () => {
                if (chatWindow.style.display === 'none' || chatWindow.style.display === '') {
                    chatWindow.style.display = 'flex';
                    await getOrCreateTicket();
                    await loadPreviousMessages();
                    startListeningToMessages();
                    startListeningToAdminStatus();
                } else {
                    chatWindow.style.display = 'none';
                    if (messageListener) messageListener.off();
                }
            };
        }
        
        if (closeBtn) {
            closeBtn.onclick = () => {
                chatWindow.style.display = 'none';
                if (messageListener) messageListener.off();
            };
        }
        
        startListeningToAdminStatus();
    }

    // ========== باقي دوال الموقع الأصلي ==========

        let attempts = 0;
        const tryLoad = () => { imgElement.src = src; };
        imgElement.onerror = () => {
            if (attempts < retries) { attempts++; setTimeout(tryLoad, 500 * attempts); }
            else { imgElement.src = fallbackUrl; imgElement.style.objectFit = 'contain'; }
        };
        tryLoad();
    }

    let currentStoryItems = [], currentStoryIdx = 0, storyTimer = null, storyMediaElements = [], storyPlaying = true;
    function isVideoUrl(url) { return /\.(mp4|webm|mov|ogg|mkv)$/i.test(url); }
    function showStorySplash(items, durationSec = 5) {

        if (storyTimer) clearInterval(storyTimer);
        if (storyMediaElements.length) { storyMediaElements.forEach(el => { if (el.tagName === 'VIDEO') el.pause(); el.remove(); }); storyMediaElements = []; }
        currentStoryItems = items; currentStoryIdx = 0;
        splashDiv.innerHTML = `<div class="stories-container" id="storiesContainer"><div class="story-progress-bar" id="storyProgressBar"></div><div class="story-counter" id="storyCounter">1/${items.length}</div><div class="story-nav prev" id="storyPrev"></div><div class="story-nav next" id="storyNext"></div><button class="splash-skip" id="splashSkipBtn">تخطي ←</button></div>`;
        const container = document.getElementById('storiesContainer');

            else { media = document.createElement('img'); media.src = item.url; media.alt = 'صورة سبلاش'; media.onerror = () => { media.src = 'https://placehold.co/1080x1920?text=خطأ+تحميل'; }; }
            media.className = 'story-media';

            container.appendChild(media);

        document.getElementById('storyPrev').addEventListener('click', () => navigateStory(-1));

        startCurrentStoryItem(durationSec * 1000);
    }
    function startCurrentStoryItem(durationMs) {

        storyMediaElements.forEach((el, idx) => { if (el.tagName === 'VIDEO') { el.pause(); el.currentTime = 0; } if (idx === currentStoryIdx) el.classList.add('active'); else el.classList.remove('active'); });
        for (let i = 0; i < currentStoryItems.length; i++) { const fill = document.getElementById(`progressFill_${i}`); if (fill) fill.style.width = (i < currentStoryIdx) ? '100%' : (i === currentStoryIdx) ? '0%' : '0%'; }

        storyPlaying = true;
    }
    function navigateStory(direction) { if (!storyPlaying) return; let newIdx = currentStoryIdx + direction; if (newIdx < 0) newIdx = 0; if (newIdx >= currentStoryItems.length) { closeSplash(); return; } if (newIdx === currentStoryIdx) return; currentStoryIdx = newIdx; startCurrentStoryItem((currentData.splash_duration || 5) * 1000); }
    function closeSplash() { if (storyTimer) clearInterval(storyTimer); storyPlaying = false; storyMediaElements.forEach(el => { if (el.tagName === 'VIDEO') el.pause(); }); const splashDiv = document.getElementById('splash'); splashDiv.style.opacity = '0'; setTimeout(() => { splashDiv.style.display = 'none'; splashDiv.innerHTML = ''; storyMediaElements = []; }, 500); }

    function bindLightboxEvents() { imgElement.addEventListener('mousedown', onMouseDown); window.addEventListener('mousemove', onMouseMove); window.addEventListener('mouseup', onMouseUp); imgElement.addEventListener('touchstart', onTouchStart, { passive: false }); imgElement.addEventListener('touchmove', onTouchMove, { passive: false }); imgElement.addEventListener('touchend', onTouchEnd); imgElement.addEventListener('wheel', onWheel, { passive: false }); }

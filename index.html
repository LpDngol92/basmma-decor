<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة إدارة المتجر | بصمة غير</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
        body{background:#f5f3f0;padding:20px;color:#2d2a27;}
        .container{max-width:1100px;margin:0 auto;}
        .login-box,.admin-panel{background:white;border-radius:32px;padding:28px;box-shadow:0 15px 35px rgba(0,0,0,0.1);margin-top:30px;}
        .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;flex-wrap:wrap;gap:15px;}
        .admin-header h1{color:#b88b4a;font-size:1.6rem;}
        button,.btn{background:#d4af7a;color:white;padding:10px 18px;border:none;border-radius:40px;font-weight:600;cursor:pointer;transition:0.2s;}
        button:hover{transform:translateY(-2px);opacity:0.95;}
        .btn-red{background:#dc3545;}
        .btn-green{background:#28a745;}
        .btn-gold{background:#b88b4a;}
        .logout-btn{background:#dc3545;width:auto;padding:8px 22px;}
        .collapse-section{background:white;border-radius:24px;margin-bottom:20px;border:1px solid #e9e2d8;overflow:hidden;}
        .collapse-btn{background:#fefaf5;display:flex;justify-content:space-between;padding:16px 22px;font-weight:700;font-size:1rem;color:#b88b4a;border-bottom:1px solid #e9e2d8;cursor:pointer;}
        .collapse-content{display:none;padding:22px;background:white;}
        .list-item-row{display:flex;gap:12px;align-items:center;margin-bottom:12px;background:#fefaf5;padding:12px;border-radius:20px;border:1px solid #e9e2d8;}
        .list-item-row input{flex:1;margin:0;padding:10px;border-radius:30px;border:1px solid #ddd;}
        .file-upload-area{border:2px dashed #d4af7a;border-radius:24px;padding:20px;text-align:center;margin-bottom:20px;background:#fef9ef;}
        .progress-bar{width:100%;background:#e9ecef;border-radius:20px;margin:10px 0;height:8px;overflow:hidden;}
        .progress-fill{width:0%;height:100%;background:#28a745;transition:width 0.2s;}
        .image-delete-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:15px;margin-top:15px;}
        .image-delete-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:16px;}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e2a3a;color:white;padding:10px 24px;border-radius:50px;z-index:9999;display:none;font-size:0.85rem;}
        @media(max-width:700px){.list-item-row{flex-wrap:wrap;}}
        hr{margin:15px 0;border-color:#e9e2d8;}
        .checkbox-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
    </style>
</head>
<body>
<div class="container">
    <div class="login-box" id="loginBox"><h2 style="text-align:center;">🔐 دخول المدير</h2><input type="password" id="adminPassword" placeholder="كلمة المرور"><button onclick="login()">تسجيل الدخول</button></div>
    <div id="adminPanel" style="display:none;"><div class="admin-header"><h1>⚙️ إدارة المتجر</h1><button onclick="logout()" class="logout-btn">خروج</button></div><div id="adminSections"></div></div>
</div>
<div id="toast" class="toast"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY", authDomain: "mydecor-b29bd.firebaseapp.com", databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mydecor-b29bd", storageBucket: "mydecor-b29bd.firebasestorage.app", messagingSenderId: "302609299720", appId: "1:302609299720:web:e086b600c3ee824acd54bd" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    const DB_PATH = 'site_v28';
    let currentData = {}, loggedIn = false, openSections = {};

    function showToast(msg){ const t=document.getElementById('toast'); t.innerText=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
    function login(){ const pwd=document.getElementById('adminPassword').value; db.ref(DB_PATH+'/in').once('value').then(snap=>{ if(snap.val() && snap.val().toString()===pwd){ loggedIn=true; document.getElementById('loginBox').style.display='none'; document.getElementById('adminPanel').style.display='block'; loadData(); } else showToast('كلمة المرور غير صحيحة'); }); }
    function logout(){ loggedIn=false; document.getElementById('loginBox').style.display='block'; document.getElementById('adminPanel').style.display='none'; currentData={}; }
    function loadData(){ db.ref(DB_PATH).on('value', snap=>{ currentData=snap.val()||{}; buildAdmin(); restoreOpen(); }); }
    function toggleCollapse(btn,id){ const content=btn.nextElementSibling; const isOpen=content.style.display==='block'; content.style.display=isOpen?'none':'block'; openSections[id]=!isOpen; btn.querySelector('span').innerHTML=isOpen?'▾':'▴'; }
    function restoreOpen(){ document.querySelectorAll('.collapse-section').forEach(section=>{ const id=section.dataset.sectionId; if(openSections[id]){ section.querySelector('.collapse-content').style.display='block'; section.querySelector('.collapse-btn span').innerHTML='▴'; } }); }

    // رفع الملفات
    async function uploadFile(file, folder='products'){ const ext=file.name.split('.').pop(); const name=`${Date.now()}_${Math.random().toString(36).substr(2,6)}.${ext}`; const ref=storage.ref(`${folder}/${name}`); await ref.put(file); return await ref.getDownloadURL(); }
    async function uploadMultiple(files, folder, prog){ let urls=[]; for(let i=0;i<files.length;i++){ urls.push(await uploadFile(files[i],folder)); if(prog) prog(i+1,files.length); } return urls; }
    async function saveImages(target, urlsOrFiles, isFiles=false){ if(!target) return showToast('اختر الوجهة'); let imageUrls=[]; if(isFiles){ if(!urlsOrFiles.length) return showToast('اختر صوراً'); showToast(`جاري رفع ${urlsOrFiles.length} صورة`); try{ imageUrls=await uploadMultiple(urlsOrFiles,'products',(d,t)=>{ const p=document.getElementById('uploadProgress'); if(p){ p.style.display='block'; p.querySelector('.progress-fill').style.width=`${(d/t)*100}%`; } }); showToast(`تم رفع ${imageUrls.length} صورة`); }catch(e){ showToast('فشل الرفع'); return; } } else { imageUrls=urlsOrFiles.filter(u=>u.trim()); if(!imageUrls.length) return showToast('أدخل روابط'); } const promises=imageUrls.map(url=>db.ref(DB_PATH+'/'+target+'/imgs').push({url})); await Promise.all(promises); showToast(`تم نشر ${imageUrls.length} صورة`); }

    // ========== إدارة أقسام المتجر ==========
    function renderStoreCats(){ const c=document.getElementById('storeCatsList'); if(!c) return; if(!currentData.store_categories) c.innerHTML='<div>لا توجد أقسام</div>'; else c.innerHTML=Object.keys(currentData.store_categories).map(id=>`<div class="list-item-row" data-id="${id}"><input type="text" value="${currentData.store_categories[id].name.replace(/"/g,'&quot;')}" class="cat-name"><button onclick="deleteCatLocal(this)" class="btn-red">حذف</button></div>`).join(''); }
    function addCatLocal(){ const name=document.getElementById('newCatName').value.trim(); if(!name) return showToast('أدخل اسم القسم'); const newId='temp_cat_'+Date.now(); const div=document.createElement('div'); div.className='list-item-row'; div.setAttribute('data-id',newId); div.innerHTML=`<input type="text" value="${name.replace(/"/g,'&quot;')}" class="cat-name"><button onclick="deleteCatLocal(this)" class="btn-red">حذف</button>`; document.getElementById('storeCatsList').appendChild(div); document.getElementById('newCatName').value=''; showToast('أضيف محلياً'); }
    function deleteCatLocal(btn){ btn.closest('.list-item-row').remove(); showToast('حذف محلياً'); }
    function saveAllCats(){ const rows=document.querySelectorAll('#storeCatsList .list-item-row'); const updates={}, toRemove=[]; rows.forEach(row=>{ const id=row.getAttribute('data-id'); const name=row.querySelector('.cat-name').value.trim(); if(name){ if(!id.startsWith('temp_cat_')) updates[`store_categories/${id}/name`]=name; else updates[`store_categories/${id}`]={name}; } else { if(!id.startsWith('temp_cat_')) toRemove.push(id); } }); Promise.all([...toRemove.map(id=>db.ref(DB_PATH+'/store_categories/'+id).remove()), ...Object.keys(updates).map(p=>db.ref(DB_PATH).child(p).set(updates[p]))]).then(()=>showToast('تم حفظ الأقسام')); }

    // ========== إدارة ألبومات أعمالنا ==========
    function renderAlbums(){ const c=document.getElementById('albumsList'); if(!c) return; if(!currentData.albums) c.innerHTML='<div>لا توجد ألبومات</div>'; else c.innerHTML=Object.keys(currentData.albums).map(id=>`<div class="list-item-row" data-id="${id}"><input type="text" value="${currentData.albums[id].name.replace(/"/g,'&quot;')}" class="album-name"><button onclick="deleteAlbumLocal(this)" class="btn-red">حذف</button></div>`).join(''); }
    function addAlbumLocal(){ const name=document.getElementById('newAlbumName').value.trim(); if(!name) return; const newId='temp_alb_'+Date.now(); const div=document.createElement('div'); div.className='list-item-row'; div.setAttribute('data-id',newId); div.innerHTML=`<input type="text" value="${name}" class="album-name"><button onclick="deleteAlbumLocal(this)" class="btn-red">حذف</button>`; document.getElementById('albumsList').appendChild(div); document.getElementById('newAlbumName').value=''; showToast('أضيف محلياً'); }
    function deleteAlbumLocal(btn){ btn.closest('.list-item-row').remove(); }
    function saveAllAlbums(){ const rows=document.querySelectorAll('#albumsList .list-item-row'); const updates={}, toRemove=[]; rows.forEach(row=>{ const id=row.getAttribute('data-id'); const name=row.querySelector('.album-name').value.trim(); if(name){ if(!id.startsWith('temp_alb_')) updates[`albums/${id}/name`]=name; else updates[`albums/${id}`]={name}; } else { if(!id.startsWith('temp_alb_')) toRemove.push(id); } }); Promise.all([...toRemove.map(id=>db.ref(DB_PATH+'/albums/'+id).remove()), ...Object.keys(updates).map(p=>db.ref(DB_PATH).child(p).set(updates[p]))]).then(()=>showToast('تم حفظ الألبومات')); }

    // ========== إدارة الشركاء ==========
    function renderPartners(){ const c=document.getElementById('partnersList'); if(!c) return; if(!currentData.partners) c.innerHTML='<div>لا يوجد شركاء</div>'; else c.innerHTML=Object.keys(currentData.partners).map(id=>`<div class="list-item-row" data-id="${id}"><img src="${currentData.partners[id].url}" style="width:50px;height:50px;object-fit:contain;"><input type="text" value="${currentData.partners[id].url.replace(/"/g,'&quot;')}" class="partner-url"><input type="text" value="${(currentData.partners[id].link||'').replace(/"/g,'&quot;')}" placeholder="رابط" class="partner-link"><button onclick="deletePartnerLocal(this)" class="btn-red">حذف</button></div>`).join(''); }
    function addPartnerLocal(){ const url=document.getElementById('newPartnerUrl').value.trim(); if(!url) return; const newId='temp_part_'+Date.now(); const div=document.createElement('div'); div.className='list-item-row'; div.setAttribute('data-id',newId); div.innerHTML=`<img src="${url}" style="width:50px;height:50px;object-fit:contain;"><input type="text" value="${url}" class="partner-url"><input type="text" placeholder="رابط" class="partner-link"><button onclick="deletePartnerLocal(this)" class="btn-red">حذف</button>`; document.getElementById('partnersList').appendChild(div); document.getElementById('newPartnerUrl').value=''; showToast('أضيف محلياً'); }
    function deletePartnerLocal(btn){ btn.closest('.list-item-row').remove(); }
    function saveAllPartners(){ const rows=document.querySelectorAll('#partnersList .list-item-row'); const updates={}, toRemove=[]; rows.forEach(row=>{ const id=row.getAttribute('data-id'); const url=row.querySelector('.partner-url').value.trim(); const link=row.querySelector('.partner-link').value.trim(); if(url){ if(!id.startsWith('temp_part_')){ updates[`partners/${id}/url`]=url; if(link) updates[`partners/${id}/link`]=link; } else updates[`partners/${id}`]={url, link:link||null}; } else { if(!id.startsWith('temp_part_')) toRemove.push(id); } }); Promise.all([...toRemove.map(id=>db.ref(DB_PATH+'/partners/'+id).remove()), ...Object.keys(updates).map(p=>db.ref(DB_PATH).child(p).set(updates[p]))]).then(()=>showToast('تم حفظ الشركاء')); }

    // ========== إعدادات الموقع ==========
    function saveGeneral(){ db.ref(DB_PATH).update({ site_name: document.getElementById('siteName').value, whatsapp_num: document.getElementById('whatsappNum').value, location_url: document.getElementById('locationUrl').value }).then(()=>showToast('تم الحفظ')); }
    function saveAbout(){ db.ref(DB_PATH).update({ about_text: document.getElementById('aboutText').value }).then(()=>showToast('تم حفظ من نحن')); }
    function saveSchedule(){ let sched={}; for(let i=0;i<=6;i++){ sched[i]={ active:document.getElementById(`dayActive_${i}`).checked, s1_s:document.getElementById(`s1s_${i}`).value, s1_e:document.getElementById(`s1e_${i}`).value, s2_a:document.getElementById(`s2a_${i}`).checked, s2_s:document.getElementById(`s2s_${i}`).value, s2_e:document.getElementById(`s2e_${i}`).value }; } db.ref(DB_PATH+'/work_schedule').set(sched).then(()=>showToast('تم حفظ أوقات العمل')); }
    function saveMaintenance(){ const active=document.getElementById('maintenanceMode').checked; let until=null; if(active){ let h=parseInt(document.getElementById('hours').value)||0; let m=parseInt(document.getElementById('minutes').value)||0; let s=parseInt(document.getElementById('seconds').value)||0; let total=(h*3600+m*60+s)*1000; if(total>0) until=Date.now()+total; } db.ref(DB_PATH).update({ maintenance_mode: active, maintenance_title: document.getElementById('mainTitle').value, maintenance_message: document.getElementById('mainMsg').value, maintenance_until: until }).then(()=>showToast('تم حفظ إعدادات الصيانة')); }
    function saveSplash(){ const url=document.getElementById('splashUrl').value.trim(); if(url) db.ref(DB_PATH+'/splash_image_url').set(url).then(()=>showToast('تم حفظ بوستر البداية')); else showToast('أدخل رابط الصورة'); }
    async function uploadSplashFile(){ const file=document.getElementById('splashFile').files[0]; if(!file) return; showToast('جاري الرفع...'); const url=await uploadFile(file,'splash'); document.getElementById('splashUrl').value=url; showToast('تم الرفع، اضغط حفظ'); }

    // دوال حذف الصور وعرض الوجهات
    let selectedFiles=[];
    function handleFileSelect(e){ selectedFiles=Array.from(e.target.files); showToast(`تم اختيار ${selectedFiles.length} صورة`); }
    async function uploadFromFiles(){ const target=document.getElementById('uploadTarget').value; if(!target) return showToast('اختر الوجهة'); if(!selectedFiles.length) return showToast('اختر صوراً'); await saveImages(target, selectedFiles, true); selectedFiles=[]; document.getElementById('imageFiles').value=''; document.getElementById('uploadProgress').style.display='none'; }
    async function uploadFromUrls(){ const target=document.getElementById('uploadTarget').value; const urls=document.getElementById('imageUrls').value.split('\n').filter(u=>u.trim()); if(!target || !urls.length) return showToast('اختر الوجهة وأدخل روابط'); await saveImages(target, urls, false); document.getElementById('imageUrls').value=''; }
    function loadImagesForDelete(){ const path=document.getElementById('deleteTarget').value; const grid=document.getElementById('deleteGrid'); if(!path){ grid.innerHTML=''; return; } const [type,id]=path.split('/'); const folder=currentData[type]?.[id]; if(!folder||!folder.imgs){ grid.innerHTML='<p>لا توجد صور</p>'; return; } grid.innerHTML=Object.keys(folder.imgs).map(imgId=>`<div><img src="${folder.imgs[imgId].url}"><button onclick="deleteImage('${path}','${imgId}')" class="btn-red" style="margin-top:4px;">حذف</button></div>`).join(''); }
    function deleteImage(path,imgId){ db.ref(`${DB_PATH}/${path}/imgs/${imgId}`).remove().then(()=>{ showToast('تم الحذف'); loadImagesForDelete(); }); }
    function getTargetOptions(){ let o='<option value="">-- اختر الوجهة --</option>'; if(currentData.store_categories) Object.keys(currentData.store_categories).forEach(id=>o+=`<option value="store_categories/${id}">🛒 متجر: ${currentData.store_categories[id].name}</option>`); if(currentData.albums) Object.keys(currentData.albums).forEach(id=>o+=`<option value="albums/${id}">📁 ألبوم: ${currentData.albums[id].name}</option>`); return o; }

    // بناء لوحة الإدارة
    function buildAdmin(){
        const d=currentData;
        const scheduleEditor = () => { let html=''; const days=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"]; for(let i=0;i<=6;i++){ const s=d.work_schedule?.[i]||{}; html+=`<div style="border:1px solid #e9e2d8;border-radius:16px;padding:12px;margin-bottom:12px;"><label><input type="checkbox" id="dayActive_${i}" ${s.active?'checked':''}> ${days[i]}</label><div><input type="time" id="s1s_${i}" value="${s.s1_s||'09:00'}"> — <input type="time" id="s1e_${i}" value="${s.s1_e||'17:00'}"></div><label><input type="checkbox" id="s2a_${i}" ${s.s2_a?'checked':''}> فترة مسائية</label><div id="evening_${i}" style="${s.s2_a?'':'display:none'};margin-top:6px;"><input type="time" id="s2s_${i}" value="${s.s2_s||''}"> — <input type="time" id="s2e_${i}" value="${s.s2_e||''}"></div></div>`; } setTimeout(()=>{ for(let i=0;i<=6;i++){ const cb=document.getElementById(`s2a_${i}`); if(cb) cb.onchange=()=>document.getElementById(`evening_${i}`).style.display=cb.checked?'block':'none'; } },100); return html; };
        const html=`
            <div class="collapse-section" data-section-id="general"><button class="collapse-btn" onclick="toggleCollapse(this,'general')">⚙️ إعدادات المتجر <span>▾</span></button><div class="collapse-content"><input id="siteName" placeholder="اسم الموقع" value="${(d.site_name||'').replace(/"/g,'&quot;')}"><input id="whatsappNum" placeholder="رقم واتساب (بدون +)" value="${d.whatsapp_num||''}"><input id="locationUrl" placeholder="رابط موقع الخريطة" value="${(d.location_url||'').replace(/"/g,'&quot;')}"><button class="btn-gold" onclick="saveGeneral()">حفظ</button></div></div>
            <div class="collapse-section" data-section-id="about"><button class="collapse-btn" onclick="toggleCollapse(this,'about')">📖 من نحن <span>▾</span></button><div class="collapse-content"><textarea id="aboutText" rows="4">${(d.about_text||'').replace(/"/g,'&quot;')}</textarea><button class="btn-gold" onclick="saveAbout()">حفظ</button></div></div>
            <div class="collapse-section" data-section-id="schedule"><button class="collapse-btn" onclick="toggleCollapse(this,'schedule')">🕒 أوقات العمل <span>▾</span></button><div class="collapse-content">${scheduleEditor()}<button class="btn-gold" onclick="saveSchedule()">حفظ المواعيد</button></div></div>
            <div class="collapse-section" data-section-id="maintenance"><button class="collapse-btn" onclick="toggleCollapse(this,'maintenance')">🛡️ وضع الصيانة <span>▾</span></button><div class="collapse-content"><label><input type="checkbox" id="maintenanceMode" ${d.maintenance_mode?'checked':''}> تفعيل الصيانة</label><input id="mainTitle" placeholder="عنوان" value="${(d.maintenance_title||'').replace(/"/g,'&quot;')}"><textarea id="mainMsg" placeholder="رسالة" rows="2">${(d.maintenance_message||'').replace(/"/g,'&quot;')}</textarea><div style="display:flex;gap:10px;"><input type="number" id="hours" placeholder="ساعات" value="0"><input type="number" id="minutes" placeholder="دقائق" value="0"><input type="number" id="seconds" placeholder="ثواني" value="0"></div><button class="btn-gold" onclick="saveMaintenance()">حفظ إعدادات الصيانة</button></div></div>
            <div class="collapse-section" data-section-id="splash"><button class="collapse-btn" onclick="toggleCollapse(this,'splash')">📸 بوستر البداية <span>▾</span></button><div class="collapse-content"><input id="splashUrl" placeholder="رابط الصورة" value="${(d.splash_image_url||'').replace(/"/g,'&quot;')}"><div class="file-upload-area"><input type="file" id="splashFile" accept="image/*"><button class="btn-green" onclick="uploadSplashFile()">رفع من الجهاز</button></div><button class="btn-gold" onclick="saveSplash()">حفظ الرابط</button></div></div>
            <div class="collapse-section" data-section-id="store_cats"><button class="collapse-btn" onclick="toggleCollapse(this,'store_cats')">🛍️ أقسام المتجر <span>▾</span></button><div class="collapse-content"><div id="storeCatsList"></div><div style="display:flex;gap:10px;margin:10px 0;"><input id="newCatName" placeholder="اسم القسم الجديد"><button class="btn-green" onclick="addCatLocal()">إضافة محلياً</button></div><button class="btn-gold" onclick="saveAllCats()">حفظ جميع الأقسام</button></div></div>
            <div class="collapse-section" data-section-id="albums"><button class="collapse-btn" onclick="toggleCollapse(this,'albums')">📁 ألبومات أعمالنا <span>▾</span></button><div class="collapse-content"><div id="albumsList"></div><div style="display:flex;gap:10px;"><input id="newAlbumName" placeholder="اسم الألبوم"><button class="btn-green" onclick="addAlbumLocal()">إضافة</button></div><button class="btn-gold" onclick="saveAllAlbums()">حفظ الألبومات</button></div></div>
            <div class="collapse-section" data-section-id="partners"><button class="collapse-btn" onclick="toggleCollapse(this,'partners')">🤝 شركاء النجاح <span>▾</span></button><div class="collapse-content"><div id="partnersList"></div><div style="display:flex;gap:10px;"><input id="newPartnerUrl" placeholder="رابط الشعار"><button class="btn-green" onclick="addPartnerLocal()">إضافة شريك</button></div><button class="btn-gold" onclick="saveAllPartners()">حفظ الشركاء</button></div></div>
            <div class="collapse-section" data-section-id="upload"><button class="collapse-btn" onclick="toggleCollapse(this,'upload')">📸 رفع صور <span>▾</span></button><div class="collapse-content"><select id="uploadTarget">${getTargetOptions()}</select><div class="file-upload-area"><input type="file" id="imageFiles" multiple accept="image/*" onchange="handleFileSelect(event)"><button class="btn-green" onclick="document.getElementById('imageFiles').click()">اختر صوراً</button><div id="uploadProgress" style="display:none;"><div class="progress-bar"><div class="progress-fill"></div></div><span>جاري الرفع...</span></div><button class="btn-gold" onclick="uploadFromFiles()">رفع المختارة</button></div><textarea id="imageUrls" placeholder="روابط الصور (كل رابط بسطر)" rows="3"></textarea><button class="btn-gold" onclick="uploadFromUrls()">نشر من الروابط</button></div></div>
            <div class="collapse-section" data-section-id="delete"><button class="collapse-btn" onclick="toggleCollapse(this,'delete')">🗑️ حذف الصور <span>▾</span></button><div class="collapse-content"><select id="deleteTarget" onchange="loadImagesForDelete()">${getTargetOptions()}</select><div id="deleteGrid" class="image-delete-grid"></div></div></div>
        `;
        document.getElementById('adminSections').innerHTML=html;

            <p style="margin-bottom: 20px;">يرجى إغلاق أدوات المطورين للمتابعة</p>
            <button onclick="document.getElementById('devtools-overlay').style.display='none'" style="padding: 10px 30px; background: #fff; color: #c0392b; border: none; border-radius: 30px; font-weight: bold; cursor: pointer;">موافق</button>
        </div>
    </div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
            authDomain: "mydecor-b29bd.firebaseapp.com",
            databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mydecor-b29bd",
            storageBucket: "mydecor-b29bd.firebasestorage.app",
            messagingSenderId: "302609299720",
            appId: "1:302609299720:web:e086b600c3ee824acd54bd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const DB_PATH = 'site_v28';

        // ==================== GLOBAL VARIABLES ====================
        let currentData = {};
        let currentTab = 'home';
        let isAdmin = false;
        let userRating = 0;
        let reviewIndex = 0;
        let partnerIndex = 0;
        let isProtectionEnabled = true;

        const protectionSettings = {
            rightClick: true,
            keyboardShortcuts: true,
            imageProtection: true,
            textSelection: true
        };

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            initProtection();
            setupAuthListener();
            loadData();
        });

        function setupAuthListener() {
            auth.onAuthStateChanged(user => {
                if (user) {
                    isAdmin = true;
                    document.getElementById('admin-panel').style.display = 'block';
                    document.getElementById('protection-toggle').style.display = 'flex';
                }
            });
        }

        // ==================== LOAD DATA ====================
        function loadData() {
            db.ref(DB_PATH).on('value', snap => {
                currentData = snap.val() || {};
                
                // Hide splash
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').style.display = 'none', 800);

                // Check maintenance
                if (currentData.maintenance_mode && !isAdmin) {
                    showMaintenance();
                } else {
                    hideMaintenance();
                }

                // Apply theme
                if (currentData.theme) {
                    applyTheme(currentData.theme);
                }

                // Render everything
                renderAll();
                updateAdminLists();
                updatePartnersList();
                updateReviewsList();
                fillAdminFields();

                // News ticker
                if (currentData.news_bar) {
                    document.getElementById('news-container').style.display = 'flex';
                    document.getElementById('news-text').textContent = currentData.news_bar;
                }

                // Footer
                document.getElementById('site-footer').textContent = currentData.footer_text || '© 2024 بصمة غير للديكور. جميع الحقوق محفوظة';
            });
        }

        // ==================== MAINTENANCE ====================
        function showMaintenance() {
            const m = document.getElementById('maintenance-screen');
            document.getElementById('maintenance-title').textContent = currentData.maintenance_title || 'تحت التطوير';
            document.getElementById('maintenance-message').textContent = currentData.maintenance_message || 'نعمل على تحسين تجربتك';
            m.style.display = 'flex';
        }

        function hideMaintenance() {
            document.getElementById('maintenance-screen').style.display = 'none';
        }

        // ==================== THEME ====================
        function setTheme(theme) {
            applyTheme(theme);
            db.ref(DB_PATH).update({ theme });
            document.getElementById('current-theme-display').textContent = theme === 'black' ? 'الأسود' : 'الرمضاني';
        }

        function applyTheme(theme) {
            const root = document.documentElement;
            if (theme === 'ramadan') {
                root.style.setProperty('--primary-dark', '#0A3423');
                root.style.setProperty('--primary-deep', '#0F3E2A');
                root.style.setProperty('--primary-medium', '#154F35');
                root.style.setProperty('--accent-gold', '#E9C46A');
                root.style.setProperty('--accent-gold-light', '#F4E3B1');
            } else {
                root.style.setProperty('--primary-dark', '#0C0B0E');
                root.style.setProperty('--primary-deep', '#1A181B');
                root.style.setProperty('--primary-medium', '#252325');
                root.style.setProperty('--accent-gold', '#C9A96E');
                root.style.setProperty('--accent-gold-light', '#E5D2B0');
            }
        }

        // ==================== PROTECTION ====================
        function initProtection() {
            if (protectionSettings.rightClick) {
                document.addEventListener('contextmenu', e => e.preventDefault());
            }
            if (protectionSettings.imageProtection) {
                document.addEventListener('dragstart', e => e.preventDefault());
            }
            if (protectionSettings.textSelection) {
                document.addEventListener('selectstart', e => e.preventDefault());
                document.addEventListener('copy', e => e.preventDefault());
            }
        }

        function toggleProtection() {
            isProtectionEnabled = !isProtectionEnabled;
            const btn = document.getElementById('protection-toggle');
            if (isProtectionEnabled) {
                initProtection();
                btn.classList.remove('active');
                btn.innerHTML = '<i class="fas fa-shield-alt"></i>';
            } else {
                document.removeEventListener('contextmenu', e => e.preventDefault());
                document.removeEventListener('dragstart', e => e.preventDefault());
                document.removeEventListener('selectstart', e => e.preventDefault());
                btn.classList.add('active');
                btn.innerHTML = '<i class="fas fa-shield-slash"></i>';
            }
        }

        function saveProtectionSettings() {
            protectionSettings.rightClick = document.getElementById('enable-right-click-protection').checked;
            protectionSettings.keyboardShortcuts = document.getElementById('enable-keyboard-protection').checked;
            protectionSettings.imageProtection = document.getElementById('enable-image-protection').checked;
            protectionSettings.textSelection = document.getElementById('enable-selection-protection').checked;
            
            db.ref(DB_PATH).update({ protection_settings: protectionSettings }).then(() => {
                alert('تم حفظ الإعدادات');
                location.reload();
            });
        }

        // ==================== ACCESS ====================
        function checkAccess() {
            const input = prompt('🔐 رمز الإدارة:');
            if (!input) return;
            
            if (input === currentData.in || input === 'admin123') {
                isAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('protection-toggle').style.display = 'flex';
                fillAdminFields();
            } else {
                alert('❌ رمز غير صحيح');
            }
        }

        // ==================== VIEWER ====================
        function openImg(url) {
            document.getElementById('viewer-img').src = url;
            document.getElementById('viewer-watermark').textContent = currentData.wm_text || '';
            document.getElementById('viewer').style.display = 'flex';
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
        }

        function closeViewerOnOverlay(e) {
            if (e.target.id === 'viewer') closeViewer();
        }

        // ==================== RENDER FUNCTIONS ====================
        function renderAll() {
            // Render navigation
            renderNav();
            
            // Render content based on current tab
            let html = '';
            
            if (currentTab === 'home') {
                html = renderHome();
            } else if (currentTab === 'catalogs') {
                html = renderCatalogs();
            } else if (currentTab === 'works') {
                html = renderWorks();
            } else if (currentTab.startsWith('alb-')) {
                const albumId = currentTab.replace('alb-', '');
                html = renderAlbum(albumId);
            } else if (currentData.pages && currentData.pages[currentTab]) {
                html = renderPage(currentTab);
            }
            
            document.getElementById('content-area').innerHTML = html;
            
            // Start sliders
            startReviewSlider();
            updateWorkStatus();
        }

        function renderNav() {
            let nav = `<button class="nav-btn ${currentTab === 'home' ? 'active' : ''}" onclick="go('home')">الرئيسية</button>`;
            nav += `<button class="nav-btn ${currentTab === 'catalogs' ? 'active' : ''}" onclick="go('catalogs')">الكتالوج</button>`;
            
            if (currentData.pages) {
                Object.keys(currentData.pages).forEach(id => {
                    nav += `<button class="nav-btn ${currentTab === id ? 'active' : ''}" onclick="go('${id}')">${currentData.pages[id].title}</button>`;
                });
            }
            
            nav += `<button class="nav-btn ${currentTab === 'works' ? 'active' : ''}" onclick="go('works')">أعمالنا</button>`;
            
            document.getElementById('navbar').innerHTML = nav;
        }

        function renderHome() {
            const d = currentData;
            
            // Reviews
            let reviewsHtml = '';
            if (d.reviews && Object.keys(d.reviews).length) {
                const items = Object.keys(d.reviews).map((id, i) => {
                    const r = d.reviews[id];
                    return `<div class="review-item" id="review-${i}">
                        <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
                        <div class="review-text">"${r.message}"</div>
                        <div class="review-author">— ${r.name}</div>
                    </div>`;
                }).join('');
                reviewsHtml = `<div class="reviews-slider">${items}</div>`;
            }

            // About section
            const aboutHtml = d.about_active ? `
                <div class="toggle-card">
                    <button class="toggle-header" onclick="toggleAbout(this)">
                        <span>من نحن</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="toggle-content" id="about-content">
                        <div class="toggle-body">${d.about_text || ''}</div>
                    </div>
                </div>
            ` : '';

            // Review form
            const reviewFormHtml = `
                <div class="toggle-card">
                    <button class="toggle-header" onclick="toggleReviewForm(this)">
                        <span>أضف تقييمك</span>
                        <i class="fas fa-star"></i>
                    </button>
                    <div class="toggle-content" id="review-form">
                        <div class="toggle-body">
                            <input type="text" id="rev-name" placeholder="الاسم">
                            <div style="display: flex; gap: 10px; justify-content: center; margin: 20px 0; direction: ltr;">
                                ${[5,4,3,2,1].map(i => `<i class="fas fa-star" onclick="setStar(${i})" style="font-size: 1.8rem; color: var(--text-dim); cursor: pointer;"></i>`).join('')}
                            </div>
                            <textarea id="rev-msg" placeholder="تقييمك" rows="3"></textarea>
                            <button onclick="submitReview()" class="admin-btn admin-btn-primary" style="width: 100%;">إرسال</button>
                        </div>
                    </div>
                </div>
            `;

            // Process steps
            const processHtml = `
                <div class="process-grid">
                    <div class="process-step">
                        <div class="process-icon"><i class="fas fa-comments"></i></div>
                        <h4>الاستشارة</h4>
                        <p>نستمع لأفكارك ونناقش رؤيتك</p>
                    </div>
                    <div class="process-step">
                        <div class="process-icon"><i class="fas fa-ruler-combined"></i></div>
                        <h4>المعاينة</h4>
                        <p>نزور الموقع ونأخذ المقاسات</p>
                    </div>
                    <div class="process-step">
                        <div class="process-icon"><i class="fas fa-pencil-ruler"></i></div>
                        <h4>التصميم</h4>
                        <p>نقدم تصاميم احترافية ثلاثية الأبعاد</p>
                    </div>
                    <div class="process-step">
                        <div class="process-icon"><i class="fas fa-hammer"></i></div>
                        <h4>التنفيذ</h4>
                        <p>نحول التصميم إلى واقع ملموس</p>
                    </div>
                </div>
            `;

            // Schedule
            const scheduleHtml = `
                <div class="schedule-card">
                    <div class="schedule-header">
                        <i class="fas fa-clock"></i>
                        <h3>أوقات العمل</h3>
                    </div>
                    <div class="schedule-body">
                        ${getScheduleHtml(d)}
                        <div id="status-container"></div>
                    </div>
                </div>
            `;

            // Location
            const locationHtml = d.location_url ? `
                <div class="location-card">
                    <div class="location-header">
                        <i class="fas fa-map-marker-alt"></i>
                        <h3>موقعنا</h3>
                    </div>
                    <div class="location-body">
                        <button onclick="window.open('${d.location_url}','_blank')" class="btn-map">
                            <i class="fas fa-directions"></i> افتح الخريطة
                        </button>
                    </div>
                </div>
            ` : '';

            // CTA
            const ctaHtml = `
                <div class="cta-section">
                    <button onclick="whatsappGlobal()" class="btn-wa-large">
                        <i class="fab fa-whatsapp"></i> تواصل معنا
                    </button>
                    <div class="social-row">
                        ${d.insta_url ? `<a href="${d.insta_url}" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>` : ''}
                        ${d.tiktok_url ? `<a href="${d.tiktok_url}" target="_blank" class="social-link"><i class="fab fa-tiktok"></i></a>` : ''}
                        ${d.snap_url ? `<a href="${d.snap_url}" target="_blank" class="social-link"><i class="fab fa-snapchat"></i></a>` : ''}
                    </div>
                </div>
            `;

            return `
                <div class="section active">
                    <div class="home-grid">
                        ${aboutHtml}
                        ${reviewFormHtml}
                        ${reviewsHtml}
                        ${processHtml}
                        ${scheduleHtml}
                        ${locationHtml}
                        ${ctaHtml}
                    </div>
                </div>
            `;
        }

        function getScheduleHtml(d) {
            if (!d.work_schedule) return '<p style="color: var(--text-muted);">لم يتم تحديد مواعيد بعد</p>';
            
            const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const groups = {};
            
            Object.keys(d.work_schedule).forEach(day => {
                const s = d.work_schedule[day];
                if (s && s.active) {
                    const key = `${s.s1_s}-${s.s1_e}-${s.s2_a}-${s.s2_s}-${s.s2_e}`;
                    if (!groups[key]) groups[key] = { days: [], data: s };
                    groups[key].days.push(days[day]);
                }
            });

            let html = '';
            Object.values(groups).forEach(g => {
                const dayText = g.days.length === 1 ? g.days[0] : 
                              g.days.length === 2 ? `${g.days[0]} و ${g.days[1]}` : 
                              `من ${g.days[0]} إلى ${g.days[g.days.length-1]}`;
                
                html += `<div class="schedule-group">
                    <div class="days">${dayText}</div>
                    <div class="time-slot">
                        <span class="time-badge">${g.data.s1_s || '09:00'}</span>
                        <span>إلى</span>
                        <span class="time-badge">${g.data.s1_e || '17:00'}</span>
                    </div>`;
                
                if (g.data.s2_a && g.data.s2_s && g.data.s2_e) {
                    html += `<div class="time-slot">
                        <span class="time-badge">${g.data.s2_s}</span>
                        <span>إلى</span>
                        <span class="time-badge">${g.data.s2_e}</span>
                    </div>`;
                }
                html += `</div>`;
            });

            return html;
        }

        function updateWorkStatus() {
            const container = document.getElementById('status-container');
            if (!container || !currentData.work_schedule) return;

            const now = new Date();
            const day = now.getDay();
            const schedule = currentData.work_schedule[day];
            
            if (!schedule || !schedule.active) {
                container.innerHTML = '<div class="status-badge status-closed"><span class="status-dot"></span>مغلق اليوم</div>';
                return;
            }

            const current = now.getHours() * 60 + now.getMinutes();
            const s1s = timeToMinutes(schedule.s1_s);
            const s1e = timeToMinutes(schedule.s1_e);
            
            let isOpen = current >= s1s && current < s1e;
            
            if (schedule.s2_a && schedule.s2_s && schedule.s2_e) {
                const s2s = timeToMinutes(schedule.s2_s);
                const s2e = timeToMinutes(schedule.s2_e);
                isOpen = isOpen || (current >= s2s && current < s2e);
            }

            container.innerHTML = isOpen ? 
                '<div class="status-badge status-open"><span class="status-dot"></span>مفتوح الآن</div>' :
                '<div class="status-badge status-closed"><span class="status-dot"></span>مغلق الآن</div>';
        }

        function timeToMinutes(t) {
            if (!t) return 0;
            const [h, m] = t.split(':').map(Number);
            return h * 60 + m;
        }

        function renderCatalogs() {
            if (!currentData.catalogs) {
                return `
                    <div class="section active">
                        <div class="section-header">
                            <div class="section-eyebrow">استعرض تصاميمنا</div>
                            <h2 class="section-title">الكتالوج</h2>
                            <div class="section-divider"></div>
                        </div>
                        <p style="text-align: center; color: var(--text-muted);">قريباً...</p>
                    </div>
                `;
            }

            const items = Object.keys(currentData.catalogs).map(id => `
                <div class="folder-card" onclick="openCat('${id}')">
                    <div class="folder-icon"><i class="fas fa-book-open"></i></div>
                    <h3 class="folder-name">${currentData.catalogs[id].name}</h3>
                </div>
            `).join('');

            return `
                <div class="section active">
                    <div class="section-header">
                        <div class="section-eyebrow">استعرض تصاميمنا</div>
                        <h2 class="section-title">الكتالوج</h2>
                        <div class="section-divider"></div>
                    </div>
                    <div class="grid grid-sm">${items}</div>
                </div>
            `;
        }

        function renderWorks() {
            if (!currentData.albums) {
                return `
                    <div class="section active">
                        <div class="section-header">
                            <div class="section-eyebrow">أحدث أعمالنا</div>
                            <h2 class="section-title">أعمالنا</h2>
                            <div class="section-divider"></div>
                        </div>
                        <p style="text-align: center; color: var(--text-muted);">قريباً...</p>
                    </div>
                `;
            }

            const items = Object.keys(currentData.albums).map(id => `
                <div class="folder-card" onclick="go('alb-${id}')">
                    <div class="folder-icon"><i class="fas fa-folder-open"></i></div>
                    <h3 class="folder-name">${currentData.albums[id].name}</h3>
                </div>
            `).join('');

            return `
                <div class="section active">
                    <div class="section-header">
                        <div class="section-eyebrow">أحدث أعمالنا</div>
                        <h2 class="section-title">أعمالنا</h2>
                        <div class="section-divider"></div>
                    </div>
                    <div class="grid grid-sm">${items}</div>
                </div>
            `;
        }

        function renderAlbum(id) {
            const album = currentData.albums[id];
            if (!album || !album.imgs) {
                return `
                    <div class="section active">
                        <button class="nav-btn" onclick="go('works')" style="margin-bottom: 30px;"><i class="fas fa-arrow-right"></i> عودة</button>
                        <p style="text-align: center; color: var(--text-muted);">لا توجد صور</p>
                    </div>
                `;
            }

            const items = Object.keys(album.imgs).reverse().map(imgId => `
                <div class="card">
                    <div class="card-media" onclick="openImg('${album.imgs[imgId].url}')">
                        <img src="${album.imgs[imgId].url}" loading="lazy">
                        <div class="card-overlay">
                            <button class="card-expand"><i class="fas fa-expand-alt"></i></button>
                        </div>
                        <div class="watermark">${currentData.wm_text || ''}</div>
                    </div>
                    <div class="card-footer">
                        <button onclick="whatsappOrder('${album.imgs[imgId].url}')" class="btn-wa">
                            <i class="fab fa-whatsapp"></i> استفسار
                        </button>
                    </div>
                </div>
            `).join('');

            return `
                <div class="section active">
                    <button onclick="go('works')" class="nav-btn" style="margin-bottom: 30px;"><i class="fas fa-arrow-right"></i> عودة</button>
                    <div class="section-header">
                        <h2 class="section-title">${album.name}</h2>
                        <div class="section-divider"></div>
                    </div>
                    <div class="grid">${items}</div>
                </div>
            `;
        }

        function renderPage(id) {
            const page = currentData.pages[id];
            if (!page || !page.imgs) {
                return `
                    <div class="section active">
                        <p style="text-align: center; color: var(--text-muted);">لا توجد صور</p>
                    </div>
                `;
            }

            const items = Object.keys(page.imgs).reverse().map(imgId => `
                <div class="card">
                    <div class="card-media" onclick="openImg('${page.imgs[imgId].url}')">
                        <img src="${page.imgs[imgId].url}" loading="lazy">
                        <div class="card-overlay">
                            <button class="card-expand"><i class="fas fa-expand-alt"></i></button>
                        </div>
                        <div class="watermark">${currentData.wm_text || ''}</div>
                    </div>
                    <div class="card-footer">
                        <button onclick="whatsappOrder('${page.imgs[imgId].url}')" class="btn-wa">
                            <i class="fab fa-whatsapp"></i> استفسار
                        </button>
                    </div>
                </div>
            `).join('');

            return `
                <div class="section active">
                    <div class="section-header">
                        <h2 class="section-title">${page.title}</h2>
                        <div class="section-divider"></div>
                    </div>
                    <div class="grid">${items}</div>
                </div>
            `;
        }

        // ==================== UTILITIES ====================
        function go(tab) {
            currentTab = tab;
            renderAll();
            window.scrollTo(0, 0);
        }

        function toggleAbout(btn) {
            const content = document.getElementById('about-content');
            const icon = btn.querySelector('i');
            content.classList.toggle('open');
            icon.style.transform = content.classList.contains('open') ? 'rotate(180deg)' : '';
        }

        function toggleReviewForm(btn) {
            const content = document.getElementById('review-form');
            const icon = btn.querySelector('i');
            content.classList.toggle('open');
        }

        function setStar(rating) {
            userRating = rating;
            const stars = document.querySelectorAll('#review-form .fa-star');
            stars.forEach((s, i) => {
                s.style.color = i < 5 - rating ? 'var(--accent-gold)' : 'var(--text-dim)';
            });
        }

        function submitReview() {
            if (localStorage.getItem('bg_voted')) {
                alert('لقد قمت بالتقييم مسبقاً');
                return;
            }

            const name = document.getElementById('rev-name').value;
            const msg = document.getElementById('rev-msg').value;
            
            if (!name || !msg || !userRating) {
                alert('يرجى إكمال جميع الحقول');
                return;
            }

            db.ref(DB_PATH + '/reviews').push({
                name, message: msg, rating: userRating
            }).then(() => {
                localStorage.setItem('bg_voted', 'true');
                alert('شكراً لتقييمك!');
                location.reload();
            });
        }

        function startReviewSlider() {
            const items = document.querySelectorAll('.review-item');
            if (!items.length) return;
            
            setInterval(() => {
                items.forEach(i => i.classList.remove('active'));
                items[reviewIndex].classList.add('active');
                reviewIndex = (reviewIndex + 1) % items.length;
            }, 5000);
        }

        function whatsappGlobal() {
            window.open(`https://wa.me/${currentData.whatsapp_num}`, '_blank');
        }

        function whatsappOrder(url) {
            window.open(`https://wa.me/${currentData.whatsapp_num}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن هذا التصميم: ' + url)}`, '_blank');
        }

        function openCat(id) {
            document.getElementById('cat-frame').innerHTML = currentData.catalogs[id].code;
            document.getElementById('cat-overlay').style.display = 'flex';
        }

        // ==================== ADMIN FUNCTIONS ====================
        function toggleAdminSection(id) {
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function selectFont(font) {
            const root = document.documentElement;
            if (font === 'outfit') {
                root.style.setProperty('--font-primary', "'Outfit', sans-serif");
                root.style.setProperty('--font-arabic', "'Outfit', sans-serif");
            } else {
                root.style.setProperty('--font-primary', "'Tajawal', sans-serif");
                root.style.setProperty('--font-arabic', "'Tajawal', sans-serif");
            }
            db.ref(DB_PATH).update({ header_font: font });
        }

        function selectCustomFont() {
            const font = document.getElementById('custom-font-input').value;
            if (font) {
                document.documentElement.style.setProperty('--font-primary', font);
                document.documentElement.style.setProperty('--font-arabic', font);
            }
        }

        function savePartnersTitle() {
            const title = document.getElementById('admin-partners-title').value;
            db.ref(DB_PATH).update({ partners_title: title });
        }

        function addPartner() {
            const url = document.getElementById('new-partner-url').value;
            if (url) {
                db.ref(DB_PATH + '/partners').push({ url }).then(() => {
                    document.getElementById('new-partner-url').value = '';
                });
            }
        }

        function addCatalog() {
            const name = document.getElementById('new-cat-name').value;
            const code = document.getElementById('new-cat-code').value;
            if (name && code) {
                db.ref(DB_PATH + '/catalogs').push({ name, code }).then(() => {
                    document.getElementById('new-cat-name').value = '';
                    document.getElementById('new-cat-code').value = '';
                });
            }
        }

        function saveAbout() {
            db.ref(DB_PATH).update({
                about_text: document.getElementById('editor-about').innerHTML,
                about_active: document.getElementById('in-about-active').checked
            });
        }

        function saveSocial() {
            db.ref(DB_PATH).update({
                insta_url: document.getElementById('in-insta').value,
                tiktok_url: document.getElementById('in-tiktok').value,
                snap_url: document.getElementById('in-snap').value,
                location_url: document.getElementById('in-loc').value
            });
        }

        function saveSettings() {
            db.ref(DB_PATH).update({
                site_name: document.getElementById('in-name').value,
                whatsapp_num: document.getElementById('in-wa').value,
                wm_text: document.getElementById('in-wm').value,
                news_bar: document.getElementById('in-news').value,
                footer_text: document.getElementById('in-footer').value
            });
        }

        function saveMaintenanceSettings() {
            db.ref(DB_PATH).update({
                maintenance_mode: document.getElementById('in-maintenance').checked,
                maintenance_title: document.getElementById('in-maintenance-title').value,
                maintenance_message: document.getElementById('in-maintenance-message').value,
                maintenance_footer: document.getElementById('in-maintenance-footer').value
            });
        }

        function addSec() {
            const name = document.getElementById('new-sec-in').value;
            if (name) {
                db.ref(DB_PATH + '/pages').push({ title: name }).then(() => {
                    document.getElementById('new-sec-in').value = '';
                });
            }
        }

        function addAlbum() {
            const name = document.getElementById('new-alb-in').value;
            if (name) {
                db.ref(DB_PATH + '/albums').push({ name }).then(() => {
                    document.getElementById('new-alb-in').value = '';
                });
            }
        }

        function publishPhotos() {
            const target = document.getElementById('upload-target-sel').value;
            const urls = document.getElementById('links-in').value.split('\n').filter(u => u.trim());
            
            if (!target || !urls.length) {
                alert('يرجى اختيار وجهة وإدخال روابط');
                return;
            }

            Promise.all(urls.map(url => 
                db.ref(DB_PATH + '/' + target + '/imgs').push({ url: url.trim() })
            )).then(() => {
                document.getElementById('links-in').value = '';
                alert('تم نشر الصور');
            });
        }

        function deleteImg(path, imgId) {
            if (confirm('تأكيد الحذف؟')) {
                db.ref(DB_PATH + '/' + path + '/imgs/' + imgId).remove();
            }
        }

        function renderPhotoManager(path) {
            const grid = document.getElementById('photo-manager-grid');
            if (!path) return;

            const [type, id] = path.split('/');
            const folder = currentData[type] && currentData[type][id];
            
            if (!folder || !folder.imgs) {
                grid.innerHTML = '<p>لا توجد صور</p>';
                return;
            }

            let html = '';
            Object.keys(folder.imgs).forEach(imgId => {
                html += `
                    <div style="background: var(--primary-medium); border-radius: 12px; overflow: hidden;">
                        <img src="${folder.imgs[imgId].url}" style="width: 100%; height: 120px; object-fit: cover;">
                        <div style="display: flex; gap: 5px; padding: 8px;">
                            <button onclick="openImg('${folder.imgs[imgId].url}')" class="admin-btn" style="flex: 1;">عرض</button>
                            <button onclick="deleteImg('${path}','${imgId}')" class="admin-btn admin-btn-danger" style="flex: 1;">حذف</button>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        function updateAdminLists() {
            // Sections list
            let secHtml = '';
            if (currentData.pages) {
                Object.keys(currentData.pages).forEach(id => {
                    secHtml += `
                        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                            <input type="text" value="${currentData.pages[id].title}" onchange="db.ref(DB_PATH+'/pages/${id}').update({title:this.value})">
                            <button onclick="db.ref(DB_PATH+'/pages/${id}').remove()" class="admin-btn admin-btn-danger">حذف</button>
                        </div>
                    `;
                });
            }
            document.getElementById('admin-sec-list').innerHTML = secHtml;

            // Albums list
            let albHtml = '';
            if (currentData.albums) {
                Object.keys(currentData.albums).forEach(id => {
                    albHtml += `
                        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                            <input type="text" value="${currentData.albums[id].name}" onchange="db.ref(DB_PATH+'/albums/${id}').update({name:this.value})">
                            <button onclick="db.ref(DB_PATH+'/albums/${id}').remove()" class="admin-btn admin-btn-danger">حذف</button>
                        </div>
                    `;
                });
            }
            document.getElementById('admin-alb-list').innerHTML = albHtml;

            // Catalogs list
            let catHtml = '';
            if (currentData.catalogs) {
                Object.keys(currentData.catalogs).forEach(id => {
                    catHtml += `
                        <div style="display: flex; gap: 10px; margin-bottom: 10px; align-items: center;">
                            <span style="flex: 1;">${currentData.catalogs[id].name}</span>
                            <button onclick="db.ref(DB_PATH+'/catalogs/${id}').remove()" class="admin-btn admin-btn-danger">حذف</button>
                        </div>
                    `;
                });
            }
            document.getElementById('admin-cat-list').innerHTML = catHtml;

            // Upload target select
            let options = '<option value="">اختر الوجهة</option>';
            if (currentData.pages) {
                Object.keys(currentData.pages).forEach(id => {
                    options += `<option value="pages/${id}">صفحة: ${currentData.pages[id].title}</option>`;
                });
            }
            if (currentData.albums) {
                Object.keys(currentData.albums).forEach(id => {
                    options += `<option value="albums/${id}">ألبوم: ${currentData.albums[id].name}</option>`;
                });
            }
            document.getElementById('upload-target-sel').innerHTML = options;
            document.getElementById('manage-sec-sel').innerHTML = options;
        }

        function updatePartnersList() {
            let html = '';
            if (currentData.partners) {
                Object.keys(currentData.partners).forEach(id => {
                    html += `
                        <div style="display: flex; gap: 10px; margin-bottom: 10px; align-items: center;">
                            <img src="${currentData.partners[id].url}" style="width: 50px; height: 50px; object-fit: contain;">
                            <span style="flex: 1; font-size: 0.8rem;">${currentData.partners[id].url}</span>
                            <button onclick="db.ref(DB_PATH+'/partners/${id}').remove()" class="admin-btn admin-btn-danger">حذف</button>
                        </div>
                    `;
                });
            }
            document.getElementById('admin-partners-list').innerHTML = html;
        }

        function updateReviewsList() {
            let html = '';
            if (currentData.reviews) {
                Object.keys(currentData.reviews).forEach(id => {
                    const r = currentData.reviews[id];
                    html += `
                        <div style="background: var(--primary-dark); padding: 15px; border-radius: 12px; margin-bottom: 10px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <span style="color: var(--accent-gold);">${r.name}</span>
                                <span>${'★'.repeat(r.rating)}</span>
                            </div>
                            <p style="font-size: 0.9rem; margin-bottom: 10px;">${r.message}</p>
                            <button onclick="db.ref(DB_PATH+'/reviews/${id}').remove()" class="admin-btn admin-btn-danger">حذف</button>
                        </div>
                    `;
                });
            }
            document.getElementById('admin-reviews-list').innerHTML = html;
        }

        function fillAdminFields() {
            const d = currentData;
            
            document.getElementById('in-name').value = d.site_name || '';
            document.getElementById('in-wa').value = d.whatsapp_num || '';
            document.getElementById('in-wm').value = d.wm_text || '';
            document.getElementById('in-news').value = d.news_bar || '';
            document.getElementById('in-footer').value = d.footer_text || '';
            document.getElementById('in-insta').value = d.insta_url || '';
            document.getElementById('in-tiktok').value = d.tiktok_url || '';
            document.getElementById('in-snap').value = d.snap_url || '';
            document.getElementById('in-loc').value = d.location_url || '';
            document.getElementById('in-about-active').checked = d.about_active || false;
            document.getElementById('editor-about').innerHTML = d.about_text || '';
            document.getElementById('in-maintenance').checked = d.maintenance_mode || false;
            document.getElementById('in-maintenance-title').value = d.maintenance_title || 'تحت التطوير';
            document.getElementById('in-maintenance-message').value = d.maintenance_message || 'نعمل على تحسين تجربتك';
            document.getElementById('in-maintenance-footer').value = d.maintenance_footer || '';
            
            // Partners title
            document.getElementById('admin-partners-title').value = d.partners_title || 'شركاء النجاح';
            
            // Protection settings
            if (d.protection_settings) {
                document.getElementById('enable-right-click-protection').checked = d.protection_settings.rightClick !== false;
                document.getElementById('enable-keyboard-protection').checked = d.protection_settings.keyboardShortcuts !== false;
                document.getElementById('enable-image-protection').checked = d.protection_settings.imageProtection !== false;
                document.getElementById('enable-selection-protection').checked = d.protection_settings.textSelection !== false;
            }
        }

        function formatText(cmd) {
            document.execCommand(cmd, false, null);
        }

        // Schedule editor
        function saveSchedule() {
            const schedule = {};
            for (let i = 0; i < 7; i++) {
                const day = document.getElementById(`day-${i}`);
                if (day) {
                    schedule[i] = {
                        active: document.getElementById(`check-${i}`).checked,
                        s1_s: document.getElementById(`s1s-${i}`).value,
                        s1_e: document.getElementById(`s1e-${i}`).value,
                        s2_a: document.getElementById(`s2a-${i}`).checked,
                        s2_s: document.getElementById(`s2s-${i}`).value,
                        s2_e: document.getElementById(`s2e-${i}`).value
                    };
                }
            }
            db.ref(DB_PATH + '/work_schedule').set(schedule);
        }

        // Initialize schedule editor in admin
        setTimeout(() => {
            const container = document.getElementById('schedule-editor');
            if (!container || !currentData.work_schedule) return;
            
            const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            let html = '';
            
            for (let i = 0; i < 7; i++) {
                const s = currentData.work_schedule[i] || { active: false, s1_s: '09:00', s1_e: '17:00', s2_a: false };
                html += `
                    <div class="schedule-day" id="day-${i}" style="background: var(--primary-dark); padding: 15px; border-radius: 12px; margin-bottom: 15px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <span style="color: var(--accent-gold);">${days[i]}</span>
                            <label><input type="checkbox" id="check-${i}" ${s.active ? 'checked' : ''}> تفعيل</label>
                        </div>
                        <div style="margin-bottom: 10px;">
                            <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px;">الفترة الصباحية:</div>
                            <div style="display: flex; gap: 10px;">
                                <input type="time" id="s1s-${i}" value="${s.s1_s}">
                                <span>إلى</span>
                                <input type="time" id="s1e-${i}" value="${s.s1_e}">
                            </div>
                        </div>
                        <div>
                            <label><input type="checkbox" id="s2a-${i}" ${s.s2_a ? 'checked' : ''}> فترة مسائية</label>
                            <div id="evening-${i}" style="display: ${s.s2_a ? 'flex' : 'none'}; gap: 10px; margin-top: 10px;">
                                <input type="time" id="s2s-${i}" value="${s.s2_s || ''}">
                                <span>إلى</span>
                                <input type="time" id="s2e-${i}" value="${s.s2_e || ''}">
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            
            // Add event listeners for evening sections
            for (let i = 0; i < 7; i++) {
                const cb = document.getElementById(`s2a-${i}`);
                if (cb) {
                    cb.addEventListener('change', () => {
                        const evening = document.getElementById(`evening-${i}`);
                        evening.style.display = cb.checked ? 'flex' : 'none';
                    });
                }
            }
        }, 1000);

        // Update partners marquee
        setInterval(() => {
            const track = document.getElementById('partners-display');
            if (!track || !currentData.partners) return;
            
            const ids = Object.keys(currentData.partners);
            if (!ids.length) return;
            
            let items = '';
            ids.forEach(id => {
                items += `
                    <div class="partner-item">
                        <img src="${currentData.partners[id].url}" alt="partner">
                    </div>
                `;
            });
            // Duplicate for seamless loop
            items += items;
            track.innerHTML = items;
        }, 100);

        // Update work status every minute
        setInterval(updateWorkStatus, 60000);
    </script>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>بصمة غير | منصة ديكور احترافية</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/CsmG3G7r/1.png">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #ffffff; color: #2d2a2a; line-height: 1.5; }
        :root { --primary: #c8a165; --primary-dark: #a47e44; --primary-light: #f8f1e6; --gray: #6f6a64; --white: #ffffff; --shadow: 0 8px 25px rgba(0,0,0,0.05); --shadow-hover: 0 15px 35px rgba(0,0,0,0.1); }
        #splash { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.3s; }
        .splash-spinner { width: 50px; height: 50px; border: 4px solid #eee; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .header { background: rgba(255,255,255,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; flex-wrap: wrap; gap: 1rem; }
        .logo h1 { font-size: clamp(1.4rem, 5vw, 1.8rem); font-weight: 800; background: linear-gradient(135deg, var(--primary-dark), var(--primary)); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: clamp(1rem, 3vw, 1.8rem); flex-wrap: wrap; }
        .nav-links a { text-decoration: none; font-weight: 600; color: #333; transition: 0.2s; cursor: pointer; font-size: clamp(0.85rem, 3vw, 1rem); }
        .nav-links a:hover { color: var(--primary); }
        .partners-marquee { background: #fdf7ef; padding: 12px 0; border-bottom: 1px solid #eee; overflow: hidden; white-space: nowrap; }
        .marquee-track { display: inline-flex; gap: 40px; animation: marqueeFlow 35s linear infinite; }
        .marquee-track:hover { animation-play-state: paused; }
        @keyframes marqueeFlow { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .partner-item { background: white; border-radius: 60px; padding: 5px 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); border: 1px solid rgba(201,169,110,0.3); display: inline-flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .partner-item:hover { transform: translateY(-3px); border-color: var(--primary); }
        .partner-logo { height: 45px; max-width: 120px; object-fit: contain; }
        @media (max-width: 700px) { .partner-logo { height: 35px; max-width: 80px; } .partner-item { padding: 3px 15px; } }
        .hero { background: linear-gradient(135deg, #fef9f0, #fffaf5); padding: clamp(2rem, 8vw, 5rem) 20px; text-align: center; }
        .hero h1 { font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 800; color: var(--primary-dark); margin-bottom: 1rem; }
        .hero p { font-size: clamp(1rem, 4vw, 1.2rem); color: #5a5a5a; max-width: 700px; margin: 0 auto 2rem; }
        .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 0.7rem 1.5rem; border-radius: 60px; font-weight: 600; text-decoration: none; transition: 0.2s; display: inline-block; font-size: clamp(0.8rem, 3vw, 1rem); }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-3px); }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: var(--primary); color: white; }
        .section { padding: clamp(2rem, 6vw, 4rem) 0; }
        .section-title { font-size: clamp(1.5rem, 5vw, 2rem); font-weight: 700; text-align: center; margin-bottom: 2rem; color: var(--primary-dark); position: relative; }
        .section-title::after { content: ''; display: block; width: 70px; height: 3px; background: var(--primary); margin: 0.5rem auto 0; }
        .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2rem; }
        .card { background: var(--white); border-radius: 28px; overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; cursor: pointer; text-align: center; }
        .card:hover { transform: translateY(-8px); box-shadow: var(--shadow-hover); }
        .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card-body { padding: 1.2rem; }
        .card-title { font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); }
        /* بطاقات المنتجات مع زر استفسار */
        .product-card { background: var(--white); border-radius: 28px; overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
        .product-img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .product-info { padding: 1rem; text-align: center; }
        .whatsapp-order, .inquiry-btn { background: #25D366; color: white; border: none; width: 100%; padding: 10px; border-radius: 50px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; margin-top: 6px; }
        .inquiry-btn { background: var(--primary); }
        .whatsapp-order:hover { background: #1da15a; }
        .inquiry-btn:hover { background: var(--primary-dark); }
        /* نافذة عرض الصور (لايت بوكس) مع زر استفسار أسفل الصورة */
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .lightbox-container { position: relative; max-width: 90%; max-height: 85vh; display: flex; flex-direction: column; align-items: center; }
        .lightbox img { max-width: 90vw; max-height: 70vh; object-fit: contain; border-radius: 16px; }
        .lightbox-close, .lightbox-prev, .lightbox-next { position: absolute; color: white; font-size: 2rem; cursor: pointer; background: rgba(0,0,0,0.5); padding: 0.2rem 0.5rem; border-radius: 50%; }
        .lightbox-close { top: 20px; right: 30px; }
        .lightbox-prev { left: 20px; top: 50%; transform: translateY(-50%); }
        .lightbox-next { right: 20px; top: 50%; transform: translateY(-50%); }
        .lightbox-inquiry-btn { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 60px; font-size: 1rem; margin-top: 20px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .testimonial-card { background: var(--white); border-radius: 28px; padding: 1.5rem; box-shadow: var(--shadow); }
        .testimonial-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .testimonial-avatar { width: 50px; height: 50px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: var(--primary); }
        .stars { color: #f5b042; margin-top: 4px; letter-spacing: 2px; }
        .review-form { background: var(--white); border-radius: 28px; padding: 1.5rem; box-shadow: var(--shadow); margin-top: 2rem; }
        .review-form input, .review-form textarea { width: 100%; padding: 12px 16px; border: 1px solid #eee; border-radius: 60px; margin-bottom: 1rem; font-family: inherit; font-size: 0.9rem; }
        .review-form textarea { border-radius: 20px; resize: vertical; }
        .star-rating { display: flex; gap: 8px; justify-content: center; margin-bottom: 1rem; flex-direction: row-reverse; }
        .star-rating i { font-size: 1.6rem; color: #ddd; cursor: pointer; transition: 0.1s; }
        .star-rating i.active, .star-rating i:hover { color: var(--primary); }
        .footer { background: #1e1e1e; color: #ccc; padding: 3rem 0 1rem; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 2rem; }
        .footer h4 { color: var(--primary); margin-bottom: 1rem; }
        .schedule-item { margin-bottom: 0.8rem; }
        .social-icons { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .social-icons a { background: #333; width: 36px; height: 36px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; transition: 0.2s; }
        .social-icons a:hover { background: var(--primary); }
        .copyright { text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #333; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e1e1e; color: white; padding: 8px 20px; border-radius: 50px; z-index: 2001; display: none; white-space: nowrap; }
        .empty-state { text-align: center; padding: 2rem; color: var(--gray); }
        @media (max-width: 700px) {
            .grid-auto { gap: 1.5rem; }
            .toast { white-space: normal; width: 80%; text-align: center; }
            .nav-bar { flex-direction: column; text-align: center; }
            .nav-links { justify-content: center; }
            .lightbox-prev, .lightbox-next { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div id="splash"><div class="splash-spinner"></div></div>

<header class="header">
    <div class="container">
        <div class="nav-bar">
            <div class="logo"><h1 id="siteTitle">بصمة غير</h1></div>
            <div class="nav-links">
                <a data-page="home">الرئيسية</a>
                <a data-page="store">المتجر</a>
                <a data-page="works">أعمالنا</a>
                <a data-page="catalogs">الكتالوجات</a>
                <a data-page="contact">اتصل بنا</a>
            </div>
        </div>
    </div>
</header>

<div class="partners-marquee" id="partnersMarquee" style="display:none;">
    <div class="marquee-track" id="marqueeTrack"></div>
</div>

<main id="mainContent"></main>

<footer class="footer">
    <div class="container">
        <div class="footer-grid">
            <div><h4>بصمة غير</h4><p>تصاميم داخلية وخارجية فاخرة ومنتجات ديكور راقية.</p><div class="social-icons" id="socialIcons"></div></div>
            <div><h4>أوقات العمل</h4><div id="footerHours"></div></div>
            <div><h4>تواصل معنا</h4><p><i class="fas fa-phone"></i> <span id="footerPhone"></span></p><p><i class="fab fa-whatsapp"></i> <span id="footerWhatsapp"></span></p><p><i class="fas fa-map-marker-alt"></i> <span id="footerLocation"></span></p></div>
        </div>
        <div class="copyright" id="footerCopyright">© 2025 بصمة غير - جميع الحقوق محفوظة</div>
    </div>
</footer>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <div class="lightbox-container" onclick="event.stopPropagation()">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span class="lightbox-prev" onclick="prevImage()">&#10094;</span>
        <span class="lightbox-next" onclick="nextImage()">&#10095;</span>
        <img id="lightboxImg">
        <button id="lightboxInquiryBtn" class="lightbox-inquiry-btn"><i class="fab fa-whatsapp"></i> استفسار عن هذه الصورة</button>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let currentPage = 'home';
    let currentAlbumImages = [];
    let currentImageIndex = 0;
    let currentInquiryText = 'السلام عليكم، أود الاستفسار عن هذه الصورة';

    function showToast(msg) { const t=document.getElementById('toastMsg'); t.innerText=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); }

    function getInquiryText() { return currentData.inquiry_text || 'السلام عليكم، أود الاستفسار عن هذه الصورة'; }

    function formatTime12(t) { if (!t) return ''; let [h, m] = t.split(':'); h = parseInt(h); return `${h % 12 || 12}:${m} ${h >= 12 ? 'م' : 'ص'}`; }
    function getGroupedScheduleHtml(d) {
        if (!d.work_schedule) return '<p>لم تحدد المواعيد</p>';
        const dayNames = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        const order = [6, 0, 1, 2, 3, 4, 5];
        let groups = [], offDays = [];
        order.forEach(jsDay => { const s = d.work_schedule[jsDay]; if (s && s.active) { const key = `${s.s1_s}-${s.s1_e}-${s.s2_a}`; let g = groups.find(g => g.key === key); if (g) g.days.push(dayNames[jsDay]); else groups.push({ key, days: [dayNames[jsDay]], data: s }); } else offDays.push(dayNames[jsDay]); });
        let html = '';
        groups.forEach(g => { const dText = g.days.length === 1 ? g.days[0] : `من ${g.days[0]} إلى ${g.days[g.days.length-1]}`; html += `<div class="schedule-item"><strong>${dText}</strong><br>${formatTime12(g.data.s1_s)} - ${formatTime12(g.data.s1_e)}`; if (g.data.s2_a) html += `<br>${formatTime12(g.data.s2_s)} - ${formatTime12(g.data.s2_e)}`; html += `</div>`; });
        if (offDays.length) html += `<div class="schedule-item"><strong>عطلة:</strong> ${offDays.join('، ')}</div>`;
        return html;
    }

    function renderPartnersMarquee() {
        const container = document.getElementById('partnersMarquee');
        const track = document.getElementById('marqueeTrack');
        if (!container || !track) return;
        if (currentData.partners && Object.keys(currentData.partners).length) {
            container.style.display = 'block';
            let logosHtml = '';
            Object.values(currentData.partners).forEach(p => { logosHtml += `<div class="partner-item" onclick="window.open('${p.link || '#'}', '_blank')"><img src="${p.url}" class="partner-logo" loading="lazy"></div>`; });
            track.innerHTML = logosHtml + logosHtml;
        } else container.style.display = 'none';
    }

    function getAllStoreProducts() {
        let images = [];
        if (currentData.store_categories) {
            Object.keys(currentData.store_categories).forEach(cid => { const cat = currentData.store_categories[cid]; if (cat.imgs) Object.values(cat.imgs).forEach(img => { if (img.url) images.push(img.url); }); });
        }
        return images;
    }

    // دوال فتح الألبوم وعرض الصور في لايت بوكس مع زر استفسار
    function openAlbum(id) {
        const alb = currentData.albums?.[id];
        if (!alb || !alb.imgs) { showToast('لا توجد صور في هذا الألبوم'); return; }
        const images = Object.values(alb.imgs).map(i => i.url).filter(u => u);
        if (images.length === 0) { showToast('لا توجد صور'); return; }
        currentAlbumImages = images;
        currentImageIndex = 0;
        updateLightboxImage();
        document.getElementById('lightbox').style.display = 'flex';
    }

    function updateLightboxImage() {
        if (currentAlbumImages.length === 0) return;
        const imgUrl = currentAlbumImages[currentImageIndex];
        document.getElementById('lightboxImg').src = imgUrl;
        // تحديث زر الاستفسار ليرسل الصورة الحالية
        const inquiryText = getInquiryText();
        const whatsappLink = `https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent(inquiryText + '\n\nرابط الصورة: ' + imgUrl)}`;
        const btn = document.getElementById('lightboxInquiryBtn');
        btn.onclick = () => window.open(whatsappLink, '_blank');
    }

    function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
    function nextImage() { if (currentAlbumImages.length) { currentImageIndex = (currentImageIndex + 1) % currentAlbumImages.length; updateLightboxImage(); } }
    function prevImage() { if (currentAlbumImages.length) { currentImageIndex = (currentImageIndex - 1 + currentAlbumImages.length) % currentAlbumImages.length; updateLightboxImage(); } }

    function openCatalog(id) { const cat = currentData.catalogs?.[id]; if (cat && cat.code) { const win = window.open(); win.document.write(cat.code); } else showToast('الكتالوج غير متاح'); }

    // بناء واجهات الصفحات
    function renderHomePage() {
        return `<div class="hero"><div class="container"><h1>ديكور يعكس بصمتك</h1><p>نقدم تصاميم داخلية وخارجية فاخرة، ومنتجات راقية تناسب ذوقك.</p><div class="btn-group"><a class="btn btn-primary" data-page="store">تسوق الآن</a><a class="btn btn-outline" data-page="works">شاهد أعمالنا</a></div></div></div>
                <div class="container section"><h2 class="section-title">أقسام المتجر</h2><div class="grid-auto" id="categoriesGrid"></div></div>
                <div class="container section"><h2 class="section-title">أحدث المنتجات</h2><div class="grid-auto" id="productsGrid"></div></div>
                <div class="container section"><h2 class="section-title">أعمالنا</h2><div class="grid-auto" id="portfolioGrid"></div></div>
                <div class="container section"><h2 class="section-title">الكتالوجات</h2><div class="grid-auto" id="catalogsHomeGrid"></div></div>
                <div class="container section"><h2 class="section-title">آراء العملاء</h2><div class="grid-auto" id="testimonialsGrid"></div><div id="reviewFormContainer"></div></div>`;
    }
    function renderStorePage() { return `<div class="container section"><h2 class="section-title">جميع المنتجات</h2><div class="grid-auto" id="allProductsGrid"></div></div>`; }
    function renderWorksPage() { return `<div class="container section"><h2 class="section-title">أعمالنا</h2><div class="grid-auto" id="worksGrid"></div></div>`; }
    function renderCatalogsPage() { return `<div class="container section"><h2 class="section-title">الكتالوجات</h2><div class="grid-auto" id="catalogsPageGrid"></div></div>`; }
    function renderContactPage() { const d = currentData; return `<div class="container section"><h2 class="section-title">اتصل بنا</h2><div style="display:flex; justify-content:center; gap:2rem; flex-wrap:wrap; text-align:center;"><a href="tel:0541780995" style="text-decoration:none; color:inherit;"><div><i class="fas fa-phone fa-2x" style="color:var(--primary);"></i><p>0541780995</p></div></a><a href="https://wa.me/${d.whatsapp_num || '966500000000'}" target="_blank" style="text-decoration:none; color:inherit;"><div><i class="fab fa-whatsapp fa-2x" style="color:#25D366;"></i><p>واتساب</p></div></a>${d.insta_url ? `<a href="${d.insta_url}" target="_blank" style="text-decoration:none; color:inherit;"><div><i class="fab fa-instagram fa-2x" style="color:var(--primary);"></i><p>انستقرام</p></div></a>` : ''}${d.tiktok_url ? `<a href="${d.tiktok_url}" target="_blank" style="text-decoration:none; color:inherit;"><div><i class="fab fa-tiktok fa-2x" style="color:var(--primary);"></i><p>تيك توك</p></div></a>` : ''}${d.snap_url ? `<a href="${d.snap_url}" target="_blank" style="text-decoration:none; color:inherit;"><div><i class="fab fa-snapchat fa-2x" style="color:var(--primary);"></i><p>سناب</p></div></a>` : ''}<a href="${d.location_url || '#'}" target="_blank" style="text-decoration:none; color:inherit;"><div><i class="fas fa-map-marker-alt fa-2x" style="color:var(--primary);"></i><p>موقعنا</p></div></a></div></div>`; }

    function buildCategories() {
        const cont = document.getElementById('categoriesGrid'); if (!cont) return;
        if (!currentData.store_categories || Object.keys(currentData.store_categories).length === 0) { cont.innerHTML = '<div class="empty-state">لا توجد أقسام بعد</div>'; return; }
        let html = '';
        Object.keys(currentData.store_categories).forEach(id => { const cat = currentData.store_categories[id]; let img = ''; if (cat.imgs && Object.keys(cat.imgs).length) img = Object.values(cat.imgs)[0].url; html += `<div class="card" data-page="store">${img ? `<img src="${img}" class="card-img" loading="lazy">` : '<div class="card-img" style="background:#f0f0f0;"></div>'}<div class="card-body"><div class="card-title">${cat.name || 'قسم'}</div></div></div>`; });
        cont.innerHTML = html;
        document.querySelectorAll('#categoriesGrid .card').forEach(c => { c.addEventListener('click', () => { currentPage = 'store'; loadPage(); }); });
    }

    function buildLatestProducts() {
        const cont = document.getElementById('productsGrid'); if (!cont) return;
        let all = getAllStoreProducts(); if (all.length === 0) { cont.innerHTML = '<div class="empty-state">لا توجد منتجات حالياً</div>'; return; }
        let latest = all.slice(0, 6); let inquiryText = getInquiryText(); let whatsappNum = currentData.whatsapp_num || '966500000000';
        let html = '';
        latest.forEach(url => { html += `<div class="product-card"><img src="${url}" class="product-img" loading="lazy"><div class="product-info"><button class="inquiry-btn" onclick="window.open('https://wa.me/${whatsappNum}?text=${encodeURIComponent(inquiryText + '\n\nرابط المنتج: ' + url)}', '_blank')"><i class="fab fa-whatsapp"></i> استفسار عن المنتج</button></div></div>`; });
        cont.innerHTML = html;
    }

    function buildAllProductsGrid() {
        const cont = document.getElementById('allProductsGrid'); if (!cont) return;
        let all = getAllStoreProducts(); if (all.length === 0) { cont.innerHTML = '<div class="empty-state">لا توجد منتجات</div>'; return; }
        let inquiryText = getInquiryText(); let whatsappNum = currentData.whatsapp_num || '966500000000';
        let html = '';
        all.forEach(url => { html += `<div class="product-card"><img src="${url}" class="product-img" loading="lazy"><div class="product-info"><button class="inquiry-btn" onclick="window.open('https://wa.me/${whatsappNum}?text=${encodeURIComponent(inquiryText + '\n\nرابط المنتج: ' + url)}', '_blank')"><i class="fab fa-whatsapp"></i> استفسار عن المنتج</button></div></div>`; });
        cont.innerHTML = html;
    }

    function buildPortfolio() {
        const cont = document.getElementById('portfolioGrid'); if (!cont) return;
        if (!currentData.albums || Object.keys(currentData.albums).length === 0) { cont.innerHTML = '<div class="empty-state">لا توجد أعمال بعد</div>'; return; }
        let html = '';
        Object.keys(currentData.albums).forEach(id => { const alb = currentData.albums[id]; let cover = ''; if (alb.imgs && Object.keys(alb.imgs).length) cover = Object.values(alb.imgs)[0].url; html += `<div class="card" data-album="${id}">${cover ? `<img src="${cover}" class="card-img" loading="lazy">` : '<div class="card-img" style="background:#f0f0f0;"></div>'}<div class="card-body"><div class="card-title">${alb.name || 'ألبوم'}</div></div></div>`; });
        cont.innerHTML = html;
        document.querySelectorAll('#portfolioGrid .card').forEach(c => { c.addEventListener('click', () => openAlbum(c.getAttribute('data-album'))); });
    }

    function buildWorksGrid() {
        const cont = document.getElementById('worksGrid'); if (!cont) return;
        if (!currentData.albums || Object.keys(currentData.albums).length === 0) { cont.innerHTML = '<div class="empty-state">لا توجد أعمال</div>'; return; }
        let html = '';
        Object.keys(currentData.albums).forEach(id => { const alb = currentData.albums[id]; let cover = ''; if (alb.imgs && Object.keys(alb.imgs).length) cover = Object.values(alb.imgs)[0].url; html += `<div class="card" data-album="${id}">${cover ? `<img src="${cover}" class="card-img" loading="lazy">` : '<div class="card-img" style="background:#f0f0f0;"></div>'}<div class="card-body"><div class="card-title">${alb.name || 'ألبوم'}</div></div></div>`; });
        cont.innerHTML = html;
        document.querySelectorAll('#worksGrid .card').forEach(c => { c.addEventListener('click', () => openAlbum(c.getAttribute('data-album'))); });
    }

    function buildCatalogsHome() {
        const cont = document.getElementById('catalogsHomeGrid'); if (!cont) return;
        if (!currentData.catalogs || Object.keys(currentData.catalogs).length === 0) { cont.innerHTML = '<div class="empty-state">لا توجد كتالوجات</div>'; return; }
        let html = '';
        Object.keys(currentData.catalogs).forEach(id => { const cat = currentData.catalogs[id]; html += `<div class="card" data-catalog="${id}"><div class="card-body"><i class="fas fa-book-open fa-3x" style="color:var(--primary); margin-bottom:0.5rem; display:block;"></i><div class="card-title">${cat.name || 'كتالوج'}</div><small>اضغط للعرض</small></div></div>`; });
        cont.innerHTML = html;
        document.querySelectorAll('#catalogsHomeGrid .card').forEach(c => { c.addEventListener('click', () => openCatalog(c.getAttribute('data-catalog'))); });
    }

    function buildCatalogsPageGrid() {
        const cont = document.getElementById('catalogsPageGrid'); if (!cont) return;
        if (!currentData.catalogs || Object.keys(currentData.catalogs).length === 0) { cont.innerHTML = '<div class="empty-state">لا توجد كتالوجات</div>'; return; }
        let html = '';
        Object.keys(currentData.catalogs).forEach(id => { const cat = currentData.catalogs[id]; html += `<div class="card" data-catalog="${id}"><div class="card-body"><i class="fas fa-book-open fa-3x" style="color:var(--primary);"></i><div class="card-title">${cat.name}</div><small>اضغط للعرض</small></div></div>`; });
        cont.innerHTML = html;
        document.querySelectorAll('#catalogsPageGrid .card').forEach(c => { c.addEventListener('click', () => openCatalog(c.getAttribute('data-catalog'))); });
    }

    function buildTestimonials() {
        const cont = document.getElementById('testimonialsGrid'); if (!cont) return;
        if (!currentData.reviews || Object.keys(currentData.reviews).length === 0) { cont.innerHTML = '<div class="empty-state">لا توجد تقييمات بعد</div>'; }
        else { let html = ''; Object.keys(currentData.reviews).forEach(id => { const rev = currentData.reviews[id]; html += `<div class="testimonial-card"><div class="testimonial-header"><div class="testimonial-avatar"><i class="fas fa-user-alt"></i></div><div><div class="card-title" style="margin:0;">${rev.name}</div><div class="stars">${'★'.repeat(rev.rating)}${'☆'.repeat(5 - rev.rating)}</div></div></div><p>${rev.message}</p></div>`; }); cont.innerHTML = html; }
        const formContainer = document.getElementById('reviewFormContainer'); if (formContainer) { formContainer.innerHTML = `<div class="review-form"><h4 style="margin-bottom:1rem;">أضف تقييمك</h4><input type="text" id="reviewName" placeholder="اسمك الكريم"><div class="star-rating" id="starRating"><i class="fas fa-star" data-star="5"></i><i class="fas fa-star" data-star="4"></i><i class="fas fa-star" data-star="3"></i><i class="fas fa-star" data-star="2"></i><i class="fas fa-star" data-star="1"></i></div><textarea id="reviewMsg" rows="2" placeholder="شاركنا تجربتك..."></textarea><button onclick="submitNewReview()" style="background:var(--primary); color:white; border:none; padding:10px; border-radius:60px; width:100%; font-weight:600;">إرسال التقييم</button></div>`; setupStarRating(); }
    }

    let selectedRating = 0;
    function setupStarRating() {
        const stars = document.querySelectorAll('#starRating i');
        stars.forEach(s => { s.onclick = () => { selectedRating = parseInt(s.dataset.star); stars.forEach(st => st.classList.remove('active')); for (let i = stars.length - 1; i >= stars.length - selectedRating; i--) stars[i]?.classList.add('active'); }; });
        window.submitNewReview = () => { const name = document.getElementById('reviewName')?.value; const msg = document.getElementById('reviewMsg')?.value; if (!name || !msg || !selectedRating) { showToast('يرجى إكمال الاسم والتقييم والنص'); return; } db.ref(DB_PATH + '/reviews').push({ name, message: msg, rating: selectedRating }).then(() => { showToast('شكراً لتقييمك!'); document.getElementById('reviewName').value = ''; document.getElementById('reviewMsg').value = ''; stars.forEach(st => st.classList.remove('active')); selectedRating = 0; loadPage(); }); };
    }

    function updateFooterData() {
        const d = currentData;
        document.getElementById('siteTitle').innerText = d.site_name || 'بصمة غير';
        document.getElementById('footerPhone').innerHTML = `<a href="tel:0541780995" style="color:inherit;">0541780995</a>`;
        document.getElementById('footerWhatsapp').innerHTML = `<a href="https://wa.me/${d.whatsapp_num || '966500000000'}" target="_blank" style="color:#25D366;">${d.whatsapp_num || '966500000000'}</a>`;
        document.getElementById('footerLocation').innerHTML = d.location_url ? `<a href="${d.location_url}" target="_blank" style="color:inherit;">جدة، السعودية</a>` : 'جدة، السعودية';
        const socialDiv = document.getElementById('socialIcons'); if (socialDiv) { let s = ''; if (d.insta_url) s += `<a href="${d.insta_url}" target="_blank"><i class="fab fa-instagram"></i></a>`; if (d.tiktok_url) s += `<a href="${d.tiktok_url}" target="_blank"><i class="fab fa-tiktok"></i></a>`; if (d.snap_url) s += `<a href="${d.snap_url}" target="_blank"><i class="fab fa-snapchat"></i></a>`; socialDiv.innerHTML = s; }
        const hoursDiv = document.getElementById('footerHours'); if (hoursDiv) hoursDiv.innerHTML = getGroupedScheduleHtml(d);
        if (d.footer_text) document.getElementById('footerCopyright').innerHTML = d.footer_text;
    }

    function attachNavEvents() { document.querySelectorAll('[data-page]').forEach(el => { el.removeEventListener('click', navHandler); el.addEventListener('click', navHandler); }); }
    function navHandler(e) { e.preventDefault(); const page = this.getAttribute('data-page'); if (page) { currentPage = page; loadPage(); window.scrollTo(0, 0); } }

    function loadPage() {
        const main = document.getElementById('mainContent');
        if (currentPage === 'home') { main.innerHTML = renderHomePage(); buildCategories(); buildLatestProducts(); buildPortfolio(); buildCatalogsHome(); buildTestimonials(); }
        else if (currentPage === 'store') { main.innerHTML = renderStorePage(); buildAllProductsGrid(); }
        else if (currentPage === 'works') { main.innerHTML = renderWorksPage(); buildWorksGrid(); }
        else if (currentPage === 'catalogs') { main.innerHTML = renderCatalogsPage(); buildCatalogsPageGrid(); }
        else if (currentPage === 'contact') { main.innerHTML = renderContactPage(); }
        updateFooterData(); attachNavEvents();
    }

    function hideSplash() { const splash = document.getElementById('splash'); if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.style.display = 'none', 300); } }

    db.ref(DB_PATH).once('value', snap => { currentData = snap.val() || {}; hideSplash(); renderPartnersMarquee(); loadPage(); });
    db.ref(DB_PATH).on('value', snap => { currentData = snap.val() || {}; if (document.getElementById('mainContent').innerHTML !== '') { renderPartnersMarquee(); loadPage(); } });

    window.openAlbum = openAlbum; window.openCatalog = openCatalog; window.closeLightbox = closeLightbox; window.nextImage = nextImage; window.prevImage = prevImage;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>بصمة غير للديكور</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;500;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ========== متغيرات CSS الأساسية ========== */
        :root {
            /* الألوان الأساسية */
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --primary-dark: #5b21b6;
            --gold: #f59e0b;
            --gold-light: #fbbf24;
            --gold-dark: #d97706;
            
            /* ألوان محايدة */
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-tertiary: #f0f2f5;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border: #e5e7eb;
            --border-light: #f3f4f6;
            
            /* ألوان الحالات */
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            
            /* ظلال */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            
            /* التدرجات */
            --gradient-primary: linear-gradient(135deg, var(--primary), var(--primary-light));
            --gradient-gold: linear-gradient(135deg, var(--gold), var(--gold-light));
            --gradient-soft: linear-gradient(135deg, rgba(124, 58, 237, 0.1), rgba(245, 158, 11, 0.1));
            
            /* المسافات */
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 3rem;
            
            /* نصف أقطار الزوايا */
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            
            /* الخطوط */
            --font-sans: 'Inter', 'Tajawal', sans-serif;
            --font-serif: 'Amiri', serif;
        }

        /* ثيم مظلم */
        :root.dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --border: #334155;
            --border-light: #475569;
        }

        /* إعادة تعيين عام */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========== شاشة التحميل ========== */
        #splash {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, var(--primary), var(--gold));
            z-index: 99999999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            animation: fadeOut 0.6s ease-in-out 2s forwards;
        }

        .logo-splash {
            font-size: 3.5rem;
            animation: bounce 2s ease-in-out infinite;
        }

        .splash-text {
            color: white;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .splash-loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== الرأس العلوي ========== */
        header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: var(--shadow-sm);
        }

        header.dark-mode {
            background-color: rgba(15, 23, 42, 0.95);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            border-radius: var(--radius-lg);
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .header-nav {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex: 1;
            justify-content: center;
        }

        .nav-item {
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-lg);
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            position: relative;
        }

        .nav-item:hover {
            color: var(--primary);
            background-color: var(--bg-secondary);
        }

        .nav-item.active {
            color: var(--primary);
            background-color: rgba(124, 58, 237, 0.1);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .btn-icon:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        .mobile-menu-btn {
            display: none;
        }

        /* ========== الأقسام الرئيسية ========== */
        .hero-section {
            background: var(--gradient-soft);
            padding: 4rem 1.5rem;
            text-align: center;
        }

        .hero-content {
            max-width: 900px;
            margin: 0 auto;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .hero-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ========== الأزرار ========== */
        .btn {
            padding: 0.875rem 1.75rem;
            border-radius: var(--radius-lg);
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            white-space: nowrap;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.3);
        }

        .btn-secondary {
            background: var(--gradient-gold);
            color: #000;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.3);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-outline:hover {
            background: rgba(124, 58, 237, 0.1);
        }

        /* ========== الشبكة والبطاقات ========== */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .card {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary);
        }

        .card-image {
            width: 100%;
            height: 250px;
            background: var(--gradient-soft);
            overflow: hidden;
            position: relative;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover .card-image img {
            transform: scale(1.05);
        }

        .card-image .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            transition: background 0.3s ease;
        }

        .card:hover .card-image .overlay {
            background: rgba(0, 0, 0, 0.4);
        }

        .overlay-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--primary);
            transition: all 0.3s ease;
            opacity: 0;
        }

        .card:hover .overlay-btn {
            opacity: 1;
        }

        .overlay-btn:hover {
            transform: scale(1.1);
        }

        .card-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .card-description {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .card-footer {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }

        .card-footer .btn {
            flex: 1;
            justify-content: center;
            padding: 0.75rem;
        }

        /* ========== قسم من نحن ========== */
        .about-section {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .about-content h2 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .about-content p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .about-features {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .feature-item {
            display: flex;
            gap: 1.25rem;
            align-items: flex-start;
        }

        .feature-icon {
            width: 50px;
            height: 50px;
            border-radius: var(--radius-lg);
            background: rgba(124, 58, 237, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .feature-text h3 {
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .feature-text p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin: 0;
        }

        /* ========== قسم الخدمات ========== */
        .services-section {
            background: var(--gradient-soft);
            padding: 4rem 1.5rem;
            margin: 3rem 0;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 3rem;
            color: var(--text-primary);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .service-card {
            background: var(--bg-primary);
            padding: 2rem;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            text-align: center;
            transition: all 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .service-icon {
            width: 70px;
            height: 70px;
            border-radius: var(--radius-lg);
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
        }

        .service-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .service-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* ========== قسم التقييمات ========== */
        .testimonials-section {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 1.5rem;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .testimonial-card {
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: var(--radius-xl);
            border-left: 4px solid var(--primary);
            position: relative;
        }

        .testimonial-quote {
            font-size: 2.5rem;
            color: var(--primary);
            opacity: 0.2;
            position: absolute;
            top: -10px;
            left: 20px;
        }

        .testimonial-text {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-style: italic;
            line-height: 1.8;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .author-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .author-info h4 {
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .author-info p {
            font-size: 0.85rem;
            color: var(--text-tertiary);
        }

        .rating {
            color: var(--gold);
            margin-bottom: 0.75rem;
        }

        /* ========== أوقات العمل ========== */
        .schedule-section {
            background: var(--gradient-soft);
            padding: 3rem 1.5rem;
            border-radius: var(--radius-2xl);
            max-width: 900px;
            margin: 3rem auto;
        }

        .schedule-title {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 2rem;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .schedule-item {
            background: var(--bg-primary);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        .schedule-day {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
        }

        .schedule-time {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .schedule-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.open {
            background: var(--success);
        }

        .status-dot.closed {
            background: var(--error);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ========== التذييل ========== */
        footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 3rem 1.5rem;
            margin-top: 5rem;
        }

        .footer-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .footer-section h4 {
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section ul li {
            margin-bottom: 0.75rem;
        }

        .footer-section ul li a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .footer-section ul li a:hover {
            color: var(--primary);
            margin-right: 0.5rem;
        }

        .footer-social {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(124, 58, 237, 0.3);
        }

        .footer-bottom {
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.9rem;
        }

        /* ========== القائمة الجانبية (الهاتف) ========== */
        .mobile-nav {
            display: none;
            position: fixed;
            right: 0;
            top: 0;
            width: 100%;
            max-width: 350px;
            height: 100vh;
            background: var(--bg-primary);
            z-index: 999;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.1);
        }

        .mobile-nav.active {
            transform: translateX(0);
        }

        .mobile-nav-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mobile-nav-items {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .mobile-nav-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mobile-nav-item:hover,
        .mobile-nav-item.active {
            background: var(--bg-secondary);
            color: var(--primary);
        }

        /* ========== صفحة الإدارة ========== */
        .admin-panel {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .admin-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            border-bottom: 2px solid var(--border);
        }

        .admin-tab {
            padding: 0.875rem 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            position: relative;
            transition: all 0.3s ease;
        }

        .admin-tab.active {
            color: var(--primary);
        }

        .admin-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient-primary);
        }

        .admin-content {
            display: grid;
            gap: 2rem;
        }

        .admin-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 2rem;
        }

        .admin-box-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        /* ========== الاستجابة ========== */
        @media (max-width: 1024px) {
            .hero-title {
                font-size: 2.5rem;
            }

            .about-section {
                grid-template-columns: 1fr;
            }

            .header-nav {
                display: none;
            }

            .mobile-menu-btn {
                display: flex;
            }

            .mobile-nav {
                display: block;
            }
        }

        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
            }

            .hero-title {
                font-size: 2rem;
            }

            .section-title {
                font-size: 1.8rem;
            }

            .schedule-grid {
                grid-template-columns: 1fr;
            }

            .about-features {
                margin-top: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .header-container {
                gap: 0.5rem;
            }

            .logo {
                font-size: 1.2rem;
            }

            .hero-title {
                font-size: 1.5rem;
            }

            .hero-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* ========== تأثيرات إضافية ========== */
        .fade-in {
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* إخفاء العناصر في البداية */
        [data-hidden] {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- شاشة التحميل -->
    <div id="splash">
        <div class="logo-icon logo-splash">🎨</div>
        <div class="splash-text">بصمة غير</div>
        <div class="splash-loader"></div>
    </div>

    <!-- الرأس العلوي -->
    <header id="header">
        <div class="header-container">
            <div class="logo">
                <div class="logo-icon">🎨</div>
                <span id="site-name">بصمة غير</span>
            </div>

            <nav class="header-nav" id="desktop-nav">
                <!-- سيتم ملؤه بـ JavaScript -->
            </nav>

            <div class="header-actions">
                <button class="btn-icon" onclick="toggleTheme()">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="mobile-menu-btn btn-icon" onclick="toggleMobileMenu()">
                    <i class="fas fa-bars"></i>
                </button>
                <button class="btn-icon" onclick="checkAccess()" id="admin-btn" data-hidden>
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- القائمة الجانبية (الهاتف) -->
    <nav class="mobile-nav" id="mobile-nav">
        <div class="mobile-nav-header">
            <h3 id="site-name-mobile">بصمة غير</h3>
            <button class="btn-icon" onclick="toggleMobileMenu()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="mobile-nav-items" id="mobile-nav-items">
            <!-- سيتم ملؤه بـ JavaScript -->
        </div>
    </nav>

    <!-- القسم الرئيسي -->
    <section class="hero-section" id="hero">
        <div class="hero-content">
            <h1 class="hero-title" id="hero-title">تصاميم تترك بصمة</h1>
            <p class="hero-subtitle" id="hero-subtitle">احصل على الديكور والتصميم الذي يعكس شخصيتك وذوقك الرفيع</p>
            <div class="hero-actions">
                <button class="btn btn-primary" onclick="scrollToSection('works')">
                    <i class="fas fa-images"></i>
                    عرض أعمالنا
                </button>
                <button class="btn btn-secondary" onclick="openWhatsApp()">
                    <i class="fab fa-whatsapp"></i>
                    تواصل معنا
                </button>
            </div>
        </div>
    </section>

    <!-- المحتوى الرئيسي -->
    <main id="main-content">
        <!-- سيتم ملؤه بـ JavaScript -->
    </main>

    <!-- التذييل -->
    <footer id="footer">
        <div class="footer-container">
            <div class="footer-content" id="footer-content">
                <!-- سيتم ملؤه بـ JavaScript -->
            </div>
            <div class="footer-bottom">
                <p id="footer-text">© 2026 بصمة غير للديكور. جميع الحقوق محفوظة.</p>
            </div>
        </div>
    </footer>

    <!-- لوحة الإدارة -->
    <div id="admin-panel-modal" data-hidden class="admin-panel">
        <!-- سيتم ملؤه بـ JavaScript -->
    </div>

    <script>
        // ========== Firebase Configuration ==========
        const firebaseConfig = {
            apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
            authDomain: "mydecor-b29bd.firebaseapp.com",
            databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mydecor-b29bd",
            storageBucket: "mydecor-b29bd.firebasestorage.app",
            messagingSenderId: "302609299720",
            appId: "1:302609299720:web:e086b600c3ee824acd54bd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_PATH = 'site_v28';

        // ========== متغيرات عامة ==========
        let currentData = {};
        let isAdmin = false;
        let currentTheme = 'light';
        let currentTab = 'home';

        // ========== التهيئة ==========
        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            loadData();
        });

        // ========== تحميل البيانات من Firebase ==========
        function loadData() {
            db.ref(DB_PATH).on('value', snapshot => {
                currentData = snapshot.val() || {};
                render();
                
                // إخفاء شاشة التحميل
                setTimeout(() => {
                    document.getElementById('splash').style.opacity = '0';
                    document.getElementById('splash').style.pointerEvents = 'none';
                }, 2000);
            });
        }

        // ========== دالة العرض الرئيسية ==========
        function render() {
            const data = currentData;

            // تحديث الاسم
            const siteName = data.site_name || 'بصمة غير';
            document.getElementById('site-name').textContent = siteName;
            document.getElementById('site-name-mobile').textContent = siteName;

            // تحديث العنوان والوصف
            document.getElementById('hero-title').textContent = data.hero_title || 'تصاميم تترك بصمة';
            document.getElementById('hero-subtitle').textContent = data.hero_subtitle || 'احصل على الديكور والتصميم الذي يعكس شخصيتك وذوقك الرفيع';

            // تحديث التنقل
            updateNavigation();

            // تحديث التذييل
            updateFooter();

            // تحديث المحتوى الرئيسي
            renderMainContent();
        }

        // ========== تحديث التنقل ==========
        function updateNavigation() {
            const data = currentData;
            let navHTML = `
                <button class="nav-item ${currentTab === 'home' ? 'active' : ''}" onclick="switchTab('home')">الرئيسية</button>
                <button class="nav-item ${currentTab === 'works' ? 'active' : ''}" onclick="switchTab('works')">أعمالنا</button>
            `;

            if (data.pages) {
                Object.entries(data.pages).forEach(([id, page]) => {
                    navHTML += `<button class="nav-item ${currentTab === 'page-' + id ? 'active' : ''}" onclick="switchTab('page-${id}')">${page.title}</button>`;
                });
            }

            navHTML += `<button class="nav-item ${currentTab === 'about' ? 'active' : ''}" onclick="switchTab('about')">من نحن</button>`;

            document.getElementById('desktop-nav').innerHTML = navHTML;
            document.getElementById('mobile-nav-items').innerHTML = navHTML.replace(/class="nav-item/g, 'class="mobile-nav-item');
        }

        // ========== تحديث التذييل ==========
        function updateFooter() {
            const data = currentData;
            let footerHTML = `
                <div class="footer-section">
                    <h4>عن بصمة غير</h4>
                    <p>${data.footer_description || 'شركة متخصصة في تصميم وديكور الفضاءات'}</p>
                </div>
                <div class="footer-section">
                    <h4>روابط سريعة</h4>
                    <ul>
                        <li><a href="#" onclick="switchTab('home'); return false;">الرئيسية</a></li>
                        <li><a href="#" onclick="switchTab('works'); return false;">أعمالنا</a></li>
                        <li><a href="#" onclick="switchTab('about'); return false;">من نحن</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>تواصل معنا</h4>
                    <p>📞 ${data.phone || '966500000000'}</p>
                    <p>📧 ${data.email || 'info@basmah.com'}</p>
                    <div class="footer-social">
                        ${data.instagram ? `<a href="${data.instagram}" class="social-link" target="_blank"><i class="fab fa-instagram"></i></a>` : ''}
                        ${data.twitter ? `<a href="${data.twitter}" class="social-link" target="_blank"><i class="fab fa-twitter"></i></a>` : ''}
                        ${data.facebook ? `<a href="${data.facebook}" class="social-link" target="_blank"><i class="fab fa-facebook"></i></a>` : ''}
                    </div>
                </div>
            `;
            document.getElementById('footer-content').innerHTML = footerHTML;
            document.getElementById('footer-text').textContent = data.footer_text || '© 2026 بصمة غير للديكور. جميع الحقوق محفوظة.';
        }

        // ========== عرض المحتوى الرئيسي ==========
        function renderMainContent() {
            const data = currentData;
            let content = '';

            if (currentTab === 'home') {
                // عرض الخدمات
                if (data.services) {
                    content += `
                        <section class="services-section">
                            <h2 class="section-title">خدماتنا</h2>
                            <div class="services-grid">
                    `;
                    Object.entries(data.services).forEach(([id, service]) => {
                        content += `
                            <div class="service-card">
                                <div class="service-icon">${service.icon || '🎨'}</div>
                                <h3 class="service-title">${service.name}</h3>
                                <p class="service-description">${service.description}</p>
                            </div>
                        `;
                    });
                    content += `
                            </div>
                        </section>
                    `;
                }

                // عرض أوقات العمل
                content += renderScheduleSection();

                // عرض التقييمات
                if (data.reviews) {
                    content += renderTestimonials();
                }
            } else if (currentTab === 'works') {
                content += renderWorks();
            } else if (currentTab === 'about') {
                content += renderAbout();
            } else if (currentTab.startsWith('page-')) {
                const pageId = currentTab.substring(5);
                content += renderPage(pageId);
            }

            document.getElementById('main-content').innerHTML = content;
        }

        // ========== عرض أوقات العمل ==========
        function renderScheduleSection() {
            const data = currentData;
            if (!data.work_schedule) return '';

            let html = `
                <section class="schedule-section">
                    <h2 class="schedule-title">🕒 أوقات العمل</h2>
                    <div class="schedule-grid">
            `;

            const daysArabic = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const reorderedDays = [6, 0, 1, 2, 3, 4, 5];

            reorderedDays.forEach(dayIndex => {
                const schedule = data.work_schedule[dayIndex];
                const dayName = daysArabic[dayIndex];

                if (schedule && schedule.active) {
                    const start = schedule.s1_s ? formatTime(schedule.s1_s) : '09:00';
                    const end = schedule.s1_e ? formatTime(schedule.s1_e) : '17:00';

                    html += `
                        <div class="schedule-item">
                            <div class="schedule-day">${dayName}</div>
                            <div class="schedule-time">${start} - ${end}</div>
                    `;

                    if (schedule.s2_a && schedule.s2_s && schedule.s2_e) {
                        html += `<div class="schedule-time" style="margin-top: 0.5rem;">${formatTime(schedule.s2_s)} - ${formatTime(schedule.s2_e)}</div>`;
                    }

                    const isOpen = isCurrentlyOpen(dayIndex, schedule);
                    html += `
                            <div class="schedule-status">
                                <div class="status-dot ${isOpen ? 'open' : 'closed'}"></div>
                                <span>${isOpen ? 'مفتوح الآن' : 'مغلق الآن'}</span>
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="schedule-item">
                            <div class="schedule-day">${dayName}</div>
                            <div class="schedule-time" style="color: var(--error);">🔴 إجازة</div>
                        </div>
                    `;
                }
            });

            html += `</div></section>`;
            return html;
        }

        // ========== فحص إذا كان المتجر مفتوحاً الآن ==========
        function isCurrentlyOpen(dayIndex, schedule) {
            const now = new Date();
            if (now.getDay() !== dayIndex) return false;

            const currentTime = now.getHours() * 60 + now.getMinutes();
            const startTime = timeToMinutes(schedule.s1_s || '09:00');
            const endTime = timeToMinutes(schedule.s1_e || '17:00');

            return currentTime >= startTime && currentTime < endTime;
        }

        function timeToMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function formatTime(time) {
            const [h, m] = time.split(':');
            const hour = parseInt(h);
            const ampm = hour >= 12 ? 'م' : 'ص';
            return `${hour % 12 || 12}:${m}${ampm}`;
        }

        // ========== عرض التقييمات ==========
        function renderTestimonials() {
            const data = currentData;
            if (!data.reviews || Object.keys(data.reviews).length === 0) return '';

            let html = `
                <section style="padding: 3rem 1.5rem;">
                    <h2 class="section-title">تقييمات عملائنا</h2>
                    <div class="testimonials-grid">
            `;

            Object.entries(data.reviews).slice(0, 3).forEach(([id, review]) => {
                html += `
                    <div class="testimonial-card">
                        <div class="rating">${'⭐'.repeat(review.rating)}</div>
                        <div class="testimonial-quote">"</div>
                        <p class="testimonial-text">${review.message}</p>
                        <div class="testimonial-author">
                            <div class="author-avatar">${review.name.charAt(0)}</div>
                            <div class="author-info">
                                <h4>${review.name}</h4>
                                <p>${review.date || 'عميل مميز'}</p>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `</div></section>`;
            return html;
        }

        // ========== عرض الأعمال ==========
        function renderWorks() {
            const data = currentData;
            if (!data.albums) return '<div style="text-align: center; padding: 3rem;">لا توجد أعمال حالياً</div>';

            let html = '<div class="grid-container">';
            Object.entries(data.albums).forEach(([id, album]) => {
                const imageCount = album.imgs ? Object.keys(album.imgs).length : 0;
                html += `
                    <div class="card">
                        <div class="card-image" style="background: linear-gradient(135deg, #7c3aed, #f59e0b);">
                            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem;">📁</div>
                        </div>
                        <div class="card-content">
                            <h3 class="card-title">${album.name}</h3>
                            <p class="card-description">${imageCount} صورة</p>
                            <button class="btn btn-primary" onclick="viewAlbum('${id}')" style="width: 100%; margin-top: auto;">عرض الألبوم</button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        // ========== عرض الصفحات ==========
        function renderPage(pageId) {
            const data = currentData;
            const page = data.pages?.[pageId];
            if (!page) return '<div style="text-align: center; padding: 3rem;">الصفحة غير موجودة</div>';

            let html = '<div class="grid-container">';
            if (page.imgs) {
                Object.entries(page.imgs).forEach(([id, img]) => {
                    html += renderImageCard(img.url, pageId);
                });
            }
            html += '</div>';
            return html;
        }

        // ========== عرض بطاقة الصورة ==========
        function renderImageCard(imageUrl, context) {
            return `
                <div class="card fade-in">
                    <div class="card-image">
                        <img src="${imageUrl}" alt="صورة" loading="lazy">
                        <div class="overlay">
                            <button class="overlay-btn" onclick="viewImage('${imageUrl}')"><i class="fas fa-eye"></i></button>
                            <button class="overlay-btn" onclick="shareOnWhatsApp('${imageUrl}')"><i class="fab fa-whatsapp"></i></button>
                        </div>
                    </div>
                    <div class="card-content">
                        <button class="btn btn-primary" onclick="shareOnWhatsApp('${imageUrl}')" style="width: 100%;">استفسر عن هذا</button>
                    </div>
                </div>
            `;
        }

        // ========== عرض من نحن ==========
        function renderAbout() {
            const data = currentData;
            return `
                <section class="about-section">
                    <div class="about-content">
                        <h2>من نحن</h2>
                        <p>${data.about_text || 'نحن متخصصون في تقديم حلول ديكور فريدة تعكس هويتك وشخصيتك.'}</p>
                        <div class="about-features">
                            <div class="feature-item">
                                <div class="feature-icon"><i class="fas fa-star"></i></div>
                                <div class="feature-text">
                                    <h3>تصاميم فريدة</h3>
                                    <p>كل تصميم يتم إنشاؤه خصيصاً لك</p>
                                </div>
                            </div>
                            <div class="feature-item">
                                <div class="feature-icon"><i class="fas fa-heart"></i></div>
                                <div class="feature-text">
                                    <h3>جودة عالية</h3>
                                    <p>نستخدم أفضل المواد والتقنيات</p>
                                </div>
                            </div>
                            <div class="feature-item">
                                <div class="feature-icon"><i class="fas fa-handshake"></i></div>
                                <div class="feature-text">
                                    <h3>خدمة استثنائية</h3>
                                    <p>نلتزم برضاكم بالكامل</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div style="height: 400px; background: var(--gradient-soft); border-radius: var(--radius-2xl); display: flex; align-items: center; justify-content: center; font-size: 4rem;">
                        🎨
                    </div>
                </section>
            `;
        }

        // ========== وظائف التفاعل ==========
        function switchTab(tab) {
            currentTab = tab;
            renderMainContent();
            updateNavigation();
            toggleMobileMenu();
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('theme', currentTheme);
        }

        function loadTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                currentTheme = 'dark';
                document.documentElement.classList.add('dark-mode');
            }
        }

        function toggleMobileMenu() {
            document.getElementById('mobile-nav').classList.toggle('active');
        }

        function openWhatsApp() {
            const phone = currentData.whatsapp_num || '966500000000';
            const message = 'السلام عليكم، أود التواصل معكم بخصوص خدماتكم';
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
        }

        function shareOnWhatsApp(imageUrl) {
            const phone = currentData.whatsapp_num || '966500000000';
            const message = 'السلام عليكم، أود الاستفسار عن هذا التصميم: ' + imageUrl;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
        }

        function viewImage(imageUrl) {
            alert('سيتم فتح الصورة في نافذة جديدة');
            window.open(imageUrl, '_blank');
        }

        function viewAlbum(albumId) {
            // تنفيذ عرض الألبوم
            alert('عرض الألبوم: ' + albumId);
        }

        function scrollToSection(sectionId) {
            switchTab(sectionId);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function checkAccess() {
            const password = prompt('أدخل كلمة المرور الإدارية:');
            if (password === currentData.admin_password || password === '123456') {
                isAdmin = true;
                alert('تم تسجيل الدخول بنجاح');
            } else {
                alert('كلمة المرور غير صحيحة');
            }
        }
    </script>
</body>
</html>

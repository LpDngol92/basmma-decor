<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>بصمة غير | Basmat Gheer</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <!-- Swiper JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Primary Colors - 2026 Trend */
            --primary: #8B5CF6;
            --primary-dark: #7C3AED;
            --primary-light: #A78BFA;
            --secondary: #10B981;
            --accent: #F59E0B;
            --dark: #0F172A;
            --dark-light: #1E293B;
            --light: #F8FAFC;
            --white: #FFFFFF;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            
            /* Gradients */
            --gradient-primary: linear-gradient(135deg, #8B5CF6 0%, #6366F1 100%);
            --gradient-secondary: linear-gradient(135deg, #10B981 0%, #059669 100%);
            --gradient-accent: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
            --gradient-dark: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            
            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            
            /* Border Radius */
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --radius-3xl: 2rem;
            --radius-full: 9999px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--gray-50);
            color: var(--gray-900);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--gray-100);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            line-height: 1.2;
        }

        /* Splash Screen */
        #splash {
            position: fixed;
            inset: 0;
            background: var(--gradient-primary);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .splash-content {
            text-align: center;
            color: var(--white);
            animation: splashFloat 2s ease-in-out infinite;
        }

        .splash-content .logo {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #e0e7ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .splash-content i {
            font-size: 3rem;
            color: var(--white);
            opacity: 0.9;
            animation: splashSpin 2s linear infinite;
        }

        @keyframes splashFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes splashSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Maintenance Screen */
        #maintenance-screen {
            position: fixed;
            inset: 0;
            background: var(--gradient-primary);
            z-index: 9998;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .maintenance-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: var(--radius-3xl);
            padding: 3rem;
            text-align: center;
            color: var(--white);
            max-width: 500px;
            width: 90%;
            animation: slideUp 0.5s ease;
        }

        .maintenance-card i {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            color: var(--white);
        }

        .maintenance-card h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .maintenance-card p {
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: var(--radius-full);
            overflow: hidden;
        }

        .progress-fill {
            width: 70%;
            height: 100%;
            background: var(--white);
            animation: progressMove 2s ease-in-out infinite;
        }

        @keyframes progressMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }

        /* Navbar */
        .navbar {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-logo img {
            width: 45px;
            height: 45px;
            border-radius: var(--radius-lg);
            object-fit: cover;
        }

        .nav-logo span {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 0.5rem;
        }

        .nav-links::-webkit-scrollbar {
            display: none;
        }

        .nav-btn {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: var(--gray-100);
            color: var(--primary);
        }

        .nav-btn.active {
            background: var(--primary);
            color: var(--white);
        }

        .nav-status {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge.open-glow {
            background: rgba(16, 185, 129, 0.1);
            color: var(--secondary);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-badge.closed-glow {
            background: rgba(239, 68, 68, 0.1);
            color: #EF4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* News Ticker */
        .news-ticker {
            background: var(--dark);
            color: var(--white);
            padding: 0.75rem 0;
            overflow: hidden;
            position: relative;
        }

        .ticker-content {
            white-space: nowrap;
            animation: tickerMove 30s linear infinite;
            font-weight: 500;
        }

        .ticker-content i {
            color: var(--primary-light);
            margin: 0 0.5rem;
        }

        @keyframes tickerMove {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Partners Section */
        .partners-section {
            background: var(--white);
            padding: 4rem 2rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .partners-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 3rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .partners-slider {
            max-width: 1200px;
            margin: 0 auto;
        }

        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .partner-img {
            max-width: 150px;
            max-height: 80px;
            object-fit: contain;
            filter: grayscale(100%);
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .partner-img:hover {
            filter: grayscale(0%);
            opacity: 1;
        }

        /* Main Content */
        main {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .sec {
            display: none;
        }

        .sec.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hero Section */
        .hero-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            margin-bottom: 4rem;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 1.2rem;
            color: var(--gray-600);
            margin-bottom: 2rem;
        }

        .hero-stats {
            display: flex;
            gap: 2rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            color: var(--gray-500);
            font-size: 0.9rem;
        }

        .hero-image {
            position: relative;
        }

        .hero-image img {
            width: 100%;
            border-radius: var(--radius-3xl);
            box-shadow: var(--shadow-2xl);
        }

        .floating-card {
            position: absolute;
            bottom: -2rem;
            right: -2rem;
            background: var(--white);
            padding: 1.5rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .floating-card i {
            font-size: 2rem;
            color: var(--primary);
        }

        /* Work Path */
        .work-path {
            margin: 4rem 0;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
        }

        .path-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .path-card {
            background: var(--white);
            padding: 2rem;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-lg);
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid var(--gray-100);
        }

        .path-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-2xl);
            border-color: var(--primary-light);
        }

        .path-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-primary);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .path-icon i {
            font-size: 2rem;
            color: var(--white);
        }

        .path-card h3 {
            margin-bottom: 0.5rem;
            color: var(--gray-900);
        }

        .path-card p {
            color: var(--gray-600);
            font-size: 0.95rem;
        }

        /* Schedule Section */
        .schedule-section {
            background: var(--white);
            border-radius: var(--radius-3xl);
            padding: 3rem;
            margin: 4rem 0;
            box-shadow: var(--shadow-lg);
        }

        .schedule-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .schedule-header i {
            font-size: 2rem;
            color: var(--primary);
            background: var(--gray-100);
            padding: 1rem;
            border-radius: var(--radius-xl);
        }

        .schedule-header h2 {
            font-size: 2rem;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .day-card {
            background: var(--gray-50);
            padding: 1.5rem;
            border-radius: var(--radius-xl);
            border: 1px solid var(--gray-200);
        }

        .day-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .time-slot {
            color: var(--gray-700);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .time-slot i {
            color: var(--primary);
            width: 20px;
            margin-left: 0.5rem;
        }

        .holiday {
            color: #EF4444;
            font-weight: 500;
        }

        /* Reviews Section */
        .reviews-section {
            margin: 4rem 0;
        }

        .reviews-slider {
            background: var(--gradient-primary);
            border-radius: var(--radius-3xl);
            padding: 3rem;
            color: var(--white);
        }

        .review-card {
            text-align: center;
        }

        .review-card i {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }

        .review-card p {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
            opacity: 0.95;
        }

        .review-card h4 {
            color: var(--white);
            margin-bottom: 0.5rem;
        }

        .review-stars {
            color: #FFD700;
        }

        /* Review Form */
        .review-form-section {
            background: var(--white);
            border-radius: var(--radius-3xl);
            padding: 3rem;
            margin: 4rem 0;
            box-shadow: var(--shadow-lg);
        }

        .form-title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .review-form {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-xl);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .rating-stars {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            direction: ltr;
        }

        .rating-stars i {
            font-size: 2rem;
            color: var(--gray-300);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .rating-stars i:hover,
        .rating-stars i.active {
            color: #FFD700;
            transform: scale(1.1);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--gradient-primary);
            color: var(--white);
            border: none;
            border-radius: var(--radius-xl);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* Location Section */
        .location-section {
            background: var(--white);
            border-radius: var(--radius-3xl);
            padding: 3rem;
            margin: 4rem 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .location-info h3 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .location-info p {
            color: var(--gray-600);
            margin-bottom: 2rem;
        }

        .location-btn {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 2rem;
            background: var(--gradient-primary);
            color: var(--white);
            border: none;
            border-radius: var(--radius-xl);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .location-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .location-map {
            border-radius: var(--radius-2xl);
            overflow: hidden;
            box-shadow: var(--shadow-xl);
        }

        .location-map iframe {
            width: 100%;
            height: 300px;
            border: none;
        }

        /* Social Section */
        .social-section {
            text-align: center;
            margin: 4rem 0;
        }

        .social-icons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .social-icon {
            width: 60px;
            height: 60px;
            background: var(--white);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--gray-700);
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-icon:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
        }

        .social-icon.instagram:hover {
            background: linear-gradient(45deg, #f09433 0%, #d62976 100%);
            color: white;
        }

        .social-icon.tiktok:hover {
            background: #000000;
            color: white;
        }

        .social-icon.snapchat:hover {
            background: #FFFC00;
            color: #000000;
        }

        .social-icon.whatsapp:hover {
            background: #25D366;
            color: white;
        }

        /* Catalogs Grid */
        .catalogs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .catalog-card {
            background: var(--white);
            border-radius: var(--radius-2xl);
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--gray-200);
        }

        .catalog-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-2xl);
            border-color: var(--primary);
        }

        .catalog-card i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .catalog-card h3 {
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .catalog-card p {
            color: var(--gray-500);
            font-size: 0.9rem;
        }

        /* Works Grid */
        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .work-card {
            background: var(--white);
            border-radius: var(--radius-2xl);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s ease;
        }

        .work-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-2xl);
        }

        .work-image {
            position: relative;
            height: 240px;
            overflow: hidden;
        }

        .work-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.5s ease;
        }

        .work-card:hover .work-image img {
            transform: scale(1.1);
        }

        .work-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-end;
            padding: 1.5rem;
        }

        .work-card:hover .work-overlay {
            opacity: 1;
        }

        .work-overlay span {
            color: var(--white);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .work-content {
            padding: 1.5rem;
        }

        .work-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--gray-900);
        }

        .work-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--gradient-primary);
            color: var(--white);
            border: none;
            border-radius: var(--radius-xl);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .work-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Image Viewer */
        #viewer {

        .admin-card-header {
            background: var(--gray-700);

        .admin-card-body {

            border: 1px solid var(--gray-600);

        }

        .admin-btn {
            padding: 0.75rem 1.5rem;

            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        }

        .admin-btn-danger {
            background: #EF4444;
        }

        .admin-btn-danger:hover {
            background: #DC2626;
        }

        /* Protection Toggle */
        #protection-toggle {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            width: 60px;
            height: 60px;
            background: var(--gradient-primary);
            border: none;
            border-radius: var(--radius-full);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 999;
            box-shadow: var(--shadow-xl);
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        #protection-toggle:hover {
            transform: scale(1.1);
        }

        #protection-toggle.active {
            background: #EF4444;
        }

        /* Hidden Trigger */
        #hidden-trigger {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 50px;
            z-index: 9999;
            cursor: pointer;
            opacity: 0;
        }

        /* Footer */
        footer {

        /* Responsive */

                gap: 1rem;
            }

                padding: 2rem 1rem;
            }

            .review-form-section {

    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
            authDomain: "mydecor-b29bd.firebaseapp.com",
            databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mydecor-b29bd",
            storageBucket: "mydecor-b29bd.firebasestorage.app",
            messagingSenderId: "302609299720",
            appId: "1:302609299720:web:e086b600c3ee824acd54bd"
        };

        firebase.initializeApp(firebaseConfig);
        
        const db = firebase.database();
        const auth = firebase.auth();
        const DB_PATH = 'site_v28';
        
        let currentData = {};
        let currentTab = 'home';
        let isAdmin = false;
        let userRating = 0;
        let reviewIdx = 0;
        let isProtectionEnabled = true;

        // Initialize AOS
        AOS.init({
            duration: 1000,
            once: true
        });

        // Hide splash screen after 2 seconds
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
            }, 500);
        }, 2000);

        // Auth state listener
        auth.onAuthStateChanged((user) => {
            if (user) {
                isAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('protection-toggle').style.display = 'flex';
                fillAdminFields();
            } else {
                isAdmin = false;
            }
        });

        // Load data from Firebase
        db.ref(DB_PATH).on('value', snap => {
            currentData = snap.val() || {};
            
            // Check maintenance mode
            const mScreen = document.getElementById('maintenance-screen');
            if (currentData.maintenance_mode && !isAdmin) {
                mScreen.style.display = 'flex';
            } else {
                mScreen.style.display = 'none';
            }
            
            // Update elements
            document.getElementById('site-name').innerText = currentData.site_name || 'بصمة غير';
            document.getElementById('site-logo').src = currentData.logo_url || 'https://via.placeholder.com/45/8B5CF6/FFFFFF?text=بصمة';
            document.getElementById('site-footer').innerHTML = `
                <div class="footer-content">
                    <div class="footer-logo">بصمة غير</div>
                    <p class="footer-text">${currentData.footer_text || 'تصميم داخلي عصري وفاخر'}</p>
                    <div class="footer-links">
                        <a href="#">الرئيسية</a>
                        <a href="#">أعمالنا</a>
                        <a href="#">اتصل بنا</a>
                    </div>
                </div>
            `;
            document.getElementById('partners-title-text').innerText = currentData.partners_title || 'شركاء النجاح';
            
            if (currentData.news_bar) {
                document.getElementById('news-container').style.display = 'block';
                document.getElementById('news-text').innerHTML = `<i class="fas fa-bullhorn"></i> ${currentData.news_bar} <i class="fas fa-bullhorn"></i>`;
            } else {
                document.getElementById('news-container').style.display = 'none';
            }
            
            renderAll();
            renderAdminLists();
            renderAdminReviews();
            renderAdminPartners();
            initPartnersSlider();
            updateWorkStatus();
            
            if (isAdmin) {
                fillAdminFields();
            }
        });

        // Update work status every minute
        setInterval(updateWorkStatus, 60000);

        // Protection functions
        function toggleProtection() {
            isProtectionEnabled = !isProtectionEnabled;
            const btn = document.getElementById('protection-toggle');
            
            if (isProtectionEnabled) {
                enableProtection();
                btn.classList.remove('active');
                btn.innerHTML = '<i class="fas fa-shield-alt"></i>';
            } else {
                disableProtection();
                btn.classList.add('active');
                btn.innerHTML = '<i class="fas fa-shield-slash"></i>';
            }
        }

        function enableProtection() {
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            document.addEventListener('keydown', (e) => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'U')) {
                    e.preventDefault();
                }
            });
            document.addEventListener('dragstart', (e) => e.preventDefault());
            document.addEventListener('copy', (e) => e.preventDefault());
        }

        function disableProtection() {
            document.removeEventListener('contextmenu', (e) => e.preventDefault());
            document.removeEventListener('keydown', (e) => e.preventDefault());
            document.removeEventListener('dragstart', (e) => e.preventDefault());
            document.removeEventListener('copy', (e) => e.preventDefault());
        }

        // Enable protection by default
        enableProtection();

        // Render functions
        function renderAll() {

            // Navbar
            let navHtml = `

                <button class="nav-btn ${currentTab === 'catalogs' ? 'active' : ''}" onclick="go('catalogs')">الكتالوجات</button>
            `;
            
            if (d.pages) {
                Object.keys(d.pages).forEach(id => {
                    navHtml += `<button class="nav-btn ${currentTab === id ? 'active' : ''}" onclick="go('${id}')">${d.pages[id].title}</button>`;
                });
            }
            
            navHtml += `<button class="nav-btn ${currentTab === 'works' ? 'active' : ''}" onclick="go('works')">أعمالنا</button>`;
            
            document.getElementById('navbar').innerHTML = navHtml;
            
            // Main content
            let contentHtml = `
                <section class="sec ${currentTab === 'home' ? 'active' : ''}">
                    ${renderHomeSection()}
                </section>
                
                <section class="sec ${currentTab === 'catalogs' ? 'active' : ''}">
                    <div class="catalogs-grid">
                        ${renderCatalogs()}
                    </div>
                </section>
            `;
            
            if (d.pages) {
                Object.keys(d.pages).forEach(id => {
                    contentHtml += `
                        <section class="sec ${currentTab === id ? 'active' : ''}">
                            <div class="works-grid">
                                ${renderImages(d.pages[id].imgs)}
                            </div>
                        </section>
                    `;
                });
            }
            
            contentHtml += `
                <section class="sec ${currentTab === 'works' ? 'active' : ''}">
                    <div class="works-grid">
                        ${renderAlbums()}
                    </div>
                </section>
            `;
            
            if (d.albums) {
                Object.keys(d.albums).forEach(id => {
                    contentHtml += `
                        <section class="sec ${currentTab === 'alb-' + id ? 'active' : ''}">
                            <button onclick="go('works')" style="background:var(--primary); color:white; border:none; padding:1rem 2rem; border-radius:var(--radius-xl); margin-bottom:2rem; cursor:pointer;">
                                <i class="fas fa-arrow-right"></i> العودة للأعمال

        function getSmartSchedule(d) {
            if (!d.work_schedule) return '<p style="color:var(--gray-500); text-align:center;">لم يتم تحديد مواعيد العمل بعد</p>';
            
            const dayNames = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
            
            let html = '<div class="schedule-grid">';
            
            dayNames.forEach((dayName, index) => {
                const s = d.work_schedule[index];
                
                html += `
                    <div class="day-card">
                        <div class="day-name">${dayName}</div>
                `;
                
                if (s && s.active) {
                    html += `
                        <div class="time-slot">
                            <i class="fas fa-sun"></i>
                            ${t12(s.s1_s || '09:00')} - ${t12(s.s1_e || '17:00')}
                        </div>
                    `;
                    
                    if (s.s2_a && s.s2_s && s.s2_e) {
                        html += `
                            <div class="time-slot">
                                <i class="fas fa-moon"></i>
                                ${t12(s.s2_s)} - ${t12(s.s2_e)}
                            </div>
                        `;
                    }
                } else {
                    html += `
                        <div class="time-slot holiday">
                            <i class="fas fa-ban"></i>
                            إجازة
                        </div>
                    `;
                }
                
                html += `</div>`;
            });
            
            html += '</div>';
            return html;
        }

        function t12(t) {
            if (!t) return "";
            let [h, m] = t.split(':');
            h = parseInt(h);
            return `${h % 12 || 12}:${m} ${h >= 12 ? 'م' : 'ص'}`;
        }

        function updateWorkStatus() {
            const d = currentData;
            if (!d.work_schedule) {
                document.getElementById('status-container').innerHTML = '';
                return;
            }
            
            const now = new Date();
            const dayJS = now.getDay();
            const schedule = d.work_schedule[dayJS];
            
            let statusHtml = '';
            
            if (schedule && schedule.active) {
                const toMins = (t) => {
                    if (!t || t === '') return -1;
                    const [h, m] = t.split(':').map(Number);
                    return (h * 60) + m;
                };
                
                const currentMinutes = now.getHours() * 60 + now.getMinutes();
                let isOpen = false;
                
                if (schedule.s1_s && schedule.s1_e) {
                    const morningStart = toMins(schedule.s1_s);
                    const morningEnd = toMins(schedule.s1_e);
                    
                    if (currentMinutes >= morningStart && currentMinutes < morningEnd) {
                        isOpen = true;
                    }
                }
                
                if (!isOpen && schedule.s2_a && schedule.s2_s && schedule.s2_e) {
                    const eveningStart = toMins(schedule.s2_s);
                    const eveningEnd = toMins(schedule.s2_e);
                    
                    if (eveningEnd < eveningStart) {
                        if (currentMinutes >= eveningStart || currentMinutes < eveningEnd) {
                            isOpen = true;
                        }
                    } else {
                        if (currentMinutes >= eveningStart && currentMinutes < eveningEnd) {
                            isOpen = true;
                        }
                    }
                }
                
                statusHtml = isOpen
                    ? `<div class="status-badge open-glow"><i class="fas fa-circle"></i> مفتوح الآن</div>`
                    : `<div class="status-badge closed-glow"><i class="fas fa-circle"></i> مغلق الآن</div>`;
            } else {
                statusHtml = `<div class="status-badge closed-glow"><i class="fas fa-circle"></i> إجازة اليوم</div>`;
            }
            
            document.getElementById('status-container').innerHTML = statusHtml;
        }

                    active: document.getElementById(`check-${jsDay}`).checked,
                    s1_s: document.getElementById(`s1s-${jsDay}`).value || '09:00',
                    s1_e: document.getElementById(`s1e-${jsDay}`).value || '17:00',
                    s2_a: document.getElementById(`s2a-${jsDay}`).checked,
                    s2_s: document.getElementById(`s2s-${jsDay}`).value,
                    s2_e: document.getElementById(`s2e-${jsDay}`).value
                };
            });
            
            db.ref(DB_PATH + '/work_schedule').set(sc)
                .then(() => alert('تم حفظ المواعيد'));
        }

        function savePartnersTitle() {
            db.ref(DB_PATH).update({
                partners_title: document.getElementById('admin-partners-title').value
            }).then(() => alert('تم حفظ العنوان'));
        }

        function addPartner() {
            const url = document.getElementById('new-partner-url').value;
            if (url) {
                db.ref(DB_PATH + '/partners').push({ url: url.trim() })
                    .then(() => {
                        document.getElementById('new-partner-url').value = '';
                        alert('تم إضافة الشريك');
                    });
            }
        }

        function addCatalog() {
            const name = document.getElementById('new-cat-name').value;
            const code = document.getElementById('new-cat-code').value;
            
            if (name && code) {
                db.ref(DB_PATH + '/catalogs').push({ name, code })
                    .then(() => {
                        document.getElementById('new-cat-name').value = '';
                        document.getElementById('new-cat-code').value = '';
                        alert('تم إضافة الكتالوج');
                    });
            }
        }

        function saveMaintenanceSettings() {
            db.ref(DB_PATH).update({
                maintenance_mode: document.getElementById('in-maintenance').checked,
                maintenance_title: document.getElementById('in-maintenance-title').value,
                maintenance_message: document.getElementById('in-maintenance-message').value,
                maintenance_footer: document.getElementById('in-maintenance-footer').value
            }).then(() => alert('تم حفظ إعدادات الصيانة'));
        }

        function publishPhotos() {
            const path = document.getElementById('upload-target-sel').value;
            const urls = document.getElementById('links-in').value.split('\n').filter(u => u.trim());
            
            if (!path || !urls.length) {
                alert('يرجى تحديد وجهة وإدخال روابط الصور');
                return;
            }
            
            const promises = urls.map(u =>
                db.ref(DB_PATH + '/' + path + '/imgs').push({ url: u.trim() })
            );
            
            Promise.all(promises)
                .then(() => {
                    alert('تم نشر الصور بنجاح');
                    document.getElementById('links-in').value = '';
                });
        }

        function renderAdminLists() {
            const d = currentData;
            let upSel = '<option value="">اختر الوجهة</option>';
            
            if (d.pages) {
                Object.keys(d.pages).forEach(id => {
                    upSel += `<option value="pages/${id}">${d.pages[id].title}</option>`;
                });
            }
            
            if (d.albums) {
                Object.keys(d.albums).forEach(id => {
                    upSel += `<option value="albums/${id}">${d.albums[id].name}</option>`;
                });
            }
            
            document.getElementById('upload-target-sel').innerHTML = upSel;
            document.getElementById('manage-sec-sel').innerHTML = upSel;
        }

        function renderAdminReviews() {
            const list = document.getElementById('admin-reviews-list');
            list.innerHTML = '';
            
            if (currentData.reviews) {
                Object.keys(currentData.reviews).forEach(id => {
                    const r = currentData.reviews[id];
                    list.innerHTML += `
                        <div style="background:var(--gray-700); padding:1rem; border-radius:var(--radius-lg); margin-bottom:1rem;">
                            <div style="display:flex; justify-content:space-between; color:var(--primary); margin-bottom:0.5rem;">
                                <span><b>${r.name}</b></span>
                                <span>${r.rating} ⭐</span>
                            </div>
                            <p style="color:white; margin-bottom:0.5rem;">${r.message}</p>
                            <button class="admin-btn admin-btn-danger" onclick="db.ref(DB_PATH+'/reviews/${id}').remove()">حذف</button>
                        </div>
                    `;
                });
            }
        }

        function renderAdminPartners() {
            const list = document.getElementById('admin-partners-list');
            list.innerHTML = '';
            document.getElementById('admin-partners-title').value = currentData.partners_title || '';
            
            if (currentData.partners) {
                Object.keys(currentData.partners).forEach(id => {
                    list.innerHTML += `
                        <div style="display:flex; align-items:center; gap:0.5rem; background:var(--gray-700); padding:0.5rem; border-radius:var(--radius-lg); margin-bottom:0.5rem;">
                            <img src="${currentData.partners[id].url}" style="width:40px; height:40px; object-fit:contain;">
                            <span style="color:white; flex:1;">${currentData.partners[id].url.substring(0,30)}...</span>
                            <button class="admin-btn admin-btn-danger" onclick="db.ref(DB_PATH+'/partners/${id}').remove()">حذف</button>
                        </div>
                    `;
                });
            }
        }

        function renderPhotoManager(path) {
            const grid = document.getElementById('photo-manager-grid');
            grid.innerHTML = '<p style="color:white;">جاري التحميل...</p>';
            
            if (!path) return;
            
            const [type, id] = path.split('/');
            const folder = currentData[type] && currentData[type][id];
            
            if (!folder || !folder.imgs) {
                grid.innerHTML = '<p style="color:white;">لا توجد صور</p>';
                return;
            }
            
            const imgs = Object.keys(folder.imgs);
            if (imgs.length === 0) {
                grid.innerHTML = '<p style="color:white;">لا توجد صور</p>';
                return;
            }
            
            let html = '';
            imgs.reverse().forEach(imgId => {
                const imgUrl = folder.imgs[imgId].url;
                html += `
                    <div style="background:var(--gray-700); padding:0.5rem; border-radius:var(--radius-lg);">
                        <img src="${imgUrl}" style="width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:var(--radius-lg); margin-bottom:0.5rem;">
                        <div style="display:flex; gap:0.5rem;">
                            <button class="admin-btn" style="flex:1; background:var(--primary);" onclick="openImg('${imgUrl}')">عرض</button>
                            <button class="admin-btn admin-btn-danger" style="flex:1;" onclick="deleteImg('${path}', '${imgId}')">حذف</button>
                        </div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        function deleteImg(path, imgId) {
            if (confirm("هل أنت متأكد؟")) {
                db.ref(`${DB_PATH}/${path}/imgs/${imgId}`).remove()
                    .then(() => {
                        alert('تم الحذف');
                        renderPhotoManager(path);
                    });
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeViewer();
            }
        });
    </script>
</body>
</html>

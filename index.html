<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>بصمة غير | ديكور فاخر وتصميم داخلي</title>
    <meta name="description" content="بصمة غير - متخصصون في التصميم الداخلي والديكور الفاخر، نقدم منتجات وأعمال راقية تناسب ذوقك.">
    <link rel="icon" type="image/png" href="https://i.ibb.co/CsmG3G7r/1.png">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: auto; }
        body { font-family: 'Cairo', sans-serif; background: #ffffff; color: #2d2a2a; line-height: 1.5; }
        :root {
            --primary: #c8a165;
            --primary-dark: #a47e44;
            --primary-light: #f8f1e6;
            --gray: #6f6a64;
            --white: #ffffff;
            --shadow: 0 8px 25px rgba(0,0,0,0.05);
            --shadow-hover: 0 15px 35px rgba(0,0,0,0.1);
        }
        #splash { position: fixed; inset: 0; background: #1a1a1a; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s; }
        .splash-img { width: 100%; height: 100%; object-fit: cover; }
        .header { background: rgba(255,255,255,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; flex-wrap: wrap; }
        .logo h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--primary-dark), var(--primary)); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 1.8rem; }
        .nav-links a { text-decoration: none; font-weight: 600; color: #333; transition: 0.2s; }
        .nav-links a:hover { color: var(--primary); }
        .hero { background: linear-gradient(135deg, #fef9f0, #fffaf5); padding: 5rem 20px; text-align: center; }
        .hero h1 { font-size: 3rem; font-weight: 800; color: var(--primary-dark); margin-bottom: 1rem; }
        .hero p { font-size: 1.2rem; color: #5a5a5a; max-width: 700px; margin: 0 auto 2rem; }
        .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 0.8rem 2rem; border-radius: 60px; font-weight: 600; text-decoration: none; transition: 0.2s; display: inline-block; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-3px); }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: var(--primary); color: white; }
        .section { padding: 4rem 0; }
        .section-title { font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 2.5rem; color: var(--primary-dark); position: relative; }
        .section-title::after { content: ''; display: block; width: 70px; height: 3px; background: var(--primary); margin: 0.5rem auto 0; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2rem; }
        .card { background: var(--white); border-radius: 28px; overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; cursor: pointer; text-align: center; }
        .card:hover { transform: translateY(-8px); box-shadow: var(--shadow-hover); }
        .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card-body { padding: 1.2rem; }
        .card-title { font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); }
        .product-card { background: var(--white); border-radius: 28px; overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
        .product-img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .product-info { padding: 1rem; text-align: center; }
        .whatsapp-order { background: #25D366; color: white; border: none; width: 100%; padding: 8px; border-radius: 50px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
        .whatsapp-order:hover { background: #1da15a; }
        .testimonial-card { background: var(--white); border-radius: 28px; padding: 1.5rem; box-shadow: var(--shadow); }
        .testimonial-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .testimonial-avatar { width: 50px; height: 50px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: var(--primary); }
        .stars { color: #f5b042; margin-top: 4px; }
        .review-form { background: var(--white); border-radius: 28px; padding: 1.5rem; box-shadow: var(--shadow); margin-top: 2rem; }
        .review-form input, .review-form textarea { width: 100%; padding: 10px 15px; border: 1px solid #eee; border-radius: 60px; margin-bottom: 1rem; font-family: inherit; }
        .review-form textarea { border-radius: 20px; resize: vertical; }
        .star-rating { display: flex; gap: 8px; justify-content: center; margin-bottom: 1rem; flex-direction: row-reverse; }
        .star-rating i { font-size: 1.6rem; color: #ddd; cursor: pointer; }
        .star-rating i.active, .star-rating i:hover { color: var(--primary); }
        .footer { background: #1e1e1e; color: #ccc; padding: 3rem 0 1rem; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; }
        .footer h4 { color: var(--primary); margin-bottom: 1rem; }
        .schedule-item { margin-bottom: 0.8rem; }
        .social-icons { display: flex; gap: 1rem; margin-top: 1rem; }
        .social-icons a { background: #333; width: 36px; height: 36px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; transition: 0.2s; }
        .social-icons a:hover { background: var(--primary); }
        .copyright { text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #333; }
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .lightbox img { max-width: 90%; max-height: 85vh; object-fit: contain; }
        .lightbox-close, .lightbox-prev, .lightbox-next { position: absolute; color: white; font-size: 2rem; cursor: pointer; background: rgba(0,0,0,0.5); padding: 0.2rem 0.5rem; border-radius: 50%; }
        .lightbox-close { top: 20px; right: 30px; }
        .lightbox-prev { left: 20px; top: 50%; transform: translateY(-50%); }
        .lightbox-next { right: 20px; top: 50%; transform: translateY(-50%); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e1e1e; color: white; padding: 8px 20px; border-radius: 50px; z-index: 2001; display: none; }
        @media (max-width: 800px) { .nav-bar { flex-direction: column; gap: 0.8rem; } .hero h1 { font-size: 2rem; } .section { padding: 2rem 0; } }
        .empty-state { text-align: center; padding: 2rem; color: var(--gray); }
    </style>
</head>
<body>

<div id="splash"><img id="splashImg" class="splash-img" style="display:none;"></div>

<header class="header">
    <div class="container">
        <div class="nav-bar">
            <div class="logo"><h1 id="siteTitle">بصمة غير</h1></div>
            <div class="nav-links">
                <a href="#" data-page="home">الرئيسية</a>
                <a href="#" data-page="store">المتجر</a>
                <a href="#" data-page="works">أعمالنا</a>
                <a href="#" data-page="catalogs">الكتالوجات</a>

</header>

<main id="mainContent"></main>

<footer class="footer">
    <div class="container">

            <div><h4>تواصل معنا</h4><p><i class="fas fa-phone"></i> <span id="footerPhone"></span></p><p><i class="fab fa-whatsapp"></i> <span id="footerWhatsapp"></span></p><p><i class="fas fa-map-marker-alt"></i> <span id="footerLocation"></span></p></div>
        </div>
        <div class="copyright" id="footerCopyright">© 2025 بصمة غير - جميع الحقوق محفوظة</div>
    </div>
</footer>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close" onclick="event.stopPropagation(); closeLightbox()">&times;</span>
    <span class="lightbox-prev" onclick="event.stopPropagation(); prevImage()">&#10094;</span>
    <span class="lightbox-next" onclick="event.stopPropagation(); nextImage()">&#10095;</span>
    <img id="lightboxImg">
</div>
<div id="toastMsg" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let currentPage = 'home';
    let currentAlbumImages = [];
    let currentImageIndex = 0;

    function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }

    // أوقات العمل المجمعة
    function formatTime12(t) { if (!t) return ''; let [h, m] = t.split(':'); h = parseInt(h); return `${h % 12 || 12}:${m} ${h >= 12 ? 'م' : 'ص'}`; }
    function getGroupedScheduleHtml(d) {
        if (!d.work_schedule) return '<p>لم تحدد المواعيد</p>';
        const dayNames = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        const order = [6, 0, 1, 2, 3, 4, 5];
        let groups = [], offDays = [];
        order.forEach(jsDay => {
            const s = d.work_schedule[jsDay];
            if (s && s.active) {
                const key = `${s.s1_s}-${s.s1_e}-${s.s2_a}`;
                let g = groups.find(g => g.key === key);
                if (g) g.days.push(dayNames[jsDay]);
                else groups.push({ key, days: [dayNames[jsDay]], data: s });
            } else offDays.push(dayNames[jsDay]);
        });
        let html = '';
        groups.forEach(g => {
            const dText = g.days.length === 1 ? g.days[0] : `من ${g.days[0]} إلى ${g.days[g.days.length - 1]}`;
            html += `<div class="schedule-item"><strong>${dText}</strong><br>${formatTime12(g.data.s1_s)} - ${formatTime12(g.data.s1_e)}`;
            if (g.data.s2_a) html += `<br>${formatTime12(g.data.s2_s)} - ${formatTime12(g.data.s2_e)}`;
            html += `</div>`;
        });
        if (offDays.length) html += `<div class="schedule-item"><strong>عطلة:</strong> ${offDays.join('، ')}</div>`;
        return html;
    }

    // دالة لجمع جميع صور المنتجات من كل المصادر (الألبومات وأقسام المتجر)
    function getAllProductImages() {
        let images = [];
        // 1. من أقسام المتجر (store_categories)
        if (currentData.store_categories) {
            Object.keys(currentData.store_categories).forEach(catId => {
                const cat = currentData.store_categories[catId];
                if (cat.imgs) {
                    Object.values(cat.imgs).forEach(img => { if (img.url) images.push(img.url); });
                }
            });
        }
        // 2. من الألبومات (أعمالنا) – نعتبرها منتجات أيضاً حتى لا تختفي
        if (currentData.albums) {
            Object.keys(currentData.albums).forEach(albId => {
                const alb = currentData.albums[albId];
                if (alb.imgs) {
                    Object.values(alb.imgs).forEach(img => { if (img.url) images.push(img.url); });
                }
            });
        }
        // إزالة التكرار (اختياري)
        return [...new Set(images)];
    }

    // دوال عرض الصفحات
    function renderHomePage() {
        return `
            <div class="hero"><div class="container"><h1>ديكور يعكس بصمتك</h1><p>نقدم تصاميم داخلية وخارجية فاخرة، ومنتجات راقية تناسب ذوقك.</p><div class="btn-group"><a href="#" class="btn btn-primary" data-page="store">تسوق الآن</a><a href="#" class="btn btn-outline" data-page="works">شاهد أعمالنا</a></div></div></div>
            <div class="container section"><h2 class="section-title">أقسام المتجر</h2><div class="grid-4" id="categoriesGrid"></div></div>
            <div class="container section"><h2 class="section-title">أحدث المنتجات</h2><div class="grid-4" id="productsGrid"></div></div>
            <div class="container section"><h2 class="section-title">أعمالنا</h2><div class="grid-4" id="portfolioGrid"></div></div>
            <div class="container section"><h2 class="section-title">الكتالوجات</h2><div class="grid-4" id="catalogsHomeGrid"></div></div>
            <div class="container section"><h2 class="section-title">آراء العملاء</h2><div class="grid-4" id="testimonialsGrid"></div><div id="reviewFormContainer"></div></div>
        `;
    }
    function renderStorePage() {
        return `<div class="container section"><h2 class="section-title">جميع المنتجات</h2><div class="grid-4" id="allProductsGrid"></div></div>`;
    }
    function renderWorksPage() {
        return `<div class="container section"><h2 class="section-title">أعمالنا</h2><div class="grid-4" id="worksGrid"></div></div>`;
    }
    function renderCatalogsPage() {
        return `<div class="container section"><h2 class="section-title">الكتالوجات</h2><div class="grid-4" id="catalogsPageGrid"></div></div>`;
    }
    function renderContactPage() {
        const d = currentData;
        return `<div class="container section"><h2 class="section-title">اتصل بنا</h2><div style="display:flex; justify-content:center; gap:2rem; flex-wrap:wrap; text-align:center;"><div><i class="fas fa-phone fa-2x" style="color:var(--primary);"></i><p><a href="tel:0541780995" style="color:inherit;">0541780995</a></p></div><div><i class="fab fa-whatsapp fa-2x" style="color:#25D366;"></i><p><a href="https://wa.me/${d.whatsapp_num || '966500000000'}" target="_blank">واتساب</a></p></div>${d.insta_url ? `<div><i class="fab fa-instagram fa-2x" style="color:var(--primary);"></i><p><a href="${d.insta_url}" target="_blank">انستقرام</a></p></div>` : ''}${d.tiktok_url ? `<div><i class="fab fa-tiktok fa-2x" style="color:var(--primary);"></i><p><a href="${d.tiktok_url}" target="_blank">تيك توك</a></p></div>` : ''}${d.snap_url ? `<div><i class="fab fa-snapchat fa-2x" style="color:var(--primary);"></i><p><a href="${d.snap_url}" target="_blank">سناب</a></p></div>` : ''}<div><i class="fas fa-map-marker-alt fa-2x" style="color:var(--primary);"></i><p><a href="${d.location_url || '#'}" target="_blank">موقعنا</a></p></div></div></div>`;
    }

    // دوال ملء المحتوى
    function buildCategories() {
        const container = document.getElementById('categoriesGrid');
        if (!container) return;
        if (!currentData.store_categories || Object.keys(currentData.store_categories).length === 0) {
            container.innerHTML = '<div class="empty-state">لا توجد أقسام بعد</div>';
            return;
        }
        let html = '';
        Object.keys(currentData.store_categories).forEach(id => {
            const cat = currentData.store_categories[id];
            let img = '';
            if (cat.imgs && Object.keys(cat.imgs).length) img = Object.values(cat.imgs)[0].url;
            html += `<div class="card" onclick="location.href='#store'">${img ? `<img src="${img}" class="card-img" loading="lazy">` : '<div class="card-img" style="background:#f0f0f0;"></div>'}<div class="card-body"><div class="card-title">${cat.name || 'قسم'}</div></div></div>`;
        });
        container.innerHTML = html;
    }
    function buildLatestProducts() {
        const container = document.getElementById('productsGrid');
        if (!container) return;
        let allImages = getAllProductImages();
        if (allImages.length === 0) { container.innerHTML = '<div class="empty-state">لا توجد منتجات حالياً</div>'; return; }
        const latest = allImages.slice(0, 6);
        let html = '';
        latest.forEach(url => {
            html += `<div class="product-card"><img src="${url}" class="product-img" loading="lazy"><div class="product-info"><button class="whatsapp-order" onclick="window.open('https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود طلب هذا المنتج:\n'+url)}', '_blank')"><i class="fab fa-whatsapp"></i> طلب عبر واتساب</button></div></div>`;
        });
        container.innerHTML = html;
    }
    function buildAllProductsGrid() {
        const container = document.getElementById('allProductsGrid');
        if (!container) return;
        let allImages = getAllProductImages();
        if (allImages.length === 0) { container.innerHTML = '<div class="empty-state">لا توجد منتجات</div>'; return; }
        let html = '';
        allImages.forEach(url => {
            html += `<div class="product-card"><img src="${url}" class="product-img" loading="lazy"><div class="product-info"><button class="whatsapp-order" onclick="window.open('https://wa.me/${currentData.whatsapp_num || '966500000000'}?text=${encodeURIComponent('السلام عليكم، أود طلب هذا المنتج:\n'+url)}', '_blank')"><i class="fab fa-whatsapp"></i> طلب عبر واتساب</button></div></div>`;
        });
        container.innerHTML = html;
    }
    function buildPortfolio() {
        const container = document.getElementById('portfolioGrid');
        if (!container) return;
        if (!currentData.albums || Object.keys(currentData.albums).length === 0) { container.innerHTML = '<div class="empty-state">لا توجد أعمال بعد</div>'; return; }
        let html = '';
        Object.keys(currentData.albums).forEach(id => {
            const alb = currentData.albums[id];
            let cover = '';
            if (alb.imgs && Object.keys(alb.imgs).length) cover = Object.values(alb.imgs)[0].url;
            html += `<div class="card" onclick="openAlbum('${id}')">${cover ? `<img src="${cover}" class="card-img" loading="lazy">` : '<div class="card-img" style="background:#f0f0f0;"></div>'}<div class="card-body"><div class="card-title">${alb.name || 'ألبوم'}</div></div></div>`;
        });
        container.innerHTML = html;
    }
    function buildWorksGrid() {
        const container = document.getElementById('worksGrid');
        if (!container) return;
        if (!currentData.albums || Object.keys(currentData.albums).length === 0) { container.innerHTML = '<div class="empty-state">لا توجد أعمال</div>'; return; }
        let html = '';
        Object.keys(currentData.albums).forEach(id => {
            const alb = currentData.albums[id];
            let cover = '';
            if (alb.imgs && Object.keys(alb.imgs).length) cover = Object.values(alb.imgs)[0].url;
            html += `<div class="card" onclick="openAlbum('${id}')">${cover ? `<img src="${cover}" class="card-img" loading="lazy">` : '<div class="card-img" style="background:#f0f0f0;"></div>'}<div class="card-body"><div class="card-title">${alb.name || 'ألبوم'}</div></div></div>`;
        });
        container.innerHTML = html;
    }
    function buildCatalogsHome() {
        const container = document.getElementById('catalogsHomeGrid');
        if (!container) return;
        if (!currentData.catalogs || Object.keys(currentData.catalogs).length === 0) { container.innerHTML = '<div class="empty-state">لا توجد كتالوجات</div>'; return; }
        let html = '';
        Object.keys(currentData.catalogs).forEach(id => {
            const cat = currentData.catalogs[id];
            html += `<div class="card" onclick="openCatalog('${id}')"><div class="card-body"><i class="fas fa-book-open fa-3x" style="color:var(--primary); margin-bottom:0.5rem; display:block;"></i><div class="card-title">${cat.name || 'كتالوج'}</div><small>اضغط للعرض</small></div></div>`;
        });
        container.innerHTML = html;
    }
    function buildCatalogsPageGrid() {
        const container = document.getElementById('catalogsPageGrid');
        if (!container) return;
        if (!currentData.catalogs || Object.keys(currentData.catalogs).length === 0) { container.innerHTML = '<div class="empty-state">لا توجد كتالوجات</div>'; return; }
        let html = '';
        Object.keys(currentData.catalogs).forEach(id => {
            const cat = currentData.catalogs[id];
            html += `<div class="card" onclick="openCatalog('${id}')"><div class="card-body"><i class="fas fa-book-open fa-3x" style="color:var(--primary);"></i><div class="card-title">${cat.name}</div><small>اضغط للعرض</small></div></div>`;
        });
        container.innerHTML = html;
    }
    function buildTestimonials() {
        const container = document.getElementById('testimonialsGrid');
        if (!container) return;
        if (!currentData.reviews || Object.keys(currentData.reviews).length === 0) { container.innerHTML = '<div class="empty-state">لا توجد تقييمات بعد</div>'; }
        else {
            let html = '';
            Object.keys(currentData.reviews).forEach(id => {
                const rev = currentData.reviews[id];
                html += `<div class="testimonial-card"><div class="testimonial-header"><div class="testimonial-avatar"><i class="fas fa-user-alt"></i></div><div><div class="card-title" style="margin:0;">${rev.name}</div><div class="stars">${'★'.repeat(rev.rating)}${'☆'.repeat(5 - rev.rating)}</div></div></div><p>${rev.message}</p></div>`;
            });
            container.innerHTML = html;
        }
        const formContainer = document.getElementById('reviewFormContainer');
        if (formContainer) {
            formContainer.innerHTML = `<div class="review-form"><h4 style="margin-bottom:1rem;">أضف تقييمك</h4><input type="text" id="reviewName" placeholder="اسمك الكريم"><div class="star-rating" id="starRating"><i class="fas fa-star" data-star="5"></i><i class="fas fa-star" data-star="4"></i><i class="fas fa-star" data-star="3"></i><i class="fas fa-star" data-star="2"></i><i class="fas fa-star" data-star="1"></i></div><textarea id="reviewMsg" rows="2" placeholder="شاركنا تجربتك..."></textarea><button onclick="submitNewReview()" style="background:var(--primary); color:white; border:none; padding:10px; border-radius:60px; width:100%; font-weight:600;">إرسال التقييم</button></div>`;
            setupStarRating();
        }
    }

    function setupStarRating() {
        let selected = 0;
        const stars = document.querySelectorAll('#starRating i');
        stars.forEach(s => {
            s.onclick = () => {
                selected = parseInt(s.dataset.star);
                stars.forEach(st => st.classList.remove('active'));
                for (let i = stars.length - 1; i >= stars.length - selected; i--) stars[i]?.classList.add('active');
            };
        });
        window.submitNewReview = () => {
            const name = document.getElementById('reviewName')?.value;
            const msg = document.getElementById('reviewMsg')?.value;
            if (!name || !msg || !selected) { showToast('يرجى إكمال الاسم والتقييم والنص'); return; }
            db.ref(DB_PATH + '/reviews').push({ name, message: msg, rating: selected }).then(() => {
                showToast('شكراً لتقييمك!');
                document.getElementById('reviewName').value = '';
                document.getElementById('reviewMsg').value = '';
                stars.forEach(st => st.classList.remove('active'));
                selected = 0;
                loadPage();
            });
        };
    }

    function openAlbum(id) {
        const alb = currentData.albums?.[id];
        if (!alb || !alb.imgs) { showToast('لا توجد صور في هذا الألبوم'); return; }
        const images = Object.values(alb.imgs).map(i => i.url).filter(u => u);
        if (images.length === 0) { showToast('لا توجد صور'); return; }
        currentAlbumImages = images;
        currentImageIndex = 0;
        document.getElementById('lightboxImg').src = images[0];
        document.getElementById('lightbox').style.display = 'flex';
    }
    function openCatalog(id) {
        const cat = currentData.catalogs?.[id];
        if (cat && cat.code) { const win = window.open(); win.document.write(cat.code); }
        else showToast('الكتالوج غير متاح');
    }
    function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
    function nextImage() { if (currentAlbumImages.length) { currentImageIndex = (currentImageIndex + 1) % currentAlbumImages.length; document.getElementById('lightboxImg').src = currentAlbumImages[currentImageIndex]; } }
    function prevImage() { if (currentAlbumImages.length) { currentImageIndex = (currentImageIndex - 1 + currentAlbumImages.length) % currentAlbumImages.length; document.getElementById('lightboxImg').src = currentAlbumImages[currentImageIndex]; } }

    function updateFooterData() {
        const d = currentData;
        document.getElementById('siteTitle').innerText = d.site_name || 'بصمة غير';
        document.getElementById('footerPhone').innerText = d.whatsapp_num || '0541780995';
        document.getElementById('footerWhatsapp').innerHTML = `<a href="https://wa.me/${d.whatsapp_num || '966500000000'}" target="_blank" style="color:#25D366;">${d.whatsapp_num || '966500000000'}</a>`;
        document.getElementById('footerLocation').innerHTML = d.location_url ? `<a href="${d.location_url}" target="_blank">جدة، السعودية</a>` : 'جدة، السعودية';
        const socialDiv = document.getElementById('socialIcons');
        if (socialDiv) {
            let s = '';
            if (d.insta_url) s += `<a href="${d.insta_url}" target="_blank"><i class="fab fa-instagram"></i></a>`;
            if (d.tiktok_url) s += `<a href="${d.tiktok_url}" target="_blank"><i class="fab fa-tiktok"></i></a>`;
            if (d.snap_url) s += `<a href="${d.snap_url}" target="_blank"><i class="fab fa-snapchat"></i></a>`;
            socialDiv.innerHTML = s;
        }
        const hoursDiv = document.getElementById('footerHours');
        if (hoursDiv) hoursDiv.innerHTML = getGroupedScheduleHtml(d);
        if (d.footer_text) document.getElementById('footerCopyright').innerHTML = d.footer_text;
    }

    function loadPage() {
        const main = document.getElementById('mainContent');
        if (currentPage === 'home') {
            main.innerHTML = renderHomePage();
            buildCategories();
            buildLatestProducts();
            buildPortfolio();
            buildCatalogsHome();
            buildTestimonials();
        } else if (currentPage === 'store') {
            main.innerHTML = renderStorePage();
            buildAllProductsGrid();
        } else if (currentPage === 'works') {
            main.innerHTML = renderWorksPage();
            buildWorksGrid();
        } else if (currentPage === 'catalogs') {
            main.innerHTML = renderCatalogsPage();
            buildCatalogsPageGrid();
        } else if (currentPage === 'contact') {
            main.innerHTML = renderContactPage();
        }
        updateFooterData();
        attachNavEvents();
    }

    function attachNavEvents() {
        document.querySelectorAll('[data-page]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const page = link.getAttribute('data-page');
                if (page) { currentPage = page; loadPage(); window.scrollTo(0, 0); }
            });
        });
    }

    function showSplash(imgUrl) {
        const splash = document.getElementById('splash');
        const splashImg = document.getElementById('splashImg');
        if (imgUrl) { splashImg.src = imgUrl; splashImg.style.display = 'block'; }
        splash.style.display = 'flex';
        setTimeout(() => {
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 600);
        }, 4000);
    }

    // تحميل البيانات من Firebase
    db.ref(DB_PATH).once('value', snap => {
        currentData = snap.val() || {};
        showSplash(currentData.splash_image_url || '');
        loadPage();
    });
    db.ref(DB_PATH).on('value', snap => {
        currentData = snap.val() || {};
        if (document.getElementById('mainContent').innerHTML !== '') loadPage();
    });

    window.openAlbum = openAlbum;
    window.openCatalog = openCatalog;
    window.closeLightbox = closeLightbox;
    window.nextImage = nextImage;
    window.prevImage = prevImage;
</script>
</body>
</html>

        if(imageUrl) {
            splashImg.src = imageUrl;
            splashImg.style.display = 'block';
        } else {
            splashImg.style.display = 'none';
        }
        splashDiv.style.display = 'flex';
        setTimeout(() => {
            splashDiv.style.opacity = '0';
            setTimeout(() => {
                splashDiv.style.display = 'none';
            }, 800);
        }, 5000); // 5 ثواني
    }

    function renderBanners() {
        const container = document.getElementById('bannersMarquee');
        const track = document.getElementById('bannersTrack');
        if(!container || !track) return;
        if(currentData.banners && Object.keys(currentData.banners).length) {
            container.style.display = 'block';
            let bannersHtml = '';
            Object.values(currentData.banners).forEach(b => {
                const link = b.link || '#';
                bannersHtml += `<div class="banner-item" onclick="window.open('${link}', '_blank')"><img src="${b.url}" loading="lazy"></div>`;
            });
            track.innerHTML = bannersHtml + bannersHtml; // تكرار للتأثير اللانهائي
        } else {
            container.style.display = 'none';
        }
    }

    // ========== دالة عرض الصفحة الرئيسية ==========
    function renderCurrentPage() {
        const main = document.getElementById('mainContent');
        if(!main) return;
        let content = '';
        if(currentPage === 'home') content = renderHome();
        else if(currentPage === 'works') content = `<h2 style="margin-bottom:20px;"><i class="fas fa-images"></i> أعمالنا</h2>${renderWorks()}`;
        else if(currentPage === 'store') content = `<h2 style="margin-bottom:20px;"><i class="fas fa-store"></i> متجرنا</h2>${renderStore()}`;
        else content = '<div class="empty-state">صفحة غير موجودة</div>';
        main.innerHTML = content;
        document.getElementById('siteTitle').innerText = currentData.site_name || 'بصمة غير';
        if(currentPage === 'home') { if(clockInterval) clearInterval(clockInterval); setTimeout(()=>{ updateClockAndStatus(); clockInterval = setInterval(updateClockAndStatus,1000); },100); } else if(clockInterval) clearInterval(clockInterval);
        setTimeout(()=>setupStarRating(),100);
        attachAlbumEvents(); attachStoreCategoryEvents();
    }

    function attachAlbumEvents() { document.querySelectorAll('.album-card').forEach(card=>{ card.removeEventListener('click', albumHandler); card.addEventListener('click', albumHandler); }); }
    function albumHandler(e) { if(e.target.closest('.album-icon-btn')) return; const id=this.dataset.albumId; if(id) openAlbum(id); }
    function attachStoreCategoryEvents() { document.querySelectorAll('.store-category-card').forEach(card=>{ card.removeEventListener('click', storeCategoryHandler); card.addEventListener('click', storeCategoryHandler); }); }
    function storeCategoryHandler(e) { const id=this.dataset.storeCatId; if(id) openStoreCategory(id); }
    function setupStarRating() { let selected=0; const stars=document.querySelectorAll('#starRating i'); stars.forEach(s=>{ s.onclick=()=>{ selected=parseInt(s.dataset.star); stars.forEach(st=>st.classList.remove('active')); for(let i=stars.length-1; i>=stars.length-selected; i--) stars[i]?.classList.add('active'); }; }); window.submitReview=()=>{ const name=document.getElementById('reviewName')?.value; const msg=document.getElementById('reviewMsg')?.value; if(!name||!msg||!selected) return showToast('يرجى إكمال الاسم والتقييم والنص'); db.ref(DB_PATH+'/reviews').push({name, message:msg, rating:selected}).then(()=>{ showToast('شكراً لتقييمك!'); document.getElementById('reviewName').value=''; document.getElementById('reviewMsg').value=''; stars.forEach(s=>s.classList.remove('active')); selected=0; renderCurrentPage(); }); }; }

    // ========== دوال التبويبات مع إظهار/إخفاء وفق الإعدادات ==========
    function getPageKeyFromHash() {
        let hash = window.location.hash.substring(1);
        if(hash === 'الرئيسية') return 'home';
        if(hash === 'أعمالنا') return 'works';
        if(hash === 'متجرنا') return 'store';
        return 'home';
    }
    function updateHashFromPage(pageKey) {
        let hash = '';
        if(pageKey === 'home') hash = 'الرئيسية';
        else if(pageKey === 'works') hash = 'أعمالنا';
        else if(pageKey === 'store') hash = 'متجرنا';
        if(window.location.hash !== '#'+hash && hash) history.pushState(null, '', '#'+hash);
    }
    function renderTabs() {
        const container = document.getElementById('tabsSection');
        if(!container) return;
        let html = '';
        const showHome = currentData.sections_visibility?.home !== false;
        const showWorks = currentData.sections_visibility?.works !== false;
        const showStore = currentData.sections_visibility?.store !== false;
        if(showHome) html += `<button class="tab-btn ${currentPage==='home'?'active':''}" data-page="home"><i class="fas fa-home"></i> الرئيسية</button>`;
        if(showWorks) html += `<button class="tab-btn ${currentPage==='works'?'active':''}" data-page="works"><i class="fas fa-images"></i> أعمالنا</button>`;
        if(showStore) html += `<button class="tab-btn ${currentPage==='store'?'active':''}" data-page="store"><i class="fas fa-store"></i> متجرنا</button>`;
        container.innerHTML = html;
        document.querySelectorAll('.tab-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ const page=btn.dataset.page; if(page && page!==currentPage){ currentPage=page; updateHashFromPage(currentPage); renderCurrentPage(); renderTabs(); setTimeout(()=>{ const activeBtn=document.querySelector('.tab-btn.active'); if(activeBtn) activeBtn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); },100); } }); });
        setTimeout(()=>{ const activeBtn=document.querySelector('.tab-btn.active'); if(activeBtn) activeBtn.scrollIntoView({behavior:'auto',block:'nearest',inline:'center'}); },100);
    }
    function renderPartnersMarquee() { const container=document.getElementById('partnersMarquee'); const track=document.getElementById('marqueeTrack'); if(!container||!track) return; if(currentData.partners && Object.keys(currentData.partners).length){ container.style.display='block'; const logos=Object.values(currentData.partners).map(p=>`<div class="partner-item" onclick="window.open('${p.link||'#'}', '_blank')"><img src="${p.url}" class="partner-logo" loading="lazy"></div>`).join(''); track.innerHTML=logos+logos; } else container.style.display='none'; }
    function showPopupIfNeeded() { if(currentPage==='home' && currentData.popup_enabled && currentData.popup_message){ const bubble=document.getElementById('popupBubble'); document.getElementById('popupMessage').innerText=currentData.popup_message; bubble.style.display='block'; setTimeout(()=>closePopup(), (currentData.popup_duration||7)*1000); } }
    function closePopup() { document.getElementById('popupBubble').style.display='none'; }
    function whatsappGlobal() { window.open(`https://wa.me/${currentData.whatsapp_num||'966500000000'}?text=${encodeURIComponent('السلام عليكم، أود الاستفسار عن خدمات الديكور')}`,'_blank'); }

    window.toggleFavorite=toggleFavorite; window.openAlbum=openAlbum; window.whatsappGlobal=whatsappGlobal; window.closePopup=closePopup; window.viewerToggleFavorite=viewerToggleFavorite; window.viewerWhatsapp=viewerWhatsapp; window.viewerPrev=viewerPrev; window.viewerNext=viewerNext; window.closeViewer=closeViewer; window.openViewer=openViewer; window.goBackToStore=goBackToStore;

    window.addEventListener('load', ()=>{
        db.ref(DB_PATH).once('value', (snap)=>{
            const data = snap.val() || {};
            const splashUrl = data.splash_image_url || '';
            showSplashWithImage(splashUrl);
        });
    });
    window.addEventListener('hashchange', ()=>{ if(!currentData || Object.keys(currentData).length===0) return; const newPage=getPageKeyFromHash(); if(newPage!==currentPage){ currentPage=newPage; renderCurrentPage(); renderTabs(); } });
    db.ref(DB_PATH).on('value', (snap)=>{
        currentData = snap.val() || {};
        if(checkMaintenanceAndShow()) return;
        currentPage = getPageKeyFromHash();
        renderTabs();
        renderCurrentPage();
        renderPartnersMarquee();
        renderBanners();
        setTimeout(showPopupIfNeeded, 1500);
    });
    // إعادة تعريف الدوال الناقصة للصيانة بشكل مبسط (لتجنب الأخطاء)
    function checkMaintenanceAndShow() { if(!currentData.maintenance_mode) { hideMaintenanceScreen(); return false; } showMaintenanceScreen(currentData.maintenance_until, currentData.maintenance_title, currentData.maintenance_message); return true; }
    function showMaintenanceScreen(until, title, msg) { const screen=document.getElementById('maintenanceScreen'); document.getElementById('maintenanceTitle').innerText=title||'صيانة'; document.getElementById('maintenanceMessage').innerText=msg||'نعمل على تحسين الموقع'; screen.style.display='flex'; }
    function hideMaintenanceScreen() { document.getElementById('maintenanceScreen').style.display='none'; }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>بصمة غير للديكور | تصميم داخلي فاخر</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #fafafc;
            color: #1c1c1e;
            overflow-x: hidden;
            line-height: 1.6;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-card: #ffffff;
            --text-primary: #1c1c1e;
            --text-secondary: #6c6c70;
            --accent: #c9a96e;
            --accent-dark: #b48c48;
            --accent-light: #e6d5b8;
            --border: #e9ecef;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --success: #28a745;
            --danger: #dc3545;
            --whatsapp: #25D366;
        }

        /* Splash Screen */
        #splash {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.5s ease;
        }
        .splash-logo {
            font-size: 3rem;
            font-weight: 900;
            color: var(--accent);
            animation: splashPulse 1.2s infinite alternate;
        }
        .splash-line {
            width: 60px;
            height: 2px;
            background: var(--accent);
            animation: splashGrow 1.2s infinite alternate;
        }
        @keyframes splashPulse {
            0% { opacity: 0.5; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1.02); }
        }
        @keyframes splashGrow {
            0% { width: 40px; opacity: 0.5; }
            100% { width: 100px; opacity: 1; }
        }

        /* Maintenance Screen */
        #maintenance-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 999998;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-direction: column;
        }
        .maintenance-content {
            padding: 40px;
            background: var(--bg-card);
            border-radius: 24px;
            max-width: 90%;
        }

        /* Top Navigation Bar */
        .top-nav {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }
        
        .logo-section {
            padding: 12px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .logo-section h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-dark);
            letter-spacing: 1px;
        }
        .logo-section p {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        /* Partners Marquee */
        .partners-marquee {
            background: var(--bg-secondary);
            padding: 10px 0;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }
        .marquee-track {
            display: flex;
            animation: marqueeScroll 25s linear infinite;
            width: fit-content;
        }
        .marquee-track:hover {
            animation-play-state: paused;
        }
        .partner-logo {
            height: 40px;
            margin: 0 20px;
            object-fit: contain;
            filter: grayscale(0.2);
            transition: filter 0.3s;
            cursor: pointer;
        }
        @keyframes marqueeScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        /* Tabs Section with Scroll Indicator */
        .tabs-wrapper {
            position: relative;
            border-bottom: 1px solid var(--border);
            background: var(--bg-primary);
        }
        .tabs-section {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 8px 16px;
            scrollbar-width: none;
        }
        .tabs-section::-webkit-scrollbar {
            display: none;
        }
        .scroll-indicator {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), transparent);
            animation: slideGlow 1.5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes slideGlow {
            0%, 100% { opacity: 0.5; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(20px); }
        }
        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: var(--accent);
            color: white;
        }

        /* Main Content */
        .main-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px 100px;
        }
        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .page.active-page {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Info Cards */
        .info-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-dark);
            border-right: 3px solid var(--accent);
            padding-right: 12px;
        }
        .star-rating {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 15px 0;
            flex-direction: row-reverse;
        }
        .star-rating i {
            font-size: 1.8rem;
            color: #ddd;
            cursor: pointer;
        }
        .star-rating i.active {
            color: var(--accent);
        }
        .review-slider {
            position: relative;
            min-height: 180px;
        }
        .review-item {
            position: absolute;
            width: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-align: center;
        }
        .review-item.active {
            opacity: 1;
            position: relative;
        }
        /* Schedule Grouped Style */
        .schedule-group {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .schedule-days {
            font-weight: 700;
            color: var(--accent-dark);
        }
        .time-period {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }
        .time-text {
            background: var(--bg-secondary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .holiday-text {
            background: #ffebee;
            color: var(--danger);
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
        }
        .status-open { background: #e8f5e9; color: var(--success); }
        .status-closed { background: #ffebee; color: var(--danger); }
        .whatsapp-btn {
            background: var(--whatsapp);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .social-link {
            width: 48px;
            height: 48px;
            background: var(--bg-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 1.3rem;
            text-decoration: none;
            transition: all 0.2s;
        }
        .social-link:hover {
            background: var(--accent);
            color: white;
        }
        .location-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
        }

        /* Photo Grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }
        .photo-item {
            aspect-ratio: 1;
            background: #f0f0f0;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .photo-item:hover img {
            transform: scale(1.05);
        }
        .fav-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            z-index: 2;
        }
        .fav-btn.active { color: var(--danger); }
        
        .album-card, .folder-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .album-card:hover, .folder-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        /* Viewer Modal with Zoom */
        .viewer-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .viewer-container {
            width: 100%;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .viewer-img {
            max-width: 90%;
            max-height: 80vh;
            object-fit: contain;
            transition: transform 0.1s ease;
            cursor: grab;
        }
        .viewer-img:active { cursor: grabbing; }
        .viewer-controls {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 30px;
            background: rgba(0,0,0,0.5);
            padding: 12px 24px;
            border-radius: 50px;
        }
        .viewer-controls button {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .viewer-close {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            font-size: 1.5rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Hidden Admin Button (Left Side - No Crown) */
        .hidden-admin {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: transparent;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2000;
            opacity: 0;
        }
        .hidden-admin:hover {
            opacity: 0.3;
            background: rgba(0,0,0,0.1);
        }

        /* Admin Panel */
        .admin-panel {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 10001;
            overflow-y: auto;
            display: none;
            padding: 20px;
        }
        .admin-panel.active { display: block; }
        .admin-card { max-width: 700px; margin: 0 auto; }
        .collapse-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .collapse-btn {
            width: 100%;
            padding: 16px;
            background: none;
            border: none;
            font-weight: 700;
            text-align: right;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .collapse-content { display: none; padding: 16px; border-top: 1px solid var(--border); }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
        }
        .admin-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            margin-top: 8px;
            cursor: pointer;
        }
        .btn-gold { background: var(--accent); color: #1c1c1e; }
        .btn-red { background: var(--danger); color: white; }
        .btn-green { background: var(--success); color: white; }
        .partner-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .toast-msg {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 10002;
            display: none;
        }
    </style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
    <div class="splash-logo">بصمة غير</div>
    <div class="splash-line"></div>
</div>

<!-- Maintenance Screen -->
<div id="maintenance-screen">
    <div class="maintenance-content">
        <i class="fas fa-tools" style="font-size: 4rem; color: var(--accent);"></i>
        <h2 id="maintenance-title">الموقع في صيانة</h2>
        <p id="maintenance-message">نعمل على تحسين تجربتك، سنعود قريباً</p>
    </div>
</div>

<!-- Hidden Admin Button (Left Side - Invisible) -->
<div class="hidden-admin" onclick="checkAccess()"></div>

<!-- Top Navigation -->
<div class="top-nav">
    <div class="logo-section">
        <h1 id="siteTitle">بصمة غير</h1>
        <p>للديكور والتصميم الداخلي</p>
    </div>
    <div class="partners-marquee" id="partnersMarquee" style="display: none;">
        <div class="marquee-track" id="marqueeTrack"></div>
    </div>
    <div class="tabs-wrapper">
        <div class="tabs-section" id="tabsSection"></div>
        <div class="scroll-indicator"></div>
    </div>
</div>

<!-- Main Content -->
<div class="main-content" id="mainContent"></div>

<!-- Viewer Modal -->
<div id="viewerModal" class="viewer-modal" onclick="closeViewerOnBg(event)">
    <button class="viewer-close" onclick="closeViewer()"><i class="fas fa-times"></i></button>
    <div class="viewer-container">
        <img id="viewerImg" class="viewer-img" src="" draggable="false">
    </div>
    <div class="viewer-controls">
        <button onclick="viewerPrev()"><i class="fas fa-chevron-right"></i></button>
        <span id="viewerCounter" style="color:white">1/1</span>
        <button onclick="viewerNext()"><i class="fas fa-chevron-left"></i></button>
    </div>
</div>

<!-- Admin Panel -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-card">
        <h2 style="margin-bottom: 20px;">⚡ لوحة الإدارة</h2>
        <div id="adminSections"></div>
        <button onclick="closeAdminPanel()" class="admin-btn btn-red" style="margin-top:20px">إغلاق</button>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0hGvWzpb0UxA_RrYn-0PQKyaATXavEGY",
        authDomain: "mydecor-b29bd.firebaseapp.com",
        databaseURL: "https://mydecor-b29bd-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mydecor-b29bd",
        storageBucket: "mydecor-b29bd.firebasestorage.app",
        messagingSenderId: "302609299720",
        appId: "1:302609299720:web:e086b600c3ee824acd54bd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = 'site_v28';

    let currentData = {};
    let isAdmin = false;
    let favorites = JSON.parse(localStorage.getItem('site_favorites_v3')) || [];
    let currentPage = 'home';
    let currentImageList = [];
    let currentImageIndex = 0;
    let reviewInterval = null;
    let reviewIdx = 0;
    let zoomScale = 1, isZoomed = false, translate = { x: 0, y: 0 }, isDragging = false;

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    // Hide splash after load
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
        }, 1000);
    });

    function saveFav() { localStorage.setItem('site_favorites_v3', JSON.stringify(favorites)); }
    function toggleFavorite(imgId, imgUrl) {
        const exists = favorites.find(f => f.id === imgId);
        if (exists) {
            favorites = favorites.filter(f => f.id !== imgId);
            showToast('🗑️ تمت الإزالة من المفضلة');
        } else {
            favorites.unshift({ id: imgId, url: imgUrl, date: Date.now() });
            showToast('❤️ أضيف إلى المفضلة');
        }
        saveFav();
        renderCurrentPage();
    }
    function isFav(imgId) { return favorites.some(f => f.id === imgId); }

    function formatTime12(t) { if(!t) return ""; let [h,m]=t.split(':'); h=parseInt(h); return `${h%12||12}:${m} ${h>=12?'م':'ص'}`; }
    
    function getGroupedScheduleHtml(d) {
        if (!d.work_schedule) return '<p>لم تحدد المواعيد بعد</p>';
        const dayNames = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
        const daysOrder = [6,0,1,2,3,4,5];
        let groups = [], offDays = [];
        daysOrder.forEach(jsDay => {
            const s = d.work_schedule[jsDay];
            if (s && s.active) {
                const key = `${s.s1_s}-${s.s1_e}-${s.s2_a}-${s.s2_s}-${s.s2_e}`;
                let g = groups.find(g => g.key === key);
                if (g) g.days.push(dayNames[jsDay]);
                else groups.push({ key, days: [dayNames[jsDay]], data: s });
            } else offDays.push(dayNames[jsDay]);
        });
        let html = '';
        groups.forEach(g => {
            const dText = g.days.length === 1 ? g.days[0] : `من ${g.days[0]} إلى ${g.days[g.days.length-1]}`;
            html += `<div class="schedule-group"><div class="schedule-days">${dText}</div>
                <div class="time-period"><span class="time-text">${formatTime12(g.data.s1_s||'09:00')}</span> — <span class="time-text">${formatTime12(g.data.s1_e||'17:00')}</span></div>`;
            if (g.data.s2_a) html += `<div class="time-period"><span class="time-text">${formatTime12(g.data.s2_s)}</span> — <span class="time-text">${formatTime12(g.data.s2_e)}</span></div>`;
            html += `</div>`;
        });
        if (offDays.length) html += `<div class="holiday-text"><i class="fas fa-moon"></i> عطلة: ${offDays.join('، ')}</div>`;
        return html;
    }
    
    function updateWorkStatus() {
        const container = document.getElementById('statusContainer');
        if (!container || !currentData.work_schedule) return;
        const now = new Date(), day = now.getDay(), s = currentData.work_schedule[day];
        let isOpen = false;
        if (s && s.active) {
            const toMins = (t) => { let [h,m]=t.split(':').map(Number); return h*60+m; };
            const cur = now.getHours()*60+now.getMinutes();
            const s1 = toMins(s.s1_s), e1 = toMins(s.s1_e);
            if (cur >= s1 && cur < e1) isOpen = true;
            if (!isOpen && s.s2_a && s.s2_s && s.s2_e) {
                const s2 = toMins(s.s2_s), e2 = toMins(s.s2_e);
                if ((e2 < s2 && (cur >= s2 || cur < e2)) || (cur >= s2 && cur < e2)) isOpen = true;
            }
        }
        container.innerHTML = isOpen ? `<div class="status-badge status-open"><i class="fas fa-circle"></i> مفتوح الآن</div>` : `<div class="status-badge status-closed"><i class="fas fa-circle"></i> مغلق الآن</div>`;
    }
    
    // Viewer with Zoom
    function openViewer(url, imageList, index) {
        currentImageList = imageList;
        currentImageIndex = index;
        document.getElementById('viewerImg').src = url;
        document.getElementById('viewerCounter').innerText = `${index+1}/${imageList.length}`;
        document.getElementById('viewerModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
        resetZoom();
        setupZoomEvents();
    }
    function closeViewer() { document.getElementById('viewerModal').style.display = 'none'; document.body.style.overflow = ''; resetZoom(); }
    function closeViewerOnBg(e) { if (e.target === document.getElementById('viewerModal')) closeViewer(); }
    function viewerNext() { currentImageIndex = (currentImageIndex + 1) % currentImageList.length; document.getElementById('viewerImg').src = currentImageList[currentImageIndex]; document.getElementById('viewerCounter').innerText = `${currentImageIndex+1}/${currentImageList.length}`; resetZoom(); }
    function viewerPrev() { currentImageIndex = (currentImageIndex - 1 + currentImageList.length) % currentImageList.length; document.getElementById('viewerImg').src = currentImageList[currentImageIndex]; document.getElementById('viewerCounter').innerText = `${currentImageIndex+1}/${currentImageList.length}`; resetZoom(); }
    function resetZoom() { zoomScale = 1; translate = { x: 0, y: 0 }; document.getElementById('viewerImg').style.transform = `scale(1) translate(0px, 0px)`; isZoomed = false; }
    function setupZoomEvents() {
        const img = document.getElementById('viewerImg');
        img.onwheel = (e) => { e.preventDefault(); zoomScale = Math.min(Math.max(zoomScale + (e.deltaY > 0 ? -0.1 : 0.1), 1), 3); img.style.transform = `scale(${zoomScale}) translate(${translate.x}px, ${translate.y}px)`; isZoomed = zoomScale > 1; };
        let startX, startY, startTX, startTY;
        img.onmousedown = (e) => { if (!isZoomed) return; e.preventDefault(); isDragging = true; startX = e.clientX; startY = e.clientY; startTX = translate.x; startTY = translate.y; };
        window.onmousemove = (e) => { if (!isDragging || !isZoomed) return; translate.x = startTX + (e.clientX - startX); translate.y = startTY + (e.clientY - startY); img.style.transform = `scale(${zoomScale}) translate(${translate.x}px, ${translate.y}px)`; };
        window.onmouseup = () => { isDragging = false; };
        img.ondblclick = () => { if (zoomScale > 1) resetZoom(); else { zoomScale = 2; img.style.transform = `scale(2) translate(0px, 0px)`; isZoomed = true; } };
    }

    function renderWorks() {

        });

    function openAlbum(albumId) {

            const urls = Object.values(album.imgs).map(img => img.url);

    function startReviewSlider() {
        if (reviewInterval) clearInterval(reviewInterval);
        const items = document.querySelectorAll('.review-item');
        if (!items.length) return;
        items.forEach((item, i) => item.classList.remove('active'));
        items[0]?.classList.add('active');
        reviewInterval = setInterval(() => { reviewIdx = (reviewIdx + 1) % items.length; items.forEach((item, i) => item.classList.remove('active')); items[reviewIdx]?.classList.add('active'); }, 4000);
    }
    
    function setupStarRating() {
        let selectedStar = 0;
        const stars = document.querySelectorAll('#starRating i');
        stars.forEach(star => { star.onclick = () => { selectedStar = parseInt(star.dataset.star); stars.forEach(s => s.classList.remove('active')); for(let i=stars.length-1; i>=stars.length-selectedStar; i--) stars[i]?.classList.add('active'); }; });
        window.submitReview = () => { const name = document.getElementById('reviewName')?.value, msg = document.getElementById('reviewMsg')?.value; if (!name || !msg || !selectedStar) return showToast('يرجى إكمال جميع الحقول'); db.ref(DB_PATH+'/reviews').push({ name, message: msg, rating: selectedStar }).then(() => { showToast('شكراً لتقييمك!'); document.getElementById('reviewName').value = ''; document.getElementById('reviewMsg').value = ''; selectedStar = 0; stars.forEach(s => s.classList.remove('active')); }); };
    }

    function saveSchedule() { let s={}; for(let i=0;i<=6;i++) s[i]={ active:document.getElementById(`dayActive_${i}`).checked, s1_s:document.getElementById(`s1s_${i}`).value, s1_e:document.getElementById(`s1e_${i}`).value, s2_a:document.getElementById(`s2a_${i}`).checked, s2_s:document.getElementById(`s2s_${i}`).value, s2_e:document.getElementById(`s2e_${i}`).value }; db.ref(DB_PATH+'/work_schedule').set(s).then(()=>showToast('تم حفظ المواعيد')); }
    function saveAbout() { db.ref(DB_PATH).update({ about_text:document.getElementById('aboutEditor').value, about_active:document.getElementById('aboutActive').checked }).then(()=>showToast('تم حفظ من نحن')); }
    function saveSocial() { db.ref(DB_PATH).update({ insta_url:document.getElementById('instaInput').value, tiktok_url:document.getElementById('tiktokInput').value, snap_url:document.getElementById('snapInput').value, location_url:document.getElementById('locationInput').value }).then(()=>showToast('تم حفظ الروابط')); }
    function saveGeneral() { db.ref(DB_PATH).update({ site_name:document.getElementById('siteNameInput').value, whatsapp_num:document.getElementById('whatsappInput').value, wm_text:document.getElementById('wmInput').value, footer_text:document.getElementById('footerInput').value }).then(()=>showToast('تم حفظ الإعدادات')); }
    function saveMaintenance() { db.ref(DB_PATH).update({ maintenance_mode:document.getElementById('maintenanceMode').checked, maintenance_title:document.getElementById('maintenanceTitle').value, maintenance_message:document.getElementById('maintenanceMsg').value }).then(()=>showToast('تم حفظ إعدادات الصيانة')); }
    function uploadPhotos() { const target=document.getElementById('uploadTarget').value; const urls=document.getElementById('imageUrls').value.split('\n').filter(u=>u.trim()); if(!target||urls.length===0) return showToast('اختر الوجهة وأدخل الروابط'); db.ref(DB_PATH+'/'+target+'/imgs').push(urls.map(url=>({url:url.trim()}))[0]).then(()=>{ showToast('تم نشر الصور'); document.getElementById('imageUrls').value=''; }); }
    function loadImagesForDelete() { const path=document.getElementById('deleteTarget').value, grid=document.getElementById('imagesDeleteGrid'); if(!path){ grid.innerHTML=''; return; } const [type,id]=path.split('/'); const folder=currentData[type]?.[id]; if(!folder||!folder.imgs){ grid.innerHTML='<p>لا توجد صور</p>'; return; } grid.innerHTML=Object.keys(folder.imgs).map(imgId=>`<div><img src="${folder.imgs[imgId].url}" style="width:100%; aspect-ratio:1; object-fit:cover;"><button onclick="deleteImage('${path}', '${imgId}')" class="admin-btn btn-red" style="padding:4px">حذف</button></div>`).join(''); }
    function deleteImage(path,imgId){ db.ref(`${DB_PATH}/${path}/imgs/${imgId}`).remove().then(()=>{ showToast('تم الحذف'); loadImagesForDelete(); }); }
    function closeAdminPanel() { document.getElementById('adminPanel').classList.remove('active'); }
    function checkAccess() { const pwd=prompt("رمز الإدارة:"); if(!pwd) return; db.ref(DB_PATH).once('value').then(snap=>{ const data=snap.val(); if(data && data.in && data.in.toString()===pwd) { isAdmin=true; document.getElementById('adminPanel').classList.add('active'); buildAdminSections(); } else showToast('رمز غير صحيح'); }); }
    
    function checkMaintenance() { const m=currentData.maintenance_mode; if(m && !isAdmin) document.getElementById('maintenance-screen').style.display='flex'; else document.getElementById('maintenance-screen').style.display='none'; }
    
    db.ref(DB_PATH).on('value', snap => {
        currentData = snap.val() || {};
        renderTabs();
        renderCurrentPage();
        renderPartnersMarquee();
        checkMaintenance();
        if (isAdmin && document.getElementById('adminPanel').classList.contains('active')) buildAdminSections();
    });
    
    window.openViewer=openViewer; window.closeViewer=closeViewer; window.closeViewerOnBg=closeViewerOnBg;
    window.viewerNext=viewerNext; window.viewerPrev=viewerPrev; window.toggleFavorite=toggleFavorite;
    window.openAlbum=openAlbum; window.openCatalog=openCatalog; window.whatsappGlobal=whatsappGlobal;
    window.checkAccess=checkAccess; window.closeAdminPanel=closeAdminPanel; window.toggleCollapse=toggleCollapse;
    window.addPage=addPage; window.addAlbum=addAlbum; window.addCatalog=addCatalog; window.addPartner=addPartner;
    window.saveAbout=saveAbout; window.saveSchedule=saveSchedule; window.saveSocial=saveSocial; window.saveGeneral=saveGeneral;
    window.uploadPhotos=uploadPhotos; window.loadImagesForDelete=loadImagesForDelete; window.deleteImage=deleteImage;
    window.saveMaintenance=saveMaintenance;
    
    renderTabs();
    renderCurrentPage();
</script>
</body>
</html>
